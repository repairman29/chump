<!DOCTYPE html>
<!-- CSS token discipline test fixture — DIRTY (should fail lint) INFRA-1590 -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #0a0a0a;
      --text: #f0f0f0;
      --accent: #0a84ff;
      --border: rgba(255,255,255,0.08);
    }

    /* Rule 1: raw hex in CSS property value — not mediated by var() */
    .bad-color {
      color: #7c83fd;
      background: #1a1a2e;
    }

    /* Rule 2: non-canonical --*-primary definition */
    :root {
      --bg-primary: #0a0a0a;
    }

    /* Rule 3: var() fallback doesn't match :root value for --border */
    .bad-fallback {
      border: 1px solid var(--border, #2a2a2e);
    }

    /* Rule 3: var() fallback doesn't match :root value for --text */
    .also-bad-fallback {
      color: var(--text, #ddd);
    }

    /* Rule 2: non-canonical --*-secondary definition */
    .component {
      --bg-secondary: #1a1a1c;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="bad-color">I use raw hex colors</div>
  <div class="bad-fallback">I have wrong var() fallbacks</div>
</body>
</html>
