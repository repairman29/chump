<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="/manifest.json">
  <title>Chump</title>
  <style>
    :root {
      --bg: #000;
      --bg-surface: #1c1c1e;
      --text: #fff;
      --text-secondary: #8e8e93;
      --accent: #0a84ff;
      --border: #38383a;
      --user-bubble: #0a84ff;
      --assistant-bubble: #1c1c1e;
      --code-bg: #1a1a1c;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #header {
      padding: calc(var(--safe-top) + 8px) 16px 8px;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
    }
    #header h1 { font-size: 1.1rem; font-weight: 600; }
    #chat-container {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 16px calc(var(--safe-bottom) + 80px);
    }
    .message { margin-bottom: 12px; max-width: 85%; }
    .message.user { margin-left: auto; }
    .message.assistant { margin-right: auto; }
    .message .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.45;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .message.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.assistant .bubble {
      background: var(--assistant-bubble);
      border-bottom-left-radius: 4px;
    }
    .message .bubble pre {
      background: var(--code-bg);
      border-radius: 8px;
      padding: 10px;
      overflow-x: auto;
      font-size: 13px;
      margin: 8px 0;
    }
    .message .bubble code { font-family: ui-monospace, monospace; background: var(--code-bg); padding: 2px 5px; border-radius: 4px; }
    #input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 16px calc(var(--safe-bottom) + 8px);
      background: var(--bg);
      border-top: 0.5px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #msg-input {
      flex: 1;
      background: var(--bg-surface);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 10px 16px;
      font: inherit;
      font-size: 16px;
      color: var(--text);
      resize: none;
      max-height: 120px;
      outline: none;
    }
    #msg-input:focus { border-color: var(--accent); }
    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .status { color: var(--text-secondary); font-size: 13px; padding: 4px 0; }
  </style>
</head>
<body>
  <header id="header">
    <h1>Chump</h1>
  </header>
  <main id="chat-container"></main>
  <footer id="input-area">
    <textarea id="msg-input" rows="1" placeholder="Message…"></textarea>
    <button id="send-btn" type="button" aria-label="Send">↑</button>
  </footer>
  <script>
    const container = document.getElementById('chat-container');
    const input = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const sessionId = localStorage.getItem('chump_session_id') || crypto.randomUUID();
    localStorage.setItem('chump_session_id', sessionId);
    const token = localStorage.getItem('chump_token') || '';

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    function simpleMarkdown(text) {
      let out = escapeHtml(text);
      out = out.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
        '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>');
      out = out.replace(/`([^`]+)`/g, '<code>$1</code>');
      out = out.replace(/\n/g, '<br>');
      return out;
    }
    function appendMessage(role, content, isStreaming) {
      const div = document.createElement('div');
      div.className = 'message ' + role;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = role === 'assistant' ? simpleMarkdown(content) : escapeHtml(content);
      div.appendChild(bubble);
      if (isStreaming) div.dataset.streaming = '1';
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      return div;
    }
    function setStatus(msg) {
      let el = document.getElementById('status-line');
      if (!el) {
        el = document.createElement('div');
        el.id = 'status-line';
        el.className = 'status';
        container.appendChild(el);
      }
      el.textContent = msg;
      container.scrollTop = container.scrollHeight;
    }
    function clearStatus() {
      const el = document.getElementById('status-line');
      if (el) el.remove();
    }

    function parseSSE(buffer) {
      const events = [];
      const parts = buffer.split(/\n\n/);
      for (let i = 0; i < parts.length - 1; i++) {
        const block = parts[i];
        let event = '', data = '';
        block.split('\n').forEach(line => {
          if (line.startsWith('event: ')) event = line.slice(7).trim();
          else if (line.startsWith('data: ')) data = line.slice(6);
        });
        if (event && data) {
          try {
            events.push({ event, data: JSON.parse(data) });
          } catch (_) { /* skip malformed */ }
        }
      }
      return { events, remainder: parts[parts.length - 1] || '' };
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;
      appendMessage('user', text);
      setStatus('Thinking…');
      const assistantEl = appendMessage('assistant', '', true);
      const bubble = assistantEl.querySelector('.bubble');
      let fullText = '';
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
          },
          body: JSON.stringify({ message: text, session_id: sessionId }),
        });
        if (!res.ok) {
          clearStatus();
          if (res.status === 401) {
            bubble.innerHTML = 'Unauthorized. Set CHUMP_WEB_TOKEN or add token in settings.';
          } else {
            bubble.innerHTML = 'Error: ' + res.status;
          }
          assistantEl.dataset.streaming = '';
          return;
        }
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const { events, remainder } = parseSSE(buf);
          buf = remainder;
          for (const { event, data } of events) {
            if (event === 'thinking') {
              setStatus('Thinking… ' + (data.elapsed_ms || 0) + 'ms');
            } else if (event === 'text_delta' && data.delta) {
              fullText += data.delta;
              bubble.innerHTML = simpleMarkdown(fullText);
              container.scrollTop = container.scrollHeight;
            } else if (event === 'text_complete' && data.text) {
              fullText = data.text;
              bubble.innerHTML = simpleMarkdown(fullText);
              container.scrollTop = container.scrollHeight;
            } else if (event === 'tool_call_start') {
              setStatus('Using ' + (data.tool_name || 'tool') + '…');
            } else if (event === 'tool_call_result') {
              setStatus('Thinking…');
            } else if (event === 'turn_complete') {
              if (data.full_text != null) fullText = data.full_text;
              bubble.innerHTML = simpleMarkdown(fullText);
              clearStatus();
            } else if (event === 'turn_error') {
              bubble.innerHTML = 'Error: ' + escapeHtml(data.error || 'Unknown');
              clearStatus();
            }
          }
        }
        if (fullText === '' && !assistantEl.querySelector('.bubble').textContent.trim()) {
          bubble.innerHTML = simpleMarkdown('(No response)');
        }
        clearStatus();
        assistantEl.dataset.streaming = '';
      } catch (err) {
        clearStatus();
        bubble.innerHTML = 'Error: ' + escapeHtml(err.message);
        assistantEl.dataset.streaming = '';
      } finally {
        sendBtn.disabled = false;
        container.scrollTop = container.scrollHeight;
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
