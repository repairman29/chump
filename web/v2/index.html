<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="/v2/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <title>Chump</title>
  <style>
    /* ── Design tokens ──────────────────────────────────────────────────── */
    :root {
      --bg:            #0a0a0a;
      --bg-surface:    #141414;
      --bg-elevated:   #1e1e1e;
      --text:          #f0f0f0;
      --text-secondary:#8a8a8e;
      --accent:        #0a84ff;
      --accent-dim:    rgba(10, 132, 255, 0.15);
      --border:        rgba(255,255,255,0.08);
      --success:       #30d158;
      --warn:          #ff9f0a;
      --error:         #ff453a;
      --radius:        10px;
      --radius-sm:     6px;
      --nav-width:     64px;
      --header-h:      48px;
      --safe-top:      env(safe-area-inset-top, 0px);
      --safe-bottom:   env(safe-area-inset-bottom, 0px);
      --safe-left:     env(safe-area-inset-left, 0px);
    }

    /* ── Reset ──────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── App header ─────────────────────────────────────────────────────── */
    #app-header {
      height: var(--header-h);
      padding-top: var(--safe-top);
      height: calc(var(--header-h) + var(--safe-top));
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      padding-bottom: 0;
      padding-left: calc(var(--nav-width) + var(--safe-left) + 12px);
      padding-right: 16px;
      gap: 8px;
      background: var(--bg);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }
    #app-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      padding-bottom: 10px;
      flex: 1;
    }
    chump-model-indicator {
      padding-bottom: 9px;
    }
    chump-heartbeat {
      padding-bottom: 9px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    #app-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar nav ────────────────────────────────────────────────────── */
    chump-nav {
      width: var(--nav-width);
      padding-left: var(--safe-left);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 8px;
      gap: 4px;
      flex-shrink: 0;
      overflow-y: auto;
    }
    chump-nav .nav-item {
      width: 48px;
      height: 48px;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transition: background 0.15s, color 0.15s;
      touch-action: manipulation;
    }
    chump-nav .nav-item:hover {
      background: var(--bg-elevated);
      color: var(--text);
    }
    chump-nav .nav-item[aria-current="page"] {
      background: var(--accent-dim);
      color: var(--accent);
    }
    chump-nav .nav-icon { font-size: 18px; line-height: 1; }
    chump-nav .nav-label { font-size: 9px; letter-spacing: 0.3px; text-transform: uppercase; }

    /* ── Main content ───────────────────────────────────────────────────── */
    #main-content {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── View: shared ───────────────────────────────────────────────────── */
    .view-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
    .view-subtitle { color: var(--text-secondary); font-size: 13px; }
    .placeholder {
      color: var(--text-secondary);
      font-size: 13px;
      padding: 32px 24px;
      text-align: center;
    }

    /* ── View: tasks ────────────────────────────────────────────────────── */
    .task-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .task-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .task-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .task-status {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg-elevated);
      color: var(--text-secondary);
    }
    .task-status.running { background: rgba(48,209,88,0.15); color: var(--success); }
    .task-status.done    { background: rgba(10,132,255,0.12); color: var(--accent); }
    .task-status.error   { background: rgba(255,69,58,0.12); color: var(--error); }
    .task-id { font-size: 11px; color: var(--text-secondary); font-family: "SF Mono", monospace; }
    .task-desc { font-size: 13px; color: var(--text); line-height: 1.45; }

    /* ── View: memory ───────────────────────────────────────────────────── */
    .memory-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .memory-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
    }
    .memory-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

    /* ── View: settings ─────────────────────────────────────────────────── */
    .settings-grid { padding: 16px; display: flex; flex-direction: column; gap: 1px; }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      font-size: 13px;
    }
    .setting-row:first-child { border-radius: var(--radius) var(--radius) 0 0; }
    .setting-row:last-child  { border-radius: 0 0 var(--radius) var(--radius); }
    .setting-label { color: var(--text); }
    .setting-value { color: var(--text-secondary); font-family: "SF Mono", monospace; font-size: 11px; }

    /* ── Model chip ─────────────────────────────────────────────────────── */
    .model-chip {
      font-size: 11px;
      font-family: "SF Mono", monospace;
      padding: 3px 8px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      white-space: nowrap;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: inline-block;
    }

    /* ── Heartbeat ──────────────────────────────────────────────────────── */
    .hb-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .hb-dot.online  { background: var(--success); }
    .hb-dot.offline { background: var(--error); }
    .hb-text { vertical-align: middle; }

    /* ── Mobile: bottom nav ─────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #app-header { padding-left: 16px; }
      chump-nav {
        width: 100%;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding-bottom: var(--safe-bottom);
        padding-top: 4px;
        padding-left: 0;
        height: calc(56px + var(--safe-bottom));
        flex-direction: row;
        justify-content: space-around;
        align-items: flex-start;
        border-right: none;
        border-top: 1px solid var(--border);
        background: var(--bg);
        z-index: 20;
      }
      #main-content { padding-bottom: calc(56px + var(--safe-bottom)); }
      chump-nav .nav-item { width: 60px; height: 48px; }
      chump-nav .nav-label { display: none; }
    }

    /* ── Offline banner ─────────────────────────────────────────────────── */
    #offline-banner {
      display: none;
      background: var(--warn);
      color: #000;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      padding: 5px;
    }
    body.offline #offline-banner { display: block; }
  </style>
</head>
<body>
  <div id="offline-banner">Offline — cached shell active</div>

  <header id="app-header">
    <span id="app-title">Chump</span>
    <chump-model-picker></chump-model-picker>
    <chump-heartbeat></chump-heartbeat>
  </header>

  <div id="app-body">
    <chump-nav></chump-nav>
    <main id="main-content" role="main" aria-label="Main content"></main>
  </div>

  <script src="/v2/chat.js" type="module"></script>
  <script src="/v2/app.js" type="module"></script>
  <script>
    window.addEventListener('offline', () => document.body.classList.add('offline'));
    window.addEventListener('online',  () => document.body.classList.remove('offline'));
    if (!navigator.onLine) document.body.classList.add('offline');
  </script>
</body>
</html>
