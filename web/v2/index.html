<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <title>Chump</title>
  <style>
    /* ── Design tokens ──────────────────────────────────────────────────── */
    :root {
      --bg:            #0a0a0a;
      --bg-surface:    #141414;
      --bg-elevated:   #1e1e1e;
      --text:          #f0f0f0;
      --text-secondary:#8a8a8e;
      --accent:        #0a84ff;
      --accent-dim:    rgba(10, 132, 255, 0.15);
      --border:        rgba(255,255,255,0.08);
      --success:       #30d158;
      --warn:          #ff9f0a;
      --error:         #ff453a;
      --radius:        10px;
      --radius-sm:     6px;
      --nav-width:     64px;
      --header-h:      48px;
      --safe-top:      env(safe-area-inset-top, 0px);
      --safe-bottom:   env(safe-area-inset-bottom, 0px);
      --safe-left:     env(safe-area-inset-left, 0px);
    }

    /* INFRA-1280 Sub-gap 4: light theme override via [data-theme="light"] on <html>. */
    html[data-theme="light"] {
      --bg:            #fafafa;
      --bg-surface:    #ffffff;
      --bg-elevated:   #f0f0f0;
      --text:          #1a1a1a;
      --text-secondary:#4a4a4f;
      --accent:        #0a84ff;
      --accent-dim:    rgba(10, 132, 255, 0.10);
      --border:        rgba(0,0,0,0.10);
      --success:       #1f8a3a;
      --warn:          #c87a00;
      --error:         #c8281c;
    }

    /* INFRA-1280 Sub-gap 4: WCAG-AAA high-contrast variant. */
    html[data-theme="high-contrast"] {
      --bg:            #000000;
      --bg-surface:    #000000;
      --bg-elevated:   #1a1a1a;
      --text:          #ffffff;
      --text-secondary:#e0e0e0;
      --accent:        #66c2ff;
      --accent-dim:    rgba(102, 194, 255, 0.30);
      --border:        rgba(255,255,255,0.40);
      --success:       #6ef07a;
      --warn:          #ffd166;
      --error:         #ff8a80;
    }

    /* INFRA-1280 Sub-gap 2: gap-queue Clear button. */
    .gap-filter-clear {
      padding: 4px 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 11px;
    }
    .gap-filter-clear:hover { color: var(--text); border-color: var(--text-secondary); }

    /* ── Reset ──────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── App header ─────────────────────────────────────────────────────── */
    #app-header {
      height: var(--header-h);
      padding-top: var(--safe-top);
      height: calc(var(--header-h) + var(--safe-top));
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      padding-bottom: 0;
      padding-left: calc(var(--nav-width) + var(--safe-left) + 12px);
      padding-right: 16px;
      gap: 8px;
      background: var(--bg);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }
    #app-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      padding-bottom: 10px;
      flex: 1;
    }
    chump-model-indicator {
      padding-bottom: 9px;
    }
    chump-heartbeat {
      padding-bottom: 9px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* PRODUCT-108: <chump-first-run-wizard> golden-path checklist.
       Renders above the cadence nav for new operators; self-hides when all
       5 steps are done OR dismissed. Persists via chumpPrefs (INFRA-1280).
       See docs/design/OPERATOR_CONSOLE_V2.md §first-run. */
    chump-first-run-wizard { display: block; }
    chump-first-run-wizard[hidden] { display: none; }
    chump-first-run-wizard .frw-shell {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 16px 20px;
      position: relative;
      z-index: 8;
    }
    chump-first-run-wizard .frw-header {
      display: flex; align-items: baseline; gap: 12px;
      margin-bottom: 12px;
    }
    chump-first-run-wizard .frw-title {
      font-size: 16px; font-weight: 700; color: var(--text-primary, var(--text));
      flex: 1;
    }
    chump-first-run-wizard .frw-subtitle {
      font-size: 11px; color: var(--text-secondary);
      flex: 1; text-align: right;
    }
    chump-first-run-wizard .frw-dismiss {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 4px 10px; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 11px;
    }
    chump-first-run-wizard .frw-dismiss:hover { color: var(--text); border-color: var(--text-secondary); }
    chump-first-run-wizard .frw-steps {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 4px;
    }
    chump-first-run-wizard .frw-step {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 12px; align-items: start;
      padding: 8px 6px;
      border-radius: var(--radius-sm);
      transition: background 0.12s;
    }
    chump-first-run-wizard .frw-step:hover { background: var(--bg-elevated); }
    chump-first-run-wizard .frw-step-current { background: var(--accent-dim); }
    chump-first-run-wizard .frw-step-icon {
      font-size: 18px; line-height: 24px; text-align: center;
      font-weight: 700;
    }
    chump-first-run-wizard .frw-step-done   .frw-step-icon { color: var(--success); }
    chump-first-run-wizard .frw-step-skipped .frw-step-icon { color: var(--text-secondary); }
    chump-first-run-wizard .frw-step-current .frw-step-icon { color: var(--accent); }
    chump-first-run-wizard .frw-step-pending .frw-step-icon { color: var(--text-secondary); }
    chump-first-run-wizard .frw-step-body { min-width: 0; }
    chump-first-run-wizard .frw-step-title {
      font-size: 13px; color: var(--text-primary, var(--text));
      line-height: 1.4;
    }
    chump-first-run-wizard .frw-step-label {
      color: var(--accent); font-family: "SF Mono", ui-monospace, monospace;
      font-size: 12px;
    }
    chump-first-run-wizard .frw-step-hint {
      font-size: 11px; color: var(--text-secondary);
      margin-top: 4px; line-height: 1.4;
    }
    chump-first-run-wizard .frw-step-actions {
      display: flex; gap: 6px; align-items: center;
    }
    chump-first-run-wizard .frw-cta {
      background: var(--accent); color: #fff;
      padding: 5px 12px; border-radius: var(--radius-sm);
      border: none; cursor: pointer; font-size: 12px; font-weight: 500;
      text-decoration: none;
      transition: filter 0.12s;
    }
    chump-first-run-wizard .frw-cta:hover { filter: brightness(1.15); }
    chump-first-run-wizard .frw-skip {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 4px 10px; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 11px;
    }
    chump-first-run-wizard .frw-skip:hover { color: var(--text); border-color: var(--text-secondary); }
    /* Mobile (≤640px): condense layout */
    @media (max-width: 640px) {
      chump-first-run-wizard .frw-shell { padding: 12px 14px; }
      chump-first-run-wizard .frw-step {
        grid-template-columns: 28px 1fr;
        grid-template-rows: auto auto;
      }
      chump-first-run-wizard .frw-step-actions {
        grid-column: 1 / -1;
        justify-content: flex-end;
      }
      chump-first-run-wizard .frw-cta, chump-first-run-wizard .frw-skip { min-height: 36px; }
    /* PRODUCT-107: <chump-status-footer> persistent operator HUD.
       Always visible across every cadence (NOW/AMBIENT/LIBRARY/CONFIG).
       6 slots: model / cost / air-gap / pillars / fleet / GH budget.
       Desktop: one row. Mobile: wraps to 2 rows. */
    chump-status-footer { display: block; }
    chump-status-footer .sf-shell {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      padding-bottom: calc(6px + var(--safe-bottom));
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      position: relative;
      z-index: 8;
      flex-shrink: 0;
    }
    chump-status-footer .sf-slot {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      padding: 4px 8px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      min-height: 28px;
      transition: background 0.12s, color 0.12s;
    }
    chump-status-footer .sf-slot:hover {
      background: var(--bg-elevated);
      color: var(--text-primary, var(--text));
    }
    chump-status-footer .sf-slot:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    chump-status-footer .sf-dot {
      font-size: 14px; line-height: 1;
    }
    chump-status-footer .sf-label {
      font-size: 9px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    chump-status-footer .sf-value {
      color: var(--text-primary, var(--text));
      font-weight: 500;
    }
    chump-status-footer .sf-value.sf-stale {
      opacity: 0.5;
    }
    chump-status-footer .sf-value.sf-warn {
      color: var(--warn, #ff9f0a);
    }
    chump-status-footer .sf-value.sf-red {
      color: var(--error, #ff453a);
      font-weight: 600;
    }
    chump-status-footer .sf-pillars { padding: 4px 10px; }
    chump-status-footer .sf-pillar-grades {
      font-family: "SF Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.02em;
      color: var(--text-primary, var(--text));
    }
    /* Mobile (≤640px): wrap to 2 rows, tap targets ≥36px */
    @media (max-width: 640px) {
      chump-status-footer .sf-shell {
        flex-wrap: wrap;
        justify-content: space-around;
        gap: 4px;
        padding: 6px 8px;
      }
      chump-status-footer .sf-slot {
        flex: 1 1 auto;
        min-width: 90px;
        min-height: 36px;
        justify-content: center;
      }
      chump-status-footer .sf-pillars { flex-basis: 100%; }
    }

    /* PRODUCT-113: cost ceiling inputs in CONFIG + kill-switch modal.
       Defends archetype 4 (enterprise auditor) "what if the AI runs $1000
       overnight" concern. See docs/design/OPERATOR_CONSOLE_V2.md. */
    .cost-threshold {
      display: flex; flex-direction: column; gap: 4px;
    }
    .cost-threshold-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text-secondary);
    }
    .cost-threshold input[type="number"] {
      padding: 6px 8px; background: var(--bg-elevated);
      border: 1px solid var(--border); color: var(--text-primary, var(--text));
      border-radius: var(--radius-sm); font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
    .cost-threshold input[type="number"]:focus {
      outline: 2px solid var(--accent); outline-offset: 1px;
    }

    /* Kill-switch modal — alertdialog overlay when /api/* returns 402. */
    .cost-kill-modal {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .cost-kill-modal-shell {
      background: var(--bg-surface); color: var(--text-primary, var(--text));
      border: 2px solid var(--error, #ff453a);
      border-radius: var(--radius);
      padding: 20px 24px;
      max-width: 480px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    .cost-kill-title {
      font-size: 18px; font-weight: 700;
      color: var(--error, #ff453a);
      margin-bottom: 12px;
    }
    .cost-kill-msg { font-size: 13px; line-height: 1.5; margin-bottom: 12px; }
    .cost-kill-msg strong { color: var(--error, #ff453a); }
    .cost-kill-actions {
      display: flex; gap: 8px; margin-bottom: 8px;
    }
    .cost-kill-config {
      background: var(--accent); color: #fff;
      padding: 6px 14px; border: none; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 12px; font-weight: 500;
    }
    .cost-kill-config:hover { filter: brightness(1.15); }
    .cost-kill-dismiss {
      background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 6px 14px; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 12px;
    }
    .cost-kill-dismiss:hover { color: var(--text); border-color: var(--text-secondary); }
    .cost-kill-hint { font-size: 11px; color: var(--text-secondary); }
    .cost-kill-hint code { font-family: "SF Mono", ui-monospace, monospace; }

    /* PRODUCT-109: <chump-tool-approval-tray> persistent banner above main
       content when approvals are pending. Hidden by default; visible + sticky
       when shell is unhidden. See docs/design/OPERATOR_CONSOLE_V2.md
       (archetype 3) for rationale. */
    chump-tool-approval-tray { display: block; }
    chump-tool-approval-tray .tat-shell[hidden] { display: none; }
    chump-tool-approval-tray .tat-shell {
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      border-left: 3px solid var(--warn, #ff9f0a);
      padding: 10px 14px;
      max-height: 40vh;
      overflow-y: auto;
      position: relative;
      z-index: 9;
    }
    chump-tool-approval-tray .tat-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    chump-tool-approval-tray .tat-count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 22px; height: 22px; padding: 0 8px;
      background: var(--warn, #ff9f0a); color: #000;
      border-radius: 11px;
      font-size: 11px; font-weight: 700;
    }
    chump-tool-approval-tray .tat-title { flex: 1; text-transform: uppercase; letter-spacing: 0.04em; }
    chump-tool-approval-tray .tat-batch { display: flex; gap: 6px; }
    chump-tool-approval-tray .tat-batch-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 4px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 11px;
    }
    chump-tool-approval-tray .tat-batch-btn:hover { color: var(--text); border-color: var(--text-secondary); }
    chump-tool-approval-tray .tat-list {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 6px;
    }
    chump-tool-approval-tray .tat-row {
      background: var(--bg-surface, var(--bg));
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      display: flex; flex-direction: column; gap: 4px;
      transition: opacity 0.15s, background 0.15s;
    }
    chump-tool-approval-tray .tat-row:focus {
      outline: 2px solid var(--accent); outline-offset: 1px;
    }
    chump-tool-approval-tray .tat-row-main {
      display: flex; align-items: baseline; gap: 8px;
      font-variant-numeric: tabular-nums;
    }
    chump-tool-approval-tray .tat-tool { font-weight: 600; color: var(--text-primary, var(--text)); }
    chump-tool-approval-tray .tat-risk {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em;
      padding: 1px 6px; border-radius: 3px;
    }
    chump-tool-approval-tray .tat-risk-low    { background: rgba(48,209,88,0.18); color: var(--success); }
    chump-tool-approval-tray .tat-risk-medium { background: rgba(255,159,10,0.18); color: var(--warn); }
    chump-tool-approval-tray .tat-risk-high   { background: rgba(255,69,58,0.22); color: var(--error); }
    chump-tool-approval-tray .tat-risk-unknown { background: var(--bg-elevated); color: var(--text-secondary); }
    chump-tool-approval-tray .tat-countdown {
      margin-left: auto; font-size: 11px; color: var(--text-secondary);
    }
    chump-tool-approval-tray .tat-reason {
      font-size: 12px; color: var(--text-secondary); line-height: 1.4;
    }
    chump-tool-approval-tray .tat-args {
      font-size: 11px; color: var(--text-secondary);
      overflow-x: auto; white-space: nowrap;
    }
    chump-tool-approval-tray .tat-args code {
      font-family: "SF Mono", ui-monospace, monospace;
    }
    chump-tool-approval-tray .tat-actions { display: flex; gap: 6px; }
    chump-tool-approval-tray .tat-btn {
      padding: 5px 12px; border-radius: var(--radius-sm);
      border: 1px solid transparent; cursor: pointer; font-size: 12px; font-weight: 500;
    }
    chump-tool-approval-tray .tat-approve {
      background: var(--success, #30d158); color: #000;
    }
    chump-tool-approval-tray .tat-approve:hover { filter: brightness(1.1); }
    chump-tool-approval-tray .tat-deny {
      background: transparent; border-color: var(--border); color: var(--text-secondary);
    }
    chump-tool-approval-tray .tat-deny:hover { color: var(--error); border-color: var(--error); }
    chump-tool-approval-tray .tat-row-pending { opacity: 0.5; pointer-events: none; }
    chump-tool-approval-tray .tat-row-expired {
      opacity: 0.45;
      border-color: var(--text-secondary);
      background: var(--bg-elevated);
    }
    chump-tool-approval-tray .tat-row-error {
      border-color: var(--error);
    }
    chump-tool-approval-tray .tat-error-banner {
      font-size: 11px; color: var(--error);
      padding: 4px 0;
    }
    /* Mobile: stack tat-row-main fields */
    @media (max-width: 640px) {
      chump-tool-approval-tray .tat-shell { max-height: 50vh; }
      chump-tool-approval-tray .tat-row-main {
        flex-direction: column; align-items: flex-start; gap: 2px;
      }
      chump-tool-approval-tray .tat-countdown { margin-left: 0; }
      chump-tool-approval-tray .tat-actions { flex-direction: row; }
      chump-tool-approval-tray .tat-btn { flex: 1; min-height: 36px; }
    }

    /* INFRA-1012: <chump-cost-meter> sits between model picker and heartbeat
       in the header. 4 row figures + optional budget warning banner. */
    chump-cost-meter .cost-meter {
      display: inline-grid;
      grid-template-columns: repeat(4, minmax(0, auto));
      gap: 0 12px;
      align-items: baseline;
      padding-bottom: 9px;
      font-size: 11px;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }
    chump-cost-meter .cost-meter.loading { opacity: 0.5; }
    chump-cost-meter .cost-meter.warn .cost-meter-value { color: var(--accent-warn, #cc8800); }
    chump-cost-meter .cost-meter.red .cost-meter-value { color: var(--accent-error, #cc3344); }
    chump-cost-meter .cost-meter-row { display: flex; gap: 4px; align-items: baseline; }
    chump-cost-meter .cost-meter-label {
      color: var(--text-tertiary, var(--text-secondary));
      text-transform: uppercase;
      font-size: 9px;
      letter-spacing: 0.04em;
    }
    chump-cost-meter .cost-meter-value { color: var(--text-primary); font-weight: 500; }
    chump-cost-meter .cost-meter-warn {
      grid-column: 1 / -1;
      font-size: 10px;
      color: var(--accent-warn, #cc8800);
      padding-top: 2px;
    }

    /* INFRA-1011: <chump-pr-card pr-number="N"> — embeddable PR detail tile.
       Renders state badge + per-check rows. Auto-mounts where a host UI puts
       it (sidebar, agents view, workflow timeline); no layout opinions here. */
    chump-pr-card {
      display: block;
      font-size: 12px;
      color: var(--text-primary);
    }
    chump-pr-card .pr-card {
      border: 1px solid var(--border, #2a2a2e);
      border-radius: var(--radius-sm, 6px);
      padding: 8px 12px;
      background: var(--surface, transparent);
      max-width: 480px;
    }
    chump-pr-card .pr-card.loading,
    chump-pr-card .pr-card.error { opacity: 0.6; }
    chump-pr-card .pr-card-header {
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px; margin-bottom: 6px;
    }
    chump-pr-card .pr-card-title {
      color: inherit; text-decoration: none; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    chump-pr-card .pr-card-title:hover { text-decoration: underline; }
    chump-pr-card .pr-card-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 10px;
      white-space: nowrap;
    }
    chump-pr-card .pr-card-badge-ok      { background: rgba(60,180,90,0.18);  color: #4ec170; }
    chump-pr-card .pr-card-badge-warn    { background: rgba(204,136,0,0.18);  color: #d99a23; }
    chump-pr-card .pr-card-badge-fail    { background: rgba(204,51,68,0.18);  color: #d65468; }
    chump-pr-card .pr-card-badge-pending { background: rgba(120,140,180,0.18); color: #aab5cc; }
    chump-pr-card .pr-card-checks {
      list-style: none; padding: 0; margin: 0;
      max-height: 220px; overflow-y: auto;
    }
    chump-pr-card .pr-check {
      display: flex; gap: 6px; align-items: center;
      font-size: 11px; padding: 1px 0;
    }
    chump-pr-card .pr-check-icon { width: 14px; text-align: center; font-weight: 600; }
    chump-pr-card .pr-check-ok      .pr-check-icon { color: #4ec170; }
    chump-pr-card .pr-check-fail    .pr-check-icon { color: #d65468; }
    chump-pr-card .pr-check-pending .pr-check-icon { color: #aab5cc; }
    chump-pr-card .pr-check-skip    .pr-check-icon { color: var(--text-tertiary, #777); }
    chump-pr-card .pr-check a { color: inherit; text-decoration: none; }
    chump-pr-card .pr-check a:hover { text-decoration: underline; }
    chump-pr-card .pr-check-empty {
      font-style: italic; color: var(--text-tertiary, #777);
      font-size: 11px; padding-top: 4px;
    }
    chump-pr-card .pr-card-sha {
      margin-top: 6px; font-size: 10px;
      color: var(--text-tertiary, var(--text-secondary));
      font-family: ui-monospace, SFMono-Regular, monospace;
    }

    /* INFRA-1009: <chump-workflow-timeline gap-id="X"> live phase tracker.
       Embeddable — no layout opinion; host UI places it where it makes
       sense (workflow_done event embedder, agents view session row,
       sidebar). Four phase rows + optional done banner. */
    chump-workflow-timeline { display: block; font-size: 12px; }
    chump-workflow-timeline .wf-timeline {
      border: 1px solid var(--border, #2a2a2e);
      border-radius: var(--radius-sm, 6px);
      padding: 8px 12px;
      background: var(--surface, transparent);
      max-width: 520px;
    }
    chump-workflow-timeline .wf-header {
      font-size: 11px;
      color: var(--text-tertiary, var(--text-secondary));
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border, #2a2a2e);
      margin-bottom: 6px;
    }
    chump-workflow-timeline .wf-phases { list-style: none; padding: 0; margin: 0; }
    chump-workflow-timeline .wf-phase {
      display: grid;
      grid-template-columns: 18px 80px 70px 1fr;
      gap: 8px;
      align-items: baseline;
      padding: 3px 0;
      font-variant-numeric: tabular-nums;
    }
    chump-workflow-timeline .wf-phase-icon { text-align: center; font-weight: 600; }
    chump-workflow-timeline .wf-phase-name { font-weight: 500; }
    chump-workflow-timeline .wf-phase-dur {
      color: var(--text-tertiary, var(--text-secondary));
      font-size: 11px;
    }
    chump-workflow-timeline .wf-msg {
      color: var(--text-secondary);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    chump-workflow-timeline .wf-phase-ok      .wf-phase-icon { color: #4ec170; }
    chump-workflow-timeline .wf-phase-fail    .wf-phase-icon { color: #d65468; }
    chump-workflow-timeline .wf-phase-pending .wf-phase-icon { color: #aab5cc; }
    chump-workflow-timeline .wf-phase-idle    .wf-phase-icon { color: var(--text-tertiary, #777); }
    chump-workflow-timeline .wf-done {
      margin-top: 8px; padding-top: 6px;
      border-top: 1px solid var(--border, #2a2a2e);
      font-size: 11px; color: #4ec170;
    }
    chump-workflow-timeline .wf-timeline.error { color: var(--accent-error, #d65468); }
    /* INFRA-1013: retry/log controls on failed phase cards */
    chump-workflow-timeline .wf-fail-actions {
      display: flex; gap: 6px; align-items: center; margin-top: 4px;
    }
    chump-workflow-timeline .wf-retry {
      font-size: 10px; padding: 2px 8px; border-radius: 3px; cursor: pointer;
      background: #d65468; color: #fff; border: none;
    }
    chump-workflow-timeline .wf-retry:disabled {
      background: #555; color: #999; cursor: not-allowed;
    }
    chump-workflow-timeline .wf-log-link {
      font-size: 10px; color: var(--text-secondary, #aab5cc);
    }
    chump-workflow-timeline .wf-stdout {
      margin-top: 4px; font-size: 10px;
    }
    chump-workflow-timeline .wf-stdout pre {
      background: var(--bg-tertiary, #1a1a1e); padding: 4px 6px; border-radius: 3px;
      white-space: pre-wrap; word-break: break-all; max-height: 80px; overflow: auto;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    #app-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar nav (PRODUCT-106 cadence rework) ──────────────────────── */
    /* Side rail = 4 cadence buttons (NOW / AMBIENT / LIBRARY / CONFIG).
       Sub-tab strip lives below or to the right of the cadence rail
       depending on viewport. See docs/design/OPERATOR_CONSOLE_V2.md §canvas. */
    chump-nav {
      width: var(--nav-width);
      padding-left: var(--safe-left);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding-top: 8px;
      gap: 4px;
      flex-shrink: 0;
      overflow-y: auto;
    }
    chump-nav .nav-cadences {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 8px;
    }
    chump-nav .nav-cadence {
      width: 48px;
      height: 48px;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transition: background 0.15s, color 0.15s, border-left-color 0.15s;
      touch-action: manipulation;
      border-left: 3px solid transparent;
      font-weight: 600;
    }
    chump-nav .nav-cadence:hover {
      background: var(--bg-elevated);
      color: var(--text);
    }
    chump-nav .nav-cadence[aria-current="page"] {
      background: var(--accent-dim);
      color: var(--accent);
      border-left-color: var(--accent);
    }
    /* Sub-tab strip — sits directly below the cadence buttons. */
    chump-nav .nav-subtabs {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    chump-nav .nav-subtabs:empty { display: none; }
    chump-nav .nav-item {
      width: 48px;
      height: 40px;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      transition: background 0.15s, color 0.15s;
      touch-action: manipulation;
      opacity: 0.85;
    }
    chump-nav .nav-item:hover {
      background: var(--bg-elevated);
      color: var(--text);
      opacity: 1;
    }
    chump-nav .nav-item[aria-current="page"] {
      background: var(--bg-elevated);
      color: var(--accent);
      opacity: 1;
    }
    chump-nav .nav-icon { font-size: 16px; line-height: 1; position: relative; }
    chump-nav .nav-cadence .nav-icon { font-size: 20px; }
    chump-nav .nav-label { font-size: 9px; letter-spacing: 0.3px; text-transform: uppercase; }

    /* Mobile: ≤640px → cadences become a horizontal top strip + sub-tabs below it. */
    @media (max-width: 640px) {
      chump-nav {
        width: 100%;
        height: auto;
        flex-direction: column;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 4px 0;
      }
      chump-nav .nav-cadences {
        flex-direction: row;
        justify-content: space-around;
        padding: 0 4px;
      }
      chump-nav .nav-cadence { flex: 1; max-width: 80px; height: 44px; border-left: none; border-bottom: 3px solid transparent; }
      chump-nav .nav-cadence[aria-current="page"] { border-left-color: transparent; border-bottom-color: var(--accent); }
      chump-nav .nav-subtabs {
        flex-direction: row;
        justify-content: space-around;
        border-top: 1px solid var(--border);
        margin-top: 4px;
        padding: 4px;
      }
      chump-nav .nav-item { flex: 1; max-width: 80px; height: 36px; }
    }

    /* PRODUCT-094: notification badge on the nav bell icon */
    .notif-badge {
      position: absolute; top: -5px; right: -8px;
      background: #ff3b30; color: #fff;
      font-size: 9px; font-weight: 700; line-height: 1;
      padding: 2px 4px; border-radius: 8px;
      min-width: 14px; text-align: center;
      pointer-events: none;
    }
    /* ── PRODUCT-100: status pill + toast + offline banner ─────────────── */
    .chump-status-pill {
      position: fixed; top: 8px; right: 12px; z-index: 9000;
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: rgba(30,30,30,0.85); backdrop-filter: blur(4px);
      color: #ccc; pointer-events: none; user-select: none;
      transition: color 0.3s;
    }
    .pill-live    { color: #6bcb77; }
    .pill-stale   { color: #ffd93d; }
    .pill-offline { color: #ff6b6b; }
    .pill-paused  { color: #aaa; }
    .pill-init    { display: none; }

    #chump-toast-container {
      position: fixed; bottom: 24px; right: 16px; z-index: 9100;
      display: flex; flex-direction: column; gap: 8px; max-width: 360px;
    }
    .chump-error-toast {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 8px;
      background: #2a1a1a; border: 1px solid #5a2020;
      color: #f0b0b0; font-size: 13px;
      animation: toast-in 0.2s ease;
    }
    @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .toast-msg code { font-size: 11px; color: #f08080; }
    .toast-retry, .toast-dismiss {
      background: none; border: 1px solid #5a2020; border-radius: 4px;
      color: #f0b0b0; cursor: pointer; padding: 2px 8px; font-size: 12px;
      flex-shrink: 0;
    }
    .toast-retry:hover  { background: rgba(255,100,100,0.1); }
    .toast-dismiss      { border: none; font-size: 16px; padding: 0 4px; }

    #chump-offline-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9200;
      background: #3a0000; color: #ffaaaa; text-align: center;
      padding: 8px 16px; font-size: 13px; display: flex;
      align-items: center; justify-content: center; gap: 12px;
    }
    #chump-offline-retry {
      background: #5a0000; border: 1px solid #ff6b6b; border-radius: 4px;
      color: #ffaaaa; cursor: pointer; padding: 2px 10px; font-size: 12px;
    }
    #chump-offline-retry:hover { background: #7a0000; }

    /* ── Main content ───────────────────────────────────────────────────── */
    #main-content {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── View: shared ───────────────────────────────────────────────────── */
    .view-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
    .view-subtitle { color: var(--text-secondary); font-size: 13px; }
    .placeholder {
      color: var(--text-secondary);
      font-size: 13px;
      padding: 32px 24px;
      text-align: center;
    }

    /* ── View: tasks ────────────────────────────────────────────────────── */
    .task-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .task-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .task-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .task-status {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg-elevated);
      color: var(--text-secondary);
    }
    .task-status.running { background: rgba(48,209,88,0.15); color: var(--success); }
    .task-status.done    { background: rgba(10,132,255,0.12); color: var(--accent); }
    .task-status.error   { background: rgba(255,69,58,0.12); color: var(--error); }
    .task-id { font-size: 11px; color: var(--text-secondary); font-family: "SF Mono", monospace; }
    .task-desc { font-size: 13px; color: var(--text); line-height: 1.45; }

    /* ── View: memory ───────────────────────────────────────────────────── */
    .memory-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .memory-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
    }
    .memory-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

    /* ── View: agent/gap-queue ──────────────────────────────────────────── */
    .gap-search-bar {
      display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 16px;
      border-bottom: 1px solid var(--border); align-items: center;
    }
    .gap-search-bar input[type=search] {
      flex: 1 1 160px; min-width: 120px; padding: 6px 10px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--bg-input,var(--bg-surface));
      color: var(--text); font-size: 13px;
    }
    .gap-search-bar select {
      padding: 5px 8px; border-radius: var(--radius); border: 1px solid var(--border);
      background: var(--bg-surface); color: var(--text); font-size: 12px; cursor: pointer;
    }
    .gap-filter-ac { font-size: 12px; display: flex; align-items: center; gap: 4px; cursor: pointer; color: var(--text-secondary); }
    .gap-queue-stats {
      display: flex;
      gap: 16px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .gap-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
    .gap-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .gap-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .gap-id {
      font-size: 12px;
      font-weight: 600;
      font-family: "SF Mono", monospace;
      color: var(--text);
    }
    .gap-badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg-elevated);
      color: var(--text-secondary);
    }
    .badge-success { background: rgba(48,209,88,0.15); color: var(--success); }
    .badge-warn   { background: rgba(255,159,10,0.15); color: var(--warn); }
    .badge-error  { background: rgba(255,69,58,0.15); color: var(--error); }
    .gap-priority {
      font-size: 11px;
      color: var(--text-secondary);
      margin-left: auto;
      font-family: "SF Mono", monospace;
    }

    /* INFRA-1196: queue-row pillar / domain / AC / deps badges + per-row embed slots. */
    .gap-pillar {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .gap-pillar-effective   { background: rgba(10,132,255,0.18);  color: #4aa3ff; }
    .gap-pillar-credible    { background: rgba(204,136,0,0.18);   color: #e0aa30; }
    .gap-pillar-resilient   { background: rgba(176,86,255,0.18);  color: #c08fff; }
    .gap-pillar-zero-waste  { background: rgba(48,209,88,0.15);   color: var(--success); }
    .gap-pillar-mission     { background: rgba(255,69,58,0.15);   color: var(--error); }
    .gap-domain {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg-elevated);
      color: var(--text-secondary);
      font-family: "SF Mono", monospace;
    }
    .gap-ac, .gap-deps {
      font-size: 10px;
      color: var(--text-secondary);
      padding: 2px 4px;
    }
    .gap-deps { color: #d99a23; }
    .gap-lease {
      font-size: 11px;
      color: var(--text-secondary);
      font-style: italic;
      margin-top: 2px;
    }
    .gap-embed {
      margin-top: 8px;
      min-height: 0;
    }
    .gap-embed:empty { display: none; }

    /* PRODUCT-110: ACP deeplink row on every gap card.
       Competitive-differentiation surface vs Claude Code (CC structurally
       can't ship this). chump://acp/open?gap=X opens in the registered
       editor; Copy button always works for sharing. */
    .gap-acp-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 6px;
      font-size: 11px;
    }
    .gap-acp-link {
      color: var(--accent);
      text-decoration: none;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .gap-acp-link:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .gap-acp-copy {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 3px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 11px;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }
    .gap-acp-copy:hover { color: var(--text); border-color: var(--text-secondary); }
    .gap-acp-copy-success {
      background: rgba(48,209,88,0.18);
      color: var(--success);
      border-color: var(--success);
    }
    .gap-title {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .gap-error {
      font-size: 12px;
      color: var(--warn);
      background: rgba(255,159,10,0.1);
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
    }
    .gap-claim-btn {
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--accent);
      color: var(--bg);
      cursor: pointer;
    }
    .gap-claim-btn:hover { opacity: 0.9; }
    .gap-claim-btn:active { opacity: 0.8; }

    /* ── View: agents (PRODUCT-059) ────────────────────────────────────── */
    .agents-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .agent-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .agent-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .agent-gap-id {
      font-size: 13px;
      font-weight: 700;
      font-family: "SF Mono", monospace;
      color: var(--text);
    }
    .agent-ci-badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg-elevated);
      color: var(--text-secondary);
    }
    .ci-success { background: rgba(48,209,88,0.15); color: var(--success); }
    .ci-failure { background: rgba(255,69,58,0.15); color: var(--error); }
    .ci-pending { background: rgba(255,159,10,0.15); color: var(--warn); }
    .agent-pr-link {
      font-size: 11px;
      font-family: "SF Mono", monospace;
      color: var(--accent);
      text-decoration: none;
      margin-left: auto;
    }
    .agent-pr-link:hover { text-decoration: underline; }
    .agent-gap-title {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .agent-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 11px;
      color: var(--text-secondary);
      font-family: "SF Mono", monospace;
    }
    .agent-worktree {
      font-size: 11px;
      color: var(--text-secondary);
      font-family: "SF Mono", monospace;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .agents-refresh-note {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      padding: 8px 0 4px;
    }

    /* ── Cascade slot toggles (PRODUCT-054) ────────────────────────────── */
    .cascade-slot-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 4px;
      transition: opacity 0.15s;
    }
    .cascade-slot-disabled { opacity: 0.45; }
    .cascade-slot-info { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; min-width: 0; }
    .cascade-slot-name {
      font-size: 12px;
      font-family: "SF Mono", monospace;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }
    .cascade-slot-stats { font-size: 10px; color: var(--text-secondary); }
    .cascade-badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 2px 5px;
      border-radius: 3px;
    }
    .cascade-badge-err  { background: rgba(255,69,58,0.15); color: var(--error-color,#ff453a); }
    .cascade-badge-warn { background: rgba(255,159,10,0.15); color: var(--warn-color,#ff9f0a); }
    .cascade-empty { font-size: 12px; color: var(--text-secondary); margin: 0; }
    /* Toggle switch */
    .cascade-toggle { position: relative; display: inline-flex; align-items: center; cursor: pointer; flex-shrink: 0; }
    .cascade-toggle-input { opacity: 0; width: 0; height: 0; position: absolute; }
    .cascade-toggle-track {
      width: 34px;
      height: 18px;
      background: var(--border);
      border-radius: 9px;
      transition: background 0.2s;
      position: relative;
    }
    .cascade-toggle-track::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s;
    }
    .cascade-toggle-input:checked + .cascade-toggle-track { background: var(--accent,#0a84ff); }
    .cascade-toggle-input:checked + .cascade-toggle-track::after { transform: translateX(16px); }
    .cascade-toggle-input:disabled + .cascade-toggle-track { opacity: 0.4; cursor: not-allowed; }

    /* ── View: settings ─────────────────────────────────────────────────── */
    .settings-grid { padding: 16px; display: flex; flex-direction: column; gap: 1px; }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      font-size: 13px;
    }
    .setting-row:first-child { border-radius: var(--radius) var(--radius) 0 0; }
    .setting-row:last-child  { border-radius: 0 0 var(--radius) var(--radius); }
    .setting-label { color: var(--text); }
    .setting-value { color: var(--text-secondary); font-family: "SF Mono", monospace; font-size: 11px; }

    /* ── Model chip ─────────────────────────────────────────────────────── */
    .model-chip {
      font-size: 11px;
      font-family: "SF Mono", monospace;
      padding: 3px 8px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      white-space: nowrap;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: inline-block;
    }

    /* ── Heartbeat ──────────────────────────────────────────────────────── */
    .hb-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .hb-dot.online  { background: var(--success); }
    .hb-dot.offline { background: var(--error); }
    .hb-text { vertical-align: middle; }

    /* ── Mobile: bottom nav ─────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #app-header { padding-left: 16px; }
      chump-nav {
        width: 100%;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding-bottom: var(--safe-bottom);
        padding-top: 4px;
        padding-left: 0;
        height: calc(56px + var(--safe-bottom));
        flex-direction: row;
        justify-content: space-around;
        align-items: flex-start;
        border-right: none;
        border-top: 1px solid var(--border);
        background: var(--bg);
        z-index: 20;
      }
      #main-content { padding-bottom: calc(56px + var(--safe-bottom)); }
      chump-nav .nav-item { width: 60px; height: 48px; }
      chump-nav .nav-label { display: none; }
    }

    /* ── Offline banner ─────────────────────────────────────────────────── */
    #offline-banner {
      display: none;
      background: var(--warn);
      color: #000;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      padding: 5px;
    }
    body.offline #offline-banner { display: block; }

    /* ── Doctor banner (INFRA-990) ───────────────────────────────────────── */
    chump-doctor-banner {
      display: none;
      background: #2a1a1a;
      color: #f8d7da;
      border-bottom: 2px solid #d9534f;
      font-size: 13px;
      padding: 10px 16px;
    }
    chump-doctor-banner .doctor-banner-head { font-size: 14px; margin-bottom: 6px; }
    chump-doctor-banner .doctor-banner-list { margin: 4px 0 8px 18px; padding: 0; }
    chump-doctor-banner .doctor-banner-list li { margin: 2px 0; line-height: 1.4; }
    chump-doctor-banner .fix-hint { color: #ffd6a5; font-style: italic; }
    chump-doctor-banner .doctor-banner-actions { margin-top: 4px; }
    chump-doctor-banner .doctor-configure {
      background: #d9534f;
      color: #fff;
      border: 0;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    chump-doctor-banner .doctor-configure:hover { background: #c9302c; }
    chump-doctor-banner .doctor-configure:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }
    chump-doctor-banner .doctor-banner-toast {
      background: #1f3a1f;
      color: #c8f7c5;
      border-bottom-color: #5cb85c;
      text-align: center;
      font-weight: 600;
    }

    /* ── Auth-fallback toast (INFRA-991) ─────────────────────────────────── */
    chump-auth-toast {
      display: none;
      position: fixed;
      top: 16px;
      right: 16px;
      max-width: 360px;
      background: #2a1a0e;
      color: #ffd6a5;
      border: 1px solid #d97706;
      border-radius: 6px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
      padding: 12px 14px;
      font-size: 13px;
      z-index: 9999;
    }
    chump-auth-toast .auth-toast-head { font-size: 14px; margin-bottom: 6px; }
    chump-auth-toast .auth-toast-counter {
      font-size: 11px;
      font-weight: normal;
      margin-left: 8px;
      opacity: 0.8;
    }
    chump-auth-toast .auth-toast-body { margin: 4px 0 10px 0; line-height: 1.4; }
    chump-auth-toast .auth-toast-actions { display: flex; gap: 8px; }
    chump-auth-toast .auth-toast-reenter {
      background: #d97706;
      color: #fff;
    /* ── Repo switcher (INFRA-992) ────────────────────────────────────────── */
    chump-repo-switcher {
      display: none; /* shown only when multi_repo_enabled=true */
      align-items: center;
      gap: 6px;
      position: relative;
    }
    chump-repo-switcher .repo-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      font-size: 12px;
      color: #c8d4e0;
      max-width: 220px;
    }
    chump-repo-switcher .repo-chip-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    chump-repo-switcher .repo-switch-btn {
      background: #2a3a4a;
      color: #fff;
      border: 1px solid #3a5a7a;
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 11px;
      cursor: pointer;
    }
    chump-repo-switcher .repo-switch-btn:hover { background: #3a4a5a; }
    chump-repo-switcher .repo-switch-btn:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }
    chump-repo-switcher .repo-dialog {
      position: absolute;
      top: 34px;
      right: 0;
      width: 360px;
      background: #181818;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
      z-index: 1000;
      font-size: 12px;
      color: #e0e0e0;
    }
    chump-repo-switcher .repo-dialog-head { font-size: 13px; margin-bottom: 8px; }
    chump-repo-switcher .repo-dialog-label {
      display: block;
      margin: 4px 0 8px 0;
    }
    chump-repo-switcher .repo-dialog-path {
      width: 100%;
      margin-top: 4px;
      padding: 6px 8px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #fff;
      font-family: monospace;
    }
    chump-repo-switcher .repo-dialog-warn {
      background: #2a2410;
      color: #ffd6a5;
      border-left: 3px solid #d97706;
      padding: 6px 8px;
      margin: 8px 0;
      font-size: 11px;
      line-height: 1.4;
    }
    chump-repo-switcher .repo-dialog-error {
      background: #2a1414;
      color: #f8d7da;
      border-left: 3px solid #d9534f;
      padding: 6px 8px;
      margin: 8px 0;
      font-size: 11px;
      line-height: 1.4;
    }
    chump-repo-switcher .repo-dialog-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    chump-repo-switcher .repo-dialog-save,
    chump-repo-switcher .repo-dialog-cancel {
      border: 0;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    chump-auth-toast .auth-toast-reenter:hover { background: #b45309; }
    chump-auth-toast .auth-toast-dismiss {
      background: transparent;
      color: #ffd6a5;
      border: 1px solid #ffd6a5;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    chump-auth-toast .auth-toast-dismiss:hover { background: rgba(255, 255, 255, 0.06); }
    chump-auth-toast .auth-toast-reenter:focus-visible,
    chump-auth-toast .auth-toast-dismiss:focus-visible {
      cursor: pointer;
    }
    chump-repo-switcher .repo-dialog-save { background: #2a7a4a; color: #fff; }
    chump-repo-switcher .repo-dialog-save:hover { background: #1f5a35; }
    chump-repo-switcher .repo-dialog-save:disabled { background: #555; cursor: not-allowed; }
    chump-repo-switcher .repo-dialog-cancel {
      background: transparent;
      border: 1px solid #555;
      color: #ccc;
    }
    chump-repo-switcher .repo-dialog-cancel:hover { background: #222; }
    chump-repo-switcher .repo-dialog-save:focus-visible,
    chump-repo-switcher .repo-dialog-cancel:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }

    /* ── Ambient viewer (INFRA-1198) ──────────────────────────────────────── */
    chump-ambient-viewer {
      display: block;
      font-size: 12px;
      color: var(--text);
      position: relative;
    }
    chump-ambient-viewer .amb-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      padding: 6px 8px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    chump-ambient-viewer .amb-filter-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
    }
    chump-ambient-viewer .amb-filter {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 12px;
      font-family: monospace;
      min-width: 200px;
    }
    chump-ambient-viewer .amb-state { margin-left: auto; font-size: 14px; line-height: 1; }
    chump-ambient-viewer .amb-state-live         { color: #30d158; }
    chump-ambient-viewer .amb-state-reconnecting { color: #ff9f0a; }
    chump-ambient-viewer .amb-state-error        { color: #ff453a; }
    chump-ambient-viewer .amb-state-connecting   { color: #8a8a8e; }

    chump-ambient-viewer .amb-pill {
      position: absolute;
      top: 60px;
      right: 16px;
      background: var(--accent);
      color: #fff;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      z-index: 5;
    }
    chump-ambient-viewer .amb-pill:hover { background: #1296ff; }

    chump-ambient-viewer .amb-list {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: calc(100vh - 220px);
      overflow-y: auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
    chump-ambient-viewer .amb-list:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    chump-ambient-viewer .amb-row {
      display: grid;
      grid-template-columns: 70px 200px 1fr;
      gap: 8px;
      align-items: baseline;
      padding: 4px 8px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    chump-ambient-viewer .amb-row:hover { background: var(--bg-surface); }
    chump-ambient-viewer .amb-ts { color: var(--text-secondary); font-size: 11px; }
    chump-ambient-viewer .amb-kind {
      background: rgba(10, 132, 255, 0.15);
      color: #6aa5ff;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    chump-ambient-viewer .amb-summary {
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    chump-ambient-viewer .amb-detail {
      grid-column: 1 / -1;
      margin-top: 4px;
      padding: 6px 8px;
      background: var(--bg-elevated);
      border-radius: 4px;
      color: var(--text-secondary);
      font-size: 11px;
      max-height: 300px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <chump-doctor-banner></chump-doctor-banner>
  <chump-auth-toast></chump-auth-toast>
  <div id="offline-banner">Offline — cached shell active</div>

  <header id="app-header">
    <span id="app-title">Chump</span>
    <chump-repo-switcher></chump-repo-switcher>
    <chump-model-picker></chump-model-picker>
    <chump-cost-meter></chump-cost-meter>
    <chump-pillar-health></chump-pillar-health>
    <chump-autopilot-toggle></chump-autopilot-toggle>
    <chump-heartbeat></chump-heartbeat>
  </header>

  <!-- PRODUCT-083: verb-shaped quick-actions panel — primary CTA above noun nav -->
  <chump-quick-actions></chump-quick-actions>

  <!-- PRODUCT-109: persistent tool-approval tray. Hidden when list is empty;
       sticky-banner above main-content when approvals are pending. -->
  <chump-tool-approval-tray></chump-tool-approval-tray>

  <!-- PRODUCT-108: first-run golden-path wizard. Renders when brain/repo/
       autopilot trio is empty; self-hides + dismissable. -->
  <chump-first-run-wizard></chump-first-run-wizard>

  <div id="app-body">
    <chump-nav></chump-nav>
    <main id="main-content" role="main" aria-label="Main content"></main>
  </div>

  <!-- PRODUCT-107: persistent operator HUD — always visible across every cadence.
       6 slots: model / cost / air-gap / pillar grades / fleet / GH budget. -->
  <chump-status-footer></chump-status-footer>

  <chump-ootb-wizard></chump-ootb-wizard>
  <!-- PRODUCT-082: universal first-run welcome (non-Tauri) -->
  <chump-welcome></chump-welcome>
  <!-- PRODUCT-094: notification center — invisible singleton; manages SSE + badge -->
  <chump-notification-center></chump-notification-center>
  <!-- PRODUCT-100: status pill + error toasts + offline banner -->
  <chump-status-pill></chump-status-pill>

  <!-- INFRA-250: relative paths so the same index works in both contexts:
       (a) browser via axum sidecar at http://host/v2/ (after the / -> /v2/
           redirect from INFRA-254) where /v2/chat.js resolves correctly
           against the page URL, and (b) Tauri webview where frontendDist
           is web/v2 itself, so absolute /v2/* paths would 404. -->
  <!-- PRODUCT-098: prefs.js must load first so window.chumpPrefs is available to other modules -->
  <script src="prefs.js" type="module"></script>
  <script src="chat.js" type="module"></script>
  <script src="app.js" type="module"></script>
  <script src="cost-meter.js" type="module"></script>
  <script src="pr-card.js" type="module"></script>
  <script src="workflow-timeline.js" type="module"></script>
  <script src="ootb-wizard.js" type="module"></script>
  <script src="welcome.js" type="module"></script>
  <script src="inference-profile.js" type="module"></script>
  <script src="ambient-viewer.js" type="module"></script>
  <script src="fleet-sidebar.js" type="module"></script>
  <script src="quick-actions.js" type="module"></script>
  <!-- PRODUCT-105: A2A in-app toast + nav badge for inbox notifications -->
  <script src="inbox-notifications.js" type="module"></script>
  <!-- PRODUCT-103: A2A operator compose form -->
  <script src="fleet-message.js" type="module"></script>
  <!-- PRODUCT-104: A2A operator inbox view -->
  <script src="inbox.js" type="module"></script>
  <script src="pillar-health.js" type="module"></script>
  <script src="notification-center.js" type="module"></script>
  <script src="error-ux.js" type="module"></script>
  <script src="operator-attention.js" type="module"></script>
  <script src="autopilot-toggle.js" type="module"></script>
  <script>
    window.addEventListener('offline', () => document.body.classList.add('offline'));
    window.addEventListener('online',  () => document.body.classList.remove('offline'));
    if (!navigator.onLine) document.body.classList.add('offline');

    // V1->V2 backward-compat aliases for e2e tests.
    // INFRA-1018 fix: chump-view-chat uses light DOM (innerHTML), NOT a shadow
    // root.  The previous code used viewChat.shadowRoot?.querySelector which
    // always returned undefined/null — #msg-input was never aliased, causing
    // all PWA shell e2e tests to time out waiting for the locator.
    function createTestAliases() {
      let aliased = false;

      // #msg-input <- chump-chat's #input.
      // <chump-view-chat> sets this.innerHTML = '<chump-chat …>' → light DOM.
      // <chump-chat> attaches a shadow root → getElementById works there.
      const viewChat = document.querySelector('chump-view-chat');
      if (viewChat) {
        const chumpChat = viewChat.querySelector('chump-chat'); // light DOM, NOT shadowRoot
        if (chumpChat) {
          const input = chumpChat.shadowRoot?.getElementById('input');
          if (input) {
            if (input.id !== 'msg-input') input.id = 'msg-input';
            aliased = true;
          }
        }
      }

      // #sessions-toggle <- nav chat button (light DOM, no shadow root)
      const chatNav = document.querySelector('[data-view="chat"]');
      if (chatNav && !chatNav.id) chatNav.id = 'sessions-toggle';

      // #settings-btn <- nav settings button (light DOM)
      const settingsNav = document.querySelector('[data-view="settings"]');
      if (settingsNav && !settingsNav.id) settingsNav.id = 'settings-btn';

      return aliased;
    }

    // Retry until #msg-input alias is established.  Module scripts are deferred
    // and custom-element upgrades happen asynchronously; a single DOMContentLoaded
    // callback may fire before connectedCallback() populates the shadow root.
    function scheduleTestAliases() {
      if (createTestAliases()) return; // done — alias is live
      setTimeout(scheduleTestAliases, 100); // retry every 100 ms
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', scheduleTestAliases);
    } else {
      scheduleTestAliases();
    }
  </script>
</body>
</html>
