# bootstrap-manifest.yaml — META-066
#
# Canonical list of installers that `chump fleet bootstrap` runs on a fresh
# operator machine. New launchd plists / git hooks MUST add an entry here
# (enforced by pre-commit; see scripts/git-hooks/pre-commit-bootstrap-manifest.sh).
#
# Schema:
#   - id:           short stable identifier (used by --only / --skip flags)
#     why:          one-line operator-facing reason this exists
#     install:      command to run; cwd is repo root
#     check:        command that exits 0 iff already installed (idempotency)
#     priority:     P0 (must-have) | P1 (productization) | P2 (nice-to-have)
#     adds:         (optional) brief description of what gets created
#     depends_on:   (optional) list of other ids that must install first
#
# Run order: priority then declaration order. P0 first.

installers:
  - id: chump-binary
    why: Required by every other tool — the canonical `chump` CLI.
    priority: P0
    install: cargo install --path . --bin chump
    check: command -v chump >/dev/null 2>&1
    adds: ~/.cargo/bin/chump

  - id: chump-plan-binary
    why: INFRA-1257 producer — writes hourly gap-priority.json.
    priority: P1
    install: cargo install --path crates/chump-planner --bin chump-plan
    check: command -v chump-plan >/dev/null 2>&1
    adds: ~/.cargo/bin/chump-plan

  - id: git-hooks
    why: META-063 redundancy gate, META-064 Rust-first gate, INFRA-787 git-identity gate, INFRA-754 event-registry gate, and ~12 other pre-commit / pre-push guards. None fire without per-worktree hook install.
    priority: P0
    install: bash scripts/setup/install-hooks.sh --quiet
    check: test -L .git/hooks/pre-commit -o -f .git/hooks/pre-commit
    adds: .git/hooks/pre-commit + pre-push symlinks

  - id: chump-planner-launchd
    why: INFRA-1257 — hourly planner that writes .chump-locks/gap-priority.json (consumed by the fleet picker per INFRA-1258).
    priority: P1
    install: bash scripts/setup/install-chump-planner-launchd.sh
    check: launchctl list 2>/dev/null | grep -q dev.chump.planner
    depends_on: [chump-plan-binary]
    adds: ~/Library/LaunchAgents/dev.chump.planner.plist + hourly run

  - id: curator-launchd
    why: META-065 — opus-curator runs every 10 min, mutates gap registry (P0 demotion, vague-AC fill, pillar rebalance). Without this, registry rots.
    priority: P1
    install: bash scripts/setup/install-curator-launchd.sh
    check: launchctl list 2>/dev/null | grep -q com.chump.opus-curator
    depends_on: [chump-binary]
    adds: ~/Library/LaunchAgents/com.chump.opus-curator.plist + 10-min run

  - id: paramedic-launchd
    why: INFRA-1397 — chump paramedic daemon runs every 10min rescuing stuck PRs (REBASE_DIRTY, RERUN_FLAKE, etc.). Without this, PR rescue is manual-only.
    priority: P1
    install: bash scripts/setup/install-paramedic.sh
    check: bash scripts/setup/install-paramedic.sh --check
    depends_on: [chump-binary]
    adds: ~/Library/LaunchAgents/com.chump.paramedic.plist + daemon process

  - id: self-doctor-launchd
    why: INFRA-1595 — Wave 0b outer autonomy loop. Runs `chump fleet doctor --heal` every 5min; catches missing daemons + stuck PRs and dispatches via `chump --execute-gap`. Default OFF (diagnose-only); set CHUMP_FLEET_SELF_DOCTOR_HEAL=true to enable auto-fix.
    priority: P1
    install: bash scripts/setup/install-self-doctor.sh
    check: bash scripts/setup/install-self-doctor.sh --check
    depends_on: [chump-binary]
    adds: ~/Library/LaunchAgents/com.chump.self-doctor.plist + 5-min cycle

  - id: queue-health-monitor-launchd
    why: INFRA-052 — hourly queue-health-monitor.sh writes .chump/health.jsonl + alerts.log + ambient ALERTs. Plist exists at launchd/com.chump.queue-health-monitor.plist but was never wired into the bootstrap manifest — fleet self-healing has no signal until this is loaded (INFRA-1546 narrow-split 1/3).
    priority: P1
    install: bash scripts/setup/install-queue-health-monitor-launchd.sh
    check: launchctl list 2>/dev/null | grep -q com.chump.queue-health-monitor
    depends_on: [chump-binary]
    adds: ~/Library/LaunchAgents/com.chump.queue-health-monitor.plist + hourly run

  - id: ambient-hooks
    why: FLEET-023 — claude SessionStart / PreToolUse / Stop hooks emit ambient events. Without these, the audit stream is silent.
    priority: P2
    install: bash scripts/setup/install-ambient-hooks.sh
    check: grep -q chump-ambient ~/.claude/settings.json 2>/dev/null
    adds: ~/.claude/settings.json hooks entries

  - id: github-liaison-launchd
    why: INFRA-1317 — Phase 1 of GITHUB_LIAISON.md. One process refreshes .chump/github_cache.db every 60s instead of N workers each polling GitHub independently. Plist sets CHUMP_LIAISON_ENABLED=1; the script itself defaults OFF for safety in manual contexts. Cuts the secondary-rate-limit pressure that hit 44k self-throttle events / 23h on 2026-05-14.
    priority: P1
    install: bash scripts/setup/install-github-liaison.sh
    check: bash scripts/setup/install-github-liaison.sh --check
    adds: ~/Library/LaunchAgents/dev.chump.github-liaison.plist + KeepAlive daemon

  - id: stale-branch-reaper-launchd
    why: INFRA-388 — daily reaper deletes remote branches 14+ days old with no open PR. Without this the reaper script exists but never runs; reaper-heartbeat-watchdog ALERTs daemon_silent for "branch". Installer existed since 2026-05 but was missing from manifest until INFRA-1926 today.
    priority: P1
    install: bash scripts/setup/install-stale-branch-reaper-launchd.sh
    check: launchctl list 2>/dev/null | grep -q dev.chump.stale-branch-reaper
    adds: ~/Library/LaunchAgents/dev.chump.stale-branch-reaper.plist + daily run

  - id: pr-watch-shepherd-launchd
    why: INFRA-354 — 10-min sweeper that scans all open ARMED PRs and auto-recovers DIRTY-after-arm ones from a clean ephemeral worktree. Without this, the per-PR detached pr-watch.sh children die when their host worktree is reaped, leaving PRs stuck DIRTY. Manifest gap surfaced by daemon_silent ALERT for "pr-watch" today.
    priority: P1
    install: bash scripts/setup/install-pr-watch-shepherd-launchd.sh
    check: launchctl list 2>/dev/null | grep -q dev.chump.pr-watch-shepherd
    adds: ~/Library/LaunchAgents/dev.chump.pr-watch-shepherd.plist + 10-min run

  - id: distill-pr-skills-launchd
    why: INFRA-195 — hourly feedback loop that distills shipped PRs into chump_improvement_targets rows for cross-agent skill sharing. Without this the table only grows via manual sqlite3 INSERTs (i.e. never). reaper-heartbeat-watchdog ALERTs daemon_silent for "distill" because /tmp/chump-distill.heartbeat is never stamped. Installer NEWLY created by INFRA-1926 today (the script existed since 2026-05-01 but no launchd installer ever shipped).
    priority: P2
    install: bash scripts/setup/install-distill-pr-skills-launchd.sh
    check: launchctl list 2>/dev/null | grep -q dev.chump.distill-pr-skills
    adds: ~/Library/LaunchAgents/dev.chump.distill-pr-skills.plist + hourly run

  - id: ci-health-gate-launchd
    why: INFRA-1607 — 5-min daemon that auto-pauses the fleet when CI is jammed (>= 50% BLOCKED PRs) or any SLO is breached. Without this, workers keep claiming new gaps during a pipeline jam and compound the pile-up. Plist at launchd/com.chump.ci-health-gate.plist; script at scripts/coord/ci-health-gate.sh.
    priority: P1
    install: cp launchd/com.chump.ci-health-gate.plist ~/Library/LaunchAgents/ && sed -i '' "s|/path/to/Chump|$(pwd)|g; s|/path/to/HOME|$HOME|g" ~/Library/LaunchAgents/com.chump.ci-health-gate.plist && launchctl load ~/Library/LaunchAgents/com.chump.ci-health-gate.plist
    check: launchctl list 2>/dev/null | grep -q com.chump.ci-health-gate
    depends_on: [chump-binary, github-liaison-launchd]
    adds: ~/Library/LaunchAgents/com.chump.ci-health-gate.plist + 5-min run

  - id: fleet-recorder-launchd
    why: INFRA-2174 — capture daemon that writes NATS+ambient events to .chump/fleet_events.db. Required by the fleet visualization umbrella (INFRA-2164); without it the query API (INFRA-2175) and scrubber (INFRA-2176) have no data.
    priority: P1
    install: bash scripts/setup/install-fleet-recorder-launchd.sh
    check: launchctl list 2>/dev/null | grep -q com.chump.fleet-recorder
    adds: ~/Library/LaunchAgents/com.chump.fleet-recorder.plist + KeepAlive daemon writing to .chump/fleet_events.db

  - id: fleet-server-launchd
    why: INFRA-2175 — HTTP + WebSocket query server for fleet visualization (INFRA-2164 sub-slice b). Reads from .chump/fleet_events.db and serves /api/events, /api/segments, /api/sessions/active, /api/trace/pr/:n, and WS /api/live on 127.0.0.1:7070. Without this daemon the scrubber frontend (INFRA-2176) has no data source.
    priority: P2
    install: bash scripts/setup/install-fleet-server.sh
    check: launchctl list 2>/dev/null | grep -q com.chump.fleet-server
    adds: ~/Library/LaunchAgents/com.chump.fleet-server.plist + KeepAlive server on 127.0.0.1:7070

  - id: daemon-activator-launchd
    why: META-225 — 5-min Quartermaster auto-fixer that scans last 24h of main commits for new install-*.sh or *.plist files and loads them via launchctl if absent. Eliminates the manual "forgot to run the installer after merge" class of unwedging. Self-bootstrapping on first tick.
    priority: P1
    install: bash scripts/setup/install-daemon-activator.sh
    check: launchctl list 2>/dev/null | grep -q com.chump.daemon-activator
    adds: ~/Library/LaunchAgents/com.chump.daemon-activator.plist + 5-min run

  - id: ghost-pr-closer-launchd
    why: META-225 — 15-min Quartermaster auto-fixer that scans open PRs and closes those where the underlying gap is already status=done AND the PR is DIRTY/CONFLICTING. Eliminates the ghost-PR accumulation class of unwedging. Self-throttles to 5 closes per run; overflow deferred to .chump/ghost-pr-deferred.jsonl.
    priority: P1
    install: bash scripts/setup/install-ghost-pr-closer.sh
    check: launchctl list 2>/dev/null | grep -q com.chump.ghost-pr-closer
    adds: ~/Library/LaunchAgents/com.chump.ghost-pr-closer.plist + 15-min run

  - id: main-worktree-drift-detector-launchd
    why: META-225 — 30-min Quartermaster auto-fixer that measures untracked yaml under docs/gaps/ and commits-behind-origin/main in the main worktree; alerts via ambient event and auto-reserves a cleanup gap when thresholds breach (untracked>50 OR behind>20). Debounced 6h. Eliminates the silent drift accumulation that blocks shepherd operations.
    priority: P1
    install: bash scripts/setup/install-main-worktree-drift-detector.sh
    check: launchctl list 2>/dev/null | grep -q com.chump.main-worktree-drift-detector
    adds: ~/Library/LaunchAgents/com.chump.main-worktree-drift-detector.plist + 30-min run
