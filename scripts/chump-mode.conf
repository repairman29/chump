# Chump mode: processes to terminate when entering Chump mode to free RAM/CPU for the 30B model.
# One identifier per line. Lines starting with # are ignored. Blank lines ignored.
#
# Format:
#   ProcessName     — killall-style name (e.g. "Google Chrome", "Slack"). Prefer the main app name.
#   bundle:BUNDLE_ID — optional: quit app by bundle ID (graceful). e.g. bundle:com.google.Chrome
#
# Uncomment or add entries you want killed when you run scripts/enter-chump-mode.sh.
# Never add: WindowServer, kernel, loginwindow, rust-agent, vllm, Python (embed), ollama, or other
# Chump-related processes — the script skips a built-in protected set.

# Browsers (uncomment if you want to free memory; close tabs first to avoid data loss)
# Google Chrome
# Safari
# Firefox
# Microsoft Edge

# Electron / desktop apps
# Slack
# Discord
# Zoom
# Microsoft Teams

# Dev tools (only if you're not using them while Chump runs)
# Code
# Cursor

# Optional: quit by bundle ID (graceful). Uncomment to use.
# bundle:com.google.Chrome
# bundle:com.tinyspeck.slackmacgap
# bundle:com.hnc.Discord
