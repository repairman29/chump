# INFRA-2352 (META-269 sub-3): daemon-silent meta-monitor expectations.
#
# Each entry declares what ambient event kinds a launchd daemon is expected
# to emit per hour, with optional eligibility criteria. When the monitor
# sees a daemon LOADED + 0 of its expected kinds + eligibility criteria met,
# it emits kind=daemon_silent with a diagnosis.
#
# Format:
#   - daemon: <launchd label or plist basename>
#     description: one-liner of what the daemon does
#     expected_kinds: [list of ambient kinds this daemon should emit]
#     min_per_hour: minimum count of (any of expected_kinds) per hour to NOT be silent
#     eligibility: optional shell expression (eval'd by monitor) — daemon only
#       counts as silent when eligibility is TRUE (true means: there is work to do).
#       If absent, daemon is always eligible.
#
# Adding a new daemon: append below; the monitor reads this file fresh
# each tick so no restart needed.

version: 1

daemons:
  - daemon: dev.chump.trunk-sentinel
    description: detects trunk RED/GREEN state changes, emits trunk_state_change
    expected_kinds:
      - trunk_sentinel_tick
      - trunk_state_change
      - trunk_red_persistent
      - trunk_recovered
    # Sentinel ticks every 5 min — at min 6/hr expected.
    min_per_hour: 1
    eligibility: "true"

  - daemon: com.chump.fix-trunk-dispatcher
    description: dispatches fix-trunk Sonnet when trunk RED + fix_trunk gap open
    expected_kinds:
      - fix_trunk_dispatched
      - fix_trunk_no_candidate
      - fix_trunk_skipped
      - fix_trunk_priority_signal
    # Dispatcher should at least emit no_candidate when trunk GREEN and tick.
    min_per_hour: 1
    # Only eligible when there's a recent trunk_red_persistent OR an open
    # fix_trunk gap. Empty string = unconditional eligibility.
    eligibility: "true"

  - daemon: dev.chump.queue-driver
    description: BEHIND PR scan + DIRTY PR rebase per INFRA-1081/INFRA-1137
    expected_kinds:
      - queue_driver_tick
      - queue_driver_behind_refreshed
      - queue_driver_dirty_rebased
      - queue_driver_no_action
    min_per_hour: 1
    eligibility: "true"

  - daemon: dev.chump.stale-pr-reaper
    description: closes/cancels PRs stuck >24h per INFRA-NNN
    expected_kinds:
      - stale_pr_reaped
      - stale_pr_no_candidate
      - stale_pr_reaper_tick
    min_per_hour: 1
    eligibility: "true"

  - daemon: dev.chump.disk-health-monitor
    description: emits disk_critical / disk_warning per INFRA-2304
    expected_kinds:
      - disk_health_tick
      - disk_critical
      - disk_warning
      - disk_ok
    min_per_hour: 1
    eligibility: "true"
