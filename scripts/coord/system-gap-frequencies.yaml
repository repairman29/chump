# INFRA-841: declarative cadence for system-gap scheduled tasks.
#
# Each entry: a scheduled task that runs in the fleet. The launchd
# plists in launchd/com.chump.*.plist read interval_s from this file
# (or fall back to the StartInterval baked into the plist).
#
# Read by: scripts/coord/opus-curator.sh, scripts/coord/emergency-fast-path.sh
# Validated by: scripts/ci/test-frequency-scheduling.sh
#
# Per-worker overrides (CHUMP_FREQUENCY_OVERRIDE env) are a follow-up
# tracked in INFRA-852.

version: 1

tasks:
  opus-curator:
    interval_s: 600           # 10 min — primary fleet decision-maker
    script: scripts/coord/opus-curator.sh
    class: curator            # proactive audit + decisions
    description: |
      Proactive health audit (SLO, waste, gap audit, PR stalls,
      pillar balance). Primary fleet decision-maker. Emits
      kind=curator_decision per CLAUDE.md.

  emergency-fast-path:
    interval_s: 300           # 5 min — emergency signal accessor
    script: scripts/coord/emergency-fast-path.sh
    class: emergency          # high-confidence signal handler
    description: |
      Wraps fleet-state.json read/write in flock(1). Default invocation
      with no args runs `status`; cron mode runs as heartbeat. Wedge
      escalation handled by INFRA-845.

  gap-gardener:
    interval_s: 86400         # 24h — daily registry hygiene
    script: scripts/coord/gap-gardener.sh
    class: hygiene
    description: |
      Daily gap-store hygiene: stale-lease sweep, vague-AC alerts,
      retention sweep (90d idle → P3). Filed as INFRA-637 follow-up.
    optional: true            # script may not exist yet

# Skew rules: no two tasks in the same `class` should share an interval_s
# value, AND short-cycle tasks (interval_s <= 600) must have distinct
# intervals so launchd jitter does not collide them on the same minute.

frequency_classes:
  curator:
    target_interval_s: 600
    rationale: "Primary decision-maker. 10-min cadence balances cost vs latency."
  emergency:
    target_interval_s: 300
    rationale: "Faster than curator so wedge signals are caught before curator inspects."
  hygiene:
    target_interval_s: 86400
    rationale: "Low-priority sweeps; once/day suffices."
