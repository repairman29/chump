# gate-manifest.yaml — CREDIBLE-050
#
# Each entry names a CI gate that should detect a specific failure pattern.
# scripts/ci/test-all-gates-force-fire.sh iterates this manifest, synthesizes
# a violating fixture for each gate, runs the gate's check script, and
# asserts the correct outcome (exit code + ambient event kind).
#
# Adding a new gate:
#   1. Add its check script under scripts/ci/check-*.sh
#   2. Append an entry here naming the gate, script, expected exit code,
#      and fixture-prep snippet (the bash that makes the gate fire)
#   3. The force-fire test will exercise it on next PR
#
# Per CREDIBLE-050 AC: a gate that fails its own fixture cannot be flipped
# to REQUIRED (CREDIBLE-042/043 dependent on this manifest passing).

version: 1
gates:
  - id: CREDIBLE-026-scope-divergence
    check_script: scripts/ci/check-pr-scope.sh
    closing_pr: 1462
    failure_class: pr-scope-divergence
    description: |
      PR title says chore(gaps): but diff also touches src/. Detector
      should fail (non-zero) because the chore-gaps scope was violated.
    fixture_kind: pr-title-vs-diff
    expected_exit_nonzero: true
    motivating_incident_pr: 1444

  - id: CREDIBLE-027-mass-deletion
    check_script: scripts/ci/check-mass-deletion.sh
    closing_pr: 1459
    failure_class: scratch-commit-mass-deletion
    description: |
      Commits titled 'first' / 'init' / 'wip' OR net diff deleting >100
      lines from files not mentioned in PR title/body. Detector fails.
    fixture_kind: scratch-commits-or-mass-delete
    expected_exit_nonzero: true
    motivating_incident_pr: 1441

  - id: CREDIBLE-028-premature-closure
    check_script: scripts/ci/test-gap-closure-consistency.sh
    closing_pr: 1458
    failure_class: premature-gap-closure
    description: |
      state.db has status=done with closed_pr=N but PR N is not yet
      merged. Detector fires kind=gap_drift_premature_close.
    fixture_kind: state.db-with-ghost-closed-pr
    expected_exit_nonzero: true
    motivating_incident_pr: 1433
    # Without --strict, the gate runs in info-only mode and never exits
    # non-zero on drift. The previous fixture preparer tried to set this
    # via `export GATE_FIXTURE_ARGS=--strict` from inside the $(prepare_fixture)
    # subshell, but exports there never reach the parent shell.
    fixture_args: "--strict"

  - id: INFRA-538-state-db-restore
    check_script: scripts/ci/test-state-db-restore.sh
    closing_pr: 1504
    failure_class: feature-test
    description: |
      Smoke test for `chump gap restore --from-sql`. NOT a failure
      detector — included here so the manifest covers the full set
      of CI gates and we can track all-gates-passing as a metric.
    fixture_kind: in-script-self-test
    expected_exit_nonzero: false

  - id: META-043-preregistration-required
    check_script: scripts/ci/test-prereg-required-for-cognition.sh
    closing_pr: 1492
    failure_class: missing-preregistration
    description: |
      PR modifies cognition src files (reflection/lessons/neuromod) but
      no preregistration doc at docs/eval/preregistered/<GAP>.md. The
      real detector lives in scripts/coord/bot-merge.sh (pre-push). The
      test script here is a SELF-TEST of the guard logic (7 hardcoded
      simulations of the python guard); it does not observe a fixture.
      Treated like INFRA-538 (smoke test, expected_exit_nonzero=false).
    fixture_kind: in-script-self-test
    expected_exit_nonzero: false
    motivating_incident_pr: null # preventive — no prior incident

  - id: RESILIENT-009-worktree-cd
    check_script: scripts/ci/test-prepush-worktree-cd.sh
    closing_pr: null
    failure_class: self-test
    description: |
      Verifies pre-push hook CDs into REPO_ROOT_T (the worktree) before
      running cargo test, not the main checkout. Without this, GIT_DIR
      overrides cause tests to run against main's source tree.
    fixture_kind: in-script-self-test
    expected_exit_nonzero: false
    motivating_incident_pr: null

  - id: INFRA-819-reaper-resurrect
    check_script: scripts/ci/test-reaper-resurrect.sh
    closing_pr: null
    failure_class: self-test
    description: |
      Verifies heartbeat-watcher.sh ENOSPC resilience: disk-preflight
      triggers exit 1 under disk pressure, enabling launchd KeepAlive
      restart. Without this, a full disk silently kills the heartbeat
      watcher without restart.
    fixture_kind: in-script-self-test
    expected_exit_nonzero: false
    motivating_incident_pr: null

  - id: CREDIBLE-029-gap-id-collision
    check_script: scripts/ci/test-gap-id-collision.sh
    closing_pr: null
    failure_class: self-test
    description: |
      Verifies the Rust concurrent-reserve unit test and ambient-event
      collision detection path. Requires chump binary (skipped if not built).
    fixture_kind: in-script-self-test
    expected_exit_nonzero: false
    motivating_incident_pr: null

  - id: CREDIBLE-057-acp-real-client-protocol
    check_script: scripts/ci/test-acp-real-clients.sh
    closing_pr: null
    failure_class: acp-protocol-violation
    description: |
      ACP real-client fixture replay: verifies the chump ACP server responds
      with camelCase field names (sessionId) as required by the ACP spec.
      Force-fire: the fixture force-fire-broken.json contains a response with
      snake_case 'session_id' — the test harness must detect this violation
      and exit non-zero, confirming the gate is live.
    fixture_kind: in-script-self-test
    expected_exit_nonzero: false
    motivating_incident_pr: null

# Entries intentionally excluded from manifest:
# - INFRA-825: stale-binary hard-fail is a runtime check; covered by version.rs
#   unit tests (pr_1444_replay_refuses_without_override).
# - RESILIENT-006: pr-rescue.sh is an action script, not a detector; exercised
#   by integration test in #1475.
# - RESILIENT-008: not yet shipped (open gap — auto-YAML-flip on merge).
# - CREDIBLE-044: extends CREDIBLE-029 full allocator — filed but not shipped.
