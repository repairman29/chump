[package]
name = "chump-mcp-adb"
version = "0.1.0"
edition = "2021"
description = "MCP server: Android Debug Bridge (ADB) operations via JSON-RPC over stdio"

[[bin]]
name = "chump-mcp-adb"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
anyhow = "1.0"

[package.metadata.dist]
dist = false
