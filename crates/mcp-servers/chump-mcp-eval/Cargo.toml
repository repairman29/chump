[package]
name = "chump-mcp-eval"
version = "0.1.0"
edition = "2021"
description = "MCP server: Chump eval harness runner via JSON-RPC over stdio"
repository = "https://github.com/repairman29/chump"
homepage = "https://github.com/repairman29/chump/tree/main/crates/mcp-servers/chump-mcp-eval"
license = "MIT"
keywords = ["mcp", "eval", "agent", "llm", "json-rpc"]
categories = ["command-line-utilities", "development-tools"]
readme = "README.md"

[[bin]]
name = "chump-mcp-eval"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
anyhow = "1.0"

[package.metadata.dist]
dist = false
