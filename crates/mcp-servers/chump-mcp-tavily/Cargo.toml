[package]
name = "chump-mcp-tavily"
version = "0.1.0"
edition = "2021"
description = "MCP server: Tavily web search via JSON-RPC over stdio"

[[bin]]
name = "chump-mcp-tavily"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
anyhow = "1.0"
