[package]
name = "chump-mcp-tavily"
version = "0.1.0"
edition = "2021"
description = "MCP server: Tavily web search via JSON-RPC over stdio"
repository = "https://github.com/repairman29/chump"
homepage = "https://github.com/repairman29/chump/tree/main/crates/mcp-servers/chump-mcp-tavily"
license = "MIT"
keywords = ["mcp", "tavily", "search", "agent", "llm"]
categories = ["command-line-utilities", "web-programming"]
readme = "README.md"

[[bin]]
name = "chump-mcp-tavily"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
anyhow = "1.0"

[package.metadata.dist]
dist = false
