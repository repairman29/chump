[package]
name = "chump-mcp-memory"
version = "0.1.0"
edition = "2021"
description = "MCP server: session memory search, episode log, and memory recall via JSON-RPC over stdio"
repository = "https://github.com/repairman29/chump"
homepage = "https://github.com/repairman29/chump/tree/main/crates/mcp-servers/chump-mcp-memory"
license = "AGPL-3.0-only"
keywords = ["mcp", "memory", "agent", "llm", "json-rpc"]
categories = ["command-line-utilities", "development-tools"]
readme = "README.md"

[[bin]]
name = "chump-mcp-memory"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
anyhow = "1.0"
rusqlite = { version = "0.32", features = ["bundled"] }

[package.metadata.dist]
dist = false

[lints]
workspace = true
