name: Coverage (nightly)

# META-200: coverage was moved from ci.yml (per-PR) to here (nightly-only).
# llvm-cov takes 6-8 min and is not required for merge decisions.
# Per-PR CI wall-clock is not affected by this job.
on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── CREDIBLE-006: code coverage (llvm-cov) ───────────────────────────────
  # Non-blocking — continue-on-error:true so a coverage regression is a
  # warning, not a merge-blocker, until the baseline stabilises (>2 weeks).
  # Uploads an lcov artifact + writes a summary to $GITHUB_STEP_SUMMARY.
  coverage:
    runs-on: ${{ vars.RUNNER_COVERAGE != '' && fromJSON(vars.RUNNER_COVERAGE) || 'ubuntu-latest' }}  # INFRA-1542: lane override via repo var (unset → ubuntu-latest)
    continue-on-error: true
    timeout-minutes: 45  # llvm-cov is slower than cargo-test alone; not required for merge
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        if: runner.os == 'Linux'  # INFRA-1539: proactive Linux-only guard
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python

      - name: Install Linux packages (webkit required by chump-desktop workspace member)
        if: runner.os == 'Linux'  # INFRA-1534: macOS self-hosted skips apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            webkit2gtk-4.1 libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            build-essential pkg-config libssl-dev libgtk-3-dev librsvg2-dev util-linux

      - name: Install Rust toolchain + llvm-tools-preview
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report (lcov)
        run: |
          cargo llvm-cov --workspace --lcov --output-path coverage.lcov \
            --ignore-filename-regex '(tests?/|test_|_test\.rs|build\.rs)'

      - name: Summarise coverage
        run: |
          # Extract total line coverage % from lcov and write to step summary + file.
          python3 - <<'PYEOF'
          import re, os

          lcov = open("coverage.lcov").read()
          found = hit = 0
          for line in lcov.splitlines():
              if line.startswith("LF:"):
                  found += int(line[3:])
              elif line.startswith("LH:"):
                  hit += int(line[3:])

          pct = (hit / found * 100) if found else 0.0
          summary = f"Coverage: {pct:.1f}% ({hit}/{found} lines)"
          print(summary)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(f"## {summary}\n\n")
              f.write("lcov artifact: `coverage-lcov`\n")

          with open("coverage-summary.txt", "w") as f:
              f.write(f"lines: {pct:.1f}% ({hit}/{found})\n")

          # CREDIBLE-006 threshold check: warn if coverage dropped from baseline.
          threshold = float(os.environ.get("CHUMP_COVERAGE_DROP_THRESHOLD", "2"))
          baseline_file = "docs/credibility/COVERAGE_BASELINE.md"
          import re as _re
          try:
              text = open(baseline_file).read()
              m = _re.search(r'(\d+\.\d+)\s*%', text)
              if m:
                  baseline_pct = float(m.group(1))
                  drop = baseline_pct - pct
                  if drop > threshold:
                      print(f"::warning::Coverage dropped {drop:.1f} pp below baseline "
                            f"({baseline_pct:.1f}% → {pct:.1f}%). "
                            f"Threshold: {threshold} pp.")
              else:
                  print("Baseline not yet established — skipping threshold check.")
          except FileNotFoundError:
              print("No baseline file found — skipping threshold check.")
          PYEOF

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: |
            coverage.lcov
            coverage-summary.txt
          retention-days: 30
