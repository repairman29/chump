# CI publish dry-run gate
# Runs on PRs touching publishable crates

name: Crate Publish Dry-Run

on:
  pull_request:
    paths:
      - 'crates/chump-*/**'
      - 'Cargo.toml'

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Dry-run publish
        run: |
          for crate in chump-agent-lease chump-mcp-lifecycle chump-cancel-registry chump-perception chump-cost-tracker chump-belief-state chump-messaging chump-coord chump-orchestrator; do
            cargo publish -p $crate --dry-run || exit 1
          done