# CI publish dry-run gate
# Runs on PRs touching publishable crates

name: Crate Publish Dry-Run

on:
  pull_request:
    paths:
      - 'crates/chump-*/**'
      - 'Cargo.toml'

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Dry-run publish
        run: |
          crates=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.publish == null or (.publish | length > 0)) | .name' | grep '^chump-' | sort)
          for crate in $crates; do
            echo "Publishing $crate..."
            cargo publish -p $crate --dry-run || exit 1
          done
          [ -z "$crates" ] && echo "No publishable crates found" && exit 1