# Build PDF white papers (Pandoc + LaTeX in Docker). Artifacts for review; pin image digest in CHUMP_WHITE_PAPER_IMAGE for stricter reproducibility.
name: White papers

on:
  # Disabled auto-trigger: docs/white-paper-manifest.json does not exist yet.
  # Re-enable push trigger once the manifest is created (INFRA-WHITE-PAPERS-PANDOC).
  workflow_dispatch:

env:
  # INFRA-WHITE-PAPERS-PANDOC hypothesis (1): the unfailing
  # `pandoc/latex:latest-ubuntu` tag drifted to a version where pandoc's
  # `--resource-path` semantics changed, breaking the build on
  # `withBinaryFile: does not exist`. Pin to a specific minor version we
  # know predates the regression. If this commit's CI run goes green,
  # the drift hypothesis is confirmed. If still red, fall through to
  # hypothesis (2) — work-relative path resolution inside the docker
  # mount. See docs/gaps.yaml::INFRA-WHITE-PAPERS-PANDOC for the
  # full diagnostic + repro recipe.
  CHUMP_WHITE_PAPER_IMAGE: pandoc/latex:3.6.0.0-ubuntu

jobs:
  pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Pull toolchain image
        run: docker pull "$CHUMP_WHITE_PAPER_IMAGE"

      - name: Build all volumes (PDF)
        run: python3 scripts/build-white-papers.py --docker

      - name: Upload dist/white-papers
        uses: actions/upload-artifact@v4
        with:
          name: white-papers
          path: dist/white-papers/
          if-no-files-found: error
