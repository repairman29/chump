# Build PDF white papers (Pandoc + LaTeX in Docker). Artifacts for review; pin image digest in CHUMP_WHITE_PAPER_IMAGE for stricter reproducibility.
name: White papers

on:
  push:
    branches: [main, master]
    paths:
      # Only paths that actually affect the PDFs. gaps.yaml and
      # AGENT_COORDINATION.md are operational registries that change many
      # times per day and aren't sources for any volume — excluding them
      # stops the workflow from running (and failing) on every gap edit.
      - "docs/**"
      - "!docs/gaps.yaml"
      - "!docs/AGENT_COORDINATION.md"
      - "!docs/CONSCIOUSNESS_AB_RESULTS.md"
      - "scripts/build-white-papers.py"
      - ".github/workflows/white-papers.yml"
  workflow_dispatch:

env:
  # Override with digest-pinned image in repo settings or here, e.g.
  # pandoc/ubuntu-latex@sha256:...
  CHUMP_WHITE_PAPER_IMAGE: pandoc/latex:latest-ubuntu

jobs:
  pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Pull toolchain image
        run: docker pull "$CHUMP_WHITE_PAPER_IMAGE"

      - name: Build all volumes (PDF)
        run: python3 scripts/build-white-papers.py --docker

      - name: Upload dist/white-papers
        uses: actions/upload-artifact@v4
        with:
          name: white-papers
          path: dist/white-papers/
          if-no-files-found: error
