# Unsigned macOS .app artifact for QA (signing + notarization: see docs/PACKAGED_OOTB_DESKTOP.md).
name: Tauri desktop bundle (macOS)

concurrency:
  group: tauri-desktop-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  workflow_dispatch:
  # Removed push trigger — macOS runners cost 10x Linux ($0.08/min).
  # Run manually from Actions tab when you need a desktop build.
  # Previous trigger: push to main on desktop/web/src/Cargo changes.

jobs:
  bundle-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        uses: baptiste0928/cargo-install@v3
        with:
          crate: tauri-cli
          locked: true

      - name: Build Chump.app (release)
        run: cargo tauri build
        working-directory: desktop/src-tauri

      - name: Locate bundle
        id: bundle
        run: |
          APP=$(find "$GITHUB_WORKSPACE" -path "*/target/release/bundle/macos/*.app" -type d | head -1)
          if [[ -z "$APP" ]]; then
            APP=$(find "$GITHUB_WORKSPACE" -path "*/target/*/bundle/macos/*.app" -type d | head -1)
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          test -n "$APP"

      - uses: actions/upload-artifact@v7
        with:
          name: chump-desktop-macos-app-unsigned
          path: ${{ steps.bundle.outputs.app }}
