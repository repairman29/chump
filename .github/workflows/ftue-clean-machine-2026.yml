name: FTUE clean-machine 2026 (INFRA-600 / INFRA-799 / INFRA-NEW-orchestrate)

# Integration test for the week-4 ROADMAP acceptance: the 5-min demo flow
# (brew install → chump --version → chump init → chump gen →
#  chump mcp list → chump orchestrate → chump fleet start/status/stop)
# runs without operator hand-holding on a completely fresh macOS runner.
#
# fleet start/stop/status delegate to scripts/dispatch/ stubs so no real
# Claude Code workers or API keys are required — the test validates CLI
# routing and JSON output plumbing, not live agent execution.
#
# History:
#   INFRA-600: original workflow (broken — replaced).
#   INFRA-799: added chump init --no-interactive + chump mcp list steps.
#   2026-05-15: added chump orchestrate intent-parser smoke (3 canonical
#     phrases → routed commands). Covers the differentiated June-6 demo
#     criterion #4 ("operator types 'spawn the fleet…', fleet starts").

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'Formula/**'
      - 'src/chump_init.rs'
      - 'src/gen.rs'
      - 'src/fleet*.rs'
      - 'src/mcp_discovery.rs'
      - 'src/intent_parser.rs'
      - 'src/orchestrate*.rs'
      - 'chump-mcp.json'
      - 'scripts/dispatch/**'
      - 'scripts/ci/test-chump-init-clean-machine.sh'
      - '.github/workflows/ftue-clean-machine-2026.yml'
  push:
    branches: [main]
    paths:
      - 'Formula/**'
      - 'src/chump_init.rs'
      - 'src/gen.rs'
      - 'src/fleet*.rs'
      - 'src/mcp_discovery.rs'
      - 'src/intent_parser.rs'
      - 'src/orchestrate*.rs'
      - 'chump-mcp.json'
      - 'scripts/dispatch/**'
      - 'scripts/ci/test-chump-init-clean-machine.sh'
      - '.github/workflows/ftue-clean-machine-2026.yml'
  schedule:
    - cron: '0 12 * * 1'  # weekly Monday 12:00 UTC

permissions:
  contents: read

concurrency:
  group: ftue-clean-machine-2026
  cancel-in-progress: false

jobs:
  ftue:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      # ── Step 1: brew tap + install ────────────────────────────────────────
      - name: brew tap + install chump
        id: install
        run: |
          set -euo pipefail
          INSTALL_START=$(date +%s)
          brew tap repairman29/chump
          brew install chump
          INSTALL_END=$(date +%s)
          echo "install_seconds=$((INSTALL_END - INSTALL_START))" >> "$GITHUB_OUTPUT"

      # ── Step 2: chump --version ───────────────────────────────────────────
      - name: chump --version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(chump --version)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "chump --version: ${VERSION}"

      # ── Step 2b: chump init --no-interactive (INFRA-799) ─────────────────
      # Runs in a throwaway HOME so it doesn't mutate the runner's real ~/.chump.
      - name: chump init --no-interactive
        id: init
        run: |
          set -euo pipefail
          FAKE_HOME="$(mktemp -d)"
          # Run the local smoke test (covers checks 1-5 including mcp list).
          CHUMP_BIN=chump bash scripts/ci/test-chump-init-clean-machine.sh 2>&1
          echo "init_home=${FAKE_HOME}" >> "$GITHUB_OUTPUT"

      # ── Step 2c: chump mcp list (INFRA-744 / INFRA-799) ──────────────────
      - name: chump mcp list
        id: mcp_list
        run: |
          set -euo pipefail
          # chump-mcp.json is checked in — verify mcp list reads it.
          OUT=$(CHUMP_BINARY_STALENESS_CHECK=0 chump mcp list 2>/dev/null)
          echo "$OUT"
          # Expect at least one server listed from chump-mcp.json.
          echo "$OUT" | grep -qE "ready|MISSING|disabled" || \
            { echo "ERROR: chump mcp list did not emit status column"; exit 1; }
          echo "mcp list: OK"

      # ── Step 3: set up fixture Chump repo ────────────────────────────────
      # The fixture is a minimal git+Cargo project with stub dispatch scripts
      # so fleet start/stop/status work without tmux or API keys.
      - name: Set up fixture repo
        id: fixture
        run: |
          set -euo pipefail
          FIXTURE="$(mktemp -d)/chump-ftue-fixture"
          mkdir -p "$FIXTURE/scripts/dispatch"
          mkdir -p "$FIXTURE/.chump-locks"
          mkdir -p "$FIXTURE/.chump"
          mkdir -p "$FIXTURE/src"

          # Minimal Cargo project (needed by chump gen's cargo check step).
          cat > "$FIXTURE/Cargo.toml" <<'TOML'
          [package]
          name = "chump-ftue-fixture"
          version = "0.1.0"
          edition = "2021"
          TOML
          cat > "$FIXTURE/src/main.rs" <<'RS'
          fn main() { println!("ftue fixture"); }
          RS

          # Stub run-fleet.sh — records call, exits 0.
          cat > "$FIXTURE/scripts/dispatch/run-fleet.sh" <<'SH'
          #!/usr/bin/env bash
          echo "run-fleet FLEET_SIZE=${FLEET_SIZE:-} FLEET_MODEL=${FLEET_MODEL:-} FLEET_EFFORT_FILTER=${FLEET_EFFORT_FILTER:-}"
          SH
          chmod +x "$FIXTURE/scripts/dispatch/run-fleet.sh"

          # Stub fleet-status.sh — emits minimal JSON on --json, text otherwise.
          cat > "$FIXTURE/scripts/dispatch/fleet-status.sh" <<'SH'
          #!/usr/bin/env bash
          if [[ "$*" == *"--json"* ]]; then
            printf '{"workers":[],"size":1,"status":"running"}\n'
          else
            echo "fleet-status: stub — 1 worker(s) active"
          fi
          SH
          chmod +x "$FIXTURE/scripts/dispatch/fleet-status.sh"

          # Minimal git repo so chump's repo_path::repo_root() is happy.
          git -C "$FIXTURE" init -q
          git -C "$FIXTURE" config user.email "ftue-ci@localhost"
          git -C "$FIXTURE" config user.name "FTUE CI"
          git -C "$FIXTURE" add .
          git -C "$FIXTURE" commit -q -m "init fixture"

          echo "fixture=${FIXTURE}" >> "$GITHUB_OUTPUT"

      # ── Step 4: chump gen (stub — no LLM call) ───────────────────────────
      - name: chump gen (stub)
        id: gen
        run: |
          set -euo pipefail
          FIXTURE="${{ steps.fixture.outputs.fixture }}"
          CHUMP_REPO="$FIXTURE" CHUMP_GEN_STUB_FILE=src/main.rs \
            chump gen "add a /health endpoint" --work-dir "$FIXTURE"
          # Verify stub prepended the comment.
          grep -q "chump-gen:" "$FIXTURE/src/main.rs" || \
            { echo "ERROR: chump gen stub did not patch src/main.rs"; exit 1; }
          echo "gen: OK"

      # ── Step 4b: chump orchestrate — natural-language intent parser ───────
      # June 6 demo criterion #4: operator types "spawn the fleet on infra
      # p0/p1", fleet starts. This step verifies the intent-parser stub path
      # (no LLM call) routes recognized phrases to chump CLI commands.
      # Each line emits {intent, command, kind:intent_parse_ok} as JSON;
      # we assert kind + command on three canonical phrases.
      - name: chump orchestrate (intent parser)
        id: orchestrate
        run: |
          set -euo pipefail
          FIXTURE="${{ steps.fixture.outputs.fixture }}"
          assert_intent() {
            local phrase="$1" want_cmd="$2"
            local out
            out=$(CHUMP_REPO="$FIXTURE" chump orchestrate "$phrase" 2>/dev/null \
                  | grep -E '^\{' | tail -1)
            if [ -z "$out" ]; then
              echo "ERROR: orchestrate produced no JSON line for '$phrase'"; exit 1
            fi
            echo "$out" | grep -q '"kind":"intent_parse_ok"' || {
              echo "ERROR: orchestrate did not parse '$phrase' (got: $out)"; exit 1
            }
            echo "$out" | grep -q "\"command\":\"$want_cmd\"" || {
              echo "ERROR: orchestrate routed '$phrase' wrong (want $want_cmd, got: $out)"; exit 1
            }
            echo "  '$phrase' → $want_cmd"
          }
          assert_intent "what is our mission grade?" "chump mission-grade"
          assert_intent "stop the fleet now"        "chump fleet stop"
          assert_intent "what's our waste rate?"    "chump waste-tally"
          echo "orchestrate: OK (3/3 intents routed)"

      # ── Step 5: chump fleet start --size 1 ───────────────────────────────
      - name: chump fleet start
        id: fleet_start
        run: |
          set -euo pipefail
          FIXTURE="${{ steps.fixture.outputs.fixture }}"
          OUT=$(CHUMP_REPO="$FIXTURE" chump fleet start --size 1 2>&1)
          echo "$OUT"
          # Stub run-fleet.sh echoes FLEET_SIZE — verify routing reached it.
          echo "$OUT" | grep -q "FLEET_SIZE=1" || \
            { echo "ERROR: fleet start did not pass FLEET_SIZE=1 to run-fleet.sh"; exit 1; }
          echo "fleet start: OK"

      # ── Step 6: chump fleet status --json ────────────────────────────────
      - name: chump fleet status --json
        id: fleet_status
        run: |
          set -euo pipefail
          FIXTURE="${{ steps.fixture.outputs.fixture }}"
          STATUS=$(CHUMP_REPO="$FIXTURE" chump fleet status --json 2>&1)
          echo "fleet status output: ${STATUS}"
          # Must be parseable JSON.
          echo "$STATUS" | python3 -c "import sys, json; obj=json.load(sys.stdin); print('JSON OK:', obj)" || \
            { echo "ERROR: fleet status --json did not emit valid JSON"; exit 1; }
          echo "fleet status --json: OK"

      # ── Step 7: chump fleet stop (teardown) ──────────────────────────────
      - name: chump fleet stop
        id: fleet_stop
        run: |
          set -euo pipefail
          FIXTURE="${{ steps.fixture.outputs.fixture }}"
          OUT=$(CHUMP_REPO="$FIXTURE" chump fleet stop 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "FLEET_SIZE=0" || \
            { echo "ERROR: fleet stop did not pass FLEET_SIZE=0 to run-fleet.sh"; exit 1; }
          echo "fleet stop: OK"

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Print summary
        if: always()
        run: |
          echo "=== FTUE clean-machine 2026 summary ==="
          echo "brew install:  ${{ steps.install.outputs.install_seconds }}s"
          echo "chump version: ${{ steps.version.outputs.version }}"
          echo "chump init:    ${{ steps.init.outcome }}"
          echo "mcp list:      ${{ steps.mcp_list.outcome }}"
          echo "gen:           ${{ steps.gen.outcome }}"
          echo "fleet start:   ${{ steps.fleet_start.outcome }}"
          echo "fleet status:  ${{ steps.fleet_status.outcome }}"
          echo "fleet stop:    ${{ steps.fleet_stop.outcome }}"
