name: Regenerate gaps.yaml on merge

# INFRA-084 — make the merge queue the canonical regenerator of
# docs/gaps.yaml so PRs no longer have to hand-append YAML blocks at
# the bottom (the source of every concurrent-PR rebase conflict on
# 2026-04-26..28: 4-way INFRA-087..090, repeated DIRTY merges, repeated
# CHUMP_AUTOMERGE_OVERRIDE=1 + CHUMP_GAP_CHECK=0 force-pushes).
#
# Flow:
#   1. merge_group fires on the queue's temp branch right before squash.
#   2. We rebuild .chump/state.db by importing docs/gaps.yaml via the
#      chump CLI (state.db is gitignored, so the temp branch has no DB —
#      import gives us a fresh one that exactly matches the YAML).
#   3. We regenerate docs/gaps.yaml + .chump/state.sql from the rebuilt
#      DB. If round-trip is clean (the typical case once everyone uses
#      the chump gap CLI), the diff is empty and we exit.
#   4. If round-trip drifted (a hand-edit didn't conform to the canonical
#      format, or a new gap entry has a non-canonical ordering), commit
#      the regenerated artifacts back to the merge_group temp ref so the
#      squashed commit on main is the canonical version.
#
# Pre-INFRA-084 mitigation: bot-merge.sh's INFRA-154 auto-close path also
# regenerates YAML at ship time. This workflow is the safety net for the
# legitimate "PR added a brand-new gap entry by hand" case until INFRA-094
# blocks raw YAML edits in pre-commit.

on:
  merge_group:

permissions:
  contents: write

# Concurrency: drop redundant runs on the same merge group ref.
concurrency:
  group: regen-gaps-yaml-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history + write token so the optional `git push`
          # can land back on the merge_group temp ref.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.email "actions+regenerate-gaps-yaml@github-actions.bot"
          git config user.name "regenerate-gaps-yaml-bot"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: regen-gaps-yaml-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            regen-gaps-yaml-${{ runner.os }}-

      - name: Build chump CLI (release)
        run: cargo build --release --bin chump

      - name: Import docs/gaps.yaml -> state.db (idempotent)
        run: ./target/release/chump gap import

      - name: Regenerate docs/gaps.yaml + state.sql from state.db
        run: |
          ./target/release/chump gap dump --out docs/gaps.yaml
          ./target/release/chump gap dump --out .chump/state.sql

      - name: Detect drift
        id: drift
        run: |
          if git diff --quiet docs/gaps.yaml .chump/state.sql; then
            echo "drift=none" >> "$GITHUB_OUTPUT"
            echo "[regen] No drift — round-trip is clean."
          else
            echo "drift=present" >> "$GITHUB_OUTPUT"
            echo "[regen] Drift detected. Diff summary:"
            git diff --stat docs/gaps.yaml .chump/state.sql
          fi

      - name: Commit + push regenerated artifacts
        if: steps.drift.outputs.drift == 'present'
        run: |
          git add docs/gaps.yaml .chump/state.sql
          git commit -m "[skip ci] regenerate docs/gaps.yaml from .chump/state.db (INFRA-084)

          Auto-generated by .github/workflows/regenerate-gaps-yaml.yml on merge_group
          to keep the YAML mirror byte-stable with the canonical SQLite store.
          Triggered by drift between PR's hand-edited YAML and the round-tripped
          canonical form. See INFRA-084 in docs/gaps.yaml for the design.
          "
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"
