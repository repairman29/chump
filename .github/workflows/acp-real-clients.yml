name: ACP Real-Client Integration Tests

# CREDIBLE-057: Replay recorded Zed and JetBrains ACP fixture messages against
# the chump ACP server and validate protocol compliance without running live
# editor GUI in CI.
#
# Fixture approach: tests/fixtures/acp/real-clients/<client>/<op>.json contain
# the exact JSON-RPC messages Zed and JetBrains actually send. CI replays them
# and validates response shapes.
#
# Gate control:
#   CHUMP_ACP_REAL_CLIENT_GATE=per-pr   — run on every qualifying PR (default)
#   CHUMP_ACP_REAL_CLIENT_GATE=nightly  — skip per-PR; let nightly workflow run it
#
# The nightly workflow (.github/workflows/e2e-dogfood-nightly.yml) can override
# this to nightly when the CREDIBLE pillar share exceeds 50% of the open gap pool.
# To flip back to per-PR, set the env var to "per-pr" or remove the override.

on:
  push:
    branches: [main]
    paths:
      - 'src/acp.rs'
      - 'src/acp_server.rs'
      - 'src/tool_middleware.rs'
      - 'crates/chump-tool-macro/**'
      - 'scripts/ci/test-acp-real-clients.sh'
      - 'tests/fixtures/acp/real-clients/**'
      - '.github/workflows/acp-real-clients.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/acp.rs'
      - 'src/acp_server.rs'
      - 'src/tool_middleware.rs'
      - 'crates/chump-tool-macro/**'
      - 'scripts/ci/test-acp-real-clients.sh'
      - 'tests/fixtures/acp/real-clients/**'
      - '.github/workflows/acp-real-clients.yml'
  merge_group:
  workflow_dispatch:
    inputs:
      gate_mode:
        description: 'Gate mode: per-pr or nightly'
        required: false
        default: 'per-pr'

concurrency:
  group: acp-real-clients-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

env:
  CARGO_TERM_COLOR: always
  # Default gate mode. Set to 'nightly' in repo/org secrets to defer to nightly
  # when CREDIBLE pillar share > 50%.
  CHUMP_ACP_REAL_CLIENT_GATE: ${{ vars.CHUMP_ACP_REAL_CLIENT_GATE || inputs.gate_mode || 'per-pr' }}

jobs:
  acp-real-clients:
    name: ACP real-client — ${{ matrix.client }}
    runs-on: ubuntu-latest

    # AC#2: matrix over Zed stable, Zed preview, JetBrains (Community + Ultimate
    # use identical ACP message shapes — represented by the 'jetbrains' fixture set).
    strategy:
      fail-fast: false
      matrix:
        client:
          - name: zed-stable
            fixture_dir: zed-stable
            display: Zed stable (0.169.x)
          - name: zed-preview
            fixture_dir: zed-preview
            display: Zed preview (0.170.x-pre)
          - name: jetbrains-community
            fixture_dir: jetbrains
            display: JetBrains IDEA Community 2025.1
          - name: jetbrains-ultimate
            fixture_dir: jetbrains
            display: JetBrains IDEA Ultimate 2025.1

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        if: runner.os == 'Linux'  # INFRA-1539: proactive Linux-only guard
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq

      - name: Build debug binary
        run: cargo build 2>&1

      - name: Check gate mode
        run: |
          echo "Gate mode: $CHUMP_ACP_REAL_CLIENT_GATE"
          echo "Client: ${{ matrix.client.display }}"

      - name: Run ACP real-client integration tests — ${{ matrix.client.display }}
        env:
          CHUMP_BIN: ./target/debug/chump
          # No live model needed — fixture replay validates protocol shape only.
          OPENAI_API_BASE: http://localhost:11434/v1
          OPENAI_API_KEY: fixture-replay
          OPENAI_MODEL: fixture-model
          CHUMP_ACP_CLIENT_FIXTURE: ${{ matrix.client.fixture_dir }}
          CHUMP_ACP_ARTIFACT_DIR: ${{ github.workspace }}/tests/fixtures/acp/real-clients
        run: |
          bash scripts/ci/test-acp-real-clients.sh

      # AC#4: attach ACP protocol JSON diff as artifact for PR triage.
      - name: Upload ACP protocol diffs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: acp-protocol-diffs-${{ matrix.client.name }}
          path: tests/fixtures/acp/real-clients/protocol-diffs.txt
          retention-days: 14

      - name: Post protocol diff summary to step summary
        if: always()
        run: |
          DIFF_FILE="tests/fixtures/acp/real-clients/protocol-diffs.txt"
          echo "## ACP Protocol Diff — ${{ matrix.client.display }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f "$DIFF_FILE" ]]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "$DIFF_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No diff file generated._" >> "$GITHUB_STEP_SUMMARY"
          fi

  # AC#5: force-fire check — deliberately broken acp_server change must fail.
  acp-force-fire:
    name: ACP force-fire fixture (CREDIBLE-057)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        if: runner.os == 'Linux'  # INFRA-1539: proactive Linux-only guard
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq

      - name: Build debug binary
        run: cargo build 2>&1

      - name: Verify force-fire fixture detects snake_case protocol violation
        env:
          CHUMP_BIN: ./target/debug/chump
          CHUMP_ACP_REAL_CLIENT_GATE: per-pr
          CHUMP_ACP_ARTIFACT_DIR: ${{ github.workspace }}/tests/fixtures/acp/real-clients
        run: |
          # The force-fire fixture (tests/fixtures/acp/real-clients/force-fire-broken.json)
          # contains a response with snake_case 'session_id' instead of camelCase 'sessionId'.
          # The test harness must detect this as a protocol violation.
          bash scripts/ci/test-acp-real-clients.sh

      - name: Confirm force-fire fixture file exists
        run: |
          test -f tests/fixtures/acp/real-clients/force-fire-broken.json || {
            echo "FAIL: force-fire fixture missing" >&2
            exit 1
          }
          echo "PASS: force-fire fixture present"
          jq '.violation' tests/fixtures/acp/real-clients/force-fire-broken.json
