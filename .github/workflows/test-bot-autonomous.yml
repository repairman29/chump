# CREDIBLE-002: pre-deploy assertion — pr-triage-bot must be autonomous.
#
# Fires when any PR touches pr-triage-bot.yml or related bot scripts.
# Creates a fixture PR with a known clippy lint and asserts that
# pr-triage-bot auto-commits a fix within 15 minutes.
#
# This is an E2E integration test — it takes up to 15 min (fixture PR CI
# must run + bot must fire). Only runs on changes that could break the bot.

name: test-bot-autonomous (CREDIBLE-002)

on:
  pull_request:
    paths:
      - .github/workflows/pr-triage-bot.yml
      - scripts/ci/test-bot-autonomous.sh

permissions:
  contents: write
  pull-requests: write

# INFRA-1378: per-PR group, cancel-in-progress so redundant fixture-PR cycles dedupe.
concurrency:
  group: test-bot-autonomous-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  bot-autonomous:
    name: assert pr-triage-bot commits auto-fix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      # Allow up to 18 min for CI + bot lag (20 min job timeout gives 2 min buffer)
      BOT_AUTONOMOUS_WAIT_SECS: "1080"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run bot-autonomous assertion
        run: bash scripts/ci/test-bot-autonomous.sh

      - name: Upload ambient log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-autonomous-ambient-log
          path: .chump-locks/ambient.jsonl
          if-no-files-found: ignore
