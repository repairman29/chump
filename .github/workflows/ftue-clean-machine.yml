name: FTUE clean-machine verification (PRODUCT-017)

# Each run is an ephemeral macos-latest VM with no prior brew/chump artifacts —
# the closest substitute for a wiped Mac. Triggers:
#   - workflow_dispatch: on demand
#   - schedule: monthly cadence required by PRODUCT-017
#
# On success, opens a PR with docs/FTUE-VERIFICATION-YYYY-MM-DD.md so the
# verification record lands in main alongside the formula state that produced it.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 1 * *'  # 1st of each month, 12:00 UTC

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ftue-clean-machine
  cancel-in-progress: false

jobs:
  verify:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Brew install chump from local formula
        id: install
        run: |
          set -euo pipefail
          INSTALL_START=$(date +%s)
          brew install --build-from-source ./Formula/chump.rb
          INSTALL_END=$(date +%s)
          echo "install_seconds=$((INSTALL_END - INSTALL_START))" >> "$GITHUB_OUTPUT"
          which chump
          chump --version

      - name: FTUE stopwatch
        id: ftue
        run: |
          set -uo pipefail
          STOPWATCH_START=$(date +%s)
          set +e
          NO_BROWSER=1 FTUE_BUDGET=90 ./scripts/eval/measure-ftue.sh --no-browser --budget 90 \
            > /tmp/ftue.log 2>&1
          FTUE_EXIT=$?
          set -e
          STOPWATCH_END=$(date +%s)
          STOPWATCH_ELAPSED=$((STOPWATCH_END - STOPWATCH_START))
          echo "stopwatch_seconds=${STOPWATCH_ELAPSED}" >> "$GITHUB_OUTPUT"
          echo "ftue_exit=${FTUE_EXIT}" >> "$GITHUB_OUTPUT"
          cat /tmp/ftue.log

      - name: Write verification doc
        id: doc
        if: always()
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          OUT="docs/FTUE-VERIFICATION-${DATE}.md"
          INSTALL_S="${{ steps.install.outputs.install_seconds }}"
          STOPWATCH_S="${{ steps.ftue.outputs.stopwatch_seconds }}"
          FTUE_EXIT="${{ steps.ftue.outputs.ftue_exit }}"
          if [[ "${FTUE_EXIT}" == "0" ]]; then
            VERDICT="PASS (within 90s budget)"
          else
            VERDICT="FAIL (exit=${FTUE_EXIT})"
          fi
          {
            echo "# FTUE clean-machine verification — ${DATE}"
            echo
            echo "**Runner:** macos-latest (ephemeral GitHub-hosted)"
            echo "**Trigger:** ${{ github.event_name }}"
            echo "**Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "**Commit under test:** ${{ github.sha }}"
            echo
            echo "## Verdict: ${VERDICT}"
            echo
            echo "| Phase | Seconds |"
            echo "|---|---|"
            echo "| brew install --build-from-source | ${INSTALL_S} |"
            echo "| chump init → PWA responsive (stopwatch) | ${STOPWATCH_S} |"
            echo
            echo "## Stopwatch log"
            echo
            echo '```'
            cat /tmp/ftue.log || echo "(no log)"
            echo '```'
            echo
            echo "---"
            echo
            echo "Generated by .github/workflows/ftue-clean-machine.yml. Monthly cadence per PRODUCT-017."
          } > "$OUT"
          echo "out=${OUT}" >> "$GITHUB_OUTPUT"
          cat "$OUT"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ftue-verification-${{ github.run_id }}
          path: docs/FTUE-VERIFICATION-*.md
          if-no-files-found: error

      - name: Open PR with verification doc
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="ftue-verification/${DATE}-${{ github.run_id }}"
          git config user.name "chump-ftue-bot"
          git config user.email "ftue-bot@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add docs/FTUE-VERIFICATION-*.md
          git commit -m "PRODUCT-017: FTUE clean-machine verification ${DATE} (${{ steps.ftue.outputs.stopwatch_seconds }}s, exit=${{ steps.ftue.outputs.ftue_exit }})"
          git push origin "${BRANCH}"
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "PRODUCT-017: FTUE verification ${DATE} (${{ steps.ftue.outputs.stopwatch_seconds }}s)" \
            --body "Monthly clean-machine verification per PRODUCT-017. Source: workflow run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

Verdict: ${{ steps.ftue.outputs.ftue_exit == '0' && 'PASS' || 'FAIL' }}
Stopwatch: ${{ steps.ftue.outputs.stopwatch_seconds }}s (budget 90s)
brew install: ${{ steps.install.outputs.install_seconds }}s

🤖 Auto-generated by .github/workflows/ftue-clean-machine.yml"
