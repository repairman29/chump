name: FTUE clean-machine verification (PRODUCT-017)

# Each run is an ephemeral macos-latest VM with no prior brew/chump artifacts —
# the closest substitute for a wiped Mac. Triggers (INFRA-171, 2026-04-29):
#   - workflow_dispatch: on demand
#   - pull_request (path-filtered): when install-path code changes (Formula/,
#     chump_init.rs, measure-ftue.sh, the workflow itself). Catches regressions
#     in the SAME PR that introduces them — not a month later.
#   - push to main: same path filter — backstop for anything that bypassed
#     the PR check (e.g. direct pushes from this workflow itself).
#   - schedule: weekly cadence catches transitive breakage (dep updates,
#     env drift) that path-filtering misses. Monthly was too slow per
#     INFRA-171 — if PRODUCT-017 regresses on a Tuesday, we'd hear about
#     it on May 1, not the same day.
#
# On success, opens a PR with docs/FTUE-VERIFICATION-YYYY-MM-DD.md so the
# verification record lands in main alongside the formula state that produced it.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'Formula/**'
      - 'src/chump_init.rs'
      - 'scripts/eval/measure-ftue.sh'
      - '.github/workflows/ftue-clean-machine.yml'
  push:
    branches: [main]
    paths:
      - 'Formula/**'
      - 'src/chump_init.rs'
      - 'scripts/eval/measure-ftue.sh'
      - '.github/workflows/ftue-clean-machine.yml'
  schedule:
    - cron: '0 12 * * 1'  # every Monday 12:00 UTC (weekly per INFRA-171)

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ftue-clean-machine
  cancel-in-progress: false

jobs:
  verify:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Brew install chump (mirror documented user path)
        id: install
        run: |
          set -euo pipefail
          # INFRA-161 (2026-04-28): modern Homebrew rejects formula paths
          # outside a tap ("Homebrew requires formulae to be in a tap").
          # The documented user install path (docs/process/ONBOARDING.md) is
          # `brew tap repairman29/chump && brew install chump`. Mirror that
          # exactly so the verification reflects the real user experience —
          # not a workflow-only shortcut. Build a throwaway local tap from
          # this checkout's Formula/chump.rb so we test the formula-as-shipped.
          INSTALL_START=$(date +%s)
          TAP_NAME="chump-ci/local"
          brew tap-new "$TAP_NAME" --no-git --quiet
          TAP_DIR=$(brew --repo "$TAP_NAME")
          mkdir -p "$TAP_DIR/Formula"
          cp ./Formula/chump.rb "$TAP_DIR/Formula/"
          brew install --build-from-source "$TAP_NAME/chump"
          INSTALL_END=$(date +%s)
          echo "install_seconds=$((INSTALL_END - INSTALL_START))" >> "$GITHUB_OUTPUT"
          which chump
          chump --version || true   # don't fail run on cosmetic --version diff

      - name: FTUE stopwatch
        id: ftue
        run: |
          set -uo pipefail
          STOPWATCH_START=$(date +%s)
          set +e
          NO_BROWSER=1 FTUE_BUDGET=90 ./scripts/eval/measure-ftue.sh --no-browser --budget 90 \
            > /tmp/ftue.log 2>&1
          FTUE_EXIT=$?
          set -e
          STOPWATCH_END=$(date +%s)
          STOPWATCH_ELAPSED=$((STOPWATCH_END - STOPWATCH_START))
          echo "stopwatch_seconds=${STOPWATCH_ELAPSED}" >> "$GITHUB_OUTPUT"
          echo "ftue_exit=${FTUE_EXIT}" >> "$GITHUB_OUTPUT"
          cat /tmp/ftue.log

      - name: Write verification doc
        id: doc
        if: always()
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          OUT="docs/FTUE-VERIFICATION-${DATE}.md"
          INSTALL_S="${{ steps.install.outputs.install_seconds }}"
          STOPWATCH_S="${{ steps.ftue.outputs.stopwatch_seconds }}"
          FTUE_EXIT="${{ steps.ftue.outputs.ftue_exit }}"
          if [[ "${FTUE_EXIT}" == "0" ]]; then
            VERDICT="PASS (within 90s budget)"
          else
            VERDICT="FAIL (exit=${FTUE_EXIT})"
          fi
          {
            echo "# FTUE clean-machine verification — ${DATE}"
            echo
            echo "**Runner:** macos-latest (ephemeral GitHub-hosted)"
            echo "**Trigger:** ${{ github.event_name }}"
            echo "**Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "**Commit under test:** ${{ github.sha }}"
            echo
            echo "## Verdict: ${VERDICT}"
            echo
            echo "| Phase | Seconds |"
            echo "|---|---|"
            echo "| brew install --build-from-source | ${INSTALL_S} |"
            echo "| chump init → PWA responsive (stopwatch) | ${STOPWATCH_S} |"
            echo
            echo "## Stopwatch log"
            echo
            echo '```'
            cat /tmp/ftue.log || echo "(no log)"
            echo '```'
            echo
            echo "---"
            echo
            echo "Generated by .github/workflows/ftue-clean-machine.yml. Cadence: per-PR (path-filtered) + push-to-main + weekly Mon 12:00 UTC + on-demand (INFRA-171)."
          } > "$OUT"
          echo "out=${OUT}" >> "$GITHUB_OUTPUT"
          cat "$OUT"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ftue-verification-${{ github.run_id }}
          path: docs/FTUE-VERIFICATION-*.md
          if-no-files-found: error

      - name: Open PR with verification doc
        # INFRA-171: skip on pull_request triggers — the run already gates
        # the PR via required-check; creating a verification PR per source
        # PR would be downstream noise. Schedule + push + workflow_dispatch
        # still create the persistent artifact PR.
        if: always() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # INFRA-169 (2026-04-29): operator enabled Settings → Actions →
          # General → "Allow GitHub Actions to create and approve pull
          # requests", so we can `gh pr create` again. Direct-push (the
          # INFRA-162 workaround) was caught between two restrictions
          # (Actions PR-create disabled AND branch protection rejecting
          # direct pushes); the PR path now works AND respects branch
          # protection (PR + 3 required checks).
          #
          # NOTE: every line of the --body string MUST stay indented
          # within this `run: |` block. A blank line followed by a
          # column-1 token like "Verdict:" terminates YAML's pipe scalar
          # at parse time (INFRA-157, ate ~30 runs before the fix).
          # Build the body in a bash heredoc so YAML never sees its
          # newlines.
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="ftue-verification/${DATE}-${{ github.run_id }}"
          git config user.name "chump-ftue-bot"
          git config user.email "ftue-bot@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add docs/FTUE-VERIFICATION-*.md
          if git diff --staged --quiet; then
            echo "[ftue] no verification doc staged — earlier step probably failed; skipping PR"
            exit 0
          fi
          # CHUMP_GAP_CHECK=0 because the commit references PRODUCT-017
          # but doesn't flip its status (additive artifact, not re-open).
          CHUMP_GAP_CHECK=0 git commit -m "PRODUCT-017: FTUE clean-machine verification ${DATE} (${{ steps.ftue.outputs.stopwatch_seconds }}s, exit=${{ steps.ftue.outputs.ftue_exit }})"
          CHUMP_GAP_CHECK=0 git push origin "${BRANCH}"
          BODY=$(cat <<EOF
          Auto-generated FTUE verification per PRODUCT-017. Source: workflow run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

          Verdict: ${{ steps.ftue.outputs.ftue_exit == '0' && 'PASS' || 'FAIL' }}
          Stopwatch: ${{ steps.ftue.outputs.stopwatch_seconds }}s (budget 90s)
          brew install: ${{ steps.install.outputs.install_seconds }}s
          Trigger: ${{ github.event_name }}

          🤖 Auto-generated by .github/workflows/ftue-clean-machine.yml
          EOF
          )
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "PRODUCT-017: FTUE verification ${DATE} (${{ steps.ftue.outputs.stopwatch_seconds }}s)" \
            --body "${BODY}"
          gh pr merge "${BRANCH}" --auto --squash || true
