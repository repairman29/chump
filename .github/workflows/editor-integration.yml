name: Editor Integration (ACP)

# ACP-003: Real-editor integration smoke tests.
# Drives the chump --acp binary with JSON-RPC messages and validates protocol
# responses without requiring a live model server.
# Covers: initialize, session/new, session/list lifecycle.
# Snapshot fixtures (tests/fixtures/acp/) are written and committed on pass.

on:
  push:
    branches: [main]
    paths:
      - 'src/acp.rs'
      - 'src/acp_server.rs'
      - 'crates/chump-tool-macro/**'
      - '.github/workflows/editor-integration.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/acp.rs'
      - 'src/acp_server.rs'
      - 'crates/chump-tool-macro/**'
      - '.github/workflows/editor-integration.yml'
  merge_group:

concurrency:
  group: acp-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  acp-smoke:
    name: ACP protocol smoke test (Zed / JetBrains compatible)
    # INFRA-1535 stage 3: self-hosted routing (M4 has chromedriver + Chrome + node installed)
    runs-on: ${{ vars.CHUMP_SELF_HOSTED_ENABLED == 'true' && vars.CHUMP_SELF_HOSTED_ACP != 'false' && fromJSON('["self-hosted","macos-arm64","chump-fleet"]') || 'ubuntu-latest' }}  # INFRA-1567: ACP lane
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # INFRA-2126: per-run unique key prevents concurrent PRs from fighting over the
          # same cache slot (Cargo.lock-keyed) and failing at cache-save phase. Only main
          # writes the shared cache; PR runs restore-only, preventing cache pollution.
          key-suffix: ${{ github.run_id }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq

      - name: Build debug binary
        # INFRA-1600 follow-up: self-hosted runner launchctl PATH lacks $HOME/.cargo/bin;
        # the shared helper restores it.
        run: |
          source scripts/ci/lib/ensure-cargo-on-path.sh
          cargo build 2>&1

      - name: Run ACP smoke test
        env:
          # No model needed for initialize/session/new
          OPENAI_API_BASE: http://localhost:11434/v1
          OPENAI_API_KEY: smoke-test
          OPENAI_MODEL: smoke-model
        # INFRA-1600 follow-up: honor $CARGO_TARGET_DIR (shared cache redirects build output).
        run: |
          source scripts/ci/lib/ensure-cargo-on-path.sh
          export REPO_ROOT="$(pwd)"
          source scripts/ci/lib/discover-chump-bin.sh
          bash scripts/ci/test-acp-smoke.sh

      - name: Verify snapshot fixtures were written
        run: |
          test -f tests/fixtures/acp/initialize_shape.json
          test -f tests/fixtures/acp/session_new_shape.json
          echo "Snapshots:"
          cat tests/fixtures/acp/initialize_shape.json
          cat tests/fixtures/acp/session_new_shape.json

      - name: Check snapshot shape has expected keys
        run: |
          # initialize response should have result with agentCapabilities and protocolVersion
          INIT_KEYS=$(jq -r '.result_keys[]' tests/fixtures/acp/initialize_shape.json | sort | tr '\n' ',')
          echo "initialize result keys: $INIT_KEYS"
          echo "$INIT_KEYS" | grep -qi "capabilities"
          echo "$INIT_KEYS" | grep -q "protocolVersion"

          # session/new response should have result with sessionId
          SN_KEYS=$(jq -r '.result_keys[]' tests/fixtures/acp/session_new_shape.json | sort | tr '\n' ',')
          echo "session/new result keys: $SN_KEYS"
          echo "$SN_KEYS" | grep -q "sessionId"

      - name: Upload ACP snapshot artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: acp-snapshots
          path: tests/fixtures/acp/
          retention-days: 30
