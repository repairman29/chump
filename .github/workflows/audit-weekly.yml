name: Weekly audit

# INFRA-044: run scripts/audit/run-all.sh on a weekly cron and on manual
# dispatch. Commits docs/audits/findings-YYYY-MM-DD.md and fails the job
# when a Critical-tier finding (CVE, license conflict) is reported.

on:
  schedule:
    - cron: "17 8 * * 1"  # Mondays 08:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: audit-weekly
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: audit-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install cargo-binstall
        # INFRA-2244: cargo-binstall fetches pre-built binaries (~5s/tool) vs
        # cargo install's compile-from-source (~90s/tool). Cuts the audit job
        # install phase from ~6min to ~30s on cold caches.
        uses: cargo-bins/cargo-binstall@main

      - name: Install audit tools
        run: |
          set -e
          install_if_missing() {
            local bin="$1" crate="$2"
            if ! command -v "$bin" >/dev/null 2>&1; then
              # INFRA-2244: binstall first (binary download), fall back to
              # cargo install (compile) only if no pre-built binary exists.
              cargo binstall -y --locked "$crate" \
                || cargo install --locked "$crate" \
                || echo "::warning::$crate install failed; tool will be skipped"
            fi
          }
          install_if_missing cargo-deny cargo-deny
          install_if_missing cargo-audit cargo-audit
          install_if_missing cargo-machete cargo-machete
          # INFRA-2244: cargo-shear is more aggressive than cargo-machete for
          # surfacing 'listed in Cargo.toml but never imported' deps.
          install_if_missing cargo-shear cargo-shear
          install_if_missing lychee lychee
          # cargo-udeps skipped (nightly-only; the dispatcher falls back to machete)

      - name: Run audit dispatcher
        id: audit
        continue-on-error: true
        run: |
          bash scripts/audit/run-all.sh
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Upload findings as artifact
        uses: actions/upload-artifact@v7
        with:
          name: audit-findings
          path: docs/audits/findings-*.md
          if-no-files-found: error

      - name: Commit findings to main
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/audits/findings-*.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(audit): weekly findings $(date +%Y-%m-%d) [skip ci]"
          git push origin HEAD:main || {
            echo "::warning::direct push to main failed; findings are available as the workflow artifact"
            exit 0
          }

      - name: Fail on Critical
        if: steps.audit.outcome == 'failure'
        run: |
          echo "::error::Audit dispatcher reported Critical-tier findings — see docs/audits/findings-*.md"
          exit 1
