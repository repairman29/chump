name: release-plz

on:
  push:
    branches:
      - main
    paths:
      - "chump-tool-macro/**"
      - "crates/chump-coord/**"
      - "crates/chump-perception/**"
      - ".release-plz.toml"
      - "Cargo.lock"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no publishing)"
        required: false
        default: "true"
        type: boolean

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test and verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

      - name: Run security audit
        run: cargo audit

      - name: Check MSRV for publishable crates
        run: |
          cargo check --manifest-path chump-tool-macro/Cargo.toml
          cargo check --manifest-path crates/chump-coord/Cargo.toml
          cargo check --manifest-path crates/chump-perception/Cargo.toml

  release-plz:
    name: Release (dry-run)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      pull-requests: write
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install release-plz
        run: cargo install release-plz --version "^0.3"

      - name: Run release-plz (dry-run)
        run: |
          release-plz release-pr \
            --backend github \
            --git-token "${{ secrets.GITHUB_TOKEN }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Report dry-run status
        run: |
          echo "✓ Dry-run complete"
          echo "  If no PR was created, all packages are already at the latest version"
          echo "  or a release PR was already open (check existing PRs)."

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release-plz
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install release-plz
        run: cargo install release-plz --version "^0.3"

      - name: Check for release PR
        id: check-pr
        run: |
          # release-plz will only publish if all checks pass and a release commit exists
          # This step is informational; actual publishing happens via release-plz
          echo "status=ready" >> $GITHUB_OUTPUT

      - name: Publish (via release-plz)
        if: steps.check-pr.outputs.status == 'ready'
        run: |
          release-plz release publish \
            --backend github \
            --git-token "${{ secrets.GITHUB_TOKEN }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
