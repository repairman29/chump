name: release-plz

# Runs on main after changes to publishable crates; opens release PRs and
# publishes to crates.io when a release PR is merged.
# Why: automates the tedious version-bump + publish dance for chump-coord,
# chump-perception, and chump-tool-macro.

on:
  push:
    branches:
      - main
    paths:
      - "chump-tool-macro/**"
      - "crates/chump-coord/**"
      - "crates/chump-perception/**"
      - ".release-plz.toml"
      - "Cargo.lock"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no publishing)"
        required: false
        default: "true"
        type: boolean

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

# INFRA-1378: workflow-level group, do NOT cancel — release PRs serialize and
# must finish to keep crates.io publish state consistent.
concurrency:
  group: release-plz
  cancel-in-progress: false

jobs:
  test:
    name: Test and verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies for chump-desktop (workspace member)
        if: runner.os == 'Linux'  # INFRA-1539: proactive Linux-only guard
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            util-linux

      - name: Run tests
        run: cargo test --workspace

      - name: Run security audit
        run: cargo audit

      - name: Check MSRV for publishable crates
        run: |
          cargo check --manifest-path chump-tool-macro/Cargo.toml
          cargo check --manifest-path crates/chump-coord/Cargo.toml
          cargo check --manifest-path crates/chump-perception/Cargo.toml

  release-plz:
    name: Release (dry-run)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      pull-requests: write
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install release-plz
        run: cargo install release-plz --version "^0.3"

      - name: Run release-plz (dry-run)
        run: |
          release-plz release-pr \
            --backend github \
            --git-token "${{ secrets.GITHUB_TOKEN }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Report dry-run status
        run: |
          echo "✓ Dry-run complete"
          echo "  If no PR was created, all packages are already at the latest version"
          echo "  or a release PR was already open (check existing PRs)."

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release-plz
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install release-plz
        run: cargo install release-plz --version "^0.3"

      - name: Check for release PR
        id: check-pr
        run: |
          # release-plz will only publish if all checks pass and a release commit exists
          # This step is informational; actual publishing happens via release-plz
          echo "status=ready" >> $GITHUB_OUTPUT

      - name: Publish (via release-plz)
        if: steps.check-pr.outputs.status == 'ready'
        run: |
          release-plz release publish \
            --backend github \
            --git-token "${{ secrets.GITHUB_TOKEN }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
