# INFRA-624: pr-triage-bot — autonomous PR babysitting.
#
# When CI completes on a PR with a failure, classify the failed jobs and
# either auto-fix (lint class), file an auto-promoted P0 fix gap (test
# class), or comment + label (other). Replaces the manual "wake every
# 5min, check PRs, fix red X" loop a session has to run today.
#
# Two jobs:
#  (1) auto-fix-lint  — fires on workflow_run.completed for the CI
#                       workflow when conclusion==failure and the only
#                       failing required jobs are lint-class (clippy
#                       and/or fmt). Clones PR branch, runs
#                       `cargo clippy --fix && cargo fmt`, force-pushes
#                       with bot identity, comments on PR.
#  (2) file-fix-gap   — fires on check_run.completed for any failing
#                       check on a PR. Files a CREDIBLE P0 fix gap so
#                       the fleet picks up the failure without operator
#                       intervention (works alongside INFRA-627
#                       auto-promotion).
#
# Bot identity: chump-pr-triage-bot. Author can revert if a fix is wrong.
#
# Permissions: contents:write (push lint fixes + commit gap registry),
# pull-requests:write (comment + label).

name: pr-triage-bot

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  check_run:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

# INFRA-1378: per-PR group, cancel-in-progress so redundant triage attempts dedupe.
concurrency:
  group: pr-triage-bot-${{ github.event.workflow_run.pull_requests[0].number || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────
  # JOB 1: auto-fix lint failures
  # Fires once per CI workflow completion. Skipped if not failure or
  # not from a PR or has any non-lint failures.
  # ────────────────────────────────────────────────────────────────────
  auto-fix-lint:
    # INFRA-624 fix: GitHub fires workflow_run.event='push' for same-repo PRs
    # (not 'pull_request'), so the original filter excluded every real PR run
    # and the bot only triggered on main pushes. Use head_branch instead —
    # any branch other than main is a candidate PR. The "Resolve PR" step
    # below confirms via gh API and skips if no PR is associated.
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Resolve PR + branch
        id: pr
        env:
          BRANCH_FROM_RUN: ${{ github.event.workflow_run.head_branch }}
        run: |
          # NOTE: removed `set -e` so PR-lookup misses don't kill the step.
          # GitHub only populates workflow_run.pull_requests for runs from
          # `pull_request` events. Same-repo PR pushes register as `push`
          # events with empty pull_requests. Fall back to searching by
          # head_branch via `gh pr list`.
          set -uo pipefail
          RUN_ID=${{ github.event.workflow_run.id }}
          PR=$(gh api "/repos/${{ github.repository }}/actions/runs/$RUN_ID" \
                --jq '.pull_requests[0].number // empty' 2>/dev/null || true)
          if [ -z "$PR" ] && [ -n "$BRANCH_FROM_RUN" ]; then
            # Search by head branch (works for push-triggered PR runs).
            PR=$(gh pr list --head "$BRANCH_FROM_RUN" --state open \
                  --json number --jq '.[0].number // empty' 2>/dev/null || true)
          fi
          if [ -z "$PR" ]; then
            echo "::notice::No open PR for run $RUN_ID (branch=$BRANCH_FROM_RUN) — skip"
            {
              echo "skip=true"
              echo "number="
              echo "branch=$BRANCH_FROM_RUN"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          STATE=$(gh pr view "$PR" --json state --jq .state 2>/dev/null || echo "UNKNOWN")
          if [ "$STATE" != "OPEN" ]; then
            echo "::notice::PR #$PR is $STATE — skip"
            {
              echo "skip=true"
              echo "number=$PR"
              echo "branch=$BRANCH_FROM_RUN"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BRANCH=$(gh pr view "$PR" --json headRefName --jq .headRefName 2>/dev/null || echo "$BRANCH_FROM_RUN")
          {
            echo "skip=false"
            echo "number=$PR"
            echo "branch=$BRANCH"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::Triaging PR #$PR ($BRANCH)"

      - name: Classify failed jobs (lint-only?)
        id: classify
        if: steps.pr.outputs.skip == 'false'
        run: |
          set -euo pipefail
          RUN_ID=${{ github.event.workflow_run.id }}
          FAILED=$(gh api "/repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs" \
                    --jq '[.jobs[] | select(.conclusion == "failure") | .name] | join(",")')
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          # Lint-class iff every failing job matches clippy/fmt/test-rollup
          # The "test" job is a rollup that fails when shards fail, so it's
          # OK if clippy is the actual failure and "test" is the cascade.
          if echo "$FAILED" | grep -qE '\b(clippy|fmt)\b'; then
            if ! echo "$FAILED" | grep -qE '\b(cargo-test|e2e-pwa|e2e-golden-path|e2e-battle-sim|tauri-cowork-e2e|audit|ACP)\b'; then
              echo "lint_only=true" >> "$GITHUB_OUTPUT"
            else
              echo "lint_only=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "lint_only=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR branch
        if: >-
          steps.pr.outputs.skip == 'false' &&
          steps.classify.outputs.lint_only == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Rust
        if: >-
          steps.pr.outputs.skip == 'false' &&
          steps.classify.outputs.lint_only == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: cargo clippy --fix && cargo fmt
        if: >-
          steps.pr.outputs.skip == 'false' &&
          steps.classify.outputs.lint_only == 'true'
        run: |
          set -euo pipefail
          cargo clippy --bin chump --fix --allow-dirty --allow-staged 2>&1 | tail -10 || true
          # Try other binaries best-effort; ignore failures
          for b in bandit-replay; do
            cargo clippy --bin "$b" --fix --allow-dirty --allow-staged 2>&1 | tail -5 || true
          done
          cargo fmt

      - name: Commit + push lint fixes
        id: push
        if: >-
          steps.pr.outputs.skip == 'false' &&
          steps.classify.outputs.lint_only == 'true'
        env:
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          BRANCH: ${{ steps.pr.outputs.branch }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "::notice::No clippy/fmt changes — nothing to push"
            echo "pushed=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          git config user.name 'chump-pr-triage-bot'
          git config user.email 'chump-pr-triage-bot@users.noreply.github.com'
          git add -A
          MSG=$(cat <<EOF
          [auto-fix] clippy + rustfmt — pr-triage-bot

            Resolves lint failures from CI run ${{ github.event.workflow_run.html_url }}.
            Bot: INFRA-624. Author can revert if the fix is wrong."
          git push origin "HEAD:${{ steps.pr.outputs.branch }}"
          Resolves lint failures from CI run ${RUN_URL}.
          Bot: INFRA-624. Author can revert if the fix is wrong.
          EOF
          )
          git commit -m "${MSG}"
          git push origin "HEAD:${BRANCH}"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Comment on PR (lint fix applied)
        if: >-
          steps.pr.outputs.skip == 'false' &&
          steps.classify.outputs.lint_only == 'true' &&
          steps.push.outputs.pushed == 'true'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          FAILED: ${{ steps.classify.outputs.failed }}
        run: |
          set -euo pipefail
          BODY=$(cat <<EOF
          🤖 **pr-triage-bot** auto-applied \`cargo clippy --fix && cargo fmt\` to resolve lint failures.

          - Triggered by: failed run [${RUN_ID}](${RUN_URL})
          - Failed jobs: \`${FAILED}\`
          - CI re-runs on this push; auto-merge proceeds if green.

          *Bot is INFRA-624. Revert this commit if the lint fix is incorrect.*
          EOF
          )
          gh pr comment "${PR_NUMBER}" --body "${BODY}"

  # ────────────────────────────────────────────────────────────────────
  # JOB 2: file P0 fix gap on real failures (existing skeleton, kept
  # alongside the auto-fix path so test-class failures get a tracked
  # fix-gap that the fleet picks up via INFRA-627 auto-promotion).
  # ────────────────────────────────────────────────────────────────────
  file-fix-gap:
    if: |
      github.event_name == 'check_run' &&
      github.event.check_run.conclusion == 'failure' &&
      github.event.check_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Classify failure via FAILURE_MODES.yaml catalog (INFRA-647)
        id: skip_check
        run: |
          set -euo pipefail
          NAME='${{ github.event.check_run.name }}'
          # Build chump binary first (needed for classify-failure).
          # We build here so the classify step has the binary ready.
          cargo build --bin chump -q 2>/dev/null || true

          # Classify: prefer catalog match; fall back to heuristic.
          if [ -f ./target/debug/chump ]; then
            RESULT=$(./target/debug/chump classify-failure --job "$NAME" --json 2>/dev/null || echo '{}')
          else
            RESULT='{}'
          fi

          CLASS=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('classification','real-bug'))" 2>/dev/null || echo "real-bug")
          ACTION=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('auto_action','file_gap'))" 2>/dev/null || echo "file_gap")
          CATALOG_ID=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id','unknown'))" 2>/dev/null || echo "unknown")

          echo "class=$CLASS"    >> "$GITHUB_OUTPUT"
          echo "action=$ACTION"  >> "$GITHUB_OUTPUT"
          echo "catalog_id=$CATALOG_ID" >> "$GITHUB_OUTPUT"

          # Skip if lint-class (auto-fix-lint handles it) and flake+infra without gap.
          # NOTE: keep the literal "Skip if lint-class" marker here — scripts/ci/test-pr-triage-bot.sh greps for it.
          if [ "$CLASS" = "lint" ]; then
            echo "::notice::Skipping file-fix-gap for lint-class job '$NAME' (catalog: $CATALOG_ID) — auto-fix-lint handles it"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ "$CLASS" = "flake" ] || [ "$CLASS" = "infra-broken" ]; then
            echo "::notice::Skipping gap-file for $CLASS job '$NAME' (catalog: $CATALOG_ID); action=$ACTION"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "should_rerun=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-rerun flake/infra-broken failures (INFRA-669)
        id: rerun
        if: >-
          steps.skip_check.outputs.should_rerun == 'true' &&
          github.event.check_run.pull_requests[0] != null
        env:
          PR_NUMBER: ${{ github.event.check_run.pull_requests[0].number }}
          CHECK_NAME: ${{ github.event.check_run.name }}
          CLASS: ${{ steps.skip_check.outputs.class }}
        run: |
          set -euo pipefail

          # Get the PR branch to find the associated workflow run.
          BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq .headRefName 2>/dev/null || echo "")
          if [ -z "$BRANCH" ]; then
            echo "::notice::Could not resolve PR #$PR_NUMBER branch — skip rerun"
            echo "rerun_attempted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Query the most recent workflow run for this branch.
          RUN=$(gh api "/repos/${{ github.repository }}/actions/runs" \
            --jq ".runs[] | select(.head_branch == \"$BRANCH\" and .name == \"CI\") | {id, run_attempt}" \
            --slurp --jq '.[0]' 2>/dev/null || echo "{}")

          RUN_ID=$(echo "$RUN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id', ''))" 2>/dev/null || echo "")
          RUN_ATTEMPT=$(echo "$RUN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('run_attempt', 1))" 2>/dev/null || echo "1")

          if [ -z "$RUN_ID" ]; then
            echo "::notice::Could not find workflow run for branch '$BRANCH' — skip rerun"
            echo "rerun_attempted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::notice::Found workflow run $RUN_ID (attempt $RUN_ATTEMPT) for $CLASS failure in check '$CHECK_NAME'"

          # Cap reruns at 3 attempts.
          if [ "$RUN_ATTEMPT" -lt 3 ]; then
            echo "::notice::Rerunning failed jobs in run $RUN_ID (attempt $RUN_ATTEMPT / 3)"
            gh run rerun "$RUN_ID" --failed 2>&1 | head -5 || true
            echo "rerun_attempted=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Reached rerun limit (attempt $RUN_ATTEMPT >= 3) — mark for investigation"
            echo "rerun_attempted=false" >> "$GITHUB_OUTPUT"
            echo "needs_investigation=true" >> "$GITHUB_OUTPUT"
          fi

      - name: File P0 fix gap
        id: file_gap
        if: steps.skip_check.outputs.skip == 'false'
        env:
          CHUMP_ALLOW_MAIN_WORKTREE: "1"
          CHUMP_RESERVE_NO_AUTOSTAGE: "1"
          FLEET_029_AMBIENT_GLANCE_SKIP: "1"
          CHUMP_RESERVE_VERIFY: "0"
          PR_NUMBER: ${{ github.event.check_run.pull_requests[0].number }}
          CHECK_NAME: ${{ github.event.check_run.name }}
          FAILURE_CLASS: ${{ steps.skip_check.outputs.class }}
          CATALOG_ID: ${{ steps.skip_check.outputs.catalog_id }}
        run: |
          set -euo pipefail
          GAP_TITLE="CREDIBLE: fix ${FAILURE_CLASS} failure '${CHECK_NAME}' in PR #${PR_NUMBER}"
          GAP_ID=$(./target/debug/chump gap reserve \
            --domain INFRA \
            --priority P0 \
            --effort xs \
            --title "${GAP_TITLE}" \
            --force \
            --quiet)
          ./target/debug/chump gap set "${GAP_ID}" \
            --notes "auto-filed by pr-triage-bot (INFRA-624); catalog entry: ${CATALOG_ID}; class: ${FAILURE_CLASS}" \
            --acceptance-criteria "CI check '${CHECK_NAME}' passes on PR #${PR_NUMBER} or the root cause is fixed in a follow-up PR"
          echo "GAP_ID=${GAP_ID}" >> "$GITHUB_OUTPUT"

      - name: Comment on PR + label (real failures)
        if: steps.skip_check.outputs.skip == 'false'
        env:
          PR_NUMBER: ${{ github.event.check_run.pull_requests[0].number }}
          CHECK_NAME: ${{ github.event.check_run.name }}
          FAILURE_CLASS: ${{ steps.skip_check.outputs.class }}
          CATALOG_ID: ${{ steps.skip_check.outputs.catalog_id }}
          GAP_ID: ${{ steps.file_gap.outputs.GAP_ID }}
        run: |
          gh pr comment "$PR_NUMBER" --body "🤖 **pr-triage-bot** detected a \`${FAILURE_CLASS}\` failure: \`${CHECK_NAME}\`.

          - Catalog entry: \`${CATALOG_ID}\` (INFRA-647 FAILURE_MODES.yaml)
          - Gap filed: \`${GAP_ID}\` — fleet picks it up via INFRA-627 auto-promotion.

          No author action required immediately, but feel free to investigate.

          *Bot is INFRA-624.*" || true
          gh pr edit "$PR_NUMBER" --add-label needs-fleet-pickup || true

      - name: Comment on PR (flake/infra rerun or investigation needed)
        if: steps.skip_check.outputs.should_rerun == 'true'
        env:
          PR_NUMBER: ${{ github.event.check_run.pull_requests[0].number }}
          CHECK_NAME: ${{ github.event.check_run.name }}
          CLASS: ${{ steps.skip_check.outputs.class }}
          RERUN_ATTEMPTED: ${{ steps.rerun.outputs.rerun_attempted }}
          NEEDS_INVESTIGATION: ${{ steps.rerun.outputs.needs_investigation }}
        run: |
          set -euo pipefail
          if [ "$RERUN_ATTEMPTED" = "true" ]; then
            BODY="🤖 **pr-triage-bot** detected a \`${CLASS}\` failure in \`${CHECK_NAME}\` and triggered an automatic rerun of failed jobs.

          No author action required — re-check CI status in a moment.

          *Bot is INFRA-669.*"
          elif [ "$NEEDS_INVESTIGATION" = "true" ]; then
            BODY="🤖 **pr-triage-bot** detected a \`${CLASS}\` failure in \`${CHECK_NAME}\` that has been rerun 3 times already.

          **Investigation needed** — please review the logs and determine root cause.

          *Bot is INFRA-669.*"
          else
            exit 0
          fi
          gh pr comment "$PR_NUMBER" --body "$BODY" || true

      - name: Commit updated gap registry
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          git config user.name  "chump-pr-triage-bot"
          git config user.email "chump-pr-triage-bot@users.noreply.github.com"
          git add .chump/state.sql docs/gaps.yaml docs/gaps/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "INFRA-624: auto-file P0 fix gap for failing PR CI"
          git push origin HEAD

  # ────────────────────────────────────────────────────────────────────
  # JOB 3: half-implementation detector (INFRA-671)
  # Fires on cargo-test failures with "no method named X" or "cannot find
  # function X" where X appears in PR diff as callsite but not definition.
  # Disables auto-merge, comments, files completion gap.
  # ────────────────────────────────────────────────────────────────────
  half-impl-detector:
    if: |
      github.event_name == 'check_run' &&
      github.event.check_run.conclusion == 'failure' &&
      github.event.check_run.name == 'cargo-test' &&
      github.event.check_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get PR info
        id: pr_info
        env:
          PR_NUMBER: ${{ github.event.check_run.pull_requests[0].number }}
        run: |
          PR_DATA=$(gh pr view "$PR_NUMBER" --json number,headRefName,baseRefName --jq '.')
          BRANCH=$(echo "$PR_DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['headRefName'])" 2>/dev/null || echo "")
          if [ -z "$BRANCH" ]; then
            echo "::notice::Could not resolve PR branch"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Get cargo-test failure logs
        id: logs
        if: steps.pr_info.outputs.skip == 'false'
        env:
          RUN_ID: ${{ github.event.check_run.check_run_id }}
          PR_NUMBER: ${{ github.event.check_run.pull_requests[0].number }}
        run: |
          # Get the workflow run ID from the check run
          BRANCH="${{ steps.pr_info.outputs.branch }}"

          # Query the most recent workflow run for this branch
          RUN=$(gh api "/repos/${{ github.repository }}/actions/runs" \
            --jq ".runs[] | select(.head_branch == \"$BRANCH\" and .name == \"CI\") | {id, run_attempt}" \
            --slurp --jq '.[0]' 2>/dev/null || echo "{}")

          RUN_ID=$(echo "$RUN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id', ''))" 2>/dev/null || echo "")
          if [ -z "$RUN_ID" ]; then
            echo "::notice::Could not find workflow run"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get the cargo-test job logs
          LOGS=$(gh run view "$RUN_ID" --log 2>/dev/null | grep -A 100 "cargo-test" || echo "")
          echo "logs=$LOGS" >> "$GITHUB_OUTPUT"

      - name: Detect half-implementation pattern
        id: detect
        if: steps.pr_info.outputs.skip == 'false'
        env:
          PR_NUMBER: ${{ github.event.check_run.pull_requests[0].number }}
          BRANCH: ${{ steps.pr_info.outputs.branch }}
        run: |
          set -euo pipefail
          LOGS="${{ steps.logs.outputs.logs }}"

          # Pattern: "no method named X" or "cannot find function X"
          PATTERN='no method named|cannot find function'
          if ! echo "$LOGS" | grep -E "$PATTERN" > /dev/null; then
            echo "::notice::No half-impl pattern found in logs"
            echo "detected=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract the symbol name (simple heuristic: word after "named" or "function")
          SYMBOL=$(echo "$LOGS" | grep -oE "(?:no method named|cannot find function) \`?[a-z_][a-z0-9_]*" | head -1 | grep -oE "[a-z_][a-z0-9_]*$" || echo "")
          if [ -z "$SYMBOL" ]; then
            echo "::notice::Could not extract symbol name"
            echo "detected=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get PR diff
          DIFF=$(gh pr diff "$PR_NUMBER" 2>/dev/null || echo "")

          # Check if symbol appears as callsite (fn call or method call) but not definition
          # Callsite patterns: symbol() or .symbol( or -> symbol (
          CALLSITE_PATTERN="(\.|->|\s)$SYMBOL\s*\(|$SYMBOL\s*\(|::\s*$SYMBOL\s*\("
          DEF_PATTERN="fn\s+$SYMBOL\s*\(|$SYMBOL\s*:\s*fn"

          HAS_CALLSITE=$(echo "$DIFF" | grep -E "^\+" | grep -E "$CALLSITE_PATTERN" > /dev/null && echo "true" || echo "false")
          HAS_DEF=$(echo "$DIFF" | grep -E "^\+" | grep -E "$DEF_PATTERN" > /dev/null && echo "true" || echo "false")

          echo "symbol=$SYMBOL" >> "$GITHUB_OUTPUT"
          echo "has_callsite=$HAS_CALLSITE" >> "$GITHUB_OUTPUT"
          echo "has_def=$HAS_DEF" >> "$GITHUB_OUTPUT"

          if [ "$HAS_CALLSITE" = "true" ] && [ "$HAS_DEF" = "false" ]; then
            echo "::notice::Detected half-implementation: $SYMBOL called but not defined"
            echo "detected=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Symbol pattern doesn't match half-implementation criteria"
            echo "detected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Disable auto-merge on PR
        if: >-
          steps.pr_info.outputs.skip == 'false' &&
          steps.detect.outputs.detected == 'true'
        env:
          PR_NUMBER: ${{ github.event.check_run.pull_requests[0].number }}
        run: |
          gh pr merge "$PR_NUMBER" --auto 2>/dev/null || true
          gh pr automerge disable "$PR_NUMBER" 2>/dev/null || true

      - name: File completion gap
        id: file_gap
        if: >-
          steps.pr_info.outputs.skip == 'false' &&
          steps.detect.outputs.detected == 'true'
        env:
          CHUMP_ALLOW_MAIN_WORKTREE: "1"
          CHUMP_RESERVE_NO_AUTOSTAGE: "1"
          FLEET_029_AMBIENT_GLANCE_SKIP: "1"
          CHUMP_RESERVE_VERIFY: "0"
          PR_NUMBER: ${{ github.event.check_run.pull_requests[0].number }}
          SYMBOL: ${{ steps.detect.outputs.symbol }}
        run: |
          set -euo pipefail
          cargo build --bin chump -q 2>/dev/null || true

          GAP_TITLE="CREDIBLE: complete implementation of $SYMBOL in PR #$PR_NUMBER"
          GAP_ID=$(./target/debug/chump gap reserve \
            --domain INFRA \
            --priority P1 \
            --effort s \
            --title "${GAP_TITLE}" \
            --force \
            --quiet)
          ./target/debug/chump gap set "${GAP_ID}" \
            --notes "auto-filed by half-impl-detector (INFRA-671) on PR #$PR_NUMBER; symbol: $SYMBOL" \
            --acceptance-criteria "Symbol \`$SYMBOL\` is fully implemented (definition exists) and all tests pass"
          echo "GAP_ID=${GAP_ID}" >> "$GITHUB_OUTPUT"

      - name: Comment on PR (half-implementation detected)
        if: >-
          steps.pr_info.outputs.skip == 'false' &&
          steps.detect.outputs.detected == 'true'
        env:
          PR_NUMBER: ${{ github.event.check_run.pull_requests[0].number }}
          SYMBOL: ${{ steps.detect.outputs.symbol }}
          GAP_ID: ${{ steps.file_gap.outputs.GAP_ID }}
        run: |
          BODY=$(cat <<'EOF'
          🤖 **pr-triage-bot** detected a half-implementation in this PR.

          The symbol `${SYMBOL}` is called in your code but not fully implemented (definition not found).

          - Completion gap filed: `${GAP_ID}`
          - Auto-merge has been disabled until this is resolved.

          Please implement the definition of `${SYMBOL}` or remove the callsite.

          *Bot is INFRA-671.*
          EOF
          )
          gh pr comment "$PR_NUMBER" --body "${BODY}" || true

      - name: Commit updated gap registry
        if: >-
          steps.pr_info.outputs.skip == 'false' &&
          steps.detect.outputs.detected == 'true'
        run: |
          git config user.name  "chump-pr-triage-bot"
          git config user.email "chump-pr-triage-bot@users.noreply.github.com"
          git add .chump/state.sql docs/gaps.yaml docs/gaps/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "INFRA-671: auto-file completion gap for half-implementation"
          git push origin HEAD
