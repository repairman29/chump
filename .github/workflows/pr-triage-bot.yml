# INFRA-624: pr-triage-bot — auto-file P0 bug-fix gaps for failing PRs.
# When a CI check run fails on a pull request, the bot files a CREDIBLE fix
# gap at P0 with notes="auto-filed by pr-triage-bot" so the fleet attacks it
# next cycle without operator intervention (INFRA-627).
name: pr-triage-bot

on:
  check_run:
    types: [completed]

jobs:
  triage-failure:
    if: |
      github.event.check_run.conclusion == 'failure' &&
      github.event.check_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build chump binary
        run: cargo build --bin chump -q

      - name: File P0 bug-fix gap
        env:
          CHUMP_ALLOW_MAIN_WORKTREE: "1"
          CHUMP_RESERVE_NO_AUTOSTAGE: "1"
          FLEET_029_AMBIENT_GLANCE_SKIP: "1"
          CHUMP_RESERVE_VERIFY: "0"
          PR_NUMBER: ${{ github.event.check_run.pull_requests[0].number }}
          CHECK_NAME: ${{ github.event.check_run.name }}
        run: |
          set -euo pipefail
          GAP_TITLE="CREDIBLE: fix CI failure '${CHECK_NAME}' in PR #${PR_NUMBER}"
          GAP_ID=$(./target/debug/chump gap reserve \
            --domain INFRA \
            --priority P0 \
            --effort xs \
            --title "${GAP_TITLE}" \
            --force \
            --quiet)
          echo "Reserved gap: ${GAP_ID}"

          ./target/debug/chump gap set "${GAP_ID}" \
            --notes "auto-filed by pr-triage-bot" \
            --acceptance-criteria "CI check '${CHECK_NAME}' passes on PR #${PR_NUMBER} or the root cause is fixed in a follow-up PR"

          echo "GAP_ID=${GAP_ID}" >> "$GITHUB_OUTPUT"

      - name: Commit updated gap registry
        run: |
          git config user.name  "pr-triage-bot"
          git config user.email "pr-triage-bot@chump-fleet"
          git add .chump/state.sql docs/gaps.yaml 2>/dev/null || true
          git diff --cached --quiet || git commit -m "INFRA-624: auto-file P0 fix gap for failing PR CI"
          git push origin HEAD
