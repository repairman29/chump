name: Queue Driver

# INFRA-048 — refresh BEHIND auto-merge PRs so branch protection's
# "require up-to-date" doesn't strand the queue. Each push to main bumps
# every other open PR to BEHIND; this driver pushes the oldest forward
# so the train keeps moving.

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"   # every 5 min, belt-and-suspenders for missed pushes
  # Fire whenever any check suite completes — catches CI completions that
  # would otherwise wait for the next scheduled tick. Belt-belt-and-suspenders
  # since GitHub schedule cron is observed to skip multi-hour windows under
  # load (2026-04-25: 2h47m gap). Concurrency group ensures only one driver
  # runs at a time, so frequent fires can't pile up.
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print only, no update-branch calls)"
        type: boolean
        default: false
      max:
        description: "Max PRs to refresh in one run"
        type: string
        default: "5"

# App token (not GITHUB_TOKEN) is mandatory: GitHub does not trigger workflow
# runs for pushes made with GITHUB_TOKEN, so rebases would succeed but target
# PRs would never get fresh CI and auto-merge would never fire. App-origin
# pushes bypass that anti-loop rule. See INFRA-QUEUE-DRIVER-APP-TOKEN.
permissions:
  pull-requests: write
  contents: write  # for actions/checkout even though the push uses the App token

# Only one driver at a time — concurrent update-branch calls fight each other.
concurrency:
  group: queue-driver
  cancel-in-progress: false

jobs:
  drive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.QUEUE_DRIVER_APP_ID }}
          private-key: ${{ secrets.QUEUE_DRIVER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Run queue driver
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DRY_RUN_FLAG: ${{ inputs.dry_run == true && '--dry-run' || '' }}
          # Default to 5 so each push/schedule tick drains the whole BEHIND set
          # in parallel; cron is unreliable (observed 2h47m gap on 2026-04-25),
          # so each fire needs to do as much work as possible.
          MAX_FLAG: ${{ inputs.max && format('--max {0}', inputs.max) || '--max 5' }}
        run: |
          chmod +x scripts/coord/queue-driver.sh
          scripts/coord/queue-driver.sh $DRY_RUN_FLAG $MAX_FLAG
