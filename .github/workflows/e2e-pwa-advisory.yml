name: e2e-pwa advisory (quarantined flakes)
# INFRA-1332: visibility-only workflow for tests skipped on the PR path
# via test.skip(!INCLUDE_PWA_FLAKES). Sets CHUMP_E2E_INCLUDE_FLAKES=1 so
# the quarantined describes run and we keep observing the flake rate.
#
# This workflow is NOT in the required-checks set — failure here does NOT
# block merges. Its purpose is to track whether the flakes are getting
# better or worse so INFRA-1335 has data to root-cause against.
#
# Schedule: every PR + nightly cron so the signal flows even when no PRs
# are open.

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'web/**'
      - 'e2e/**'
      - 'src/web_server.rs'
      - 'src/routes/**'
      - '.github/workflows/e2e-pwa-advisory.yml'
  schedule:
    # 04:17 UTC daily — off-peak, no collision with the hourly chump-planner.
    - cron: '17 4 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-pwa-advisory-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e-pwa-flakes:
    name: PWA flake advisory (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true  # NEVER blocks merge; this is informational only.
    timeout-minutes: 25
    env:
      CHUMP_E2E_INCLUDE_FLAKES: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache Ollama models
        uses: actions/cache@v5
        with:
          path: ~/.ollama
          key: ollama-models-${{ runner.os }}-v1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Build chump binary
        run: cargo build --bin chump

      - name: Setup Ollama for advisory run
        run: bash scripts/ci/ci-setup-ollama-e2e.sh

      - name: Install Playwright + browsers
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run quarantined PWA flakes (advisory)
        working-directory: e2e
        run: |
          # CHUMP_E2E_INCLUDE_FLAKES=1 unwraps the test.skip() on the
          # PWA-shell + mobile + Chat /task describes.
          npx playwright test --grep "PWA shell|PWA mobile viewport|Chat /task" \
            --reporter=github,json --reporter-output=advisory-results.json \
            || echo "::warning::quarantined flakes failed (informational only, INFRA-1335)"

      - name: Upload advisory results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pwa-advisory-results
          path: e2e/advisory-results.json
          retention-days: 14
