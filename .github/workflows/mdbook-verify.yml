# Validate mdBook content and publish hygiene.
#
# Purpose: prevent GitHub Pages regressions (broken relative links, sync drift)
# from landing on main unnoticed. The gh-pages deploy workflow always runs
# sync-book + mdbook build, so this workflow mirrors those steps for PRs.
name: mdBook verify

on:
  pull_request:
    branches: [main, master]
    paths:
      - "book/**"
      - "docs/**"
      - "scripts/sync-book-from-docs.sh"
      - "scripts/mdbook-linkcheck.py"
      - ".github/workflows/gh-pages.yml"
      - ".github/workflows/mdbook-verify.yml"
  push:
    branches: [main, master]
    paths:
      - "book/**"
      - "docs/**"
      - "scripts/sync-book-from-docs.sh"
      - "scripts/mdbook-linkcheck.py"
      - ".github/workflows/gh-pages.yml"
      - ".github/workflows/mdbook-verify.yml"

concurrency:
  group: mdbook-verify-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync docs into book src
        run: ./scripts/sync-book-from-docs.sh

      - name: Build mdBook
        run: mdbook build book

      - name: Check for broken relative links (docs-site)
        run: python3 scripts/mdbook-linkcheck.py

  sync-idempotency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync docs into book src
        run: ./scripts/sync-book-from-docs.sh

      - name: Ensure sync is idempotent (no drift)
        run: |
          git diff --exit-code book/src

