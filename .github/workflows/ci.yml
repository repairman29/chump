  # ── Shard 2: clippy ───────────────────────────────────────────────────────
  # Workspace-wide clippy with -D warnings. Runs in parallel with cargo-test
  # and fast-checks. Target wall-clock: 3-5 min.
  clippy:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    # INFRA-1534/1535 stage 1: self-hosted routing
    # INFRA-1567: per-lane toggle CHUMP_SELF_HOSTED_CLIPPY (master + lane).
    runs-on: ${{ vars.CHUMP_SELF_HOSTED_ENABLED == 'true' && vars.CHUMP_SELF_HOSTED_CLIPPY != 'false' && fromJSON('["self-hosted","macos-arm64","chump-fleet"]') || 'ubuntu-latest' }}
    timeout-minutes: 20  # target wall-clock 3-5 min; observed hangs up to 3h before cancellation (INFRA-957)
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        if: runner.os == 'Linux'  # INFRA-1534: macOS self-hosted has no /opt/hostedtoolcache
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        if: runner.os == 'Linux'  # INFRA-1534: macOS self-hosted skips apt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            util-linux

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-clippy

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Shard 3: cargo test ───────────────────────────────────────────────────
  # `cargo test --workspace`. Runs in parallel with clippy and fast-checks.
  # Target wall-clock: 5-8 min.
  cargo-test:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    # INFRA-1535 stage 2: self-hosted routing
    # INFRA-1567: per-lane toggle CHUMP_SELF_HOSTED_CARGO_TEST (master + lane).
    runs-on: ${{ vars.CHUMP_SELF_HOSTED_ENABLED == 'true' && vars.CHUMP_SELF_HOSTED_CARGO_TEST != 'false' && fromJSON('["self-hosted","macos-arm64","chump-fleet"]') || 'ubuntu-latest' }}
    timeout-minutes: 30  # target wall-clock 5-8 min; cap leaves headroom for flake-rerun
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        if: runner.os == 'Linux'  # INFRA-1535: macOS self-hosted has no /opt/hostedtoolcache
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        if: runner.os == 'Linux'  # INFRA-1534: macOS self-hosted skips apt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            util-linux

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-cargo-test

      - name: cargo test (with INFRA-764 flake auto-rerun)
        run: bash scripts/ci/cargo-test-with-rerun.sh -- cargo test --workspace

  # ── CREDIBLE-006: code coverage (llvm-cov) ───────────────────────────────
  # Non-blocking — continue-on-error:true so a coverage regression is a
  # warning, not a merge-blocker, until the baseline stabilises (>2 weeks).
  # Uploads an lcov artifact + writes a summary to $GITHUB_STEP_SUMMARY.
  coverage:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: ${{ vars.RUNNER_COVERAGE != '' && fromJSON(vars.RUNNER_COVERAGE) || 'ubuntu-latest' }}  # INFRA-1542: lane override via repo var (unset → ubuntu-latest)
    continue-on-error: true
    timeout-minutes: 45  # llvm-cov is slower than cargo-test alone; not required for merge
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        if: runner.os == 'Linux'  # INFRA-1539: proactive Linux-only guard
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python

      - name: Install Linux packages (webkit required by chump-desktop workspace member)
        if: runner.os == 'Linux'  # INFRA-1534: macOS self-hosted skips apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            webkit2gtk-4.1 libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            build-essential pkg-config libssl-dev libgtk-3-dev librsvg2-dev util-linux

      - name: Install Rust toolchain + llvm-tools-preview
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report (lcov)
        run: |
          cargo llvm-cov --workspace --lcov --output-path coverage.lcov \
            --ignore-filename-regex '(tests?/|test_|_test\.rs|build\.rs)'

      - name: Summarise coverage
        run: |
          # Extract total line coverage % from lcov and write to step summary + file.
          python3 - <<'PYEOF'
          import re, os

          lcov = open("coverage.lcov").read()
          found = hit = 0
          for line in lcov.splitlines():
              if line.startswith("LF:"):
                  found += int(line[3:])
              elif line.startswith("LH:"):
                  hit += int(line[3:])

          pct = (hit / found * 100) if found else 0.0
          summary = f"Coverage: {pct:.1f}% ({hit}/{found} lines)"
          print(summary)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(f"## {summary}\n\n")
              f.write("lcov artifact: `coverage-lcov`\n")

          with open("coverage-summary.txt", "w") as f:
              f.write(f"lines: {pct:.1f}% ({hit}/{found})\n")

          # CREDIBLE-006 threshold check: warn if coverage dropped from baseline.
          threshold = float(os.environ.get("CHUMP_COVERAGE_DROP_THRESHOLD", "2"))
          baseline_file = "docs/credibility/COVERAGE_BASELINE.md"
          import re as _re
          try:
              text = open(baseline_file).read()
              m = _re.search(r'(\d+\.\d+)\s*%', text)
              if m:
                  baseline_pct = float(m.group(1))
                  drop = baseline_pct - pct
                  if drop > threshold:
                      print(f"::warning::Coverage dropped {drop:.1f} pp below baseline "
                            f"({baseline_pct:.1f}% → {pct:.1f}%). "
                            f"Threshold: {threshold} pp.")
              else:
                  print("Baseline not yet established — skipping threshold check.")
          except FileNotFoundError:
              print("No baseline file found — skipping threshold check.")
          PYEOF

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: |
            coverage.lcov
            coverage-summary.txt
          retention-days: 30

  # ── E2E shards (INFRA-549) ────────────────────────────────────────────────
  # The old monolithic test-e2e (>1h26m, serialized behind unit-test rollup)
  # is replaced by three parallel shards + a thin rollup.  All shards start
  # immediately after `changes` — they no longer wait for the `test` rollup,
  # so e2e runs in parallel with unit tests.  Wall-clock = max(shards) not sum.
  # Dogfood matrix (cargo --release + ~6 min LLM smoke) moved to nightly cron
  # (e2e-dogfood-nightly.yml) — it was the dominant tail and continue-on-error
  # anyway.

  # ── E2E Shard A: PWA Playwright ──────────────────────────────────────────
  # Ollama + qwen2.5:7b, cargo build (debug), chump --web, Playwright.
  # Skipped when no e2e-relevant files change.  Target wall-clock: ~10-12 min.
  e2e-pwa:
    needs: changes
    if: needs.changes.outputs.e2e == 'true' || github.event_name == 'merge_group'
    # INFRA-1342 fix: push trigger removed (same rollup-FAILURE trap as tauri).
    continue-on-error: true
    runs-on: ${{ vars.RUNNER_E2E_PWA != '' && fromJSON(vars.RUNNER_E2E_PWA) || 'ubuntu-latest' }}  # INFRA-1542: lane override via repo var (unset → ubuntu-latest)
    timeout-minutes: 60  # INFRA-1018: cap wall-clock; Ollama+cargo+playwright target ~30 min; 6h default caused stuck runs
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        if: runner.os == 'Linux'  # INFRA-1539: proactive Linux-only guard
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        if: runner.os == 'Linux'  # INFRA-1534: macOS self-hosted skips apt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-e2e-pwa

      - name: Cache Ollama models
        uses: actions/cache@v5
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ runner.os }}-qwen25-7b-v2

      - name: Ollama for PWA Playwright (real LLM)
        env:
          CHUMP_CI_OLLAMA_MODEL: qwen2.5:7b
        run: bash scripts/ci/ci-setup-ollama-e2e.sh

      - name: PWA Playwright E2E
        env:
          CHUMP_E2E_BASE_URL: http://127.0.0.1:3847
          CHUMP_LIGHT_CONTEXT: "1"
          OPENAI_API_BASE: http://127.0.0.1:11434/v1
          OPENAI_API_KEY: ollama
          OPENAI_MODEL: qwen2.5:7b
        run: |
          cargo build --bin chump
          CHUMP_WEB_PORT=3847 CHUMP_WEB_TOKEN="" \
            CHUMP_LIGHT_CONTEXT="$CHUMP_LIGHT_CONTEXT" \
            OPENAI_API_BASE="$OPENAI_API_BASE" OPENAI_API_KEY="$OPENAI_API_KEY" OPENAI_MODEL="$OPENAI_MODEL" \
            ${CARGO_TARGET_DIR:-./target}/debug/chump --web &
          CHUMP_WEB_PID=$!
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:3847/api/health >/dev/null; then
              echo "chump web ready"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3847/api/health >/dev/null
          CHUMP_E2E_BASE_URL=http://127.0.0.1:3847 bash scripts/ci/chump-preflight.sh
          cd e2e && npm ci && npx playwright install chromium && npx playwright test
          kill "${CHUMP_WEB_PID}" || true
          wait "${CHUMP_WEB_PID}" 2>/dev/null || true

  # ── E2E Shard B: Battle sim ───────────────────────────────────────────────
  # No Ollama, no cargo build (SKIP_CARGO=1), no LLM (SKIP_IF_NO_LLM=1).
  # Lightweight — runs on bare ubuntu-latest in ~1-2 min.
  e2e-battle-sim:
    needs: changes
    # RESILIENT-016 (2026-05-17): disabled on PR runs — moved to ci-nightly.yml.
    if: false
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Battle sim suite (no web / no LLM)
        env:
          BATTLE_SIM_SKIP_CARGO: 1
          BATTLE_SIM_SKIP_IF_NO_LLM: 1
        run: bash scripts/ci/run-battle-sim-suite.sh

  # ── E2E Shard C: Golden path ──────────────────────────────────────────────
  # cargo build (debug) + file-presence checks + timing log.
  # No Ollama.  Target wall-clock: ~5 min.
  e2e-golden-path:
    needs: changes
    # RESILIENT-016 (2026-05-17): disabled on PR runs — moved to ci-nightly.yml.
    if: false
    continue-on-error: true
    runs-on: ${{ vars.RUNNER_E2E_GOLDEN_PATH != '' && fromJSON(vars.RUNNER_E2E_GOLDEN_PATH) || 'ubuntu-latest' }}  # INFRA-1542: lane override via repo var (unset → ubuntu-latest)
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        if: runner.os == 'Linux'  # INFRA-1539: proactive Linux-only guard
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        if: runner.os == 'Linux'  # INFRA-1534: macOS self-hosted skips apt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-e2e-golden

      - name: External golden path smoke
        run: bash scripts/ci/verify-external-golden-path.sh

      - name: Golden path timing (JSONL + artifact)
        env:
          GOLDEN_MAX_CARGO_BUILD_SEC: 1800
        run: bash scripts/ci/golden-path-timing.sh

      - name: Upload golden path timing log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: golden-path-timing
          path: logs/golden-path-timing-*.jsonl
          if-no-files-found: ignore

  # ── E2E rollup (keeps the required-check name) ────────────────────────────
  # Same pattern as the `test` rollup (INFRA-213): thin job that succeeds iff
  # all three e2e shards succeed (or are skipped on non-e2e PRs).
  test-e2e:
    needs: [e2e-pwa, e2e-battle-sim, e2e-golden-path]
    if: always()
    runs-on: ubuntu-latest
    # INFRA-1348: e2e shards all have continue-on-error: true, so test-e2e
    # normally always succeeds. But runner failures or script errors in this
    # aggregator itself could still contribute FAILURE to rollup state, blocking
    # auto-merge on PRs where all required checks (test, audit, ACP) passed.
    continue-on-error: true
    steps:
      - name: Verify all e2e shards passed
        run: |
          pwa="${{ needs.e2e-pwa.result }}"
          sim="${{ needs.e2e-battle-sim.result }}"
          golden="${{ needs.e2e-golden-path.result }}"
          echo "e2e-pwa=$pwa  e2e-battle-sim=$sim  e2e-golden-path=$golden"
          fail=0
          for r in "$pwa" "$sim" "$golden"; do
            case "$r" in
              success|skipped) ;;
              *) fail=1 ;;
            esac
          done
          if [ "$fail" = "1" ]; then
            echo "::error::One or more e2e shards failed (see results above)"
            exit 1
          fi
          echo "All e2e shards green (or appropriately skipped)."

  # INFRA-503 (2026-05-06): cargo audit was the dominant per-PR cycle-time
  # tax (~12min × every PR). Moved to .github/workflows/cargo-audit-nightly.yml
  # (cron daily). Advisory database updates daily, not per-commit, so per-PR
  # was redundant. Median PR cycle drops from 14m → ~5m.
  #
  # The 'audit' job name is preserved (branch protection requires 'audit'
  # as a status check). It now runs only the INFRA-431 chump-gap test +
  # marks itself green in <1min. To remove this job entirely, also remove
  # 'audit' from branch-protection-main.json's required_status_checks.
  audit:
    needs: changes
    # INFRA-1379: skip audit for docs-only PRs (gap YAMLs, .md edits) — audit-stub
    # satisfies the required check. Always runs on push/merge_group to keep main green.
    if: |
      needs.changes.outputs.docs_only != 'true' ||
      github.event_name != 'pull_request'
    runs-on: ${{ vars.RUNNER_AUDIT != '' && fromJSON(vars.RUNNER_AUDIT) || 'ubuntu-latest' }}  # INFRA-1542: lane override via repo var (unset → ubuntu-latest)
