      - name: raw-gh lint gate — no new direct gh calls in hot-path scripts outside lib/ (INFRA-1274)
        run: bash scripts/ci/test-no-raw-gh-in-hot-paths.sh
      - name: EVENT_REGISTRY coverage — no drift in either direction (INFRA-1237/INFRA-1287)
        # INFRA-1287: flipped to strict mode — all 88 register-without-emit orphans
        # are now either pruned from the registry (3 dead) or listed in
        # scripts/ci/event-registry-reserved.txt with reason comments.
        # strict mode: BOTH emit-without-register AND register-without-emit FAIL.
        run: CHUMP_REGISTRY_GATE_MODE=strict bash scripts/ci/test-event-registry-coverage.sh
      - name: no-inline-ambient-printf — Phase-1 dry-up (INFRA-1307)
        # Refuses net-new files in scripts/coord|dispatch|ops/ + src/ + crates/
        # that write inline to ambient.jsonl. New emit sites should call
        # `chump ambient emit <kind> [--field k=v]...` (shipped via INFRA-1048).
        # Allowlist: scripts/ci/ambient-emit-allowlist.txt (17 existing sites).
        run: BASE_REF=origin/main bash scripts/ci/test-no-inline-ambient-printf.sh
      - name: CI regression guard suite — fix commits touching ci.yml must carry test (INFRA-1421)
        # Runs pre-push-ci-regression-guard.sh in CI mode: verifies every
        # CI-Regression-Guard: trailer references an existing test, then runs
        # those tests to assert the regression cannot come back.
        # GITHUB_BASE_SHA is set by GitHub for PR events; the script degrades
        # gracefully to a no-op when the ci.yml diff is absent.
        run: |
          export GITHUB_BASE_SHA="${{ github.event.pull_request.base.sha }}"
          bash scripts/git-hooks/pre-push-ci-regression-guard.sh

  # ── INFRA-1143: Synthetic-green stub pattern ───────────────────────────────
  # Required status checks in branch protection block forever when their path
  # filter says to skip (skipped ≠ passing in GitHub Actions). The stub pattern
  # avoids this: every gated job (clippy, cargo-test, fast-checks, audit) has
  # TWO siblings — the real heavy job (conditional on code changes) and a 5s
  # stub (conditional on NO code changes). A rollup job requires both and
  # always reports success if either one succeeded.
  #
  # Branch protection migration (operator action, post-merge):
  #   Old required contexts:   test, audit
  #   New required contexts:   clippy-required, cargo-test-required,
  #                            fast-checks-required, audit-required
  #   Migration order:
  #     1. Merge this PR (stubs + rollups land in main).
  #     2. Admin: add new -required contexts to branch protection.
  #     3. Admin: remove old test + audit contexts (or keep both during overlap).
  #     4. INFRA-1142: narrow 'code' filter to Rust-only paths.
  #
  # Why add both contexts during overlap: any PR that predates the branch-
  # protection edit would still be validated by the old `test` check. Once
  # all open PRs have the new contexts, remove the old ones.
  # ──────────────────────────────────────────────────────────────────────────

  # ── clippy-stub: passes in <10s when no code changes ─────────────────────
  clippy-stub:
    name: clippy-stub
    needs: changes
    if: |
      needs.changes.outputs.code != 'true' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Clippy skipped (no Rust/code changes detected)
        run: |
          echo "clippy-stub: no code-filter changes — clippy is not required for this diff."
          echo "Branch protection satisfied by this stub."

  # ── clippy-required: rollup that branch protection enforces ──────────────
  clippy-required:
    name: clippy-required
    needs: [clippy, clippy-stub]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify clippy or clippy-stub passed
        run: |
          real="${{ needs.clippy.result }}"
          stub="${{ needs.clippy-stub.result }}"
          echo "clippy=$real  clippy-stub=$stub"
          if [[ "$real" == "success" || "$stub" == "success" ]]; then
            echo "clippy-required: PASS (real=$real, stub=$stub)"
          elif [[ "$real" == "skipped" && "$stub" == "skipped" ]]; then
            echo "clippy-required: both skipped (push/merge_group path — acceptable)"
          else
            echo "::error::clippy-required FAIL — neither real nor stub succeeded (real=$real, stub=$stub)"
            exit 1
          fi

  # ── cargo-test-stub: passes in <10s when no code changes ─────────────────
  cargo-test-stub:
    name: cargo-test-stub
    needs: changes
    if: |
      needs.changes.outputs.code != 'true' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: cargo-test skipped (no Rust/code changes detected)
        run: |
          echo "cargo-test-stub: no code-filter changes — cargo test not required for this diff."
          echo "Branch protection satisfied by this stub."

  # ── cargo-test-required: rollup that branch protection enforces ───────────
  cargo-test-required:
    name: cargo-test-required
    needs: [cargo-test, cargo-test-stub]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify cargo-test or cargo-test-stub passed
        run: |
          real="${{ needs.cargo-test.result }}"
          stub="${{ needs.cargo-test-stub.result }}"
          echo "cargo-test=$real  cargo-test-stub=$stub"
          if [[ "$real" == "success" || "$stub" == "success" ]]; then
            echo "cargo-test-required: PASS (real=$real, stub=$stub)"
          elif [[ "$real" == "skipped" && "$stub" == "skipped" ]]; then
            echo "cargo-test-required: both skipped (push/merge_group path — acceptable)"
          else
            echo "::error::cargo-test-required FAIL — neither real nor stub succeeded (real=$real, stub=$stub)"
            exit 1
          fi

  # ── fast-checks-stub: passes in <10s when no code changes ────────────────
  fast-checks-stub:
    name: fast-checks-stub
    needs: changes
    if: |
      needs.changes.outputs.code != 'true' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: fast-checks skipped (no code changes detected)
        run: |
          echo "fast-checks-stub: no code-filter changes — fast-checks not required for this diff."
          echo "Branch protection satisfied by this stub."

  # ── fast-checks-required: rollup that branch protection enforces ──────────
  fast-checks-required:
    name: fast-checks-required
    needs: [fast-checks, fast-checks-stub]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify fast-checks or fast-checks-stub passed
        run: |
          real="${{ needs.fast-checks.result }}"
          stub="${{ needs.fast-checks-stub.result }}"
          echo "fast-checks=$real  fast-checks-stub=$stub"
          if [[ "$real" == "success" || "$stub" == "success" ]]; then
            echo "fast-checks-required: PASS"
          elif [[ "$real" == "skipped" && "$stub" == "skipped" ]]; then
            echo "fast-checks-required: both skipped (push/merge_group path — acceptable)"
          else
            echo "::error::fast-checks-required FAIL (real=$real, stub=$stub)"
            exit 1
          fi

  # ── audit-stub: passes when code-filter skips audit ──────────────────────
  # Currently audit runs unconditionally (~15min). Once this pattern is wired
  # into branch protection, audit can be gated by 'code' to skip on docs-only
  # PRs — audit-stub ensures branch protection still passes.
  audit-stub:
    name: audit-stub
    needs: changes
    # INFRA-1379: fire when code filter is empty (original condition) OR when
    # docs_only is true (new: gap YAML / .md-only PRs skip 15-min audit job).
    if: |
      (needs.changes.outputs.code != 'true' || needs.changes.outputs.docs_only == 'true') &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: audit skipped (no code changes or docs-only lane detected)
        run: |
          echo "audit-stub: lane check — docs_only=${{ needs.changes.outputs.docs_only }} code=${{ needs.changes.outputs.code }}"
          echo "audit CI checks not required for this diff. Branch protection satisfied by this stub."

  # ── audit-required: rollup that branch protection enforces ───────────────
  audit-required:
    name: audit-required
    needs: [audit, audit-stub]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Verify audit or audit-stub passed
        run: |
          real="${{ needs.audit.result }}"
          stub="${{ needs.audit-stub.result }}"
          echo "audit=$real  audit-stub=$stub"
          if [[ "$real" == "success" || "$stub" == "success" ]]; then
            echo "audit-required: PASS"
          elif [[ "$real" == "skipped" && "$stub" == "skipped" ]]; then
            echo "audit-required: both skipped (push/merge_group path — acceptable)"
          else
            echo "::error::audit-required FAIL (real=$real, stub=$stub)"
            exit 1
          fi
      - name: INFRA-779 gitdir auto-repair — corrupt + verify repair + ambient event (INFRA-1033)
        run: bash scripts/ci/test-infra-779-gitdir-repair.sh
      - name: pre-push known-flake skip integration (INFRA-1167)
        run: bash scripts/ci/test-known-flake-skip.sh
      - name: pr-scope PR_TITLE fallback chain (INFRA-976)
        run: bash scripts/ci/test-pr-scope-title-fallback.sh
      - name: bot-merge arm-before-ship ordering fix (INFRA-1030)
        run: bash scripts/ci/test-bot-merge-arm-ship-order.sh
      - name: operator-recovery umbrella — CHUMP_OPERATOR_RECOVERY=1 bypass set + audit event (INFRA-1028)
        run: bash scripts/ci/test-operator-recovery.sh

      - name: pillar health dashboard endpoint + web component (PRODUCT-090)
        run: bash scripts/ci/test-pillar-dashboard.sh
      - name: ci-yml merge-driver orphan-step rejection (INFRA-1199)
        run: bash scripts/ci/test-merge-driver-ci-yml-add-row.sh
      - name: write-ahead log recovery — wrap/replay round-trip (INFRA-1200)
        run: bash scripts/ci/test-edit-replay.sh
      - name: PWA auth-toast dedup — fleet_auth_fallback stream + unit (INFRA-991)
        run: |
          cargo build --bin chump 2>&1 | tail -3
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" bash scripts/ci/test-pwa-auth-toast-stream.sh
          node web/v2/tests/auth-toast.dedup.test.js
      - name: pillar-balance guard at reserve time (INFRA-1152)
        run: |
          cargo build --bin chump 2>&1 | tail -3
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" \
            bash scripts/ci/test-pillar-balance-guard.sh

      - name: cargo build mutex isolation — per-worktree CARGO_TARGET_DIR (INFRA-1374)
        run: bash scripts/ci/test-cargo-mutex-isolation.sh

  # ── System integration test (INFRA-849) ──────────────────────────────────────
  # Non-blocking end-to-end test for the claim→commit→ship pipeline using stubs.
  # Does not gate merges (continue-on-error: true); provides CREDIBLE signal
  # that the full pipeline round-trips without requiring real GitHub API calls.
  integration-test:
    name: System integration test (INFRA-849)
    runs-on: ubuntu-latest
    needs: [fast-checks]
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-integration-test

      - name: Build chump binary
        run: cargo build --bin chump --quiet 2>&1 | tail -3

      - name: Run system integration test
        run: bash scripts/ci/test-system-integration.sh
        env:
          CHUMP_INTEGRATION_TEST: "1"
          CHUMP_BIN: target/debug/chump
