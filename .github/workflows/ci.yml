      # Runs `node --check` on every web/v2/*.js file. Catches truncation /
      # syntax errors like the 2026-05-14 commit c64ddd676 that lopped off
      # 5 PWA classes in app.js — bug sat on main for 3 days because no
      # CI lane parsed the PWA's main JS file. The gate also self-verifies
      # via a fixture so it can't rot silently.
      #
      # ADVISORY-ONLY by default (`|| true` swallows failures). The gate
      # will surface signal in CI output and emit a kind=pwa_parse_gate_fail
      # ambient event (via the script). Flip to blocking by removing the
      # `|| true` once INFRA-1620 (the actual app.js truncation) is fixed
      # AND the gate has run clean on 5 consecutive PRs.
      - name: PWA JS parse gate (INFRA-1621, advisory)
        if: github.event_name == 'pull_request'
        run: bash scripts/ci/test-pwa-parse-gate.sh || true

      # DOC-050 + DOC-051: research-privacy gate for docs/strategy/ and docs/product/.
      # Scans public docs for RESEARCH_INTEGRITY.md:28-29 violations (magnitudes,
      # versioned model names, per-eval gap IDs). DOC-051 cleared the backlog of
      # 195 violations; this advisory wiring is the next-step from the AC
      # ("scripts/ci/test-public-doc-privacy.sh wired into pr-hygiene job as
      # advisory"). Flip from advisory to blocking by removing `|| true` once
      # the gate has run clean on 5 consecutive PRs (per DOC-051 AC #7).
      - name: Research-privacy gate (DOC-050/DOC-051, advisory)
        if: github.event_name == 'pull_request'
        run: bash scripts/ci/test-public-doc-privacy.sh || true

  # ── Shard 1: fast checks ──────────────────────────────────────────────────
  # fmt + JS self-tests + every ~30-second bash guard. No `cargo test`, no
  # `cargo clippy --workspace --all-targets`. A handful of guards build
  # `chump` (debug, single-bin) so they can exec the resulting binary; that
  # build hits the shared rust-cache and is fast on warm runs.
  # Target wall-clock: < 5 min.
  # INFRA-1395: grace-window guard — when workflow_dispatch fires with grace=1,
  # this job emits a neutral conclusion so required-check enforcement does not
  # block pre-grace PRs. The guard condition mirrors every newly added required
  # check job: `if: env.SKIP_GRACE_CHECKS != '1' || github.event_name != 'workflow_dispatch'`
  # After grace_until expires, required-check-monitor.sh stops dispatching with
  # grace=1 and the check is fully required on all subsequent CI runs.
  required-check-grace-guard:
    name: required-check-grace-guard
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.grace == '1'
    steps:
      - name: Grace window active — new required check skipped for pre-grace PR
        run: |
          echo "INFRA-1395: grace window active (PR=${{ github.event.inputs.pr }})"
          echo "This run was triggered by required-check-monitor.sh during the 30-minute"
          echo "grace period after a new required check was added. The check is skipped"
          echo "for this PR. After grace_until expires, the full check is required."

  fast-checks:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.scripts == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    timeout-minutes: 15  # fmt + JS self-tests + ~30s bash guards; target wall-clock < 5 min, cap at 15m
    # INFRA-2117 (CI-REVIEW Lever 1A, 2026-05-29): default to GH-hosted ubuntu.
    # Self-hosted Mac caused ~50% of CI-rot tax (rustup conflicts, tauri-2.11.2
    # corruption, wasmtime_wasi .d orphans, runner_binary_refresh_failed — see
    # DOC-063 14d post-mortem). Linux fmt/clippy work runs cleanly on ubuntu.
    # Feature-flag fallback: per-lane CHUMP_SELF_HOSTED_FAST_CHECKS=true reverts
    # this single lane to self-hosted if needed for diagnosis.
    runs-on: ${{ vars.CHUMP_SELF_HOSTED_FAST_CHECKS == 'true' && fromJSON('["self-hosted","macos-arm64","chump-fleet"]') || 'ubuntu-latest' }}
    # INFRA-1959: force chump to use per-checkout state.db, never $HOME/.chump.
    # Prevents r2d2 sqlite-lock contention when multiple self-hosted runs are
    # active concurrently (each has its own _work checkout, but a stale system
    # chump binary may default to $HOME). 2026-05-25 wedge cause.
    env:
      CHUMP_REPO: ${{ github.workspace }}
      CHUMP_LOCK_DIR: ${{ github.workspace }}/.chump-locks
      # INFRA-2118: per-run CARGO_TARGET_DIR breaks cross-PR target corruption.
      # DOC-063 showed .cargo-test-target / /tmp/chump-coord-linux-build* poisoning
      # was a top-3 CI failure class. Each run gets a fresh dir; cleaned up by
      # runner after the job.
      CARGO_TARGET_DIR: /tmp/cargo-target-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      # INFRA-1556: when this job lands on a self-hosted macOS runner, verify
      # the runner's plist PATH resolves every CLI the workflow needs. Skips
      # cleanly on ubuntu-latest. Catches "exit 127 / command not found" before
      # the actual failing step.
      - name: Self-hosted runner deps preflight (INFRA-1556)
        run: bash scripts/ci/test-self-hosted-runner-deps.sh

      # INFRA-CI-DISKSPACE: ubuntu-latest ships with ~14 GB free. Strip ~20 GB
      # of pre-installed SDKs we don't use so the disk can breathe. Costs ~15s.
      # Self-hosted macOS skips this — no GH-shipped SDKs to remove (INFRA-1534).
      - name: Free disk space
        if: runner.os == 'Linux'
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        if: runner.os == 'Linux'  # INFRA-1534: macOS self-hosted skips apt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            util-linux

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt  # INFRA-2242: cranelift dev backend

      # INFRA-2242: mold linker drops link phase 10-15% on Linux.
      # macOS self-hosted runners skip (ld64 is already fast on Apple Silicon).
      - name: Install mold linker (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y mold

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-fast-checks
          # INFRA-2118: PR-scoped prefix prevents cross-PR cache pollution.
          prefix-key: "v1-pr-${{ github.event.pull_request.number || github.ref_name }}"

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: doc-freshness audit (DOC-041, warn-only)
        # WARN-ONLY by default — surfaces stale last_audited stamps without
        # blocking. Promote to --strict once the long-tail cleanup is done.
        run: bash scripts/ci/test-doc-freshness.sh

      - name: no-claude-leak audit (INFRA-1051, warn-only, changed-only)
        # Prevents NEW Claude-specific references from leaking into product-
        # layer code (src/, scripts/coord/, scripts/dispatch/, scripts/ops/).
        # Today's baseline: 580 mentions across 357 files; cleanup is INFRA-1053.
        # Allowlist: CLAUDE.md, .claude/, CLAUDE_GOTCHAS.md, scripts/dispatch/harnesses/.
        # Per-line opt-out: `# chump-harness-ok: claude-mention`.
        # Promote to --strict once INFRA-1053 backfill closes the long-tail.
        run: bash scripts/ci/test-no-claude-leak.sh

      - name: release staleness gate (INFRA-1373, P2 warn-only)
        # Warns when the latest GitHub release is > CHUMP_RELEASE_STALENESS_DAYS
        # (default 14d) behind main HEAD. Non-blocking at P2; promote to
        # blocking (remove continue-on-error) when gap exceeds 30d.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHUMP_RELEASE_STALENESS_DAYS: "14"
        run: bash scripts/ci/check-release-staleness.sh

      - name: markdown intra-doc links (DOC-039)
