name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # PRs and merge queue: drop redundant runs. main pushes: let each finish (artifacts, bisect).
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  tauri-cowork-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Same rationale as the test job's Free disk space step — this job
      # builds chump + chump-desktop (two binaries) plus tauri-driver.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri + WebDriver system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            webkit2gtk-driver \
            xvfb \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev

      - name: Cache tauri-driver binary
        id: tauri-driver-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-crate-ubuntu-amd64-v1

      - name: Install tauri-driver
        if: steps.tauri-driver-cache.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --locked

      - name: Build chump + Cowork (Tauri) shell
        run: |
          cargo build --bin chump
          cargo build -p chump-desktop

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cowork WebDriver E2E (xvfb)
        env:
          CHUMP_WEB_PORT: '3848'
          CHUMP_WEB_TOKEN: ''
          CHUMP_DESKTOP_API_BASE: http://127.0.0.1:3848
          CHUMP_DESKTOP_AUTO_WEB: '0'
        run: |
          ./target/debug/chump --web &
          CHUMP_PID=$!
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:3848/api/health >/dev/null; then
              echo "chump web ready"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3848/api/health >/dev/null
          cd e2e-tauri && npm ci
          xvfb-run -a npm test
          kill "${CHUMP_PID}" || true
          wait "${CHUMP_PID}" 2>/dev/null || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # INFRA-CI-DISKSPACE: ubuntu-latest ships with ~14 GB free. The test job
      # now does four full Rust compilations (cargo test --workspace, cargo build
      # debug, cargo build --release, cargo clippy --all-targets) plus Ollama
      # (~3 GB), Playwright chromium, and tauri system libs — target/ alone can
      # hit 10 GB. Strip ~20 GB of pre-installed SDKs we don't use so the disk
      # can breathe. Costs ~15s; prevents the "No space left on device" flake
      # that was tripping ~40% of main CI runs as of 2026-04-17.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: Verify web/index.html inline JS parses
        run: node scripts/verify-web-index-inline-scripts.cjs

      - name: Web UI self-tests (SSE parser)
        run: node scripts/run-web-ui-selftests.cjs

      - name: cargo test
        run: cargo test --workspace

      - name: Cache Ollama models (PWA E2E)
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ runner.os }}-qwen25-7b-v2

      - name: Ollama for PWA Playwright (real LLM)
        env:
          CHUMP_CI_OLLAMA_MODEL: qwen2.5:7b
        run: bash scripts/ci-setup-ollama-e2e.sh

      - name: PWA Playwright E2E
        env:
          CHUMP_E2E_BASE_URL: http://127.0.0.1:3847
          OPENAI_API_BASE: http://127.0.0.1:11434/v1
          OPENAI_API_KEY: ollama
          OPENAI_MODEL: qwen2.5:7b
        run: |
          cargo build --bin chump
          CHUMP_WEB_PORT=3847 CHUMP_WEB_TOKEN="" \
            OPENAI_API_BASE="$OPENAI_API_BASE" OPENAI_API_KEY="$OPENAI_API_KEY" OPENAI_MODEL="$OPENAI_MODEL" \
            ./target/debug/chump --web &
          CHUMP_WEB_PID=$!
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:3847/api/health >/dev/null; then
              echo "chump web ready"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3847/api/health >/dev/null
          CHUMP_E2E_BASE_URL=http://127.0.0.1:3847 bash scripts/chump-preflight.sh
          cd e2e && npm ci && npx playwright install chromium && npx playwright test
          kill "${CHUMP_WEB_PID}" || true
          wait "${CHUMP_WEB_PID}" 2>/dev/null || true

      - name: Battle sim suite (no web / no LLM)
        env:
          BATTLE_SIM_SKIP_CARGO: 1
          BATTLE_SIM_SKIP_IF_NO_LLM: 1
        run: bash scripts/run-battle-sim-suite.sh

      # Dogfood matrix quick smoke (coordination audit 2026-04-17).
      # Runs 3 defense-suite scenarios (chat, task-list, read-line-range)
      # against the Ollama backend already started by the Playwright E2E
      # step above. Catches tool-chain regressions that unit tests miss
      # — e.g. the task #58 Metal crash that shipped while `cargo test`
      # was green. Fast (~6 min on CI runners); fails the job on any
      # scenario regression.
      - name: Dogfood matrix (quick)
        continue-on-error: true
        env:
          OPENAI_API_BASE: http://127.0.0.1:11434/v1
          OPENAI_API_KEY: ollama
          OPENAI_MODEL: qwen2.5:7b
          CHUMP_HOME: ${{ github.workspace }}
          CHUMP_REPO: ${{ github.workspace }}
          # Ollama has ample context — skip the conservative read_file cap.
          CHUMP_READ_FILE_MAX_CHARS: 12000
        run: |
          # Ollama was started for the Playwright E2E step; reuse it.
          if ! curl -fsS --max-time 3 http://127.0.0.1:11434/api/tags >/dev/null; then
            echo "::warning::Ollama not reachable; skipping dogfood matrix (non-fatal)"
            exit 0
          fi
          # The matrix script expects a release binary; Playwright step
          # built debug. One more build is tolerable at this point.
          cargo build --release --bin chump
          ./scripts/dogfood-matrix.sh --quick

      - name: External golden path smoke
        run: bash scripts/verify-external-golden-path.sh

      - name: Golden path timing (JSONL + artifact)
        env:
          GOLDEN_MAX_CARGO_BUILD_SEC: 1800
        run: bash scripts/golden-path-timing.sh

      - name: Upload golden path timing log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-path-timing
          path: logs/golden-path-timing-*.jsonl
          if-no-files-found: ignore

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        continue-on-error: true
        run: cargo audit
