name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # PRs and merge queue: drop redundant runs. main pushes: let each finish (artifacts, bisect).
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Path filter ────────────────────────────────────────────────────────────
  # Determines which downstream jobs need to run.  Both tauri-cowork-e2e and
  # test-e2e check the outputs of this job via `needs.changes.outputs.*`.
  # On push-to-main and merge_group every path is considered changed so the
  # full suite always runs there.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      e2e: ${{ steps.filter.outputs.e2e }}
      tauri: ${{ steps.filter.outputs.tauri }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              # INFRA-272: This is an ALLOWLIST. Required status checks
              # (test rollup, audit, ACP) are gated by this filter — if a
              # PR's diff matches NONE of these patterns, the gated jobs
              # mark "skipped" and branch protection blocks the merge
              # forever (skipped != passing). Killed PR #803 (workflow-
              # only diff) and almost killed PR #874 on 2026-05-02. Any
              # path that can be the SOLE diff of a real PR must be
              # listed here. When in doubt, add it — the cost of a
              # spurious build is far lower than a stuck PR.
              - 'src/**'
              - 'crates/**'
              - 'desktop/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/**'
              - '.release-plz.toml'
              - 'scripts/**'
              - 'docs/**'
              - 'ChumpMenu/**'
              - 'Formula/**'
              - 'bin/**'
              - 'book/**'
              - 'chump-tool-macro/**'
              - 'config/**'
              - 'docker/**'
              - 'e2e/**'
              - 'e2e-tauri/**'
              - 'examples/**'
              - 'experiments/**'
              - 'launchd/**'
              - 'path/**'
              - 'projects/**'
              - 'recipes/**'
              - 'registry-submission/**'
              - 'repos/**'
              - 'templates/**'
              - 'tests/**'
              - 'wasm/**'
              - 'web/**'
            e2e:
              - 'src/**'
              - 'web/**'
              - 'e2e/**'
              - 'scripts/ci/ci-setup-ollama-e2e.sh'
              - 'scripts/ci/chump-preflight.sh'
              - 'scripts/ci/run-battle-sim-suite.sh'
              - 'scripts/eval/dogfood-matrix.sh'
              - 'scripts/ci/golden-path-timing.sh'
              - 'scripts/ci/verify-external-golden-path.sh'
              - '.github/workflows/ci.yml'
            tauri:
              - 'src/**'
              - 'desktop/**'
              - 'e2e-tauri/**'
              - '.github/workflows/ci.yml'

  # ── Tauri Cowork E2E ───────────────────────────────────────────────────────
  # Only runs when desktop / src / e2e-tauri files change. Skipped on
  # docs-only, scripts-only, crate-only PRs.
  tauri-cowork-e2e:
    needs: changes
    if: needs.changes.outputs.tauri == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Same rationale as the test job's Free disk space step — this job
      # builds chump + chump-desktop (two binaries) plus tauri-driver.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri + WebDriver system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            webkit2gtk-driver \
            xvfb \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            util-linux

      - name: Cache tauri-driver binary
        id: tauri-driver-cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-crate-ubuntu-amd64-v1

      - name: Install tauri-driver
        if: steps.tauri-driver-cache.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --locked

      - name: Build chump + Cowork (Tauri) shell
        run: |
          cargo build --bin chump
          cargo build -p chump-desktop

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cowork WebDriver E2E (xvfb)
        env:
          CHUMP_WEB_PORT: '3848'
          CHUMP_WEB_TOKEN: ''
          CHUMP_DESKTOP_API_BASE: http://127.0.0.1:3848
          CHUMP_DESKTOP_AUTO_WEB: '0'
        run: |
          ./target/debug/chump --web &
          CHUMP_PID=$!
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:3848/api/health >/dev/null; then
              echo "chump web ready"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3848/api/health >/dev/null
          cd e2e-tauri && npm ci
          xvfb-run -a npm test
          kill "${CHUMP_PID}" || true
          wait "${CHUMP_PID}" 2>/dev/null || true

  # ── Required-check rollup ─────────────────────────────────────────────────
  # The "test" name is wired into branch protection (required status check).
  # Keep that contract by running this job as a thin rollup that succeeds iff
  # all of the parallel children below succeed. INFRA-213 (2026-05-02) split
  # the previous monolithic ~15-min `test` job into three parallel siblings
  # — fast-checks / clippy / cargo-test — so wall-clock per PR drops to
  # max(children) ≈ 5-8 min instead of sum(children) ≈ 15-20 min. To rename
  # the required check away from "test" we'd need a branch-protection edit
  # (admin); leaving the rollup name as `test` ships the throughput win
  # without touching protection.
  test:
    needs: [fast-checks, clippy, cargo-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all parallel CI shards passed
        run: |
          # `if: always()` lets this job run even when a child fails — we
          # then explicitly fail the rollup so the required check is red.
          # "skipped" is acceptable: docs-only / scripts-only PRs (where
          # changes.outputs.code == 'false') skip the shards and the
          # required `test` check should still pass — same behavior as the
          # pre-INFRA-213 monolith, which was also gated by `if:
          # needs.changes.outputs.code == 'true' || …`.
          fast="${{ needs.fast-checks.result }}"
          clippy="${{ needs.clippy.result }}"
          test="${{ needs.cargo-test.result }}"
          echo "fast-checks=$fast  clippy=$clippy  cargo-test=$test"
          fail=0
          for r in "$fast" "$clippy" "$test"; do
            case "$r" in
              success|skipped) ;;
              *) fail=1 ;;
            esac
          done
          if [ "$fail" = "1" ]; then
            echo "::error::One or more CI shards failed (see results above)"
            exit 1
          fi
          echo "All shards green (or appropriately skipped)."

  # ── Shard 1: fast checks ──────────────────────────────────────────────────
  # fmt + JS self-tests + every ~30-second bash guard. No `cargo test`, no
  # `cargo clippy --workspace --all-targets`. A handful of guards build
  # `chump` (debug, single-bin) so they can exec the resulting binary; that
  # build hits the shared rust-cache and is fast on warm runs.
  # Target wall-clock: < 5 min.
  fast-checks:
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # INFRA-CI-DISKSPACE: ubuntu-latest ships with ~14 GB free. Strip ~20 GB
      # of pre-installed SDKs we don't use so the disk can breathe. Costs ~15s.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            util-linux

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-fast-checks

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: RESEARCH-026 observer-effect harness preflight (no API)
        run: bash scripts/ci/test-research-026-preflight.sh

      - name: Research Lane A smoke (RESEARCH-018 harness surface, no API)
        env:
          PYTHON: python3
        run: bash scripts/eval/research-lane-a-smoke.sh

      - name: gap-preflight unregistered-ID guard (INFRA-020)
        run: bash scripts/ci/test-gap-preflight-unregistered.sh

      - name: gap-claim claim-time exclusivity race guard (INFRA-403)
        run: bash scripts/ci/test-gap-claim-race.sh

      - name: docs/gaps.yaml must not exist after INFRA-188 cutover
        run: |
          if [ -f docs/gaps.yaml ]; then
            echo "ERROR: docs/gaps.yaml was re-added after INFRA-188 cutover."
            echo "The monolithic file was removed in INFRA-188. Use the per-file layout:"
            echo "  docs/gaps/<ID>.yaml  — one file per gap"
            echo "To add a new gap: chump gap reserve --domain D --title T"
            echo "To close a gap:   chump gap ship <ID> --closed-pr N --update-yaml"
            exit 1
          fi
          echo "OK: docs/gaps.yaml absent (INFRA-188 cutover confirmed)"

      - name: preregistration content guard (INFRA-113)
        run: bash scripts/ci/test-prereg-content-guard.sh

      - name: cross-judge audit guard (INFRA-079)
        run: bash scripts/ci/test-cross-judge-guard.sh

      - name: book/src ↔ docs/process sync guard (INFRA-170)
        run: bash scripts/ci/test-book-sync-guard.sh

      - name: docs-delta trailer validation (INFRA-124)
        run: bash scripts/ci/test-infra-124-docs-delta-trailer.sh

      - name: state.sql merge driver smoke (INFRA-310)
        run: bash scripts/ci/test-merge-driver-state-sql.sh

      - name: ci.yml merge driver smoke (INFRA-310)
        run: bash scripts/ci/test-merge-driver-ci-yml.sh

      - name: pre-commit merge driver smoke (INFRA-310)
        run: bash scripts/ci/test-merge-driver-pre-commit.sh

      - name: subagent-shipping-epilogue reference guard (INFRA-332)
        run: bash scripts/ci/test-subagent-epilogue-ref.sh

      - name: pre-push --force-with-lease race guard (INFRA-345)
        run: bash scripts/ci/test-pre-push-force-lease-guard.sh

      - name: pre-push rebase-detect auto-skip (INFRA-368)
        run: bash scripts/ci/test-pre-push-rebase-allow.sh

      - name: spike scripts isolated from production state.db (INFRA-430)
        run: bash scripts/ci/test-spike-isolation.sh

      - name: stale-pr-reaper file-parity check (INFRA-258)
        run: bash scripts/ci/test-infra-258-reaper-partial-delivery.sh

      - name: gap-doctor safe-sweep (INFRA-308)
        run: bash scripts/ci/test-gap-doctor-safe-sweep.sh

      - name: fleet starve auto-action (INFRA-391)
        run: bash scripts/ci/test-fleet-starve-auto-action.sh

      - name: pr-watch auto-resolve recipe (INFRA-387)
        run: bash scripts/ci/test-pr-watch-auto-resolve.sh

      - name: pre-push MERGED guard (INFRA-306)
        run: bash scripts/ci/test-merged-check-guard.sh

      - name: default-flip advisory guard (INFRA-762)
        run: bash scripts/ci/test-default-flip-guard.sh

      - name: git-identity sanity guard (INFRA-787)
        run: bash scripts/ci/test-git-identity-guard.sh

      - name: gap-divergence guard (INFRA-783)
        run: bash scripts/ci/test-gap-divergence-guard.sh

      - name: flake-autorerun harness fixture (INFRA-764)
        run: bash scripts/ci/test-flake-autorerun.sh

      - name: pre-push cargo-test full-suite gate (INFRA-761)
        run: bash scripts/ci/test-pre-push-test-gate.sh

      - name: pr-watch shepherd smoke (INFRA-354)
        run: bash scripts/ci/test-pr-watch-shepherd-smoke.sh

      - name: pr-blocked-watch smoke (INFRA-550)
        run: bash scripts/ci/test-pr-blocked-watch.sh

      - name: Install PyYAML for pr-triage-bot YAML validation (INFRA-648)
        run: pip install pyyaml

      - name: pr-triage-bot smoke + YAML parse (INFRA-624/648)
        run: bash scripts/ci/test-pr-triage-bot.sh

      - name: doc-only commits run all guards (INFRA-257)
        run: bash scripts/ci/test-infra-257-doc-only-guards.sh

      - name: worktree-boundary path resolution (INFRA-109)
        run: bash scripts/ci/test-infra-109-worktree-boundary.sh

      - name: pick-and-claim lock-dir resolves to main repo from linked worktree (INFRA-466/467)
        run: bash scripts/ci/test-pick-and-claim-lockdir.sh

      - name: submodule-sanity guard (INFRA-158)
        run: bash scripts/ci/test-submodule-guard.sh

      - name: credential-pattern guard (INFRA-158)
        run: bash scripts/ci/test-credential-pattern-guard.sh

      - name: docs-delta guard (INFRA-158)
        run: bash scripts/ci/test-docs-delta-guard.sh

      - name: gap-status-flip guard (INFRA-158)
        run: bash scripts/ci/test-gap-status-flip.sh

      - name: speculative-on-speculative arm guard (INFRA-684)
        run: bash scripts/ci/test-speculative-on-speculative-guard.sh

      - name: raw-YAML-edit guard (INFRA-200, blocking since 2026-05-02)
        run: bash scripts/ci/test-raw-yaml-guard.sh

      - name: git index mutex — concurrent chump-commit.sh stomp guard (META-011)
        run: bash scripts/ci/test-meta-011-git-stomp.sh

      - name: ambient-jsonl emit-time schema validation (INFRA-101)
        run: bash scripts/ci/test-ambient-schema.sh

      - name: lease TTL file-based reaper (INFRA-115)
        run: bash scripts/ci/test-infra-115-lease-ttl-file.sh

      - name: observability coverage — new src/dispatch.sh and src/main-reachable .rs need a tracing/ambient/lessons hook (INFRA-757)
        run: bash scripts/ci/test-obs-coverage-guard.sh

      - name: observability coverage — live PR diff against base ref (INFRA-757)
        run: bash scripts/ci/test-observability-coverage.sh

      - name: PWA root redirect / -> /v2/ (INFRA-254)
        run: bash scripts/ci/test-infra-254-pwa-root-redirect.sh

      - name: auto-arm sweeper smoke + bypass (INFRA-382 / INFRA-374)
        run: bash scripts/ci/test-auto-arm-sweeper.sh

      - name: CI-flake auto-rerun smoke — bypass + empty + flake match + cooldown (INFRA-375)
        run: bash scripts/ci/test-ci-flake-rerun.sh

      - name: PWA v1 retirement — assets deleted, tauri.conf.json, v2 wizard (INFRA-250)
        run: bash scripts/ci/test-infra-250-v1-retirement.sh

      - name: install-ambient-hooks idempotence + bypass (FLEET-023)
        run: bash scripts/ci/test-install-ambient-hooks.sh

      - name: Build chump (debug, single bin) for guard scripts
        # INFRA-100: gap-reserve.sh shells out to `chump gap reserve`.
        # INFRA-154: bot-merge auto-close test calls --closed-pr.
        # Build once, reuse across the next three steps.
        run: cargo build --bin chump

      - name: gap-reserve concurrency + preflight (INFRA-021)
        run: |
          export PATH="$(pwd)/target/debug:$PATH"
          bash scripts/ci/test-gap-reserve-concurrency.sh
          bash scripts/ci/test-gap-reserve-preflight.sh

      - name: gap-reserve ID zero-padding (INFRA-080)
        run: |
          export PATH="$(pwd)/target/debug:$PATH"
          bash scripts/ci/test-gap-reserve-padding.sh

      - name: bot-merge auto-close handshake (INFRA-154)
        run: |
          CHUMP_BIN="$(pwd)/target/debug/chump" \
            bash scripts/ci/test-bot-merge-auto-close.sh

      - name: bot-merge health monitoring + hung-process detection (INFRA-119)
        run: bash scripts/ci/test-infra-119-bot-merge-hang.sh

      - name: Dual-surface coordination smoke (INFRA-032)
        # INFRA-499 (2026-05-06): post-INFRA-498 docs/gaps/*.yaml deleted,
        # so CI's state.db starts empty. Smoke test now reserves a fresh
        # gap on the fly when no arg given (self-contained).
        run: bash scripts/ci/coord-surfaces-smoke.sh

      - name: chump-mcp-coord tools/list (INFRA-033)
        run: bash scripts/ci/test-mcp-coord-smoke.sh

      - name: env-var coverage — all src/ reads documented or allowlisted (DOC-026)
        run: bash scripts/ci/test-env-var-coverage.sh

      # INFRA-024: standalone example workspace (not a root workspace member).
      # Locked build catches accidental drift in examples/apalis-poc/Cargo.lock.
      # Cheap (~30s) — keep it co-located with the other build-using checks.
      - name: apalis-poc (standalone, --locked)
        run: cargo build --locked --manifest-path examples/apalis-poc/Cargo.toml

  # ── Shard 2: clippy ───────────────────────────────────────────────────────
  # Workspace-wide clippy with -D warnings. Runs in parallel with cargo-test
  # and fast-checks. Target wall-clock: 3-5 min.
  clippy:
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            util-linux

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-clippy

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Shard 3: cargo test ───────────────────────────────────────────────────
  # `cargo test --workspace`. Runs in parallel with clippy and fast-checks.
  # Target wall-clock: 5-8 min.
  cargo-test:
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            util-linux

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-cargo-test

      - name: cargo test (with INFRA-764 flake auto-rerun)
        run: bash scripts/ci/cargo-test-with-rerun.sh -- cargo test --workspace

  # ── E2E shards (INFRA-549) ────────────────────────────────────────────────
  # The old monolithic test-e2e (>1h26m, serialized behind unit-test rollup)
  # is replaced by three parallel shards + a thin rollup.  All shards start
  # immediately after `changes` — they no longer wait for the `test` rollup,
  # so e2e runs in parallel with unit tests.  Wall-clock = max(shards) not sum.
  # Dogfood matrix (cargo --release + ~6 min LLM smoke) moved to nightly cron
  # (e2e-dogfood-nightly.yml) — it was the dominant tail and continue-on-error
  # anyway.

  # ── E2E Shard A: PWA Playwright ──────────────────────────────────────────
  # Ollama + qwen2.5:7b, cargo build (debug), chump --web, Playwright.
  # Skipped when no e2e-relevant files change.  Target wall-clock: ~10-12 min.
  e2e-pwa:
    needs: changes
    if: needs.changes.outputs.e2e == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-e2e-pwa

      - name: Cache Ollama models
        uses: actions/cache@v5
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ runner.os }}-qwen25-7b-v2

      - name: Ollama for PWA Playwright (real LLM)
        env:
          CHUMP_CI_OLLAMA_MODEL: qwen2.5:7b
        run: bash scripts/ci/ci-setup-ollama-e2e.sh

      - name: PWA Playwright E2E
        env:
          CHUMP_E2E_BASE_URL: http://127.0.0.1:3847
          CHUMP_LIGHT_CONTEXT: "1"
          OPENAI_API_BASE: http://127.0.0.1:11434/v1
          OPENAI_API_KEY: ollama
          OPENAI_MODEL: qwen2.5:7b
        run: |
          cargo build --bin chump
          CHUMP_WEB_PORT=3847 CHUMP_WEB_TOKEN="" \
            CHUMP_LIGHT_CONTEXT="$CHUMP_LIGHT_CONTEXT" \
            OPENAI_API_BASE="$OPENAI_API_BASE" OPENAI_API_KEY="$OPENAI_API_KEY" OPENAI_MODEL="$OPENAI_MODEL" \
            ./target/debug/chump --web &
          CHUMP_WEB_PID=$!
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:3847/api/health >/dev/null; then
              echo "chump web ready"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3847/api/health >/dev/null
          CHUMP_E2E_BASE_URL=http://127.0.0.1:3847 bash scripts/ci/chump-preflight.sh
          cd e2e && npm ci && npx playwright install chromium && npx playwright test
          kill "${CHUMP_WEB_PID}" || true
          wait "${CHUMP_WEB_PID}" 2>/dev/null || true

  # ── E2E Shard B: Battle sim ───────────────────────────────────────────────
  # No Ollama, no cargo build (SKIP_CARGO=1), no LLM (SKIP_IF_NO_LLM=1).
  # Lightweight — runs on bare ubuntu-latest in ~1-2 min.
  e2e-battle-sim:
    needs: changes
    if: needs.changes.outputs.e2e == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Battle sim suite (no web / no LLM)
        env:
          BATTLE_SIM_SKIP_CARGO: 1
          BATTLE_SIM_SKIP_IF_NO_LLM: 1
        run: bash scripts/ci/run-battle-sim-suite.sh

  # ── E2E Shard C: Golden path ──────────────────────────────────────────────
  # cargo build (debug) + file-presence checks + timing log.
  # No Ollama.  Target wall-clock: ~5 min.
  e2e-golden-path:
    needs: changes
    if: needs.changes.outputs.e2e == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-e2e-golden

      - name: External golden path smoke
        run: bash scripts/ci/verify-external-golden-path.sh

      - name: Golden path timing (JSONL + artifact)
        env:
          GOLDEN_MAX_CARGO_BUILD_SEC: 1800
        run: bash scripts/ci/golden-path-timing.sh

      - name: Upload golden path timing log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: golden-path-timing
          path: logs/golden-path-timing-*.jsonl
          if-no-files-found: ignore

  # ── E2E rollup (keeps the required-check name) ────────────────────────────
  # Same pattern as the `test` rollup (INFRA-213): thin job that succeeds iff
  # all three e2e shards succeed (or are skipped on non-e2e PRs).
  test-e2e:
    needs: [e2e-pwa, e2e-battle-sim, e2e-golden-path]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all e2e shards passed
        run: |
          pwa="${{ needs.e2e-pwa.result }}"
          sim="${{ needs.e2e-battle-sim.result }}"
          golden="${{ needs.e2e-golden-path.result }}"
          echo "e2e-pwa=$pwa  e2e-battle-sim=$sim  e2e-golden-path=$golden"
          fail=0
          for r in "$pwa" "$sim" "$golden"; do
            case "$r" in
              success|skipped) ;;
              *) fail=1 ;;
            esac
          done
          if [ "$fail" = "1" ]; then
            echo "::error::One or more e2e shards failed (see results above)"
            exit 1
          fi
          echo "All e2e shards green (or appropriately skipped)."

  # INFRA-503 (2026-05-06): cargo audit was the dominant per-PR cycle-time
  # tax (~12min × every PR). Moved to .github/workflows/cargo-audit-nightly.yml
  # (cron daily). Advisory database updates daily, not per-commit, so per-PR
  # was redundant. Median PR cycle drops from 14m → ~5m.
  #
  # The 'audit' job name is preserved (branch protection requires 'audit'
  # as a status check). It now runs only the INFRA-431 chump-gap test +
  # marks itself green in <1min. To remove this job entirely, also remove
  # 'audit' from branch-protection-main.json's required_status_checks.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux packages for chump-desktop (workspace member)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            util-linux

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-audit

      - name: INFRA-503 — cargo audit moved to nightly cron
        run: |
          echo "::notice::cargo audit runs nightly via cargo-audit-nightly.yml (INFRA-503)"
          echo "      Per-PR audit was 12min × every PR; advisory DB updates daily."
      - name: chump gap list domain summary + test-filter (INFRA-431)
        # INFRA-582: switched from --release to debug build; release compile was
        # 9+ min cold. Debug with shared cache completes in <60s.
        run: |
          cargo build --bin chump 2>&1 | tail -3
          CHUMP_BIN="$(pwd)/target/debug/chump" \
            bash scripts/ci/test-gap-list-domain-summary.sh

# Required check on every PR and merge_group entry.
# Gates: fmt, clippy, unit tests, integration tests, doc build.
# Why: primary correctness + style fence before anything lands on main.
      - name: bounced-PR detector fixture (INFRA-781)
        run: bash scripts/ci/test-bounced-pr-detector.sh

      - name: precommit strict replay — mirror local guards to CI (INFRA-767)
        run: bash scripts/ci/precommit-strict-replay.sh

      - name: precommit strict replay fixture (INFRA-767)
        run: bash scripts/ci/test-precommit-strict-replay.sh

      - name: no-manual-ship-bypass guard (INFRA-719)
        env:
          CHUMP_OBS_BUDGET_BYPASS: "1"
        run: bash scripts/ci/test-no-manual-ship-bypass.sh

      - name: worktree show-toplevel fix (INFRA-810)
        env:
          CHUMP_OBS_BUDGET_BYPASS: "1"
        run: bash scripts/ci/test-worktree-show-toplevel.sh

      - name: handoff comment template lint (INFRA-769)
        env:
          CHUMP_OBS_BUDGET_BYPASS: "1"
        run: bash scripts/ci/test-lint-handoff-comment.sh
