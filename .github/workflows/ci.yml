            echo "ERROR: docs/gaps.yaml was re-added after INFRA-188 cutover."
            echo "The monolithic file was removed in INFRA-188. Use the per-file layout:"
            echo "  docs/gaps/<ID>.yaml  — one file per gap"
            echo "To add a new gap: chump gap reserve --domain D --title T"
