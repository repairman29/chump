      - name: gap-ID lease uniqueness gate — duplicate-PR race prevention (INFRA-1970)
        run: |
          export PATH="${CARGO_TARGET_DIR:-$(pwd)/target}/debug:$PATH"
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" bash scripts/ci/test-gap-id-lease-uniqueness.sh

      - name: bot-merge auto-close handshake (INFRA-154)
        run: |
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" \
            bash scripts/ci/test-bot-merge-auto-close.sh

      - name: bot-merge health monitoring + hung-process detection (INFRA-119)
        run: bash scripts/ci/test-infra-119-bot-merge-hang.sh

      - name: Dual-surface coordination smoke (INFRA-032)
        # INFRA-499 (2026-05-06): post-INFRA-498 docs/gaps/*.yaml deleted,
        # so CI's state.db starts empty. Smoke test now reserves a fresh
        # gap on the fly when no arg given (self-contained).
        run: bash scripts/ci/coord-surfaces-smoke.sh

      - name: chump-mcp-coord tools/list (INFRA-033)
        run: bash scripts/ci/test-mcp-coord-smoke.sh

      - name: env-var coverage — all src/ reads documented or allowlisted (DOC-026)
        run: bash scripts/ci/test-env-var-coverage.sh

      - name: CLI help system consistency — all 31 commands have Usage strings (CREDIBLE-015)
        run: |
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" \
            bash scripts/ci/test-cli-help.sh

      - name: CLI version/debug flags (CREDIBLE-019)
        run: bash scripts/ci/test-cli-version-debug.sh

      - name: CLI fleet + health + coord commands (CREDIBLE-035)
        run: |
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" \
            bash scripts/ci/test-cli-fleet-coord.sh

      - name: CLI integration tests by command category — 31 commands (CREDIBLE-018)
        run: |
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" \
            bash scripts/ci/test-cli-integration.sh

      - name: CI gate promotion no-regression (INFRA-1869)
        # Asserts every gate listed in docs/process/CI_GATE_PROMOTION_LOG.md is
        # currently strict-fail in .github/workflows/ci.yml. A promoted gate that
        # regresses to --warn-only or `|| true` fails this check.
        # No bypass env var by design — demoting a gate requires editing the log AND
        # adding `CI-Promotion-Reverted: <reason>` to the commit body.
        run: bash scripts/ci/test-gate-promotion-no-regression.sh

      # INFRA-024: standalone example workspace (not a root workspace member).
      # Locked build catches accidental drift in examples/apalis-poc/Cargo.lock.
      # Cheap (~30s) — keep it co-located with the other build-using checks.
      - name: apalis-poc (standalone, --locked)
        run: cargo build --locked --manifest-path examples/apalis-poc/Cargo.toml

      # INFRA-1867: preflight-vs-CI parity smoke.
      # Asserts every required-check CI gate is EITHER mirrored in
      # `chump preflight` (src/preflight.rs) OR Tier-D in
      # docs/process/CI_GATES_INVENTORY.md OR allowlisted in
      # scripts/ci/preflight-ci-parity-exceptions.txt.
      # Exits non-zero on unmirrored + non-allowlisted gate; emits
      # kind=ci_parity_drift for each violating gate to ambient.jsonl.
      - name: preflight-vs-CI parity smoke (INFRA-1867)
        run: bash scripts/ci/test-preflight-ci-parity.sh

  # ── Shard 2: clippy ───────────────────────────────────────────────────────
  # Workspace-wide clippy with -D warnings. Runs in parallel with cargo-test
  # and fast-checks. Target wall-clock: 3-5 min.
  # META-262 rolled back 2026-05-31: chump-ci image build failing on edition2024 — see follow-up INFRA-2331.
  clippy:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: ${{ vars.CHUMP_SELF_HOSTED_CLIPPY == 'true' && fromJSON('["self-hosted","macos-arm64","chump-fleet"]') || 'ubuntu-latest' }}
    timeout-minutes: 20  # target wall-clock 3-5 min; observed hangs up to 3h before cancellation (INFRA-957)
    # INFRA-2118: per-run CARGO_TARGET_DIR breaks cross-PR target corruption.
    env:
      CARGO_TARGET_DIR: /tmp/cargo-target-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        if: runner.os == 'Linux'  # INFRA-1535: macOS self-hosted has no /opt/hostedtoolcache
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        if: runner.os == 'Linux'  # INFRA-1534: macOS self-hosted skips apt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            util-linux

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # INFRA-2242: mold linker drops link phase 10-15% on Linux.
      - name: Install mold linker (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y mold

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-clippy
          # INFRA-2118: PR-scoped prefix prevents cross-PR cache pollution.
          prefix-key: "v1-pr-${{ github.event.pull_request.number || github.ref_name }}"

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Shard 3: cargo test ───────────────────────────────────────────────────
  # `cargo test --workspace`. Runs in parallel with clippy and fast-checks.
  # Target wall-clock: 5-8 min.
  cargo-test:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    # INFRA-2117 (CI-REVIEW Lever 1A, 2026-05-29): default to GH-hosted ubuntu.
    # Self-hosted Mac caused ~50% of CI-rot tax (DOC-063 post-mortem).
    # Feature-flag fallback: CHUMP_SELF_HOSTED_CARGO_TEST=true reverts this lane.
    # INFRA-2298 (CI-speed Tier 1+2, 2026-05-30): upgraded from ubuntu-latest to
    # ubuntu-24.04-arm (16-core GH-hosted ARM). Self-hosted Mac runners were
    # saturated (4 Macs, 45-PR queue). Expected: cargo-test 15 min → ~4 min once
    # sccache R2 warms (~$0.50/run vs queue-stall cost). Repo var override intact.
    runs-on: ${{ vars.CHUMP_SELF_HOSTED_CARGO_TEST == 'true' && fromJSON('["self-hosted","macos-arm64","chump-fleet"]') || 'ubuntu-24.04-arm' }}
    timeout-minutes: 30  # target wall-clock 5-8 min; cap leaves headroom for flake-rerun
    # INFRA-1959: per-checkout state.db (see fast-checks comment above).
    env:
      CHUMP_REPO: ${{ github.workspace }}
      CHUMP_LOCK_DIR: ${{ github.workspace }}/.chump-locks
      # INFRA-2118: per-run CARGO_TARGET_DIR (see fast-checks comment for rationale).
      CARGO_TARGET_DIR: /tmp/cargo-target-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        if: runner.os == 'Linux'  # INFRA-1535: macOS self-hosted has no /opt/hostedtoolcache
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        if: runner.os == 'Linux'  # INFRA-1534: macOS self-hosted skips apt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            util-linux

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      # INFRA-2242: mold linker drops link phase 10-15% on Linux.
      - name: Install mold linker (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y mold

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-cargo-test
          # INFRA-2118: PR-scoped prefix prevents cross-PR cache pollution.
          prefix-key: "v1-pr-${{ github.event.pull_request.number || github.ref_name }}"

      # INFRA-2094: install cargo-nextest (parallel test runner, ~60% faster)
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      # INFRA-2093: detect R2 secret presence via env-routed indirection
      # (GH Actions disallows secrets.X directly in if: on PR-trigger workflows).
      - name: Detect R2 secret presence
        id: r2detect
        env:
          R2_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
        run: |
          # RESILIENT-041 (2026-05-30): tightened length check from `-n` to `>= 16`.
          # A misconfigured secret stored as a single character used to pass `-n`
          # → sccache crashed with `Credential access key has length 1, should be 32`
          # → cargo metadata exit 101 → cargo-test exit 102 → queue-wide trunk-RED.
          # Length floor of 16 routes garbage creds through the existing graceful
          # no-cache fallback instead of crashing the toolchain.
          if [ "${#R2_KEY}" -ge 16 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false (R2_KEY length=${#R2_KEY}, expected >= 16)" >&2
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install sccache
        if: steps.r2detect.outputs.configured == 'true'
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: sccache health probe
        # INFRA-2288: probe sccache server startup after install; degrade to no-cache
        # if R2 is unreachable (mirrors INFRA-2184 local pre-push pattern). Probe MUST
        # NOT fail the job — warn + clear RUSTC_WRAPPER so cargo-test runs without sccache
        # (slow but shipping). Today's sccache R2 incident wedged the queue for 90+ min;
        # this would have degraded gracefully instead.
        if: steps.r2detect.outputs.configured == 'true'
        run: |
          if ! sccache --start-server 2>/dev/null; then
            echo "::warning::sccache --start-server failed; falling back to no-cache for this job (INFRA-2288)"
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          fi

      - name: cargo test (nextest via INFRA-764 flake auto-rerun wrapper)
        # INFRA-2094: cargo nextest run replaces cargo test for 60% faster parallel test runs.
        # The wrapper's flake-autorerun still works on the wrapped command's exit code; nextest's
        # different failure-line format means per-test flake matching falls through to unknown-flake
        # path (which is the safe default — re-runs the full suite once if any tests fail).
        # Bypass: CARGO_NEXTEST_DISABLE=1 reverts to plain `cargo test`. See INFRA-2094 / INFRA-764.
        # INFRA-2093: per-step RUSTC_WRAPPER pairs sccache binary with its install (above).
        env:
          RUSTC_WRAPPER: ${{ steps.r2detect.outputs.configured == 'true' && 'sccache' || '' }}
        run: |
          if [ "${CARGO_NEXTEST_DISABLE:-0}" = "1" ]; then
            bash scripts/ci/cargo-test-with-rerun.sh -- cargo test --workspace
          else
            bash scripts/ci/cargo-test-with-rerun.sh -- cargo nextest run --workspace
          fi

      # INFRA-2093: emit cache stats for observability — hits/misses/cache size
      # tells operators if R2 is healthy. Non-blocking (continue-on-error).
      - name: sccache --show-stats
        if: always() && steps.r2detect.outputs.configured == 'true'
        continue-on-error: true
        run: sccache --show-stats || true

  # ── E2E shards (INFRA-549) ────────────────────────────────────────────────
  # The old monolithic test-e2e (>1h26m, serialized behind unit-test rollup)
  # is replaced by three parallel shards + a thin rollup.  All shards start
  # immediately after `changes` — they no longer wait for the `test` rollup,
  # so e2e runs in parallel with unit tests.  Wall-clock = max(shards) not sum.
  # Dogfood matrix (cargo --release + ~6 min LLM smoke) moved to nightly cron
  # (e2e-dogfood-nightly.yml) — it was the dominant tail and continue-on-error
  # anyway.

  # ── E2E matrix (META-267) ─────────────────────────────────────────────────
  # Merges former e2e-pwa / e2e-battle-sim / e2e-golden-path into one job.
  # GitHub Actions produces distinct check-run names: e2e (pwa), e2e (battle-sim),
  # e2e (golden-path). Reduces ci.yml job count from 18 → 16 (META-258 gap).
  #
  # Per-suite notes:
  #   pwa        — Ollama + qwen2.5:7b, cargo build, chump --web, Playwright.
  #                Runs on ARM runner (INFRA-2298). Target wall-clock: ~10-12 min.
  #   battle-sim — RESILIENT-016 (2026-05-17): disabled on PR runs (ci-nightly.yml).
  #   golden-path— RESILIENT-016 (2026-05-17): disabled on PR runs (ci-nightly.yml).
  e2e:
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        include:
          # Shard A: PWA Playwright (enabled — ARM runner, Ollama)
          - suite: pwa
            enabled: true
            runs-on-expr: "${{ vars.RUNNER_E2E_PWA != '' && fromJSON(vars.RUNNER_E2E_PWA) || 'ubuntu-24.04-arm' }}"
            cache-key: ci-e2e-pwa
            timeout: 60
          # Shard B: Battle sim (RESILIENT-016: disabled on PR runs)
          - suite: battle-sim
            enabled: false
            runs-on-expr: ubuntu-latest
            cache-key: ci-e2e-battle-sim
            timeout: 30
          # Shard C: Golden path (RESILIENT-016: disabled on PR runs)
          - suite: golden-path
            enabled: false
            runs-on-expr: "${{ vars.RUNNER_E2E_GOLDEN_PATH != '' && fromJSON(vars.RUNNER_E2E_GOLDEN_PATH) || 'ubuntu-latest' }}"
            cache-key: ci-e2e-golden
            timeout: 30
    # INFRA-1342: push trigger removed (same rollup-FAILURE trap as tauri).
    # pwa suite: runs when e2e files change or merge_group.
    # battle-sim / golden-path: RESILIENT-016 disabled (enabled=false → job skipped).
    # INFRA-2320: matrix context not allowed in job-level if (GHA expression rule).
    # The matrix.enabled gating moved to step-level — disabled suites still spawn
    # but skip all real work; continue-on-error keeps them non-blocking.
    if: needs.changes.outputs.e2e == 'true' || github.event_name == 'merge_group'
    continue-on-error: true
    runs-on: ${{ matrix.runs-on-expr }}
    timeout-minutes: ${{ matrix.timeout }}
    steps:
      - uses: actions/checkout@v4

      # ── Shared setup (pwa + golden-path need Linux packages + Rust) ────────
      - name: Free disk space
        if: runner.os == 'Linux' && (matrix.suite == 'pwa' || matrix.suite == 'golden-path')
        # INFRA-1539: proactive Linux-only guard
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        if: runner.os == 'Linux' && (matrix.suite == 'pwa' || matrix.suite == 'golden-path')
        # INFRA-1534: macOS self-hosted skips apt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        if: matrix.suite == 'pwa' || matrix.suite == 'golden-path'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: matrix.suite == 'pwa' || matrix.suite == 'golden-path'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.cache-key }}

      # ── pwa-only: Ollama + Playwright ───────────────────────────────────────
      - name: Cache Ollama models
        if: matrix.suite == 'pwa'
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ runner.os }}-qwen25-7b-v2

      - name: Ollama for PWA Playwright (real LLM)
        if: matrix.suite == 'pwa'
        env:
          CHUMP_CI_OLLAMA_MODEL: qwen2.5:7b
        run: bash scripts/ci/ci-setup-ollama-e2e.sh

      - name: PWA Playwright E2E
        if: matrix.suite == 'pwa'
        env:
          CHUMP_E2E_BASE_URL: http://127.0.0.1:3847
          CHUMP_LIGHT_CONTEXT: "1"
          OPENAI_API_BASE: http://127.0.0.1:11434/v1
          OPENAI_API_KEY: ollama
          OPENAI_MODEL: qwen2.5:7b
        run: |
          cargo build --bin chump
          CHUMP_WEB_PORT=3847 CHUMP_WEB_TOKEN="" \
            CHUMP_LIGHT_CONTEXT="$CHUMP_LIGHT_CONTEXT" \
            OPENAI_API_BASE="$OPENAI_API_BASE" OPENAI_API_KEY="$OPENAI_API_KEY" OPENAI_MODEL="$OPENAI_MODEL" \
            ${CARGO_TARGET_DIR:-./target}/debug/chump --web &
          CHUMP_WEB_PID=$!
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:3847/api/health >/dev/null; then
              echo "chump web ready"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3847/api/health >/dev/null
          CHUMP_E2E_BASE_URL=http://127.0.0.1:3847 bash scripts/ci/chump-preflight.sh
          cd e2e && npm ci && npx playwright install chromium && npx playwright test
          kill "${CHUMP_WEB_PID}" || true
          wait "${CHUMP_WEB_PID}" 2>/dev/null || true

      # ── battle-sim-only: lightweight, no LLM, no cargo ──────────────────────
      - name: Battle sim suite (no web / no LLM)
        if: matrix.suite == 'battle-sim' && matrix.enabled == true
        # RESILIENT-016: enabled=false above; this step only runs if manually re-enabled.
        env:
          BATTLE_SIM_SKIP_CARGO: 1
          BATTLE_SIM_SKIP_IF_NO_LLM: 1
        run: bash scripts/ci/run-battle-sim-suite.sh

      # ── golden-path-only: cargo build, no Ollama ────────────────────────────
      - name: External golden path smoke
        if: matrix.suite == 'golden-path' && matrix.enabled == true
        # RESILIENT-016: enabled=false above; this step only runs if manually re-enabled.
        run: bash scripts/ci/verify-external-golden-path.sh

      - name: Golden path timing (JSONL + artifact)
        if: matrix.suite == 'golden-path' && matrix.enabled == true
        env:
          GOLDEN_MAX_CARGO_BUILD_SEC: 1800
        run: bash scripts/ci/golden-path-timing.sh

      - name: Upload golden path timing log
        if: always() && matrix.suite == 'golden-path' && matrix.enabled == true
        uses: actions/upload-artifact@v4
        with:
          name: golden-path-timing
          path: logs/golden-path-timing-*.jsonl
          if-no-files-found: ignore

  # ── E2E rollup (keeps the required-check name) ────────────────────────────
  # Same pattern as the `test` rollup (INFRA-213): thin job that succeeds iff
  # all matrix e2e shards succeed (or are skipped on non-e2e PRs).
  # Updated by META-267: was needs: [e2e-pwa, e2e-battle-sim, e2e-golden-path].
  test-e2e:
    needs: [e2e]
    if: always()
    runs-on: ubuntu-latest
    # INFRA-1348: e2e shards all have continue-on-error: true, so test-e2e
    # normally always succeeds. But runner failures or script errors in this
    # aggregator itself could still contribute FAILURE to rollup state, blocking
    # auto-merge on PRs where all required checks (test, audit, ACP) passed.
    continue-on-error: true
    steps:
      - name: Verify all e2e matrix shards passed
        run: |
          result="${{ needs.e2e.result }}"
          echo "e2e matrix result=$result"
          case "$result" in
            success|skipped) echo "All e2e shards green (or appropriately skipped)." ;;
            *) echo "::error::e2e matrix failed (result=$result)"; exit 1 ;;
          esac

  # ── META-261: collapsed stub/required pairs (CI strip-back §5.NEW) ────────
  # The old INFRA-1143 stub pattern (synthetic-green "stub" jobs that fired on
  # non-code PRs to satisfy required checks) is replaced by native
  # needs.result-based aggregators. GitHub treats a job with `if: always()` +
  # `needs:` as always emitting a check-run, and skipped ≠ failure at the
  # branch-protection layer when the aggregator explicitly maps SKIPPED → exit 0.
  #
  # Pattern per aggregator:
  #   if: always()                          # always emits a check-run
  #   needs: [<real-job>]                   # no stub dep
  #   step: if result == success OR skipped → exit 0; else exit 1
  #
  # This drops 4 stub jobs (clippy-stub, cargo-test-stub, fast-checks-stub,
  # audit-stub) that existed solely to inject SUCCESS when the real job skipped.
  # The *-required job names and context names are UNCHANGED — branch-protection
  # rulesets continue to consume the same check-run contexts.
  # ──────────────────────────────────────────────────────────────────────────

  # ── clippy-required: rollup that branch protection enforces ──────────────
  clippy-required:
    name: clippy-required
    needs: [clippy]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify clippy passed or was appropriately skipped
        run: |
          result="${{ needs.clippy.result }}"
          echo "clippy=$result"
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            echo "clippy-required: PASS (result=$result)"
          else
            echo "::error::clippy-required FAIL (result=$result)"
            exit 1
          fi

  # ── cargo-test-required: rollup that branch protection enforces ───────────
  cargo-test-required:
    name: cargo-test-required
    needs: [cargo-test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify cargo-test passed or was appropriately skipped
        run: |
          result="${{ needs.cargo-test.result }}"
          echo "cargo-test=$result"
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            echo "cargo-test-required: PASS (result=$result)"
          else
            echo "::error::cargo-test-required FAIL (result=$result)"
            exit 1
          fi

  # ── fast-checks-required: rollup that branch protection enforces ──────────
  fast-checks-required:
    name: fast-checks-required
    needs: [fast-checks]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify fast-checks passed or was appropriately skipped
        run: |
          result="${{ needs.fast-checks.result }}"
          echo "fast-checks=$result"
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            echo "fast-checks-required: PASS (result=$result)"
          else
            echo "::error::fast-checks-required FAIL (result=$result)"
            exit 1
          fi

  # ── System integration test (INFRA-849) ──────────────────────────────────────
  # Non-blocking end-to-end test for the claim→commit→ship pipeline using stubs.
  # Does not gate merges (continue-on-error: true); provides CREDIBLE signal
  # that the full pipeline round-trips without requiring real GitHub API calls.
  integration-test:
    name: System integration test (INFRA-849)
    runs-on: ubuntu-latest
    needs: [fast-checks]
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-integration-test

      - name: Build chump binary
        run: cargo build --bin chump --quiet 2>&1 | tail -3

      - name: Run system integration test
        run: bash scripts/ci/test-system-integration.sh
        env:
          CHUMP_INTEGRATION_TEST: "1"
          CHUMP_BIN: target/debug/chump
