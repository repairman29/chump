name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # PRs and merge queue: drop redundant runs. main pushes: let each finish (artifacts, bisect).
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Path filter ────────────────────────────────────────────────────────────
  # Determines which downstream jobs need to run.  Both tauri-cowork-e2e and
  # test-e2e check the outputs of this job via `needs.changes.outputs.*`.
  # On push-to-main and merge_group every path is considered changed so the
  # full suite always runs there.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      e2e: ${{ steps.filter.outputs.e2e }}
      tauri: ${{ steps.filter.outputs.tauri }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'crates/**'
              - 'desktop/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/**'
              - '.release-plz.toml'
              - 'scripts/**'
            e2e:
              - 'src/**'
              - 'web/**'
              - 'e2e/**'
              - 'scripts/ci/ci-setup-ollama-e2e.sh'
              - 'scripts/ci/chump-preflight.sh'
              - 'scripts/ci/run-battle-sim-suite.sh'
              - 'scripts/eval/dogfood-matrix.sh'
              - 'scripts/ci/golden-path-timing.sh'
              - 'scripts/ci/verify-external-golden-path.sh'
              - '.github/workflows/ci.yml'
            tauri:
              - 'src/**'
              - 'desktop/**'
              - 'e2e-tauri/**'
              - '.github/workflows/ci.yml'

  # ── Tauri Cowork E2E ───────────────────────────────────────────────────────
  # Only runs when desktop / src / e2e-tauri files change. Skipped on
  # docs-only, scripts-only, crate-only PRs.
  tauri-cowork-e2e:
    needs: changes
    if: needs.changes.outputs.tauri == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Same rationale as the test job's Free disk space step — this job
      # builds chump + chump-desktop (two binaries) plus tauri-driver.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri + WebDriver system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            webkit2gtk-driver \
            xvfb \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev

      - name: Cache tauri-driver binary
        id: tauri-driver-cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-crate-ubuntu-amd64-v1

      - name: Install tauri-driver
        if: steps.tauri-driver-cache.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --locked

      - name: Build chump + Cowork (Tauri) shell
        run: |
          cargo build --bin chump
          cargo build -p chump-desktop

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cowork WebDriver E2E (xvfb)
        env:
          CHUMP_WEB_PORT: '3848'
          CHUMP_WEB_TOKEN: ''
          CHUMP_DESKTOP_API_BASE: http://127.0.0.1:3848
          CHUMP_DESKTOP_AUTO_WEB: '0'
        run: |
          ./target/debug/chump --web &
          CHUMP_PID=$!
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:3848/api/health >/dev/null; then
              echo "chump web ready"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3848/api/health >/dev/null
          cd e2e-tauri && npm ci
          xvfb-run -a npm test
          kill "${CHUMP_PID}" || true
          wait "${CHUMP_PID}" 2>/dev/null || true

  # ── Fast unit / lint job (required check) ─────────────────────────────────
  # Runs when code changes.  Target: < 8 min.
  # fmt + cargo test --workspace + clippy + web JS self-tests.
  # No Ollama, no Playwright, no release build.
  # Skipped for docs-only, scripts-only, or gaps.yaml-only changes.
  test:
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # INFRA-CI-DISKSPACE: ubuntu-latest ships with ~14 GB free. Strip ~20 GB
      # of pre-installed SDKs we don't use so the disk can breathe.
      # Costs ~15s; prevents the "No space left on device" flake that was
      # tripping ~40% of main CI runs as of 2026-04-17.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: Verify web/index.html inline JS parses
        run: node scripts/ci/verify-web-index-inline-scripts.cjs

      - name: Web UI self-tests (SSE parser)
        run: node scripts/ci/run-web-ui-selftests.cjs

      - name: RESEARCH-026 observer-effect harness preflight (no API)
        run: bash scripts/ci/test-research-026-preflight.sh

      - name: Research Lane A smoke (RESEARCH-018 harness surface, no API)
        env:
          PYTHON: python3
        run: bash scripts/eval/research-lane-a-smoke.sh

      - name: gap-preflight unregistered-ID guard (INFRA-020)
        run: bash scripts/ci/test-gap-preflight-unregistered.sh

      - name: docs/gaps.yaml must not exist after INFRA-188 cutover
        run: |
          if [ -f docs/gaps.yaml ]; then
            echo "ERROR: docs/gaps.yaml was re-added after INFRA-188 cutover."
            echo "The monolithic file was removed in INFRA-188. Use the per-file layout:"
            echo "  docs/gaps/<ID>.yaml  — one file per gap"
            echo "To add a new gap: chump gap reserve --domain D --title T"
            echo "To close a gap:   chump gap ship <ID> --closed-pr N --update-yaml"
            exit 1
          fi
          echo "OK: docs/gaps.yaml absent (INFRA-188 cutover confirmed)"

      - name: preregistration content guard (INFRA-113)
        run: bash scripts/ci/test-prereg-content-guard.sh

      - name: cross-judge audit guard (INFRA-079)
        run: bash scripts/ci/test-cross-judge-guard.sh

      - name: book/src ↔ docs/process sync guard (INFRA-170)
        run: bash scripts/ci/test-book-sync-guard.sh

      - name: submodule-sanity guard (INFRA-158)
        run: bash scripts/ci/test-submodule-guard.sh

      - name: credential-pattern guard (INFRA-158)
        run: bash scripts/ci/test-credential-pattern-guard.sh

      - name: docs-delta guard (INFRA-158)
        run: bash scripts/ci/test-docs-delta-guard.sh

      - name: gap-status-flip guard (INFRA-158)
        run: bash scripts/ci/test-gap-status-flip.sh

      - name: raw-YAML-edit guard (INFRA-200, blocking since 2026-05-02)
        run: bash scripts/ci/test-raw-yaml-guard.sh

      - name: git index mutex — concurrent chump-commit.sh stomp guard (META-011)
        run: bash scripts/ci/test-meta-011-git-stomp.sh

      - name: ambient-jsonl emit-time schema validation (INFRA-101)
        run: bash scripts/ci/test-ambient-schema.sh

      - name: install-ambient-hooks idempotence + bypass (FLEET-023)
        run: bash scripts/ci/test-install-ambient-hooks.sh

      - name: gap-reserve concurrency + preflight (INFRA-021)
        run: |
          # INFRA-100: gap-reserve.sh now invokes `chump gap reserve`
          # for atomic next-ID picking. Build the binary and put it on
          # PATH so the test scripts (and the script under test) see it.
          # Dev profile is already cached from the earlier `cargo test
          # --workspace` step, so this is fast.
          cargo build --bin chump
          export PATH="$(pwd)/target/debug:$PATH"
          bash scripts/ci/test-gap-reserve-concurrency.sh
          bash scripts/ci/test-gap-reserve-preflight.sh

      - name: gap-reserve ID zero-padding (INFRA-080)
        run: |
          # INFRA-100: same chump-on-PATH requirement as the prior step.
          export PATH="$(pwd)/target/debug:$PATH"
          bash scripts/ci/test-gap-reserve-padding.sh

      - name: bot-merge auto-close handshake (INFRA-154)
        run: |
          # Build a debug chump binary so the test sees current --closed-pr
          # support rather than whatever's in PATH (or nothing). The dev
          # profile is already cached from `cargo test --workspace` if that
          # ran earlier, so this is fast.
          cargo build --bin chump
          CHUMP_BIN="$(pwd)/target/debug/chump" \
            bash scripts/ci/test-bot-merge-auto-close.sh

      - name: Dual-surface coordination smoke (INFRA-032)
        # RESEARCH-018 closed 2026-04-23; use RESEARCH-020 (still-open P1)
        run: bash scripts/ci/coord-surfaces-smoke.sh RESEARCH-020

      - name: chump-mcp-coord tools/list (INFRA-033)
        run: bash scripts/ci/test-mcp-coord-smoke.sh

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # INFRA-024: standalone example workspace (not a root workspace member).
      # Locked build catches accidental drift in examples/apalis-poc/Cargo.lock.
      - name: apalis-poc (standalone, --locked)
        run: cargo build --locked --manifest-path examples/apalis-poc/Cargo.toml

  # ── Heavy E2E / integration job (gated by paths) ──────────────────────────
  # Runs when src/, web/, e2e/, or CI-adjacent scripts change.
  # Skipped on docs-only, crate-only, gaps.yaml, scripts/ab-harness changes.
  # On push-to-main always runs (catches regressions on the trunk).
  #
  # Contains: Ollama + qwen2.5:7b, PWA Playwright, battle-sim, dogfood
  # matrix, golden path timing.  ~15 min when it runs; 0 min when skipped.
  test-e2e:
    needs: [test, changes]
    if: needs.changes.outputs.e2e == 'true' || github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache Ollama models (PWA E2E)
        uses: actions/cache@v5
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ runner.os }}-qwen25-7b-v2

      - name: Ollama for PWA Playwright (real LLM)
        env:
          CHUMP_CI_OLLAMA_MODEL: qwen2.5:7b
        run: bash scripts/ci/ci-setup-ollama-e2e.sh

      - name: PWA Playwright E2E
        env:
          CHUMP_E2E_BASE_URL: http://127.0.0.1:3847
          OPENAI_API_BASE: http://127.0.0.1:11434/v1
          OPENAI_API_KEY: ollama
          OPENAI_MODEL: qwen2.5:7b
        run: |
          cargo build --bin chump
          CHUMP_WEB_PORT=3847 CHUMP_WEB_TOKEN="" \
            OPENAI_API_BASE="$OPENAI_API_BASE" OPENAI_API_KEY="$OPENAI_API_KEY" OPENAI_MODEL="$OPENAI_MODEL" \
            ./target/debug/chump --web &
          CHUMP_WEB_PID=$!
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:3847/api/health >/dev/null; then
              echo "chump web ready"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3847/api/health >/dev/null
          CHUMP_E2E_BASE_URL=http://127.0.0.1:3847 bash scripts/ci/chump-preflight.sh
          cd e2e && npm ci && npx playwright install chromium && npx playwright test
          kill "${CHUMP_WEB_PID}" || true
          wait "${CHUMP_WEB_PID}" 2>/dev/null || true

      - name: Battle sim suite (no web / no LLM)
        env:
          BATTLE_SIM_SKIP_CARGO: 1
          BATTLE_SIM_SKIP_IF_NO_LLM: 1
        run: bash scripts/ci/run-battle-sim-suite.sh

      # Dogfood matrix quick smoke. Catches tool-chain regressions that unit
      # tests miss — e.g. the task #58 Metal crash that shipped while
      # `cargo test` was green. ~6 min on CI runners.
      - name: Dogfood matrix (quick)
        continue-on-error: true
        env:
          OPENAI_API_BASE: http://127.0.0.1:11434/v1
          OPENAI_API_KEY: ollama
          OPENAI_MODEL: qwen2.5:7b
          CHUMP_HOME: ${{ github.workspace }}
          CHUMP_REPO: ${{ github.workspace }}
          CHUMP_READ_FILE_MAX_CHARS: 12000
        run: |
          if ! curl -fsS --max-time 3 http://127.0.0.1:11434/api/tags >/dev/null; then
            echo "::warning::Ollama not reachable; skipping dogfood matrix (non-fatal)"
            exit 0
          fi
          cargo build --release --bin chump
          ./scripts/eval/dogfood-matrix.sh --quick

      - name: External golden path smoke
        run: bash scripts/ci/verify-external-golden-path.sh

      - name: Golden path timing (JSONL + artifact)
        env:
          GOLDEN_MAX_CARGO_BUILD_SEC: 1800
        run: bash scripts/ci/golden-path-timing.sh

      - name: Upload golden path timing log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: golden-path-timing
          path: logs/golden-path-timing-*.jsonl
          if-no-files-found: ignore

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit (advisory list — non-blocking)
        continue-on-error: true
        run: cargo audit

      # SECURITY-004 (2026-05-02): blocking pass that fails CI on any new
      # vulnerability. Existing-but-unfixable advisories are explicitly
      # ignored with --ignore + a pointer to the upstream block. To add a
      # new ignore: confirm the upstream chain is the blocker (cargo audit
      # tree shows the path), then add the RUSTSEC ID + a one-line comment.
      # Do NOT add ignores for advisories that have a fix available — bump
      # the dep instead.
      - name: Run cargo audit (blocking on new vulns)
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2026-0097
          # Ignored RUSTSEC IDs (each blocked on upstream — re-audit when
          # the ecosystem moves):
          #   2023-0071  rsa Marvin attack          — no fixed version published
          #   2026-0049  rustls-webpki CRL DP       — blocked on serenity 0.12 → newer rustls
          #   2026-0098  rustls-webpki URI names    — blocked on serenity 0.12 → newer rustls
          #   2026-0099  rustls-webpki wildcard     — blocked on serenity 0.12 → newer rustls
          #   2026-0104  rustls-webpki HIGH panic   — blocked on serenity 0.12 → newer rustls
          #     Reachability note: the panic requires server-supplied malformed
          #     CRL BIT STRINGs. chump's serenity path is Discord WS only;
          #     Discord does not send CRLs over its WebSocket gateway, so
          #     the path appears non-reachable in practice. Still want the
          #     fix once serenity 0.13 lands.
          #   2024-0436  paste unmaintained          — transitive (tauri/wasmtime), benign
          #   2026-0097  rand 0.7 unsound logger     — transitive (tauri/phf), no fix path
