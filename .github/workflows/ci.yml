name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  merge_group:
  # INFRA-1395: grace-window re-runs — when a new required check is added,
  # required-check-monitor.sh dispatches this workflow with grace=1 for PRs
  # opened before grace_until. The guard below skips the new check for those
  # PRs during the 30-minute grace window. After grace_until expires, the
  # dispatch no longer fires and the check is fully required.
  workflow_dispatch:
    inputs:
      grace:
        description: 'Set to 1 to skip newly added required checks (INFRA-1395 grace window)'
        required: false
        default: '0'
      pr:
        description: 'PR number receiving the grace re-run (informational)'
        required: false
        default: ''

concurrency:
  # Push to main gets a unique group per run (github.run_id) so concurrency never cancels it —
  # we need every main push to complete for the green-main signal (ship_quality grades, bisect, regression diagnosis).
  #
  # INFRA-1852 (2026-05-23): PR events previously keyed the group on the PR
  # number, which meant consecutive pushes to the same PR cancelled each
  # other's in-flight `audit` job. The `audit-required` aggregator (which
  # requires audit == SUCCESS) flipped to FAILURE because cancelled != success.
  # We hit this 10+ times in a single session — operator workaround was empty-
  # commit retrigger, costing ~5 min per occurrence.
  #
  # Fix: PR / merge_group events now key the group on github.sha (the commit
  # being CI'd), not the PR number. Each unique commit gets its own group, so
  # a fixup push of commit B does NOT cancel the in-flight CI for commit A —
  # both complete, both report. Costs: when an operator force-pushes 3 fixup
  # commits within ~30s, GH may run CI on all 3 (rather than just the latest),
  # so runner-pool consumption goes up modestly. Tradeoff is correct: paying
  # a few extra runs beats 10+ false-failures requiring manual retrigger.
  #
  # Prior form: `github.event.pull_request.number || github.ref` for non-push.
  # Prior form used `cancel-in-progress: ${{ <expr> }}` which evaluates to the string "false" for push events,
  # and Actions treats any non-empty string as truthy — so main runs were silently cancelled. (INFRA-1001)
  group: ci-${{ github.workflow }}-${{ github.event_name == 'push' && github.run_id || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # INFRA-1395: grace-window flag — set to '1' by required-check-monitor.sh
  # workflow_dispatch for PRs opened before grace_until. Jobs guarded with
  # `if: env.SKIP_GRACE_CHECKS != '1' || github.event_name != 'workflow_dispatch'`
  # are skipped during the grace window and treated as neutral (non-blocking).
  SKIP_GRACE_CHECKS: ${{ github.event.inputs.grace == '1' && '1' || '0' }}
  # INFRA-2093: sccache + Cloudflare R2 shared compile cache. First runner to
  # build any crate version writes to R2; every other runner (and PR) reads
  # the compiled artifact from R2. Target: 50-70% cargo build wall-clock
  # reduction on cache hits across Wave-1 cohort (INFRA-2094 nextest +
  # INFRA-2095 merge queue + this).
  #
  # Required GH Actions secrets (operator action — see docs/process/SCCACHE_R2_CACHE.md):
  #   R2_ACCOUNT_ID        — 32-char Cloudflare account ID (from dashboard URL)
  #   R2_ACCESS_KEY_ID     — R2 API token's access key ID
  #   R2_SECRET_ACCESS_KEY — R2 API token's secret access key
  #
  # NOTE: RUSTC_WRAPPER is NOT set at workflow level — set per-job only
  # in cargo-test where sccache install also lives. Workflow-level
  # RUSTC_WRAPPER caused other jobs (audit, etc.) to try sccache without
  # the binary on PATH. Per-job scoping is the safer pattern.
  SCCACHE_BUCKET: ${{ vars.SCCACHE_BUCKET || 'chump-sccache' }}
  SCCACHE_REGION: auto
  SCCACHE_ENDPOINT: ${{ secrets.R2_ACCOUNT_ID && format('https://{0}.r2.cloudflarestorage.com', secrets.R2_ACCOUNT_ID) || '' }}
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  SCCACHE_ERROR_LOG: /tmp/sccache.log
  SCCACHE_LOG: info

jobs:
  # ── Path filter ────────────────────────────────────────────────────────────
  # Determines which downstream jobs need to run.  Both tauri-cowork-e2e and
  # test-e2e check the outputs of this job via `needs.changes.outputs.*`.
  # On push-to-main and merge_group every path is considered changed so the
  # full suite always runs there.
  changes:
    # INFRA-1537: route `changes` to self-hosted too. Without this, every CI
    # run blocks on ubuntu-latest's path-filter dispatch before reaching the
    # self-hosted lanes — defeating the migration's capacity gain when GH-
    # hosted is saturated. Forward-compatible with INFRA-1567 per-lane
    # toggle: setting CHUMP_SELF_HOSTED_CHANGES=false opts this single lane
    # back to ubuntu-latest while leaving the others on M4.
    runs-on: ${{ vars.CHUMP_SELF_HOSTED_ENABLED == 'true' && vars.CHUMP_SELF_HOSTED_CHANGES != 'false' && fromJSON('["self-hosted","macos-arm64","chump-fleet"]') || 'ubuntu-latest' }}
    timeout-minutes: 5  # path filter only; <30s in practice
    # INFRA-1348: dorny/paths-filter can fail transiently (GitHub runner issue,
    # network blip). A FAILURE here flips rollup state and blocks auto-merge
    # even though all correctness gates (test, audit, ACP) passed. COE makes
    # the conclusion "neutral" on failure; downstream jobs see null outputs
    # and treat all path-filters as false (= skip) which is safe.
    continue-on-error: true
    outputs:
      gap_reserve: ${{ steps.filter.outputs.gap_reserve }}  # INFRA-2317
      code: ${{ steps.filter.outputs.code }}
      e2e: ${{ steps.filter.outputs.e2e }}
      tauri: ${{ steps.filter.outputs.tauri }}
      rust: ${{ steps.filter.outputs.rust }}
      scripts: ${{ steps.filter.outputs.scripts }}
      acp: ${{ steps.filter.outputs.acp }}
      docs: ${{ steps.filter.outputs.docs }}
      # INFRA-1379: granular lane outputs
      rust_code: ${{ steps.filter.outputs.rust }}
      web_code: ${{ steps.filter.outputs.web_code }}
      ci_config_only: ${{ steps.lanes.outputs.ci_config_only }}
      scripts_only: ${{ steps.lanes.outputs.scripts_only }}
      docs_only: ${{ steps.lanes.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              # INFRA-272: This is an ALLOWLIST. Required status checks
              # (test rollup, audit, ACP) are gated by this filter — if a
              # PR's diff matches NONE of these patterns, the gated jobs
              # mark "skipped" and branch protection blocks the merge
              # forever (skipped != passing). Killed PR #803 (workflow-
              # only diff) and almost killed PR #874 on 2026-05-02. Any
              # path that can be the SOLE diff of a real PR must be
              # listed here. When in doubt, add it — the cost of a
              # spurious build is far lower than a stuck PR.
              - 'src/**'
              - 'crates/**'
              - 'desktop/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/**'
              - '.release-plz.toml'
              - 'scripts/**'
              - 'docs/**'
              - 'ChumpMenu/**'
              - 'Formula/**'
              - 'bin/**'
              - 'book/**'
              - 'chump-tool-macro/**'
              - 'config/**'
              - 'docker/**'
              - 'e2e/**'
              - 'e2e-tauri/**'
              - 'examples/**'
              - 'extensions/**'
              - 'experiments/**'
              - 'launchd/**'
              - 'migrations/**'
              - 'path/**'
              - 'projects/**'
              - 'recipes/**'
              - 'registry-submission/**'
              - 'repos/**'
              - 'skills-bundle/**'
              - 'supabase/**'
              - 'templates/**'
              - 'tests/**'
              - 'wasm/**'
              - 'web/**'
            e2e:
              - 'src/**'
              - 'web/**'
              - 'e2e/**'
              - 'scripts/ci/ci-setup-ollama-e2e.sh'
              - 'scripts/ci/chump-preflight.sh'
              - 'scripts/ci/run-battle-sim-suite.sh'
              - 'scripts/eval/dogfood-matrix.sh'
              - 'scripts/ci/golden-path-timing.sh'
              - 'scripts/ci/verify-external-golden-path.sh'
              - '.github/workflows/ci.yml'
            tauri:
              - 'src/**'
              - 'desktop/**'
              - 'e2e-tauri/**'
            rust:
              - 'src/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'chump-tool-macro/**'
              - 'build.rs'
              - 'tests/**'
              - 'wasm/**'
            scripts:
              - 'scripts/**'
              - '.github/workflows/**'
              - 'bin/**'
              - 'launchd/**'
              - 'config/**'
              - '.release-plz.toml'
            # INFRA-2317: narrow filter for the gap-reserve concurrency test
            # — only run when PR could regress gap-reserve.sh or chump-gap-store.
            # The test detects a real race (INFRA-021/301), not a flake, so
            # we preserve coverage on relevant PRs while unblocking the rest.
            gap_reserve:
              - 'scripts/coord/gap-reserve.sh'
              - 'crates/chump-gap-store/**'
              - 'src/commands/gap_reserve*.rs'
              - 'scripts/ci/test-gap-reserve-concurrency.sh'
            acp:
              - 'src/acp.rs'
              - 'src/acp_server.rs'
              - 'crates/chump-tool-macro/**'
            docs:
              - 'docs/**'
              - 'book/**'
              - '*.md'
              - 'CONTRIBUTING.md'
              - 'CODE_OF_CONDUCT.md'
              - 'CHANGELOG.md'
              - 'SECURITY.md'
            # INFRA-1379: new granular lane filters
            web_code:
              - 'web/**'
              - 'ChumpMenu/**'
            ci_config_raw:
              - '.github/workflows/**'

      # INFRA-1379: Compute derived exclusion flags.  dorny/paths-filter can
      # only tell you IF a path changed; it cannot tell you if that was the
      # ONLY thing that changed.  We compute docs_only / scripts_only /
      # ci_config_only here so stubs can fire on pure-lane PRs.
      - name: Compute lane flags (INFRA-1379)
        id: lanes
        run: |
          rust="${{ steps.filter.outputs.rust }}"
          web="${{ steps.filter.outputs.web_code }}"
          scripts="${{ steps.filter.outputs.scripts }}"
          docs="${{ steps.filter.outputs.docs }}"
          ci="${{ steps.filter.outputs.ci_config_raw }}"

          # docs_only: docs changed but no rust / web / scripts
          if [[ "$docs" == "true" && "$rust" != "true" && "$web" != "true" && "$scripts" != "true" && "$ci" != "true" ]]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

          # scripts_only: scripts changed but no rust / web
          if [[ "$scripts" == "true" && "$rust" != "true" && "$web" != "true" ]]; then
            echo "scripts_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "scripts_only=false" >> "$GITHUB_OUTPUT"
          fi

          # ci_config_only: only .github/workflows/** changed
          if [[ "$ci" == "true" && "$rust" != "true" && "$web" != "true" && "$scripts" != "true" && "$docs" != "true" ]]; then
            echo "ci_config_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "ci_config_only=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Tauri Cowork E2E ───────────────────────────────────────────────────────
  # Only runs when desktop / src / e2e-tauri files change. Skipped on
  # docs-only, scripts-only, crate-only PRs.
  tauri-cowork-e2e:
    needs: changes
    # RESILIENT-016 (2026-05-17): disabled on PR runs — moved to ci-nightly.yml
    # (cron daily). Selenium timeouts were blocking 5+ PRs (INFRA-1529). The
    # test-e2e aggregator treats skipped as success so no branch-protection impact.
    if: false
    continue-on-error: true
    runs-on: ${{ vars.RUNNER_TAURI_COWORK_E2E != '' && fromJSON(vars.RUNNER_TAURI_COWORK_E2E) || 'ubuntu-latest' }}  # INFRA-1542: lane override via repo var (unset → ubuntu-latest)
    steps:
      - uses: actions/checkout@v4

      # Same rationale as the test job's Free disk space step — this job
      # builds chump + chump-desktop (two binaries) plus tauri-driver.
      - name: Free disk space
        if: runner.os == 'Linux'  # INFRA-1539: proactive Linux-only guard
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri + WebDriver system packages
        if: runner.os == 'Linux'  # INFRA-1542: apt-get gated on Linux (macOS uses native WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            webkit2gtk-driver \
            xvfb \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            util-linux

      - name: Cache tauri-driver binary
        id: tauri-driver-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-crate-ubuntu-amd64-v1

      - name: Install tauri-driver
        # INFRA-2244: cargo-binstall fetches pre-built binary (~5s) vs cargo
        # install's compile-from-source (~90s). Falls back to compile if no
        # pre-built binary is published for the tool/platform.
        if: steps.tauri-driver-cache.outputs.cache-hit != 'true'
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash \
            || cargo install cargo-binstall --locked
          cargo binstall -y tauri-driver \
            || cargo install tauri-driver --locked

      - name: Build chump + Cowork (Tauri) shell
        run: |
          cargo build --bin chump
          cargo build -p chump-desktop

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cowork WebDriver E2E (xvfb)
        env:
          CHUMP_WEB_PORT: '3848'
          CHUMP_WEB_TOKEN: ''
          CHUMP_DESKTOP_API_BASE: http://127.0.0.1:3848
          CHUMP_DESKTOP_AUTO_WEB: '0'
        run: |
          ${CARGO_TARGET_DIR:-./target}/debug/chump --web &
          CHUMP_PID=$!
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:3848/api/health >/dev/null; then
              echo "chump web ready"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3848/api/health >/dev/null
          cd e2e-tauri && npm ci
          xvfb-run -a npm test
          kill "${CHUMP_PID}" || true
          wait "${CHUMP_PID}" 2>/dev/null || true

  # ── Required-check rollup ─────────────────────────────────────────────────
  # The "test" name is wired into branch protection (required status check).
  # Keep that contract by running this job as a thin rollup that succeeds iff
  # all of the parallel children below succeed. INFRA-213 (2026-05-02) split
  # the previous monolithic ~15-min `test` job into three parallel siblings
  # — fast-checks / clippy / cargo-test — so wall-clock per PR drops to
  # max(children) ≈ 5-8 min instead of sum(children) ≈ 15-20 min. To rename
  # the required check away from "test" we'd need a branch-protection edit
  # (admin); leaving the rollup name as `test` ships the throughput win
  # without touching protection.
  test:
    needs: [fast-checks, clippy, cargo-test, pr-hygiene]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5  # rollup only — quick aggregator check
    steps:
      - name: Verify all parallel CI shards passed
        run: |
          # `if: always()` lets this job run even when a child fails — we
          # then explicitly fail the rollup so the required check is red.
          # "skipped" is acceptable: docs-only / scripts-only PRs (where
          # changes.outputs.code == 'false') skip the shards and the
          # required `test` check should still pass — same behavior as the
          # pre-INFRA-213 monolith, which was also gated by `if:
          # needs.changes.outputs.code == 'true' || …`.
          # CREDIBLE-042/043: pr-hygiene is path-filter-agnostic (runs on
          # every PR regardless of changes), so its result counts toward
          # the rollup unconditionally.
          #
          # INFRA-1002: cascade-cancel classification.  When a shard fails,
          # GitHub Actions cancels downstream shards that haven't started yet.
          # A cancelled shard caused by a sibling failure is NOT a separate bug
          # — it is a cascade-cancel.  Surfacing this distinction reduces orphan
          # PRs where agents give up thinking "2 things broke" when really ONE
          # thing broke and ONE was collateral.
          #
          # Rule: result == 'cancelled' AND at least one peer == 'failure'
          #       ⟹ cascade_cancel (benign for retry — root cause is the failure)
          #       result == 'cancelled' AND no peer == 'failure'
          #       ⟹ real_failure (unexpected cancel — surface to operator)
          fast="${{ needs.fast-checks.result }}"
          clippy="${{ needs.clippy.result }}"
          test="${{ needs.cargo-test.result }}"
          hygiene="${{ needs.pr-hygiene.result }}"
          echo "fast-checks=$fast  clippy=$clippy  cargo-test=$test  pr-hygiene=$hygiene"

          # Pass 1: detect whether any shard has a real failure (not cancelled).
          any_real_failure=0
          for r in "$fast" "$clippy" "$test" "$hygiene"; do
            [ "$r" = "failure" ] && any_real_failure=1
          done

          # Pass 2: classify each shard.
          real_failures="" cascade_cancels="" passed="" skipped_list=""
          classify() {
            local name="$1" result="$2"
            case "$result" in
              success)  passed="${passed:+$passed,}$name" ;;
              skipped)  skipped_list="${skipped_list:+$skipped_list,}$name" ;;
              failure)  real_failures="${real_failures:+$real_failures,}$name" ;;
              cancelled)
                if [ "$any_real_failure" = "1" ]; then
                  cascade_cancels="${cascade_cancels:+$cascade_cancels,}$name"
                else
                  real_failures="${real_failures:+$real_failures,}$name"
                fi
                ;;
              *) real_failures="${real_failures:+$real_failures,}$name" ;;
            esac
          }
          classify "fast-checks" "$fast"
          classify "clippy"      "$clippy"
          classify "cargo-test"  "$test"
          classify "pr-hygiene"  "$hygiene"

          # Structured summary (visible in GHA step log + step summary).
          echo ""
          echo "=== INFRA-1002 shard classification ==="
          echo "  real_failures:    [${real_failures:-none}]"
          echo "  cascade_cancels:  [${cascade_cancels:-none}]"
          echo "  passed:           [${passed:-none}]"
          echo "  skipped:          [${skipped_list:-none}]"
          echo "========================================"

          # Append to GitHub step summary (shows in PR checks UI).
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            printf '### CI Shard Classification (INFRA-1002)\n' >> "$GITHUB_STEP_SUMMARY"
            printf '| Category | Shards |\n|---|---|\n' >> "$GITHUB_STEP_SUMMARY"
            printf '| Real failures | `%s` |\n' "${real_failures:-none}" >> "$GITHUB_STEP_SUMMARY"
            printf '| Cascade cancels | `%s` |\n' "${cascade_cancels:-none}" >> "$GITHUB_STEP_SUMMARY"
            printf '| Passed | `%s` |\n' "${passed:-none}" >> "$GITHUB_STEP_SUMMARY"
            printf '| Skipped | `%s` |\n\n' "${skipped_list:-none}" >> "$GITHUB_STEP_SUMMARY"
            printf 'Cascade cancels are caused by the failing shard(s) — not independent bugs.\n' >> "$GITHUB_STEP_SUMMARY"
            printf 'Fix the real failure(s) and push to re-run.\n' >> "$GITHUB_STEP_SUMMARY"
          fi

          # Decision: fail only on real failures.
          if [ -n "$real_failures" ]; then
            echo "::error::Real CI failures: [${real_failures}]${cascade_cancels:+ (cascade-cancelled: [${cascade_cancels}])}"
            exit 1
          fi
          echo "All shards green (or appropriately skipped / cascade-cancelled)."

  # ── PR hygiene (CREDIBLE-042/043) ─────────────────────────────────────────
  # Runs on EVERY pull_request regardless of which paths changed. Catches the
  # two PR-shape failure classes that produced the worst incidents in early
  # May 2026:
  #   - PR #1444 silent META-044 revert  →  caught by check-pr-scope.sh
  #   - PR #1441 378k-line mass-deletion →  caught by check-mass-deletion.sh
  #   - PR #1469 bundle (3 unrelated gaps) →  caught by check-pr-scope.sh Rule C
  #   - chore(gaps) + src/ edits          →  caught by check-mass-deletion.sh Rule C
  # All 4 failure classes roll into the `test` required check via needs:.
  #
  # NOT gated by `needs.changes.outputs.code` — these checks are about the
  # PR's *shape* (title + diff size), not its file extensions. A docs-only
  # PR with a misleading 'feat:' title should still fail this gate.
  #
  # Force-fire validated: scripts/ci/test-all-gates-force-fire.sh exercises
  # both checks against synthetic violating fixtures and asserts they fire.
  # See scripts/ci/gate-manifest.yaml (CREDIBLE-050).
  #
  # Retroactive calibration (CREDIBLE-043, 2026-05-13): 0 mass-deletion
  # violations in last 30 merged PRs. Historical violations (#1441, #1444)
  # pre-date the gate. Gate is safe and correctly calibrated.
  pr-hygiene:
    needs: changes
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 10  # CREDIBLE-026 + CREDIBLE-027 gate scripts
    steps:
      - uses: actions/checkout@v4
        with:
          # Both checkers need git history to resolve merge-base against
          # the target branch. fetch-depth: 0 fetches all history.
          fetch-depth: 0

      - name: PR scope-vs-title divergence detector (CREDIBLE-026)
        env:
          GH_TOKEN: ${{ github.token }}
          # INFRA-976: pass current PR title via env so check-pr-scope.sh
          # reads it directly instead of falling back to the (possibly stale)
          # first-commit subject. github.event.pull_request.title is the
          # live title at workflow-trigger time and refreshes on retitle.
          # PR_TITLE is the canonical name; PR_TITLE_ENV kept for compat.
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_TITLE_ENV: ${{ github.event.pull_request.title }}
        run: bash scripts/ci/check-pr-scope.sh

      - name: Mass-deletion / scratch-commit guard (CREDIBLE-027)
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/ci/check-mass-deletion.sh

      - name: Broad canary coverage smoke (INFRA-1568)
        # Asserts every external CLI invoked by self-hosted-targeted workflow
        # steps is exercised by scripts/setup/test-runner-lane-broad-canary.sh.
        # Closes the "canary too narrow" regression hole (2026-05-16 cascade:
        # INFRA-1556/1539/1561). A new external CLI in a workflow step makes
        # this gate fail until the canary surface is taught about it.
        run: bash scripts/ci/test-broad-canary-coverage.sh

      - name: Merge-queue trigger coverage (INFRA-2095, advisory)
        # Verifies every required status check on main has its source workflow
        # firing on merge_group events. Missing trigger = merge queue blocks
        # forever (textbook footgun). Sibling of INFRA-1377 merge-queue-armed
        # gate; this one ensures the queue WILL succeed once enabled.
        # Set CHUMP_MERGE_GROUP_STRICT=1 to make blocking.
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: bash scripts/ci/test-merge-group-coverage.sh

      # INFRA-1541: pre-merge AC coverage gate.
      # ADVISORY-ONLY by default — `CHUMP_AC_GATE_BLOCKING=false` makes the
      # script always exit 0 after emitting `kind=ac_coverage_miss` events
      # for any uncovered AC bullets. Flip the repo var to "true" once the
      # 50-PR observation window shows false-positive rate < 5%. Operator
      # kill-switch: `CHUMP_AC_GATE_ENABLED=false`.
      - name: AC coverage gate (INFRA-1541, advisory)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          CHUMP_AC_GATE_BLOCKING: ${{ vars.CHUMP_AC_GATE_BLOCKING || 'false' }}
          CHUMP_AC_GATE_ENABLED: ${{ vars.CHUMP_AC_GATE_ENABLED || 'true' }}
        run: bash scripts/ci/test-pr-ac-coverage.sh ${{ github.event.pull_request.number }} || true

      - name: Workflow Linux-only step guard sweep (INFRA-1539)
        # Proactive sweep: every workflow step that runs sudo/apt-get/pip-install
        # must carry `if: runner.os == 'Linux'`. Catches the cascade that hit on
        # 2026-05-16 (an unguarded apt-get tripped 8+ PRs when ci.yml shifted to
        # self-hosted macOS). Runs on ubuntu-latest as part of pr-hygiene; the
        # smoke itself is pure awk so it works anywhere.
        run: bash scripts/ci/test-workflow-linux-guard.sh

      # INFRA-1810: installer manifest gate — every scripts/setup/install-*.sh
      # must be mapped to REQUIRED_DAEMONS, optional-installers-allowlist.txt,
      # or deprecated-installers-allowlist.txt. Prevents ship-but-never-install.
      - name: Install manifest gate
        run: bash scripts/ci/test-install-script-manifest.sh

      # INFRA-2280: META-118 daemon install smoke test — validates plist shape
      # (StartInterval, Label, ProgramArguments, log paths) without calling
      # launchctl. Dry-run mode only; safe in CI / Linux environments.
      - name: META-118 daemon install smoke (INFRA-2280)
        run: bash scripts/ci/test-meta-118-daemon-install.sh

      # INFRA-2419: plist-no-tmp-paths gate — verifies no plist template bakes
      # an ephemeral temp path (/tmp/, /private/tmp/, /var/folders/, $TMPDIR)
      # into ProgramArguments or WorkingDirectory. Root cause of the 145-crash
      # integrator-daemon crash-loop (2026-06-01): cd /private/tmp/chump-install
      # was baked in; dir was reaped post-install. Pure static lint; fast, safe
      # in Linux CI (no launchd required). Also mirrored in chump preflight.
      - name: Plist no-tmp-paths gate (INFRA-2419)
        run: bash scripts/ci/test-plist-no-tmp-paths.sh

