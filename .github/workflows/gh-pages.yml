name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - 'docs/**'
      - '.github/workflows/gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          mkdir -p $HOME/.local/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Sync docs into book src
        run: |
          # dissertation.md and architecture.md are canonical in book/src/ — do not overwrite
          cp docs/CHUMP_PROJECT_BRIEF.md book/src/project-brief.md
          cp docs/ECOSYSTEM_VISION.md book/src/ecosystem-vision.md
          cp docs/EXTERNAL_GOLDEN_PATH.md book/src/getting-started.md
          cp docs/OPERATIONS.md book/src/operations.md
          cp docs/RUST_INFRASTRUCTURE.md book/src/rust-infrastructure.md
          cp docs/METRICS.md book/src/metrics.md
          cp docs/CHUMP_TO_COMPLEX.md book/src/chump-to-complex.md
          cp docs/CHUMP_RESEARCH_BRIEF.md book/src/research-brief.md
          cp docs/CONSCIOUSNESS_UTILITY_PASS.md book/src/consciousness-testing.md
          cp docs/ROADMAP.md book/src/roadmap.md

      - name: Build mdBook
        run: mdbook build book

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
