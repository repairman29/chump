name: E2E Dogfood Nightly

# INFRA-549: dogfood matrix moved out of per-PR test-e2e (where it was the
# dominant tail — cargo build --release alone costs ~6 min on cold runners).
# Advisory DB updates daily; running it per-PR was redundant cost.
# Runs nightly on main.  Also triggerable manually for pre-release checks.

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: e2e-dogfood-nightly
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  dogfood-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Free disk space
        if: runner.os == 'Linux'  # INFRA-1539: proactive Linux-only guard
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux packages for chump-desktop (workspace member)
        if: runner.os == 'Linux'  # INFRA-1539: proactive Linux-only guard
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-dogfood-nightly

      - name: Cache Ollama models
        uses: actions/cache@v6
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ runner.os }}-qwen25-7b-v2

      - name: Ollama setup
        env:
          CHUMP_CI_OLLAMA_MODEL: qwen2.5:7b
        run: bash scripts/ci/ci-setup-ollama-e2e.sh

      - name: Dogfood matrix (quick)
        continue-on-error: true
        env:
          OPENAI_API_BASE: http://127.0.0.1:11434/v1
          OPENAI_API_KEY: ollama
          OPENAI_MODEL: qwen2.5:7b
          CHUMP_HOME: ${{ github.workspace }}
          CHUMP_REPO: ${{ github.workspace }}
          CHUMP_READ_FILE_MAX_CHARS: 12000
        run: |
          if ! curl -fsS --max-time 3 http://127.0.0.1:11434/api/tags >/dev/null; then
            echo "::warning::Ollama not reachable; skipping dogfood matrix"
            exit 0
          fi
          cargo build --release --bin chump
          ./scripts/eval/dogfood-matrix.sh --quick
