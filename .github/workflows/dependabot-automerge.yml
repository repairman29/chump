name: Dependabot auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      # INFRA-038 (2026-04-23): re-broadened to patch + minor now that branch
      # protection enforces required CI checks (`test`, `check`, etc — set up
      # in INFRA-037). Bad bumps (like the tokio-tungstenite 0.24 → 0.28
      # incident in INFRA-035) now get blocked at the merge gate instead of
      # needing manual revert. Major bumps still require human review — they
      # almost always have changelogs worth reading.
      - name: Enable auto-merge for patch and minor updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
