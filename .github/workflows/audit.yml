            bash scripts/ci/test-pwa-security.sh

      - name: release --lease <ID> flag — named session release (INFRA-1026)
        if: matrix.shard == 1
        run: |
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" \
            bash scripts/ci/test-release-lease-flag.sh

      - name: chump gap list --since filter (EFFECTIVE-018)
        if: matrix.shard == 1
        run: |
          cargo build --bin chump 2>&1 | tail -3
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" \
            bash scripts/ci/test-gap-list-since.sh

      - name: /api/gap-queue fat shape — 15 fields, filters, sort, pillar derivation, ambient signal (INFRA-1197)
        if: matrix.shard == 1
        run: |
          cargo build --bin chump 2>&1 | tail -3
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" \
            bash scripts/ci/test-api-gap-queue-shape.sh

      - name: cross-PR contract gate — refuse merge on cross-PR IPC schema mismatch (INFRA-2406)
        if: matrix.shard == 1
        # Requires GH_TOKEN for gh pr list (Tier-D — cannot mirror in local preflight).
        # Calls chump contract-scan --in-flight against all open PRs.
        # On mismatch: emits kind=cross_pr_contract_mismatch to ambient.jsonl, exits 1.
        # Operator zero-bypass: NO env-var bypass. Exceptions go in cross-pr-allowlist.txt.
        # See INFRA-2404 (root cause), INFRA-2405 (contract-scan subcommand).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo build --bin chump 2>&1 | tail -3
          export REPO_ROOT="$(pwd)"
          source scripts/ci/lib/discover-chump-bin.sh
          bash scripts/ci/test-cross-pr-contract.sh

      - name: gap list --json schema audit — required fields present in every gap object (CREDIBLE-061)
        if: matrix.shard == 1
        run: bash scripts/ci/test-gap-list-since-json-schema.sh

      - name: CLI version/debug flags (CREDIBLE-019)
        if: matrix.shard == 1
        run: bash scripts/ci/test-cli-version-debug.sh

      - name: run-fleet.sh cross-repo --repo/--locks-dir/--tmux-session flags (INFRA-634)
        if: matrix.shard == 1
        run: bash scripts/ci/test-run-fleet-cross-repo.sh

      - name: run.sh consolidation — dispatcher + deprecation shims + README refs (INFRA-691)
        if: matrix.shard == 1
        run: bash scripts/ci/test-run-consolidation.sh

      - name: tool-call normalizer for weak LLMs (INFRA-740)
        if: matrix.shard == 1
        run: bash scripts/ci/test-tool-normalize.sh

      - name: gap rollback — runbook, rollback-gap.sh, ambient event (INFRA-899)
        if: matrix.shard == 1
        run: bash scripts/ci/test-rollback-gap.sh

      - name: gap rebalance — P0 budget + pillar floor (INFRA-635)
        if: matrix.shard == 1
        run: bash scripts/ci/test-gap-rebalance.sh

      - name: gap pillar-balance — pickable inventory per pillar (INFRA-604)
        if: matrix.shard == 1
        run: bash scripts/ci/test-pillar-balance.sh

      - name: gap quality gate — TODO/TBD ACs, invalid priority/effort (INFRA-904)
        if: matrix.shard == 1
        run: bash scripts/ci/test-gap-quality-gate.sh

      - name: gap templates — pillar starter templates, gap-template.sh dispatcher (INFRA-905)
        if: matrix.shard == 1
        run: bash scripts/ci/test-gap-templates.sh

      - name: per-gap performance profiling — timing wrapper, perf report, flame chart (INFRA-906)
        if: matrix.shard == 1
