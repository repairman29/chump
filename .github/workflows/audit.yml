  # ── audit: aggregate rollup ───────────────────────────────────────────────────
  # CRITICAL: this job name is `audit` — branch protection requires it by exact name
  # (docs/baselines/branch-protection-main.json, ruleset 15133729). DO NOT RENAME.
  #
  # INFRA-2565: replaces the old single-job `audit`. Now an aggregate that needs all
  # audit-shard results and fails iff any shard failed. Wall-clock: max-of-shards
  # (~4-6 min) instead of serial sum (~14 min).
  #
  # INFRA-503 (2026-05-06): cargo audit was the dominant per-PR cycle-time
  # tax (~12min × every PR). Moved to .github/workflows/cargo-audit-nightly.yml
  # (cron daily). Advisory database updates daily, not per-commit, so per-PR
  # was redundant. Median PR cycle drops from 14m → ~5m.
  audit:
    name: audit
    needs: [audit-shard]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check audit-shard results
        run: |
          result="${{ needs.audit-shard.result }}"
          echo "audit-shard result=$result"
          if [ "$result" = "success" ]; then
            echo "audit: all shards passed"
          else
            echo "::error::audit FAIL — at least one audit-shard failed (result=$result)"
            exit 1
          fi

  # ── audit-required: rollup aggregator ────────────────────────────────────────
  # INFRA-2452: moved from ci.yml alongside `audit`. The `audit-required` job
  # aggregates the `audit` result. Both jobs live in this workflow now.
  #
  # NOTE: `audit-required` is NOT in the branch protection required_status_checks
  # (only `audit` is required — see docs/baselines/branch-protection-main.json and
  # ruleset 15133729). This aggregator is preserved for downstream tooling that
  # checks for it (PR rescue, ambient monitoring). It is NOT a branch-protection gate.
  audit-required:
    name: audit-required
    needs: [audit]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CHUMP_REPO: ${{ github.workspace }}
      CHUMP_LOCK_DIR: ${{ github.workspace }}/.chump-locks
    steps:
      - uses: actions/checkout@v4
      - name: Verify audit passed or was appropriately skipped
        run: |
          result="${{ needs.audit.result }}"
          echo "audit=$result"
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            echo "audit-required: PASS (result=$result)"
          else
            echo "::error::audit-required FAIL (result=$result)"
            exit 1
          fi
      - name: INFRA-779 gitdir auto-repair — corrupt + verify repair + ambient event (INFRA-1033)
        run: bash scripts/ci/test-infra-779-gitdir-repair.sh
      - name: pre-push known-flake skip integration (INFRA-1167)
        run: bash scripts/ci/test-known-flake-skip.sh
      - name: pr-scope PR_TITLE fallback chain (INFRA-976)
        run: bash scripts/ci/test-pr-scope-title-fallback.sh
      - name: bot-merge arm-before-ship ordering fix (INFRA-1030)
        run: bash scripts/ci/test-bot-merge-arm-ship-order.sh
      - name: operator-recovery umbrella — CHUMP_OPERATOR_RECOVERY=1 bypass set + audit event (INFRA-1028)
        run: bash scripts/ci/test-operator-recovery.sh

      - name: pillar health dashboard endpoint + web component (PRODUCT-090)
        run: bash scripts/ci/test-pillar-dashboard.sh
      - name: ci-yml merge-driver orphan-step rejection (INFRA-1199)
        run: bash scripts/ci/test-merge-driver-ci-yml-add-row.sh
      - name: ruleset doc-only-PR wedge guard (INFRA-2191)
