      - name: ci-audit-loop subcommands — tick/audit/heartbeat/help + scanner-anchor discipline (INFRA-1923)
        if: matrix.shard == 2
        run: bash scripts/ci/test-ci-audit-loop.sh

      - name: fleet metrics snapshot — ship_rate, waste_rate, cycle_time_p50 (INFRA-900)
