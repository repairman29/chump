name: Audit

# INFRA-2452: the `audit` job was previously in ci.yml, which has a workflow-level
# concurrency block with cancel-in-progress: true. When a new event hit a PR while
# audit was in-flight, the entire ci.yml run was cancelled — including the required
# `audit` job. Result: audit → CANCELLED, branch protection → FAILURE, every PR
# blocked (the gate blocks its own fix). This caused a 3h fleet-wide deadlock on
# 2026-06-02.
#
# Fix: move `audit` and `audit-required` into this dedicated workflow with their own
# concurrency (cancel-in-progress: false, per-SHA group). ci.yml's workflow-level
# cancel-in-progress: true now only applies to the cost-sensitive jobs that remain
# there (fast-checks, clippy, cargo-test, e2e, etc.).
#
# CRITICAL: job names `audit` and `audit-required` are UNCHANGED from their ci.yml
# form. Branch protection requires `audit` by name (docs/baselines/branch-protection-main.json,
# ruleset 15133729). Renaming would silently block every PR with an unsatisfied check.
#
# INFRA-2565: converted from a single 123-step serial job into 4 parallel shards
# (audit-shard matrix) + the required `audit` aggregate that needs: [audit-shard].
# Motivation: 13+ PRs blocked behind a 14-min serial audit queue on 2026-06-03;
# INFRA-2534 (cross-PR contract scan collapsed from 3× to 1×) established the scan
# is worth keeping but the serial scheduling was the bottleneck. Expected wall-clock:
# 14 min → ~4-6 min (max-of-shards, 4 parallel runners).

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  merge_group:

# Workflow-level concurrency: cancel-in-progress: FALSE for this workflow.
# Each unique SHA gets its own group — a fixup push of commit B does NOT cancel
# in-flight audit for commit A. Both complete, both report.
#
# Contrast with ci.yml: ci.yml's workflow-level concurrency uses cancel-in-progress:true
# to save runner cost on rapid fixup pushes for the cost-sensitive jobs (cargo build,
# e2e, etc.). That is correct for those jobs. Audit is cheap (~5min, no cargo-audit
# since INFRA-503) and branch-protection required — it must never be cancelled.
concurrency:
  group: audit-${{ github.event_name == 'push' && github.run_id || github.sha }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # INFRA-2118: per-run CARGO_TARGET_DIR — prevents cross-run build artifact collisions.
  CARGO_TARGET_DIR: /tmp/cargo-target-${{ github.run_id }}-${{ github.run_attempt }}
  # INFRA-2452-fix: sccache R2 env vars (mirrors ci.yml workflow-level block).
  # RUSTC_WRAPPER is NOT set here — set per-job after sccache install to avoid
  # the binary-not-on-PATH failure class documented in ci.yml lines 68-71.
  SCCACHE_BUCKET: ${{ vars.SCCACHE_BUCKET || 'chump-sccache' }}
  SCCACHE_REGION: auto
  SCCACHE_ENDPOINT: ${{ secrets.R2_ACCOUNT_ID && format('https://{0}.r2.cloudflarestorage.com', secrets.R2_ACCOUNT_ID) || '' }}
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  SCCACHE_ERROR_LOG: /tmp/sccache.log
  SCCACHE_LOG: info

jobs:
  # ── audit-shard ──────────────────────────────────────────────────────────────
  # INFRA-2565: 4-way parallel shard matrix replacing the single serial `audit` job.
  # Each shard runs the 8 setup steps then its share of audit gates.
  # Shard groupings:
  #   shard-1: cargo gates — steps requiring `cargo build` / CHUMP_BIN
  #   shard-2: event-registry + observability + webhook/cache telemetry
  #   shard-3: bash/script gates — coordinator, worker, bot-merge, PWA, precommit
  #   shard-4: cross-PR contract gate + security + remaining guards
  audit-shard:
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    name: audit-shard (${{ matrix.shard }})
    # INFRA-2117 (CI-REVIEW Lever 1A, 2026-05-29): audit defaults to GH-hosted ubuntu
    # to eliminate the self-hosted-Mac CI-rot tax (DOC-063 post-mortem).
    # Override: set RUNNER_AUDIT repo var to a JSON labels array if needed for diagnosis.
    runs-on: ${{ vars.RUNNER_AUDIT != '' && fromJSON(vars.RUNNER_AUDIT) || 'ubuntu-latest' }}  # INFRA-1542: lane override via repo var (unset → ubuntu-latest)
    timeout-minutes: 25  # INFRA-2452-fix: bumped 15→25 as cold-cache safety margin while sccache R2 warms
    # INFRA-1959: per-checkout state.db (CHUMP_REPO / CHUMP_LOCK_DIR for test scripts).
    env:
      CHUMP_REPO: ${{ github.workspace }}
      CHUMP_LOCK_DIR: ${{ github.workspace }}/.chump-locks
    steps:
      # ── 8 shared setup steps (replicated in every shard) ────────────────────
      - uses: actions/checkout@v4

      - name: Install Linux packages for chump-desktop (workspace member)
        if: runner.os == 'Linux'  # INFRA-1534: macOS self-hosted skips apt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            util-linux

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-audit
          # INFRA-2118: PR-scoped prefix prevents cross-PR cache pollution.
          prefix-key: "v1-pr-${{ github.event.pull_request.number || github.ref_name }}"

      # INFRA-2452-fix: restore sccache R2 compile cache dropped during audit extraction.
      # Mirrors the ci.yml cargo-test job pattern (lines 1245-1303).
      # RUSTC_WRAPPER is set via GITHUB_ENV after the health probe (not at workflow level)
      # to avoid binary-not-on-PATH failure on steps before sccache is installed.
      - name: Detect R2 secret presence
        id: r2detect
        env:
          R2_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
        run: |
          # RESILIENT-041: length floor >= 16 routes garbage creds through graceful
          # no-cache fallback instead of crashing the toolchain (mirrors ci.yml).
          if [ "${#R2_KEY}" -ge 16 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false (R2_KEY length=${#R2_KEY}, expected >= 16)" >&2
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install sccache
        if: steps.r2detect.outputs.configured == 'true'
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: sccache health probe
        # INFRA-2288: degrade to no-cache if R2 unreachable; do NOT fail the job.
        if: steps.r2detect.outputs.configured == 'true'
        run: |
          if ! sccache --start-server 2>/dev/null; then
            echo "::warning::sccache --start-server failed; falling back to no-cache (INFRA-2288)"
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          else
            {
              echo "RUSTC_WRAPPER=sccache"
              echo "CARGO_INCREMENTAL=0"
              echo "SCCACHE_GHA_ENABLED=true"
            } >> "$GITHUB_ENV"
          fi

      - name: INFRA-503 — cargo audit moved to nightly cron
        run: |
          echo "::notice::cargo audit runs nightly via cargo-audit-nightly.yml (INFRA-503)"
          echo "      Per-PR audit was 12min × every PR; advisory DB updates daily."

      # ── shard-1: cargo gates ─────────────────────────────────────────────────
      # Steps requiring `cargo build` / CHUMP_BIN binary, plus cargo-structural tests.
      - name: chump gap list domain summary + test-filter (INFRA-431)
        if: matrix.shard == 1
        # INFRA-582: switched from --release to debug build; release compile was
        # 9+ min cold. Debug with shared cache completes in <60s.
        # INFRA-1600 follow-up: honor $CARGO_TARGET_DIR (shared cache on self-hosted
        # runners redirects build output away from $(pwd)/target).
        run: |
          cargo build --bin chump 2>&1 | tail -3
          export REPO_ROOT="$(pwd)"
          source scripts/ci/lib/discover-chump-bin.sh
          bash scripts/ci/test-gap-list-domain-summary.sh

      - name: chump gap list done-format — closed-pr + closed-date (EFFECTIVE-024)
        if: matrix.shard == 1
        run: |
          cargo build --bin chump 2>&1 | tail -3
          export REPO_ROOT="$(pwd)"
          source scripts/ci/lib/discover-chump-bin.sh
          bash scripts/ci/test-gap-list-done-format.sh

      - name: state.db corruption recovery — restore from state.sql (INFRA-538)
        if: matrix.shard == 1
        run: |
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" \
            bash scripts/ci/test-state-db-restore.sh

      - name: PWA gap workflow e2e — 4-phase stub + status transition (CREDIBLE-020)
        if: matrix.shard == 1
        run: |
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" \
            bash scripts/ci/test-pwa-e2e-gap-workflow.sh

      - name: waste-tally --domain — token budget by domain, breach exit code (INFRA-934)
        if: matrix.shard == 1
        run: |
          cargo build --bin chump 2>&1 | tail -3
          bash scripts/ci/test-waste-tally-domain.sh

      - name: gap audit-ac --open — warn on vague open gaps before claim (INFRA-936)
        if: matrix.shard == 1
        run: |
          cargo build --bin chump 2>&1 | tail -2
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" bash scripts/ci/test-gap-audit-ac-open.sh

      - name: UUID gap-ID compatibility audit — preflight+show+auto-derive (INFRA-630)
        if: matrix.shard == 1
        run: |
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" bash scripts/ci/test-uuid-gap-id-compat.sh

      - name: gap show AC rendering — numbered list + json ac_count/ac_has_todos (CREDIBLE-033)
        if: matrix.shard == 1
        run: |
          cargo build --bin chump 2>&1 | tail -2
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" bash scripts/ci/test-gap-show-ac-render.sh

      - name: chump gap set --add-note timestamped append (EFFECTIVE-020)
        if: matrix.shard == 1
        run: |
          cargo build --bin chump 2>&1 | tail -2
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" bash scripts/ci/test-gap-add-note.sh

      - name: CLI output format consistency — --quiet/--format/--json (EFFECTIVE-008)
        if: matrix.shard == 1
        run: |
          CHUMP_BIN="${CARGO_TARGET_DIR:-$(pwd)/target}/debug/chump" bash scripts/ci/test-cli-output-format.sh

      - name: gap consolidate — near-duplicate title detection (INFRA-935)
        if: matrix.shard == 1
        run: |
          cargo build --bin chump 2>&1 | tail -2
