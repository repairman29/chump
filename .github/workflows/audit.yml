      - name: gap run-now — manual dispatch trigger, event schema, validation (INFRA-895)
        if: matrix.shard == 1
        run: bash scripts/ci/test-gap-run-now.sh

      - name: gap lifecycle manager — abandoned gap detection (INFRA-870)
        if: matrix.shard == 1
        run: bash scripts/ci/test-gap-lifecycle-manager.sh

      # ── shard-2: event-registry + observability + webhook/cache ──────────────
      - name: EVENT_REGISTRY coverage — no drift in either direction (INFRA-1237/INFRA-1287)
        if: matrix.shard == 2
        # INFRA-1287: flipped to strict mode — all 88 register-without-emit orphans
        # are now either pruned from the registry (3 dead) or listed in
        # scripts/ci/event-registry-reserved.txt with reason comments.
        # strict mode: BOTH emit-without-register AND register-without-emit FAIL.
        run: CHUMP_REGISTRY_GATE_MODE=strict bash scripts/ci/test-event-registry-coverage.sh

      - name: EVENT_REGISTRY audit regression — parser correctness (INFRA-2496)
        if: matrix.shard == 2
        # Guards against merge-conflict clobbers silently dropping registry kinds.
        # Root cause: INFRA-1121 (commit 25d4219af) dropped daemon_exit_loop_*
        # entries during conflict resolution; the audit then reported them as
        # EMIT-NO-REG even though scanner-anchor comments were intact in the emit
        # script. This regression test verifies: (a) the 3 INFRA-2417 kinds are
        # present in the real registry, (b) the coverage audit exits 0 on them,
        # (c) synthetic registered+emitted kind → no flag, (d) synthetic
        # unregistered+emitted kind → correctly flagged.
        run: bash scripts/ci/test-event-registry-audit-regression.sh

      - name: no-inline-ambient-printf — Phase-1 dry-up (INFRA-1307)
        if: matrix.shard == 2
        # Refuses net-new files in scripts/coord|dispatch|ops/ + src/ + crates/
        # that write inline to ambient.jsonl. New emit sites should call
        # `chump ambient emit <kind> [--field k=v]...` (shipped via INFRA-1048).
        # Allowlist: scripts/ci/ambient-emit-allowlist.txt (17 existing sites).
        run: BASE_REF=origin/main bash scripts/ci/test-no-inline-ambient-printf.sh

      - name: cache hit/miss event emission — github_cache.sh telemetry (CREDIBLE-064)
        if: matrix.shard == 2
        run: bash scripts/ci/test-cache-event-emission.sh

      - name: gh-shim script attribution deep walk (CREDIBLE-065)
