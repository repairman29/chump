version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    # INFRA-038: group bumps so a week of updates becomes ONE PR per category
    # instead of 5+ separate PRs. Dramatically cuts review noise.
    # Pre-1.0 crates often use minor bumps for breaking changes — keep major
    # bumps in their own PRs so you can review the changelog before merging.
    groups:
      cargo-patch-and-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
      cargo-major:
        applies-to: version-updates
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["ci"]
    # INFRA-196: ignore actions/{upload,download}-artifact bumps. These actions
    # appear in .github/workflows/release.yml, which is autogenerated by
    # cargo-dist (see header marker "This file was autogenerated by dist:").
    # cargo-dist 0.31.0's templates emit v6/v7 of these actions; when dependabot
    # bumps them to v7/v8, `cargo dist plan` fails with "release.yml drifted from
    # template" and the PR (and every PR behind it) sits blocked. Dependabot
    # cannot scope an ignore by file path, so we ignore these globally — when
    # cargo-dist itself is bumped, the newly generated release.yml picks up the
    # newer action versions naturally. PR #673 is the original incident.
    # Cross-reference: dist-workspace.toml `allow-dirty = ["ci"]` is the
    # complementary mitigation; see comment there.
    ignore:
      - dependency-name: "actions/upload-artifact"
      - dependency-name: "actions/download-artifact"
    groups:
      actions-all:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
          - "major"
