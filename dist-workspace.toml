[workspace]
members = ["cargo:."]

# Config for 'dist' — binary release automation. See https://axodotdev.github.io/cargo-dist/
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# Installers: shell script for curl|sh convenience (Hermes-style onboarding) +
# Homebrew bottle install via the repairman29/homebrew-chump tap (INFRA-172,
# 2026-04-30). cargo-dist auto-publishes the formula to the tap on every
# release, pointing at the bottle artifacts it builds for each target below.
# Result: `brew install chump` pulls a bottle in ~30s instead of compiling
# from source for ~20 minutes.
installers = ["shell", "homebrew"]
# Tap repo for the homebrew installer. Repo: https://github.com/repairman29/homebrew-chump
# Created 2026-04-30 (gh CLI). cargo-dist seeds the formula on first release.
tap = "repairman29/homebrew-chump"
# Auto-publish the generated formula to the tap repo on every release tag.
# INFRA-176 (2026-04-30): without this, INFRA-174's tap creation + first
# release (v0.1.1) only produced the formula as a release asset — the tap
# repo had to be manually bootstrapped (commit cf1e8ad in homebrew-chump).
# Adding "homebrew" generates a `publish-homebrew-formula` job in release.yml
# that pushes Formula/chump.rb to the tap on every release.
# Requires HOMEBREW_TAP_TOKEN secret (PAT with write access to homebrew-chump).
publish-jobs = ["homebrew"]
# Target platforms. Windows is intentionally excluded — Chump on Windows is documented
# as WSL2-only, so the Linux x86_64 binary covers Windows users.
targets = [
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "aarch64-unknown-linux-gnu",
  "x86_64-unknown-linux-gnu",
]

# Install GTK3/WebKit system libs on Linux runners. The main `chump` binary doesn't
# need them, but the `chump-desktop` (Tauri) workspace member transitively pulls in
# gdk-sys / webkit2gtk-sys, which require system packages. Even though chump-desktop
# is excluded from dist via [package.metadata.dist] dist = false, cargo still builds
# the workspace member when evaluating dependencies.
#
# This is a GitHub Actions `steps` snippet inserted before `cargo dist build`.
# Path is relative to .github/workflows/ per cargo-dist convention. We keep the snippet
# at .github/build-setup.yml (not inside .github/workflows/) because GitHub tries to
# run every YAML file in workflows/ as a standalone workflow — and a bare `steps:`
# snippet fails validation.
github-build-setup = "../build-setup.yml"

# Tolerate hand-edits to release.yml so dependabot bumps to GHA pinned actions
# (e.g. PR #673: actions/download-artifact@v7 → @v8) don't fail `cargo dist plan`.
# Without this, every PR's plan job fails when release.yml drifts from
# cargo-dist 0.31's templates — blocking the merge queue for all open PRs.
# Removing this once we bump cargo-dist to a version whose templates emit @v8
# would be cleaner; until then this matches the dependabot-vs-template race
# that hits the queue every time GHA pins move.
allow-dirty = ["ci"]
