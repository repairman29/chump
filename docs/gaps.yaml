  - id: INFRA-001
    title: "Transactional speculation — real per-tool rollback via sandbox_run"
    domain: infra
    priority: P2
    effort: xl
    status: open
    source_doc:
      - docs/ROADMAP_POST_PHASE_F.md
      - docs/ADR-001-transactional-tool-speculation.md
    description: >
      Current speculative execution rolls back in-process state (beliefs, neuromod,
      blackboard) but external side effects (file writes, CLI commands) are
      not rolled back. ADR-001 describes routing risky tools through sandbox_run
      for real rollback capability.
    acceptance: >
      Write tools in speculative batches optionally routed through sandbox_run.
      Rollback tears down the sandbox worktree. Commit applies the changes.
      Policy document specifies which tools may use sandbox path.
    depends_on: []
    gate: >
      Only implement if product pain from memory-only rollback is observed AND
      there is willingness to route risky tools through sandbox.

  - id: INFRA-002
    title: "Sandbox hardening — command allowlist, disk budget, CI git requirements"
    domain: infra
    priority: P2
    effort: s
    status: in_progress
