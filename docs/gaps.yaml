- id: FLEET-004
  title: Peripheral vision — ambient awareness stream for multi-agent sessions
  domain: fleet
  priority: P1
  effort: s
  status: done
  closed_date: '2026-04-17'
  source_doc: docs/AGENT_COORDINATION.md
  description: 'Agents currently have zero passive awareness of each other. Lease
    files tell other agents who owns a gap, but nothing about what they''re actively
    doing, what they''ve tried, or when something abrupt happens. Humans working side-by-side
    have continuous peripheral awareness — they don''t ask "what are you doing?";
    they receive that signal passively. Three missing capabilities: (1) passive emission
    — agents radiate activity events automatically without deciding to; (2) ambient
    stream — events accumulate in an always-readable log any agent can tail; (3) anomaly
    detection — a background process notices pattern breaks (overlapping edits, silent
    agents, sudden file bursts) and injects ALERT events.

    '
  acceptance: '.chump-locks/ambient.jsonl accumulates events during a multi-agent
    session. New agent sessions see the last 30 lines at startup without any explicit
    check. File edits, commits, and tool calls emit passively. Overlap conflicts and
    silent agents produce ALERT events within 60s.

    '
  depends_on: []
  notes: "Decomposed into four xs/s sub-gaps:\n  FLEET-004a — ambient.jsonl format\
    \ + emit helpers (xs)\n  FLEET-004b — passive emission via git post-commit hook\
    \ (xs)\n  FLEET-004c — passive emission via Claude Code PostToolUse hooks (xs)\n\
    \  FLEET-004d — CLAUDE.md context injection at session start (xs)\n  FLEET-005\
    \  — anomaly detector daemon (s, separate gap)\n"
- id: FLEET-004a
  title: Ambient event stream — ambient.jsonl format + emit helpers
  domain: fleet
  priority: P1
  effort: xs
  status: done
  closed_date: '2026-04-17'
  source_doc: .chump-locks/ambient.jsonl
  description: 'Foundation for peripheral vision. Defines the ambient.jsonl event
    format and provides two emit primitives: (1) scripts/ambient-emit.sh — shell one-liner
    usable from git hooks and shell scripts; (2) ambient_emit() in crates/chump-agent-lease
    for Rust callers. Both append a newline-delimited JSON event atomically so concurrent
    writers don''t corrupt the file.

    '
  acceptance: 'scripts/ambient-emit.sh <event_kind> [key=val ...] appends a valid
    JSON line to .chump-locks/ambient.jsonl with ts, session_id, worktree, and event
    fields. ambient_emit() in chump-agent-lease does the same from Rust. File is gitignored
    (already true via .chump-locks/). Two concurrent shell processes appending simultaneously
    produce two valid JSON lines (no interleaving). Manual test: run the helper 5×
    and confirm 5 distinct lines.

    '
  depends_on: []
- id: FLEET-004b
  title: Passive emission — git post-commit hook appends to ambient stream
  domain: fleet
  priority: P1
  effort: xs
  status: done
  closed_date: '2026-04-17'
  source_doc: scripts/git-hooks/post-commit
  description: 'Agents should radiate commits automatically. Currently no post-commit
    hook exists. Adding one means every git commit — from any session in any worktree
    — silently appends a commit event to the ambient stream. Other agents see the
    commit without the committing agent having to decide to announce it.

    '
  acceptance: 'scripts/git-hooks/post-commit appends {"event":"commit","sha":"...","msg":"...","gap":"..."}
    to .chump-locks/ambient.jsonl on every commit. install-hooks.sh symlinks it into
    new worktrees. Manual test: commit in one worktree, read ambient.jsonl in another
    — event appears.

    '
  depends_on:
  - FLEET-004a
- id: FLEET-004c
  title: Passive emission — Claude Code PostToolUse hooks for file edits
  domain: fleet
  priority: P1
  effort: xs
