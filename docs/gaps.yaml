      >=15% more accurate ErrorPattern classifications.
    depends_on: [COG-007]
    closed_by: claude-funny-hypatia-cog-008
    closed_date: "2026-04-17"
    closed_commit: "538c81a"
    resolution_notes: >
      Shipped async Provider adapter in src/reflection.rs mirroring the
      EVAL-004 (judge_via_provider) and MEM-004 (summarize_via_provider)
      pattern:
        - build_reflect_prompt(&ReflectionInput) -> String (pinnable for snapshot tests)
        - parse_reflection_response(&str) -> Option<...>  (tolerant of prose; None on no-signal)
        - reflect_via_provider(&Provider, ReflectionInput) -> Reflection
        - reflect_or_fallback(Option<&Provider>, ReflectionInput) -> Reflection
        - reflection_llm_enabled() gates on CHUMP_REFLECTION_LLM=1
      Safety: on ANY failure (provider error, empty text, unparseable JSON, or
      zero-signal JSON) falls back to reflect_heuristic with the same inputs —
      a broken model MUST NOT silently ship a garbage Reflection. 10 new unit
      tests with StubProvider cover happy path, malformed JSON, provider error,
