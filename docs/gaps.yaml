  source_doc: docs/RED_LETTER.md Issue
  description: 'The binary-mode ablation harness (scripts/ab-harness/run-binary-ablation.py,
    EVAL-049) scores trials as "correct" when chump exits 0 AND produces output >10
    chars. Red Letter #3 measured this instrument''s baseline accuracy at 0.033 (EVAL-056)
    and 0.100 (EVAL-058) — below chance on any meaningful task classification. At
    n=30/cell the CI is approximately +/-0.14 which spans the full decision space.
    Six PRs closed this week on this instrument: EVAL-053 (Metacognition), #268 (Memory),
    #271 (Executive Function) all labeled COVERED+VALIDATED(NULL). NULL under this
    instrument means "measurement failed," not "module has no effect." The Metacognition
    label is especially concerning because EVAL-026 showed a documented NEGATIVE prior
    signal for that faculty, which the current instrument cannot confirm or rebut.

    This gap blocks EVAL-059 from closing with the same instrument and mandates a
    methodology fix before any further VALIDATED(NULL) labels are applied.

    '
  acceptance: "HARD BLOCK — sibling agents must not close EVAL-059 before this gap\
    \ ships.\n(1) Add LLM-judge scorer to the ablation harness. Exit-code-plus-length\
    \ is\n    unfit for purpose; outcomes must be judged on task-specific correctness\n\
    \    rubric.\n(2) Raise n to >=50 per cell on every faculty ablation before label-change\n\
    \    commits, per RESEARCH_INTEGRITY.md minimum directional-signal standard.\n\
    (3) Run an A/A baseline (identical cells, same seed differences only) on the\n\
    \    instrument and publish the noise-floor number. Absent this, \"NULL\"\n  \
    \  results cannot be distinguished from \"instrument noise.\"\n(4) At least one\
    \ non-Anthropic judge (Qwen3-Coder or DeepSeek via Together)\n    must be run\
    \ on the same trials to validate against Anthropic bias, per\n    RESEARCH_INTEGRITY.md.\n\
    (5) Publish docs/eval/EVAL-060-methodology-retrofit.md with the noise-floor\n\
    \    number, the A/A variance, and the re-scored EVAL-053/056/058 results\n  \
    \  under the new scorer. If any of those three come back with clear\n    non-NULL\
    \ deltas under the better instrument, reopen the faculty for\n    re-labeling.\n\
    (6) Amend RESEARCH_INTEGRITY.md to explicitly ban exit-code-0 as a\n    correctness\
    \ criterion for ablation studies (retrospective fix).\n"
  depends_on:
  - EVAL-049
  blocks:
  - EVAL-059
  notes: '~1-2 days. Filed in response to docs/RED_LETTER.md Issue #3 2026-04-20 which
