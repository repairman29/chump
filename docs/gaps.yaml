  - id: MEM-003
    title: "LLM episodic → semantic summarization (curation third pillar)"
    domain: memory
    priority: P3
    effort: m
    status: partial
    closed_by:
      - 043df9d   # memory_db::summarize_old_episodics_with + SummarizationConfig (landed via fmt-squash)
      - a9fd94c   # gaps.yaml status update + MEM-004 follow-up filed
    closed_date: 2026-04-17
    source_doc:
      - docs/CHUMP_TO_COMPLEX.md
      - book/src/dissertation.md
    description: >
      MEM-002 shipped the DB-only curation passes (decay + dedupe + expire) but
      deferred the LLM summarization of old episodic clusters into distilled
      semantic facts because it needs inference budget. Add a delegate-call
      path (single model request per cluster, guarded by neuromod-aware rate
      limiting) so curate_all() can optionally run the summarization tier.
    acceptance: >
      memory_db::curate_all() grows an optional summarize_old_episodics pass
      gated behind CHUMP_MEMORY_LLM_SUMMARIZE=1. Clusters of 5+ episodic rows
      > 30 days old collapse into one semantic_fact via a delegate call.
      CurationReport grows summaries_created and summarization_tokens fields.
    resolution_notes: >
      Sync orchestration layer shipped: select_episodic_clusters_from_rows
      (pure, tested) groups episodic rows by source + age-bucket with
      min_cluster_size, min_age_days, max_clusters_per_pass knobs (env:
      CHUMP_MEMORY_SUMMARIZE_MIN_CLUSTER / _MIN_AGE_DAYS / _MAX_CLUSTERS).
      summarize_old_episodics_with<F>(conn, config, F) accepts an injected
      summarizer closure, inserts each cluster's distilled output as a
      verified semantic_fact with source "summary::<cluster_id>", and
      soft-deletes source episodics by setting expires_at=now (picked up
      by the next expire_stale_memories pass). Gated on
      CHUMP_MEMORY_LLM_SUMMARIZE=1; returns (0, 0) silently otherwise.
      Error / empty-output protection: summarizer failures don't
      orphan-expire source rows; whitespace-only content is rejected.
      CurationReport grows summaries_created + episodics_summarized
      fields (total_changed sums all five). 13 new tests cover cluster
      selection, gating, insertion, rollback-on-error, and env parsing.

      Still open: the ASYNC glue that builds a summarizer closure from a
      live delegate_tool call (probably in memory_brain_tool.rs) and the
      wiring into curate_all's default path. Both are thin adapters —
      the hard part (clustering + safe insertion + test coverage) is
      done. Filed follow-up as MEM-004 below.
    depends_on:
      - MEM-002

