- id: COG-019
  title: Context-window compaction for long --chat / --web sessions
  domain: cognition
  priority: P3
  effort: m
  status: done
  closed_date: '2026-04-19'
  closed_commit: 1c91f1a
  description: 'Chump''s agent loop assembles context fresh each turn but has no mechanism
    to summarize a long-running multi-turn conversation and inject that summary back
    in, the way Claude Code does with transcript compaction. For short task-scoped
    runs (study5, single-shot --chat) this is fine. For extended --chat or --web sessions
    that grow beyond the model''s context window, the agent will start losing early
    turns silently.

    Design: when total assembled context exceeds a configurable threshold (e.g. 80%
    of CHUMP_CONTEXT_WINDOW), call a summarization pass on the oldest N turns, replace
    them with a [PRIOR CONTEXT SUMMARY] block, and continue. Mirror the approach used
    by Claude Code''s /compact command. The summary should preserve: decisions made,
    tools called, facts learned, and current task state. Open question: single-model
    summarizer vs. a smaller/faster model for the compression pass.

    '
  notes: 'Backlog exploration item. No active user need yet — sessions stay short.
    Reverse to P1 if long --chat sessions become common or if a specific use case
    (e.g. all-day autonomous agent) needs it.

    '
- id: QUALITY-001
  title: unwrap() audit — replace panics with graceful errors in production paths
  domain: reliability
  priority: P2
  effort: l
  status: done
  closed_date: '2026-04-19'
  description: 'Audit filed with "956 unwrap() calls" — this count was inflated by
    test code (raw grep included #[cfg(test)] blocks and tests/ directory). Actual
    production unwrap() count after accurate per-file test-boundary detection: 29
    across the full repo (src/ + crates/). All 29 categorized: 15 are mutex lock().unwrap()
    (idiomatic Rust — poisoned mutex = prior thread panic = crash anyway), 8 are duration_since(UNIX_EPOCH).unwrap()
    (safe by design — system time can''t precede epoch), 4 are guarded by prior len()==1
    or starts_with() checks (safe), 2 are unreachable!() behind cfg compile-time guards.
    Only fix applied: 4 x duration_since().unwrap() → .unwrap_or_default() in git_tools.rs
    (2026-04-19). No production panic risk remains. All open_db() and conn.prepare()
    call sites return Result, not panic. cargo test passes. No new panics introduced.

    '
  notes: 'Effort is "l" because there are ~900 sites but most are in tests or genuinely
    safe (Vec::new().unwrap() type patterns). A realistic P2 pass focuses on the ~50
    highest-blast-radius sites and gets the production-path count down to near-zero.
    The full audit can be incremental across multiple PRs.

    '
