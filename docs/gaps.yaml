  - id: INFRA-MULTIAGENT-HYGIENE
    title: "Per-session worktree + unique session IDs (structural fix)"
    domain: infra
    priority: P1
    effort: l
    status: done
    closed_date: "2026-04-17"
    source_doc: CLAUDE.md
    description: >
      Multiple Claude sessions on this machine all share
      $HOME/.chump/session_id (machine-scoped) and frequently operate in
      the main worktree (/Users/jeffadkins/Projects/Chump) instead of
      .claude/worktrees/<name>/. Result: lease files clobber each other,
      pre-staged WIP from one session leaks into another's commit, and
      git operations (cherry-pick, reset) from one session blow away
      another's local state. Observed five times on 2026-04-17 alone:
      cf79287 + a5b5053 (memory_db.rs and DOGFOOD doc stomps), plus
      three aborted cherry-picks during the COG-011 push. The
      chump-commit.sh wrapper (688e6da) addresses the symptom; this gap
      addresses the cause.
    acceptance: >
      (a) gap-claim.sh refuses to write a lease when invoked in the main
      worktree without CHUMP_ALLOW_MAIN_WORKTREE=1.
      (b) Session ID derivation: prefer $CLAUDE_SESSION_ID
      (Claude-Code-set, unique per session); fall back to a
      worktree-derived ID
      (chump-<basename(worktree)>-<date +%s>); only fall back to
      $HOME/.chump/session_id if neither.
      (c) install-hooks.sh symlinks the pre-commit hook into every
      worktree under .claude/worktrees/, not just the main one.
    depends_on: []

