- id: INFRA-027
  title: Fix SIGPIPE in gap-claim.sh — silent lease-write failure under set -o pipefail
  domain: infra
  priority: P2
  effort: xs
  status: done
  closed_date: '2026-04-21'
  closed_pr: 'INFRA-027'
  source_doc: 'Observed 2026-04-21 during autonomous /loop: gap-claim.sh exit 141 + empty .chump-locks/ in removal-003-belief worktree'
  description: 'scripts/gap-claim.sh line 136 used `git worktree list --porcelain | awk ''…exit''` — awk''s early exit closes the pipe while git is still writing, SIGPIPE propagates, and under `set -o pipefail` the whole pipeline exits 141. Script terminates before writing the lease file, producing silent claim failures that force callers to fall back to hand-written python3 lease writes (observed twice in one session). Fix: capture git output into a variable first, then run awk against it via herestring — no pipeline, no SIGPIPE race.'
  acceptance_criteria:
  - 'scripts/gap-claim.sh exits 0 and writes the lease file in a fresh linked worktree'
  - 'No regression on the main-worktree refusal guard'
  notes: 'Shipped with the fix in the same PR as the gap entry since the bug blocked normal claim-shipping; xs effort, one-line structural fix.'
- id: INFRA-014
  title: Duplicate-ID pre-commit guard — block insert of recycled gap IDs
  domain: infra
  priority: P1
  effort: s
  status: done
  closed_date: '2026-04-21'
  closed_pr: 'INFRA-014'
  source_doc: 'CLAUDE.md pre-commit guard table — coverage gap between duplicate-ID and hijack guards'
  description: 'The existing duplicate-ID guard (INFRA-GAPS-DEDUP) catches two entries with the same id in one staged file. The hijack guard catches title/description rewrites on an existing id. Neither catches the case where a commit flips a closed gap back to status:open under the same id — effectively recycling the id for new work. This gap adds a recycled-ID check that compares each id''s status between origin/main and the staged file and rejects done->open transitions.'
  acceptance_criteria:
  - 'scripts/git-hooks/pre-commit rejects a commit that flips an id from status:done on origin/main back to status:open'
  - 'Benign done-gap edits (adding resolution_notes) still pass'
  - 'Genuinely new ids are still accepted'
  - 'CHUMP_GAPS_LOCK=0 bypasses the check'
  - 'scripts/test-recycled-id-guard.sh covers all four cases and passes'
