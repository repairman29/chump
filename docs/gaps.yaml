    title: "Skills system — reusable SKILL.md procedure documents with auto-create"
    domain: competitive
    priority: P0
    effort: l
    status: done
    source_doc: docs/HERMES_COMPETITIVE_ROADMAP.md
    description: >
      Hermes's flagship differentiator: after completing 5+ tool-call tasks it
      autonomously creates SKILL.md procedure documents (procedural memory).
      Chump has episodes (what happened) but no reusable procedures (how to do things).
