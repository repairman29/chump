gaps:

  # -------------------------------------------------------------------------
  # CONSCIOUSNESS
  # -------------------------------------------------------------------------

  - id: COG-001
    title: "A/B study round 2 — LLM-as-judge + multi-model scaling curves"
    domain: consciousness
    priority: P1
    effort: l
    status: open
    source_doc: docs/CHUMP_TO_COMPLEX.md
    description: >
      Round 1 A/B compares structural metrics (surprisal, lesson count) with/without
      CHUMP_CONSCIOUSNESS_ENABLED. Round 2 adds semantic quality: an LLM judge scores
      response accuracy on each prompt, and the study runs across 3+ model sizes
      (3B / 9B / 14B) to plot the latency-vs-capability tradeoff curve.
      Without this, the research paper (docs/research/consciousness-framework-paper.md)
      cannot claim empirical support for the consciousness framework.
    acceptance: >
      scripts/run-consciousness-study.sh produces a results JSON with per-model
      LLM-judge scores; paper section 4 is auto-populated with real data;
      latency overhead per model size is tabulated.
    depends_on: []
    notes: "Gate for COG-003 and COG-006."

  - id: COG-002
    title: "Memory graph recall benchmark — recall@5 on multi-hop QA"
    domain: consciousness
    priority: P2
    effort: m
    status: open
    source_doc: docs/CHUMP_TO_COMPLEX.md
    description: >
      No benchmark compares regex triple extraction vs LLM extraction, or BFS vs
      Personalized PageRank recall quality. Cannot justify PPR complexity without data.
    acceptance: >
      Benchmark script runs against a curated 50-question multi-hop QA set derived
      from Chump's own episode history. recall@5 reported for four combinations:
      {regex, LLM} × {BFS, PPR}. Results stored in docs/CONSCIOUSNESS_AB_RESULTS.md.
    depends_on: []

  - id: COG-003
    title: "Adaptive regime transitions — learned threshold tuning"
    domain: consciousness
    priority: P2
    effort: l
    status: open
    source_doc: docs/CHUMP_TO_COMPLEX.md
    description: >
      PrecisionController regime thresholds are currently static (shifted only by
      noradrenaline). A simple online logistic regression or Thompson-sampling bandit
      could adjust thresholds based on recent task success rate, closing the
      thermodynamic grounding gap.
    acceptance: >
      New env CHUMP_ADAPTIVE_REGIMES=1 enables learned thresholds. After 50 turns,
      thresholds have converged away from defaults in at least one metric.
      docs/CHUMP_TO_COMPLEX.md Section 2.4 "Adaptive regime transitions" checked.
    depends_on: [COG-001]
    gate: "Only proceed if COG-001 shows regime-driven sessions outperform baseline."

  - id: COG-004
    title: "Lesson upgrade — replace heuristic lesson extraction with causal graph output"
    domain: consciousness
    priority: P2
    effort: m
    status: open
    source_doc: docs/CHUMP_TO_COMPLEX.md
    description: >
      extract_lesson_heuristic() uses text pattern matching (timeout → retry).
      The causal graph (CausalGraph, build_causal_graph_heuristic) already exists.
      Lessons should carry confidence derived from DAG path analysis, not patterns.
    acceptance: >
      src/counterfactual.rs extract_lesson uses causal graph paths when available;
      lessons stored with causal_confidence column; Section 2.5 checkbox marked.
    depends_on: []

  - id: COG-005
    title: "Perception gate — measure whether perception layer improves tool selection"
    domain: consciousness
    priority: P2
    effort: m
    status: open
    source_doc: docs/CHUMP_TO_COMPLEX.md
    description: >
      Perception layer (src/perception.rs) runs before every LLM call but its
      effect on tool selection accuracy has never been measured. Need 50-turn
      diverse task set comparing perception-informed vs raw-text baseline.
    acceptance: >
      A/B script with CHUMP_PERCEPTION_ENABLED toggle produces tool selection
      accuracy delta. Result logged in docs/CONSCIOUSNESS_AB_RESULTS.md.
      Section 2.6 gate checked.
    depends_on: [COG-001]

  - id: COG-006
    title: "Neuromodulation gate — measure modulator adaptation vs fixed-threshold"
    domain: consciousness
    priority: P2
    effort: m
    status: open
    source_doc: docs/CHUMP_TO_COMPLEX.md
    description: >
      Neuromodulation (src/neuromodulation.rs) shifts regime thresholds but its
      effect on task outcomes has not been measured on a 50-turn diverse task set.
    acceptance: >
      CHUMP_NEUROMOD_ENABLED=0 vs 1 A/B on 50-turn task set; task success rate
      and tool efficiency delta reported. Section 3.3 gate evaluated.
    depends_on: [COG-001]

  # -------------------------------------------------------------------------
  # MEMORY
  # -------------------------------------------------------------------------

  - id: MEM-001
    title: "Add cross-encoder reranker to final RRF retrieval output"
    domain: memory
    priority: P2
    effort: m
    status: open
    source_doc:
      - docs/CHUMP_TO_COMPLEX.md
      - book/src/dissertation.md
    description: >
      The three-path retrieval (FTS5 + semantic + graph PPR) merges via RRF but
      has no reranking stage. A lightweight cross-encoder (e.g. ms-marco-MiniLM
      via candle or a local model) would improve precision without changing recall.
    acceptance: >
      src/memory_tool.rs applies cross-encoder rerank on top-20 RRF results
      before returning top-5. Benchmark shows precision@5 improvement on
      multi-hop QA set (COG-002 artifact).
    depends_on: [COG-002]

  - id: MEM-002
    title: "Memory curation — confidence decay, deduplication, episodic summarization"
    domain: memory
    priority: P2
    effort: l
    status: open
    source_doc:
      - docs/CHUMP_TO_COMPLEX.md
      - book/src/dissertation.md
    description: >
      Memory confidence is author-assigned and never decays. Old episodic memories
      accumulate without summarization into semantic facts. No deduplication.
      Long-running sessions will degrade retrieval quality as noise accumulates.
    acceptance: >
      Cron/heartbeat runs memory_curate(): (1) decays confidence by 0.01/week for
      unverified memories; (2) deduplicates semantically similar memories within
      same memory_type; (3) summarizes episodic clusters older than 30 days into
      semantic_fact entries. Tested with 500-entry seed DB.
    depends_on: []

  # -------------------------------------------------------------------------
  # EVAL
  # -------------------------------------------------------------------------

  - id: EVAL-001
    title: "Expand eval suite from 5 to 30+ cases with golden trajectory tests"
    domain: eval
    priority: P1
    effort: m
    status: open
    source_doc:
      - docs/CHUMP_TO_COMPLEX.md
      - docs/AUTONOMY_ROADMAP.md
    description: >
      Current seed suite has 5 eval cases. Cannot detect regressions across the
      full behavioral surface. Target 30+ cases covering all EvalCategory variants
      plus golden conversation trajectories and replay against saved conversations.
    acceptance: >
      chump_eval_cases table has 30+ entries covering all 6 EvalCategory variants.
      At least 5 golden trajectory tests (multi-turn). scripts/battle-qa.sh passes.
      Regression detection catches at least one intentionally introduced bug.
    depends_on: []

  - id: EVAL-002
    title: "LLM-as-judge response quality scoring for eval runs"
    domain: eval
    priority: P2
    effort: l
    status: open
    source_doc: docs/CHUMP_TO_COMPLEX.md
    description: >
      EvalCase property checks are structural (contains, json_path, regex).
      No semantic quality scoring. Cannot distinguish "technically passes but
      wrong answer" from "correctly answers with proper tool use."
    acceptance: >
      ExpectedProperty gains LlmJudge variant with rubric string. EvalRun records
      judge_score (0.0-1.0) alongside pass/fail. scripts/battle-qa.sh reports
      average judge score per category.
    depends_on: [EVAL-001]

  - id: EVAL-003
    title: "Retrieval pipeline benchmark — recall@5 on curated multi-hop QA"
    domain: eval
    priority: P2
    effort: m
    status: open
    source_doc: docs/CHUMP_TO_COMPLEX.md
    description: >
      See COG-002. Standalone eval entry for the retrieval benchmark — separate
