    Cognition (#10). The two documented root causes are: (a) ceiling compression at
    n=50 — ambiguous/procedural cell saturates at 1.000 under LLM judge, compressing
    CI; (b) judge liberality — the current prompt scores hedging as clarification,
    inflating Cell B. Red Letter #3 explicitly calls out "Three gap-slots spent without
    addressing the stated blocking issue." Two acceptable paths: (1) Stricter judge
    rubric — revise the LLM judge prompt in run-social-cognition-ab.py to require
    EXPLICIT clarification (not implicit hedging); re-run n=50/cell with revised judge.
    (2) Scale up — run n=200/cell on the current LLM-judge path to get CIs narrow
    enough to separate. Either path must produce non-overlapping CIs for at least
    the procedural category to graduate Social Cognition from PRELIMINARY to COVERED+VALIDATED
    or COVERED+VALIDATED(NEGATIVE).'
