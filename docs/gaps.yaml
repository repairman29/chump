- id: INFRA-WORKTREE-STAGING
  title: Pre-staged WIP from other agents leaks into commits in shared worktree
  domain: infra
  priority: P2
  effort: s
  source_doc: cf79287, a5b5053
  status: done
  description: "Multiple agents share /Users/jeffadkins/Projects/Chump (the main worktree)\
    \ while also having their own .claude/worktrees/<name>. When agent A `git add`s\
    \ a file but doesn't commit, then agent B runs `git add <unrelated>` and `git\
    \ commit`, the commit accidentally includes agent A's pre-staged file too.\nObserved\
    \ twice this session:\n  - cf79287: my needless_return fix swept funny-hypatia's\
    \ incomplete\n    memory_db.rs WIP (broken stmt lifetime); had to revert in 1241e0c.\n\
    \  - a5b5053: my gaps.yaml additions swept an unrelated\n    DOGFOOD_RELIABILITY_GAPS.md\
    \ edit from another agent.\n\nPre-commit hook already validates leases on staged\
    \ paths but does not warn when a commit includes files the current command did\
    \ not touch.\n"
  acceptance: 'Pre-commit hook prints a warning (non-blocking) when staged files exist
    that were not modified within the last N seconds, OR when there are staged files
    that don''t match any of the explicit `git add` arguments passed to the wrapper.
    Stops silent stomps without preventing legitimate multi-file commits.

    '
  depends_on: []
  closed_by: claude-funny-hypatia-infra-stomp
  closed_date: '2026-04-17'
  closed_commit: df29644
  resolution_notes: 'Added job 2 to scripts/git-hooks/pre-commit: stomp-warning. For
    each staged file still present in the working tree, check `stat` mtime vs now;
    if age > CHUMP_STOMP_WARN_SECS (default 600s) print a non-blocking warning on
    stderr naming the file and age. Does NOT block the commit — legitimate multi-file
    commits that touch old files just see a noisy line they can ignore. Honors macOS
    and Linux stat flags, silenced via CHUMP_STOMP_WARN=0, threshold tunable via CHUMP_STOMP_WARN_SECS.
    Picked option (1) from the acceptance spec — option (2) would require wrapping
    git itself (hooks run after `git add` so they can''t see the argv). Smoke-tested:
    stale file warns, fresh files silent, disable flag silences everything.

    '
