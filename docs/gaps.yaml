  resolution_notes: 'A/B run on qwen2.5:7b × 20 tasks (10 structured + 10 trivial)
    via run-queue.sh: A=70% B=70%, delta 0.00. Per-category also 0.00 (structured
    both 0.60, trivial both 0.80). Mean judge score slightly LOWER with perception
    on (0.545 vs 0.605) — within noise but suggests the perception context adds structure
