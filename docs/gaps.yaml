    \ schema: {gap_id, agent_id, stuck_at, last_error,\n    attempted_fixes, suggested_human_action}\n\
    (2) Helper chump_coord::escalate(stuck_reason) emits the ALERT,\n    optional\
    \ NATS publish, sets agent into \"blocked\" state in\n    lease file\n(3) Optional:\
    \ notify-jeff hook subscribes to escalations and\n    pings via Discord/Slack\n\
    (4) Pattern documented in CLAUDE.md + AGENT_COORDINATION.md (5) bot-merge.sh failure\
    \ cases that aren't self-recoverable\n    trigger escalate() rather than dying\n"
  depends_on: []
