  - id: REL-003
    title: "Patch crate — fork or replace if upstream abandons panic-on-malformed"
    domain: reliability
    priority: P2
    effort: s
    status: deferred
    closed_date: 2026-04-17
    source_doc: docs/DOGFOOD_RELIABILITY_GAPS.md
    description: >
      patch-0.7.0 panics on malformed input (caught via catch_unwind + spawn_blocking).
      If the crate is abandoned, options are: fork to return Err, or replace with
      diffy (different license + behavior). Track upstream maintenance.
    acceptance: >
      Either: upstream patch crate updated to return Err on malformed input, OR
      forked/replaced crate in use with test coverage on malformed diff inputs.
    resolution_notes: >
      Checked 2026-04-17: upstream patch crate on crates.io is still at
      v0.7.0, last published 2022-12-28 (3+ years stale). Repository at
      https://github.com/uniphil/patch-rs shows no recent activity. 725K+
      downloads = stable-but-abandoned.

      Decision: DEFER fork/replace. Our existing mitigation is sufficient:
        - catch_unwind in src/patch_apply.rs::parse_single_file_patch
          converts the panic to PatchApplyError::Parse (01de3b6).
        - spawn_blocking wrapper in src/repo_tools.rs::patch_file isolates
          the panic to a dedicated tokio blocking thread so unwinding
          doesn't corrupt the main runtime (f35918f).
        - Dedicated panic-hook filter silences "bug: failed to parse
          entire input" stderr noise (0148eb7).
      Coverage: patch_apply::tests::malformed_diff_does_not_panic pins
      the guarantee.

      Re-open this gap IF:
        (1) A new patch-crate panic escapes our mitigation.
        (2) Upstream uniphil/patch-rs adds a proper Result-returning API.
        (3) A more fundamental diff-apply bug we can't patch over.
    depends_on: []

