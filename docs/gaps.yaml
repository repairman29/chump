      (CHUMP_RETRIEVAL_RERANK_WEIGHTS, default 50/25/15/10).
      keyword_search_reranked pulls 3x candidates then reranks. A local
      cross-encoder remains an option if this plateaus.
    depends_on: [COG-002]

