- id: INFRA-QUEUE-DRIVER-APP-TOKEN
  title: "queue-driver must push via GitHub App token, not GITHUB_TOKEN (anti-loop rule)"
  domain: INFRA
  status: done
  priority: P1
  effort: xs
  opened_date: 2026-04-24
  closed_date: 2026-04-24
  description: >
    INFRA-048 (#497) + INFRA-QUEUE-DRIVER-PERMS (#502) got the queue-driver
    workflow rebasing PRs successfully, but nothing ever merged. Root cause:
    GitHub does not trigger new workflow runs for pushes made with
    GITHUB_TOKEN (the anti-loop rule — see Actions docs, "Triggering a
    workflow from a workflow"). So `updatePullRequestBranch` succeeded,
    the PR head advanced, but no `test`/`audit`/`dry-run` CI ran on the
    new head and auto-merge never fired. 2026-04-24: observed 10+ PRs
    stranded BLOCKED indefinitely despite queue-driver running every
    5 minutes. Manual drain via local PAT worked (user tokens aren't
    subject to the anti-loop rule) but requires a human-in-the-loop
    for every main-advance, defeating the purpose of the driver.
  acceptance_criteria:
    - queue-driver.yml mints a GitHub App installation token via actions/create-github-app-token@v1
    - GH_TOKEN env uses the App token (not GITHUB_TOKEN)
    - actions/checkout uses the App token (so the rebase push is signed by the App)
    - App-origin push triggers a fresh CI run on the target PR's new head
    - workflow_dispatch run successfully rebases a BEHIND PR AND new CI starts on the new head
  depends_on: [INFRA-048, INFRA-QUEUE-DRIVER-PERMS]
  notes: >
    Secrets QUEUE_DRIVER_APP_ID and QUEUE_DRIVER_APP_PRIVATE_KEY hold the
    App credentials; App has Contents:write + Pull-requests:write on
    repairman29/chump only. The App token is minted per workflow run
    with a 1-hour TTL so no long-lived PAT exposure. If the App is ever
    uninstalled or the key rotated, the workflow fails loud at the
    create-github-app-token step — no silent degradation.
  source_doc: CLAUDE.md
  description: >
    Execute Layer 1 release automation for the three publishable crates
    (chump-tool-macro 0.1.0, chump-coord 0.1.0, chump-perception 0.1.0).
    Run release-plz dry-run to: (1) analyze commits since 0.1.0 via
    conventional commits; (2) bump versions (fix→patch, feat→minor,
    BREAKING→major); (3) auto-generate changelogs; (4) create a release PR.
    Verify: all three crates bump correctly, changelogs are readable,
    CI gates (test, audit, MSRV check) pass, dry-run PR shows correct
    behavior before actual publishing in INFRA-051.
  acceptance_criteria:
    - release-plz dry-run creates release PR with correct version bumps
    - Changelogs for all three crates are generated and human-readable
    - Release PR runs CI gates (test, audit, MSRV) successfully
    - dry-run output shows packages ready to publish
    - Document any issues with the release workflow in notes
  depends_on: [INFRA-048]
  notes: "P1: validates the end-to-end publishing pipeline before real publishes in INFRA-051+."

- id: INFRA-051
  domain: INFRA
  title: queue-driver — drain in parallel (max=5) to absorb cron unreliability
  status: done
  priority: P1
  effort: xs
  closed_date: '2026-04-25'
  description: >
    Bumps the queue-driver workflow's default `--max` from 1 to 5. With
    only one PR refreshed per fire, queue throughput is bottlenecked on
    cron firing reliably every 5 minutes. GitHub Actions' scheduled cron
    is best-effort: on 2026-04-25 we observed a 2h47m gap (00:08Z → 02:57Z)
    where no scheduled fire occurred at all, leaving 4 BEHIND PRs stranded
    and requiring a manual `gh workflow run`. Bumping max to 5 means each
    fire (push-to-main from a merge, schedule, or dispatch) drains the
    full BEHIND set in parallel — they all run fresh CI concurrently and
    the next merge cascades. Cron unreliability stops mattering.
  acceptance_criteria:
    - queue-driver.yml default `--max` is 5 (not 1)
    - workflow_dispatch input default updated from "1" to "5"
    - non-dispatch triggers (push, schedule) pass `--max 5` even when inputs is empty
  depends_on: [INFRA-048, INFRA-QUEUE-DRIVER-APP-TOKEN]
  source_doc: docs/RELEASE_AUTOMATION_PLAN.md
  description: >
    Add CI job that runs before release-plz publishes. Verifies all tests pass,
    cargo-audit is clean, and publishable crates have valid MSRV. Blocks
    publishing if any check fails. Layer 1.5 of release automation.
  acceptance_criteria:
    - New CI job runs on release-plz PR creation (before publish step)
    - Job runs: cargo test --workspace, cargo audit, cargo check MSRV
    - Publishing step is blocked if any test fails
    - Job logs are visible in PR checks
    - Dry-run publishes still work without triggering real publish
  depends_on:
    - INFRA-048  # release-plz integration
  notes: >
    Gating ensures no broken crates ship. Next: INFRA-050 (test first
    crate publish).
  closed_date: 2026-04-24
  source_doc: CLAUDE.md
  description: >
    `scripts/bot-merge.sh` contains a `_comment_body=$(cat <<'EOFCOMMENT'
    ... ```... EOFCOMMENT)` construction for posting a CI-failure diagnostic
    comment on blocked PRs. Bash's `$(...)` command-substitution pre-parser
    scans for balanced backticks even inside a single-quoted heredoc body,
    so the literal triple-backtick markdown fence on line 460 produces
    `line NNN: unexpected EOF while looking for matching ``. The script
    aborts *after* `gh pr create` succeeds but *before* `gh pr merge --auto
    --squash` runs — silently dropping PRs into the repo without auto-merge
    armed. Observed on PR #482 (INFRA-045 itself), #488 (closed dup),
    and #491 (PRODUCT-015 activation funnel) on 2026-04-24. Each required
    manual `gh pr merge <N> --auto --squash` to recover. Fix: rebuild the
    comment body with `printf -v` + a `_fence='```'` variable, so no
    un-escaped backticks appear inside a `$(...)` literal.
  acceptance_criteria:
    - "`bash -n scripts/bot-merge.sh` exits 0"
    - bot-merge.sh runs end-to-end through the CI-gate branch without shell parse errors
    - auto-merge is armed on every PR that bot-merge.sh --auto-merge creates (when CI is green)
    - Diagnostic comment posted on CI-failure path preserves the existing markdown structure
  depends_on: []
  notes: >
    Root cause is a well-known bash quirk — `$(cat <<'EOF' ... EOF)` is
    not safe for heredoc bodies containing backticks, even when the
    delimiter is single-quoted. Prefer `printf -v` or a temp-file
    round-trip for any multiline string containing literal backticks.

- id: INFRA-052
  domain: INFRA
  title: scripts/resolve-gaps-conflict.py — automate gaps.yaml tail-append rebase resolution
- id: INFRA-055
  domain: INFRA
  title: "Daily active-target-reaper purges stale target/ in linked worktrees"
  status: done
  priority: P2
  effort: xs
  closed_date: '2026-04-25'
  description: >
    Promotes a /tmp helper used 6+ times in the 2026-04-25 queue-driver
    incident into a checked-in script. Every PR that adds a gap entry
    appends to the bottom of docs/gaps.yaml; when two are in flight,
    the rebase of the second produces a tail conflict where the correct
    resolution is always "keep both sides, in order." The script does
    that substitution mechanically and refuses to write if any marker
    remains after the pass (which would indicate a real content overlap,
    not a tail-append). Future automation (e.g. bot-merge.sh on rebase
    failure) can call this without risk of silent corruption.
  acceptance_criteria:
    - scripts/resolve-gaps-conflict.py exists, executable
    - exits 0 with both sides preserved on a tail-append conflict
    - exits 3 (no write) if any conflict marker remains after substitution
    - exits 2 if no markers found in the file

- id: SECURITY-003
  domain: SECURITY
  title: "Rotate QUEUE_DRIVER_APP_PRIVATE_KEY every 90 days"
  status: open
  priority: P3
  effort: xs
  description: >
    INFRA-048 wired up a GitHub App (QUEUE_DRIVER_APP_ID + QUEUE_DRIVER_APP_PRIVATE_KEY)
    so queue-driver pushes can re-trigger CI on auto-merge PRs. App private keys
    have no expiry — if the key ever leaks (developer laptop compromise, secret
    misconfiguration in a fork), an attacker has perpetual write access to main.
    Establish a 90-day rotation cadence: regenerate the key in the App settings,
    update the QUEUE_DRIVER_APP_PRIVATE_KEY repo secret, delete the old key.
    No code change — pure operational policy. File a calendar reminder + add
    a checklist entry to docs/SECURITY.md (or equivalent) once the doc exists.
  acceptance_criteria:
    - 90-day rotation interval documented in repo (RUNBOOK.md or SECURITY.md)
    - First rotation performed and logged (date stamped)
    - Second rotation scheduled (calendar event or recurring task)
  depends_on: []
  notes: >
    Low priority because the App is scoped to this single repo and only
    has the minimum permissions queue-driver needs (pull-requests: write,
    contents: write). Defense-in-depth, not an urgent fix.
    Companion to stale-worktree-reaper.sh: that one removes worktrees whose
    branches have already merged; this one keeps active worktrees but reclaims
    their build cache (target/) when they go quiet for >7 days. Each
    target/ is 7-11 GB after cargo clippy/test, and 20+ active worktrees
    pushed the dogfood machine to disk-full mid-session twice in the past
    week. After-ship purge in bot-merge.sh covers shipped worktrees only —
    long-lived review worktrees and abandoned reviewers kept the cache
    forever. Daily LaunchAgent (StartInterval 86400). Skip rules: active
    lease + recent target activity, .chump-no-reap opt-out, lsof open files.
  acceptance_criteria:
    - scripts/active-target-reaper.sh runs in dry-run by default
    - --execute purges target/ where mtime > 7d (configurable via --age-days)
    - install-active-target-reaper-launchd.sh installs daily LaunchAgent idempotently
    - skip rules respect .chump-no-reap, active leases, and lsof-open files
  depends_on: []
  notes: >
    Conservative 7-day default avoids disrupting active development.
    Companion to stale-worktree-reaper.sh (hourly, removes merged trees).


