    empty, which fired during PR #465's review with the message
    `NEW_DEPS_IN_DIFF[@]: unbound variable`. PRs that don't add any
    dependency lines (most of them) trip this. The fix guards the
    iteration with `(( ${#arr[@]} > 0 ))`.
  acceptance_criteria:
