- id: INFRA-005
  title: Fix pre-push auto-merge guard for recreated branches
  domain: infra
  priority: P1
  effort: xs
  status: done
  source_doc: scripts/git-hooks/pre-push
  description: 'The pre-push Guard 2 (auto-merge armed check) calls `gh pr view --json
    autoMergeRequest` without checking PR state. When a PR has been squash-merged
    and the branch is recreated (e.g. claude/COMP-008 hygiene pattern), `gh pr view`
    returns the old merged PR which still has `autoMergeRequest != null == true`,
    blocking all new pushes to that branch. Fix: add `state` to the JSON fields and
    gate the true result on `.state == "OPEN"` so already-merged PRs are treated as
    no-PR.'
  acceptance_criteria:
  - jq query checks .state == "OPEN" before returning true for autoMergeRequest
  - Recreated branch with old merged PR does not get blocked by Guard 2
  - PR still open with auto-merge armed continues to be blocked
  depends_on: []
  notes: One-line jq fix in scripts/git-hooks/pre-push line ~42. No Rust changes.
  closed_date: '2026-04-20'
  closed_pr: 272
- id: INFRA-006
  title: Fix vllm-mlx Metal crash on client disconnect mid-inference
  domain: infra
  priority: P1
  effort: s
  status: done
  closed_date: '2026-04-21'
  source_doc: logs/vllm-mlx-8000.log
  description: 'When a client disconnects during active non-streaming inference, vllm-mlx
    triggers a Metal GPU assertion crash ("A command encoder is already encoding to
    this command buffer" / "Completed handler provided after commit call") that kills
    the entire server process. Root cause: the disconnect_guard detects the disconnected
    client and returns, but the active Metal command buffer is still encoding; the
    assertion fires on the completion handler path after commit. Triggered in practice
    by ablation sweep --timeout values shorter than actual inference time (~56s for
    9B 4-bit model with 20K char system prompt at 3.7 tok/s). Emergency workaround:
    use --timeout 300+ for all sweeps and clear sessions/cli/cli/messages.json when
    it exceeds 50 messages. Real fix: catch disconnect in the inference loop before
    committing the command buffer, or drain/abort the Metal pipeline before returning
    the disconnect response.'
  acceptance_criteria:
  - Client disconnect during inference does not crash the vllm-mlx server process
  - Server remains healthy and serves the next request after a mid-inference disconnect
  - Ablation sweeps with --timeout 60 no longer crash the server
  depends_on: []
  notes: 'Crash pattern confirmed 2026-04-20. Workaround: kill all sweep procs, clear
    sessions/cli/cli/messages.json (was 251 messages / 32KB causing 120s+ inference),
    restart server, use --timeout 300 for sweeps. Also update doc examples in
    docs/eval/EVAL-054-perception-ablation.md and docs/CHUMP_AUTONOMY_TESTS.md to
    use --timeout 300.'
