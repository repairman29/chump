  - id: ACP-001
    title: "MCP server lifecycle — spawn, scope, and reap per ACP session"
    domain: acp
    priority: P1
    effort: s
    status: done
    closed_date: "2026-04-17"
    closed_commit: "ce8cbd5"
    # Three commits shipped the acceptance criteria:
    #   f0b539c — initial MCP session lifecycle (PersistentMcpServer + SessionMcpPool)
    #   5fd6fde — SessionEntry.mcp_pool wired; session/new spawns; session/load respawns
    #   ce8cbd5 — SessionMcpPool tools callable by LLM (finishes the acceptance chain)
    # Original claim from 8dbd924f (2026-04-17T03:55Z) appears to have shipped
    # then walked away without flipping status. Resolution_notes describe the
    # full scope; no outstanding follow-ups.
    source_doc: docs/ACP_V3_BACKLOG.md
    description: >
      NewSessionRequest.mcpServers is recorded and persisted but servers are
      never spawned. Tools from MCP servers are unavailable during ACP sessions.
      On session end, child processes are not reaped (potential leak).
    acceptance: >
      On session/new with mcpServers: servers spawned as children, tools registered
      in per-session sub-registry, reaped on session/cancel or process exit.
      On session/load: re-spawned. Drop impl kills children. Process leak tested.
    resolution_notes: >
      Work in progress. Landed primitives (PersistentMcpServer +
      SessionMcpPool) in src/mcp_bridge.rs — long-lived child processes with
      kill_on_drop(true) + explicit Drop impl. SessionEntry.mcp_pool field
      added; session/new spawns via SessionMcpPool::spawn_all; session/load
      respawns from persisted requested_mcp_servers. Reap happens via the
      Drop cascade (AcpServer drop → sessions HashMap drop → SessionEntry
      drop → SessionMcpPool drop → PersistentMcpServer drop → Child SIGKILL).
      Tests in src/mcp_bridge.rs cover: spawn + list_tools + shutdown,
      spawn_all routing, Drop kills child (pid check), too-many-servers
      rejection, failed-spawn skipped, unknown-tool error. Mock MCP server
      fixture is a bash script; kept in-tree via write_mock_mcp_server().
    depends_on: []

