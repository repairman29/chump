      safe command patterns beyond heuristic_risk High block, max worktree disk
      budget, documented Mac vs CI git requirements.
    acceptance: >
      CHUMP_SANDBOX_ALLOWLIST env var (comma-separated patterns). Max worktree
      disk budget enforced (default 500MB). WASM_TOOLS.md updated with sandbox
      prerequisites. CI job verifies sandbox teardown.
    depends_on: []
    notes: >
      DONE: CHUMP_SANDBOX_ALLOWLIST (case-insensitive substring match; rejects non-matching
