      independently of whether consciousness modules are enabled.
    acceptance: "Same as COG-002 acceptance."
    depends_on: []
    notes: "Overlaps with COG-002. Whichever ships first closes both."

  # -------------------------------------------------------------------------
  # AUTONOMY
  # -------------------------------------------------------------------------

  - id: AUTO-001
    title: "Task contract — structured notes with context/plan/acceptance/verify/risks"
    domain: autonomy
    priority: P1
    effort: s
    status: done
    source_doc: docs/AUTONOMY_ROADMAP.md
    description: >
      Tasks have free-form notes. No structured sections for Context, Plan,
      Acceptance, Verify, Risks/Approvals. The planner/executor loop (AUTO-002)
      cannot reliably extract these without a template.
    acceptance: >
      TaskTool auto-populates a structured notes template when notes are empty.
      Parser returns non-empty acceptance and verify fields for templated tasks.
      Round-trip tests pass.
    depends_on: []
    closed_date: "2026-04-16"
    notes: >
      Fully implemented in src/task_contract.rs (template_for, ensure_contract,
      extract_sections, VerifyContract, parse_verify_json). Wired into task_tool.rs
      line 87. Tests in task_contract.rs. Nothing left to do.

  - id: AUTO-002
    title: "Planner → Executor → Verifier loop (core autonomy)"
    domain: autonomy
    priority: P1
    effort: xl
    status: open
    source_doc: docs/AUTONOMY_ROADMAP.md
    description: >
      No structured planner/executor/verifier lifecycle. Agent works tasks
      opportunistically but doesn't: (1) select next task by priority/blocking,
      (2) expand plan into notes, (3) verify via acceptance criteria before marking done,
      (4) create follow-up tasks on failure.
    acceptance: >
      A "ship round" can complete at least one simple task end-to-end (with
      verification) using only tools, without human prompting beyond approvals.
      Episode summary written at loop end. Task throughput metric trackable.
    depends_on: [AUTO-001]

  - id: AUTO-003
    title: "Task lease conformance tests — two workers cannot claim same task"
    domain: autonomy
    priority: P1
    effort: s
    status: done
    source_doc: docs/AUTONOMY_ROADMAP.md
    description: >
      DB-backed task lease (claim token + expires_at + owner) is implemented but
      no conformance tests verify that two concurrent workers cannot hold a valid
      lease simultaneously.
    acceptance: >
      CI fixture: two logical workers race to claim the same task; exactly one
      succeeds; second gets a clean rejection. Fast test, no real LLM calls.
    depends_on: []
    closed_date: 2026-04-16
    closed_commit: 2b083d7

  - id: AUTO-004
    title: "Autonomy driver process — cron-friendly single-task-per-run loop"
    domain: autonomy
    priority: P1
    effort: m
    status: open
    source_doc: docs/AUTONOMY_ROADMAP.md
    description: >
      scripts/autonomy-cron.sh exists but the driver that pulls briefing/tasks,
      sends one prompt, streams events, and persists logs is not fully implemented.
      Without it, cron-based autonomous work cannot make measurable progress.
    acceptance: >
      scripts/autonomy-cron.sh can run hourly; Chump makes measurable progress
      (tasks updated, episodes written, at least 1 task done/day on simple backlog).
    depends_on: [AUTO-002]

  - id: AUTO-005
    title: "Policy-based approvals — auto-allow low-risk tool approvals"
    domain: autonomy
    priority: P2
    effort: m
    status: open
    source_doc: docs/AUTONOMY_ROADMAP.md
    description: >
      Tool approval currently binary (Ask/Allow). Auto-approve rate is not tracked.
      Policy layer would classify approvals as low/medium/high risk and auto-allow
      low-risk without human prompt, escalating only medium/high.
    acceptance: >
      Auto-approve rate metric tracked in DB. 90%+ of routine tool calls auto-approved
      in typical session. Medium/high-risk calls still gate on human.
    depends_on: []

  - id: AUTO-006
    title: "Autonomy conformance fixtures for key tools"
    domain: autonomy
    priority: P2
    effort: m
    status: open
    source_doc: docs/AUTONOMY_ROADMAP.md
    description: >
      No deterministic "mini task" test scenarios for patch_file, write_file,
      run_cli trimming, approvals. CI cannot catch autonomy regressions.
    acceptance: >
      CI runs a fast autonomy scenario suite (create task → plan → do → verify)
      and blocks regressions. Key tool behaviors fixture-tested deterministically.
    depends_on: [AUTO-003]

  - id: AUTO-007
    title: "Better task selection — dependency awareness and urgency scoring"
    domain: autonomy
    priority: P2
    effort: m
    status: open
    source_doc: docs/AUTONOMY_ROADMAP.md
    description: >
      Current task selection picks highest-priority non-blocked task. No
      dependency graph, no urgency from deadline context, no repo readiness check
      before claiming a coding task.
    acceptance: >
      Planner considers: task dependencies (blocked_by), deadline proximity,
      repo readiness (CI green, no conflicts). Task selection log explains choice.
    depends_on: [AUTO-002]

  - id: AUTO-008
    title: "Task decomposition — large tasks split into verified subtasks"
    domain: autonomy
    priority: P2
    effort: l
    status: open
    source_doc: docs/AUTONOMY_ROADMAP.md
    description: >
      Large/vague tasks are executed as a monolith. No automated decomposition
      into subtasks with per-subtask acceptance criteria and verification.
    acceptance: >
      Tasks with complexity score above threshold are decomposed into subtasks.
      Each subtask has its own acceptance/verify fields. Parent task done only
      when all subtasks done.
    depends_on: [AUTO-002]

  - id: AUTO-009
    title: "Memory linkage — project playbooks auto-attached to task context"
    domain: autonomy
    priority: P2
    effort: s
    status: open
    source_doc: docs/AUTONOMY_ROADMAP.md
    description: >
      When executing a task, relevant playbooks and gotchas from memory are not
      automatically surfaced in context. Agent must rediscover known patterns.
    acceptance: >
      Before task execution, memory query fetches playbooks matching task tags/repo.
      Top 3 playbooks injected into task context block. Measured by reduction in
      repeated mistakes on recurring task types.
    depends_on: []

  # -------------------------------------------------------------------------
  # ACP
  # -------------------------------------------------------------------------

  - id: ACP-001
    title: "MCP server lifecycle — spawn, scope, and reap per ACP session"
    domain: acp
    priority: P1
    effort: s
    status: done
    source_doc: docs/ACP_V3_BACKLOG.md
    description: >
      NewSessionRequest.mcpServers is recorded and persisted but servers are
      never spawned. Tools from MCP servers are unavailable during ACP sessions.
      On session end, child processes are not reaped (potential leak).
    acceptance: >
      On session/new with mcpServers: servers spawned as children, tools registered
      in per-session sub-registry, reaped on session/cancel or process exit.
      On session/load: re-spawned. Drop impl kills children. Process leak tested.
    depends_on: []

  - id: ACP-002
    title: "Vision-capable model passthrough via ACP"
    domain: acp
    priority: P2
    effort: m
    status: open
    source_doc: docs/ACP_V3_BACKLOG.md
    description: >
      ContentBlock::Image becomes a text placeholder. Models with vision capability
      (llava-on-Ollama, gpt-4o) cannot receive images through the ACP path.
    acceptance: >
      CHUMP_VISION_ENABLED=1 detects vision-capable provider and emits image as
      multipart message instead of placeholder. Image-specific size cap enforced.
      AgentMessageDelta emitted for vision-derived text.
    depends_on: []

  - id: ACP-003
    title: "Real-editor integration tests — Zed and JetBrains CI"
    domain: acp
    priority: P2
    effort: l
    status: open
    source_doc: docs/ACP_V3_BACKLOG.md
    description: >
      88 ACP unit tests use simulated client. Real Zed and JetBrains clients
      have never been exercised by CI. Wire-level JSON-RPC not snapshot-tested.
      Spec drift will not break builds.
    acceptance: >
      CI job: install Zed CLI, register Chump, drive initialize → session/new →
      session/prompt via zed --headless, assert correct responses. Same for
      JetBrains. Network trace snapshot tests block spec drift.
    depends_on: []
    notes: "Heavy CI setup (JDK + JetBrains gateway). Realistic estimate: 2-4 weeks."

  - id: ACP-004
    title: "Thinking streaming for reasoning models via ACP"
    domain: acp
    priority: P2
    effort: s
    status: open
    source_doc: docs/ACP_V3_BACKLOG.md
    description: >
      Reasoning tokens (Qwen3 <think>, Claude extended thinking) are stripped
      or silently dropped. ACP clients cannot observe reasoning traces.
    acceptance: >
      When CHUMP_THINKING=1, reasoning tokens streamed as distinct AgentMessageDelta
      events with type: thinking. ACP spec extended to document the event type.
    depends_on: []

