- id: INFRA-045
  title: bot-merge.sh must preserve pending_new_gap across session migration
  domain: infra
  priority: P2
  effort: s
  status: open
  source_doc: CLAUDE.md
  description: >
    `scripts/bot-merge.sh` creates its own session lease (via
    `CHUMP_SESSION_ID=chump-<worktree>-<epoch>`) and calls `gap-claim.sh`
    under that session. For **new** gaps that were reserved via
    `scripts/gap-reserve.sh` (which wrote `pending_new_gap: {id, ...}` to
    the *original* session's lease), bot-merge never copies that
    reservation into the new lease. Result: the post-rebase preflight
    runs under the new session, doesn't find the gap on `origin/main`
    (correct — we're filing it), and doesn't find a `pending_new_gap`
    on the new session's lease (reservation was on the old session),
    so preflight fails with "not found in docs/gaps.yaml" and
    bot-merge exits: "Gap was completed on main while we rebased —
    nothing left to push." Actual incident: PR #476 (PRODUCT-015,
    2026-04-24) — shipped via INFRA-028 manual path instead.
    Scope: (1) at bot-merge startup, if `$CHUMP_SESSION_ID` differs
    from the caller's resolved session AND caller's lease has
    `pending_new_gap`, copy that field into the bot-merge session's
    lease before calling `gap-claim.sh`; (2) add integration test in
    `scripts/test-bot-merge-pending-gap.sh` that reserves a gap,
    writes a stub gap entry + commit, runs bot-merge, and verifies
    preflight passes post-rebase; (3) document the contract in
    bot-merge.sh header.
  acceptance_criteria:
    - bot-merge.sh detects when caller's session has a pending_new_gap for the target gap
    - bot-merge.sh migrates pending_new_gap to its own session lease before claim
    - Reproduction via scripts/test-bot-merge-pending-gap.sh (reserve → commit → bot-merge) passes
    - bot-merge.sh header documents the session-migration contract
    - Existing passes (gap already on main) remain unaffected
  depends_on: []
  notes: >
    Filed from PR #476 incident. Shipped workaround: use INFRA-028 manual
    path (CHUMP_GAP_CHECK=0 git push + gh pr create + gh pr merge --auto
    --squash). Fix unblocks the default bot-merge path for any gap
    reserved via gap-reserve.sh + same-PR filed.
- id: INFRA-048
  title: Queue driver — refresh oldest BEHIND auto-merge PR so branch protection doesn't strand the train
- id: INFRA-BOT-MERGE-HEREDOC
  title: bot-merge.sh heredoc backtick parse bug blocks auto-merge arming
  domain: infra
  priority: P1
  effort: xs
  status: done
  closed_date: '2026-04-24'
  source_doc: CLAUDE.md
  description: >
    Branch protection requires PRs to be up-to-date with main, but
    auto-merge does not auto-rebase. When PR N lands, every other
    auto-merge-armed PR goes BEHIND. None refreshes itself, so the
    queue stalls until a human runs `gh pr update-branch` on the
    oldest. Observed 2026-04-24 — 9 sibling PRs sat BEHIND for ~30
    minutes with auto-merge armed and clean CI; nothing landed until
    manual intervention. Fix: a tiny GitHub Action `queue-driver.yml`
    triggered on push-to-main and a 5-min cron that finds the oldest
    BEHIND auto-merge-armed PR and runs `gh pr update-branch`. The
    backing script `scripts/queue-driver.sh` works the same locally.
  acceptance_criteria:
    - scripts/queue-driver.sh exists, is executable, supports --dry-run and --max
    - Script picks oldest BEHIND PR with autoMergeRequest != null and is not draft
    - .github/workflows/queue-driver.yml runs on push to main + 5-min schedule + workflow_dispatch
    - Workflow uses concurrency group "queue-driver" so two runs don't race
    - Dry-run smoke test verified locally before ship
  depends_on: []
  notes: >
    INFRA-046/047 are unrelated (Crate audit, Dependency modernization)
    and are in flight as PRs #493 / #496. INFRA-048 is the next free ID.
    The proper long-term fix is to enable GitHub's actual merge queue
    (`merge_queue` in branch protection); this driver is the cheap
    interim that survives whether or not the queue ever gets enabled.

