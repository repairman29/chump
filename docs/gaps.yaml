- id: RESEARCH-023
  title: Counterfactual mediation analysis — upgrade module-contribution claims from average-treatment to natural-direct-effect
  domain: research
  priority: P1
  effort: m
  status: done
  closed_date: '2026-04-21'
  closed_pr: PENDING
  closed_finding: "scripts/ab-harness/mediation-analysis.py ships with self-test (synthetic data, analytical truth recovered within ±0.011 at n=2000) + CLI + bootstrap 95% CIs (10k resamples). Applied to EVAL-025 reflection JSONL (n=200): TE=+0.020, NDE=+0.020, NIE=+0.000 — no detectable mediation through task category on this fixture (all CIs cross 0, consistent with EVAL-025 being a null-on-reflection validation run). Result doc docs/eval/RESEARCH-023-mediation-analysis.md published. Load-bearing downstream application (sonnet-4-5 tier-dependent JSONLs) is the Paper-1 analyst's next step using this infrastructure."
  source_doc: docs/RESEARCH_CRITIQUE_2026-04-21.md §6
  description: >
    Current "module contribution" analysis is P(pass | module=on)
    minus P(pass | module=off), measured aggregate. For a causal
    claim, the stronger quantity is the counterfactual mediation
    estimate — for matched trials differing only in module value,
    what is the expected outcome difference? Pearl's mediation
    framework applies directly. The A/B harness already produces
    matched pairs; what's missing is the analysis pipeline. Ships
    scripts/ab-harness/mediation-analysis.py implementing natural
    direct effect (NDE) and natural indirect effect (NIE) estimates
    per module × task-class. Upgrades every future module-contribution
    claim from "average treatment effect" to causal framing.
  acceptance_criteria:
    - scripts/ab-harness/mediation-analysis.py computes NDE and NIE with bootstrap 95% CIs
    - Applied to existing tier-dependent A/B data (n=100); results land in docs/FINDINGS.md
    - Per-module NDE reported in CHUMP_FACULTY_MAP.md alongside the existing aggregate delta
    - Analysis method references cited — Pearl 2001 Direct and Indirect Effects, VanderWeele 2015 Explanation in Causal Inference
    - Preregistered per RESEARCH-019 if applied to new data collection
  depends_on:
