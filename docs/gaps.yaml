- id: COG-011
  title: Eval A/B — does lesson injection actually improve outcomes?
  domain: eval
  priority: P1
  effort: m
  status: done
  source_doc: src/reflection_db.rs
  description: 'COG-007 wired GEPA lessons into the prompt but the impact on task
    success rate is unmeasured. Without this, lesson injection is "code that claims
    to help" — could be no-op or even regress the base rate.

    '
  acceptance: 'New env CHUMP_REFLECTION_INJECTION=0/1 toggles the LESSONS block. 20-task
    A/B (10 success-baseline + 10 hard cases) reports task success delta. Result logged
    in docs/CONSCIOUSNESS_AB_RESULTS.md.

    '
  depends_on:
  - COG-007
  closed_date: '2026-04-17'
  closed_commit: 6d9ac3d
  resolution_notes: 'Run 1 (structural scoring, qwen2.5:7b, 20 tasks): A=60% B=45%,
    delta +0.15 — looked like a win. Run 2 (COG-011b, same 40 trials re-scored by
    LLM judge): A=65% B=75%, delta -0.10 — INVERTED verdict. Lessons hurt overall
    and badly on gotchas (-0.30). The +0.15 was a keyword-matching artifact of the
    structural scorer; the judge is more honest. Status flipped to done because the
    question "does lesson injection help?" now has a real (if unwelcome) answer: not
    on this model and task set. Next investigation directions in COG-011d.

    '
- id: COG-011b
  title: LLM-judge scoring for the reflection A/B
  domain: eval
  priority: P2
  effort: s
  status: done
  source_doc: scripts/ab-harness/score.py
