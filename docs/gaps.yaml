- id: INFRA-040
  title: 'INFRA-037 correction: required-check list must exclude path-gated workflows'
  domain: infra
  priority: P2
  effort: xs
  status: done
  closed_date: 2026-04-24
  closed_interpretation: >
    Admin action completed 2026-04-24: `tauri-cowork-e2e` removed from
    required-status-checks via gh api PATCH (it is path-gated under the
    `changes.outputs.tauri` filter in ci.yml and would block docs/script-only
    PRs). Final required list: `test`, `audit`,
    `ACP protocol smoke test (Zed / JetBrains compatible)`. The wider
    "always-run lightweight" set proposed in this gap (`build-and-linkcheck`,
    `changes`, `plan`, `sync-idempotency`) was re-checked — `build-and-linkcheck`
    is itself path-gated to book/docs paths in mdbook-verify.yml, and `plan`
    lives in release.yml; neither belongs in the required list.
  source_doc: PRs #459, #460 stuck BLOCKED 2026-04-23 — workflows skipped but checks "expected"
  description: >
    INFRA-037 told the human admin to add `check`, `dry-run (chump)`, `test`, and
    `ACP protocol smoke test` to the required-status-checks list in main branch
    protection. That guidance was wrong about two of the four:

    - `check` (mistralrs-infer build): only runs when Cargo.toml/Cargo.lock or
      specific src files change — see .github/workflows/mistralrs-infer.yml `paths:` filter.
    - `dry-run (chump)` (Crate Publish Dry-Run): only runs when crates/ or Cargo.toml
      change — see .github/workflows/crates-publish-dry-run.yml `paths:` filter.

    Branch protection requires a status report from each required check. When a
    path-gated workflow is skipped, no status is reported, so the PR sits BLOCKED
    forever waiting for a check that will never run. Confirmed by PRs #459 and
    #460, both stuck despite all in-progress checks passing.

    Correct required-check list (workflows that ALWAYS run on every PR, no path
    gate):
      - `test` ✅  (this is what caught the dependabot incident)
      - `ACP protocol smoke test (Zed / JetBrains compatible)` ✅
      - `audit` ✅
      - `build-and-linkcheck` ✅
      - `changes`, `plan`, `sync-idempotency` ✅ (lightweight, always run)

    Path-gated workflows that should NOT be required (they catch real issues but
    only fire when relevant files change, so they cannot be a blocking gate):
      - `check` (mistralrs-infer)
      - `dry-run (chump)` and the other crates-publish dry-runs
      - `tauri-cowork-e2e`
      - `test-e2e`

    ADMIN action (manual UI):
      1. Open https://github.com/repairman29/chump/settings/branches
      2. Edit the `main` branch protection rule
      3. Under "Require status checks to pass before merging", REMOVE:
         `check`, `dry-run (chump)`
      4. Optionally ADD: `audit`, `build-and-linkcheck`
      5. Save
  acceptance_criteria:
    - 'Branch protection required-checks list contains only always-run workflow checks'
    - 'PR #459 and PR #460 unblock and merge'
    - 'Future PRs that change docs/scripts/workflows can pass required checks without touching Cargo files'
- id: INFRA-41
