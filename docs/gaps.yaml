    '
- id: COG-011d
  title: Investigate why lesson injection hurts on gotchas (-0.30 delta)
  domain: consciousness
  priority: P1
  effort: m
  status: done
  closed_date: '2026-04-17'
  closed_commits:
  - 0eecf5e
  - 5a019ca
  - b344096
  - (this commit)
  resolution_notes_final: 'Acceptance ("≥2 variants tested") met by variants (b) strict-
    scope and (c) reverse-order. Combined finding: COG-011b''s -0.10 / -0.30-gotcha
    "lessons hurt" was a JOINT artifact of (1) universal-scope lessons firing on every
    prompt as noise (variant b confirms strict-scope erases the harm) and (2) A-then-B
    trial order leaking session state (variant c shows reverse order alone flips gotcha
    sign). Variants (a) prompt- position swap and (d) larger-model haven''t been run;
    queued in run-queue.sh as COG-011d-d for the qwen2.5:14b retry next time ollama
    is free. The honest current verdict on lesson injection: marginal-to-no effect
    at this N, model, and task set. The wiring (COG-007) is sound; the question "do
    lessons help?" needs richer evals to settle.

    '
  source_doc: docs/CONSCIOUSNESS_AB_RESULTS.md
  description: "COG-011b's LLM-judge run showed lesson injection hurts gotcha tasks\
    \ by 30 percentage points. Hypotheses to test:\n  (a) The lesson block adds 200-500\
    \ tokens of noise that crowds\n      out the user prompt's signal — try a prompt-position\
    \ swap\n      (lessons after user prompt instead of in system).\n  (b) Generic\
    \ lessons (\"validate preconditions before tool call\")\n      are too vague —\
    \ try scope-filtered lessons only when the\n      scope hint matches, otherwise\
    \ skip the block.\n  (c) The model over-asks-for-clarification when the \"ask\n\
    \      clarifying question\" lesson is in scope — add a counter-\n      balancing\
    \ lesson \"if intent is clear, act don't ask\".\n  (d) Larger model (qwen2.5:14b)\
    \ might use lessons better than\n      qwen2.5:7b — repeat the 40-trial A/B on\
    \ 14b.\n"
  acceptance: 'At least two of (a)-(d) tested via the existing ab-harness; report
    which (if any) recovers a positive delta. Update CONSCIOUSNESS_AB_ RESULTS.md
    with each variant''s numbers.

    '
  depends_on:
  - COG-011
  - COG-011b
  notes: 'Variant (b) tested + supported (2026-04-17, 0eecf5e + this run): CHUMP_REFLECTION_STRICT_SCOPE=1
    took the LLM-judge delta from -0.10 → +0.05 overall and gotcha from -0.30 → 0.00.
    Mode A''s gotcha rate jumped from 0.50 (COG-011b) to 0.90. The "noise hypothesis"
    is supported: universal-scope lessons leaking into every prompt was the primary
    harm vector, not the lesson content itself. Still need ≥1 more variant (a/c/d)
    to satisfy the acceptance criterion.

    '
