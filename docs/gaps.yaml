- id: EVAL-072
  title: Judge-methodology fix — rubric literalism + partial-credit divergence between Anthropic/llama judges
  domain: eval
  priority: P1
  effort: s
  status: done
  closed_date: 2026-04-20
  closed_by: claude/eval-072
  outcome: negative
  outcome_note: 'Post-fix agreement 75.0% (perception 67%, neuromod 83%) — single-sided prompt fix hurt perception (-8pp) while fixing neuromod (+12pp). Acceptance (≥80%) NOT met. Follow-up EVAL-073 for both-strict rescore. See docs/eval/EVAL-072-judge-prompt-fix.md.'
  source_doc: docs/eval/EVAL-068-cross-judge-agreement.md
  description: 'EVAL-068 cross-judge agreement: claude-sonnet-4-5 vs llama-70B-Instruct-Turbo
    measured 77.3% overall (reflection=86%, perception=75%, neuromod=71%). Two root
    causes identified: (1) Rubric-literalism gap — sonnet scores 0 when agent declines
    to use a tool; llama assigns 1.0 for polite honest declines. (2) Partial-credit
    divergence — llama uses 0.5 scores that binarize to 1 at the 0.5 threshold while
    sonnet scores 0.1-0.4 for the same partial-success behavior. Fix: add "partial
    credit: no — score 0 unless the task was fully completed" to the judge prompt,
    and add "honest inability to use tools is scored 0 when the rubric requires tool
    use" instruction. Re-run n=30/faculty agreement check. If ≥80%, update
    RESEARCH_INTEGRITY.md to permit citation of EVAL-060-derived results.'
  acceptance_criteria:
  - Judge prompt updated with anti-partial-credit + rubric-literalism directives
  - Re-run cross-judge agreement on perception + neuromod (n=30/faculty each)
  - Overall agreement ≥80% after fix
  - RESEARCH_INTEGRITY.md updated to reflect cross-judge validation status
  depends_on:
