  acceptance: 'CancellationToken field on IterationController (or passed via context).
    tokio::select! wraps every provider.complete() and tool batch await. When token
    cancelled mid-LLM: emit AgentEvent::Interrupted, return AgentRunOutcome with partial
    reply populated. Web server''s /api/stop endpoint calls cancel() on the active
    token for the session. 2 integration tests: cancel during LLM wait, cancel during
    tool batch.

    '
  depends_on:
