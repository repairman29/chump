  title: A/B study round 2 — LLM-as-judge + multi-model scaling curves
  domain: consciousness
  priority: P1
  effort: l
  status: done
  closed_date: '2026-04-17'
  closed_commit: 47c48af5acbaacaf15dd21f6f57b2904c81a3300
  source_doc: docs/CHUMP_TO_COMPLEX.md
  description: 'Round 1 A/B compares structural metrics (surprisal, lesson count)
    with/without CHUMP_CONSCIOUSNESS_ENABLED. Round 2 adds semantic quality: an LLM
    judge scores response accuracy on each prompt, and the study runs across 3+ model
    sizes (3B / 9B / 14B) to plot the latency-vs-capability tradeoff curve. Without
    this, the research paper (docs/research/consciousness-framework-paper.md) cannot
    claim empirical support for the consciousness framework.

    '
  acceptance: 'scripts/run-consciousness-study.sh produces a results JSON with per-model
    LLM-judge scores; paper section 4 is auto-populated with real data; latency overhead
    per model size is tabulated.

    '
  depends_on: []
  notes: Gate for COG-003 and COG-006.
  runnable_now: "Driver shipped at scripts/run-multi-model-study.sh (a9d627a). Multi-day\
    \ wall clock; idempotent (skips per-(model,mode) summaries that already exist).\
    \ To kick off unattended:\n  caffeinate -i nohup scripts/run-multi-model-study.sh\
    \ \\\n    > logs/study/cog-001.log 2>&1 &\nRun scripts/ollama-watchdog.sh --loop\
    \ in another pane to auto- restart Ollama on REL-002 segfaults. By morning logs/study/\
    \ multi-model-*.json has per-model judge-scored deltas.\n"
