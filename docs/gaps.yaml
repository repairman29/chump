  - id: FRONTIER-001
    title: "Quantum cognition prototype — density matrix tool-choice vs classical argmax"
    domain: frontier
    priority: P3
    effort: m
    status: open
    source_doc:
      - docs/CHUMP_TO_COMPLEX.md
      - docs/ROADMAP_PRAGMATIC.md
    description: >
      Section 3.1: Represent belief states as density matrices; allow superposition
      of contradictory tool choices until action forces collapse. Hand-roll ~200 lines
      using nalgebra, not dreamwell-quantum (unstable, low adoption).
    acceptance: >
      Prototype density matrix tool-choice model in experiments/quantum_tool_choice.rs.
      Benchmark against classical argmax on synthetic multi-choice tool selection task.
    gate: >
      Only proceed to integration if prototype shows >5% improvement on multi-choice
      tool selection. Classical argmax is hard to beat with <10 options — gate
      likely fails, which is fine.
    depends_on: []

