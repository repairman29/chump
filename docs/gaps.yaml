      Per-skill Beta reliability tracked in belief_state.
    depends_on: []
    closed_date: 2026-04-16
    closed_commit: f0b539c
    notes: >
      Skills stack: src/skills.rs, src/skill_tool.rs, src/skill_db.rs, src/skill_metrics.rs,
      context_assembly.rs wired, tool_inventory.rs registered. Auto-create trigger:
      total_tool_calls added to AgentRunOutcome; maybe_suggest_skill() posts blackboard
