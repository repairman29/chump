  description: 'EVAL-025 (haiku-cog016 -0.15) and EVAL-026 (Qwen-7B -0.16, Llama-70B
    -0.14, Qwen3-235B -0.10) show a striking cross-architecture pattern: the v1 lessons
    block consistently hurts on the neuromod fixture by 10-16 percentage points, even
    though individual cells are within Wilson noise. Four independent measurements
    at n=50 each (~1200 trials total) directionally agree. Mechanism unknown. Need
    to drill task-by-task: which of the ~50 tasks in neuromod_tasks.json are responsible?
    Is it a few high-leverage adversarial tasks or a uniform drift across all tasks?
    Answer determines whether we (a) fix specific tasks, (b) reformulate the lessons
    block to handle a specific task class, or (c) accept it as an irreducible tradeoff.

    '
  acceptance: 'A new section in docs/CONSCIOUSNESS_AB_RESULTS.md or a dedicated docs/eval/EVAL-029-neuromod-task-drilldown.md
    ranks all neuromod tasks by per-task A-B delta across the 4 model runs above.
    Identifies the top-5 "harm-driving" tasks (largest negative delta) and notes whether
    the harm shape is uniform vs concentrated. Hypothesizes a mechanism: e.g. tasks
    where the lessons "ask one clarifying question rather than guessing" directive
    causes the agent to refuse a task it would otherwise have completed correctly.

    '
