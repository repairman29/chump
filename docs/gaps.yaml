  priority: P2
  effort: xs
  status: done
  closed_date: 2026-04-24
  source_doc: PR #465 (REMOVAL-003) review failed with no real concerns
  description: >
    `scripts/code-reviewer-agent.sh` runs under `set -euo pipefail`. Default
