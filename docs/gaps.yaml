  - EVAL-026
  notes: 'Pure data analysis on existing jsonl logs — no new sweep needed. Walk per-trial
    rows in logs/ab/eval-025-*neuromod*.jsonl and logs/ab/eval-026-*neuromod*.jsonl,
    group by task_id, compute A-B deltas. ~50 LOC Python. Cost: \$0. Wall: ~1hr.

