  title: apalis research — evaluate Rust-native job-queue for durable multi-agent work
  domain: infra
  priority: P2
  effort: s
  source_doc: 2026-04-20 live session — Jeff "we should do apalis research"
  status: done
  closed_date: '2026-04-22'
  closed_commit: 806a387a918ea93a58af206f278d0f993f5d3042
  description: "apalis (https://github.com/geofmureithi/apalis) is a Rust-native async job-queue framework with pluggable backends (Redis, Postgres, SQLite, MySQL). Flagged as phase-2 in INFRA-023 because the current lease/preflight/bot-merge flow is advisory — a crashed agent leaves a stale lease that only expires via TTL, retries are manual, and ambient.jsonl is observational not actionable. apalis would upgrade that to durable work: jobs with typed payloads, automatic retries with backoff, worker crash recovery, cron schedules, timeouts, metrics.\n\nQUESTIONS THE RESEARCH MUST ANSWER.\n1. Does apalis's SQLite backend play nicely alongside the INFRA-023 .chump/state.db (one file, two schemas? separate files?) or does it push us to Postgres?\n2. Is apalis's job model a natural fit for Chump's work (gap execution as a durable job, with the worker = a Claude Code session) or does it conceptually mismatch (apalis assumes short-lived jobs, our 'jobs' are 30-min+ agent sessions)?\n3. What does worker registration look like on a Pi mesh? One apalis Worker per Pi, picking from a shared SQLite over NFS? Or per-node DBs with a sync layer?\n4. Maturity: production users, release cadence, breaking-change frequency, Rust MSRV, async runtime coupling (tokio-only?).\n5. Alternatives in the same space: underway (Postgres-only, ruled out for offline), fang, tokio-cron-scheduler (schedule-only), sidekiq-rs. Does apalis actually win?\n6. Integration cost: what's the smallest slice that gives real value? Likely 'migrate bot-merge.sh retries to apalis' or 'migrate stale-pr-reaper.sh cron to apalis'.\n7. What does losing apalis look like? If it goes unmaintained in 18 months, can we rip it out cleanly, or does it shape the DB schema in a way that becomes load-bearing?\n\nDELIVERABLE. docs/eval/INFRA-024-apalis-research.md: memo with a recommend/hold/reject verdict, one 50-LOC proof-of-concept (apalis SQLite worker that runs one trivial Chump job — e.g. 'purge stale leases'), integration-cost estimate, and a concrete phase-2 plan if recommended.\n\nCONSTRAINTS CARRIED FROM INFRA-023. Must stay offline-capable (so Redis/Postgres backends are evaluation-only, SQLite is the target). Must not require a daemon. Must co-exist with INFRA-023's .chump/state.db. Must not add a mandatory new external dependency on a Pi (tokio is already there via the Chump runtime)."
  acceptance_criteria:
  - "docs/eval/INFRA-024-apalis-research.md with verdict + evidence (all 7 questions above answered)"
  - "Proof-of-concept in examples/apalis-poc/ (or scratch crate): one apalis SQLite worker, one registered job, one successful dispatch and completion — total <100 LOC"
  - "Integration-cost estimate: LOC delta + new deps + MSRV impact + any schema changes to the INFRA-023 .chump/state.db"
  - "If verdict is 'recommend', file INFRA-025 as the concrete migration gap with sequenced sub-gaps"
  - "If verdict is 'reject' or 'hold', document the reason so future sessions don't re-litigate"
  depends_on:
  - INFRA-023
  notes: "2026-04-22: Phase 1 audit complete, CLAUDE/AGENTS hygiene added, CI dry-run workflow draft in. Remaining: real publishes, release automation., effort small. Research-only — the output is a memo + PoC, not a migration. Rationale for priority: INFRA-023 (SQLite state) gives us most of the durability wins already (atomic writes, TTL leases, SQL queries). apalis is an upgrade, not a fix. Worth researching because it could replace stale-pr-reaper.sh + bot-merge retry logic + ambient.jsonl consumers with a single typed job model. But we should not commit to it before INFRA-023 ships — the research needs the new DB to reason about integration."

- id: INFRA-025
  title: Update all Rust crates + publish to crates.io
  domain: infra
  priority: P2
  effort: m
  source_doc: '2026-04-20 live session — Jeff "update all our rust crates and publish them to crates.io"'
  status: done
  closed_date: '2026-04-22'
  closed_pr: '446'
  description: "Chump has ~10 workspace crates (chump-agent-lease, chump-belief-state, chump-cancel-registry, chump-coord, chump-cost-tracker, chump-mcp-lifecycle, chump-messaging, chump-orchestrator, chump-perception, plus mcp-servers/*) that currently live only in the monorepo. Publishing to crates.io gives external visibility, reproducible dependency pinning for downstream users, and forces the hygiene audit that monorepo-only Rust projects usually skip (real version numbers, license files, docs metadata, no path-only deps, MSRV declared). Also dogfoods the 'bots can scaffold products' vision — if our own building blocks aren't on crates.io, a bot spawning a new product can't pull them cleanly.\n\nWORK REQUIRED (per crate, phased).\n\nPHASE 1 — AUDIT.\n- Inventory every publishable crate in Cargo.toml workspace members + mcp-servers/* + wasm/*. Mark each: (a) public-API-shaped (publish), (b) internal-glue-only (keep path-only), (c) dead (remove).\n- For publish candidates: verify package metadata — name uniqueness on crates.io (reserve names now), version, description, license (MIT/Apache-2.0 dual is Rust default; pick one explicitly), repository, readme, keywords, categories.\n- Run `cargo publish --dry-run` per crate; capture errors (path-only deps, missing license file, workspace version inheritance issues).\n\nPHASE 2 — DEPENDENCY MODERNIZATION.\n- `cargo update` + `cargo outdated` audit — capture all major-version bumps needed. Many crates are probably pinned to older tokio/serde/anyhow versions that need updating for crates.io-quality.\n- `cargo +nightly udeps` — remove unused dependencies (bloat reduction, faster builds, fewer advisory surfaces).\n- `cargo audit` — zero RUSTSEC advisories on publish.\n- MSRV declared explicitly (rust-toolchain.toml + package.rust-version), CI green on that version.\n\nPHASE 3 — RELEASE AUTOMATION.\n- release-plz or cargo-release or cargo-smart-release — pick one, wire into CI. release-plz is the current community favourite (automated version bumps + changelogs from conventional commits + PR-gated publishes).\n- Per-crate CHANGELOG.md generated from conventional commits (we already use conventional commit prefixes, so this is cheap).\n- CI gate: `cargo publish --dry-run` on every PR that touches a publishable crate, so breakage is caught at review time not publish time.\n- Publish token stored as CRATES_IO_TOKEN secret, scoped to the publish workflow only.\n\nPHASE 4 — FIRST PUBLISH.\n- Start with the leafmost crate (least internal deps) — probably chump-agent-lease or chump-cancel-registry — to shake out the pipeline on something low-risk.\n- Publish at 0.1.0 (signal: pre-1.0, API may break). Don't publish at 0.0.x — signals 'abandoned' to discoverability ranking.\n- Once leaf works, publish the rest in topo order. Internal deps become crates.io deps in one commit per crate.\n\nRISKS.\n- Name squatting: reserve names on crates.io TODAY (publish 0.0.0 placeholder with a real description) even before Phase 4 to prevent someone else grabbing 'chump-*' namespace.\n- License uncertainty: some files may be missing SPDX headers or have ambiguous provenance. Fix before publish.\n- Public API exposure: any `pub` item becomes a semver commitment. Tighten visibility (pub(crate) where possible) before the first publish.\n- mcp-servers/* binaries probably shouldn't publish as crates (binary crates are noisy on crates.io); package them as optional features or leave as repo-only.\n\nNON-GOALS (for this gap).\n- Rewriting any crate for crates.io consumption (e.g. removing Chump-specific assumptions). That's per-crate follow-up work if discovered during audit.\n- Publishing mcp-servers/* binaries. They stay in the repo unless explicitly decided otherwise."
  acceptance_criteria:
  - "docs/eval/INFRA-025-crate-publish-audit.md: per-crate table (publish/internal/dead, license, MSRV, dry-run status, name-reservation status on crates.io)"
  - "All publish-candidate crates pass `cargo publish --dry-run` in CI on every PR touching them"
  - "`cargo audit` + `cargo outdated --exit-code 1` green across the workspace"
  - "release-plz (or chosen tool) installed + wired into .github/workflows/; first automated release PR lands"
  - "At least 3 leaf crates published to crates.io at 0.1.0 with CHANGELOGs, readmes, and repository links"
  - "All 'chump-*' names reserved on crates.io via 0.0.0 placeholders (guards against squatting while the real audit proceeds)"
  - "CLAUDE.md + AGENTS.md updated with publish-hygiene rules (no path-only deps in publish-candidate crates, conventional commits required for auto-changelog)"
  depends_on: []
  notes: "2026-04-22: Phase 1 audit complete, CLAUDE/AGENTS hygiene added, CI dry-run workflow draft in. Remaining: real publishes, release automation., effort medium. Real value = forcing the hygiene audit + unlocking 'bots publishing products' as a capability. Biggest risk is time-sink: per-crate license/metadata/docs polish can burn a week if done maximally. Recommended slicing: Phase 1+2 + name reservation is one PR (audit + deps modernization). Phase 3 (release automation) is a second PR. Phase 4 (actual publishes) is one PR per crate, landed in topological order. Don't try to ship all of this at once — the first leaf publish teaches us what the pipeline actually needs. 2026-04-22: Phase 1 audit memo landed — docs/eval/INFRA-025-crate-publish-audit.md (gap remains open for CI dry-run gate, cargo audit/outdated, release automation, real publishes, name placeholders, CLAUDE/AGENTS hygiene)."
- id: INFRA-028
  title: bot-merge.sh silent-hang under fleet contention — add liveness diagnostics, watchdog timeout, progress banners
  domain: infra
  priority: P1
  effort: s
  status: done
  closed_date: '2026-04-21'
  closed_pr: '407'
  source_doc: 2026-04-21 agent-loop observation — 2 RESEARCH-027 bot-merge invocations hung for 20+ min with 0 stdout
  description: >
    scripts/bot-merge.sh is the primary ship pipeline (auto-merge
    armed since INFRA-MERGE-QUEUE). When it works, it's reliable.
    When it fails under fleet contention (many parallel worktrees
    running cargo/clippy, disk pressure, 429 from gh, network
    flap, rebase conflicts), it fails SILENTLY — long stretches
    (observed up to 40 min) of zero stdout before the process
    either hangs forever or exits with 0 but no PR created.
    Observed twice in the 2026-04-21 agent-loop cycle 5 (RESEARCH-027
    ship):
      1. First invocation (background task bhlfxc5as) — 0 bytes
         output, eventually exited 0 with no PR.
      2. Second invocation (foreground bry9tgf1k) — ditto.
      3. Third attempt (bypassed bot-merge via manual
         `git push -u origin <branch> && gh pr create ... && gh pr
         merge --auto --squash`) — worked first try, landed as PR
         #362.
    Root cause is not diagnosed — could be gh CLI rate-limit, a
    subshell spawning issue, cargo lock contention with sibling
    worktrees rebuilding serenity, or `set -e` swallowing a soft
    failure. Without diagnostic output, the agent loop has no way
    to know bot-merge has failed vs. is still running.
    This gap ships:
    (1) **Progress banners** — every major stage of bot-merge
    (rebase, fmt, clippy, tests, push, gh-pr-create, auto-merge-arm,
    checkpoint-tag) prints a timestamped banner to stdout. No step
    should produce silent periods longer than 30s.
    (2) **Per-stage watchdog** — each stage has a timeout
    (rebase 60s, fmt 30s, clippy 300s, push 60s, gh 30s). On timeout,
    dump last 20 lines of any spawned subprocess output and exit
    non-zero with a clear error.
    (3) **Liveness heartbeat** — long stages (clippy especially)
    emit a line every 30s (`[bot-merge] still running clippy: 90s
    elapsed`) so a parent watcher can distinguish "stuck" from
    "working hard."
    (4) **Exit-code honesty** — if any stage fails or is skipped,
    final exit code must reflect it. The observed "exit 0 with no
    PR" path is a contract violation.
    (5) **Manual-fallback runbook** — CLAUDE.md gains a short
    section documenting the `git push + gh pr create + gh pr merge
    --auto --squash` bypass path for when bot-merge.sh itself is
    broken. Already proven workable in cycle 5.
  acceptance_criteria:
    - 'scripts/bot-merge.sh prints a timestamped `[bot-merge] <stage>...` banner at the start of every major stage'
    - 'No stage produces silent stdout for more than 30s (heartbeat line required on long operations)'
    - 'Each stage has a per-stage timeout with an explicit error on breach'
    - '`set -e` path covers every subprocess; `exit 0 with no PR created` is impossible'
    - 'CLAUDE.md gains a "bot-merge.sh recovery — manual ship path" subsection under the Atomic PR discipline rule, citing the `git push + gh pr create + gh pr merge --auto` fallback'
    - 'scripts/test-bot-merge-liveness.sh exists; mocks a sibling-contention scenario and verifies the watchdog timeout fires'
  depends_on: []
  notes: >
    P1 because bot-merge.sh is load-bearing for the entire fleet.
    Silent-fail is the worst failure mode for an agent loop — the
    loop cannot recover without human intervention. Shipping this
    unblocks reliable autonomous ship cycles. Scope is explicitly
    diagnostic-first; no behavior change to the happy path.
    Dogfoods itself — the first agent to ship this will have used
    the manual-fallback path in CLAUDE.md to do so.
