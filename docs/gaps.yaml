- id: EVAL-030
  title: Task-class-aware lessons block — fix neuromod harm at its root cause
  domain: eval
  priority: P1
  effort: m
  status: done
  closed_date: 2026-04-19
  source_doc: docs/eval/EVAL-029-neuromod-task-drilldown.md
  description: "EVAL-029 task drilldown identified TWO distinct mechanisms driving\
    \ the cross-architecture neuromod fixture harm signal (-0.10 to -0.16 across 4\
    \ models, 1200 trials). Neither is the KID context-loss problem EVAL-027 SAKE\
    \ addresses:\n  (a) Conditional-chain dilution — perception directive\n      \"\
    ask one clarifying question rather than guessing\" causes\n      early-stopping\
    \ on multi-step \"do X, if it fails do Y, then Z\"\n      tasks (dynamic-05-policy-confront,\
    \ dynamic-08-budget-aware,\n      dynamic-13-escalation-chain, dynamic-03-retry-loop,\
    \ etc.)\n  (b) Trivial-token contamination — full ~400-token lessons block\n \
    \     dwarfs short chat prompts (\"lol\", \"k thx\", \"noice\"); agent\n     \
    \ produces structured \"what would you like me to do?\" output\n      that judges\
    \ score off-rubric.\nMechanism is directive-misapplication + signal-to-noise dilution,\
    \ not context loss. EVAL-027 SAKE will not address either. Need a task-class-aware\
    \ lessons injection: suppress the \"ask clarifying question\" directive when conditional-chain\
    \ markers detected (regex for \"if.*fails\", \"then if\", etc.); skip the lessons\
    \ block entirely when user prompt is below a length threshold (e.g. <50 chars).\n"
