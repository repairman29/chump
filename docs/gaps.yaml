  description: >
    Every published lessons-block A/B compares "lessons block" vs
    "no lessons block" with no length-matched control. The lessons
    block adds ~2,000 characters of structured text to the system
    prompt. If a 2,000-character control of length-matched random
    prose produces a delta of similar magnitude, the effect is
    prompt-length not lessons-content — which would reframe the
    entire tier-dependent finding. This gap ships a third cell in
    every future lessons A/B (A = lessons on, B = lessons off, C =
    length-matched null-content prose) and re-runs the core
    tier-dependent finding at n=100 on haiku-4-5 and sonnet-4-5 to
    establish whether the content or the ceremony drives the
    effect. Acceptance: publish a verdict in docs/FINDINGS.md
    distinguishing the two alternative explanations. Paper-1 blocker.
