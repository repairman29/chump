# Chump Master Gap Registry
#
# Single source of truth for all documented improvement opportunities.
# Synthesized from: CHUMP_TO_COMPLEX.md, AUTONOMY_ROADMAP.md, ACP_V3_BACKLOG.md,
# ROADMAP_POST_PHASE_F.md, HERMES_COMPETITIVE_ROADMAP.md, HIGH_ASSURANCE_AGENT_PHASES.md,
# DOGFOOD_RELIABILITY_GAPS.md, ECOSYSTEM_VISION.md, ROADMAP_FULL.md, ROADMAP_PRAGMATIC.md,
# book/src/dissertation.md Technical Evolution Plan.
#
# UPDATE RULES:
#   - Never delete entries. Set status: done or status: deferred instead.
#   - Update status when work begins (in_progress) or completes (done).
#   - Add new gaps here rather than creating new roadmap docs.
#   - When a gap ships, add closed_date and closed_commit.
#   - AI agents: cite gap ID in commit messages and PR titles.
#
# SCHEMA:
#   id:           string — domain prefix + zero-padded number (e.g. COG-001)
#   title:        string — short imperative phrase
#   domain:       one of: consciousness | memory | eval | autonomy | acp | competitive |
#                         fleet | reliability | infra | frontier | product
#   priority:     P0 (blocking) | P1 (high-value) | P2 (product depth) | P3 (research)
#   effort:       xs (<1d) | s (1-3d) | m (1-2w) | l (2-4w) | xl (1-3mo)
#   status:       open | in_progress | blocked | deferred | done
#   source_doc:   path relative to repo root (or list of paths)
#   description:  what is missing and why it matters
#   acceptance:   what "done" looks like — measurable outcome
#   depends_on:   list of gap IDs or WP IDs that must ship first (optional)
#   gate:         for frontier items, the experiment criterion before full investment (optional)
#   notes:        freeform context (optional)
#   closed_date:  ISO date when status set to done (optional)
#   closed_commit: git SHA (optional)

meta:
  version: "1"
  generated: "2026-04-16"
  update_instructions: >
    Set status: done when merged. Add closed_date (ISO) and closed_commit (SHA).
    Add new gaps with the next sequential ID in the relevant domain.
    Prefer updating an existing gap over creating a near-duplicate.

# ---------------------------------------------------------------------------
# DOMAIN GLOSSARY
# ---------------------------------------------------------------------------
domains:
  consciousness: "Active Inference, cognitive framework, consciousness subsystem correctness"
  memory:        "Memory retrieval quality, knowledge graph, curation, confidence"
  eval:          "Evaluation framework coverage, benchmarks, LLM-as-judge"
  autonomy:      "Task planning, planner/executor/verifier loop, lease management"
  acp:           "Agent Client Protocol, editor integration (Zed/JetBrains)"
  competitive:   "Hermes/GEPA parity gaps — skills, plugins, context engine, UX"
  fleet:         "Multi-agent coordination, Mac-Pixel symbiosis, mutual supervision"
  reliability:   "Dogfood stability, model quality matrix, upstream blockers"
  infra:         "Build, sandbox, in-process inference, deployment"
  frontier:      "Research-grade speculative features — quantum, TDA, autopoiesis"
  product:       "PWA/UX, dashboard, voice/vision, deploy ergonomics"

