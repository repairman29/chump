- id: RESEARCH-022
  title: Module-use reference analysis — does the agent actually read the scaffolding it is given?
  domain: research
  priority: P1
  effort: s
  status: done
  closed_date: '2026-04-20'
  source_doc: docs/RESEARCH_CRITIQUE_2026-04-21.md §5
  description: >
    A "cognitive architecture" claim rests on whether the agent uses
    the architecture. We currently measure outputs (did the task
    succeed, did it hallucinate) but never measure whether the
    agent references the injected module state in any observable
    way. If belief_state provides "my_ability: 0.9" and the agent
    never mentions or conditions on that value across 100 trials,
    the module is dead weight even when output deltas exist. This
    gap ships a post-hoc text-analysis pipeline that scans agent
    outputs for references to injected module state, broken out by
