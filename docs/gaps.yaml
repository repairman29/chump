  description: 'Today there is no formal escalation: when an agent gets stuck (test
    failure it can''t diagnose, ambiguous gap acceptance, cargo build failure), it
    dies, times out, or pushes broken commits. Multi-agent dispatch needs an explicit
    escalation channel: agent emits ALERT into ambient.jsonl with kind=escalation
    plus structured payload (gap_id, stuck_at_step, last_error, attempted_fixes).
    Watch on ALERT events surfaces these to Jeff as actionable items rather than silent
    death. Connects to chump-coord NATS for real-time pings.

    '
