- id: PRODUCT-003
  title: User profile system — three-layer identity, context, and learned preferences
  domain: product
  priority: P1
  effort: l
  status: done
  closed_date: '2026-04-19'
  closed_commit: 155711c
  source_doc: docs/FTUE_USER_PROFILE.md
  description: 'Chump currently starts every session knowing nothing about the user.
    The cognitive architecture (neuromodulation, belief state, precision controller)
    runs blind with no user model to calibrate against. This gap implements the three-layer
    user model: (1) Identity & Relationship — persistent, encrypted, who the user
    is and how they work; (2) Current Context — volatile, stale-flagged after 7 days,
    active projects and goals; (3) Learned Preferences — Chump-observed, user-confirmable
    behavioral observations. Profile data is never injected raw into prompts, never
    written to logs or ambient.jsonl, never committed to git. A user_context() function
    returns a curated behavioral summary; behavioral regime fields compile into the
    PrecisionController at session start. Storage: sessions/user_profile.db (AES-256-GCM
    field encryption, keyring crate for key management, 600 permissions).

    '
  acceptance: 'user_context() returns a UserContext struct with display_name, role_summary,
    current_focus (max 3 items), behavioral_regime, and never_do. All three layers
    readable/writable via public API. Sensitive fields encrypted at rest. Profile
    never appears in tool responses, logs, or error output (verified by grep of test
    output). PWA Profile tab renders all three layers with inline editing. BehaviorRegime
    feeds PrecisionController::initial_regime() at session start. Unit tests cover:
    encryption round-trip, context expiry, preference confirmation flow, injection
    sanitization.

    '
  depends_on: []
- id: PRODUCT-004
