- id: INFRA-WORKTREE-REAPER-FIX
  title: stale-worktree-reaper missed long-running background bash — broke EVAL-026c
    sweep
  domain: infra
  priority: P2
  effort: s
  status: done
  closed_date: '2026-04-19'
  resolution_notes: 'Shipped in claude/reaper-fix-process-aware. scripts/stale-worktree-reaper.sh
    now adds two SKIP-blocking safety checks before the reapability decision: (1)
    lsof +D — refuses to reap if any process has cwd or open files anywhere under
    the worktree path; (2) find -mmin -N on logs/ — refuses to reap if any file under
    logs/ was modified within --log-fresh-min minutes (default 10, configurable).
    New --force-skip-process-check flag for explicit emergency override (NOT default).
    Test coverage in scripts/test-stale-worktree-reaper.sh. The validating dry-run
    empirically caught a sibling worktree (mem-006) running an active cargo build
    and correctly SKIPped it — confirming the EVAL-026c data-loss class is now blocked.

    '
  source_doc: session 2026-04-19 evening — INFRA-WORKTREE-REAPER ship + immediate
    post-mortem
  description: 'The INFRA-WORKTREE-REAPER shipped in PR #143 has an "active lease"
    check that prevents reaping a worktree with a live `.chump-locks/*.json`. But
    during the 2026-04-19 evening manual reap pass (using the same logic), the u-curve-32b
    worktree was reaped while a long-running background bash sweep (EVAL-026c local
    7B/14B) was still actively writing to its logs/ab/ directory. Sweep died at trial
    45/50 of the 7B run; 14B never started. Lost ~98 trials of local-tool data. The
    reaper checks for lease files but NOT for active processes writing to the worktree.
    Both are needed.

    '
  acceptance: "stale-worktree-reaper.sh additionally refuses to reap a worktree that\
    \ has either:\n  (1) a process whose cwd is inside the worktree\n      (use lsof\
    \ or pgrep --uid + readlink /proc/PID/cwd or macOS\n       equivalent), OR\n \
    \ (2) a file in logs/ modified within the last N minutes (default\n      N=10,\
    \ env-tunable)\nPlus: when the manual reap pass is invoked, default to --dry-run\
    \ with explicit list of \"would-reap\" so the operator can sanity-check.\n"
  depends_on: []
  notes: '~3 hours. Tactical: until this fix lands, when in doubt about reaping a
    worktree, check `lsof +D <worktree-path>` first or just grep `ps -ef` for the
    worktree path. The auto-cron is conservative enough (only reaps merged-and-remote-deleted
    branches) that this bug won''t hit there — only manual invocations are at risk.

    '
