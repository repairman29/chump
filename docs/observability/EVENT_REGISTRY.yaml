      A reapable worktree had uncommitted changes or unpushed commits at reap
      time. The reaper committed any loose changes (git add -A + commit
      --no-verify) and pushed them to a wip/<gap_id>-<ts> branch on origin
      before calling git worktree remove --force. Emitted only when the push
      succeeds; push failure is logged to /tmp/stale-worktree-reaper.log with
      a WARN banner but does not block the reap.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, gap_id, branch, uncommitted_lines, unpushed_commits, original_worktree]

