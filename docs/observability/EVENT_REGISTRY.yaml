# EVENT_REGISTRY.yaml — INFRA-754
#
# Canonical list of every `kind=...` value the system can emit into
# `.chump-locks/ambient.jsonl`. Pre-commit guard refuses any new commit
# that introduces a `"kind":"X"` literal where X is not registered here.
#
# Why: "observability before scale" needs mechanical enforcement. Without
# this registry, every contributor adds events with their own conventions
# and consumers (fleet-brief, waste-tally, kpi-report, watchdogs) silently
# fail on the unknown shapes.
#
# Adding a new event:
#   1. Add an entry below with: kind, emitter, consumers, trigger, fields_required
#   2. Update the consumer code to parse the event
#   3. Stage your changes; pre-commit guard verifies the entry exists
#
# Schema:
#   kind:            (required) the literal string emitted in `"kind":"..."` JSON
#   emitter:         (required) source file or component that emits it
#   trigger:         (required) one-line description of when it fires
#   consumers:       (recommended) list of downstream consumers
#   fields_required: (recommended) list of fields the consumer expects
#   docs:            (optional) link to a longer explanation
#   status:          (optional) "stable" / "deprecated" — default stable
#
# Bypass: CHUMP_EVENT_REGISTRY_CHECK=0 in commit env (with reason in
# commit body trailer "Event-Registry-Bypass: <text>"). Same discipline
# as --no-verify; sparingly.

schema_version: 1
last_audit: "2026-05-08"

events:

  # ── Fleet lifecycle ────────────────────────────────────────────────────────
  - kind: session_start
    emitter: scripts/dev/ambient-emit.sh + claude SessionStart hook
    trigger: any chump session begins (fleet worker, operator, reaper)
    consumers: [fleet-brief, ambient-context-inject]

  - kind: session_end
    emitter: claude Stop hook + worker.sh cycle_end
    trigger: session terminates (clean or timeout)
    consumers: [fleet-brief, kpi-report, waste-tally]
    fields_required: [ts, session_id, outcome, input_tokens, output_tokens]

  - kind: cycle_end
    emitter: scripts/dispatch/worker.sh
    trigger: fleet worker finishes a cycle (claim+ship or empty pick)
    consumers: [fleet-brief]
    fields_required: [agent_id, gap_id, elapsed_s, rc, cycle_kind]

  - kind: fleet_starved
    emitter: scripts/dispatch/worker.sh
    trigger: N consecutive empty picks (CHUMP_STARVE_THRESHOLD)
    consumers: [fleet-brief, watchdog]

  - kind: fleet_wedge
    emitter: scripts/dispatch/worker.sh
    trigger: claude -p produced 0 stdout for full timeout window
    consumers: [waste-tally, watchdog]

  - kind: fleet_health
    emitter: launchd / scripts/ops/fleet-health.sh
    trigger: periodic fleet metrics summary
    consumers: [fleet-brief]

  - kind: fleet_snapshot
    emitter: scripts/ops/fleet-snapshot.sh
    trigger: scheduled fleet state capture
    consumers: [chump fleet status]

  - kind: fleet_queue_depth
    emitter: picker / fleet status
    trigger: queue depth metric capture
    consumers: [fleet-brief]

  - kind: fleet_restore
    emitter: scripts/dispatch/run-fleet.sh
    trigger: fleet restart event
    consumers: [audit-log]

  - kind: fleet_scale_request
    emitter: operator or auto-scaler
    trigger: request to change fleet size
    consumers: [audit-log]

  - kind: fleet_version_skew
    emitter: scripts/ops/fleet-version-check.sh
    trigger: workers running different chump binary versions
    consumers: [watchdog]

  - kind: fleet_pid_invariant
    emitter: scripts/ops/fleet-audit-pids.sh
    trigger: PID/lease consistency check
    consumers: [watchdog]

  - kind: fleet_worker_silent
    emitter: scripts/ops/fleet-worker-watchdog.sh (FLEET-042)
    trigger: worker heartbeat > N min stale
    consumers: [operator-recall]

  - kind: fleet_timeout_checkpoint
    emitter: scripts/dispatch/worker.sh (INFRA-525)
    trigger: T-30s before claude -p timeout, WIP commit pushed
    consumers: [fleet-brief]

  - kind: worker_exit
    emitter: scripts/dispatch/worker.sh
    trigger: worker exits cycle (rc + classified exit_class)
    consumers: [waste-tally, kpi-report]
    fields_required: [agent_id, gap_id, rc, exit_class]

  - kind: worker_cooldown
    emitter: scripts/dispatch/worker.sh (FLEET-051)
    trigger: single worker failure on a gap; per-worker cooldown written
    consumers: [fleet-brief]
    fields_required: [gap_id, worker_id, until, cooldown_kind]

  - kind: worker_cooldown_cluster_wide
    emitter: scripts/dispatch/worker.sh (FLEET-051)
    trigger: distinct-worker failure count reaches FLEET_COOLDOWN_THRESHOLD (default 3)
    consumers: [fleet-brief, watchdog]
    fields_required: [gap_id, worker_count, until]

  - kind: worker_circuit_open
    emitter: scripts/dispatch/worker.sh (FLEET-043)
    trigger: N consecutive dispatch failures, worker pauses
    consumers: [fleet-brief, watchdog]

  - kind: worker_stand_down
    emitter: scripts/dispatch/worker.sh (INFRA-613)
    trigger: starvation threshold hit, worker exits cleanly
    consumers: [fleet-brief]

  - kind: worker_wedge_detected
    emitter: scripts/dispatch/worker.sh (INFRA-823)
    trigger: claude -p produced near-empty log after timeout (rc=124 or rc=0 AND log < 100B)
    consumers: [fleet-brief, watchdog]
    fields_required: [agent_id, gap_id, rc, cycle_log_size, wedge_count]

  - kind: fleet_wedge_storm
    emitter: scripts/dispatch/worker.sh (INFRA-823)
    trigger: N wedge events in rolling 1h window (CHUMP_WEDGE_STORM_THRESHOLD, default 5)
    consumers: [fleet-brief, watchdog]
    fields_required: [agent_id, recent_wedges, threshold, window_h]

  # ── Auth ───────────────────────────────────────────────────────────────────
  - kind: fleet_auth_storm
    emitter: scripts/dispatch/worker.sh
    trigger: N consecutive auth failures
    consumers: [fleet-brief, watchdog]

  - kind: fleet_auth_mode
    emitter: scripts/dispatch/run-fleet.sh
    trigger: auth path detected at fleet launch
    consumers: [fleet-brief]

  - kind: fleet_auth_verified
    emitter: scripts/dispatch/run-fleet.sh (INFRA-621)
    trigger: launch-time auth probe succeeded
    consumers: [audit-log]

  - kind: fleet_auth_misconfigured
    emitter: scripts/dispatch/run-fleet.sh (INFRA-621)
    trigger: launch-time auth probe failed
    consumers: [operator-recall, audit-log]

  - kind: fleet_auth_refresh
    emitter: scripts/dispatch/worker.sh refresh_oauth_token
    trigger: OAUTH token refreshed mid-cycle
    consumers: [audit-log]

  - kind: fleet_auth_unrecoverable
    emitter: scripts/dispatch/worker.sh
    trigger: auth failed beyond circuit-breaker threshold
    consumers: [operator-recall, fleet-brief]

  - kind: fleet_oauth_token_refreshed
    emitter: scripts/dispatch/worker.sh
    trigger: oauth token file re-read with new value
    consumers: [audit-log]

  - kind: fleet_auto_restart_decision
    emitter: scripts/dispatch/fleet-autorestart-daemon.sh (INFRA-611)
    trigger: daemon decides to restart fleet
    consumers: [audit-log, fleet-brief]

  - kind: fleet_auto_restart_cancel
    emitter: scripts/dispatch/fleet-autorestart-daemon.sh
    trigger: pending restart canceled
    consumers: [audit-log]

  # ── Reapers / cleanup daemons ──────────────────────────────────────────────
  - kind: reaper_run
    emitter: scripts/ops/stale-*-reaper.sh
    trigger: reaper completes a sweep
    consumers: [reaper-watchdog]
    fields_required: [reaper_name, status]

  - kind: reaper_silent
    emitter: scripts/ops/reaper-heartbeat-watchdog.sh (INFRA-120)
    trigger: reaper missed expected cadence
    consumers: [fleet-brief, operator-recall]

  - kind: stale_gap_lock_reaped
    emitter: scripts/ops/stale-gap-lock-reaper.sh (INFRA-676)
    trigger: zombie gap-lock removed
    consumers: [fleet-brief]
    fields_required: [lock, session]

  - kind: stale_bot_merge_killed
    emitter: scripts/ops/stale-bot-merge-reaper.sh (INFRA-673)
    trigger: bot-merge.sh process > 1h killed
    consumers: [fleet-brief]
    fields_required: [pid, age_s]

  - kind: ghost_status_closed
    emitter: scripts/ops/stale-pr-reaper.sh (INFRA-674 extension)
    trigger: gap auto-closed because PR merged but state was open
    consumers: [audit-log]
    fields_required: [gap_id, pr_number]

  - kind: daemon_silent
    emitter: scripts/ops/reaper-heartbeat-watchdog.sh (INFRA-683)
    trigger: pr-watch.sh / distill-pr-skills.sh missed heartbeat
    consumers: [fleet-brief, operator-recall]

  - kind: watchdog_silent
    emitter: scripts/ops/meta-watchdog.sh
    trigger: a watchdog itself missed its tick
    consumers: [operator-recall]

  - kind: silent_agent
    emitter: chump-coord
    trigger: live session stopped heartbeating
    consumers: [waste-tally, fleet-brief]

  - kind: edit_burst
    emitter: chump-coord
    trigger: rapid file mutations (rebase stomp risk)
    consumers: [fleet-brief]

  - kind: lease_expired_server
    emitter: scripts/coord/lease-reaper.sh
    trigger: server-side lease TTL expired
    consumers: [waste-tally]

  - kind: lease_overlap
    emitter: chump-coord
    trigger: two sessions claim same files
    consumers: [fleet-brief]

  # ── PR / gap lifecycle ─────────────────────────────────────────────────────
  - kind: gap_reserved
    emitter: chump gap reserve
    trigger: new gap added to state.db
    consumers: [audit-log]
    fields_required: [gap_id, domain]

  - kind: gap_shipped
    emitter: chump gap ship
    trigger: gap status flipped to done
    consumers: [audit-log, kpi-report]
    fields_required: [gap_id, closed_pr]

  - kind: gap_workflow_phase
    emitter: src/web_server.rs (PWA autonomous workflows)
    trigger: autonomous gap workflow transitions between phases
    consumers: [fleet-brief, ambient-context-inject]
    fields_required: [gap_id, phase, status]
    docs: "Phase values: preflight, claim, execute-gap, ship. Status: started, success, failed, error, partial"

  - kind: gap_drift_orphan
    emitter: scripts/coord/gap-doctor.py
    trigger: gap in state.db without YAML mirror
    consumers: [fleet-brief]

  - kind: gap_drift_yaml_only
    emitter: scripts/coord/gap-doctor.py
    trigger: YAML file without state.db row
    consumers: [fleet-brief]

  - kind: pr_classified
    emitter: chump pr triage (INFRA-605)
    trigger: PR CI failure classified by FAILURE_MODES.yaml
    consumers: [pr-triage-bot]

  - kind: pr_stuck
    emitter: scripts/ops/stuck-pr-filer.sh (INFRA-307)
    trigger: PR BLOCKED > 4h with no progress
    consumers: [audit-log, fleet]

  - kind: pr_blocked_long
    emitter: scripts/ops/stuck-pr-filer.sh
    trigger: pr_stuck variant for very long blocks
    consumers: [operator-recall]

  - kind: pr_repair
    emitter: scripts/ops/pr-repair-loop.sh (INFRA-727)
    trigger: PR rebase repair attempted
    consumers: [audit-log]

  - kind: pr_title_drift
    emitter: scripts/ci/pr-title-check.sh
    trigger: PR title diverged from gap title
    consumers: [audit-log]

  - kind: pr_watch
    emitter: scripts/coord/pr-watch.sh
    trigger: pr-watch loop iteration
    consumers: [reaper-watchdog]

  # ── Auto-fix / triage bots ─────────────────────────────────────────────────
  - kind: auto_fix_lint
    emitter: .github/workflows/pr-triage-bot.yml (INFRA-624)
    trigger: lint-class CI failure → cargo clippy --fix + push
    consumers: [audit-log]

  - kind: ci_flake_rerun
    emitter: scripts/ops/ci-flake-rerun.sh + pr-triage-bot
    trigger: flake-class CI failure → gh run rerun --failed
    consumers: [audit-log, fleet-brief]

  - kind: flake_rerun
    emitter: pr-triage-bot
    trigger: rerun action explicitly fired
    consumers: [audit-log]

  - kind: flake_budget_exceeded
    emitter: pr-triage-bot
    trigger: rerun cap (3 attempts) hit
    consumers: [operator-recall]

  - kind: cascade_rebase_triggered
    emitter: .github/workflows/post-merge-cascade-rebase.yml (INFRA-670)
    trigger: workspace-file landing → open-PR rebase sweep
    consumers: [audit-log]

  # ── Cost / token tracking ─────────────────────────────────────────────────
  - kind: token_usage_partial
    emitter: scripts/dispatch/_parse_token_usage.py (INFRA-639)
    trigger: claude streaming response usage event
    consumers: [waste-tally, kpi-report]
    fields_required: [session_id, input, output]

  - kind: token_anomaly
    emitter: chump waste-tally
    trigger: token-burn outlier detected
    consumers: [fleet-brief]

  - kind: cost_cap_exceeded
    emitter: scripts/dispatch/cost-cap-monitor.sh
    trigger: daily LLM spend exceeded threshold
    consumers: [operator-recall]

  - kind: cascade_decision
    emitter: src/provider_cascade.rs
    trigger: bandit/priority chose a slot for a request
    consumers: [audit-log]

  - kind: cascade_report
    emitter: scripts/overnight/99-cascade-consumption-report.sh
    trigger: daily provider RPD utilization summary
    consumers: [fleet-brief]

  - kind: pricing_drift
    emitter: scripts/dev/refresh-model-prices.sh (INFRA-731)
    trigger: model_rates.yaml drifted > 5% from LiteLLM upstream
    consumers: [fleet-brief, audit-log]

  # ── Mission / pillar metrics ──────────────────────────────────────────────
  - kind: mission_grade
    emitter: scripts/ops/mission-auto-grader.sh (INFRA-599)
    trigger: per-cycle pillar grade computed
    consumers: [fleet-brief]

  - kind: pillar_imbalance
    emitter: scripts/dispatch/_pick_and_claim_gap.py (INFRA-720)
    trigger: one pillar > 60% of recent ships for 8h
    consumers: [fleet-brief, operator-recall]

  - kind: rebalance_active
    emitter: picker
    trigger: pillar bias kicks in
    consumers: [fleet-brief]

  - kind: ship_grade
    emitter: scripts/ops/ship-quality-grader.sh
    trigger: per-PR ship-quality grade computed
    consumers: [kpi-report]

  - kind: weekly_health_digest
    emitter: scripts/overnight/weekly-health-digest.sh (INFRA-646)
    trigger: weekly summary cron
    consumers: [operator-recall]

  - kind: ci_health
    emitter: scripts/ops/ci-health.sh
    trigger: CI health metric
    consumers: [fleet-brief]

  - kind: shared_ci_blocker
    emitter: scripts/ops/shared-ci-blocker.sh
    trigger: cross-PR CI blocker detected
    consumers: [operator-recall]

  - kind: bot_merge_hang
    emitter: scripts/ops/stuck-bot-merge.sh
    trigger: bot-merge.sh hanging > threshold
    consumers: [operator-recall]

  - kind: bot_merge_hung
    emitter: scripts/ops/stale-bot-merge-reaper.sh
    trigger: bot-merge.sh hung beyond reaper threshold
    consumers: [audit-log]

  - kind: bot_merge_hot_file
    emitter: scripts/ops/bot-merge-watch.sh
    trigger: many bot-merges touching same file
    consumers: [audit-log]

  # ── Subagent / cognition ──────────────────────────────────────────────────
  - kind: subagent_budget_exceeded
    emitter: scripts/dispatch/subagent-budget-monitor.sh
    trigger: dispatched subagent exceeded token/time cap
    consumers: [audit-log]

  - kind: lessons_shown
    emitter: src/lessons_engine.rs (COG family)
    trigger: lessons block injected into prompt
    consumers: [audit-log]

  - kind: lessons_audit_run
    emitter: scripts/ops/lessons-audit.sh
    trigger: periodic lessons quality audit
    consumers: [fleet-brief]

  - kind: lessons_injection_active
    emitter: src/lessons_engine.rs
    trigger: lessons system actively shaping prompts
    consumers: [audit-log]

  - kind: lessons_pruned
    emitter: scripts/ops/lessons-pruner.sh
    trigger: stale lessons removed
    consumers: [audit-log]

  - kind: lesson_applied
    emitter: src/lessons_engine.rs
    trigger: a specific lesson influenced an agent decision
    consumers: [audit-log]

  - kind: lesson_not_applied
    emitter: src/lessons_engine.rs
    trigger: lesson available but agent did not apply it
    consumers: [audit-log]

  - kind: asks_clarification
    emitter: scripts/dispatch/clarifying-question-detector.sh
    trigger: dispatched agent asked a question instead of acting
    consumers: [waste-tally, fleet-brief]

  - kind: avoids_tool
    emitter: scripts/dispatch/tool-avoidance-detector.sh
    trigger: agent skipped a recommended tool
    consumers: [audit-log]

  - kind: autonomous_mode_entered
    emitter: scripts/dispatch/autonomous-mode-monitor.sh
    trigger: agent entered fully-autonomous decision path
    consumers: [audit-log]

  - kind: autonomous_mode_exited
    emitter: scripts/dispatch/autonomous-mode-monitor.sh
    trigger: agent left autonomous decision path
    consumers: [audit-log]

  # ── Operator / paging ─────────────────────────────────────────────────────
  - kind: operator_recall
    emitter: scripts/dispatch/operator-recall.sh (INFRA-665)
    trigger: an event needs operator attention
    consumers: [discord, telegram messaging adapter]

  - kind: escalation
    emitter: operator-agent (INFRA-737, future)
    trigger: Layer-2 Sonnet escalates to Layer-3 Opus
    consumers: [audit-log, operator-recall]

  - kind: manual_rescue
    emitter: scripts/dispatch/manual-rescue-emit.sh
    trigger: operator manually intervened (logged for ledger)
    consumers: [fleet-brief]

  # ── Misc ──────────────────────────────────────────────────────────────────
  - kind: file_edit
    emitter: PostToolUse hook (Edit / Write)
    trigger: any agent edits a file
    consumers: [ambient-context-inject]

  - kind: commit
    emitter: PostToolUse hook (Bash git commit)
    trigger: any commit made by an agent
    consumers: [ambient-context-inject, audit-log]

  - kind: intent
    emitter: scripts/dispatch/intent-emit.sh
    trigger: agent declares pending intent (rebase, ship, etc.)
    consumers: [coord]

  - kind: notable_finding
    emitter: scripts/ops/notable-finding-emit.sh
    trigger: agent flagged something worth operator review
    consumers: [operator-recall]

  - kind: decomposition_hint
    emitter: scripts/dispatch/decomposition-detector.sh
    trigger: agent suggested a gap should be split
    consumers: [audit-log]

  - kind: recurring_gap_pattern
    emitter: scripts/ops/pattern-detector.sh
    trigger: same failure shape filed multiple times
    consumers: [operator-recall]

  - kind: roadmap_status
    emitter: scripts/ops/roadmap-status.sh
    trigger: periodic roadmap progress snapshot
    consumers: [fleet-brief]

  - kind: product_drought
    emitter: scripts/ops/pillar-drought-detector.sh
    trigger: PRODUCT pillar starved for N days
    consumers: [operator-recall]

  - kind: disk_critical
    emitter: scripts/ops/disk-watchdog.sh
    trigger: disk free < threshold
    consumers: [operator-recall]

  - kind: delta_recorded
    emitter: scripts/coord/reflect-delta.sh
    trigger: agent reflection delta captured
    consumers: [chump_improvement_targets]

  - kind: alert
    emitter: generic ALERT wrapper (event=ALERT,kind=...)
    trigger: meta-kind for the event=ALERT envelope
    consumers: [fleet-brief, ambient-context-inject]
    notes: "Always paired with a specific sub-kind. Use the specific kind in registry, not 'alert'."

  - kind: affinity_starved
    emitter: scripts/dispatch/_pick_and_claim_gap.py (INFRA-314)
    trigger: worker has skill constraints but no matching gaps
    consumers: [fleet-brief]

  # ── Activation telemetry (chump-init) ─────────────────────────────────────
  - kind: ftue_init_smoke_passed
    emitter: scripts/ci/test-chump-init-clean-machine.sh
    trigger: all 5 FTUE init smoke checks passed (chump --version, init, config.toml, state.db, mcp list)
    consumers: [fleet-brief, kpi-report]

  - kind: mcp_server_installed
    emitter: src/mcp_discovery.rs::install_mcp_server
    trigger: chump mcp install <name> completes (any outcome — already_installed, cargo_installed, config_only)
    consumers: [fleet-brief, audit-log]

  - kind: activation_install
    emitter: scripts/setup/install.sh
    trigger: fresh chump install on a machine
    consumers: [audit-log]

  - kind: activation_first_task
    emitter: chump init / first-run hook
    trigger: first agent task on a new install
    consumers: [audit-log]

  - kind: activation_return_d2
    emitter: scripts/ops/activation-tracker.sh
    trigger: operator returned to chump on day 2
    consumers: [audit-log]

  # ── Adversary / safety ────────────────────────────────────────────────────
  - kind: adversary_alert
    emitter: scripts/ops/adversary-detector.sh
    trigger: prompt-injection or adversarial behavior detected
    consumers: [operator-recall]

  # ── Aggregations ──────────────────────────────────────────────────────────
  - kind: aggregate
    emitter: chump waste-tally / kpi-report
    trigger: aggregated metric snapshot for downstream consumers
    consumers: [fleet-brief]

  # ── Bounced-PR detector (INFRA-781) ───────────────────────────────────────
  - kind: pr_bounced_unfinished
    emitter: scripts/coord/bounced-pr-detector.sh
    trigger: PR closed without merging AND no equivalent file content has
      landed in main since close — work bounced into the void; auto-files
      a recovery gap when CHUMP_BOUNCED_PR_AUTO_FILE_GAP=1 (default on)
    consumers: [fleet-brief, watchdog, operator-paging]
    fields_required: [ts, source, pr, note]

  - kind: pr_bounced_relanded
    emitter: scripts/coord/bounced-pr-detector.sh
    trigger: PR closed unmerged but >=50% of touched files have post-close
      merged commits — work re-routed, informational only
    consumers: [fleet-brief]
    fields_required: [ts, source, pr, note]

  # ── Review-as-Handoff telemetry (INFRA-773) ──────────────────────────────
  - kind: review_handoff_initiated
    emitter: src/review_handoff.rs (chump review --serve daemon)
    trigger: reviewer-agent posts a [handoff:apply] comment on a PR
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, pr, reviewer_session, failure_surface]

  - kind: review_handoff_applied
    emitter: scripts/dispatch/worker.sh (author re-engagement loop)
    trigger: author-agent push lands and CI flips green after applying handoff diff
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, pr, author_session, handoff_comment_id]

  - kind: review_handoff_failed
    emitter: scripts/dispatch/worker.sh (author re-engagement loop)
    trigger: author-agent push lands but CI is still red after applying handoff diff
    consumers: [fleet-brief, kpi-report, waste-tally]
    fields_required: [ts, pr, author_session, failure_detail]

  - kind: review_handoff_timeout
    emitter: src/review_handoff.rs (chump review --serve daemon)
    trigger: no author push within 15 min of handoff comment; escalation queued
    consumers: [fleet-brief, kpi-report, waste-tally]
    fields_required: [ts, pr, reviewer_session, elapsed_seconds]

  - kind: review_handoff_escalated
    emitter: src/review_handoff.rs (chump review --serve daemon)
    trigger: failure or timeout triggers operator notification via configured channel
    consumers: [fleet-brief, operator-paging]
    fields_required: [ts, pr, reason, channel]

  # ── PR-stale auto-rebase (RESILIENT-006) ─────────────────────────────────
  - kind: pr_rescue_triggered
    emitter: scripts/coord/pr-rescue.sh
    trigger: PR identified as rescue candidate — has auto-merge armed, CI fails on PR but passes on main HEAD, age >= PR_RESCUE_STALE_HOURS
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, pr, detail]

  - kind: pr_rescue_completed
    emitter: scripts/coord/pr-rescue.sh
    trigger: PR branch successfully rebased onto main HEAD, force-pushed, and auto-merge re-armed
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, pr, detail]

  - kind: pr_rescue_failed
    emitter: scripts/coord/pr-rescue.sh
    trigger: rebase failed (merge conflict or push rejected); PR left unchanged for human intervention
    consumers: [fleet-brief, kpi-report, waste-tally]
    fields_required: [ts, pr, detail]

  # ── Free-tier dispatch testing ─────────────────────────────────────────
  - kind: free_tier_e2e
    emitter: scripts/dispatch/free-tier-e2e-test.sh
    trigger: free-tier e2e test completes (pass, partial, timeout, or fail)
    consumers: [fleet-brief]
    fields_required: [provider, model, result, detail]

  # ── Flake auto-rerun harness (INFRA-764) ──────────────────────────────────
  - kind: flake_autorerun_initiated
    emitter: scripts/ci/cargo-test-with-rerun.sh
    trigger: cargo test failed AND every failing test is in
      docs/process/KNOWN_FLAKES.yaml; about to rerun once
    consumers: [fleet-brief, kpi-report, waste-tally]
    fields_required: [ts, source, note]

  - kind: flake_autorerun_recovered
    emitter: scripts/ci/cargo-test-with-rerun.sh
    trigger: rerun-after-flake-detection went green; CI treats as transient
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, source, note]

  - kind: flake_autorerun_persisted
    emitter: scripts/ci/cargo-test-with-rerun.sh
    trigger: rerun-after-flake-detection still red; surface to CI as real failure
    consumers: [fleet-brief, waste-tally, watchdog]
    fields_required: [ts, source, note]

  - kind: flake_autorerun_skipped
    emitter: scripts/ci/cargo-test-with-rerun.sh
    trigger: at least one failing test is NOT in KNOWN_FLAKES.yaml, or no
      parseable failure shape detected; auto-rerun declined
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, source, note]

  - kind: feature_silent_failure
    emitter: scripts/ci/run-feature-smokes.sh
    trigger: a load-bearing feature path (chump --briefing, bot-merge.sh) produced
      empty or structurally incomplete output for a known input — cascading-silent-
      failure class detected (INFRA-396)
    consumers: [fleet-brief, watchdog, kpi-report]
    fields_required: [ts, kind, feature, reason]

  # ── Intent parser (INFRA-798) ─────────────────────────────────────────────
  - kind: intent_parse_ok
    emitter: src/intent_parser.rs (chump orchestrate <text> single-shot mode)
    trigger: natural-language intent resolved to a known IntentOp variant
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, command]

  - kind: intent_parse_unknown
    emitter: src/intent_parser.rs (chump orchestrate <text> single-shot mode)
    trigger: pattern matching returned IntentOp::Unknown — intent not recognized
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, command]

  # ── Pre-registered eval gate (META-043) ──────────────────────────────────
  - kind: prereg_blocked
    emitter: scripts/coord/bot-merge.sh §4c
    trigger: commit modifies cognition/routing src but docs/eval/preregistered/<GAP-ID>.md is absent; bot-merge aborts
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, gap, missing, session]

  - kind: prereg_ok
    emitter: scripts/coord/bot-merge.sh §4c
    trigger: cognition/routing src changed and preregistered eval doc confirmed present; ship proceeds
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, gap, doc, session]

  # ── Test fixtures (synthetic kinds for unit-test scaffolding only) ────────
  - kind: obs_coverage_test_fixture
    emitter: scripts/ci/test-obs-coverage-guard.sh
    trigger: synthetic event written by INFRA-757 test fixture; never emitted
      by production code paths
    consumers: []
    status: test-fixture
