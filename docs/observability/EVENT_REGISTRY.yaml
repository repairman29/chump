# EVENT_REGISTRY.yaml — INFRA-754
#
# **GROUND-TRUTH CONTRACT** (INFRA-1237). This file is the contract that
# fleet-brief, waste-tally, kpi-report, watchdogs, and every other ambient
# consumer reads to know which `kind=X` values to expect from
# `.chump-locks/ambient.jsonl`. Drift in either direction silently degrades
# operator trust:
#   - emit-without-register → consumers see kinds they don't understand and
#     drop them; SLO dashboards under-report
#   - register-without-emit → consumers wait for kinds that never fire;
#     dashboards display empty rows the operator can't interpret
#
# Enforcement (post-INFRA-1237):
#   - scripts/ci/test-event-registry-coverage.sh runs on every PR in
#     fast-checks. Default mode (strict-emit) fails the build on
#     emit-without-register. Set CHUMP_REGISTRY_GATE_MODE=strict to also
#     fail on register-without-emit (after the orphan-reconciliation
#     follow-up gap lands).
#   - scripts/git-hooks/pre-commit-event-registry.sh blocks staged diffs
#     that add a kind literal without a corresponding registry entry.
#   - scripts/ci/event-registry-reserved.txt allow-lists kinds that are
#     legitimately exempt from both directions (with a required `# reason:`
#     comment per entry).
#
# Why: "observability before scale" needs mechanical enforcement. Without
# this registry, every contributor adds events with their own conventions
# and consumers silently fail on the unknown shapes.
#
# ── SCHEMA FIELD CANONICAL: 'kind' (INFRA-1159) ─────────────────────────────
# Two fields coexist in the ambient stream:
#   event: (legacy)  — written by scripts/dev/ambient-emit.sh before INFRA-1159.
#                       Still present (dual-write bridge) for backward compat.
#   kind:  (canonical) — the discriminator field this registry describes.
#                       Prefer 'kind' in ALL consumers and new emitters.
#
# Migration timeline: dual-write (event + kind) until INFRA-1159 consumers are
# fully migrated; remove 'event' field in a follow-up gap when all .event
# selectors are confirmed gone from scripts/ and src/.
# ─────────────────────────────────────────────────────────────────────────────
#
# Adding a new event:
#   1. Add an entry below with: kind, emitter, consumers, trigger, fields_required
#   2. Update the consumer code to parse the event
#   3. Stage your changes; pre-commit guard verifies the entry exists
#
# Schema:
#   kind:                (required) the literal string emitted in `"kind":"..."` JSON
#   emitter:             (required) source file or component that emits it
#   trigger:             (required) one-line description of when it fires
#   effect_metric:       (required since INFRA-1371) name of the metric that proves
#                          this event is doing its job. Use "self" when the emission
#                          count itself is the metric (most observability events).
#   consumers:           (recommended) list of downstream consumers
#   fields_required:     (recommended) list of fields the consumer expects
#   expected_min_per_day:(optional) int — if set, drift gate flags the kind as
#                          silent when fewer than this many events appear in 24h
#   docs:                (optional) link to a longer explanation
#   status:              (optional) "stable" / "deprecated" — default stable
#
# Bypass: CHUMP_EVENT_REGISTRY_CHECK=0 in commit env (with reason in
# commit body trailer "Event-Registry-Bypass: <text>"). Same discipline
# as --no-verify; sparingly.

schema_version: 2
last_audit: "2026-05-15"

events:

  # ── Fleet lifecycle ────────────────────────────────────────────────────────
  - kind: session_start
    effect_metric: self
    emitter: scripts/dev/ambient-emit.sh + claude SessionStart hook
    trigger: any chump session begins (fleet worker, operator, reaper)
    consumers: [fleet-brief, ambient-context-inject]

  - kind: session_end
    effect_metric: self
    emitter: claude Stop hook + worker.sh cycle_end
    trigger: session terminates (clean or timeout)
    consumers: [fleet-brief, kpi-report, waste-tally]
    fields_required: [ts, session_id, outcome, input_tokens, output_tokens]

  - kind: cycle_end
    effect_metric: self
    emitter: scripts/dispatch/worker.sh
    trigger: fleet worker finishes a cycle (claim+ship or empty pick)
    consumers: [fleet-brief]
    fields_required: [agent_id, gap_id, elapsed_s, rc, cycle_kind]

  - kind: fleet_starved
    effect_metric: fleet_auto_widen_applied_within_5min
    emitter: scripts/dispatch/worker.sh
    trigger: N consecutive empty picks (CHUMP_STARVE_THRESHOLD)
    consumers: [fleet-brief, watchdog]

  - kind: fleet_auto_widen_applied
    effect_metric: self
    emitter: src/main.rs (INFRA-615, chump fleet auto-widen --apply)
    trigger: operator runs auto-widen with --apply after starvation detected
    consumers: [fleet-brief, waste_tally]
    fields_required: [starve_count, effort, priority_filter]

  - kind: fleet_wedge
    effect_metric: self
    emitter: scripts/dispatch/worker.sh
    trigger: claude -p produced 0 stdout for full timeout window
    consumers: [waste-tally, watchdog]

  - kind: fleet_health
    effect_metric: self
    emitter: launchd / scripts/ops/fleet-health.sh
    trigger: periodic fleet metrics summary
    consumers: [fleet-brief]

  - kind: fleet_snapshot
    effect_metric: self
    emitter: scripts/ops/fleet-snapshot.sh
    trigger: scheduled fleet state capture
    consumers: [chump fleet status]

  - kind: fleet_queue_depth
    effect_metric: self
    emitter: picker / fleet status
    trigger: queue depth metric capture
    consumers: [fleet-brief]

  - kind: fleet_restore
    effect_metric: self
    emitter: scripts/dispatch/run-fleet.sh
    trigger: fleet restart event
    consumers: [audit-log]

  - kind: fleet_scale_request
    effect_metric: self
    emitter: operator or auto-scaler
    trigger: request to change fleet size
    consumers: [audit-log]

  - kind: fleet_version_skew
    effect_metric: self
    emitter: scripts/ops/fleet-version-check.sh
    trigger: workers running different chump binary versions
    consumers: [watchdog]

  - kind: fleet_pid_invariant
    effect_metric: self
    emitter: scripts/ops/fleet-audit-pids.sh
    trigger: PID/lease consistency check
    consumers: [watchdog]

  - kind: fleet_worker_silent
    effect_metric: self
    emitter: scripts/ops/fleet-worker-watchdog.sh (FLEET-042)
    trigger: worker heartbeat > N min stale
    consumers: [operator-recall]

  - kind: fleet_timeout_checkpoint
    effect_metric: self
    emitter: scripts/dispatch/worker.sh (INFRA-525)
    trigger: T-30s before claude -p timeout, WIP commit pushed
    consumers: [fleet-brief]

  - kind: wip_sigterm_checkpoint
    effect_metric: self
    emitter: scripts/dispatch/worker.sh (_sigterm_wip_checkpoint — INFRA-686)
    trigger: SIGTERM/SIGINT received mid-gap; WIP commit created before exit
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, agent_id, gap_id, branch]
  # ── FLEET-035: speculative race loss tracking ─────────────────────────────
  - kind: speculative_race_loss
    effect_metric: self
    emitter: scripts/coord/bot-merge.sh (FLEET-035, INFRA-193)
    trigger: a speculative loser PR is closed as superseded — gap was picked by
      two agents in parallel; one won and the other's PR is auto-closed
    consumers: [fleet-status --pane race-loss, waste-tally]
    fields_required: [ts, kind, session, gap_id, loser_pr, winner_pr, loser_branch]

  - kind: worker_exit
    effect_metric: self
    emitter: scripts/dispatch/worker.sh
    trigger: worker exits cycle (rc + classified exit_class)
    consumers: [waste-tally, kpi-report]
    fields_required: [agent_id, gap_id, rc, exit_class]

  # ── INFRA-740: tool-call normalizer ──────────────────────────────────────
  - kind: tool_normalize
    effect_metric: self
    emitter: src/tool_normalize.rs (INFRA-740)
    trigger: tool-call JSON argument was malformed on first parse; normalizer
      repaired it (trailing comma, missing brace, code fence, single quotes)
    consumers: [fleet-brief, waste_tally]
    fields_required: [ts, kind, session, tool, repair]

  - kind: cycle_stall_killed
    effect_metric: self
    emitter: scripts/dispatch/worker.sh (INFRA-705)
    trigger: no new output bytes for CHUMP_STALL_THRESHOLD_S (default 120s) during an active cycle
    consumers: [fleet-brief, waste_tally, watchdog]
    fields_required: [gap_id, agent_id, idle_s]

  - kind: worker_cooldown
    effect_metric: self
    emitter: scripts/dispatch/worker.sh (FLEET-051)
    trigger: single worker failure on a gap; per-worker cooldown written
    consumers: [fleet-brief]
    fields_required: [gap_id, worker_id, until, cooldown_kind]

  - kind: worker_cooldown_cluster_wide
    effect_metric: self
    emitter: scripts/dispatch/worker.sh (FLEET-051)
    trigger: distinct-worker failure count reaches FLEET_COOLDOWN_THRESHOLD (default 3)
    consumers: [fleet-brief, watchdog]
    fields_required: [gap_id, worker_count, until]

  - kind: worker_circuit_open
    effect_metric: self
    emitter: scripts/dispatch/worker.sh (FLEET-043)
    trigger: N consecutive dispatch failures, worker pauses
    consumers: [fleet-brief, watchdog]

  - kind: worker_stand_down
    effect_metric: self
    emitter: scripts/dispatch/worker.sh (INFRA-613)
    trigger: starvation threshold hit, worker exits cleanly
    consumers: [fleet-brief]

  - kind: worker_wedge_detected
    effect_metric: self
    emitter: scripts/dispatch/worker.sh (INFRA-823)
    trigger: claude -p produced near-empty log after timeout (rc=124 or rc=0 AND log < 100B)
    consumers: [fleet-brief, watchdog]
    fields_required: [agent_id, gap_id, rc, cycle_log_size, wedge_count]

  - kind: fleet_wedge_storm
    effect_metric: self
    emitter: scripts/dispatch/worker.sh (INFRA-823)
    trigger: N wedge events in rolling 1h window (CHUMP_WEDGE_STORM_THRESHOLD, default 5)
    consumers: [fleet-brief, watchdog]
    fields_required: [agent_id, recent_wedges, threshold, window_h]

  - kind: fleet_wedge_escalated
    effect_metric: self
    emitter: scripts/coord/fleet-wedge-handler.sh (INFRA-845)
    trigger: wedge persisted past CHUMP_WEDGE_ESCALATE_S (default 1800s) since wedge_start
    consumers: [fleet-brief, watchdog, oncall]
    fields_required: [ts, kind, wedge_age_s, threshold_s, handler]

  - kind: execution_timeout
    effect_metric: self
    emitter: src/blocker_detect.rs (chump fleet blocker-detect)
    trigger: subprocess or operation exceeded its timeout during blocking-operation detection
    consumers: [fleet-brief, watchdog]

  - kind: hang_detector
    effect_metric: self
    emitter: src/dispatch.rs (chump dispatch)
    trigger: subprocess hung past deadline; process details and name logged
    consumers: [fleet-brief, watchdog, operator-recall]

  - kind: claim_aborted_disk_full
    effect_metric: self
    emitter: scripts/lib/disk-check.sh via gap-claim.sh (INFRA-975)
    trigger: chump claim attempted but free disk < CHUMP_DISK_LOW_GB (default 5 GB)
    consumers: [fleet-brief, audit-log, watchdog]
    fields_required: [ts, kind, free_gb, threshold_gb, path]

  - kind: gap_claimed
    effect_metric: gap_shipped_within_deadline_for_same_id
    emitter: src/atomic_claim.rs run_claim (INFRA-1240)
    trigger: successful gap claim via the Rust atomic path (post-INFRA-987 shell deletion)
    consumers: [fleet-brief, silent_agent-watchdog, lease-overlap-watchdog]
    fields_required: [ts, kind, gap_id, session_id, worktree, paths]
    # INFRA-1240: mirrors the event previously emitted only by gap-claim.sh.
    # Without this, silent_agent and lease_overlap watchdogs missed Rust-path claims.

  - kind: chump_claim_force_recover
    effect_metric: self
    emitter: src/atomic_claim.rs emit_force_recover_event (INFRA-1439)
    trigger: chump claim --force-recover auto-removed a stale worktree dir and/or
      local branch before the atomic-claim step; actions field lists each recovery
      step taken (worktree_remove_force, rm_rf, branch_delete)
    consumers: [fleet-brief, waste-tally, audit-log]
    fields_required: [ts, kind, gap_id, branch, actions]

  - kind: gap_claim_nats_conflict
    effect_metric: self
    emitter: src/atomic_claim.rs nats_dual_write (INFRA-986)
    trigger: NATS KV CAS claim returned CONFLICT — another session on the
      fleet (possibly cross-machine) holds the atomic claim on this gap
    consumers: [fleet-brief, audit-log, watchdog]
    fields_required: [ts, kind, gap_id, session_id]

  - kind: curator_paused
    effect_metric: self
    emitter: scripts/coord/opus-curator.sh (META-065)
    trigger: operator set CHUMP_CURATOR_PAUSE=1 to short-circuit the
      curator run; logged so audit shows when mutations were disabled
      and for how long.
    consumers: [fleet-brief, audit-log]
    fields_required: [ts, kind, reason]

  - kind: curator_auto_exec_armed
    effect_metric: self
    emitter: scripts/coord/opus-curator.sh (META-065)
    trigger: first curator run after launchd install (sentinel absent at
      .chump-locks/curator-armed.sentinel) — captures the moment
      automated registry mutations went live for this operator.
    consumers: [fleet-brief, audit-log]
    fields_required: [ts, kind, note]
  - kind: planner_rank_ran
    effect_metric: self
    emitter: scripts/setup/install-chump-planner-launchd.sh --once (INFRA-1257)
    trigger: hourly launchd run wrote .chump-locks/gap-priority.json — fleet
      picker consumes this file (INFRA-1258) to pick best-scored gap.
    consumers: [picker, fleet-brief, audit-log]
    fields_required: [ts, kind, out_file]

  - kind: fleet_bootstrap_ran
    effect_metric: self
    emitter: scripts/setup/chump-fleet-bootstrap.sh (META-066)
    trigger: operator (or CI/pre-flight) ran the bootstrap orchestrator.
      Captures installed_count, skipped_healthy_count, failed_count,
      missing_at_check_count so the audit log shows when fleet-discipline
      was actually activated on this machine vs. just present-on-disk.
    consumers: [fleet-brief, audit-log, watchdog]
    fields_required: [ts, kind, mode, installed, skipped_healthy, failed, missing_count]

  - kind: picker_used_priority
    effect_metric: self
    emitter: scripts/dispatch/_pick_gap.py + _pick_and_claim_gap.py (INFRA-1258)
    trigger: picker successfully selected a gap from the planner-ranked list
      at .chump-locks/gap-priority.json. Includes file path, age, scored rank,
      and whether the layer gate filtered any candidates (layer_enforced).
    consumers: [fleet-brief, audit-log, kpi-report]
    fields_required: [ts, kind, gap_id, file, age_s, scored, layer_enforced, worker_id]

  - kind: picker_priority_stale
    effect_metric: self
    emitter: scripts/dispatch/_pick_gap.py (INFRA-1258)
    trigger: picker tried to load .chump-locks/gap-priority.json but it
      was absent / stale / invalid; picker fell back to legacy ordering.
      Surfacing the staleness so fleet-brief can alert when the planner
      launchd job has been down.
    consumers: [fleet-brief, audit-log, watchdog]
    fields_required: [ts, kind, reason, worker_id]

  - kind: rust_first_bypass_used
    effect_metric: self
    emitter: scripts/git-hooks/pre-commit-rust-first.sh (META-064)
    trigger: pre-commit gate matched Rust-first criteria on a new shell
      file but commit body had 'Rust-First-Bypass:' trailer — bypass
      logged for audit.
  - kind: rust_first_blocked
    effect_metric: self
    emitter: scripts/git-hooks/pre-commit-rust-first.sh (INFRA-1448)
    trigger: pre-commit gate matched Rust-first criteria on a new shell
      file AND no 'Rust-First-Bypass:' trailer was present — commit
      rejected. Fields. files=comma-separated paths, reasons=pipe-separated
      per-file reasons (hot-path|state-mutator|>200 LOC|long-lived).
    fields_required: [ts, kind, files, reasons]
    consumers: [fleet-brief, audit-log, META-064-effectiveness]
  - kind: redundancy_bypass_used
    effect_metric: self
    emitter: scripts/git-hooks/pre-commit-redundancy.sh (META-063)
    trigger: pre-commit gate detected high function-name overlap between
      a new shell file and an existing sibling, but commit body had
      'Redundancy-OK:' trailer — bypass logged for audit.
    consumers: [fleet-brief, audit-log]
    fields_required: [ts, kind, files, reason]

  - kind: fleet_paused_disk_critical
    effect_metric: self
    emitter: scripts/lib/disk-check.sh via worker.sh (INFRA-975)
    trigger: worker pre-cycle disk check found free < CHUMP_DISK_CRITICAL_GB (default 1 GB)
    consumers: [fleet-brief, audit-log, watchdog]
    fields_required: [ts, kind, free_gb, threshold_gb, path]

  - kind: fleet_wedge_resolved
    effect_metric: self
    emitter: scripts/coord/fleet-wedge-handler.sh (INFRA-845)
    trigger: no fleet_wedge events for CHUMP_WEDGE_CLEAR_S (default 1800s) while wedged=true
    consumers: [fleet-brief, watchdog]
    fields_required: [ts, kind, quiet_window_s, handler]

  - kind: slo_breach
    effect_metric: self
    emitter: scripts/coord/opus-curator.sh (INFRA-848 / INFRA-955)
    trigger: curator audit detected an SLO violation (chump health --slo-check non-zero)
    consumers: [fleet-brief, watchdog, waste-tally]
    fields_required: [ts, kind, severity, slo_name, detail]
    docs: |
      Edge-only emission per INFRA-955: fires when the active breach set
      CHANGES (transitions into breach or between different breach sets),
      not on every audit tick while in continuous breach. slo_name is a
      sorted comma-separated key of breached SLO identifiers (e.g.
      "L1-SLO-3,L2-SLO-4"). detail carries the full BREACH line(s) for
      forensic context.

  - kind: slo_recovered
    effect_metric: self
    emitter: scripts/coord/opus-curator.sh (INFRA-955)
    trigger: curator audit transitions from breach → healthy (pairs with slo_breach edge)
    consumers: [fleet-brief, audit-log]
    fields_required: [ts, kind, previously_breached, handler]

  - kind: fleet_scale_change
    effect_metric: self
    emitter: scripts/coord/fleet-wedge-handler.sh (INFRA-845) + manual scaling per CLAUDE.md
    trigger: fleet size adjusted up or down by handler or operator
    consumers: [fleet-brief, audit-log]
    fields_required: [ts, kind, from, to, rationale]

  - kind: fleet_restart
    effect_metric: self
    emitter: scripts/dispatch/run-fleet.sh (INFRA-844 --restart flag)
    trigger: operator runs run-fleet.sh --restart; existing fleet torn down and relaunched
    consumers: [fleet-brief, audit-log]
    fields_required: [ts, kind, from_size, to_size, reason]

  # ── FLEET-054: waste-spike auto-pause ─────────────────────────────────────
  - kind: waste_spike_detected
    effect_metric: self
    emitter: scripts/coord/waste-spike-detector.sh (FLEET-054)
    trigger: waste rate (total_incidents / total_events × 100) exceeded
      CHUMP_WASTE_SPIKE_THRESHOLD (default 30%) in the last CHUMP_WASTE_WINDOW
      (default 2h); fleet-paused sentinel created to halt new claims
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, rate, threshold, window, total_events, total_incidents]

  - kind: fleet_resumed
    effect_metric: self
    emitter: scripts/coord/waste-spike-detector.sh (FLEET-054)
    trigger: waste rate fell below CHUMP_WASTE_RECOVERY_THRESHOLD (default 20%)
      for two consecutive waste-spike-detector checks; fleet-paused sentinel
      removed and workers allowed to resume claiming
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, rate, recovery_threshold, window]

  - kind: worker_paused_waste_spike
    effect_metric: self
    emitter: scripts/dispatch/worker.sh (FLEET-054)
    trigger: worker found .chump/fleet-paused sentinel at the top of a claim
      cycle, indicating an active waste spike; worker sleeps before retrying
      instead of claiming a new gap
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, agent_id, pause_file]

  - kind: worker_paused_waste_spike_bypass
    effect_metric: self
    emitter: scripts/coord/waste-spike-detector.sh (FLEET-054)
    trigger: CHUMP_IGNORE_WASTE_PAUSE=1 was set; waste-spike check was bypassed
      and no fleet-paused sentinel was created or checked regardless of rate
    consumers: [fleet-brief, audit-log]
    fields_required: [ts, kind, session]

  - kind: pager_notified
    effect_metric: self
    emitter: scripts/coord/fleet-wedge-handler.sh (INFRA-845)
    trigger: CHUMP_PAGER_WEBHOOK set + escalation fires + POST attempted
    consumers: [audit-log]
    fields_required: [ts, kind, webhook, event]

  # ── Auth ───────────────────────────────────────────────────────────────────
  - kind: fleet_auth_storm
    effect_metric: self
    emitter: scripts/dispatch/worker.sh
    trigger: N consecutive auth failures
    consumers: [fleet-brief, watchdog]

  - kind: fleet_auth_mode
    effect_metric: self
    emitter: scripts/dispatch/run-fleet.sh
    trigger: auth path detected at fleet launch
    consumers: [fleet-brief]

  - kind: fleet_auth_verified
    effect_metric: self
    emitter: scripts/dispatch/run-fleet.sh (INFRA-621)
    trigger: launch-time auth probe succeeded
    consumers: [audit-log]

  - kind: fleet_auth_misconfigured
    effect_metric: self
    emitter: scripts/dispatch/run-fleet.sh (INFRA-621)
    trigger: launch-time auth probe failed
    consumers: [operator-recall, audit-log]

  - kind: fleet_auth_refresh
    effect_metric: self
    emitter: scripts/dispatch/worker.sh refresh_oauth_token
    trigger: OAUTH token refreshed mid-cycle
    consumers: [audit-log]

  - kind: fleet_auth_unrecoverable
    effect_metric: self
    emitter: scripts/dispatch/worker.sh
    trigger: auth failed beyond circuit-breaker threshold
    consumers: [operator-recall, fleet-brief]

  - kind: fleet_oauth_token_refreshed
    effect_metric: self
    emitter: scripts/dispatch/worker.sh
    trigger: oauth token file re-read with new value
    consumers: [audit-log]

  - kind: credential_scrub_run
    effect_metric: self
    emitter: scripts/coord/scrub-credential-logs.sh (INFRA-871)
    trigger: scrubber invoked with --report; summary of any leaks found
    consumers: [audit-log, ci-gate]
    fields_required: [ts, kind, summary]
    docs: |
      summary is a JSON object with {total_hits, by_path_kind}.
      Emitted only when --report flag passed (CI gates pass --report;
      bare invocations stay quiet to avoid noise).

  - kind: fleet_auto_restart_decision
    effect_metric: self
    emitter: scripts/dispatch/fleet-autorestart-daemon.sh (INFRA-611)
    trigger: daemon decides to restart fleet
    consumers: [audit-log, fleet-brief]

  - kind: fleet_auto_restart_cancel
    effect_metric: self
    emitter: scripts/dispatch/fleet-autorestart-daemon.sh
    trigger: pending restart canceled
    consumers: [audit-log]

  - kind: fleet_auto_restart
    effect_metric: self
    emitter: scripts/dispatch/fleet-autorestart-daemon.sh
    trigger: fleet auto-restart actually executed (follows fleet_auto_restart_decision)
    consumers: [audit-log, fleet-brief]

  - kind: fleet_restart_snapshot
    effect_metric: self
    emitter: src/main.rs (chump fleet restart-snapshot)
    trigger: fleet state snapshot recorded before a coordinated restart
    consumers: [audit-log]

  # ── Reapers / cleanup daemons ──────────────────────────────────────────────
  - kind: reaper_run
    effect_metric: self
    emitter: scripts/ops/stale-*-reaper.sh
    trigger: reaper completes a sweep
    consumers: [reaper-watchdog]
    fields_required: [reaper_name, status]

  - kind: reaper_silent
    effect_metric: self
    emitter: scripts/ops/reaper-heartbeat-watchdog.sh (INFRA-120)
    trigger: reaper missed expected cadence
    consumers: [fleet-brief, operator-recall]

  - kind: stale_gap_lock_reaped
    effect_metric: self
    emitter: scripts/ops/stale-gap-lock-reaper.sh (INFRA-676)
    trigger: zombie gap-lock removed
    consumers: [fleet-brief]
    fields_required: [lock, session]

  - kind: target_artifact_reaped
    effect_metric: self
    emitter: scripts/coord/target-dir-reaper.sh (INFRA-1349)
    trigger: cargo target/ directory deleted from idle worktree under disk pressure;
      normal mode (idle threshold respected)
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, path, freed_gb, worktree_age_h]

  - kind: target_artifact_critical_reap
    effect_metric: self
    emitter: scripts/coord/target-dir-reaper.sh (INFRA-1431)
    trigger: cargo target/ directory deleted in critical-pressure mode (free disk <
      CHUMP_REAPER_CRITICAL_GB); idle threshold bypassed; active lease still protected
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, path, freed_gb, worktree_age_h]

  - kind: stale_bot_merge_killed
    effect_metric: self
    emitter: scripts/ops/stale-bot-merge-reaper.sh (INFRA-673)
    trigger: bot-merge.sh process > 1h killed
    consumers: [fleet-brief]
