      requested = gap.required_model or '' if not set.
      actual = FLEET_MODEL after all overrides.

  # ── INFRA-906: per-gap performance profiling ──────────────────────────────
  - kind: gap_perf_sample
    emitter: scripts/ci/emit-gap-timing.sh (INFRA-906)
    trigger: emitted by emit-gap-timing.sh wrapper after any timed CI phase
      completes; records wall-clock duration and exit code for p50/p95 analysis
    consumers: [fleet-brief, gap-perf-report]
    fields_required: [ts, kind, gap_id, phase, duration_ms, exit_code, host]
    docs: |
      phase values: lint, test, build, e2e (or any custom label)
      duration_ms: wall-clock milliseconds for the wrapped command
      exit_code: exit status of the wrapped command (0 = success)
      host: short hostname for cross-machine comparison
      Consumers: scripts/ops/gap-perf-report.sh computes p50/p95 per (gap_id,phase)

  # ── INFRA-879: credential lifecycle ───────────────────────────────────────
  - kind: credential_rotation_due
    emitter: scripts/ops/credential-lifecycle.sh (INFRA-879)
    trigger: a tracked credential (ANTHROPIC_API_KEY, GH_TOKEN) has exceeded the
      rotation policy age (CHUMP_CRED_MAX_AGE_DAYS, default 90d); emitted once
      per over-age credential per invocation of credential-lifecycle.sh
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, cred_name, age_days, max_age_days]

  # ── INFRA-895: manual gap run-now trigger ─────────────────────────────────
  - kind: gap_run_now_triggered
    emitter: scripts/ops/gap-run-now.sh (INFRA-895)
    trigger: operator manually invoked gap-run-now.sh to dispatch a gap outside
      the normal scheduler cycle; emitted before worker invocation (or instead
      of it in --dry-run mode)
    consumers: [fleet-brief, audit-log]
    fields_required: [ts, kind, gap_id, model, timeout_s, dry_run]

  - kind: worker_timeout_no_commit
    emitter: scripts/dispatch/worker.sh (INFRA-831)
    trigger: FLEET_TIMEOUT_S expired (rc=124) and claude produced no git commit
      during the cycle; worker attempted a WIP rescue commit via chump-commit.sh
      before releasing the lease. rescue_committed=1 means the rescue succeeded.
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, agent_id, gap_id, timeout_s, rescue_committed]

  - kind: worker_first_output_timeout
    emitter: scripts/dispatch/worker.sh (INFRA-828)
    trigger: claude subprocess produced no stdout within CHUMP_FIRST_OUTPUT_TIMEOUT_S
      (default 120s) and all retries (CHUMP_RETRY_TIMEOUT_S, max 2) were also
      timed out — worker killed subprocess and is moving to next cycle
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, agent_id, gap_id, elapsed_s, retries]

  # ── INFRA-765: stacked PR auto-rebase ─────────────────────────────────────
  - kind: stacked_pr_rebase_scan
    emitter: scripts/coord/rebase-stacked-prs.sh (INFRA-765)
    trigger: base PR merged — rebase-stacked-prs.sh scanned for open PRs with
      base=merged_branch. stacked_count=0 means no stacked PRs found.
    consumers: [fleet-brief]
    fields_required: [ts, kind, merged_branch, stacked_count]

  - kind: stacked_pr_rebased
    emitter: scripts/coord/rebase-stacked-prs.sh (INFRA-765)
    trigger: a PR stacked on a just-merged base branch was rebased onto
      origin/main and auto-merge was re-armed. status=ok or status=failed.
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, merged_branch, stacked_pr, stacked_branch, status]

  # ── INFRA-539: gh API probe ────────────────────────────────────────────────
  - kind: github_unreachable
    emitter: scripts/coord/bot-merge.sh, scripts/dispatch/run-fleet.sh (INFRA-539, CREDIBLE-032)
    trigger: gh installed but api /rate_limit probe fails; backward-compat alias emitted
      alongside gh_errored — consumers may watch either kind
    consumers: [fleet-brief, operator-recall, watchdogs]
    fields_required: [ts, kind, source, exit_code, note]

  # ── CREDIBLE-032: gh failure-class taxonomy ───────────────────────────────
  - kind: gh_missing
    emitter: scripts/coord/bot-merge.sh, scripts/dispatch/run-fleet.sh (CREDIBLE-032)
    trigger: gh CLI binary not found in PATH at probe time
    consumers: [fleet-brief, watchdogs]
    fields_required: [ts, kind, source, note]

  - kind: gh_errored
    emitter: scripts/coord/bot-merge.sh, scripts/dispatch/run-fleet.sh (CREDIBLE-032)
    trigger: gh binary present but api /rate_limit call failed (auth error, rate-limit,
      network timeout, or any non-zero exit)
    consumers: [fleet-brief, operator-recall, watchdogs]
    fields_required: [ts, kind, source, exit_code, note]

  # ── INFRA-999: per-call GitHub API cost telemetry ─────────────────────────
  - kind: github_api_call
    emitter: scripts/coord/lib/github.sh (chump_gh, chump_gh_record)
    trigger: any wrapped gh invocation. Records script name, 1-2 token api tag,
      remaining_core + remaining_graphql at time of call, elapsed ms, rc.
      Used to rank which scripts burn which rate-limit bucket (INFRA-1000).
    consumers: [api-cost-report]
    fields_required: [ts, kind, script, api, remaining_core, remaining_graphql, used_ms, rc]

  # ── INFRA-995: pre-push staleness gate ────────────────────────────────────
  - kind: stale_branch_blocked
    emitter: scripts/coord/bot-merge.sh (INFRA-995); src/main.rs chump gap ship (INFRA-1007)
    trigger: branch is >threshold (default 15) commits behind origin/main. phase=pre-push
      from bot-merge.sh; phase=gap-ship from the Rust manual-ship path.
    consumers: [waste-tally, fleet-brief]
    fields_required: [ts, kind, branch, behind, threshold, phase]

  # ── INFRA-1042: doc-only fast-path attribution ─────────────────────────────
  - kind: bot_merge_doc_only_fastpath
    emitter: scripts/coord/bot-merge.sh (INFRA-1042, builds on INFRA-920)
    trigger: bot-merge auto-detects shell/doc-only diff (no .rs files) and skips
      cargo test + cargo clippy entirely. Each emission represents ~2-3 min saved
      vs the full pipeline (DOC-036 baseline 2m36s clippy for 1-line README).
    consumers: [waste-tally, fleet-brief]
    fields_required: [ts, kind, branch, files_changed, saved_steps]

  # ── META-059: gap-closure drift detector ──────────────────────────────────
  - kind: gap_closure_drift
    emitter: scripts/coord/gap-doctor-reconcile.py --check-closure-drift (META-059)
    trigger: open gap has closed_pr set AND that PR is state=merged — the
      "OPEN-BUT-LANDED" antipattern bot-merge.sh:243 warns about but doesn't
      catch on its own. Surfaces silent auto-close failures.
    consumers: [fleet-brief, operator-recall, audit-priorities]
    fields_required: [ts, kind, gap_id, pr_number, merged_at, source]
  # ── INFRA-1040: graphql exhaustion fleet-wide signal ──────────────────────
  - kind: graphql_exhausted
    emitter: scripts/coord/lib/github.sh (INFRA-1040, piggyback on every chump_gh call)
    trigger: GitHub GraphQL bucket remaining_graphql <= CHUMP_GH_EXHAUSTED_THRESHOLD
      (default 100). Debounced to once per reset window via
      .chump-locks/.graphql-exhausted-since. Lets every fleet agent pivot to
      REST-only paths (INFRA-1016 / `--rest-only`) without each having to
      discover exhaustion by hitting its own failed gh call first.
    consumers: [chump-ambient-glance, fleet-brief, operator-recall]
    fields_required: [ts, kind, threshold_seen, resets_at, source]

  # ── INFRA-1034: bot-merge per-PID log discoverability ─────────────────────
  - kind: bot_merge_log_started
    emitter: scripts/coord/bot-merge.sh (INFRA-1034)
    trigger: bot-merge.sh sets up tee redirection to .chump-locks/bot-merge-<pid>.log.
      One emit per script invocation; lets operator-recall / chump-ambient-glance
      surface "bot-merge currently running, tail -f <path>" without scanning ps.
    consumers: [chump-ambient-glance, fleet-brief, operator-recall]
    fields_required: [ts, kind, pid, log_path, branch]

  # ── INFRA-1079: chump_gh secondary rate-limit self-throttle ──────────────
  - kind: gh_self_throttled
    emitter: scripts/coord/lib/github.sh chump_gh (INFRA-1079, INFRA-1112)
    trigger: class-specific token-bucket window detected >= cap calls in the last
      60s. INFRA-1112 splits into mutation bucket (CHUMP_GH_MUTATION_MAX=15/min)
      and query bucket (CHUMP_GH_QUERY_MAX=60/min). chump_gh sleeps 1s and retries;
      after 30s of waiting (fail-safe) it lets the call through with fail_safe=true
      so the fleet does not deadlock on a stuck counter. Each delay emits one event.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, script, api_class, waited_ms, calls_in_window]
  # ── INFRA-1077: daily API cost leaderboard digest ─────────────────────────
  - kind: api_cost_digest_emitted
    emitter: scripts/dev/api-cost-leaderboard.sh --emit-ambient (INFRA-1077)
    trigger: launchd com.chump.api-cost-digest daily at 09:00 local — analyzes
      24h of kind=github_api_call events (INFRA-999 telemetry), emits a single
      digest with top burner identified. Lets fleet-brief surface "today's top
      script + api" without re-scanning ambient on every consumer call.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, window_hours, total_calls, top_script, top_api, total_estimated_points]

  # ── INFRA-1080: chump_gh pre-emptive backoff for low-GraphQL background calls
  - kind: gh_preempted
    emitter: scripts/coord/lib/github.sh chump_gh (INFRA-1080)
    trigger: a background call (CHUMP_GH_CALL_CRITICALITY=background) hit
      chump_gh when remaining_graphql is below CHUMP_GH_BACKOFF_THRESHOLD %
      of the limit (default 10 %). The helper sleeps min(60s, time_to_reset)
      then re-checks. Critical calls are never preempted. Logs before / after
      remaining-percent so consumers see how much the wait helped.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, script, api, waited_s, remaining_percent_before, remaining_percent_after]

  # ── INFRA-1115: a2a mailbox primitive ─────────────────────────────────────
  - kind: inbox_advance
    emitter: scripts/coord/chump-inbox.sh (INFRA-1115)
    trigger: a session ran `chump-inbox.sh read` and the cursor was advanced
      past one or more new messages. Emitted once per read; the count tells
      auditors how many messages the recipient consumed in this read.
    consumers: [fleet-brief, operator-recall, waste-tally]
    fields_required: [ts, kind, session, messages_read, new_offset]

  - kind: inbox_archived
    emitter: scripts/coord/inbox-reap.sh (INFRA-1115)
    trigger: reaper detected a dead session (lease expired past grace
      window) with an unread inbox. The inbox was gzip-archived to
      .chump-locks/inbox-archive/<session>/<yyyy-mm>.jsonl.gz and the live
      inbox file deleted. Operator-recall surfaces this in case the
      original recipient's work was time-sensitive.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, session, unread_messages, archive]

  # ── INFRA-1117: chump pr nudge auto-diagnosis + structured comment ────────
  - kind: pr_nudged
    emitter: scripts/coord/chump-pr-nudge.sh (INFRA-1117)
    trigger: scripts/coord/chump-pr-nudge.sh classified a stuck PR
      (dirty / blocked-ci / orphan-disarmed / base-modified / clean-not-merged),
      rendered the matching template, and posted a structured comment via
      REST. Cooldown: same (pr,sha,class) within
      CHUMP_NUDGE_COOLDOWN_HOURS (default 24h) skipped with NOTE.
    consumers: [fleet-brief, operator-recall, waste-tally]
    fields_required: [ts, kind, pr, sha, class]

  # ── INFRA-1116: INTENT-overlap gate at claim time ─────────────────────────
  - kind: intent_overlap_detected
    emitter: scripts/coord/intent-overlap-check.sh (INFRA-1116)
    trigger: gap-preflight detected another live session's INTENT with
      overlapping path scope to the claiming session's CHUMP_CLAIM_PATHS.
      Preflight refuses with exit 14; operator coordinates or sets
      CHUMP_CLAIM_FORCE_OVERLAP=1 with a reason. Surfaces silent claim
      races (INFRA-779 family) that would otherwise produce concurrent
      shipping of the same gap.
    consumers: [fleet-brief, operator-recall, waste-tally]
    fields_required: [ts, kind, session, gap, my_paths, conflicting]

  - kind: intent_overlap_overridden
    emitter: scripts/coord/intent-overlap-check.sh (INFRA-1116)
    trigger: caller set CHUMP_CLAIM_FORCE_OVERLAP=1 to bypass an
      overlap-detected refusal. CHUMP_CLAIM_OVERRIDE_REASON='<text>' is
      recorded for audit. Operator-recall surfaces these so repeat-bypass
      patterns are visible.
    consumers: [fleet-brief, operator-recall, audit-priorities]
    fields_required: [ts, kind, session, gap, paths, reason]

  # ── INFRA-1081: GitHub webhook cache ─────────────────────────────────────
  - kind: webhook_event_received
    emitter: scripts/ops/github-webhook-receiver.py (INFRA-1081)
    trigger: a validated GitHub webhook (HMAC-SHA256 pass) was processed.
      Receiver upserts pr_state in .chump/github_cache.db. Consumers
      (queue-driver, etc.) read from cache instead of polling.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, event_type, action, pr_number]

  - kind: webhook_event_rejected
    emitter: scripts/ops/github-webhook-receiver.py (INFRA-1081)
    trigger: webhook delivery failed HMAC-SHA256 validation or arrived
      malformed. Receiver returned 401/400. Either operator's secret is wrong,
      smee/webhook misconfigured, or an unauthorized POST hit the local port.
    consumers: [fleet-brief, operator-recall, watchdogs]
    fields_required: [ts, kind, reason, source_ip]

  - kind: cache_drift
    emitter: scripts/ops/github-cache-reconcile.sh (INFRA-1081)
    trigger: periodic reconcile (every 5 min) found a pr_state row whose
      columns differ from a single gh api pulls?state=open call. Catches
      missed webhook deliveries.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, pr_number, columns]

  - kind: cache_miss
    emitter: scripts/coord/lib/github_cache.sh cache_lookup_pr (INFRA-1081)
    trigger: a consumer asked for a PR row that's stale by TTL
      (CHUMP_CACHE_TTL_S default 60s). cache_lookup falls back to one REST
      api call, writes the result back, returns the fresh row.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, pr_number, age_s, ttl_s]

  - kind: cache_warmed
    emitter: scripts/ops/github-cache-reconcile.sh (INFRA-1106)
    trigger: reconcile detected pr_state rows with empty mergeable_state (the
      bulk /pulls?state=open list omits it; GitHub computes asynchronously).
      Did a bounded per-PR REST fetch (max CHUMP_CACHE_RECONCILE_MAX_FETCH=20
      per cycle) and filled the column. One event per warmed row.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, pr_number, mergeable_state]
    fields_required: [ts, kind, script, api_class, waited_ms, calls_in_window]

  - kind: check_runs_warmed
    emitter: scripts/ops/github-cache-reconcile.sh (INFRA-1129)
    trigger: reconcile detected pr_state rows whose head_sha had no check_runs
      entries (cold start — webhook not yet fired). Did a bounded per-SHA REST
      fetch (GET /commits/<sha>/check-runs, max CHUMP_CACHE_RECONCILE_MAX_FETCH=20
      per cycle) and inserted rows into the check_runs table. One event per
      backfilled SHA.
    consumers: [fleet-brief, operator-recall, bot-merge]
    fields_required: [ts, kind, head_sha, count]

  # ── INFRA-1065: chump binary auto-refresh ────────────────────────────────
  - kind: chump_binary_refreshed
    emitter: scripts/ops/refresh-chump-binary.sh (INFRA-1065)
    trigger: hourly LaunchAgent detected origin/main has gap-store-affecting
      commits ahead of ~/.cargo/bin/chump's baked SHA; ran cargo install --path
      and the rebuild succeeded. Removes the daily friction of needing
      CHUMP_ALLOW_STALE_DESTRUCTIVE=1 on every gap-mutation call.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, baked_sha_before, commits_ahead, elapsed_s]

  - kind: chump_binary_refresh_failed
    emitter: scripts/ops/refresh-chump-binary.sh (INFRA-1065)
    trigger: cargo install --path . --bin chump --force exited non-zero. Operator
      action needed — INFRA-825 staleness warnings will continue until the next
      successful refresh.
    consumers: [fleet-brief, operator-recall, watchdogs]
    fields_required: [ts, kind, baked_sha, commits_ahead, elapsed_s, rc]

  # ── INFRA-847: fleet-state.json mutex ─────────────────────────────────────
  - kind: fleet_state_lock_timeout
    emitter: scripts/coord/emergency-fast-path.sh, scripts/dispatch/opus-curator.sh (INFRA-847)
    trigger: flock(1) wait on fleet-state.lock exceeded CHUMP_FLEET_STATE_LOCK_TIMEOUT_S
      (default 5s); script proceeds without lock (fail-open) to avoid deadlock
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, source, timeout_s, note]

  - kind: curator_decision
    emitter: scripts/coord/opus-curator.sh (INFRA-848)
    trigger: curator completed a proactive health audit cycle and made a decision
      (p0_demotion, gap_ac_filled, gap_filed, pr_unstick, waste_investigation,
      or balance_restock). Emitted once per decision made.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, decision_type, reasoning, action_taken]

  - kind: change_approved
    emitter: scripts/ops/change-approval.sh (INFRA-912)
    trigger: operator approves a high-risk fleet change (scale-up, model-override,
      routing-yaml-edit); approval token written to .chump-locks/change-approvals/
    consumers: [operator-recall, audit-log]
    fields_required: [ts, kind, change_id, approver, rationale]

  - kind: change_rolled_back
    emitter: scripts/ops/change-approval.sh (INFRA-912)
    trigger: operator reverts a fleet change; fleet-state.json restored from
      pre-change snapshot in .chump-locks/fleet-state-snapshots/
    consumers: [operator-recall, audit-log]
    fields_required: [ts, kind, change_id, snapshot]

  - kind: fleet_metrics_snapshot
    emitter: scripts/ops/fleet-metrics-snapshot.sh (INFRA-900)
    trigger: operator runs fleet metrics snapshot (manually or via cron); reads
      ambient.jsonl + state.db to compute ship_rate, waste_rate, cycle_time_p50,
      active_gaps, p0_count
    consumers: [fleet-brief, kpi-report, opus-curator]
    fields_required: [ts, kind, ship_rate_24h, waste_rate_24h, cycle_time_p50_h, active_gaps, p0_count]
  - kind: cascade_near_cap
    emitter: scripts/ops/obs-alerting.sh (INFRA-679)
    trigger: ≥3 provider cascade slots have consumed >80% of their daily RPD limit;
      routed to ambient.jsonl and CHUMP_ALERT_WEBHOOK if set
    consumers: [operator-recall, watchdog]
    fields_required: [ts, kind, near_cap_slots, detail, threshold_pct]

  - kind: cost_budget_breach
    emitter: scripts/ops/obs-alerting.sh (INFRA-679)
    trigger: daily Anthropic spend exceeds CHUMP_DAILY_COST_CAP_USD (or the budget_usd
      field in .chump/daily-cost.json); routed to ambient.jsonl and CHUMP_ALERT_WEBHOOK
    consumers: [operator-recall, watchdog]
    fields_required: [ts, kind, spent_usd, cap_usd, pct]

  # ── RESILIENT-001: stale binary detection ────────────────────────────────
  - kind: stale_binary_detected
    emitter: scripts/dispatch/worker.sh (RESILIENT-001)
    trigger: worker startup detects target/debug/chump mtime > CHUMP_BINARY_MAX_AGE_SECS behind src/main.rs
    consumers: [fleet-brief, watchdog]
    fields_required: [ts, kind, source, age_secs, max_age_secs, note]

  # ── Disk hygiene ─────────────────────────────────────────────────────────
  - kind: tmp_cleanup
    emitter: scripts/dev/cleanup-claude-tmp.sh
    trigger: daily launchd job (04:00) or manual run; prunes stale /private/tmp/claude-*/ dirs
    consumers: [fleet-brief, opus-curator]
    fields_required: [ts, session, kind, dirs_pruned, files_removed, bytes_freed]

  - kind: gap_rollback_executed
    emitter: scripts/ops/rollback-gap.sh (INFRA-899)
    trigger: operator (or curator) rolls back a stalled/failed gap; lease released,
      worktree removed, branch deleted, gap status reset to open
    consumers: [fleet-brief, operator-recall, opus-curator]
    fields_required: [ts, kind, gap_id, worktree_removed, branch_deleted, lease_released]

  # ── INFRA-634: cross-repo fleet startup ──────────────────────────────────
  - kind: fleet_cross_repo_start
    emitter: scripts/dispatch/run-fleet.sh (INFRA-634)
    trigger: run-fleet.sh launched with --repo, --locks-dir, or --tmux-session
      override flags targeting a non-Chump repo
    consumers: [fleet-brief, fleet-status, opus-curator]
    fields_required: [ts, kind, repo, locks_dir, session]

  # ── Cognition-stack A/B experiment (META-045) ───────────────────────────────
  - kind: cognition_ab_run_start
    emitter: scripts/experiments/cognition-ab-setup.sh
    trigger: one cell of the cognition-stack A/B experiment is launched; records cell config
    consumers: [cognition-ab-report]
    fields_required: [ts, kind, cell, run_tag, lessons_at_spawn_n, embedding_enabled, fleet_size]

  - kind: cognition_ab_comparison
    emitter: scripts/experiments/cognition-ab-report.sh
    trigger: comparison report generated after both cells have run; points to source log files
    consumers: [kpi-report, meta-retrospective]
    fields_required: [ts, kind, log_a, log_b, run_tag]

  # ── RESILIENT-010/RESILIENT-011: bot-merge.sh step-specific failure events ──
  - kind: bot_merge_phase_failure
    emitter: scripts/coord/bot-merge.sh (_bm_fail helper, RESILIENT-011)
    trigger: any named phase in bot-merge.sh fails; emitted immediately before
      the script exits with the step-specific exit code (10=preflight, 11=rebase,
      12=fmt, 13=clippy, 14=test, 15=push, 16=pr-create)
    consumers: [fleet-brief, opus-curator, emergency-fast-path, recovery-automation]
    fields_required: [ts, kind, step, exit_code, gap_id, branch]
  - kind: bot_merge_crashed
    emitter: scripts/coord/bot-merge.sh (_bm_cleanup trap, INFRA-1035)
    trigger: bot-merge exits with an open step transition (SIGTERM, OOM, or
      set-e failure) — the step's stage_start had no matching stage_done
    consumers: [fleet-brief, emergency-fast-path]
    fields_required: [ts, kind, step, pid, steps_file]
  # ── Gap store curation ───────────────────────────────────────────────────
  - kind: gap_store_curated
    emitter: scripts/ops/gap-curate.sh
    trigger: nightly curation run (04:00 local) completes rebalance + consolidate + retention-sweep
    consumers: [fleet-brief, opus-curator, kpi-report]
    fields_required: [ts, kind, session, rebalanced, consolidated, retained, errors]
    trigger: operator runs fleet metrics snapshot; reads ambient.jsonl + state.db
      to compute ship_rate, waste_rate, cycle_time_p50, active_gaps, p0_count
    consumers: [fleet-brief, kpi-report, opus-curator, velocity-trending.sh]
    fields_required: [ts, kind, ship_rate_24h, waste_rate_24h, cycle_time_p50_h, active_gaps, p0_count]

  - kind: velocity_trend_computed
    emitter: scripts/ops/velocity-trending.sh (INFRA-901)
    trigger: operator runs velocity-trending.sh to analyse fleet ship_rate and
      waste_rate trends over the last N days; compares last 3d vs prior 4d to
      classify trend as improving, stable, or degrading
    consumers: [fleet-brief, opus-curator, kpi-report]
    fields_required: [ts, kind, window_days, ship_rate_7d, waste_rate_7d, trend, days_sampled]
  - kind: cost_quota_warning
    emitter: src/cost_ledger.rs (INFRA-877)
    trigger: daily spend reaches 80% of CHUMP_DAILY_BUDGET_USD; emitted before
      each new claude -p spawn when the warning threshold is breached
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, gap_id, model, cost_so_far_usd, limit_usd, budget_used_pct]

  - kind: cost_quota_exceeded
    emitter: src/cost_ledger.rs (INFRA-877)
    trigger: daily spend reaches 100% of CHUMP_DAILY_BUDGET_USD; new spawns are
      hard-capped until UTC midnight reset
    consumers: [fleet-brief, operator-recall, emergency-fast-path]
    fields_required: [ts, kind, gap_id, model, cost_so_far_usd, limit_usd, budget_used_pct]

  # ── INFRA-890: network availability events ───────────────────────────────
  - kind: network_unavailable
    emitter: scripts/ops/net-probe.sh
    trigger: api.anthropic.com unreachable after CHUMP_NET_PROBE_RETRIES attempts
      (default 3, 2s apart); fleet should pause dispatch until resolved
    consumers: [fleet-brief, opus-curator, emergency-fast-path]
    fields_required: [ts, kind, session, host, retries]

  - kind: network_restored
    emitter: scripts/ops/net-probe.sh
    trigger: api.anthropic.com reachable again after a prior network_unavailable
      event; emitted exactly once on restoration
    consumers: [fleet-brief, opus-curator]
    fields_required: [ts, kind, session, host]
  # ── FLEET-048: Operator impact ratings ───────────────────────────────────
  - kind: gap_impact_rated
    emitter: src/main.rs (FLEET-048, chump gap rate)
    trigger: operator rates a shipped gap 1-5 via 'chump gap rate <ID> <1-5>'
    consumers: [kpi-report --impact]
    fields_required: [ts, kind, gap_id, rating, comment, pr_number]
  - kind: gap_abandoned
    emitter: scripts/ops/gap-lifecycle-manager.sh (INFRA-870)
    trigger: gap has been open for more than CHUMP_LIFECYCLE_DAYS (default 90)
      without any commit activity; emitted once per stale gap per run
    consumers: [fleet-brief, operator-recall, opus-curator]
    fields_required: [ts, kind, gap_id, age_days, title]
  - kind: worktree_contaminated
    emitter: scripts/ops/worktree-contamination-check.sh (INFRA-931)
    trigger: untracked files from a foreign gap-claim branch detected in the
      current worktree (docs/gaps/*.yaml or scripts/ paths belonging to another
      active gap session)
    consumers: [fleet-brief, operator-recall, opus-curator]
    fields_required: [ts, kind, gap_id, worktree_path, contaminated_count, example_file]


  # ── Test fixtures (synthetic kinds for unit-test scaffolding only) ────────
  - kind: obs_coverage_test_fixture
    emitter: scripts/ci/test-obs-coverage-guard.sh
    trigger: synthetic event written by INFRA-757 test fixture; never emitted
      by production code paths
    consumers: []
    status: test-fixture

  # ── INFRA-827: stale worktree pruner ─────────────────────────────────────
  - kind: worktree_pruned
    emitter: src/main.rs (chump fleet prune-worktrees --apply, INFRA-827)
    trigger: a linked worktree was removed because it was older than CHUMP_WT_MAX_AGE_H
      (default 48h) and its branch had no open GitHub PR and no uncommitted changes
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, path, branch, age_h]

  - kind: worktree_prune_summary
    emitter: src/main.rs (chump fleet prune-worktrees --apply, INFRA-827)
    trigger: emitted once per prune-worktrees --apply run summarising total
      pruned and skipped counts
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, pruned, skipped_active_pr, skipped_uncommitted, skipped_young]

  # ── RESILIENT-013: orphaned /tmp worktree reaper ─────────────────────────
  - kind: worktree_orphan_pruned
    emitter: scripts/ops/prune-worktrees.sh (RESILIENT-013, orphan mode)
    trigger: a /tmp/chump-* worktree had no active lease in .chump-locks/
      AND no open PR for its branch — safely removed
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, path, branch]

  - kind: worktree_orphan_skipped
    emitter: scripts/ops/prune-worktrees.sh (RESILIENT-013, orphan mode)
    trigger: a /tmp/chump-* worktree was skipped because it had an active lease,
      an open PR, or uncommitted changes
    consumers: [fleet-brief]
    fields_required: [ts, kind, path, reason, branch]

  - kind: worktree_reaper_skipped_active
    emitter: scripts/ops/stale-worktree-reaper.sh (_emit_reaper_skipped, INFRA-1074)
    trigger: stale-worktree-reaper skips a worktree because an active lease
      (heartbeat_at within 15 min) or fresh .git/index mtime (within 5 min)
      indicates in-flight work — reaping would destroy uncommitted work
    consumers: [fleet-brief, emergency-fast-path]
    fields_required: [ts, kind, worktree, reason]

  # ── CREDIBLE-038: file-count-blast rule ──────────────────────────────────
  - kind: pr_scope_violation
    emitter: scripts/ci/check-mass-deletion.sh (CREDIBLE-038, rule C)
    trigger: PR title prefix (chore(gaps): or docs:) promises narrow scope
      but the diff includes files outside the expected directory for that prefix
    consumers: [fleet-brief, curator]
    fields_required: [ts, kind, rule, title_prefix, out_of_scope_count]

  # ── CREDIBLE-041: no-bundle-PR detector ──────────────────────────────────
  - kind: pr_bundle_blocked
    emitter: scripts/ci/check-pr-scope.sh (CREDIBLE-041, Rule C)
    trigger: PR title lists multiple gap IDs (e.g. INFRA-1,INFRA-2) that are
      not depends_on-linked in .chump/state.db — indicates bundled unrelated gaps
    consumers: [fleet-brief, curator]
    fields_required: [ts, kind, gap_ids, depends_on_check_result, branch]

  # ── INFRA-944: gap dep-clean ──────────────────────────────────────────────
  - kind: dep_cleaned
    emitter: src/main.rs (chump gap dep-clean --apply, INFRA-944)
    trigger: a stale depends_on entry pointing at a done gap was stripped
    consumers: [fleet-brief]
    fields_required: [ts, kind, gap_id, stripped_deps]

  # ── CREDIBLE-048: per-gate fire-rate telemetry ───────────────────────────
  - kind: gate_check_start
    emitter: scripts/ci/lib/gate-emit.sh (sourced by each CI gate — CREDIBLE-048)
    trigger: any CI gate begins execution
    consumers: [gate-fire-rate, fleet-brief]
    fields_required: [ts, kind, gate, pr_or_branch, args]

  - kind: gate_check_result
    emitter: scripts/ci/lib/gate-emit.sh (sourced by each CI gate — CREDIBLE-048)
    trigger: any CI gate completes (pass / fail / bypassed / skipped)
    consumers: [gate-fire-rate, fleet-brief, curator]
    fields_required: [ts, kind, gate, outcome, rule_fired, evidence, pr_or_branch]
  # ── INFRA-1003: auto-rerun out-of-scope PR check ─────────────────────────
  - kind: auto_rerun_out_of_scope
    emitter: scripts/coord/auto-rerun-out-of-scope.sh (INFRA-1003)
    trigger: PR check failed on tests with zero overlap with the PR diff; rerun
      triggered once to distinguish environmental flake from real regression
    consumers: [fleet-brief, curator]
    fields_required: [ts, kind, pr_number, run_id, diff_paths, failing_tests]

  # ── RESILIENT-014: test-gate bypass audit ─────────────────────────────────
  - kind: test_gate_bypassed
    emitter: scripts/git-hooks/pre-push (RESILIENT-014)
    trigger: CHUMP_TEST_GATE=0 used to skip the cargo test gate on push
    consumers: [fleet-brief, curator]
    fields_required: [ts, kind, gap_id, reason, branch, bypassed_by]

  # ── INFRA-1006: bot-merge watchdog ────────────────────────────────────────
  - kind: bot_merge_watchdog_killed
    emitter: scripts/coord/bot-merge-watchdog.sh (INFRA-1006)
    trigger: bot-merge.sh process older than CHUMP_BOT_MERGE_MAX_AGE_S with done/merged gap killed
    consumers: [fleet-brief, curator]
    fields_required: [ts, kind, pid, gap, age_s, gap_status, pr_status]

  - kind: bot_merge_watchdog_stuck
    emitter: scripts/coord/bot-merge-watchdog.sh (INFRA-1006)
    trigger: bot-merge.sh process over age limit but gap still open — operator review
    consumers: [fleet-brief, curator]
    fields_required: [ts, kind, pid, gap, age_s, gap_status, pr_status]
  # ── CREDIBLE-047: autonomous ship-rate regression ──────────────────────────
  - kind: autonomous_ship_rate_regression
    emitter: scripts/dispatch/autonomous-ship-rate.sh (CREDIBLE-047)
    trigger: day-over-day autonomous rate drops > 10 percentage points
    consumers: [fleet-brief, curator, PWA-daily-brief]
    fields_required: [ts, kind, prev_rate, curr_rate, drop_pp]

  # ── CREDIBLE-052: cross-session gap-ID collision prevention ───────────────
  - kind: gap_id_allocator_offline
    emitter: src/gap_store.rs (reserve → external_pending_ids — CREDIBLE-052)
    trigger: open-PR scan failed (network error or gh unavailable); reserve continues
      with lease+DB coverage only; slight residual race risk remains
    consumers: [fleet-brief, curator]
    fields_required: [ts, kind, domain, reason]

  - kind: gap_id_allocator_collision_avoided
    emitter: src/gap_store.rs (reserve_with_external — CREDIBLE-052)
    trigger: naive next ID (existing_max+1) was already claimed by an open PR or
      sibling lease; allocator skipped to the next safe ID
    consumers: [fleet-brief, curator]
    fields_required: [ts, kind, domain, skipped_id]

  # ── INFRA-1020: opencode identity residue audit ───────────────────────────
  - kind: identity_residue_swept
    emitter: scripts/ops/audit-opencode-identity-residue.sh (INFRA-1020)
    trigger: one-shot audit finds (or confirms clean) opencode t@t.t placeholder identity in worktree configs
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, worktree, removed_email, removed_name, count]

  # ── INFRA-997: staging-only PR guard ────────────────────────────────────
  - kind: staging_only_pr_blocked
    emitter: scripts/coord/bot-merge.sh (INFRA-997)
    trigger: branch has commits since base but ALL are INFRA-472 auto-staging — refuses pr create
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, branch, commits]
  # ── INFRA-1063: cargo build-dir lock contention telemetry ─────────────────
  - kind: cargo_lock_wait
    emitter: scripts/coord/bot-merge.sh (_run_cargo_with_lock_detect — INFRA-1063)
    trigger: cargo emits "Blocking waiting for file lock on build directory" during
      a bot-merge phase (clippy --fix, clippy, or test), indicating two parallel
      bot-merge runs are sharing a cargo target/ directory
    consumers: [fleet-brief, waste-tally, curator]
    fields_required: [ts, kind, session, phase, gap_id, target_dir]
  # ── INFRA-1031: GraphQL exhaustion fallback ────────────────────────────────
  - kind: graphql_exhausted
    emitter: scripts/coord/bot-merge.sh (INFRA-1031)
    trigger: gh pr create attempted while GraphQL quota = 0; REST fallback taken or failed
    consumers: [fleet-brief, curator]
    fields_required: [ts, kind, source, note]
  # ── INFRA-1043: chump --release observability ──────────────────────────────
  - kind: session_released
    emitter: src/main.rs --release handler (INFRA-1043)
    trigger: operator or agent releases a lease via chump --release (with or without --lease)
    consumers: [fleet-brief, waste-tally, kpi-report]
    fields_required: [ts, kind, session_id, gap_id, source]

  # ── CREDIBLE-049: operator-leverage ratio ─────────────────────────────────
  - kind: leverage_regression
    emitter: scripts/dispatch/operator-leverage.sh (CREDIBLE-049)
    trigger: weekly aggregate leverage_ratio dropped >20% compared to prior week.
      Signals that the fleet is requiring more operator attention per unit of
      fleet-active time — compounding is going backwards.
    consumers: [fleet-brief, curator, operator-recall]
    fields_required: [ts, kind, week, prev_mean_leverage, curr_mean_leverage, drop_pct]
  # ── PRODUCT-079: needs-judgment panel ─────────────────────────────────────
  - kind: operator_acknowledged
    emitter: src/web_server.rs handle_needs_judgment_ack (PRODUCT-079)
    trigger: operator marks a gap/event as handled via the Judgment panel
    consumers: [fleet-brief, needs-judgment-panel]
    fields_required: [ts, kind, item_type, item_id]

  # ── INFRA-1056: worktree gitdir back-ref repair ──────────────────────
  - kind: worktree_gitdir_repair_fired
    emitter: src/atomic_claim.rs verify_and_repair_gitdir (INFRA-1056)
    trigger: chump claim detected a wrong gitdir back-ref after git worktree add and rewrote it
    consumers: [fleet-brief, claim-race-monitor]
    fields_required: [ts, kind, worktree, was, now, attempt]

  # ── INFRA-1166: REST-direct merge fast path ───────────────────────────────
  - kind: bot_merge_rest_direct
    emitter: scripts/coord/bot-merge.sh INFRA-1166 REST-direct fast path
    trigger: bot-merge.sh confirmed all required CI checks already green and merged
      PR via REST PUT /pulls/N/merge instead of GraphQL enablePullRequestAutoMerge.
      Eliminates GraphQL secondary rate limit errors in green-CI fast path.
    consumers: [fleet-brief, waste-tally, kpi-report]
    fields_required: [ts, kind, pr, gap, sha, checks_verified]

  - kind: bot_merge_auto_armed
    emitter: scripts/coord/bot-merge.sh INFRA-1166 auto-merge fallback
    trigger: bot-merge.sh could not use the REST-direct path (checks still running
      or REST PUT failed) and fell back to arming GitHub auto-merge via GraphQL
      enablePullRequestAutoMerge.
    consumers: [fleet-brief]
    fields_required: [ts, kind, pr, gap]
