    fields_required: [ts, kind, baked_sha_before, commits_ahead, elapsed_s]

  - kind: chump_binary_refresh_failed
    effect_metric: self
    emitter: scripts/ops/refresh-chump-binary.sh (INFRA-1065)
    trigger: cargo install --path . --bin chump --force exited non-zero. Operator
      action needed — INFRA-825 staleness warnings will continue until the next
      successful refresh.
    consumers: [fleet-brief, operator-recall, watchdogs]
    fields_required: [ts, kind, baked_sha, commits_ahead, elapsed_s, rc]

  # ── INFRA-847: fleet-state.json mutex ─────────────────────────────────────
  - kind: fleet_state_lock_timeout
    effect_metric: self
    emitter: scripts/coord/emergency-fast-path.sh, scripts/dispatch/opus-curator.sh (INFRA-847)
    trigger: flock(1) wait on fleet-state.lock exceeded CHUMP_FLEET_STATE_LOCK_TIMEOUT_S
      (default 5s); script proceeds without lock (fail-open) to avoid deadlock
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, source, timeout_s, note]

  # ── INFRA-1068: fleet-state.json batch-write telemetry ────────────────────
  - kind: fleet_state_lock_contention
    effect_metric: self
    emitter: scripts/coord/emergency-fast-path.sh (INFRA-1068)
    trigger: flock(1) acquisition on fleet-state.lock took more than 1000ms,
