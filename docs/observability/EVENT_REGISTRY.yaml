  - kind: missing_attribution
    effect_metric: self
    emitter: scripts/dev/ambient-emit.sh (CREDIBLE-037)
    trigger: CHUMP_AGENT_HARNESS not set and no --harness flag passed; ambient
      event emitted with harness=unknown; one-shot ALERT per session
    consumers: [fleet-brief]
    fields_required: [ts, session, harness, hint]

  # ── CREDIBLE-039: closure consistency ─────────────────────────────────────
  - kind: stale_post_merge_gap
