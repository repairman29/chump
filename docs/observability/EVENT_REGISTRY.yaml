    emitter: scripts/coord/feedback-curator.sh
    trigger: feedback-curator.sh classified a FEEDBACK event into a curated
      bucket (proposal / retro / opinion) per INFRA-1271.
    consumers: [fleet-brief, feedback-report]
    fields_required: [ts, kind, gap, bucket, source]

  - kind: gap_db_auto_seeded
    effect_metric: self
    emitter: src/main.rs (chump init / first-run state.db bootstrap)
    trigger: chump auto-created an empty .chump/state.db when a command
      needed it but the file was missing (fresh clone or wiped state).
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, path]

  - kind: gate_skipped
    effect_metric: self
    emitter: scripts/coord/api-rate-limit-gate.sh
    trigger: api-rate-limit-gate.sh let an api call proceed because remaining
      quota was above threshold (no throttle needed). Inverse of rate_limit_*.
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, source, phase, reason, rest_remaining, gql_remaining]

  - kind: gh_secondary_limit_hit
    effect_metric: self
    emitter: scripts/coord/lib/github.sh (chump_gh wrapper)
    trigger: chump_gh wrapper observed a `secondary rate limit` error and
      backed off; emitted after retries succeed or after final failure.
    consumers: [fleet-brief, waste-tally, ops-audit]
    fields_required: [ts, kind, script, api, retries, total_waited_ms]

  - kind: ghost_lease_handoff
    effect_metric: self
    emitter: scripts/ops/stale-gap-lock-reaper.sh
    trigger: reaper detected a stale gap lock whose owner had committed work
      and was about to hand the lease off to a fresh session (after ack
      window expired).
    consumers: [fleet-brief, ops-audit, curator]
    fields_required: [ts, kind, gap, session, commits_ahead, branch, ack_window_s]

  - kind: ghost_lease_handoff_pending
    effect_metric: self
    emitter: scripts/ops/stale-gap-lock-reaper.sh
    trigger: reaper detected a candidate lease for handoff but is waiting on
      the ack window before releasing.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, gap, session, age_s, window_s]

  - kind: lint_storm
    effect_metric: self
    emitter: scripts/ops/lint-storm-detector.sh
    trigger: detector saw >=N open PRs failing on the same clippy/eslint
      lint within a short window; filed a follow-up gap to fix the lint
      class once.
    consumers: [fleet-brief, curator]
    fields_required: [ts, kind, event, lint, pr_count, prs, filed_gap]

  - kind: meta_filed
    effect_metric: self
    emitter: scripts/coord/gap-reserve.sh
    trigger: gap-reserve.sh filed a META-* gap (PM/curation domain rather
      than INFRA/CREDIBLE/etc). Distinct ambient channel so curator can
      surface PM work separately.
    consumers: [fleet-brief, curator, opus-curator]
    fields_required: [ts, kind, session, event, gap_id, title, note]

  - kind: pr_stuck_announced
    effect_metric: self
    emitter: scripts/coord/pr-stuck-announcer.sh
    trigger: announcer detected an open PR stuck past its SLO (age>threshold
      with at least one failing required check) and emitted an alert.
    consumers: [fleet-brief, ops-audit, curator]
    fields_required: [ts, kind, pr, gap, target, age_h, failing_check]

  - kind: pre_restart
    effect_metric: self
    emitter: src/main.rs (chump fleet restart prep)
    trigger: chump emitted a pre-restart marker before tearing down workers,
      so observers can correlate the restart with subsequent fresh leases.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind]

  - kind: rate_limit_approaching
    effect_metric: self
    emitter: scripts/coord/api-rate-limit-gate.sh
    trigger: gate observed REST or GraphQL bucket below warning threshold
      (default 25% remaining). Background callers should pivot to cache or
      defer per INFRA-1080.
    consumers: [fleet-brief, ops-audit, waste-tally]
    fields_required: [ts, kind, source, phase, api, remaining, limit, pct]

  - kind: rate_limit_exhausted
    effect_metric: self
    emitter: scripts/coord/api-rate-limit-gate.sh
    trigger: bucket at 0; non-critical callers blocked until reset window.
    consumers: [fleet-brief, ops-audit, waste-tally]
    fields_required: [ts, kind, source, phase, api, remaining, limit]

  - kind: session_rescue
    effect_metric: self
    emitter: src/rescue_tally.rs (INFRA-rescue-tally)
    trigger: rescue-tally detected a commit that bears a session-rescue
      marker (e.g. `wip_checkpoint`, `auto-recovered`). Tracks operator
      recovery debt vs autonomous output.
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, commit, subject, author]

  - kind: stale_gap_lock_protected
    effect_metric: self
    emitter: scripts/ops/stale-gap-lock-reaper.sh
    trigger: reaper considered a stale lock but kept it alive (heartbeat
      still fresh per TTL). Records the "no-op decision" so observers can
      distinguish silent reaper from protective reaper.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, event, lock, session, gap, heartbeat_age_s, heartbeat_ttl_s, reason]

  - kind: stale_gap_lock_skipped
    effect_metric: self
    emitter: scripts/ops/stale-gap-lock-reaper.sh
    trigger: reaper skipped a stale lock because an open PR already exists
      for the gap (handoff would lose work).
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, reason, gap, prs, lock]

  - kind: timeout_rescue
    effect_metric: self
    emitter: scripts/dispatch/worker.sh
    trigger: worker hit its run-timeout and committed a WIP checkpoint so
      the next session can resume. Distinct from session_rescue (which
      indexes off the commit, not the worker run).
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, event, session, worktree, agent_id, gap_id]
  - kind: bot_merge_phase_duration
    effect_metric: self
    emitter: scripts/coord/bot-merge.sh::stage_done (INFRA-1067)
    trigger: emitted by stage_done() after each named bot-merge phase
      completes. Allows the fleet to accumulate a distribution of phase
      wall-clock times and tune timeouts data-drivenly (AC 1 + AC 2 of
      INFRA-1067). One event per stage_done() call — covers git fetch,
      rebase, cargo fmt, cargo clippy, cargo test, push, PR create, etc.
    consumers: [fleet-brief, ops-audit, infra-1067-timeout-tuning]
    fields_required: [ts, kind, phase, elapsed_s, gap, branch]
  - kind: rebase_and_push_invoked
    emitter: scripts/coord/chump-rebase-and-push.sh (INFRA-1404)
    trigger: operator ran chump-rebase-and-push.sh; emitted on every successful
      fetch+rebase+push cycle. On conflict or double-push-rejection the kind is
      rebase_and_push_failed instead (same emitter, different exit path).
    effect_metric: manual_rebase_ops_count{operator=<session>} — tracks how often
      operators need to manually rebase; should trend to 0 as auto-rebase daemon
      (INFRA-1406) matures
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, branch, base, remote, retries]
  - kind: rebase_and_push_failed
    emitter: scripts/coord/chump-rebase-and-push.sh (INFRA-1404)
    trigger: rebase+push encountered a conflict (exit 2) or push-lease rejection
      after retry (exit 3). Includes stage field to distinguish conflict vs. push.
    effect_metric: rebase_conflict_count{branch=<branch>} — persistent conflicts
      indicate hot-file contention; should be addressed by merge drivers
    consumers: [fleet-brief, ops-audit, paramedic-daemon]
    fields_required: [ts, kind, branch, base, stage]
  - kind: gap_revert_pr_opened
    effect_metric: self
    emitter: src/revert_pr.rs via chump revert (INFRA-1443)
    trigger: operator ran `chump revert <PR-or-commit> --reason <text>`;
      emitted after the revert PR is created on GitHub and the
      original PR has been commented with the revert link.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, merge_sha, orig_pr, revert_pr_url]
  - kind: lease_auto_extended
    effect_metric: self
    emitter: scripts/coord/lease-auto-extend.sh (INFRA-1327)
    trigger: a near-expiry claim lease (remaining < CHUMP_LEASE_EXTEND_THRESHOLD_S,
      default 1800s) has an open PR with armed auto-merge; the lease expires_at is
      rewritten to now + CHUMP_GAP_CLAIM_TTL_SECS to prevent a stomp race where a
      second worker re-claims the gap while GitHub merge is still processing.
    consumers: [fleet-brief, waste-tally, ops-audit]
    fields_required: [ts, kind, gap_id, pr_number, new_expires, reason]
    docs: |
      reason is always "auto_merge_armed". pr_number is the integer GitHub PR number.
      new_expires is an ISO-8601 UTC timestamp. Emitted once per lease per extension
      cycle; no dedup — operators can count events to see how many times a lease was
      extended before merge completed.

  - kind: lease_release_failed
    effect_metric: self
    emitter: src/dispatch.rs::release_with_retry (INFRA-1243)
    trigger: chump --release subprocess failed twice in the dispatch step-5 cleanup
      path. The lease will auto-expire via its TTL, but the failure is recorded
      for operator visibility.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, session, gap, error]
  # ── INFRA-989: PWA secret-input flow ─────────────────────────────────────
  - kind: pwa_secret_changed
    effect_metric: self
    emitter: src/web_server.rs handle_secret_post (INFRA-989)
    trigger: operator persists a secret credential (Anthropic key, OAUTH token, GH token) via PWA POST /api/settings/secret/{name}, after a successful probe (or with CHUMP_SKIP_PROBE=1)
    consumers: [fleet-brief, audit-trail]
    fields_required: [ts, kind, key, last4, probe_skipped]
  - kind: gh_auth_token_cache_hit
    effect_metric: self
    emitter: scripts/coord/lib/gh-shim/gh (INFRA-1283)
    trigger: gh shim intercepted 'gh auth token' and returned a cached token
      (within CHUMP_GH_TOKEN_CACHE_TTL_S, default 300s). Skips the real gh
      auth token call entirely — avoids ~27 redundant calls/hr.
    consumers: [fleet-brief, api-cost-leaderboard]
    fields_required: [ts, kind, age_s, ttl_s]
  # ── INFRA-1311: bot-merge exponential backoff events ─────────────────────
  - kind: bot_merge_backoff_written
    effect_metric: self
    emitter: scripts/coord/auto-merge-armer.sh (INFRA-1311)
    trigger: auto-merge-armer failed to arm a PR and wrote a backoff record with
      next-retry delay. Backoff grows exponentially per-PR (30s/60s/120s/300s).
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, pr, delay_s, until]
  - kind: bot_merge_backoff_skipped
    effect_metric: self
    emitter: scripts/coord/auto-merge-armer.sh (INFRA-1311)
    trigger: auto-merge-armer skipped a PR because its per-PR backoff has not yet
      expired. No merge attempt is made until the backoff period elapses.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, pr, remaining_s, until]

  # ── INFRA-849: system integration test pipeline ───────────────────────────
  - kind: integration_test_pass
    effect_metric: self
    emitter: scripts/ci/test-system-integration.sh (INFRA-849)
    trigger: all assertions in the claim→commit→ship integration test passed
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, pass_count, elapsed_s]

  - kind: integration_test_fail
    effect_metric: self
    emitter: scripts/ci/test-system-integration.sh (INFRA-849)
    trigger: one or more assertions in the claim→commit→ship integration test failed
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, fail_count, pass_count, elapsed_s]

  # ── INFRA-1076: lane-routed GitHub App tokens (scaffold) ──────────────────
  - kind: github_app_fallback
    effect_metric: self
    emitter: scripts/coord/lib/github.sh _chump_gh_lane_token (INFRA-1076)
    trigger: chump_gh requested a lane-specific token (CHUMP_GH_CALL_CRITICALITY=critical|background)
      but the corresponding ~/.chump/oauth-token-<lane>.json file was absent. Falls back to the
      legacy GH_TOKEN / gh-CLI keyring path. Emitted once per process so the operator sees the
      degraded mode without log spam.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, criticality, reason, expected_file]

  # ── INFRA-1441: bot-merge bypass audit trail ─────────────────────────────
  - kind: bot_merge_bypassed
    emitter: scripts/git-hooks/pre-push (INFRA-1441)
    trigger: >
      Operator pushed a chump/<gap-id> branch with CHUMP_BYPASS_BOT_MERGE=1
      and an accompanying Bot-Merge-Bypass: <reason> trailer on the HEAD
      commit body. The trailer is now mandatory for the bypass (mirrors
      Rust-First-Bypass / Obs-Bypass-Reason conventions) so the audit trail
      captures the reason on permanent record. Surfaces every bypass to
      fleet-brief + ops-audit so the bypass RATE is visible.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, branch, gap, reason]
  # ── PRODUCT-078: PWA Daily Brief ─────────────────────────────────────────
  - kind: pwa_brief_loaded
    emitter: web/v2/daily-brief.js ChumpViewBrief._load (PRODUCT-078)
    trigger: operator opens the Daily Brief tab or returns to a tab after absence;
      sendBeacon POST /api/ambient/emit fires after the /api/brief response is
      rendered, recording since_ago_secs and per-bucket counts for usage analytics
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, kind, source, since_ago_secs, done, needs_judgment, alerts]
  - kind: reaper_fetch_fallback
    effect_metric: self
    emitter: scripts/ops/stale-worktree-reaper.sh (INFRA-1472)
    trigger: git fetch origin/main failed (network down, rate-limited, or disk pressure)
      but a cached local origin/main ref exists — reaper continues in offline mode
      rather than aborting. When no local ref exists, the reaper still aborts (exit 1).
    consumers: [fleet-brief, reaper-watchdog]
    fields_required: [ts, kind, remote, base, reason]
  # ── INFRA-1361: GitHub App installation-token rotator ────────────────────
  - kind: gh_token_rotate_noop
    effect_metric: self
    emitter: src/gh_token.rs chump gh-token rotate (INFRA-1361)
    trigger: chump gh-token rotate was invoked but ~/.chump/github_apps.toml is
      absent or empty. No tokens are fetched; exit 0. Emitted once per invocation
      so operators can confirm the cron is running even before App configuration.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, reason]
    fields_optional: [session, worktree, harness]

  - kind: gh_token_rotated
    effect_metric: self
    emitter: src/gh_token.rs chump gh-token rotate (INFRA-1361)
    trigger: a fresh GitHub App installation token was successfully fetched for
      one lane and written to ~/.chump/oauth-token-<lane>.json (chmod 600).
      Emitted once per lane per invocation.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, lane, expires_at]
    fields_optional: [session, worktree, harness]
  # ── INFRA-1421: CI regression guard ──────────────────────────────────────
  - kind: ci_regression_guard_blocked
    effect_metric: self
    emitter: scripts/git-hooks/pre-push-ci-regression-guard.sh (INFRA-1421)
    trigger: push blocked because a CI-Regression-Guard trailer references a
      test script that does not exist in the repo at push time
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, source, note]

  - kind: ci_regression_guard_missing
    effect_metric: self
    emitter: scripts/git-hooks/pre-push-ci-regression-guard.sh (INFRA-1421)
    trigger: warning (non-blocking) emitted when a fix( commit touches
      .github/workflows/ci.yml but carries no CI-Regression-Guard trailer;
      prompts operator to add a regression test
    consumers: [fleet-brief]
    fields_required: [ts, kind, source, note]

  - kind: ci_regression_guard_suite_failed
    effect_metric: self
    emitter: scripts/git-hooks/pre-push-ci-regression-guard.sh (INFRA-1421)
    trigger: push blocked because a regression-guard test script returned
      non-zero — the CI regression it was guarding has been re-introduced
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, source, note]
  # ── INFRA-1427: fleet doctor ──────────────────────────────────────────────
  - kind: fleet_doctor_run
    effect_metric: fail_count
    emitter: scripts/coord/fleet-doctor-strict.sh (INFRA-1427)
    trigger: operator runs fleet-doctor-strict.sh; always emitted regardless
      of pass/fail so fleet-brief can track health-check cadence
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, kind, pass_count, fail_count]
