  # ── Orchestrate conversational loop (INFRA-796) ──────────────────────────
  - kind: orchestrate_intent
    effect_metric: orchestrate_action_within_60s_for_same_session
    emitter: src/orchestrate.rs (chump orchestrate interactive loop)
    trigger: operator types a natural-language intent; emitted once per loop iteration
    consumers: [fleet-brief, kpi-report, cost-watch]
    fields_required: [ts, kind, intent, status, tool_count, est_input_tokens, est_output_tokens, elapsed_ms, failure_class]
    docs: |
      status: "success" when all tool calls exit 0; "failure" when any tool call
        returns an error string.
      failure_class: "transient" (network/rate-limit/timeout) | "permanent"
        (syntax/unknown-command) | "none" (no failures).
      tool_count: number of TOOL: lines dispatched this iteration.
      est_input_tokens / est_output_tokens: rough 1-token-per-4-chars estimate.

  - kind: orchestrate_session_end
    effect_metric: self
    emitter: src/orchestrate.rs (chump orchestrate — "exit" or EOF)
    trigger: operator types "exit"/"quit" or closes stdin
    consumers: [fleet-brief]
    fields_required: [ts, kind, intent, status]

  - kind: orchestrate_llm_timeout
    effect_metric: self
    emitter: src/orchestrate.rs (chump orchestrate — INFRA-1364)
    trigger: LLM call exceeds CHUMP_ORCHESTRATE_LLM_TIMEOUT_S (default 60s); emitted once
      per timed-out attempt (max 2 per intent before session abort)
    consumers: [fleet-brief, kpi-report, ops-audit]
    fields_required: [ts, kind, session_id, attempt_number, call_kind, elapsed_s]
    docs: |
      attempt_number: 1 (first timeout, retry follows) or 2 (second timeout, session aborted).
      call_kind: "intent_parse" — the orchestrator currently only wraps intent LLM calls.
        "tool_select" and "summary" are reserved for future routing layers.
      elapsed_s: actual wall-clock seconds elapsed before the timeout fired; should
        be approximately CHUMP_ORCHESTRATE_LLM_TIMEOUT_S.
      session_id: matches CHUMP_ORCHESTRATE_SESSION_ID or the synthesized session identity.
      On attempt_number=2, a companion orchestrate_session_end{status="timeout"} is also
        emitted, and INFRA-1363 session_summary will carry exit_reason="timeout".
  - kind: orchestrate_session_summary
    effect_metric: self
    emitter: src/orchestrate.rs (chump orchestrate — emitted on each session exit, INFRA-1363)
    trigger: session exits for any reason (clean, user_quit, error)
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, kind, session_id, exit_reason, intents_routed]

  - kind: orchestrate_session_resumed
    emitter: src/orchestrate.rs (chump orchestrate --resume <session-id>)
    trigger: operator invokes --resume for a non-clean-exited session within the max-resume limit
    effect_metric: self
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, kind, session_id, events_replayed, resume_attempts, prior_exit_reason]
    docs: |
      events_replayed: number of ambient events loaded for this session_id (up to 200).
      resume_attempts: cumulative count including this invocation (1-based).
      prior_exit_reason: exit_reason from the last orchestrate_session_summary event,
        "unknown" if no summary event exists yet (pre-INFRA-1363 sessions).
      Emitted before the interactive loop resumes so the event is always recorded
      even if the resumed session immediately crashes again.
      Refusal conditions (exit non-zero, no event emitted):
        - exit_reason=clean → "session already completed"
        - resume_attempts > CHUMP_ORCHESTRATE_MAX_RESUMES (default 3) → loop guard

  # ── Intent parser (INFRA-798) ─────────────────────────────────────────────
  - kind: intent_parse_ok
    effect_metric: self
    emitter: src/intent_parser.rs (chump orchestrate <text> single-shot mode)
    trigger: natural-language intent resolved to a known IntentOp variant
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, command]

  - kind: intent_parse_unknown
    effect_metric: self
    emitter: src/intent_parser.rs (chump orchestrate <text> single-shot mode)
    trigger: pattern matching returned IntentOp::Unknown — intent not recognized
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, command]

  # ── Pre-registered eval gate (META-043) ──────────────────────────────────
  - kind: prereg_blocked
    effect_metric: self
    emitter: scripts/coord/bot-merge.sh §4c
    trigger: commit modifies cognition/routing src but docs/eval/preregistered/<GAP-ID>.md is absent; bot-merge aborts
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, gap, missing, session]

  - kind: prereg_ok
    effect_metric: self
    emitter: scripts/coord/bot-merge.sh §4c
    trigger: cognition/routing src changed and preregistered eval doc confirmed present; ship proceeds
    consumers: [fleet-brief, kpi-report]
    fields_required: [ts, gap, doc, session]

