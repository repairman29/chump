  - kind: orphan_subprocess_reaped
    effect_metric: self
    emitter: scripts/ops/reap-orphan-claude-procs.sh (INFRA-1662)
    trigger: >
      launchd watchdog swept the process table for `claude` binary subprocesses
      whose ppid chain does not reach the foreground Claude.app PID and whose
      etime exceeds REAP_AGE (default 3600s). Each sweep emits exactly one
      event, including count=0 to prove the watchdog is alive (steady state).
      Prevents the 60h cron-loop leak that pinned 8.5GB RAM with 354 wedged
      subprocesses on 2026-05-22.
    consumers: [operator-recall, fleet-brief]
    fields_required: [ts, count, oldest_etime_secs, total_rss_kb, reap_age_secs, fg_pid, dry_run]

  - kind: stale_process_reaped
    effect_metric: self
    emitter: scripts/ops/stale-process-watchdog.sh (INFRA-1663)
    trigger: >
      launchd watchdog (every 30 min) swept the process table for long-tail
      fleet leaks — rustc (10m), cargo (15m), `chump health` (2m), worker.sh
      (4h), bot-merge.sh (20m), run-fleet.sh (24h). Any matching process whose
      etime exceeds its class's expected lifetime is SIGTERMed with 30s grace,
      then SIGKILLed if still alive. One per-kill event is emitted (action =
      sigterm or sigkill) plus one heartbeat sweep record per invocation
      (sweep=true, count=N) so the watchdog's liveness is always visible.
      Generalizes INFRA-1662 (claude-only) to the rest of the fleet.
      Discovery: 2026-05-22 cleanup found 5 rustc procs alive 1.5+ days and
      2 `chump health --slo-check` alive 11+ h.
    consumers: [operator-recall, fleet-brief]
    fields_required: [ts, pid, comm, class, etime_secs, expected_secs, action, dry_run]
  - kind: main_red_detected
    effect_metric: self
    emitter: scripts/ops/main-health-watchdog.sh (INFRA-1656)
    trigger: >
      Daily launchd watchdog at 02:00 local queries the latest CI run on main.
      Each sweep emits exactly one event: on success it is a heartbeat
      (status=success, gap_id=none) proving the watchdog is alive; on failure
      it carries status=filed plus the freshly-reserved gap_id (or
      status=deduped if a P0 INFRA-NEW-MAIN-RED-* gap already references the
      same head_sha). Closes the 2026-05-20 24h-red-main feedback gap where
      every PR's CI burned silently until an operator noticed.
    consumers: [operator-recall, fleet-brief]
    fields_required: [ts, gate, sha, run_url, head_sha, gap_id, dry_run, status]

