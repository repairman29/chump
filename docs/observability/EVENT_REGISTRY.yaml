  - kind: premature_closure_auto_fixed
    effect_metric: self
    emitter: scripts/ci/test-gap-closure-consistency.sh --auto-fix (CREDIBLE-039)
    trigger: gap with status=done + closed_pr points to BLOCKED/DIRTY PR;
