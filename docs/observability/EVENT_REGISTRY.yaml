    consumers: [audit-log, kpi-report, wizard-daemon]
    fields_required: [gap_id, pr_number, commit_sha]
    docs: |
      Emitted by two paths: (1) chump gap ship on manual ship, (2) the
      chump --execute-gap arm in src/main.rs on every clean Ok(reply) exit
      (INFRA-2055 terminal-outcome guarantee). pr_number is parsed from the
