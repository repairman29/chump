      now the sole reader of the GitHub API for the fleet (Phase 1 of
      docs/design/GITHUB_LIAISON.md).
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, pid, stale_takeover]

  - kind: liaison_heartbeat
    effect_metric: github_api_calls_24h
    emitter: scripts/ops/github-liaison.sh (INFRA-1317)
    trigger: >
      Per-cycle heartbeat from the elected liaison after each refresh
      pass (default 60s). Indicates the cache reconcile loop is alive and
      reconcile_ok=true means the underlying github-cache-reconcile.sh
      one-REST-call refresh succeeded.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, pid, interval_s, reconcile_ok]

  - kind: liaison_takeover
    effect_metric: github_api_calls_24h
    emitter: scripts/ops/github-liaison.sh (INFRA-1317)
    trigger: >
      Liaison lock heartbeat was stale (older than CHUMP_LIAISON_STALE_S,
      default 90s) so this process forcibly reclaimed it. Indicates the
      prior liaison died without releasing — rising frequency is a warning
      that liaison processes are crashing rather than yielding cleanly.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, pid, prev_holder, stale_age_s]

  - kind: liaison_yielded
    effect_metric: github_api_calls_24h
    emitter: scripts/ops/github-liaison.sh (INFRA-1317)
    trigger: >
      Liaison voluntarily released the lock via signal (SIGTERM/INT/HUP),
      EXIT trap on daemon shutdown, or operator-invoked `--release`. Pair
      with the next liaison_elected to confirm clean handoff.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, pid, reason]

  - kind: opus_message_sent
    effect_metric: opus_messages_sent_24h
    emitter: scripts/coord/opus-message.sh (INFRA-1796)
    trigger: >
      A v0 addressed-async DM was sent between Opus sessions via the
      .chump-locks/opus-inbox/ inbox channel. Bridge primitive until
      INFRA-1759 (full A2A Layer 2b RPC) lands. Recipient can be
      session:<id>, gap:<GAP-ID> (routed to current lease holder), or
      all-opus (broadcast). Operator can inspect via opus-message.sh list.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, to, from, ref, msg_id]
  - kind: handoff_contract_violation
    effect_metric: subagent_contract_failures_24h
    emitter: crates/chump-handoff/src/lib.rs (INFRA-1720)
    trigger: >
      Subagent handoff failed schema validation, semantic validation, or
      response parsing. Indicates prompt refinement or contract definition
      needed. Routes violations by `contract_name` so authors can identify
      broken patterns per contract.
    consumers: [fleet-brief, subagent-prompt-feedback]
  - kind: ast_crawler_unsupported_language
    effect_metric: self
    emitter: crates/ast-crawler/src/lib.rs (INFRA-1719 tree-sitter AST crawler)
    trigger: >
      `chump_ast_crawler::crawl_paths` encountered a file with an extension
      not in the day-1 supported set (rust, python, javascript, typescript,
      go, bash, yaml). Debounced per-extension per invocation so a large asset
      tree doesn't flood the stream. Helps the fleet identify languages that
      should be promoted to first-class support next.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, path, ext]
  # INFRA-1720: chump-handoff typed-contract dispatch pipeline. Emitted at
  # every error boundary so dashboards can route violations back to the
  # owning contract for prompt refinement.
  - kind: handoff_contract_violation
    effect_metric: self
    emitter: crates/chump-handoff/src/lib.rs (HandoffContract::dispatch)
    trigger: >
      Subagent returned a payload that failed the contract's typed boundary —
      JSON schema mismatch (missing/extra field, parse error), Output::validate()
      rejection (semantic rule violated), or transport-level dispatch error.
      Parent rejects the payload and emits this rather than proceeding with
      malformed work.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, contract_name, error, raw_output_first_100]
  # INFRA-1722: ARCHITECTURE.md auto-generator. Emitted on each generation so
  # operators (and the fleet-brief consumer) see when a repo's architecture
  # snapshot was refreshed and how much the AST-derived shape changed.
  - kind: architecture_doc_regenerated
    effect_metric: self
    emitter: scripts/ops/generate-architecture-doc.sh (INFRA-1722)
    trigger: >
      The ARCHITECTURE.md generator finished a run against a repo (the chump
      repo itself or a takeover-demo target like echeo). Fires whether or not
      the regenerated output differed from the previous file — operators want
      both the "ran-but-unchanged" and "ran-and-changed-N-lines" signals to
      detect silent regressions in the AST crawler.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, repo, lines_changed, sections_touched]
  - kind: chump_gap_set_legacy_delim
    effect_metric: self
    emitter: src/main.rs `chump gap set --acceptance-criteria` (INFRA-1799)
    trigger: >
      Operator invoked `chump gap set --acceptance-criteria "a|b|c"` with a
      single flag whose value contains '|' — the legacy pipe-delimiter
      form. The preferred path is repeated `--acceptance-criteria BULLET`
      flags, which avoids splitting AC values that legitimately contain
      pipes (Rust generics, recipient syntax <gap-id|session-id|all-opus>,
      regex alternation). Emit lets the curator migrate callers gradually
      before removing the delimiter path.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, gap_id, bullet_count, note]

  # INFRA-1729: Quartermaster artifact regen — fires after every successful
  # capabilities-registry rebuild. `delta_count > 0` means a new primitive
  # surfaced; downstream dashboards can re-validate consumers' tool catalogues.
  - kind: capabilities_registry_refreshed
    effect_metric: self
    emitter: scripts/dev/build-capabilities-registry.sh (INFRA-1729)
    trigger: >
      docs/CAPABILITIES_REGISTRY.json was regenerated by the Quartermaster
      builder (or the Column A `chump ingest` wrapper at
      scripts/ops/generate-capabilities-registry.sh). Fires once per
      invocation regardless of delta; consumers that only care about
      meaningful changes filter on delta_count > 0.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, repo, items_count, delta_count]
  # INFRA-1851: PTY-pressure urgent mode for the claude-reaper. Fires when
  # the count of allocated /dev/ttys??? device files crosses 80% of
  # kern.tty.ptmx_max — the threshold past which new shells/tmux panes/SSH
  # sessions start to fail. The reaper response is to lower REAP_AGE to
  # 600s (10 min) for that sweep so a fresh leak drains in 10 min instead
  # of the 60-min default.
  - kind: reaper_pty_pressure
    effect_metric: self
    emitter: scripts/ops/reap-orphan-claude-procs.sh (INFRA-1851)
    trigger: >
      Pre-reap PTY-allocation probe found ≥80% of kern.tty.ptmx_max
      consumed (default threshold; tunable via CHUMP_REAPER_PRESSURE_THRESHOLD).
      Reaper lowers its effective age floor for this sweep only; the next
      sweep re-evaluates pressure from scratch.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, allocated, limit, pct, threshold, new_reap_age]

  # INFRA-1875: GitHub Liaison webhook-health probe + polling fallback.
  # Closes INFRA-1318 Phase 2 AC #5/#6.
  - kind: liaison_webhook_unhealthy
    effect_metric: self
    emitter: scripts/ops/github-liaison.sh (INFRA-1875)
    trigger: >
      Webhook-receiver health probe (default http://127.0.0.1:8765/health)
      failed CHUMP_LIAISON_WEBHOOK_HEALTH_MAX_FAILS times in a row (default 3).
      Liaison drops poll interval to fallback value and emits
      liaison_polling_fallback_active on the same cycle.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, pid, consecutive_failures, url, last_error]

  - kind: liaison_polling_fallback_active
    effect_metric: self
    emitter: scripts/ops/github-liaison.sh (INFRA-1875)
    trigger: >
      Companion to liaison_webhook_unhealthy — emitted on the cycle the
      liaison switches from normal interval to fallback (default 30s). Pairs
      with liaison_webhook_recovered which fires on the next successful probe.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, pid, poll_interval_s, reason]

  - kind: liaison_webhook_recovered
    effect_metric: self
    emitter: scripts/ops/github-liaison.sh (INFRA-1875)
    trigger: >
      Successful webhook-health probe after the liaison had been in
      polling-fallback mode. Original poll interval restored. Pairs with
      liaison_polling_fallback_active.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, pid, poll_interval_s, url]
  # INFRA-1892: curator-jit-scheduler daemon. Replaces the
  # orchestrator-as-pebble-scheduler antipattern by auto-broadcasting
  # next-gap assignments to curator-opus-* sessions on DONE events.
  - kind: curator_jit_scheduled
    effect_metric: self
    emitter: scripts/coord/curator-jit-scheduler.sh (INFRA-1892)
    trigger: >
      A curator-opus-* session emitted a DONE event (or kind=gap_shipped).
      The daemon called the existing _pick_gap.py with priority filter
      P0,P1 (default), selected the top candidate, and broadcast a JIT
      ASSIGNMENT to that curator's inbox via broadcast.sh.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, curator, gap_id, priority]

  - kind: curator_jit_skipped
    effect_metric: self
    emitter: scripts/coord/curator-jit-scheduler.sh (INFRA-1892)
    trigger: >
      Skipped a JIT broadcast — either dedup-window hit (same curator+gap
      within CHUMP_JIT_DEDUP_WINDOW_S, default 3600s) or the broadcast.sh
      call itself failed. Reason field discriminates.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, curator, gap_id, reason]

  - kind: curator_jit_no_gap
    effect_metric: self
    emitter: scripts/coord/curator-jit-scheduler.sh (INFRA-1892)
    trigger: >
      Curator finished a gap but _pick_gap.py returned no candidate
      matching the priority filter (P0/P1 default). The daemon logs and
      stands by; the curator will idle until a new pickable gap appears.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, curator]
  # META-104: external-collab curator (operator-facing surface + Marcus arc + partnership pipeline)
  - kind: external_collab_finding
    effect_metric: self
    emitter: scripts/coord/external-collab-loop.sh (META-104)
    trigger: >
      curator-opus-external-collab detected a drift condition in one of
      four categories: voice_drift (banned term found in PITCH.md /
      HIDDEN_GEMS.md / DEMO_5MIN.md), surface_stale (doc >14d untouched),
      marcus_at_risk (Marcus milestone stalled >7d with no gap progress),
      partnership_stalled (INFRA-1501/1506/1511 approaching or past
      decision deadline). Curator audits only; does not edit docs directly.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, category, surface, detail]
  - kind: external_collab_scope_override
    effect_metric: self
    emitter: scripts/coord/external-collab-loop.sh (META-104)
    trigger: >
      CHUMP_EXTERNAL_COLLAB_SCOPE_OVERRIDE=1 was set, allowing the
      external-collab curator to claim work outside its defined lane
      (OPERATOR-FACING + EXTERNAL-FACING surfaces). Emitted for audit
      accountability.
    consumers: [ops-audit]
    fields_required: [ts, kind]
  # INFRA-1886: soft pre-claim suggestion in `chump gap preflight <ID>`.
  - kind: preflight_priority_hint_shown
    effect_metric: self
    emitter: src/main.rs print_priority_hint() (INFRA-1886)
    trigger: >
      `chump gap preflight <ID>` returned OK for a target gap whose
      priority is below P0; print_priority_hint surfaced up to 3
      higher-priority unclaimed gaps as advisory. Operator + curator
      see the note; choice to abandon the intended claim remains theirs.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, target_gap, suggested_gaps_count, target_priority]

  # INFRA-1899: transient-retrigger daemon. Auto-recognizes known-transient
  # CI failure patterns on open PRs and pushes an empty commit to force a
  # fresh CI run, capped at 2 retries per PR per 6 hours. Retires the
  # operator hand-empty-commit-retrigger workaround (today's session had
  # 10+ manual retriggers for the audit-cancel pattern alone).
  - kind: transient_auto_retriggered
    effect_metric: self
    emitter: scripts/coord/transient-retrigger.sh (INFRA-1899)
    trigger: >
      Daemon classified an open PR's failing required check against the
      catalog at scripts/coord/transient-classes.json (audit_cancelled,
      checkout_auth_race, flake_rerun_exhausted, network_blip), confirmed
      the per-PR retry cap (default 2/6h) was not yet exceeded, and
      pushed an empty commit to the PR's head branch to force a fresh
      CI run. The attempt_number field discriminates first vs. second
      retry within the window.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, pr, failure_class, attempt_number]

  # META-100: RUNNER_GHOST_ONLINE detection — operator-recall condition (e).
  # Fired by scripts/dispatch/operator-recall.sh when queued workflow_runs
  # older than CHUMP_RUNNER_QUEUE_THRESHOLD_S exist AND ≥1 self-hosted runner
  # is online+idle (the contradiction that caused 14 PRs to wait 17h on
  # 2026-05-24). This event fires before the operator_recall page so consumers
  # can track detection frequency independently of cooldown-gated paging.
  - kind: runner_ghost_online_detected
    effect_metric: self
    emitter: scripts/dispatch/operator-recall.sh (META-100)
    trigger: >
      operator-recall.sh detected ≥1 queued workflow_run older than
      CHUMP_RUNNER_QUEUE_THRESHOLD_S (default 300s) while at least one
      self-hosted runner reports status=online and busy=false. Emitted
      unconditionally (not cooldown-gated) so detection frequency is
      observable even when paging is suppressed by the cooldown window.
    consumers: [operator-recall, fleet-brief, ops-audit]
    fields_required: [ts, kind, queued_count, oldest_age_s, idle_runners, threshold_s]

  # META-100: recovery script ran (scripts/ops/restart-actions-runners.sh).
  # Emitted after launchctl unload+load cycle for all configured runner plists.
  - kind: actions_runners_restarted
    effect_metric: self
    emitter: scripts/ops/restart-actions-runners.sh (META-100)
    trigger: >
      Operator (or automated recovery) ran restart-actions-runners.sh to
      cycle the launchd plists for all self-hosted GitHub Actions runner
      agents. prior_queued_count is the workflow run queue depth sampled
      immediately before the restart so the operator can confirm the queue
      drained after recovery.
    consumers: [ops-audit, fleet-brief]
    fields_required: [ts, kind, runners_restarted_count, prior_queued_count]

  # META-088: Oracle refresh cron. Periodic Opus burst (every 4h via launchd)
  # re-contemplates docs/process/THE_PATH.md against current state.db + recent
  # ambient. Emits 4 ambient kinds for observability.
  - kind: oracle_refresh_drift
    effect_metric: self
    emitter: scripts/coord/oracle-refresh.sh (META-088)
    trigger: >
      Oracle burst returned content with a different shasum than the existing
      docs/process/THE_PATH.md — the refresh produced real drift. THE_PATH.md
      has been overwritten and an auto-merge PR opened. before_hash + after_hash
      let consumers see the change magnitude.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, before_hash, after_hash]
  - kind: oracle_refresh_noop
    effect_metric: self
    emitter: scripts/coord/oracle-refresh.sh (META-088)
    trigger: >
      Oracle burst returned content with the same shasum as the existing
      THE_PATH.md — idempotent no-op. No PR opened. Useful signal for
      "Oracle ran but nothing changed" telemetry.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, hash]
  - kind: oracle_refresh_skipped
    effect_metric: self
    emitter: scripts/coord/oracle-refresh.sh (META-088)
    trigger: >
      Oracle daemon ran but could not complete a burst — either the claude
      CLI is missing OR the burst returned empty/too-short output. reason
      field discriminates causes (claude_cli_missing, empty_or_short_output).
      Fail-soft path so the daemon stays cron-able even when LLM access
      is down.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, reason]
  - kind: oracle_refresh_pr_opened
    effect_metric: self
    emitter: scripts/coord/oracle-refresh.sh (META-088)
    trigger: >
      After a drift event, the daemon successfully created an auto-merge
      PR with the refreshed THE_PATH.md. branch field is the PR's head
      branch name (chump/oracle-refresh-<stamp>).
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, branch]
  # INFRA-2122: oracle-refresh silent-failure visibility. Replaces the
  # stderr-swallowing 2>/dev/null path that masked INFRA-2124 OAuth chain
  # breakage and let THE_PATH.md sit 4d stale despite a 4h cadence claim.
  - kind: oracle_refresh_failed
    effect_metric: self
    emitter: scripts/coord/oracle-refresh.sh (INFRA-2122)
    trigger: >
      claude -p exited non-zero (auth failures like "Not logged in", OAuth
      chain breakage, transport errors). Carries exit_code + elapsed_s plus
      truncated stderr (500 chars) so the real cause surfaces in ambient
      instead of being swallowed by 2>/dev/null. Distinct from
      oracle_refresh_empty which is exit-0-but-no-output.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, exit_code, elapsed_s, stderr]
  - kind: oracle_refresh_empty
    effect_metric: self
    emitter: scripts/coord/oracle-refresh.sh (INFRA-2122)
    trigger: >
      claude -p exited 0 but returned empty/too-short output (<200 chars).
      Discriminates "model returned empty" from "auth failed" — the legacy
      oracle_refresh_skipped conflated both. Carries body_len + elapsed_s
      + stderr so operators can tell if the model just refused vs. tripped
      a transient error.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, exit_code, elapsed_s, body_len, stderr]
  - kind: oracle_stale_despite_heartbeat
    effect_metric: self
    emitter: scripts/coord/oracle-refresh.sh (INFRA-2122)
    trigger: >
      META-alarm — detector for the detector failing. THE_PATH.md mtime is
      older than CHUMP_ORACLE_STALE_THRESHOLD_S (default 12h) but the
      oracle-refresh state file was touched within CHUMP_ORACLE_HEARTBEAT_WINDOW_S
      (default 6h) — i.e., daemon is alive but its output is stale. Same
      class as INFRA-2101 binary-refresh silent-staleness. Use to alert
      operators before another 4d quiet-failure window opens.
    consumers: [fleet-brief, ops-audit, slo-watchdog]
    fields_required: [ts, kind, path_age_s, state_age_s, stale_threshold_s]
  # META-098: daily self-productization wave. Once per day a launchd cron
  # sends 6 A2A broadcast.sh DMs (one per curator role) asking the curator
  # to contemplate what changed in their lane and add delta-AC to their
  # agent.md / SKILL.md (or file a follow-up gap). Productizes the manual
  # A2A wave that spawned META-097.
  - kind: daily_self_productize_wave
    effect_metric: self
    emitter: scripts/coord/daily-self-productize.sh (META-098)
    trigger: >
      Daemon fired once per day (idempotent on same-date guard). Sends
      one broadcast.sh DM per curator role (6 total). roles_paged is the
      count of successful pages; failed is the count of failed pages.
      Consumers can compute the wave-cadence over time to verify the
      ritual runs daily.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, date, roles_paged, failed]
  # META-103: curator-opus-observability telemetry-tuning findings.
  # Emitted by scripts/coord/observability-loop.sh via printf in _emit_finding
  # helper; structured payload not grep-scannable as bare literal.
  - kind: observability_finding
    effect_metric: self
    emitter: scripts/coord/observability-loop.sh (META-103)
    trigger: >
      Emitted on each tick cycle when audit-event-registry, reaper-cadence-audit,
      cost-leaderboard-rollup, or detector-noise-rank detects an anomaly.
      category is one of: zero_emit_kind, high_volume_kind, reaper_cadence_drift,
      api_burner. severity is one of: proposal, warn, alert, info.
    consumers: [fleet-brief, ops-audit, observability-curator]
    fields_required: [ts, kind, category, severity, kind_or_subject, detail]
  # META-102: curator-opus-infra-watcher SRE-lane substrate health finding.
  # Emitted by scripts/coord/infra-watcher-loop.sh on each tick cycle when a
  # substrate health check fires above threshold. category distinguishes the
  # four check types; severity is critical|warning. Would have caught the
  # 2026-05-24 incidents (17h runner ghost-online, StartInterval-missing-plist,
  # 154 claude procs, disk_critical) within minutes of first tick.
  - kind: infra_watcher_finding
    effect_metric: self
    emitter: scripts/coord/infra-watcher-loop.sh (META-102)
    trigger: >
      One finding per substrate health violation detected during a tick cycle.
      category is one of: daemon_plist_missing_interval, runner_ghost_online,
      disk_pressure, process_bloat. severity is critical or warning.
      detail is a human-readable description of the finding with threshold
      and observed values. Emitted at most once per category per tick to
      avoid flooding. Consumers watch for critical findings to page the
      operator via operator-recall.sh.
    consumers: [fleet-brief, ops-audit, operator-recall]
    fields_required: [ts, kind, category, severity, detail]
  # INFRA-1976: repo variable drift detection — post-incident stale variable audit.
  # Emitted by scripts/coord/infra-watcher-loop.sh check-repo-vars when a repo
  # variable deviates from its expected steady-state value in
  # scripts/setup/expected-repo-vars.yaml AND the divergence has persisted >2h.
  # Root cause: CHUMP_SELF_HOSTED_ENABLED=false sat unrecovered for 4 days
  # (2026-05-20 to 2026-05-24) causing silent CI starvation. This kind surfaces
  # post-incident variable drift before it becomes a multi-day outage.
  - kind: repo_var_stale_after_incident
    effect_metric: self
    emitter: scripts/coord/infra-watcher-loop.sh (INFRA-1976)
    trigger: >
      Emitted when gh variable list shows a repo variable value that differs
      from the expected value in scripts/setup/expected-repo-vars.yaml AND
      the divergence has persisted for more than 2 hours (tracked via
      .chump-locks/repo-var-divergence-state.json). At most one event per
      variable name per infra-watcher tick to avoid flooding. The var_name and
      actual_value fields identify which variable is stale and what it currently
      holds. Consumers should page the operator to restore the expected value.
    consumers: [fleet-brief, ops-audit, operator-recall]
    fields_required: [ts, kind, var_name, expected_value, actual_value, diverged_since]
  # RESEARCH-001: phantom doc-ref detection (chump gap audit-priorities)
  - kind: phantom_doc_ref_detected
    effect_metric: self
    emitter: src/main.rs (RESEARCH-001, chump gap audit-priorities)
    trigger: >
      RESEARCH_INTEGRITY.md cites a gap ID (e.g. EVAL-094) but no matching
      docs/gaps/<ID>.yaml exists in the registry. Emitted once per phantom
      reference detected during chump gap audit-priorities --research-check.
      Indicates a stale citation that should be removed or the gap filed.
    consumers: [audit-log]
    fields_required: [ts, kind, doc, gap_id]
  # INFRA-1922: curator-opus-handoff productization. The handoff curator role
  # ships as .claude/agents/handoff.md + .claude/skills/handoff/SKILL.md +
  # scripts/coord/handoff-loop.sh (harness-neutral CLI). The CLI emits the
  # three kinds below.
  - kind: sub_agent_dispatched
    effect_metric: self
    emitter: scripts/coord/handoff-loop.sh (INFRA-1922) — also expected from other curators per META-069 / CREDIBLE-074
    trigger: >
      An Opus curator (any role) dispatched a Sonnet sub-agent via the Agent
      tool to ship a gap. Emitted per dispatch so the operator can audit the
      Opus-vs-Sonnet ratio (CREDIBLE-074). Fields: gap (target gap id), role
      (dispatching curator role), target_model (always "sonnet" today).
    consumers: [fleet-brief, ops-audit, dispatch-hygiene]
    fields_required: [ts, kind, session, gap, role, target_model]
  - kind: handoff_heartbeat
    effect_metric: self
    emitter: scripts/coord/handoff-loop.sh (INFRA-1922) heartbeat subcommand
    trigger: >
      curator-opus-handoff role tick — emitted periodically so the
      orchestrator can audit liveness. Cron-driven (launchd plist filed
      separately) or invoked manually via /handoff heartbeat.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, session, role]
  - kind: handoff_lane_override
    effect_metric: self
    emitter: scripts/coord/handoff-loop.sh (INFRA-1922) when CHUMP_HANDOFF_LANE_OVERRIDE=1
    trigger: >
