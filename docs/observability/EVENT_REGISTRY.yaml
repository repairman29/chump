  - kind: bot_merge_graphql_wedge_aborted
    effect_metric: self
    emitter: scripts/coord/bot-merge.sh (INFRA-1939)
    trigger: |
      bot-merge.sh detected a recent graphql_exhausted event in ambient.jsonl
      within the wedge-lookback window, and aborted to avoid worsening GraphQL
      starvation. The aborted ship can be retried after CHUMP_GRAPHQL_WEDGE_LOOKBACK_S
      seconds (default 1800s = 30min).
    consumers: [ops-audit, fleet-brief]
    fields_required: [ts, kind, last_graphql_exhausted, lookback_s]
    docs: scripts/coord/bot-merge.sh (INFRA-1939 wedge-guard comment block at top)

  # ── RESILIENT-trunk-RED guard (INFRA-2096): test SKIP because runner-side ──
  # capability missing (cargo, binary build, etc.). Audit-only; SKIPs are
  # transient unblocks while the underlying runner-side issue (INFRA-2086
  # silent-build-failure class) is being resolved.
  - kind: trunk_red_skip
    effect_metric: self
    emitter: scripts/ci/test-mcp-coord-smoke.sh (INFRA-2096); future similar SKIP guards.
    trigger: |
      A CI smoke test that requires a built binary (or other runtime capability)
      detected the capability missing AND chose to SKIP rather than fail. This
      lets PRs through despite runner-side trunk-RED, but each SKIP is logged
      here so the operator can audit which PRs were unblocked by SKIP vs. real
      PASS — and flip back to blocking once the runner state is healthy.
    consumers: [ops-audit, fleet-brief]
    fields_required: [ts, kind, script, gap, reason]
    docs: docs/process/CLAUDE_GOTCHAS.md (see "Runner-side cargo silent-build-failure")
  # ── INFRA-2086: chump_cargo_build loud-fail wrapper events ─────────────────
  - kind: cargo_build_failed
    effect_metric: resilient
    emitter: scripts/coord/lib/cargo-helpers.sh chump_cargo_build (INFRA-2086)
    trigger: >
      Emitted by chump_cargo_build() when a cargo build invocation fails for
      any of 4 classes: timeout (rc=124), registry_corruption (tauri/proc-macro
      pattern in stderr), compile_error (any non-zero rc), or missing_binary
      (rc=0 but expected binary path doesn't exist after build — the silent-
      failure class that surfaced as INFRA-2082).
    consumers: [ops-audit, fleet-doctor]
    fields_required: [ts, kind, package, binary, exit_code, duration_s, suspected_class]

  - kind: cargo_registry_corruption
    effect_metric: resilient
    emitter: scripts/coord/lib/cargo-helpers.sh chump_cargo_build (INFRA-2086)
    trigger: >
      Emitted when cargo build stderr matches the tauri/proc-macro registry-
      cache-corruption pattern. Carries the suspect crate name + suggested
      fix command (cargo clean -p <crate>) so the operator can recover
      without grep-archaeology.
    consumers: [ops-audit, fleet-doctor, infra-watcher]
    fields_required: [ts, kind, crate, suggested_fix]

  - kind: auto_merge_policy_bypassed
    effect_metric: resilient
    emitter: scripts/coord/bot-merge.sh (INFRA-2155)
    trigger: >
      Emitted by bot-merge.sh when CHUMP_BYPASS_AUTO_MERGE_POLICY=1
      skips the chump-policy check before arming auto-merge. Used for
      genuine recovery scenarios where the operator needs to ship past
      a policy gate; every bypass is auditable so the operator can
      review patterns (frequent bypasses on a given operator-repo =
      signal that the policy is wrong, not that the bypass is wrong).
    consumers: [ops-audit, fleet-doctor]
    fields_required: [ts, kind, pr, session]

  - kind: gap_auto_flipped
    effect_metric: effective
    emitter: .github/workflows/auto-flip-on-merge.yml (INFRA-2121)
    trigger: >
      Emitted when the auto-flip-on-merge workflow successfully runs
      chump gap ship <ID> --closed-pr <PR#> on a merged PR whose title
      contains a gap-ID. Closes the gap-registry-drift loop CI-REVIEW
      Lever 5 identified.
    consumers: [ops-audit, fleet-brief, pr-watch]
    fields_required: [ts, kind, gap, pr, outcome]

  - kind: gap_auto_flip_failed
    effect_metric: resilient
    emitter: .github/workflows/auto-flip-on-merge.yml (INFRA-2121)
    trigger: >
      Emitted when chump gap ship exits non-zero from the auto-flip
      workflow (gap unknown, YAML malformed, etc.). Non-fatal — the PR
      already merged; this only signals that the registry-side update
      did not land for operator follow-up.
    consumers: [ops-audit, fleet-doctor]
    fields_required: [ts, kind, gap, pr, reason]

  - kind: gap_backfill_flipped
    effect_metric: effective
    emitter: scripts/ops/backfill-shipped-gaps.sh (INFRA-2121)
    trigger: >
      Emitted by the one-time backfill script for each gap whose status
      it successfully flipped from open → done. Lets the operator audit
      which gaps the backfill touched without re-running it in dry-run.
    consumers: [ops-audit]
    fields_required: [ts, kind, gap, pr, source]
  - kind: reviewer_routing_computed
    effect_metric: effective
    emitter: crates/chump-reviewer-routing/src/bin/chump-reviewer-routing.rs (INFRA-1491)
    trigger: >
      Emitted by `chump-reviewer-routing show` and `route` whenever a
      reviewer set is computed. Discloses the count + suggested logins
      so an operator audit trail exists even when `route` exits without
      actually requesting (dry-run, empty set, error mid-way). Emitted
      on stderr so stdout stays parseable JSON for callers consuming
      `show --json`.
    consumers: [ops-audit, pr-watch]
    fields_required: [ts, kind, reviewer_count]

  - kind: reviewer_routing_requested
    effect_metric: effective
    emitter: crates/chump-reviewer-routing/src/bin/chump-reviewer-routing.rs (INFRA-1491)
    trigger: >
      Emitted by `chump-reviewer-routing route` only after a successful
      `gh pr edit --add-reviewer ...` call. Disambiguates "we computed a
      set" (reviewer_routing_computed) from "we actually asked GitHub to
      request these humans" (reviewer_routing_requested). Pairs cleanly
      with the auto_merge_policy_evaluated event from INFRA-1489 — both
      are the audit trail behind Marcus M-E.
    consumers: [ops-audit, pr-watch]
    fields_required: [ts, kind, pr, reviewers]
  - kind: auto_merge_policy_evaluated
    effect_metric: effective
    emitter: crates/chump-policy/src/bin/chump-policy.rs (INFRA-1489)
    trigger: >
      Emitted by `chump-policy check` when the layered policy chain
      (fleet + operator + repo, most-restrictive wins) allows auto-merge
      under the current configuration. Operator-facing audit trail for
      Marcus M-E trust-cliff knob.
    consumers: [ops-audit, bot-merge.sh integration]
    fields_required: [ts, kind, outcome]

  - kind: auto_merge_policy_blocked
    effect_metric: resilient
    emitter: crates/chump-policy/src/bin/chump-policy.rs (INFRA-1489)
    trigger: >
      Emitted by `chump-policy check` when the layered policy chain
      blocks auto-merge. Carries the contributing scope(s) so the
      operator can see WHICH scope (fleet / operator / repo) drove the
      block — kills the "silent auto-merge refused, why?" debugging tax.
    consumers: [ops-audit, bot-merge.sh integration]
    fields_required: [ts, kind, reason, contributing]

  # ── Integration-cycle pipeline (META-124 / INFRA-2130) ────────────────────
  - kind: integration_cycle_started
    effect_metric: effective
    emitter: scripts/coord/integration-cycle.sh (INFRA-2130)
    trigger: >
      Emitted at the very beginning of an integration-cycle run, before
      candidate selection. Operator can correlate this ts with
      integration_cycle_shipped to measure wall-clock cycle latency.
    consumers: [fleet-brief, kpi-report, ops-audit]
    fields_required: [ts, kind, cycle_id, trigger_reason, candidate_count]
    expected_volume: "1 per integration cycle run"
    # payload: {cycle_id: string, trigger_reason: string, candidate_count: number, ts: string}

  - kind: integration_candidates_selected
    effect_metric: effective
    emitter: scripts/coord/integration-cycle.sh (INFRA-2130)
    trigger: >
      Emitted after the cycle selects its candidate set but before any
      merging begins. The manifest array lets post-mortem queries
      reconstruct exactly which branches were in-flight for a given cycle.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, cycle_id, manifest]
    expected_volume: "1 per integration cycle run"
    # payload: {cycle_id: string, manifest: Array<{gap_id: string, branch: string, loc: number, priority: string, queue_age_s: number}>, ts: string}

  - kind: integration_cycle_merges
    effect_metric: effective
    emitter: scripts/coord/integration-cycle.sh (INFRA-2130)
    trigger: >
      Per-cycle AGGREGATE emitted once after all branch merges in a
      cycle complete (replaces per-merge fanout). Carries a merges array
      summarising every branch merged in the cycle — lower ambient noise
      while preserving full audit trail. Observability-curator amendment
      per INFRA-2132: prefer aggregate over per-event fanout for
      high-frequency in-cycle events.
    consumers: [fleet-brief, kpi-report, ops-audit]
    fields_required: [ts, kind, cycle_id, merges]
    expected_volume: "1 per integration cycle run"
    # payload: {cycle_id: string, merges: Array<{gap_id: string, branch: string, parent_sha: string, merge_sha: string}>, ts: string}

  - kind: integration_preflight_started
    effect_metric: resilient
    emitter: scripts/coord/integration-cycle.sh (INFRA-2130)
    trigger: >
      Emitted when the cycle begins running the preflight checks on the
      assembled integration branch. Pairs with integration_preflight_failed
      or integration_cycle_shipped to bound preflight duration.
    consumers: [fleet-brief, ops-audit]
    fields_required: [ts, kind, cycle_id, branch, expected_duration_s]
    expected_volume: "1 per integration cycle run"
    # payload: {cycle_id: string, branch: string, expected_duration_s: number, ts: string}

  - kind: integration_preflight_failed
    effect_metric: resilient
    emitter: scripts/coord/integration-cycle.sh (INFRA-2130)
    trigger: >
      Emitted when the integration-branch preflight fails before a ship
      attempt. Carries the failure_class so the CI-audit loop can bucket
      this as flake vs. logic-bug without re-reading logs manually.
    consumers: [fleet-brief, ci-audit, ops-audit]
    fields_required: [ts, kind, cycle_id, branch, failure_class, log_path]
    expected_volume: "0-N per integration cycle run; 0 on green cycles"
    # payload: {cycle_id: string, branch: string, failure_class: string, log_path: string, ts: string}

  - kind: ship_bisect_root_cause
    effect_metric: resilient
    emitter: scripts/coord/integration-cycle.sh (INFRA-2130)
    trigger: >
      Emitted when a post-ship bisect identifies the offending gap
      (commit) that caused a cycle failure. Carries bisect_steps_taken
      so tooling can monitor bisect efficiency over time.
    consumers: [ci-audit, ops-audit, fleet-brief]
    fields_required: [ts, kind, cycle_id, offending_gap_id, failure_signature, bisect_steps_taken]
    expected_volume: "0-1 per failed cycle that runs bisect"
    # payload: {cycle_id: string, offending_gap_id: string, failure_signature: string, bisect_steps_taken: number, ts: string}

  - kind: bisect_quarantine
    effect_metric: resilient
    emitter: scripts/coord/integration-cycle.sh (INFRA-2130)
    trigger: >
      Emitted when the bisect result is used to quarantine a gap branch,
      pulling it out of the integration queue. requeue_status indicates
      whether the gap was re-opened for rework ("requeued") or held
      ("held") pending operator review.
    consumers: [ci-audit, ops-audit, waste-tally]
    fields_required: [ts, kind, cycle_id, quarantined_gap_id, reason, requeue_status]
    expected_volume: "0-1 per ship_bisect_root_cause event"
    # payload: {cycle_id: string, quarantined_gap_id: string, reason: string, requeue_status: "requeued"|"held", ts: string}

  - kind: integration_cycle_shipped
    effect_metric: effective
    emitter: scripts/coord/integration-cycle.sh (INFRA-2130)
    trigger: >
      Emitted once after a full integration cycle lands successfully on
      main. Carries the final manifest, PR URL, and wall_time_s so
      kpi-report can compute throughput and cycle latency without log
      parsing. Cross-reference: pr_merged events for individual GAP PRs
      within the cycle.
    consumers: [fleet-brief, kpi-report, ops-audit, waste-tally]
    fields_required: [ts, kind, cycle_id, final_manifest, pr_url, merge_sha, total_loc, wall_time_s]
    related_kinds: [pr_merged]
    expected_volume: "1 per successful integration cycle"
    # payload: {cycle_id: string, final_manifest: Array<{gap_id: string, branch: string}>, pr_url: string, merge_sha: string, total_loc: number, wall_time_s: number, ts: string}

  - kind: cycle_sampling_decision
    effect_metric: credible
    emitter: scripts/coord/integration-cycle.sh (INFRA-2130)
    trigger: >
      Phase 2 marker. Emitted when the cycle's sampling logic decides
      whether to include or exclude a candidate gap based on probabilistic
      or priority-weighted selection. Enables post-hoc analysis of
      sampling fairness across gap classes.
    consumers: [kpi-report, ops-audit]
    fields_required: [ts, kind, cycle_id, gap_id, decision, reason]
    expected_volume: "N per cycle (one per candidate evaluated)"
    status: stable
    # payload: {cycle_id: string, gap_id: string, decision: "include"|"exclude", reason: string, ts: string}

  # META-127 C3c — curator-opus-velocity-tracker (INFRA-2221)
  - kind: velocity_tracker_tick
    effect_metric: credible
    emitter: .claude/agents/curator-opus-velocity-tracker.md (INFRA-2221)
    trigger: >
      Emitted once per 7-day window by curator-opus-velocity-tracker after
      computing P50 ship-time, throughput (ships/day), and flake rate
      (test_flake events per merge) from ambient.jsonl + state.db.
      Carries week-over-week deltas and regressed=true flags for any metric
      that crossed its regression threshold (>20% for ship-time/throughput,
      >50% for flake rate). Emitted with force=true if operator dispatched
      an out-of-window tick.
    consumers: [orchestrator, kpi-report, curator-opus-incident-commander]
    fields_required: [ts, kind, session, p50_ship_time_s, p50_delta_pct, throughput_ships_per_day, throughput_delta_pct, flake_rate_per_ship, flake_delta_pct, window_days]
    expected_volume: "1 per 7-day window; operator may force additional ticks"
    # payload: {p50_ship_time_s: number, p50_delta_pct: number, throughput_ships_per_day: number, throughput_delta_pct: number, flake_rate_per_ship: number, flake_delta_pct: number, regressions: string[], window_days: number, low_sample: boolean, force: boolean, ts: string}

  # META-127 C3d — curator-opus-incident-commander (INFRA-2222)
  - kind: incident_commander_engaged
    effect_metric: resilient
    emitter: .claude/agents/curator-opus-incident-commander.md (INFRA-2222)
    trigger: >
      Emitted when curator-opus-incident-commander activates in response to
      a trunk-red condition (fleet_wedge, pr_stuck cluster ≥3 in 2h,
      operator_recall with condition=CI_BROKEN, or trunk_red event).
      Re-emitted at each rescue playbook step milestone (step=1..5) and
      again when the incident is resolved (status=resolved), escalated
      (status=escalated), or determined to be a false positive
      (status=false_positive). Enables post-incident timeline reconstruction
      without log parsing.
    consumers: [orchestrator, ops-audit, fleet-brief, kpi-report]
    fields_required: [ts, kind, session, status, trigger]
    expected_volume: "0-1 per incident declaration; N step-milestone events per active incident"
    # payload: {status: "active"|"resolved"|"escalated"|"false_positive", trigger: string, step: number|null, action: string|null, ts: string}

  # META-127 C3e — curator-opus-architecture-coach (INFRA-2223)
  - kind: arch_fit_query
    effect_metric: credible
    emitter: .claude/agents/curator-opus-architecture-coach.md (INFRA-2223)
    trigger: >
      Emitted by curator-opus-architecture-coach when it begins evaluating
      a gap for architectural fit. Marks the start of the review so
      consumers can detect gaps that received a query but no subsequent
      arch_fit_decision (stalled reviews). Carries the gap_id and effort
      so kpi-report can compute coach coverage by effort tier.
    consumers: [orchestrator, kpi-report]
    fields_required: [ts, kind, session, gap_id, effort]
    expected_volume: "0-N per session (one per gap reviewed, effort >= m by default)"
    # payload: {gap_id: string, effort: string, needs_prior_art: boolean, ts: string}

  - kind: arch_fit_decision
    effect_metric: credible
    emitter: .claude/agents/curator-opus-architecture-coach.md (INFRA-2223)
    trigger: >
      Emitted by curator-opus-architecture-coach after completing an
      architectural fit review for a gap. Carries the rating
      (fit | stretch | fork), rationale citing a specific architectural
      principle, and confidence level. A retracted decision is re-emitted
      with rating=retracted and the original_rating field set.
      Downstream: orchestrator decides whether to hold work on fork ratings;
      decompose uses the rating as one input to sub-gap slicing.
    consumers: [orchestrator, decompose, kpi-report, ops-audit]
    fields_required: [ts, kind, session, gap_id, rating, rationale, confidence]
    related_kinds: [arch_fit_query]
    expected_volume: "0-N per session (paired with arch_fit_query events)"
    # payload: {gap_id: string, rating: "fit"|"stretch"|"fork"|"retracted", rationale: string, confidence: "high"|"med"|"low", original_rating: string|null, correction: boolean, ts: string}
  - kind: bisect_step_evaluated
    effect_metric: resilient
    emitter: scripts/dev/integration-bisect-step.sh (INFRA-2168)
    trigger: >
      Emitted after each git bisect step completes in the integration-cycle
      bisect oracle. Records whether the commit was classified as good (0),
      bad (1), or skip/flake (125), along with which flake class matched (if
      any) and the wall-clock duration. Enables post-hoc analysis of bisect
      efficiency and flake-class hit rates without log parsing.
    consumers: [ci-audit, ops-audit, kpi-report]
    fields_required: [ts, kind, commit, outcome, duration_s, matched_class]
    expected_volume: "N per bisect run (one per commit evaluated)"
    status: stable
    # payload: {commit: string (short sha), outcome: "good"|"bad"|"skip", duration_s: float, matched_class: string (id or "none"), ts: string}
