    emitter: opus curator (META-054, ad-hoc)
    trigger: opus curator publishes docs/ROADMAP_OPUS_SEQUENCING.md
    consumers: [fleet-brief, audit-log]
    fields_required: [ts, kind, gap, path]
    docs: |
      One-shot event marking that the opus-curator wave-sequencing roadmap
      doc was (re-)published. Useful for after-the-fact "when did sequencing
      change?" reconstruction.

  - kind: fleet_resize_decision
    emitter: src/main.rs (chump fleet auto-resize, INFRA-650)
    trigger: fleet auto-resize evaluated 4 conditions (queue-empty, cost-cap,
      flat-ship-rate, operator-absent) and produced a resize recommendation
    consumers: [fleet-brief, operator-recall, opus-curator]
    fields_required: [ts, kind, trigger, current_size, recommended_size, rationale]

