      paths, CI red on main, green-test regression)
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, inv, details]

  - kind: invariant_recovered
    effect_metric: self
    emitter: scripts/ops/system-invariants-monitor.sh (META-033)
    trigger: an invariant that was previously violating is now passing
    consumers: [fleet-brief]
    fields_required: [ts, inv]

  - kind: model_selected
    effect_metric: self
    emitter: scripts/dispatch/worker.sh (INFRA-843)
    trigger: worker picks a gap; emitted once per cycle to record which model was
      selected and why (gap.required_model override vs. routing.yaml vs. default)
    consumers: [fleet-brief, audit-log]
    fields_required: [ts, kind, gap_id, requested, actual, reason]
    docs: |
      reason values: gap_required_model (gap.required_model set and used),
      routing_yaml (INFRA-471 resolved a model from routing.yaml),
      fleet_model_default (FLEET_MODEL env with no override).
      requested = gap.required_model or '' if not set.
      actual = FLEET_MODEL after all overrides.

  # ── INFRA-906: per-gap performance profiling ──────────────────────────────
  - kind: gap_perf_sample
    effect_metric: self
    emitter: scripts/ci/emit-gap-timing.sh (INFRA-906)
    trigger: emitted by emit-gap-timing.sh wrapper after any timed CI phase
      completes; records wall-clock duration and exit code for p50/p95 analysis
    consumers: [fleet-brief, gap-perf-report]
    fields_required: [ts, kind, gap_id, phase, duration_ms, exit_code, host]
    docs: |
      phase values: lint, test, build, e2e (or any custom label)
      duration_ms: wall-clock milliseconds for the wrapped command
      exit_code: exit status of the wrapped command (0 = success)
      host: short hostname for cross-machine comparison
      Consumers: scripts/ops/gap-perf-report.sh computes p50/p95 per (gap_id,phase)

  # ── INFRA-879: credential lifecycle ───────────────────────────────────────
  - kind: credential_rotation_due
    effect_metric: self
    emitter: scripts/ops/credential-lifecycle.sh (INFRA-879)
    trigger: a tracked credential (ANTHROPIC_API_KEY, GH_TOKEN) has exceeded the
      rotation policy age (CHUMP_CRED_MAX_AGE_DAYS, default 90d); emitted once
      per over-age credential per invocation of credential-lifecycle.sh
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, cred_name, age_days, max_age_days]

  # ── INFRA-895: manual gap run-now trigger ─────────────────────────────────
  - kind: gap_run_now_triggered
    effect_metric: self
    emitter: scripts/ops/gap-run-now.sh (INFRA-895)
    trigger: operator manually invoked gap-run-now.sh to dispatch a gap outside
      the normal scheduler cycle; emitted before worker invocation (or instead
      of it in --dry-run mode)
    consumers: [fleet-brief, audit-log]
    fields_required: [ts, kind, gap_id, model, timeout_s, dry_run]

  - kind: worker_timeout_scaled
    effect_metric: self
    emitter: scripts/dispatch/worker.sh (INFRA-1160)
    trigger: worker scaled FLEET_TIMEOUT_S by the gap's effort estimate before
      spawning the claude subprocess. xs=0.5×, s=1.0×, m=1.5×, l=2.0×, xl=3.0×,
      capped at CHUMP_WORKER_TIMEOUT_MAX_S (default 7200s).
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, gap_id, effort, base_timeout_s, scaled_timeout_s]

  - kind: worker_timeout_no_commit
    effect_metric: self
    emitter: scripts/dispatch/worker.sh (INFRA-831)
    trigger: FLEET_TIMEOUT_S expired (rc=124) and claude produced no git commit
      during the cycle; worker attempted a WIP rescue commit via chump-commit.sh
      before releasing the lease. rescue_committed=1 means the rescue succeeded.
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, agent_id, gap_id, timeout_s, rescue_committed]

  - kind: worker_first_output_timeout
    effect_metric: self
    emitter: scripts/dispatch/worker.sh (INFRA-828)
    trigger: claude subprocess produced no stdout within CHUMP_FIRST_OUTPUT_TIMEOUT_S
      (default 120s) and all retries (CHUMP_RETRY_TIMEOUT_S, max 2) were also
      timed out — worker killed subprocess and is moving to next cycle
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, agent_id, gap_id, elapsed_s, retries]

  # ── INFRA-765: stacked PR auto-rebase ─────────────────────────────────────
  - kind: stacked_pr_rebase_scan
    effect_metric: self
    emitter: scripts/coord/rebase-stacked-prs.sh (INFRA-765)
    trigger: base PR merged — rebase-stacked-prs.sh scanned for open PRs with
      base=merged_branch. stacked_count=0 means no stacked PRs found.
    consumers: [fleet-brief]
    fields_required: [ts, kind, merged_branch, stacked_count]

  - kind: stacked_pr_rebased
    effect_metric: self
    emitter: scripts/coord/rebase-stacked-prs.sh (INFRA-765)
    trigger: a PR stacked on a just-merged base branch was rebased onto
      origin/main and auto-merge was re-armed. status=ok or status=failed.
    consumers: [fleet-brief, waste-tally]
    fields_required: [ts, kind, merged_branch, stacked_pr, stacked_branch, status]

  # ── INFRA-539: gh API probe ────────────────────────────────────────────────
  - kind: github_unreachable
    effect_metric: self
    emitter: scripts/coord/bot-merge.sh, scripts/dispatch/run-fleet.sh (INFRA-539, CREDIBLE-032)
    trigger: gh installed but api /rate_limit probe fails; backward-compat alias emitted
      alongside gh_errored — consumers may watch either kind
    consumers: [fleet-brief, operator-recall, watchdogs]
    fields_required: [ts, kind, source, exit_code, note]

  # ── CREDIBLE-032: gh failure-class taxonomy ───────────────────────────────
  - kind: gh_missing
    effect_metric: self
    emitter: scripts/coord/bot-merge.sh, scripts/dispatch/run-fleet.sh (CREDIBLE-032)
    trigger: gh CLI binary not found in PATH at probe time
    consumers: [fleet-brief, watchdogs]
    fields_required: [ts, kind, source, note]

  - kind: gh_errored
    effect_metric: self
    emitter: scripts/coord/bot-merge.sh, scripts/dispatch/run-fleet.sh (CREDIBLE-032)
    trigger: gh binary present but api /rate_limit call failed (auth error, rate-limit,
      network timeout, or any non-zero exit)
    consumers: [fleet-brief, operator-recall, watchdogs]
    fields_required: [ts, kind, source, exit_code, note]

  # ── INFRA-999: per-call GitHub API cost telemetry ─────────────────────────
  - kind: github_api_call
    effect_metric: self
    emitter: scripts/coord/lib/github.sh (chump_gh, chump_gh_record)
    trigger: any wrapped gh invocation. Records script name, 1-2 token api tag,
      remaining_core + remaining_graphql at time of call, elapsed ms, rc.
      Used to rank which scripts burn which rate-limit bucket (INFRA-1000).
    consumers: [api-cost-report]
    fields_required: [ts, kind, script, api, remaining_core, remaining_graphql, used_ms, rc]

  # ── INFRA-995: pre-push staleness gate ────────────────────────────────────
  - kind: stale_branch_blocked
    effect_metric: self
    emitter: scripts/coord/bot-merge.sh (INFRA-995); src/main.rs chump gap ship (INFRA-1007)
    trigger: branch is >threshold (default 15) commits behind origin/main. phase=pre-push
      from bot-merge.sh; phase=gap-ship from the Rust manual-ship path.
    consumers: [waste-tally, fleet-brief]
    fields_required: [ts, kind, branch, behind, threshold, phase]

  # ── INFRA-1042: doc-only fast-path attribution ─────────────────────────────
  - kind: bot_merge_doc_only_fastpath
    effect_metric: self
    emitter: scripts/coord/bot-merge.sh (INFRA-1042, builds on INFRA-920)
    trigger: bot-merge auto-detects shell/doc-only diff (no .rs files) and skips
      cargo test + cargo clippy entirely. Each emission represents ~2-3 min saved
      vs the full pipeline (DOC-036 baseline 2m36s clippy for 1-line README).
    consumers: [waste-tally, fleet-brief]
    fields_required: [ts, kind, branch, files_changed, saved_steps]

  # ── META-059: gap-closure drift detector ──────────────────────────────────
  - kind: gap_closure_drift
    effect_metric: self
    emitter: scripts/coord/gap-doctor-reconcile.py --check-closure-drift (META-059)
    trigger: open gap has closed_pr set AND that PR is state=merged — the
      "OPEN-BUT-LANDED" antipattern bot-merge.sh:243 warns about but doesn't
      catch on its own. Surfaces silent auto-close failures.
    consumers: [fleet-brief, operator-recall, audit-priorities]
    fields_required: [ts, kind, gap_id, pr_number, merged_at, source]
  # ── INFRA-1040: graphql exhaustion fleet-wide signal ──────────────────────
  - kind: graphql_exhausted
    effect_metric: self
    emitter: scripts/coord/lib/github.sh (INFRA-1040, piggyback on every chump_gh call)
    trigger: GitHub GraphQL bucket remaining_graphql <= CHUMP_GH_EXHAUSTED_THRESHOLD
      (default 100). Debounced to once per reset window via
      .chump-locks/.graphql-exhausted-since. Lets every fleet agent pivot to
      REST-only paths (INFRA-1016 / `--rest-only`) without each having to
      discover exhaustion by hitting its own failed gh call first.
    consumers: [chump-ambient-glance, fleet-brief, operator-recall]
    fields_required: [ts, kind, threshold_seen, resets_at, source]

  # ── INFRA-1034: bot-merge per-PID log discoverability ─────────────────────
  - kind: bot_merge_log_started
    effect_metric: self
    emitter: scripts/coord/bot-merge.sh (INFRA-1034)
    trigger: bot-merge.sh sets up tee redirection to .chump-locks/bot-merge-<pid>.log.
      One emit per script invocation; lets operator-recall / chump-ambient-glance
      surface "bot-merge currently running, tail -f <path>" without scanning ps.
    consumers: [chump-ambient-glance, fleet-brief, operator-recall]
    fields_required: [ts, kind, pid, log_path, branch]

  # ── INFRA-1079: chump_gh secondary rate-limit self-throttle ──────────────
  - kind: gh_self_throttled
    effect_metric: graphql_call_rate_drop_after_emit
    emitter: scripts/coord/lib/github.sh chump_gh (INFRA-1079, INFRA-1112)
    trigger: class-specific token-bucket window detected >= cap calls in the last
      60s. INFRA-1112 splits into mutation bucket (CHUMP_GH_MUTATION_MAX=15/min)
      and query bucket (CHUMP_GH_QUERY_MAX=60/min). chump_gh sleeps 1s and retries;
      after 30s of waiting (fail-safe) it lets the call through with fail_safe=true
      so the fleet does not deadlock on a stuck counter. Each delay emits one event.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, script, api_class, waited_ms, calls_in_window]
  # ── INFRA-1077: daily API cost leaderboard digest ─────────────────────────
  - kind: api_cost_digest_emitted
    effect_metric: self
    emitter: scripts/dev/api-cost-leaderboard.sh --emit-ambient (INFRA-1077)
    trigger: launchd com.chump.api-cost-digest daily at 09:00 local — analyzes
      24h of kind=github_api_call events (INFRA-999 telemetry), emits a single
      digest with top burner identified. Lets fleet-brief surface "today's top
      script + api" without re-scanning ambient on every consumer call.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, window_hours, total_calls, top_script, top_api, total_estimated_points]

  # ── INFRA-1080: chump_gh pre-emptive backoff for low-GraphQL background calls
  - kind: gh_preempted
    effect_metric: self
    emitter: scripts/coord/lib/github.sh chump_gh (INFRA-1080)
    trigger: a background call (CHUMP_GH_CALL_CRITICALITY=background) hit
      chump_gh when remaining_graphql is below CHUMP_GH_BACKOFF_THRESHOLD %
      of the limit (default 10 %). The helper sleeps min(60s, time_to_reset)
      then re-checks. Critical calls are never preempted. Logs before / after
      remaining-percent so consumers see how much the wait helped.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, script, api, waited_s, remaining_percent_before, remaining_percent_after]

  # ── INFRA-1115: a2a mailbox primitive ─────────────────────────────────────
  - kind: inbox_advance
    effect_metric: self
    emitter: scripts/coord/chump-inbox.sh (INFRA-1115)
    trigger: a session ran `chump-inbox.sh read` and the cursor was advanced
      past one or more new messages. Emitted once per read; the count tells
      auditors how many messages the recipient consumed in this read.
    consumers: [fleet-brief, operator-recall, waste-tally]
    fields_required: [ts, kind, session, messages_read, new_offset]

  - kind: inbox_archived
    effect_metric: self
    emitter: scripts/coord/inbox-reap.sh (INFRA-1115)
    trigger: reaper detected a dead session (lease expired past grace
      window) with an unread inbox. The inbox was gzip-archived to
      .chump-locks/inbox-archive/<session>/<yyyy-mm>.jsonl.gz and the live
      inbox file deleted. Operator-recall surfaces this in case the
      original recipient's work was time-sensitive.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, session, unread_messages, archive]

  # ── INFRA-1117: chump pr nudge auto-diagnosis + structured comment ────────
  - kind: pr_nudged
    effect_metric: self
    emitter: scripts/coord/chump-pr-nudge.sh (INFRA-1117)
    trigger: scripts/coord/chump-pr-nudge.sh classified a stuck PR
      (dirty / blocked-ci / orphan-disarmed / base-modified / clean-not-merged),
      rendered the matching template, and posted a structured comment via
      REST. Cooldown: same (pr,sha,class) within
      CHUMP_NUDGE_COOLDOWN_HOURS (default 24h) skipped with NOTE.
    consumers: [fleet-brief, operator-recall, waste-tally]
    fields_required: [ts, kind, pr, sha, class]

  # ── INFRA-1116: INTENT-overlap gate at claim time ─────────────────────────
  - kind: intent_overlap_detected
    effect_metric: self
    emitter: scripts/coord/intent-overlap-check.sh (INFRA-1116)
    trigger: gap-preflight detected another live session's INTENT with
      overlapping path scope to the claiming session's CHUMP_CLAIM_PATHS.
      Preflight refuses with exit 14; operator coordinates or sets
      CHUMP_CLAIM_FORCE_OVERLAP=1 with a reason. Surfaces silent claim
      races (INFRA-779 family) that would otherwise produce concurrent
      shipping of the same gap.
    consumers: [fleet-brief, operator-recall, waste-tally]
    fields_required: [ts, kind, session, gap, my_paths, conflicting]

  - kind: intent_overlap_overridden
    effect_metric: self
    emitter: scripts/coord/intent-overlap-check.sh (INFRA-1116)
    trigger: caller set CHUMP_CLAIM_FORCE_OVERLAP=1 to bypass an
      overlap-detected refusal. CHUMP_CLAIM_OVERRIDE_REASON='<text>' is
      recorded for audit. Operator-recall surfaces these so repeat-bypass
      patterns are visible.
    consumers: [fleet-brief, operator-recall, audit-priorities]
    fields_required: [ts, kind, session, gap, paths, reason]

  - kind: intent_announced
    effect_metric: self
    emitter: src/atomic_claim.rs emit_intent_announced() (INFRA-1116)
    trigger: chump claim succeeds and emits this event so subsequent
      claiming sessions' INTENT gates can detect path overlap. Emitted with
      paths (from --paths CSV) and expires_at (= claim time + 4h TTL).
      Sessions without --paths emit nothing (undeclared scope = no overlap
      detection, not a refusal).
    consumers: [check_intent_overlap, fleet-brief, operator-recall]
    fields_required: [ts, kind, gap_id, session_id, paths, expires_at]

  - kind: intent_retracted
    effect_metric: self
    emitter: src/atomic_claim.rs emit_intent_retracted() via chump --release (INFRA-1116)
    trigger: chump --release emits this event so other sessions' overlap
      gates immediately treat this session as inactive even if expires_at
      has not passed. check_intent_overlap filters retracted sessions from
      the live set before checking overlap.
    consumers: [check_intent_overlap, fleet-brief, operator-recall]
    fields_required: [ts, kind, gap_id, session_id]

  - kind: intent_refreshed
    effect_metric: self
    emitter: scripts/dispatch/worker.sh heartbeat loop (INFRA-1116)
    trigger: worker heartbeat loop emits this every 30s while claude is
      running to confirm the INTENT is still active. Consumers can infer
      that a session with no recent intent_refreshed (and a stale lease)
      is inactive even before expires_at passes.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, gap_id, session_id]

  # ── INFRA-1081: GitHub webhook cache ─────────────────────────────────────
  - kind: webhook_event_received
    effect_metric: self
    emitter: scripts/ops/github-webhook-receiver.py (INFRA-1081)
    trigger: a validated GitHub webhook (HMAC-SHA256 pass) was processed.
      Receiver upserts pr_state in .chump/github_cache.db. Consumers
      (queue-driver, etc.) read from cache instead of polling.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, event_type, action, pr_number]

  - kind: webhook_event_rejected
    effect_metric: self
    emitter: scripts/ops/github-webhook-receiver.py (INFRA-1081)
    trigger: webhook delivery failed HMAC-SHA256 validation or arrived
      malformed. Receiver returned 401/400. Either operator's secret is wrong,
      smee/webhook misconfigured, or an unauthorized POST hit the local port.
    consumers: [fleet-brief, operator-recall, watchdogs]
    fields_required: [ts, kind, reason, source_ip]

  - kind: cache_drift
    effect_metric: self
    emitter: scripts/ops/github-cache-reconcile.sh (INFRA-1081)
    trigger: periodic reconcile (every 5 min) found a pr_state row whose
      columns differ from a single gh api pulls?state=open call. Catches
      missed webhook deliveries.
    consumers: [fleet-brief, operator-recall]
    fields_required: [ts, kind, pr_number, columns]

  - kind: cache_hit
    effect_metric: gh_rest_call_count_24h_drop
    emitter: scripts/coord/lib/github_cache.sh (CREDIBLE-064)
    trigger: cache_lookup_pr / cache_query_behind_prs / cache_lookup_checks
      returns data from sqlite without a REST API call.
    consumers: [scripts/dev/cache-hit-rate.sh, fleet-brief]
    fields_required: [ts, kind, helper, target, age_s]

  - kind: cache_miss
    effect_metric: cache_hit_rate_24h
    emitter: scripts/coord/lib/github_cache.sh (INFRA-1081, CREDIBLE-064)
    trigger: a cache helper found no row, a stale row (TTL expired), or
      DB missing. Helper falls back to REST API and writes the result back.
    consumers: [fleet-brief, operator-recall, scripts/dev/cache-hit-rate.sh]
    fields_required: [ts, kind, helper, target, reason]

  - kind: cache_refilled
    effect_metric: self
    emitter: scripts/coord/lib/github_cache.sh (INFRA-1275)
    trigger: cache_refresh_open_prs fetched the /pulls?state=open list via
