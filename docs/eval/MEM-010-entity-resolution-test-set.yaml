# MEM-010 — Entity Resolution Test Set
# 30 entity pairs: 20 should-link (same underlying entity, different surface forms)
#                  10 should-not-link (genuinely different entities)
#
# Derived from MEM-008 fixture categories:
#   entity-chain   -> alias / nickname / informal reference patterns
#   temporal-chain -> same gap/commit referred to by ID vs. title vs. PR number
#   causal-chain   -> same system component referred to by module vs. crate vs. colloquial name
#
# Entity normalization rule tested: clean_entity() in memory_graph.rs
#   - lowercases the string
#   - strips leading "the ", "a ", "an "
#   - trims leading/trailing non-alphanumeric characters
# "should_link: true"  means both surface forms MUST normalize to the same string.
# "should_link: false" means they MUST normalize to DIFFERENT strings.
#
# NOTE: pair MEM010-link-005 documents a KNOWN LINKER LIMITATION:
# underscore-form ("memory_db") vs space-form ("memory db") are NOT resolved
# by clean_entity alone. It is filed in the not-link bucket intentionally.

