- id: EFFECTIVE-020
  domain: EFFECTIVE
  title: "EFFECTIVE: rename .claude/worktrees -> .chump/worktrees + CLAUDE.md -> AGENTS.md as canonical, with backward-compat aliases"
  status: open
  priority: P1
  effort: s
  description: |
    .claude/worktrees/ and CLAUDE.md are baked into many places (scripts,
    docs, src). The naming says "this project is Claude-specific" when
    chump-first doctrine is that Claude is one backend. AGENTS.md already
    exists as the agent-coordination doc; CLAUDE.md is the operator-doctrine
    overlay. Canonicalize on AGENTS.md (agent-vendor-agnostic) with CLAUDE.md
    as an alias for one deprecation cycle.
  acceptance_criteria:
    - "Move .claude/worktrees/ to .chump/worktrees/; keep .claude/worktrees as a symlink for one cycle (operator removes manually after grace period)"
    - "Update all scripts/code that hard-code `.claude/worktrees` to use `.chump/worktrees` (grep scripts/ src/ — ~50 hits expected); keep a fallback that checks both for one cycle"
    - "Rename CLAUDE.md → AGENTS.md (AGENTS.md already exists with related content; merge); CLAUDE.md becomes a 1-line redirect for backward compat"
    - "Update CLAUDE.md / AGENTS.md content so it's worker-agnostic where possible (the 'Default model: haiku for IDE / sonnet for fleet' bit can stay as a Claude-specific section, but the rest should generalize)"
    - "scripts/ci/test-canonical-paths.sh: assert .chump/worktrees exists and is preferred; .claude/worktrees only as legacy alias"
    - "Update docs/process/CANONICAL_STATE_CONTRACT.md (shipped today) and docs/process/CLAUDE_GOTCHAS.md (rename to AGENT_GOTCHAS.md) to reflect new canonical paths"
    - "Backward-compat: scripts/coord/gap-claim.sh + chump claim accept either path for one cycle, emit deprecation warning on the old"
    - "Pairs with EFFECTIVE-017/018/019 — together these complete the chump-first universalization"
