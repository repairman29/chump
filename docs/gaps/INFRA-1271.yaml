  notes: |
    [2026-05-14T18:13:08Z] Today (2026-05-14): user pointed out I hardcoded inbox-first picker preference without asking the fleet. There is no channel for an agent to say 'this default fights my use case.' The six existing events are all operational state. FEEDBACK closes that gap.

