- id: INFRA-778
  domain: INFRA
  title: "EFFECTIVE: fleet CI-fix pickup — agents must fix their own red PRs before picking new gaps"
  status: open
  priority: P1
  effort: m
  acceptance_criteria: |
    Currently, when a fleet agent ships a PR and CI goes red, the PR
    sits BLOCKED indefinitely. No agent picks up the fix. The operator
    must manually intervene (usually with Opus) to unblock the pipeline.

    As of 2026-05-08, all 5 open PRs were BLOCKED simultaneously.
    Failure modes observed:
    - Undeclared env vars (fast-checks audit)
    - Clippy lint regressions (nonminimal_bool)
    - Test regressions (neuromod default changed, test not updated)
    - Test fixtures missing required files (Cargo.toml in temp clone)
    - Gap status stale on branch (shipped on main via different PR)

    Required:
    1. After bot-merge.sh arms auto-merge, the agent (or dispatcher)
       must poll CI status within a configurable window (default 10 min).
    2. If any *required* check fails (test, audit, ACP), the agent
       enters a "CI-fix" mode: read the failure log, diagnose, fix, and
       push a follow-up commit.
    3. If the agent cannot fix within 2 attempts, it emits a
       `kind=ci_fix_failed` event to ambient.jsonl and moves on.
    4. The gap picker should prioritize "CI-fix" work over new gaps
       (a red PR is higher priority than a new xs gap).

    Test: Ship a PR with a deliberate clippy lint; verify the agent
    detects the failure, pushes a fix commit, and the PR goes green.
