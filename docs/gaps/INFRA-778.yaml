- id: INFRA-778
  domain: INFRA
  title: 'EFFECTIVE: fleet CI-fix pickup — agents must fix their own red PRs before picking new gaps'
  status: done
  priority: P1
  effort: m
  acceptance_criteria: "Currently, when a fleet agent ships a PR and CI goes red, the PR\nsits BLOCKED indefinitely. No agent\
    \ picks up the fix. The operator\nmust manually intervene (usually with Opus) to unblock the pipeline.\n\nAs of 2026-05-08,\
    \ all 5 open PRs were BLOCKED simultaneously.\nFailure modes observed:\n- Undeclared env vars (fast-checks audit)\n- Clippy\
    \ lint regressions (nonminimal_bool)\n- Test regressions (neuromod default changed, test not updated)\n- Test fixtures\
    \ missing required files (Cargo.toml in temp clone)\n- Gap status stale on branch (shipped on main via different PR)\n\
    \nRequired:\n1. After bot-merge.sh arms auto-merge, the agent (or dispatcher)\n   must poll CI status within a configurable\
    \ window (default 10 min).\n2. If any *required* check fails (test, audit, ACP), the agent\n   enters a \"CI-fix\" mode:\
    \ read the failure log, diagnose, fix, and\n   push a follow-up commit.\n3. If the agent cannot fix within 2 attempts,\
    \ it emits a\n   `kind=ci_fix_failed` event to ambient.jsonl and moves on.\n4. The gap picker should prioritize \"CI-fix\"\
    \ work over new gaps\n   (a red PR is higher priority than a new xs gap).\n\nTest: Ship a PR with a deliberate clippy\
    \ lint; verify the agent\ndetects the failure, pushes a fix commit, and the PR goes green.\n"
  closed_date: '2026-05-12'
