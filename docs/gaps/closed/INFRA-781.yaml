- id: INFRA-781
  domain: INFRA
  title: 'RESILIENT: PR repair requires running fleet — no standalone daemon watches PR health'
  status: done
  priority: P1
  effort: s
  acceptance_criteria: "The PR self-healing infrastructure exists and is well-designed:\n- pr-watch.sh: detects DIRTY, rebases,\
    \ force-pushes, re-arms auto-merge\n- pr-repair-rebase.sh: scans open PRs with failing checks, rebases onto main\n\nBoth\
    \ only run inside fleet worker sessions:\n- pr-watch.sh is fire-and-forget from bot-merge.sh post-arm step\n- pr-repair-rebase.sh\
    \ runs at top of worker.sh main loop (agent 1 only)\n\nWhen the fleet is off (solo operator, between sessions), nothing\
    \ heals.\nPRs go DIRTY after main moves and sit indefinitely. As of 2026-05-08,\n3 PRs were DIRTY simultaneously with\
    \ no process watching them.\n\nOptions (pick one or combine):\nA) Standalone cron/launchd daemon that runs pr-repair-rebase.sh\
    \ every\n   N minutes, independent of fleet status. Lightweight — just needs\n   git + gh CLI. Could be a launchd plist\
    \ or a `chump pr-repair` CLI\n   subcommand with `--daemon` mode.\nB) GitHub Actions workflow triggered on `pull_request`\
    \ status change\n   to DIRTY/BLOCKED. Runs the rebase in CI. No local process needed.\nC) Make pr-watch.sh survive its\
    \ parent session — daemonize properly\n   with a PID file and auto-restart.\n\nTest: with fleet off, merge a PR that moves\
    \ main, verify stale PRs\nget rebased within the repair interval (default 10 min).\n"
  closed_date: '2026-05-08'
  closed_pr: 1369
