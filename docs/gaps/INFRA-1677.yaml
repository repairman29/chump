- id: INFRA-1677
  domain: INFRA
  title: "EFFECTIVE: Custodian Phase 6.1 — cross-repo topology mapper — extract shared patterns across repairman29/* repos (homebrew-chump, PWA) into federation manifest"
  status: open
  priority: P2
  effort: m
  description: |
    Custodian Phase 6.1 — cross-repo topology mapper. Chump currently maps its own internals (EVENT_REGISTRY.yaml, scripts/README.md). Phase 6 scales that map across the repairman29 org so the macro-topology (homebrew-chump tap, PWA repo, future Chump-pattern repos) becomes visible. The manifest is the foundation for Phase 6.2 (federated hub) and Phase 6.3 (repo-init template).
  acceptance_criteria:
    - chump federate scan --owner <github-org> command added to src/main.rs (new federate subcommand)
    - "output: docs/federation/topology.json with schema documenting {repos: [{name, shared_patterns: [...], divergent_patterns: [...], custodian_phase_coverage: {1,2,3,4,5,6}}]}"
    - implementation uses gh api orgs/<org>/repos to enumerate sibling repos, then per-repo greps for Chump-style markers (AGENTS.md presence, docs/process/ structure, chump-style gap registry)
    - smoke test scripts/ci/test-federate-scan.sh runs the command against repairman29 org (mocked) and asserts manifest validates
    - docs/process/CUSTODIAN_BLUEPRINT.md Phase 6.1 section references the manifest schema

