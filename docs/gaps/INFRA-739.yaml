- id: INFRA-739
  domain: INFRA
  title: "CREDIBLE: single model_registry.yaml for pricing, capabilities, and routing"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - "A single docs/dispatch/model_registry.yaml contains per-model metadata: pricing, context_k, supports_tool_use, supports_thinking, family, provider hint"
    - gen.rs, session_ledger.rs, and cost_ledger.py all read pricing from this file instead of hardcoding substring matches
    - model_overlay.rs reads family from the registry instead of detect_model_family() substring matching
    - routing.yaml can reference model entries by ID instead of inlining provider details
    - scripts/dev/refresh-model-prices.sh updates the registry from upstream APIs

