  description: |
    Per ROADMAP.md Week 4 section: performance tuning at FLEET_SIZE=10 with 
    cascade hot needs to be verified before the demo. Current fleet defaults 
    to FLEET_SIZE=2 with xs/s/m effort. At FLEET_SIZE=10 with full cascade 
