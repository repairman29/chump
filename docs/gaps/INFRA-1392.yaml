- id: INFRA-1392
  domain: INFRA
  title: "CREDIBLE: state.db gap status flips ONLY on webhook pull_request.merged=true (not on chump claim) — kills stale-status worktree-churn rework (today's INFRA-1368 status=done before PR merged)"
  status: open
  priority: P1
  effort: m
  description: |
    Today INFRA-1368 and INFRA-1363 were both marked status=done in state.db within minutes of being filed — sibling claim flipped status before the PRs actually merged. Caused me to abandon claim attempts and burn worktree-create cycles on already-done gaps. The right pattern: webhook receives merged=true event, then and only then flips state.db. Webhook plumbing already exists (smee+receiver+sqlite). Just wire pull_request.merged → gap_store.mark_shipped.
  acceptance_criteria:
    - "github-webhook-receiver.py listens for pull_request webhook events; when payload.action=\"closed\" AND payload.merged=true, lookup the gap via parsed PR title pattern \"<GAP-ID>:.*\" or commit body trailer \"<GAP-ID>\" and call gap_store.mark_shipped(id, closed_pr=N)"
    - chump claim no longer flips status=open→reserved (or any pre-merge state) — claim is just a lease + worktree creation, NOT a state.db status update
    - chump gap ship --update-yaml is the only explicit override (e.g. for manual fleet ops); requires --reason flag
    - "state.db schema: add a closed_pr_event_received_at TIMESTAMP column to gaps; webhook write fills it; mark_shipped requires it non-NULL OR an explicit --bypass flag"
    - CI test scripts/ci/test-gap-state-webhook-flip.sh seeds a synthetic webhook event for a fake gap, asserts state.db reflects done after exactly one event
    - "Measure: kind=stale_gap_state_observed ambient events drop to 0 (today INFRA-1368 + INFRA-1363 both showed status=done in state.db while their PRs were still OPEN)"

