- id: INFRA-2011
  domain: INFRA
  title: "RESILIENT: recovery-queue-service.sh gh api {owner}/{repo} template fails under launchd context"
  status: open
  priority: P1
  effort: xs
  acceptance_criteria:
    - "scripts/coord/recovery-queue-service.sh lines 196, 215, 247: replace gh api repos/{owner}/{repo}/... with explicit repo. Use CHUMP_GH_REPO env (default 'repairman29/chump') OR shell out gh repo view --json nameWithOwner --jq '.nameWithOwner' at script start"
    - "Verified by: bash scripts/coord/recovery-queue-service.sh from a non-git-context working dir (e.g. /tmp); should succeed with explicit repo not depend on {owner}/{repo} template"
    - "Catalyst: 2026-05-25T19:07:02Z — operator_recovery_requested for PR #2593 (trunk-RED unblocker) → daemon emitted operator_recovery_failed reason=ruleset_snapshot_failed. Recovered manually via Opus admin-merge cycle (~80 sec for 6 PRs). Without this fix, the recovery queue is theoretical — it failed on its very first real cycle."
    - "Smoke test scripts/ci/test-recovery-queue.sh already covers the happy path with mock gh; needs additional case: run with HOME=/tmp + no git config, assert script substitutes repo correctly"
  description: |
    THE FLOOR Phase 3 first-real-cycle failure. The daemon's design was
    correct; the implementation made a wrong assumption about gh template
    substitution working everywhere. Under launchd's WorkingDirectory
    + minimal env, gh doesn't resolve {owner}/{repo} via git config.

    LOUD failure (operator_recovery_failed emitted) — the floor's audit
    discipline worked. The daemon refused to silently no-op. But the
    end result was that operator (me) had to manually admin-merge anyway.

    XS fix. Replace 3 template strings with explicit repo lookup at script
    start. Verify with stress test.
