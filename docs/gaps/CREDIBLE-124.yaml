- id: CREDIBLE-124
  domain: CREDIBLE
  title: "CREDIBLE: INFRA-821 silently fixed (auto_seed_if_empty in GapStore) but gap still status:open — gap registry says broken, code says fixed, no one knows"
  status: open
  priority: P1
  effort: xs
  opened_date: '2026-06-15'
  raised_by: cold-water
  raised_in: RED_LETTER#16
  description: |
    VERIFIED 2026-06-15 (Issue #16 Cold Water audit):

    INFRA-821 was flagged as "state.db empty on fresh clone — gap-doctor crashes"
    in 6 consecutive Cold Water cycles (Issues #10 through #15). Every prior audit
    ran `python3 scripts/coord/gap-doctor.py doctor` and got:
    
    ```
    sqlite3.OperationalError: no such table: gaps
    ```

    Issue #16 audit: gap-doctor.py runs cleanly:
    ```
    python3 scripts/coord/gap-doctor.py doctor
    → Total gaps in YAML: 975 / Total gaps in DB: 975 / Total drift entries: 0
    ```

    Root cause of the fix: crates/chump-gap-store/src/lib.rs added `auto_seed_if_empty()`
    (line 612-648), which auto-imports from docs/gaps/ on first run if state.db is empty:
    ```
    eprintln!("[gap-list] state.db is empty — auto-importing from docs/gaps/ (INFRA-821)");
    ```
    The comment explicitly names INFRA-821. The fix was added in a commit to
    crates/chump-gap-store/src/lib.rs (git log confirms the file changed in PRs
    #3074/#3098 which fixed other things — the INFRA-821 eprintln was likely bundled).

    INFRA-821 gap still status: open. No `git log --grep='INFRA-821'` returns an
    implementation commit (only cold-water chore 807aa75). The fix landed silently
    inside another gap's PR.

    Symptom: INFRA-821 will be reported WORSE/UNCHANGED for the 7th straight cycle
    by a future audit that runs `python3 -c "import sqlite3; ..."` without first
    running `chump gap list`, because state.db is still 0-bytes until chump runs.
    Prior audits used the bash `sqlite3` CLI tool which was unavailable in the
    sandbox anyway.

    Action: close INFRA-821 with evidence, add regression test, update the bootstrap
    doc to say "chump gap list auto-seeds state.db on first run."
  acceptance_criteria:
    - "INFRA-821 is closed: chump gap show INFRA-821 | grep status → done"
    - "A CI test (or INFRA-821's own AC) verifies auto_seed_if_empty: fresh state.db → chump gap list returns >=1 gap (not empty)"
    - "CLAUDE.md / AGENTS.md MANDATORY pre-flight section no longer says 'chump gap import' is required on fresh clone"
