    - "Refuses to flip when CREDIBLE-028 premature-closure check fires (would create worse drift)"
    - "Emits ambient kind=auto_yaml_status_flip with gap_id, pr, branch"
    - "Pairs with CREDIBLE-028: CREDIBLE-028 prevents status=done before PR merges; RESILIENT-008 prevents the gap-status-check stall after merge"
    - "Documented in bot-merge.sh header + CLAUDE.md ship-pipeline section"
