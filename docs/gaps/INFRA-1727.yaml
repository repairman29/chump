  acceptance_criteria:
    - "docs/HIDDEN_GEMS.md exists with four structured sections: CLI commands, agent tools (MCP), config knobs (env vars), hidden features (workflow tricks)"
    - "Each entry has fields: name, where_to_find (file path), when_to_use (one-line value prop), example_command (copy-pasteable)"
