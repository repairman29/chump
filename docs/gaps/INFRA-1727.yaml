    - Content Bot Evangelist (META-066) declares HIDDEN_GEMS.md as input data source in its system prompt — closes the discovery-to-evangelism loop
    - "CI test scripts/ci/test-hidden-gems-schema.sh: assert every entry has all four required fields, every where_to_find path resolves to a real file, no broken example_command references"
    - cargo fmt/clippy clean (script is shell but invokes Rust binary chump for chump skill list parsing) per CLAUDE.md local-CI discipline
  notes: |
    Pillar: CREDIBLE — discoverability is a measurement-of-trust signal (operators trust what they can find). Maps to multi-agent-factory pattern Phase 3: "Highlight hidden gems... package these findings into scenarios that show developers how they can reuse these primitives." Pairs with META-066 (Evangelist runtime consumes this doc), INFRA-1729 (capabilities registry — the machine-readable cousin of this human-readable doc). Without this, the Evangelist bot has nothing to evangelize about — it would re-discover primitives every run.
