- id: INFRA-2238
  domain: INFRA
  title: "RESILIENT P0: 3 curator-loop wrappers call wrong subcommand — decompose/handoff/shepherd silently no-op for hours"
  status: open
  priority: P1
  effort: xs
  description: |
    scripts/coord/fleet-autopilot.sh line 159 hardcodes '<script> tick' and '<script> heartbeat' subcommands when spawning curator-loop tmux panes. ci-audit-loop.sh and md-links-loop.sh accept tick (they work). But decompose-loop.sh (accepts: slice, audit-pending, heartbeat), handoff-loop.sh (accepts: scan-handoffs, review-pr, dispatch-sub, heartbeat), and opus-shepherd-triage.sh (flag-style only, NO subcommands) all reject tick → silently no-op every 5 minutes. handoff + decompose still pass the heartbeat call (so they look alive in ambient.jsonl), but neither does any work. Shepherd-triage rejects BOTH tick AND heartbeat → fully broken. Result: 3/6 productized curators have been silently no-op since the tmux session launched (Thu 8PM 2026-05-28).
  acceptance_criteria:
    - decompose-loop.sh adds a tick case that calls cmd_audit_pending (the periodic-check entry point); preserves existing slice/audit-pending/heartbeat subcommands; bash -n clean
    - handoff-loop.sh adds a tick case that calls _cmd_scan_handoffs; preserves existing subcommands; bash -n clean
    - opus-shepherd-triage.sh recognizes tick (runs the existing triage cycle that today fires on no-arg invocation) AND heartbeat (emits ambient kind=shepherd_heartbeat) as first-positional-arg subcommands; preserves existing --no-broadcast/--json flag parsing for backward compatibility
    - "tmux panes for the three curators no longer log 'unknown subcommand: tick' after fix (verify via tail .chump-locks/autopilot-logs/curator-*.log after one tick interval)"
    - Smoke tests scripts/ci/test-decompose-loop.sh, scripts/ci/test-handoff-loop.sh, scripts/ci/test-opus-shepherd-triage.sh extended to assert 'tick' subcommand returns exit 0
    - chump preflight green before push

