- id: RESILIENT-159
  domain: RESILIENT
  title: "RESILIENT: run-fleet.sh launches LEAK orphaned procs without producing a pool (49 found) — bedrock of 'fleet keeps dying'"
  status: done
  priority: P1
  effort: m
  acceptance_criteria:
    - "1. run-fleet.sh installs a trap (EXIT/INT/TERM) that kills its background children — the token-refresher 'sleep 300' loop AND the fleet-autorestart-daemon — so a launcher that exits or fails tmux setup NEVER leaves orphans (PPID 1). 2. The token-refresher + autorestart daemon self-exit when 'tmux has-session chump-fleet' is false (checked each loop iteration) so they die with the pool. 3. Idempotency lock: run-fleet.sh refuses to start (exit 0 + log) if a chump-fleet tmux session already exists OR another run-fleet launcher holds a startup lock (flock/pidfile) — kills the duplicate pile-up that produced 49 orphans. 4. RESILIENT-158 keeper hardening: after _keeper_launch_fleet, verify within ~120s that chump-fleet exists with >= target live panes; else emit worker_pool_launch_failed and do NOT leave a stuck launcher. 5. Test: a launch that fails tmux setup leaves ZERO orphaned sleep-300/daemon procs; a second launch while one is starting no-ops. 6. After merge+deploy+verified-clean, re-enable the keeper (rm ~/.chump/FLEET_KEEPER_OFF), confirm pool comes up AND stays up across one heartbeat with NO orphan growth (pgrep -fc run-fleet.sh stays bounded)."
  closed_pr: 3152
  evidence: |
    2026-06-22 01:16: activating the RESILIENT-158 always-on keeper revealed the bedrock disease. Found 49 orphaned run-fleet.sh processes (PPID 1, ages 2-11h, each looping a 'sleep 300' token-refresher child) with ZERO working pool (no chump-fleet tmux, no claude workers). So EVERY run-fleet launch that doesn't complete tmux setup leaves its background loops (token refresher, autorestart daemon) orphaned + stuck forever; ~49 piled up over ~11h. This is the deeper cause under the whole 'fleet keeps dying' thread — even when launched, run-fleet often orphans instead of creating a pool. The RESILIENT-158 keeper would AMPLIFY it (relaunch every 5min -> +1 orphan); hit the kill-switch (~/.chump/FLEET_KEEPER_OFF) to stop it. ROOT: run-fleet.sh does not tie its background subprocesses to the fleet/launcher lifecycle, and a launch that fails tmux setup exits without reaping them. CURE: (a) trap EXIT/TERM in run-fleet.sh to kill its background children (token refresher 'sleep 300' loop, autorestart daemon) on exit; (b) those daemons should self-exit when the chump-fleet tmux session is gone (poll tmux has-session); (c) idempotency guard: run-fleet refuses to start if a chump-fleet session or another starting launcher exists (kill the duplicate pile-up); (d) the RESILIENT-158 keeper must VERIFY the pool came up (tmux session + live panes within ~120s) else log failure instead of leaving an orphan. Keeper stays OFF until this lands.

