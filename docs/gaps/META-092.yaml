- id: META-092
  domain: META
  title: "CREDIBLE: opus-shepherd operator digest must forecast not describe — predict queue-exhaustion / sibling-takeover-triggers / session-budget-burn / ship-rate-vs-fleet-baseline; changes digest from log into decision input"
  status: open
  priority: P1
  effort: s
  acceptance_criteria:
    - 1. Operator digest schema gains FORECAST fields beyond the existing descriptive STATUS payload
    - "2. Required predictive signals (at least 2 per send): (a) pickable-queue-exhaustion forecast — 'queue exhausts in ~N hr at current pick rate', (b) sibling-takeover-trigger — 'INFRA-X claim silent N min; will take over by tick T if no progress', (c) session-budget-burn — 'token spend at X/hr, limit hit by HH:MM', (d) ship-rate-delta — 'my rate Y/hr vs fleet baseline Z/hr; bottleneck is W'"
    - 3. Implemented as scripts/coord/opus-digest-forecast.sh — given current state (leases, PRs, inbox, ambient), emits the structured digest text
    - "4. Replaces existing 'STATUS TICK ~N: shipped X' messages with 'STATUS TICK ~N: shipped X. FORECAST: queue exhausts in 90min; bottleneck is Y'"
    - "5. Smoke test scripts/ci/test-opus-digest-forecast.sh: seed synthetic state, assert at least 2 forecast lines in output"
    - "6. Bypass: CHUMP_OPUS_DIGEST_FORECAST=0 falls back to descriptive-only"
    - 7. Documented in OPUS_SHEPHERD_PLAYBOOK.md (META-094)
    - "8. Baseline 2026-05-24 session2: digests were pure logs — operator had to derive trajectory themselves; this gap shifts that work from operator-side to shepherd-side"

