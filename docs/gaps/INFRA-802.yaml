- id: INFRA-802
  domain: INFRA
  title: "ZERO-WASTE: auto-arm-sweeper launchd — gh not authenticated, re-arm never happens"
  status: open
  priority: P1
  effort: xs
  description: |
    auto-arm-sweeper.sh (line 39) calls `gh api user --jq .login` to determine the current user. Under launchd the plist's EnvironmentVariables only sets PATH but not HOME. Since gh stores auth tokens in ~/.config/gh/hosts.yml, the missing HOME means launchd can't find the token and `gh api user` returns empty. All re-arm attempts fail silently (logged to stderr which goes to /tmp/chump-auto-arm-sweeper.err.log).
    
    Fix: add HOME to the plist's EnvironmentVariables, consistent with the 24 other launchd installers that already set HOME.
  acceptance_criteria:
    - auto-arm-sweeper.sh succeeds under launchd
    - gh api user returns the correct user from launchd context
    - existing behavior when run from shell unchanged

