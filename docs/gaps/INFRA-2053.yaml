- id: INFRA-2053
  domain: INFRA
  title: 'EFFECTIVE P1: chump gap sync bidirectional YAML <-> state.db reconciliation'
  status: done
  priority: P1
  effort: m
  description: 'Bidirectional YAML <-> state.db sync. Three modes: sync --pull (YAML

    files in docs/gaps/ become source-of-truth; state.db rows updated to

    match); sync --push (state.db rows become source-of-truth; YAML files

    updated to match); sync --check (compare both; exit non-zero on any

    drift; no mutations). Closes the failure mode that bit the shepherd

    6+ times today: had to direct-sqlite UPDATE state.db because

    `chump gap reserve` writes TODO ACs that `chump gap set` then can''t

    cleanly replace, and direct YAML edits don''t propagate back.

    Phase 1: sync.rs module + chump gap sync CLI + smoke test. Phase 2

    deferred: cron / fs-watcher auto-sync, multi-machine sync, deleting

    done YAMLs.

    '
  acceptance_criteria:
  - Add sync module crates/chump-gap-store/src/sync.rs with pub fn sync_pull + pub fn sync_push + pub fn sync_check; declare
    via pub mod sync in lib.rs
  - 'Three sync directions: --pull (YAML -> DB recovers TODO-AC overwrite class), --push (DB -> YAML atomic tempfile + rename),
    --check (dry-run diff exit non-zero on drift)'
  - 'Drift detection per gap-id: classify DbOnly (today''s gap_drift_orphan class) / YamlOnly / Divergent; compare normalised
    fields (title, status, priority, effort, acceptance_criteria, depends_on, notes, description, domain, opened_date, closed_date,
    closed_pr, skills_required, preferred_backend, preferred_machine, estimated_minutes, required_model, source_doc)'
  - CLI wired into chump gap sync with --pull / --push / --check + --dry-run + --json + --state-db + --gaps-dir; mutually-exclusive
    mode flags; backward-compat with existing chump gap subcommands
  - 'Atomic write discipline for --push: render via dump_per_file_single into scratch dir, serde_yaml round-trip validation,
    fs::rename to final path; on error leave existing YAML untouched'
  - 'Smoke test scripts/ci/test-gap-sync.sh: synth fixture with 4 drift patterns (YAML-only, DB-only, TODO-AC overwrite, title
    divergence); assert --check non-zero with all 4; assert --pull recovers DB to YAML; assert --push fills the missing YAML;
    assert post-recovery --check exits 0; assert --dry-run mutates nothing'
  - 'Phase 1 non-goals deferred: cron auto-sync, multi-machine sync, cross-validation with INFRA-2052, rewiring chump gap
    reserve to call sync_pull, deleting done/superseded YAMLs'
  - NO new event-kind literals, NO touches to EVENT_REGISTRY.yaml or event-registry-reserved.txt, observation-free Phase 1
  notes: 'Pairs with INFRA-2022 (chump gap set AC-overwrite root-cause):

    INFRA-2022 fixes the WRITE that creates the drift; INFRA-2053 fixes

    the RECOVERY when drift already exists. Direct cure for the

    16:57Z gap_drift_orphan alert (211 OPEN state.db rows with no YAML

    mirror). META-114 freshness discipline cluster.

    '
