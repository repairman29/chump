- id: INFRA-1994
  domain: INFRA
  title: 'RESILIENT: wedge catalog as executable state machine — refactor 13 W-NNN classes from doc-with-playbook to detector_fn+auto_trigger+remediation+escalation;
    scripts/coord/wedge-watch.sh is starting point (7 detectors)'
  status: done
  priority: P1
  effort: l
  acceptance_criteria:
  - Every W-NNN class in docs/process/WEDGE_CLASS_CATALOG.md (currently 13) has a corresponding detector function in scripts/coord/wedge-watch.sh
    OR a new scripts/coord/wedge-state-machine.sh module
  - 'Each detector emits kind=wedge_detected with fields: wedge_class (W-NNN), severity (low/med/high), suspect_paths, recommended_remediation'
  - Each W-NNN class has a remediation function — bash function or callable — that performs the canonical fix from the catalog's
    playbook section
  - 'State machine: detector fires → ambient event → remediation function (rate-limited to once per wedge_class per 30min)
    → emit kind=wedge_remediated OR kind=wedge_remediation_failed'
  - 'Escalation policy: if same wedge_class fires 3x in 24h, emit kind=wedge_chronic and file a META gap for permanent fix'
  - 'Companion to recovery queue (INFRA-1993): some remediations require admin-merge — those route through the recovery queue
    rather than firing directly'
  - 'Smoke test scripts/ci/test-wedge-state-machine.sh: inject synthetic wedge_detected for 3 classes, assert remediation
    fires + audit events recorded + chronic-escalation triggers after 3x'
  - 'Migration: existing wedge-watch.sh detectors (7) get remediation wrappers; new detectors added for W-008/W-009/W-010/W-011/W-012/W-013
    (6 still doc-only)'
  depends_on:
  - INFRA-1993
  description: 'See docs/strategy/THE_FLOOR.md §6. Today our wedge catalog is a

    knowledge artifact — humans read it during incidents. It should be

    executable: when the signature fires, the playbook runs.


    Rough shape: (a) audit which W-NNN classes have detectors vs only

    docs; (b) for each missing detector, write one (most are <50 LOC of

    grep+gh+jq); (c) for each class with detector but no remediation,

    write the remediation function; (d) state machine wrapper that ties

    detection → remediation → escalation; (e) rate limits to prevent

    remediation oscillation (a remediation that triggers the next

    detection would loop).


    KEY DESIGN: remediations that mutate state (admin-merge, push,

    branch protection edits) route through INFRA-1993''s recovery queue

    so we get the same rate limit + audit + auth model. Read-only

    remediations (re-arm a daemon, emit a warn, file a gap) can fire

    directly.


    Sequencing: ships after INFRA-1993 because the mutation path

    depends on the recovery queue''s drop-gates+admin authority.

    '
  closed_date: '2026-05-25'
