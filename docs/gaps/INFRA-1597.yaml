- id: INFRA-1597
  domain: INFRA
  title: 'RESILIENT P0: paramedic daemon broken on M4 — generates LLM chat-paragraphs instead of running rule-engine actions,
    persistent r2d2 /sessions/chump_memory.db errors'
  status: done
  priority: P1
  effort: s
  acceptance_criteria:
  - 'Root-cause the broken paramedic: ''chump paramedic daemon'' on M4 produces LLM-chat-paragraph stdout instead of running
    rule-engine actions. Symptoms: paramedic.out.log contains ''Paramedics undergo extensive training...'' text (LLM generation),
    paramedic.err.log spams ''r2d2: unable to open database file: /sessions/chump_memory.db'' (absolute non-existent path),
    last exit code = 1 from launchctl.'
  - 'Likely cause: CLI parser bug where ''paramedic daemon'' subcommand isn''t recognized, falls through to default chat mode.
    OR: the chump binary on disk is stale (pre-paramedic-subcommand) and needs rebuild from current main.'
  - 'Fix step 1: rebuild target/release/chump from current main (cargo install --path . --bin chump --force). Verify ''chump
    paramedic --help'' returns the daemon subcommand help.'
  - 'Fix step 2: investigate the /sessions/chump_memory.db hardcoded path. It''s resolving to /sessions/... NOT /.chump/sessions/...
    — meaning either env isn''t propagating in launchd context OR the path is hardcoded. Find it (grep src/ for ''chump_memory.db''
    or ''/sessions/'') and fix to resolve via CHUMP_HOME.'
  - 'Fix step 3: scripts/setup/com.chump.paramedic.plist must declare WorkingDirectory + CHUMP_HOME + HOME env vars (INFRA-1556
    pattern). The plist on disk has these now (manual patch) but the source plist in repo needs the same change permanently.'
  - 'Regression test scripts/ci/test-paramedic-daemon-launches.sh: spawn ''chump paramedic --once --dry-run'' with CHUMP_HOME
    pointing at a tmp scratch, assert exit 0 + stdout contains JSON action-plan shape (not LLM chat-text).'
  - 'Smoke test scripts/ci/test-paramedic-plist-env.sh: parse com.chump.paramedic.plist, assert WorkingDirectory + CHUMP_HOME
    env present (INFRA-1556 pattern verified).'
  - Once fixed, restart paramedic on M4 (bootout + bootstrap), observe rule-engine triage cycles in paramedic.out.log (kind=paramedic_action
    JSON lines), confirm no more r2d2 errors.
  - 'Cross-link: 2026-05-16 paramedic install on M4 ran successfully (launchctl bootstrap OK) but daemon was a no-op — every
    600s cycle, it spammed errors and possibly chat-completed a paragraph about ambulance paramedics. Self-healing layer was
    off.'
  notes: 'Demoted from P0 to P1 by curator 2026-05-23: paramedic broken on M4 is annoying for operator but not blocking fleet
    ship throughput. Per CLAUDE.md P0 budget cap = 5; promoting only true fleet unblockers. Re-promote if root cause spreads
    beyond M4.

    '
