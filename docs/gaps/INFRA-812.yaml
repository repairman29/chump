- id: INFRA-812
  domain: INFRA
  title: "ZERO-WASTE: fix check-worktree-config.sh --json shell-injection via python3 string interpolation"
  status: open
  priority: P2
  effort: xs
  description: |
    check-worktree-config.sh passes shell variables directly into a python3 -c
    string via interpolation (e.g. python3 -c "import ...; path='$REPO_ROOT'").
    A worktree path containing single-quotes or backticks can escape the string
    and execute arbitrary Python. Fix: pass all shell values as sys.argv
    arguments instead of interpolating into the -c script.
  acceptance_criteria:
    - "check-worktree-config.sh --json passes all variable data via sys.argv, not string interpolation"
    - "a path containing single-quotes (e.g. /tmp/it's-a-worktree) does not cause python3 to error or execute injected code"
    - "existing --json output format is unchanged for well-formed paths"

