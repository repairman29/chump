- id: CREDIBLE-049
  domain: CREDIBLE
  title: 'CREDIBLE: operator-leverage ratio metric — join fleet-active intervals with operator-action timestamps to compute
    leverage trend'
  status: done
  priority: P1
  effort: m
  description: 'Per 2026-05-11 three-questions research: Q3 (operator-leverage ratio)

    cannot be precisely answered without joining session-interval data

    with operator-action timestamps. Today''s back-of-envelope: ~2-10x

    leverage (Opus time vs fleet-active time). Compounding-platform

    needs 50x+. Without precise measurement, we can''t tell if we''re

    compounding.

    '
  acceptance_criteria:
  - 'scripts/dispatch/operator-leverage.sh computes per-PR leverage: (a) fleet-active-time = sum of intervals between session_start
    and session_end events tagged to the PR''s gap_id; (b) operator-attention-time = sum of 5-min windows around any operator
    commit/comment/gh-pr-action on the PR; (c) leverage_ratio = fleet-active / operator-attention'
  - 'Per-week aggregate: mean, p50, p90 leverage_ratio + count of PRs landed'
  - Output to ~/.chump/metrics/operator-leverage.jsonl daily + ~/.chump/metrics/operator-leverage-weekly.jsonl on Sundays
  - 'Operator-action timestamps: gh API for PR comments + reviews + commits; chump claim/release events; ambient kind=operator_recall
    events'
  - 'Alert: if leverage_ratio drops >20% week-over-week, emit ambient kind=leverage_regression'
  - Trend visible in chump fleet status --leverage and PWA outcome dashboard (PRODUCT-081)
  - Requires harness attribution from CREDIBLE-040 + CREDIBLE-025/037 to distinguish Opus-time from Claude-Code-IDE-time from
    automation-time; if those haven't landed, all jeffadkins1 actions are aggregated
  - Documented in docs/process/FLEET_SLOS.md alongside autonomous-ship-rate as the second headline metric
  - Pairs with CREDIBLE-047 (autonomous-ship-rate) — autonomous-rate is the binary 'did we ship without operator?'; leverage-ratio
    is the continuous 'how much operator time did each ship cost?'
  closed_date: '2026-05-14'
