- id: INFRA-1729
  domain: INFRA
  title: 'EFFECTIVE: docs/CAPABILITIES_REGISTRY.json — machine-readable inventory of repo primitives (Quartermaster artifact,
    auto-generated from RUST_MODULE_MAP + MCP servers + skills)'
  status: done
  priority: P1
  effort: m
  description: 'Phase 4 Systematizer artifact from the multi-agent-factory ingestion-engine review. chump-mcp.json is a server-launch
    config (commands to spawn 7 MCP servers), not a capabilities inventory. There is no machine-readable manifest of what
    this repo can do, scoped per primitive, with usage hints. Without it the Cannon (cross-repo fan-out) and Choreographer
    (orchestrator) have to grep to discover primitives, and external repos cannot programmatically learn what Chump offers.
    This is the Quartermaster persona deliverable — turns static modules into discoverable tools. Rough shape: (a) docs/CAPABILITIES_REGISTRY.json
    with stable JSON schema; (b) docs/schemas/capabilities-registry.schema.json publishes the schema; (c) scripts/dev/build-capabilities-registry.sh
    auto-generates from docs/architecture/RUST_MODULE_MAP.md (48 rows), chump-mcp.json server descriptions, scripts/README.md
    catalog, and chump skill list; (d) post-merge hook refreshes on every main commit, or hourly via launchd; (e) chump audit
    capabilities CLI subcommand exits non-zero on drift (primitive missing from registry or vice versa).

    '
  acceptance_criteria:
  - 'docs/CAPABILITIES_REGISTRY.json with one entry per primitive; each entry has fields: primitive_id (kebab-case), kind
    (one of cli, mcp_tool, skill, crate, script), file_paths (array), purpose_one_line, when_to_use (one-line trigger), example_invocation
    (copy-pasteable), version (semver or git-sha)'
  - docs/schemas/capabilities-registry.schema.json publishes the JSON Schema (draft 2020-12) so external repos and agents
    can validate
  - scripts/dev/build-capabilities-registry.sh auto-generates from RUST_MODULE_MAP.md, chump-mcp.json, scripts/README.md,
    and chump skill list — operator can hand-curate the when_to_use field via docs/CAPABILITIES_OVERLAY.yaml (curated overlay
    merged on top of auto-detected entries)
  - 'Refresh trigger: post-merge git hook OR hourly launchd job (whichever is lower-cost on the system); emits kind=capabilities_registry_refreshed
    with delta count'
  - 'chump audit capabilities CLI subcommand: walks registry vs filesystem, exits non-zero if any registry entry points at
    a missing file path OR a discovered primitive (new MCP server, new skill, new top-level crate) is missing from the registry'
  - Content Bots and Cannon (INFRA-1484 + future persona) declare CAPABILITIES_REGISTRY.json as their tool-discovery input
    — replaces grep-and-pray pattern
  - 'CI test scripts/ci/test-capabilities-registry.sh: assert registry validates against schema, every file_paths entry resolves
    to a real file, drift check exits non-zero on an injected stale entry'
  - Documented in scripts/README.md and docs/architecture/ARCHITECTURE.md as the canonical discovery surface for external
    agents — discoverability matters more than completeness in v1
  notes: 'Pillar: EFFECTIVE — unlocks the multi-agent-factory pattern goal of agents discovering their tools dynamically.
    Maps to "The Quartermaster" persona deliverable: "Maintain a centralized tools-manifest.json across our projects. When
    a new agent joins the network, you provide them with their available tools." Pairs with INFRA-1727 (HIDDEN_GEMS.md — the
    human-readable cousin; same data, different audience). Pairs with INFRA-1484 cross-repo fan-out (Marcus M-B) — once Chump
    can describe its own capabilities, it can fan them out to sibling repos. Effort=m (not s) because the auto-generator needs
    to reliably extract usage hints from multiple source-of-truth files; the schema design is the load-bearing decision.

    '
  closed_date: '2026-05-24'
  closed_pr: 2415
