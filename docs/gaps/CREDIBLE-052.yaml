- id: CREDIBLE-052
  domain: CREDIBLE
  title: "CREDIBLE: cross-session gap-ID collision prevention — reserve_next_id() consults open PR branches before issuing"
  status: done
  priority: P1
  effort: s
  description: |
    Followup to CREDIBLE-029 (partial impl). Prevents the INFRA-819/820/821
    and CREDIBLE-038/039 collision class: 3 sessions issued the same gap ID
    because reserve_next_id() only read state.db, not open PR branches.
    Core fix: consult gh pr list before issuing. Cache + doc deferred to CREDIBLE-053.
  acceptance_criteria:
    - "src/gap_store.rs reserve_next_id() calls `gh pr list --json files --search 'is:open path:docs/gaps/'` and collects YAML filenames from open PR diffs before issuing an ID"
    - If state.db next-id is X but docs/gaps/<DOMAIN>-X.yaml appears in any open PR branch diff, skip to X+1 and retry; emit kind=gap_id_allocator_collision_avoided to ambient.jsonl with {skipped_id, found_in_pr}
    - "Network-unavailable fallback: if gh API call fails, fall back to state.db-only and emit kind=gap_id_allocator_offline so operators know cross-session protection is degraded"
    - "scripts/ci/test-gap-id-cross-session.sh: stubs gh on PATH; synthetic open-PR JSON response includes docs/gaps/INFRA-XXX.yaml; assert chump gap reserve --domain INFRA returns a different ID"
    - "Test replays INFRA-819 incident: synthetic response has docs/gaps/INFRA-819.yaml with state.db next-id=819 → chump gap reserve returns INFRA-820"
  notes: Decomposed from CREDIBLE-044. Cache + doc followup in CREDIBLE-053.
  closed_date: '2026-05-13'

