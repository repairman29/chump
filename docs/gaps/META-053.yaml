- id: META-053
  domain: META
  title: "CREDIBLE: session handoff format for cross-tool agent continuity"
  status: open
  priority: P1
  effort: s
  description: |
    
    Agents frequently lose context between sessions — diagnosed-but-unfiled
    findings die with the session context and resurface later as fresh incidents.
    The CREDIBLE-017 session identified 5 gaps that needed filing but would have
    been lost without explicit operator prompting.
    
    This gap codifies the handoff format already documented in
    docs/CONTINUAL_LEARNING.md (field as DOC-033): agents structure handoffs
    with Goal, Instructions, Discoveries, Accomplished, To Do Next, and
    Relevant files sections.
    
    Fix: The format is documented in AGENTS.md and CONTINUAL_LEARNING.md.
    Add a CI lint that verifies any file matching *HANDOFF* or *HANDOVER*
    follows the required format (optional, stretch goal).
    EOF
    )
  acceptance_criteria:
    - AGENTS.md has a Session handoff format section
    - docs/CONTINUAL_LEARNING.md documents the format with examples
    - At least one session has used the format in practice (CREDIBLE-017)
    - "Stretch: CI lint verifies handoff documents follow format"

