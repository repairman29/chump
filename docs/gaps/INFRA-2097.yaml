- id: INFRA-2097
  domain: INFRA
  title: "RESILIENT P0 trunk-RED: test-no-manual-ship-bypass.sh Test 2 fails when origin/main HEAD has legitimate Bot-Merge-Bypass trailer (from yesterday's recovery PR #2681); test must use synthetic commit SHA not real HEAD"
  status: open
  priority: P1
  effort: xs
  acceptance_criteria:
    - "Reproduce: bash scripts/ci/test-no-manual-ship-bypass.sh; Test 2 fails with \"[FAIL] expected exit 1 (trailer required), got 0\" because origin/main HEAD (commit a4aebe4ee #2681) commit message legitimately contains Bot-Merge-Bypass: trailer from yesterday recovery work"
    - "Root cause: test uses LOCAL_SHA=$(git rev-parse HEAD); pre-push hook reads trailers from that commit; when real HEAD has the trailer, Test 2 incorrectly passes the hook (exit 0) when test expects exit 1"
    - "Fix: at test setup time, create a synthetic git commit-tree object (no trailer) via `git commit-tree HEAD^{tree} -m \"fixture commit no trailer\"`; store its SHA in FIXTURE_SHA_NO_TRAILER; pass to Test 2 instead of LOCAL_SHA. Test 1 + Test 3 + Test 4 keep LOCAL_SHA (those test other behaviors)"
    - "Verify post-fix: bash scripts/ci/test-no-manual-ship-bypass.sh passes 4/4 in both states — (a) HEAD has Bot-Merge-Bypass trailer, (b) HEAD has no trailer; both should pass"
    - "Sibling: same class as INFRA-2080 (test not isolated from real state). INFRA-2088 (chump test-sandbox primitive, filed today) would prevent this class once shipped. Cross-link in notes"
    - "Trunk-RED unwind: post-merge, 4 stuck PRs (#2685/2684/2683/2686) re-run CI and pass audit"
  notes: |
    Filed 2026-05-27 by curator-opus-shepherd after main went RED again post-yesterday's fixes. Root cause: yesterday's recovery PR #2681 legitimately added Bot-Merge-Bypass: trailer (manual push fallback when bot-merge wedged on title-similarity). The test's design didn't isolate from real HEAD commit state. Sibling class: INFRA-2080 (sandbox state.db bleed), INFRA-2088 (sandbox primitive that would prevent this).

