  acceptance_criteria:
    - "New chump-mcp-fleet server exposes tools: fleet_status (workers, health, ship rate), gap_queue (pickable gaps with routing info), ambient_tail (last N events from ambient.jsonl), worker_logs (last cycle log for a given agent ID)"
