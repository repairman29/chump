- id: INFRA-1581
  domain: INFRA
  title: "RESILIENT: backfill smoke tests for shell scripts under Rust-First-Bypass — migration pipeline gates + autoscale decisions had ZERO test coverage at ship time"
  status: open
  priority: P1
  effort: s
  pillar: RESILIENT
  depends_on: ["INFRA-1538"]
  acceptance_criteria:
    - "scripts/ci/test-migration-pipeline-gates.sh covers all 6 stages with synthetic gh-api responses: stage_0 (fast-checks canary), stage_1 (clippy), stage_2 (cargo-test), stage_3 (ACP smoke), stage_4 (cap bump), stage_5 (done). Each stage tested for both gate-met AND gate-unmet paths."
    - "Fixes INFRA-1538 as part of this gap: gate query currently uses `gh run list --json name` which returns workflow name; correct query uses `gh api /repos/.../commits/<sha>/check-runs` filtered by .name + .conclusion. Smoke test asserts the corrected query returns advance=1 on a real-fast-checks-success fixture."
    - "scripts/ci/test-autoscale-decisions.sh covers the autoscale decision logic with synthetic queue-depth + runner-state JSON inputs: (a) scale-up when queue > 2×online sustained 2min AND online < max, (b) scale-down when idle >10min AND online > min, (c) no-op when neither condition met"
    - "Both tests stub `gh` and `launchctl` via PATH shim — no network calls, no real launchd interaction"
    - "Both tests added to .github/workflows/ci.yml's audit/fast-checks shard so they run on every PR"
    - "Coverage: every emit_kind call (runner_migration_step, runner_scaled) is exercised at least once, with payload-shape assertions"
    - "Done = both smoke tests pass on main; INFRA-1538 closes as part of this PR; chump-runner-migration-pipeline.sh's `cmd_status` shows current stage correctly after fix"
  notes: |
    This is the test-coverage layer that the original ship of INFRA-1535
    skipped under the (since-revealed-as-weak) bypass trailer. Backfilling
    it now serves three purposes:
      1. Catches INFRA-1538 in CI before the Rust port (INFRA-1579) starts.
      2. Establishes behavioral baseline for the Rust port to match.
      3. Demonstrates the cost the bypass deferred — these tests should
         have shipped with the original scripts, not 3 days later.

    Order: this lands FIRST, then INFRA-1579 (port to Rust) ports against
    these tests as the spec.


