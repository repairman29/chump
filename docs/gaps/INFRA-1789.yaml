- id: INFRA-1789
  domain: INFRA
  title: "ZERO-WASTE: chump preflight runs subcommand --help regression check locally — INFRA-1246 catches stale CLI surfaces (INFRA-1762 Tier C #3)"
  status: open
  priority: P2
  effort: s
  acceptance_criteria:
    - src/preflight.rs gains a chump-subcommand-help regression gate, runs only when staged diff touches src/main.rs OR any src/*_cmd.rs file
    - "Gate invokes the same iteration scripts/ci/test-chump-subcommand-help.sh uses: for every chump <subcmd>, assert --help exits 0 + prints non-empty Usage line"
    - Exit non-zero with INFRA-1246 error format (subcmd=X exit=N stdout=Y)
    - "Bypass: CHUMP_PREFLIGHT_SKIP_SUBCMDHELP=1 + emit preflight_subcmdhelp_bypassed"
    - "Smoke test scripts/ci/test-preflight-subcmdhelp-gate.sh: stub a broken subcmd, assert gate catches it"
    - This protects against the class of failures where a subcommand registers but its handler falls through to the LLM (real bug, INFRA-1238)

