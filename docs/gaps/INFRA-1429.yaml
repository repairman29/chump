- id: INFRA-1429
  domain: INFRA
  title: "RESILIENT: stale-branch auto-rebase — open PRs whose branch is >30min behind main get auto gh pr update-branch (prevents DIRTY-spiral)"
  status: done
  priority: P1
  effort: m
  acceptance_criteria:
    - Paramedic daemon (INFRA-1375) detects open PRs whose last commit is >30min behind main (compare commit timestamps via gh api repos/X/pulls/N + repos/X/branches/main)
    - For each stale PR, attempt gh pr update-branch --rebase BEFORE main moves further; fallback to --merge if rebase rejected; ambient-emit kind=stale_branch_auto_rebased {pr, age_min, result}
    - "Skip-list: PRs with do-not-paramedic label, PRs touched <10min ago by another agent (lease check), DIRTY PRs (those need manual resolution; flag with kind=stale_branch_dirty_skip)"
    - Default threshold 30min, configurable via CHUMP_PARAMEDIC_STALE_BRANCH_MAX_AGE_MIN
    - Smoke test scripts/ci/test-stale-branch-rebase.sh with stub gh — fixture PR with 31min-old commit gets update-branch call; 29min-old does not
    - "Eliminates the DIRTY-spiral observed today: main moves while PRs sit, 11 PRs went DIRTY simultaneously when 3 keystones landed in quick succession"
    - Depends on INFRA-1419 (merge=union drivers) — without union drivers, this gap just trades DIRTY for repeated conflict-resolution
  depends_on: [INFRA-1419]
  closed_date: '2026-05-24'
  closed_pr: 2356

