- id: INFRA-827
  domain: INFRA
  title: "ZERO-WASTE: prune stale worktrees older than 48h with no open PR — free /tmp disk on multi-session machines"
  status: done
  closed_pr: 0
  priority: P1
  effort: s
  acceptance_criteria:
    - "chump fleet prune-worktrees [--apply] [--json] scans all linked worktrees via git worktree list"
    - "Marks as stale: worktree age > CHUMP_WT_MAX_AGE_H hours (default 48) AND branch has no open GitHub PR"
    - "Default (no --apply) is dry-run: lists candidates but does not remove"
    - "--apply removes stale worktrees and emits kind=worktree_pruned to ambient.jsonl per removal"
    - "Never prunes if worktree has uncommitted changes"
    - "Never prunes the main worktree (only linked worktrees)"
    - "test scripts/ci/test-fleet-prune-worktrees.sh: 16/16 — stale-no-pr removed, active-pr kept, uncommitted-changes kept, dry-run, CHUMP_WT_MAX_AGE_H override, --json fields"
