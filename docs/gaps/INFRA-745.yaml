- id: INFRA-745
  domain: INFRA
  title: "ZERO-WASTE: persistent MCP pool for CLI/fleet path (not just ACP sessions)"
  status: open
  priority: P2
  effort: s
  acceptance_criteria:
    - CLI and fleet paths use SessionMcpPool (persistent children) instead of spawn-per-call for MCP tools
    - Memory server (chump-mcp-memory) opens SQLite once per session, not once per tool call
    - Pool lifecycle is tied to the chump process lifetime (CLI) or worker cycle (fleet)
    - Spawn-per-call remains as fallback when persistent pool fails to start

