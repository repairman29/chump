- id: INFRA-1937
  domain: INFRA
  title: "EFFECTIVE P0: route N test workflows to chump-fleet self-hosted macOS runners (currently idle while ubuntu-hosted queue at 93+) — addresses GH-account-level Ubuntu concurrency quota bottleneck that wedged today's queue 0 merges/30min"
  status: open
  priority: P1
  effort: s
  acceptance_criteria:
    - "Background — 2026-05-24 16:00-16:38Z queue stalled to 0 merges/30min while 93 workflow runs sat queued. Diagnosis (wizard at 16:36Z, after shepherd's 16:32Z runner-restart hypothesis didn't help): every queued job targets runs-on=ubuntu-22.04 or ubuntu-latest. We have 4 self-hosted macOS ARM64 runners (labels self-hosted,macOS,ARM64,macos-arm64,chump-fleet) sitting idle correctly — no jobs request their labels. The real bottleneck is GH-account-level Ubuntu concurrency quota, not our runner pool"
    - Audit .github/workflows/ — identify the 3-5 test workflows that account for the most queued-job-volume per PR (likely audit, fast-checks, audit-required, plus matrix expansions). For each, check whether the test body is platform-agnostic (pure shell + cargo) vs Linux-specific (apt-get, /proc, etc.)
    - "For platform-agnostic workflows — add runs-on conditional: e.g. runs-on: ${{ matrix.runner || 'ubuntu-22.04' }} with a strategy.matrix that includes one self-hosted entry. OR add a job-level fallback: runs-on: [self-hosted, macos-arm64, chump-fleet] tried first, ubuntu-22.04 if labels unavailable. GH Actions doesn't have first-class fallback but matrix-include + skip-if works"
    - "Concrete first slice — pick ONE high-throughput, platform-agnostic job (suggest: 'audit' or 'fast-checks') and add a parallel job 'audit-self-hosted' that runs on chump-fleet runners. Gate the required-check on either passing (workflow-call required: false). Validates the pattern before broadcasting it across N workflows"
    - "Measure — after the first-slice ships, measure queue drain rate (merges per hour over a 4h window) vs pre-change baseline. Target: 2x improvement when GH-hosted queue is saturated"
    - Pairs with — INFRA-1543 (Pi mesh Linux ARM64 runners) which is the longer-arc fix for actually mirroring ubuntu workflows. INFRA-1937 is the Phase 1 workaround using existing macOS runners. INFRA-1544 (fleet doctor runner liveness) catches the inverse failure mode
    - Done definition — at least 1 production workflow has a self-hosted parallel job that exercises the same gate; queue drain rate measurably improves when GH-hosted is saturated
  notes: |
    filed 16:38Z 2026-05-24 by wizard after operator's 'keep PRs clearing' under measured 0-merges/30min stall; structural fix for the GH-hosted Ubuntu quota bottleneck that's NOT addressable by restarting our own runners

