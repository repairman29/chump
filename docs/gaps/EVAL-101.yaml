- id: EVAL-101
  domain: EVAL
  title: "CREDIBLE: COG-041 semantic ranking + COG-046 embeddings shipped 1+ week ago. EVAL-098 baseline ran but no follow-up sweep yet. File the prereg + run the n=100/cell A/B confirming the cognition stack actually changes outcomes (per RESEARCH_INTEGRITY discipline). Without this, the cognition work is faith-based."
  status: open
  priority: P0
  effort: m
  description: |
    CREDIBLE: cognition A/B with fleet evidence — does the cognition stack (reflections, lessons, neuromodulation) improve agent task outcomes? COG-041 (semantic ranking), COG-046 (embeddings), COG-011 (reflection injection), COG-006 (neuromodulation), COG-024 (lesson pipeline) all shipped on faith. EVAL-098 verified semantic ranking diverges from recency-frequency but didn't measure quality. This eval measures whether the combined cognition stack actually improves task success.
    
    Requirement: Preregistration filed at docs/eval/preregistered/EVAL-101.md. Run n=20/cell A/B/C using reflection_tasks.json fixture. Structural scoring via scripts/ab-harness/score.py. Dual LLM judges (haiku + gpt-4o-mini). Report with Wilson 95% CI + A/A noise floor.
  acceptance_criteria:
    - Preregistration filed and committed before data collection
    - 20 tasks × 3 cells (A/B/C) = 60 trials completed
    - Structural scores computed per cell with Wilson 95% CIs
    - Delta B−A reported with bootstrapped CI
    - Dual judges (haiku + gpt-4o-mini) scored with Cohen's kappa
    - Result document written to docs/eval/EVAL-101-cognition-ab-<date>.md
    - "Decision rendered: supported, rejected, or ambiguous per decision rule"

