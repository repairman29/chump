- id: RESILIENT-167
  domain: RESILIENT
  title: "RESILIENT: INFRA-1434 (title-similarity bot-merge import wedge) promised as filed follow-up in bypass trailer — never filed; bypass trailers are lying"
  status: open
  priority: P1
  effort: xs
  opened_date: '2026-06-29'
  raised_by: cold-water
  raised_in: RED_LETTER#18
  description: |
    VERIFIED 2026-06-29 (Issue #18 Cold Water audit):

    Commit 7b97da6 (fix(CREDIBLE-144), 2026-06-22) carried:
      Bot-Merge-Bypass: bot-merge silent-wedged on its preflight chump-gap-import
      (INFRA-1434 title-similarity blocked CREDIBLE-144/145 re-import → fatal exit);
      bash-only change verified 5/5 locally, shipping directly.
      Import-wedge filed as a follow-up.

    docs/gaps/INFRA-1434.yaml does not exist.

    The failure class: chump-gap-import fatal-exits when title-similarity check
    returns >= CHUMP_GAP_RESERVE_SIMILARITY_BLOCK (0.85 default) on a re-import.
    This means any PR that tries to reimport a gap with a similar title to an
    existing gap will wedge bot-merge's preflight step. The operator then bypasses
    bot-merge entirely, leaving the structural wedge unfixed and the follow-up unfiled.

    This is a two-part failure:
    (1) The actual wedge: chump-gap-import fatal-exits on similarity-blocked titles
        instead of skipping the blocked entry and continuing (or using --force-duplicate).
    (2) The bypass trailer promised a follow-up gap that never materialized.

    The bypass-trailer-promise pattern has now occurred at least twice (INFRA-1399
    also referenced in prior-cycle trailers without a filed gap). Bypass trailers
    are becoming decorative rather than commitments.

    Falsifying condition: INFRA-1434.yaml was filed under a different ID not found
    by ls docs/gaps/INFRA-1434.yaml. No such alternative ID found by searching
    for "title-similarity" or "gap-import" in docs/gaps/*.yaml.
  acceptance_criteria:
    - "docs/gaps/INFRA-1434.yaml created with id=INFRA-1434, valid title, acceptance_criteria describing the import fatal-exit fix"
    - "chump-gap-import with --re-import flag skips similarity-blocked entries with a warning instead of fatal-exiting"
    - "A CI test verifies that bot-merge preflight succeeds when reimporting a gap that triggers similarity warning (non-blocking path)"
    - "Bot-Merge-Bypass trailers containing 'filed as a follow-up' are verified by a post-merge hook that checks the promised gap ID exists within 24h"
