- id: EFFECTIVE-290
  domain: EFFECTIVE
  title: "EFFECTIVE: chump onboard fails 'no readable intent documents found' on repos that have README/ROADMAP"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - "1. chump onboard reliably locates intent docs (README.md, docs/ROADMAP.md, AGENTS.md) in the fresh clone. 2. Fix the 'scanning local/<repo>' clone-path bug. 3. Test: onboarding a repo with a README yields a scan with non-empty proposed_gaps."
  evidence: |
    2026-06-22: 'chump onboard repairman29/BEAST-MODE' printed 'scanning local/BEAST-MODE ...' then 'no readable intent documents found in repairman29/BEAST-MODE' and produced no fresh scan — yet BEAST has README.md, docs/ROADMAP.md, AGENTS.md, etc. Likely a clone-path / working-dir bug (it scanned 'local/BEAST-MODE', not the actual fresh clone under ~/.chump/external/<owner>/<repo>/clone). IMPACT: the outward loop falls back to a 2-week-stale scan whose top gaps are already done/in-flight, which (with the no-skip-advance picker) stalls progress. AC: onboard reliably locates intent docs in the cloned external repo; a repo with a README yields a scan with proposed_gaps; add a test. Diagnose the 'local/BEAST-MODE' path.
