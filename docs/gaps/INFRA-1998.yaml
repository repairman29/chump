- id: INFRA-1998
  domain: INFRA
  title: "EFFECTIVE: chump-messaging Phase 1 — Broker trait + FileBroker + CLI shims (Rust-first substrate for scripts/coord/broadcast.sh + chump-inbox.sh; META-107 sub-gap)"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - "Existing chump-messaging crate expanded with pub trait Broker (async send / read / ack) + BrokerError thiserror enum"
    - "OutboundMessage<'a> uses Cow<'a, str> for from/to/kind/corr_id + structured serde_json::Value body (NOT escaped JSON string)"
    - "MessageLevel enum (Intent / Handoff / Stuck / Done / Warn / Alert / Feedback) + Urgency enum"
    - "ONE concrete impl: FileBroker { dir: PathBuf } — append+fsync to .chump-locks/inbox/<TO>.jsonl; atomic cursor write via tempfile+rename"
    - "Binary src/bin/chump-broadcast.rs matches scripts/coord/broadcast.sh argument surface (--to <SESSION> <LEVEL> <BODY>)"
    - "Binary src/bin/chump-inbox.rs matches scripts/coord/chump-inbox.sh read [--no-advance] surface"
    - "Backward-compat shims: scripts/coord/broadcast.sh + chump-inbox.sh exec Rust path IFF CHUMP_MESSAGING_RUST=1; legacy bash body preserved inline"
    - "Smoke test scripts/ci/test-messaging-rust-parity.sh asserts bash-vs-Rust paths produce identical inbox JSONL on 5 representative messages (special-char / JSON-shaped / pipe / newline bodies)"
    - "No new ambient event kinds (INFRA-1979 lease on EVENT_REGISTRY.yaml + INFRA-2003 lease on event-registry-reserved.txt)"
    - "No edits to docs/observability/EVENT_REGISTRY.yaml"
    - "No edits to scripts/ci/event-registry-reserved.txt"
    - "cargo fmt / cargo clippy --package chump-messaging -D warnings / cargo check --package chump-messaging all green"
  depends_on:
    - INFRA-1997
  description: |
    Phase 1 of META-107 (Rust-First Migration Blueprint) for the agent-to-agent
    messaging substrate. Sibling pattern to INFRA-1997's chump-git-hooks crate
    (just-merged #2605 at 19:09:19Z) — same discipline: smallest viable carve-out,
    ONE concrete impl, smoke test for parity, backward-compat shims, NO new
    event kinds.

    (a) Trait surface: pub trait Broker with async send / read / ack; concrete
        FileBroker that mirrors current .chump-locks/inbox/<SESSION>.jsonl
        semantics including atomic-cursor write (tempfile + rename) so
        concurrent inbox reads cannot race.
    (b) Typed message envelope: OutboundMessage<'a> uses Cow<'a, str> + serde_json::Value
        body — eliminates the sed-escape bug class from current bash callsite
        when message bodies contain JSON or special chars.
    (c) Two new bin targets (chump-broadcast, chump-inbox) match the existing
        bash argument surface so the shim flip is purely transparent.
    (d) Backward-compat: scripts/coord/broadcast.sh + chump-inbox.sh keep their
        legacy bodies inline; CHUMP_MESSAGING_RUST=1 selects the Rust path.
        Parallel-run during 1-week validation window.

    Discipline guardrails (avoid INFRA-1997 forerunner failure mode):
    - Zero new ambient event kinds.
    - Zero edits to EVENT_REGISTRY.yaml (active INFRA-1979 lease).
    - Zero edits to scripts/ci/event-registry-reserved.txt (active INFRA-2003 lease).
    - Every new CHUMP_* env var appears in scripts/ci/env-vars-internal.txt
      under an INFRA-1998 header.

    Phase 1 explicit non-goals (deferred sub-gaps):
    - NatsBroker impl (META-061 / INFRA-1118 path). FileBroker only this PR.
    - Inbox-cursor migration to SQLite. JSONL + .cursor file pattern unchanged.
    - Auto-mirror to GH comments (part of INFRA-1932 follow-up).
    - Auto-ack contract (separate slice).
    - Passive a2a on chump claim / chump gap ship (separate slices).
    - Cutover removing bash from scripts/coord/broadcast.sh body — Phase 2.
