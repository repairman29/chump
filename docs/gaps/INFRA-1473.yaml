- id: INFRA-1473
  domain: INFRA
  title: 'EFFECTIVE: shared memory team-vector-space for cross-agent context propagation'
  status: done
  priority: P1
  effort: l
  description: 'Team-tier ($49/operator/month) headline feature missed in 2026-05-15 audit pass. Persona-1 (Marcus) named
    this explicitly as one of two reasons to swipe the Team-tier card: ''If Agent 3 discovers a hyper-specific quirk about
    how our legacy database handles an indexing edge case, and that context gets instantly committed to a shared team vector
    space, the next guy on my team running a fleet doesn''t have to suffer through the same failure mode.'' Without this,
    the $49 tier is just a paid solo tier — the commercial value prop falls apart.

    '
  acceptance_criteria:
  - Each agent's discoveries during a fleet run (gotchas, dead-ends, useful patterns, failure modes) are captured as structured
    'context-nuggets' to a team-scoped store
  - Context-nuggets are embedded + queryable; subsequent agent runs on the same repo (different operator, different week)
    retrieve relevant nuggets via semantic similarity before starting work
  - Operator can browse, edit, and delete nuggets via chump --web cockpit (team-mind view)
  - 'Privacy boundary: nuggets stay within a team scope; one team''s nuggets do not leak to another team''s fleet'
  - 'Store backend pluggable: local SQLite for solo trial, hosted vector store for Team-tier subscribers (operator chooses)'
  - 'CI test: fleet A runs against repo, hits a failure mode, commits a nugget; fleet B (different operator) running similar
    work retrieves the nugget and reports having read it before starting'
  - Documented schema for nugget shape — repo-scoped, gap-derived, agent-attributed, timestamped
  - 'Hosted vector store backend: encrypted at rest (AES-256), TLS in transit, SOC 2 Type II posture targeted by launch; per-team
    row-level isolation enforced at DB layer not just application layer'
  - Operator/customer can request data export + deletion (GDPR-aligned); configurable retention windows; default 30-day on
    telemetry, indefinite on operator-flagged keeper-nuggets
  - 'SecOps procurement doc: data-flow diagram showing exactly which fields leave operator machine and which stay local'
  notes: 'MARCUS M-D (Team-tier substrate). P1 retained 2026-05-16. Reason #1 to swipe Team-tier card. Depends on M-A trust
    gate + M-B canonical demo landing first or value-prop is invisible.

    '
  closed_date: '2026-05-29'
  closed_pr: 2337
