    - only merged PRs flip; a closed-unmerged PR does NOT flip the gap
    - "idempotent: re-receiving a merged event for an already-done gap is a no-op (no error)"
    - scripts/ci/test-webhook-gap-flip.sh feeds a synthetic merged-PR payload through the flip function and asserts the gap goes done with closed_pr set, and a closed-unmerged payload leaves it open
