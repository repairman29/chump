    - the local webhook receiver (scripts/ops/github-webhook-receiver.py) flips merged-PR gaps to done — on a pull_request webhook with action=closed AND merged=true, for each gap id from _extract_gap_ids(pr), set the gap status=done + closed_pr=<pr_number> in canonical .chump/state.db (shell out to 'chump gap set <id> --status done --closed-pr <n>')
