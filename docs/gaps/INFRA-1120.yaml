- id: INFRA-1120
  domain: INFRA
  title: "EFFECTIVE: A2A Layer 2c — capability manifest + session discovery (META-061)"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - "Each worker session publishes a `CapabilityManifest` (schema: `chump-capability-v1`, fields: session_id, host, worktree_path, model, harness, current_gap_id, available_features, heartbeat_at) to NATS KV bucket `chump_capabilities` keyed by `session_id` at startup and every 30s heartbeat; TTL = 5 min"
    - "File audit: every manifest publish appends a snapshot to `.chump-locks/capabilities/<session-id>.jsonl` for forensics when NATS is unavailable"
    - "Stale manifests (heartbeat_at > 5 min old) are excluded from routing decisions and treated as session-dead by the picker"
    - "`list_capabilities() -> Vec<CapabilityManifest>` API available; picker actively consults manifests for ≥ 1 routing decision per gap during 7-day release gate run (measured via `kind=capability_routed` events)"
    - "Schema versioned via `$schema: chump-capability-v1`; readers tolerate forward-compat fields and skip unknown keys; new required fields require a `chump-capability-v2` bump"
    - "Hardware fields (GPU, IP address) gated behind `CHUMP_PUBLISH_HARDWARE=1`; default off so operator must opt in; documented in `.env.example`"
    - "Integration test `tests/a2a_layer2c.rs`: publish 32-session fixture → `list_capabilities()` → assert routing decision in < 50ms p99"
    - "EVENT_REGISTRY.yaml entries for `capability_published`, `capability_expired`, `capability_routed` present before code ships"
    - "Release gate: 7-day fleet run with manifest TTL respected (no false-positive stale-session detections), picker actively using manifests for ≥ 1 routing decision/gap"

