  description: |
    VERIFIED 2026-06-08: docs/process/RESEARCH_INTEGRITY.md contains a Prohibited Claims
    table where each prohibition is gated on a "Supporting gap." Five of those supporting
    gaps do not exist as YAML files or in the SQLite gap store:

    | Prohibited claim | Cited gate | File exists? |
    |---|---|---|
    | "Surprisal EMA is a validated contribution" | EVAL-043 | NO |
    | "Belief state improves agent performance" | EVAL-035 + EVAL-043 | NO |
    | "Chump's cognitive architecture is validated" | EVAL-043 full ablation | NO |
    | "All prior deltas are reliable" | EVAL-042 + EVAL-041 | NO |
    | "Neuromodulation is a net positive" | EVAL-030-VALIDATE | NO |

    Verification:
    - `ls docs/gaps/EVAL-043.yaml` → No such file
    - `ls docs/gaps/EVAL-035.yaml` → No such file
    - `ls docs/gaps/EVAL-042.yaml` → No such file
    - `ls docs/gaps/EVAL-041.yaml` → No such file
    - `ls docs/gaps/EVAL-030.yaml` → No such file (EVAL-030-VALIDATE also absent)
    - `find docs/gaps -name 'EVAL-*'` → only EVAL-094, EVAL-101, EVAL-102, EVAL-103, EVAL-124

    The pre-commit mechanism-kappa advisory hook (RESEARCH_INTEGRITY.md §Required Methodology
    Standards) cannot fire when the referenced gate gap IDs don't exist in the store. Any
    agent can file a PR claiming "neuromodulation is validated" and the hook has no gap ID
    to block on.

    Reference: docs/process/RESEARCH_INTEGRITY.md "Prohibited Claims" table (appears ~line
    50-60 in the doc).

    Falsifying condition: `find docs/gaps -name 'EVAL-043.yaml' -o -name 'EVAL-035.yaml'
    -o -name 'EVAL-042.yaml' -o -name 'EVAL-041.yaml' -o -name 'EVAL-030.yaml'` returns
    5 matching files with status != closed.
  acceptance_criteria:
    - "All 5 gate gaps (EVAL-043, EVAL-035, EVAL-042, EVAL-041, EVAL-030) exist as YAML files with non-empty description and falsifiable acceptance_criteria"
    - "Each gap is linked from the Prohibited Claims table via its ID so the pre-commit hook can resolve the reference"
    - "OR: RESEARCH_INTEGRITY.md Prohibited Claims table is updated to remove citations to non-existent gaps and replaced with a verifiable enforcement mechanism (e.g., a CI test that asserts the cited gap IDs exist in docs/gaps/)"
