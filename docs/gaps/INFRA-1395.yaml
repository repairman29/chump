- id: INFRA-1395
  domain: INFRA
  title: 'RESILIENT: new required-check additions get 30-min grace window — failing job is continue-on-error for PRs opened
    pre-merge; prevents fleet-wide wedge from broken sibling tests (today''s INFRA-1368 audit cascade)'
  status: done
  priority: P1
  effort: m
  acceptance_criteria:
  - When a sibling PR adds a new required check (modifies the audit/test/ACP shard list in ci.yml), bot-merge.sh detects the
    addition and emits kind=required_check_added to ambient.jsonl with fields ts/kind/pr/check_name/added_at
  - Branch-protection drift gate detects the addition and creates a 30-minute grace window stored in .chump-locks/required-check-grace.json
  - 'For PRs opened BEFORE grace_until: the new required check is treated as non-required via a github-app check-run auto-pass
    shim, or a workflow_dispatch event that re-runs without the new step'
  - After grace_until expires, the new check is fully required and any PR re-running CI must pass it normally
  - CI test scripts/ci/test-required-check-grace.sh simulates addition of a synthetic required check; asserts open PRs pre-grace
    get auto-pass; asserts a PR opened post-grace gets the normal block
  - 'docs/process/REQUIRED_CHECK_ADDITION.md documents the contract for sibling agents proposing new required checks: must
    deflake-run on a 5-sample sweep before promoting to required'
  closed_date: '2026-05-27'
  closed_pr: 2670
