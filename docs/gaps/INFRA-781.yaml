- id: INFRA-781
  domain: INFRA
  title: "RESILIENT: PR repair requires running fleet — no standalone daemon watches PR health"
  status: open
  priority: P1
  effort: s
  acceptance_criteria: |
    The PR self-healing infrastructure exists and is well-designed:
    - pr-watch.sh: detects DIRTY, rebases, force-pushes, re-arms auto-merge
    - pr-repair-rebase.sh: scans open PRs with failing checks, rebases onto main

    Both only run inside fleet worker sessions:
    - pr-watch.sh is fire-and-forget from bot-merge.sh post-arm step
    - pr-repair-rebase.sh runs at top of worker.sh main loop (agent 1 only)

    When the fleet is off (solo operator, between sessions), nothing heals.
    PRs go DIRTY after main moves and sit indefinitely. As of 2026-05-08,
    3 PRs were DIRTY simultaneously with no process watching them.

    Options (pick one or combine):
    A) Standalone cron/launchd daemon that runs pr-repair-rebase.sh every
       N minutes, independent of fleet status. Lightweight — just needs
       git + gh CLI. Could be a launchd plist or a `chump pr-repair` CLI
       subcommand with `--daemon` mode.
    B) GitHub Actions workflow triggered on `pull_request` status change
       to DIRTY/BLOCKED. Runs the rebase in CI. No local process needed.
    C) Make pr-watch.sh survive its parent session — daemonize properly
       with a PID file and auto-restart.

    Test: with fleet off, merge a PR that moves main, verify stale PRs
    get rebased within the repair interval (default 10 min).
