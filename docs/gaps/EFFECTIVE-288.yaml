- id: EFFECTIVE-288
  domain: EFFECTIVE
  title: "EFFECTIVE: chump improve GREEN-FIRST — on any repo, fix failing CI to green BEFORE picking new features"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - "1. src/improve.rs pick_gap() checks repo health BEFORE the scan-based feature pick: if a CI check fails across >=2 of the repo's open PRs (broken-gate signal), the pick is FORCED to a P0/L1 synthetic ProposedGap 'GREEN-FIRST: fix the failing CI check <name> (blocks all merges)'. 2. Only when no such failing check exists does pick_gap fall through to the existing L1<L2<L3 scan tiering (green → ship new). 3. A PURE function green_first_gap_from_failures(&[(String,usize)]) -> Option<ProposedGap> holds the logic (Some when a check fails on >=2 PRs, None otherwise) + is unit-tested both ways. 4. repo_failing_checks(owner_repo) gathers open-PR failing-check names via the gh bin (CHUMP_IMPROVE_GH_BIN), tallied by name; best-effort (network failure → empty → no false green-first). 5. The green-first pick's AC instructs: diagnose broken-check vs real issue, fix the root, prove a previously-red PR can then merge. 6. Applies on ANY repo, no per-repo config. 7. cargo fmt/clippy/check clean; new unit test passes."
  evidence: |
    Operator doctrine 2026-06-22: 'Chump should find/fix issues as a priority, automatic on any repo. Step 1: make it green. Step 2: ship something new.' Today chump improve's pick_gap (src/improve.rs:271) tiers PROPOSED work by type (L1<L2<L3, foundation-before-features) but has NO live-health gate — it picks features even when the repo's CI is RED. PROOF: on repairman29/BEAST-MODE the fleet opened feature PRs (#6 DB-backed auth) while 'Code Quality Analysis' fails on ALL 3 open PRs (#2/#4/#6, even trivial path-fix #4) → 0 merged → MISSION-010 proof blocked. Building features on a red foundation = unmergeable pile-up. CURE: add a deterministic green-first gate at the TOP of pick_gap, BEFORE the scan-based feature pick: query the repo's open-PR check rollups (gh); if a check FAILS across >=2 PRs (broken-gate signal) or on the default branch, FORCE the pick to a P0/L1 synthetic gap 'GREEN-FIRST: fix the failing CI check <name> (blocks all merges)'. Only when the repo is green does pick_gap fall through to the existing L1<L2<L3 feature tiering. Pure unit-tested fn maps failing-checks -> Option<ProposedGap> (Some=red, None=green). Automatic on ANY repo, no per-repo config. Unblocks BEAST: next improve run picks 'fix Code Quality Analysis' not a new feature -> green -> merge = MISSION-010 proof.
