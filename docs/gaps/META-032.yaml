    references the gap ID. Bypass via CHUMP_TEST_LAG_CHECK=0 with justification'
  - 'Mitigation B (heavier): add nightly cron ''test-lag-auditor'' that scans last-30-days closed gaps and files cleanup gaps
    for the lag PRs, like INFRA-307 stuck-pr-filer pattern but for test-lag'
