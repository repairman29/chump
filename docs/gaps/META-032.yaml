  title: Acceptance-criteria-as-test consistently lags implementation by N PRs — runtime ships, regression test never lands
  status: done
  priority: P2
  effort: s
  acceptance_criteria:
  - 'Define ''acceptance-criteria-coverage'' metric: for each gap closed in the last 30 days, parse acceptance_criteria array,
    classify each criterion as test-checkable (mentions ''test'', ''verify'', ''regression'', ''asserts'') and check whether
    matching test exists in scripts/ci/ or src/ with the gap ID in the file path/header'
  - 'Report current baseline: today''s audit shows 3+ instances (INFRA-370, INFRA-376, INFRA-332) where runtime shipped but
