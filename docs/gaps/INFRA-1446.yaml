- id: INFRA-1446
  domain: INFRA
  title: "EFFECTIVE: chump fleet whoworkson <topic> — single-source-of-truth grep across leases+PRs+gap titles+commits for 'who is on this problem'; prevents the 3-way race that today fixed test-cache-mergestatestatus.sh thrice"
  status: open
  priority: P1
  effort: s
  description: |
    Today: I had to manually grep .chump-locks/claim-*.json + git log + gh pr list + ambient.jsonl to figure out who else was on the test-cache-mergestatestatus.sh problem. The 3-way duplicate-fix was preventable if a single command had surfaced the in-flight overlap. Pairs with INFRA-1409 (chump pr triage) and INFRA-1442 (claim fuzzy match) — together they give the operator one-look situational awareness.
  acceptance_criteria:
    - "New CLI: chump fleet whoworkson <topic-or-keyword> — single grep across (a) active lease files (.chump-locks/claim-*.json gap_id+paths), (b) open PR titles/branches, (c) open gap titles/AC, (d) recent ambient kind=gap_claimed events"
    - "Returns table: type / id / claimant / since / matches"
    - "--json variant for tooling"
    - Sort by recency; deduplicate by gap ID
    - Used pre-claim to avoid INFRA-1442-class duplicate races
    - CI test scripts/ci/test-fleet-whoworkson.sh stubs leases+PRs+ambient + asserts the right matches surface for a given keyword

