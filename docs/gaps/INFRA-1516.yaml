- id: INFRA-1516
  domain: INFRA
  title: "RESILIENT: orphan-process reaper — worktree-prune must kill background processes (heartbeat-watcher.sh, chump --acp) before deleting worktree"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - scripts/coord/prune-worktrees.sh (and equivalent reaper logic) MUST kill any background process whose cwd matches the worktree path before rm -rf
    - "For each worktree to be reaped: list processes via lsof +D <wt-path> or pgrep -f <wt-path>, kill them, wait 2s, then delete"
    - "Smoke test scripts/ci/test-orphan-process-reap.sh: spawn a sleep loop inside a fixture worktree, call reaper, assert process is killed before directory removed"
    - "Today's signal: 11 orphan processes from chump-infra-819 (4d20h old) + chump-credible-050 (2d20h old) — these are heartbeat-watcher.sh + chump --acp invocations that didn't get cleaned up when their parent worktree was reaped; each consumed ~0 CPU but contributed to slow process-table scans and zombie lease confusion"
    - "Bonus: emit kind=worktree_orphan_process_killed {pid, cmd, worktree_path, age_seconds}"

