- id: INFRA-890
  domain: INFRA
  title: "INFRA: Network unavailability detection"
  status: open
  priority: P1
  effort: xs
  acceptance_criteria:
    - "scripts/ops/net-probe.sh: pings api.anthropic.com and emits kind=network_unavailable to ambient.jsonl when unreachable (3 retries, 2s apart); kind=network_restored when reachability resumes. CHUMP_NET_PROBE_DISABLE=1 opt-out. EVENT_REGISTRY.yaml: network_unavailable + network_restored entries. Test: scripts/ci/test-net-probe.sh — at least 4 tests covering: event fields, opt-out env, retry count, exit codes."

