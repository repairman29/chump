- id: INFRA-2382
  domain: INFRA
  title: "inventory new detector: ghost-gap-reference — PR titles reference gap_id whose YAML doesn't exist (~541 cases)"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - "Add 10th detector class `ghost-gap-reference` to DETECTOR_CLASSES in src/inventory.rs and seed at tier=0 in migrations/inventory_v1.sql via INSERT OR IGNORE (idempotent)"
    - "detect_ghost_gap_references queries: SELECT gap_id, COUNT(*) AS pr_count FROM pr_index WHERE gap_id IS NOT NULL AND gap_id NOT IN (SELECT REPLACE(name, '.yaml', '') FROM (SELECT path AS name FROM artifact_index WHERE path LIKE 'docs/gaps/%')) GROUP BY gap_id ORDER BY pr_count DESC"
    - "For each result row, insert a Finding (finding_class='ghost-gap-reference', severity='med', gap_id=<missing>, pr_number=NULL, detail='gap_id <X> appears in <N> PR title(s) but no docs/gaps/<X>.yaml exists') with evidence_json being a JSON array of the PR numbers"
    - "Bound emission at 500 findings per run to avoid flooding the table when the YAML registry has been heavily pruned"
    - "Detector is added to run_detectors_v2 (does NOT depend on PR collection — uses pr_index already populated)"
    - "Smoke test in scripts/ci/test-inventory-v2-calibration.sh: synthetic state with pr_index row (gap_id='INFRA-9999') but no docs/gaps/INFRA-9999.yaml must surface 1 finding"
