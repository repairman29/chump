- id: INFRA-1016
  domain: INFRA
  title: "RESILIENT: pr-rescue --rest-only mode (survives GraphQL exhaustion)"
  status: done
  closed_pr: 1685
  priority: P1
  effort: xs
  description: |
    Today every rescue tool (pr-rescue, queue-driver, bot-merge) uses gh pr * GraphQL shortcuts.
    When GraphQL bucket hits 0/5000 (1-2x per active day), all rescue is gagged for ~30 min.
    REST core bucket stays healthy in parallel (4868/5000 typical). Adding a --rest-only mode
    to pr-rescue.sh as the minimum-viable rescue path lets the operator still recover stuck PRs
    during GraphQL exhaustion. REST merge is immediate (no auto-merge); accepted limitation:
    only use when PR is already green and you want to force-land it now.
  acceptance_criteria:
    1. scripts/coord/pr-rescue.sh gains --rest-only flag (or CHUMP_PR_RESCUE_REST_ONLY=1 env var) that swaps any GraphQL-flavored call for its REST equivalent
    2. gh pr merge --auto --squash replaced by gh api -X PUT repos/OWNER/REPO/pulls/N/merge -f merge_method=squash (immediate merge, no auto-merge possible via REST — documented limitation)
    3. chump_gh wrapper used for the REST merge call so telemetry continues to record github_api_call events
    4. test using PATH-shim fake gh that fails on GraphQL paths and succeeds on REST paths
