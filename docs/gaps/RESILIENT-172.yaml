- id: RESILIENT-172
  domain: RESILIENT
  title: "RESILIENT: external_verify_merge tests escape their fixture sandbox and mutate the host repo (remotes, user identity, branches)"
  status: open
  priority: P1
  effort: m
  description: |
    Observed live 2026-07-18 while running cargo test --bin chump from a /private/tmp worktree: the external_verify_merge e2e tests (src/external_verify_merge.rs ~line 1806+, the add.js/__tests__/add.test.js fixture) ran git config + branch + checkout operations against the HOST repo instead of their TempDir fixture. Damage observed: (a) shared repo-level git config overwritten — user.name/email -> Test/test@example.com, remote origin URL -> git@github.com:myorg/myrepo; (b) fixture commits (initial commit / base: buggy add / fix: add returns sum) committed onto the session's real branch + a stray pr-head branch created; (c) worktree files deleted/staged. Likely cause: a test resolves the repo root via git rev-parse / cwd fallback when a fixture path is missing (the 'pathspec __tests__/add.test.js did not match' error observed mid-run) and proceeds against whatever repo cwd is in. CI never sees this because its checkout is disposable — the damage class only hits operator machines and long-lived worktrees. Same family as CREDIBLE-150 (tests touching real operator state).
  acceptance_criteria:
    - "Every git invocation in external_verify_merge tests targets an explicit fixture path (git -C <tempdir> or Command::current_dir(tempdir)); no cwd-inherited git calls"
    - A guard asserts the fixture repo root != host repo root before any mutating git op, failing loudly instead of escaping
    - cargo test --bin chump run from a linked worktree leaves git config user.*, remote URLs, and branch list bit-identical (regression test or CI check)
    - git config mutations in tests use per-fixture GIT_CONFIG or -c flags, never git config --global/--local on the host
  notes: |
    ROOT CAUSE FOUND 2026-07-18 (session forensics): git hooks export GIT_DIR/GIT_WORK_TREE for the host repo; GIT_DIR overrides Command::current_dir in every child, so pre-push -> chump preflight -> cargo test lets any git-spawning test fixture mutate the HOST repo. Fixed in PR #3196: preflight::run scrubs GIT_* at entry (chokepoint) + ext_git()/fixture_git() helpers migrate all 20 sites in external_verify_merge.rs, proven with a GIT_DIR decoy-repo harness. REMAINING (this gap stays open): same-class sites in atomic_claim.rs (gh_owner_repo fixtures write remote.origin.url), e2e_bot_tests.rs + consciousness_tests.rs (std::env::set_current_dir, process-global), and a repo-wide sweep for Command::new(git) in cfg(test) without env scrub. Also worth a CI guard: run the test suite once under a decoy GIT_DIR and assert the host repo is bit-identical.
  outcome_id: RESILIENT-000

