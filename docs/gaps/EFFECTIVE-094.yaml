    - "Enhance the EXISTING no-new-bypass gate (do not add a new gate) to a NET-NEGATIVE debt-ceiling: the distinct CHUMP_*_(BYPASS|SKIP|IGNORE|CHECK|NO_) var count in a PR must be <= the count on origin/main. Increasing it fails the gate with: \"to add a bypass var, delete one — count must ratchet down from 227\"."
