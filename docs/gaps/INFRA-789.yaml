  title: "EFFECTIVE: add Gemini 2.5 Flash Lite + Gemini 3 Flash to cascade — higher free RPD budget"
  status: done
  closed_pr: 1881
  priority: P1
  effort: xs
  acceptance_criteria: |
    Google now serves these additional models (confirmed 2026-05-08):
    - gemini-2.5-flash-lite (1M context, cheaper than Flash)
    - gemini-3-flash-preview (1M context, next-gen)
    - gemini-3-pro-preview (1M context, next-gen pro)
    - gemini-3.1-flash-lite (1M context)

    Each model gets its own 20 RPD free-tier quota. Adding 4 models
    to the cascade gives 4 × 20 = 80 RPD free across Gemini alone,
    enough for ~20 agent dispatches/day without billing.

    Add .env slots CHUMP_PROVIDER_11 through CHUMP_PROVIDER_14:
    - Slot 11: gemini-2.5-flash-lite (haiku class)
    - Slot 12: gemini-3-flash-preview (sonnet class)
    - Slot 13: gemini-3.1-flash-lite (haiku class)
    - Slot 14: gemini-3-pro-preview (opus class, reserve for verify)

    All use same GEMINI_API_KEY and googleapis.com/v1beta/openai base.
    Privacy tier: trains (same as existing Gemini slots).

    Also update is_free_tier_model() in src/execute_gap.rs to recognize
    "gemini" in the model name (currently only checks base URL for
    googleapis.com, which already works).

    Test: `chump cascade status` shows all Gemini slots; dispatch
    rotates through models when one hits RPD limit.

