- id: RESILIENT-029
  domain: RESILIENT
  title: "stale-worktree-reaper: BEFORE delete, stash uncommitted changes to wip/<gap>-<ts> branch on origin — preserves work even when worktree gets GC'd"
  status: open
  priority: P2
  effort: m
  description: |
    Defensive: even if RESILIENT-027 watchdog doesn't catch it in time, ensure work is recoverable when stale-worktree-reaper does delete a /tmp/chump-* worktree. Patch the reaper to: (1) before delete, check for uncommitted OR unpushed work, (2) if found, git stash + git push the branch as wip/<gap>-<timestamp> with note 'auto-stashed by stale-worktree-reaper at <ts>; recoverable via git checkout wip/<gap>-<ts>', (3) emit kind=worktree_work_stashed_before_reap ambient event with branch name + uncommitted line count. Worst case: operator runs git branch -r | grep wip/ to see what's been auto-saved.
  acceptance_criteria:
    - scripts/coord/stale-worktree-reaper.sh (or equivalent) gains pre-delete stash+push behavior when uncommitted/unpushed work detected
    - "Stashed branch name format: wip/<gap-id>-<unix-ts> on origin remote"
    - Emit kind=worktree_work_stashed_before_reap with fields gap_id, branch, uncommitted_lines, original_worktree
    - Register kind in EVENT_REGISTRY.yaml + event-registry-reserved.txt
    - "Smoke test: synth a worktree with uncommitted changes, run reaper in --apply mode, assert wip branch exists on origin + ambient event emitted"

