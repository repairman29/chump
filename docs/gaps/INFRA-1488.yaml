- id: INFRA-1488
  domain: INFRA
  title: 'EFFECTIVE: auto-rebase + merge-conflict-resolution agent for fleet PRs'
  status: done
  priority: P1
  effort: m
  description: 'Audit miss from 2026-05-15 second pass. Persona-1 (Marcus) Q2 disproportionate-time-sink was exactly this:
    ''I had to pull main, merge it into my branch, and manually resolve conflicts across four different files. That took about
    45 minutes of intense mental focus just to make sure I didn''t accidentally blow away someone else''s fix.'' Today bot-merge.sh
    auto-rebases when <15 commits behind with no conflict; if there ARE conflicts, the rebase fails and operator handles by
    hand. The merge-conflict-resolution-via-agent primitive is missing — exactly the kind of mechanical work the operator
    wants offloaded.

    '
  acceptance_criteria:
  - When auto-rebase encounters a conflict, an agent is dispatched to attempt resolution within the worktree's sandbox
  - Agent has read access to the diverging commit ranges (mine + theirs) and the conflict markers in the working tree
  - Agent must produce a resolution that compiles, passes the agent's normal validation suite, and doesn't accidentally drop
    changes from either side (verified by checking that both sides' AC are preserved in the AST/tests)
  - If agent fails after configured retry budget, fall back to current behavior (hand off to operator with a nudge-style soft-pause)
  - 'Operator can configure per-repo: enable/disable, agent budget, fallback behavior'
  - 'Audit log: every auto-resolved conflict is logged with both pre-state and post-state diffs for operator review'
  - 'CI test: synthetic conflict scenario, verify agent resolves, verify no side''s changes dropped, verify resolution passes
    tests'
  notes: 'MARCUS M-C (daily-tax killer). Promoted P2→P1 2026-05-16. Marcus Q2 single biggest time-sink: 45 min of intense
    mental focus per PR rebase. Self-contained; can ship parallel to M-B.

    '
  closed_date: '2026-05-22'
  closed_pr: 2320
