- id: RESILIENT-169
  domain: RESILIENT
  title: "RESILIENT: fleet has no sleep/wake-recovery hook — lid-close on battery becomes a multi-day outage instead of a pause"
  status: open
  priority: P0
  effort: m
  description: |
    The fleet substrate is a MacBook. Closing the lid on battery (the operator's normal habit) puts it into full system sleep: all fleet processes suspend, no claude -p calls, no merges, AND the oauth-token refresh daemon (runs every ~5min) cannot run. On wake there is NO recovery hook anywhere (verified: no launchd com.apple.system.wake agent, no sleepwatcher, no caffeinate supervisor in scripts/). So a routine lid-close turns into a multi-day silent outage — confirmed as the persistence mechanism behind the 2026-06-22→28 six-day stall (pmset -g log shows repeated Maintenance-Sleep/DarkWake cycles on battery; the CREDIBLE-146 stale-cache bug then prevented fast self-heal on each brief wake). REFRAME: the lid closing is normal and expected; the bug is that the fleet treats sleep as DEATH instead of a PAUSE. Two complementary levers: (A) operator-side — on AC power, 'sudo pmset -c disablesleep 1' keeps it awake lid-closed (still sleeps on battery, by design, to protect the battery); (B) fleet-side (this gap) — a wake-triggered recovery so reopening the lid restores service in ~1 min regardless. Strategic end-state: move the substrate off the laptop entirely onto the always-on Pi-mesh actions-runner (INFRA-1543). Sibling: CREDIBLE-146 (stale cache), RESILIENT-054 (auth substrate).
  acceptance_criteria:
    - "A launchd agent triggered on system wake (com.apple.system.wake / equivalent) runs a fleet-resume routine: bust auth-status cache + re-probe + kick the farmer"
    - On wake from sleep, the fleet resumes shipping within one farmer TTL window (~1-5 min) with no human intervention — verified by a documented wake-test (sleep the machine, wake it, assert farmer_auth_ok + a worker spawn within N min)
    - docs/process documents the operator-side 'sudo pmset -c disablesleep 1' lever (AC-only) and the battery tradeoff, plus the Pi-mesh-substrate end-state as the durable answer
    - the recovery routine emits an ambient event (kind=wake_recovery or similar) so the resume is auditable
  notes: |
    P0 promotion 2026-07-19 cycle plan: true unblocker for fleet revival / registry truth (operator-directed re-rank; see docs/ROADMAP.md current cycle).
  outcome_id: RESILIENT-000

