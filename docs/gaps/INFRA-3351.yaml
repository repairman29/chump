- id: INFRA-3351
  domain: INFRA
  title: "RESILIENT: bin/chump shim infinite-exec loop when PATH resolves to a sibling worktree's shim (masquerades as syspolicyd wedge)"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - "1. Reproduce: in a linked worktree, `bin/chump`'s self-recursion-guard in scripts/... (the INFRA-469 shim) skips PATH entries whose resolved dir matches _SHIM_DIR (this worktree's bin/). It does NOT skip other repos'/worktrees' bin/chump entries that are ALSO copies of the same shim (e.g. the main checkout's bin/chump ahead of it on PATH). When PATH places another worktree's bin/ before this worktree's own resolved real-binary location, _REAL resolves to that OTHER shim instead of the actual Mach-O binary.\n2. That mis-resolution causes: shim A execs shim B (CHUMP_SHIM_ACTIVE=1, CHUMP_REAL_BINARY=<shim A path>); shim B's recursion guard fires immediately and execs CHUMP_REAL_BINARY (still shim A's path) — an infinite exec loop between two shim scripts that never reaches the real binary. Observed: `gtimeout 30 bin/chump --version` spins until the timeout fires, indistinguishable from a genuine syspolicyd wedge (docs/process/CLAUDE_GOTCHAS.md#error-binary-wedge) but chump-binary-unwedge.sh's inode-swap heal does nothing to fix it (it heals the wrong thing — the shim script's inode, not the real binary).\n3. Fix: bin/chump's PATH walk (scripts or wherever the INFRA-469 shim source lives, referenced by CLAUDE_GOTCHAS.md) must detect \"this PATH entry is ALSO a shim\" (e.g. by grepping for the recursion-guard marker/header comment) and skip it too, not just entries matching its own directory. Alternative: resolve the real binary via a fixed well-known path (e.g. always prefer $HOME/.cargo/bin/chump or the homebrew-installed binary) rather than walking PATH.\n4. Regression test: scripts/ci/test-*.sh spinning up two fake \"worktree\" dirs each with a copy of the shim on PATH (one ahead of the other), asserting `bin/chump --version` from the second returns the real binary's output within a tight timeout (no infinite loop).\n5. Until fixed, the documented workaround (CHUMP_REAL_BINARY=<real binary path> CHUMP_SHIM_ACTIVE=1 <command>) should be added to docs/process/CLAUDE_GOTCHAS.md#error-binary-wedge as a distinguishing diagnostic step (if the workaround unblocks it but chump-binary-unwedge.sh's heal doesn't, it's this bug, not a real syspolicyd wedge).\n6. Precedent: hit live during META-101 ship (2026-07-20 ~19:20-19:27) — burned ~7 min and multiple bot-merge retries misdiagnosing this as a syspolicyd wedge before finding the actual PATH-resolution root cause."

