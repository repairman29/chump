  description: "Sub-gap of META-114 freshness discipline cluster. Phase 1 of three.\n\nFailure mode this closes: every \"\
    stale-tree false-positive\" gap (e.g.\nshepherd's 2026-05-27 recovery-queue-emit.sh phantom-missing) starts\nwith a MUTATE\
    \ operation against a stale local view. Operator's local\nmain is 48-63 commits behind origin/main; a file that exists\
    \ on\norigin/main appears missing locally; operator/curator files a \"file\nmissing\" gap or runs a destructive op against\
    \ a phantom state.\n\nPhase 1 SHIPS THE SCRIPTS but is intentionally NON-INVASIVE: no hook\nwiring, no chump fleet-bootstrap\
    \ --check integration, no EVENT_REGISTRY\naddition (uses event-registry-reserved.txt allowlist). Integration is\na separate\
    \ sub-gap so Phase 1 is reviewable + ship-able as additive.\n\nReal-world precedent (2026-05-27 shepherd session):\n \
    \ - recovery-queue-emit.sh phantom-missing (worst) — shepherd filed\n    an almost-gap for a file that existed on origin/main\n\
