  status: done
  priority: P1
  effort: m
  acceptance_criteria:
  - NEW scripts/coord/freshness-preamble.sh classifies session-start state into FRESH/STALE/CRITICAL_STALE based on (a) git
    commits-behind via fetch+rev-list, (b) binary-age via stat-mtime $(which chump), (c) chump cron health (fail-soft to unavailable),
    (d) chump fleet-bootstrap --check exit code (fail-soft); emits single-line stdout summary + exits 0/1/2 reflecting state;
    --json variant for programmatic use
  - 'Env-tunable thresholds: CHUMP_FRESHNESS_COMMITS_THRESHOLD (default 50 = CRITICAL_STALE above), CHUMP_FRESHNESS_BINARY_AGE_S
    (default 14400 = 4h CRITICAL_STALE above), CHUMP_FRESHNESS_STALE_COMMITS (default 15 = STALE above), CHUMP_FRESHNESS_STALE_BINARY_AGE_S
    (default 3600 = 1h STALE above), CHUMP_FRESHNESS_DISABLE_FETCH (skip fetch for offline tests)'
  - 'NEW scripts/coord/freshness-gate.sh is a thin wrapper: calls freshness-preamble.sh, refuses chained op on CRITICAL_STALE
    (exit 2) unless CHUMP_ACCEPT_STALE=1; on bypass emits kind=freshness_critical_stale_bypassed to ambient with commits_behind,
    binary_age_s fields'
  - freshness_critical_stale_bypassed kind allowlisted in scripts/ci/event-registry-reserved.txt with reason; EVENT_REGISTRY.yaml
    integration deferred to follow-up sub-gap (Phase 1 stays additive)
  - All 6 new env vars (CHUMP_FRESHNESS_COMMITS_THRESHOLD, CHUMP_FRESHNESS_BINARY_AGE_S, CHUMP_FRESHNESS_STALE_COMMITS, CHUMP_FRESHNESS_STALE_BINARY_AGE_S,
    CHUMP_FRESHNESS_DISABLE_FETCH, CHUMP_ACCEPT_STALE) documented in scripts/ci/env-vars-internal.txt under META-115 header
  - NEW Pattern 12 in docs/process/SHEPHERD_LOOP_PLAYBOOK.md (Verify-at-source via freshness preamble) documents the workflow
    with the 2026-05-27 shepherd 3-stale-false-positive precedent (recovery-queue-emit.sh phantom-missing + fleet-hold-check.sh
    + chump --temp multi-line)
  - Smoke test scripts/ci/test-freshness-preamble.sh covers (1) file existence, (2) default invocation, (3) simulated STALE
    via binary-age threshold override, (4) simulated CRITICAL_STALE, (5) gate refusal exit=2, (6) gate bypass with ambient
    audit emit, (7) valid --json output, (8) env-vars-internal.txt + event-registry-reserved.txt allowlisting; test sets CHUMP_AMBIENT_DISABLE=1
    + CHUMP_FRESHNESS_DISABLE_FETCH=1 for hermeticity; exit 0 required
  - 'Phase 1 NON-GOALS (deferred to follow-up sub-gaps): SessionStart hook wiring at ~/.claude/hooks/SessionStart.sh; chump
    fleet-bootstrap --check integration; per-event kind registration in EVENT_REGISTRY.yaml; chump CLI subcommand wrapper
    (`chump freshness check`)'
