- id: INFRA-800
  domain: INFRA
  title: 'EFFECTIVE: chump gen --local flag — force local-only provider (bypass cascade)'
  status: done
  priority: P1
  effort: xs
  description: 'chump gen uses build_provider() which routes through the cascade''s global provider — cloud slots are preferred
    over local (Ollama/Qwen). For the Week 1 roadmap outcome, a solo dev with 24GB Mac needs to force local-only without unsetting
    cloud keys. Add --local flag to chump gen that calls build_provider_single() with OPENAI_API_BASE forced to Ollama, bypassing
    the cascade entirely. Discovered during EFFECTIVE-001 testing (2026-05-10): all cloud API keys had to be unset to test
    Qwen 2.5 7B.

    '
  acceptance_criteria:
  - chump gen --local uses local Ollama provider
  - chump gen --local works without cloud API keys configured
  - chump gen (no flag) continues to use cascade as before
  - --local flag documented in --help
  closed_date: '2026-05-10'
  closed_pr: 1392
