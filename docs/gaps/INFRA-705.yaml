- id: INFRA-705
  domain: INFRA
  title: "RESILIENT: stall-detector — kill wedged cycles at 120s instead of burning 600s"
  status: open
  priority: P2
  effort: m
  acceptance_criteria: |
    Criterion 1: A stall-detector mechanism exists that kills agent cycles producing no output for 120 consecutive seconds
    Criterion 2: The 120s threshold is configurable (env var or CLI flag)
    Criterion 3: Killed cycles emit an ambient event with `kind=cycle_stall_killed` including cycle ID and elapsed time
    Criterion 4: The detector is wired into the agent dispatch loop (not a standalone binary)
    Criterion 5: Test verifies a deliberately-stalled cycle is killed within the threshold

