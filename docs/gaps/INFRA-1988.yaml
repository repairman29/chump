- id: INFRA-1988
  domain: INFRA
  title: 'RESILIENT: hook silent-no-op alarm — when pre-push (or any git hook) exits 0 without entering its main ref loop
    on a non-trivial push, emit kind=hook_silent_passthrough'
  status: done
  priority: P1
  effort: xs
  acceptance_criteria:
  - 'Every git hook in scripts/git-hooks/* gets a sentinel: at the top of its main work loop, increment a counter in shell-local
    variable; on hook exit, if counter==0 AND push was non-trivial (≥1 ref, not all-zero SHAs), emit ambient event kind=hook_silent_passthrough
    with hook_name + reason=''loop did not execute'''
  - 'Non-trivial heuristic: stdin had ≥1 line of ''local_ref local_sha remote_ref remote_sha'' format; ZERO_SHA-only pushes
    (deletions, etc.) are trivial and exempt'
  - Reason field captures WHY the loop didn't execute (stdin empty, early-return before loop, exception, etc.) — use $LINENO
    + last-executed marker
  - 'Smoke test scripts/ci/test-hook-silent-noop.sh: run pre-push with empty stdin → assert ambient event fires; run with
    real stdin → assert no event'
  - 'Doc update: docs/process/CLAUDE_GOTCHAS.md gets ''Silent hook detection'' entry referencing the 3-day pre-push regression
    (INFRA-1986) that motivated this'
  - 'Telemetry: aggregate kind=hook_silent_passthrough events over 24h window; if any hook fires >2x, file follow-up gap (this
    is the floor-temp WARM signal)'
  depends_on: []
  description: 'See docs/strategy/THE_FLOOR.md §3. The 3-day pre-push regression

    (INFRA-1986) existed because the hook exited 0 silently — no test,

    no log, no alarm. This gap converts that invisible failure into

    a visible ambient event.


    Rough shape: (a) every hook gets ~5 LOC: counter var + sentinel

    at top of main loop + on-exit trap that checks the counter; (b)

    ambient emit via the existing scripts/dev/ambient-emit.sh helper;

    (c) smoke test with empty stdin to validate the alarm fires.


    XS effort because the actual fix is ~30 LOC × 4 hooks. Smoke

    test is the bulk of it.


    Pairs with INFRA-1996 (silent-failure tax) — this catches RUNTIME

    silent passthroughs; the tax catches STATIC silent-failure

    surfaces in source code.

    '
  closed_date: '2026-05-25'
  closed_pr: 2595
