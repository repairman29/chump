- id: INFRA-2212
  domain: INFRA
  title: 'RESILIENT: fix INFRA-2184 regression — _PREPUSH_WRAPPER_OVERRIDE empty-array under set -u (INFRA-1316 class)'
  status: done
  priority: P1
  effort: xs
  description: 'INFRA-2184 (merged) added a _PREPUSH_WRAPPER_OVERRIDE bash array to scripts/git-hooks/pre-push but used the
    unsafe "${_PREPUSH_WRAPPER_OVERRIDE[@]}" reference under set -u. When the probe finds healthy sccache (the common case),
    the array stays empty, and the next reference fails with ''unbound variable'' — blocking every push that runs the test
    gate. This was already biting an INFRA-2203 Sonnet this session. INFRA-1316 documents the safe idiom: "${arr[@]:+...}".
    Apply it at both invocation sites in the test gate.

    '
  acceptance_criteria:
  - 'scripts/git-hooks/pre-push: both _PREPUSH_WRAPPER_OVERRIDE references switch from "${_PREPUSH_WRAPPER_OVERRIDE[@]}" to
    ${_PREPUSH_WRAPPER_OVERRIDE[@]:+"${_PREPUSH_WRAPPER_OVERRIDE[@]}"}'
  - bash -n scripts/git-hooks/pre-push clean
  - 'Manual verification: empty array + set -u does not throw ''unbound variable'' (simulate via shell repro)'
  - 'No regression on the broken-sccache path: when the probe sets the override, the env CARGO_BUILD_RUSTC_WRAPPER= still
    fires correctly'
  - chump preflight before push
  depends_on:
  - INFRA-2184
  closed_pr: 2766
