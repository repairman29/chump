  title: 'FLEET-034 AC#8: cross-machine integration test for NATS push routing'
  status: done
  priority: P2
  effort: m
  acceptance_criteria:
  - NATS broker spun up by test harness (e.g., nats-server in Docker or local binary)
  - 'Host A: CoordClient reserves gap via chump gap reserve, daemon publishes to NATS subject'
  - 'Host B: CoordClient subscribes to chump.work.* subject, receives envelope'
