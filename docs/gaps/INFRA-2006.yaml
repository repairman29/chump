- id: INFRA-2006
  domain: INFRA
  title: "RESILIENT: A2A inbox-routing bug — --to <lease-session-id> writes to wrong inbox file; receivers read from worktree-derived session not lease-id. Messages 'delivered' but never 'seen'. Need alias map: lease.gap_id → reader-session-name OR change reader to also check all leases owned by current session."
  status: done
  priority: P0
  effort: s
  acceptance_criteria:
    - "Diagnose the bug surface: enumerate the 3 ways a session 'identifies itself' (CHUMP_SESSION_ID, lease.session_id, gap-derived) and the writer/reader filename conventions for chump-inbox.sh. Document in a 1-page brief at docs/process/A2A_INBOX_ROUTING.md before any code change."
    - "Implement reader-side fix (safer): scripts/coord/chump-inbox.sh read also checks ALL inbox files for leases owned by current session (.chump-locks/inbox/<lease-session-id>.jsonl and .chump-locks/opus-inbox/session_<lease-session-id>.jsonl), unions the message list, deduplicates by message-id"
    - "Optionally implement writer-side helper: scripts/coord/lib/inbox-routing.sh resolve_inbox_target <session-or-gap-id> — returns the canonical inbox path. broadcast.sh --to uses this helper. Falls back to literal name if no alias found."
    - "Smoke test scripts/ci/test-a2a-inbox-routing.sh: synth 2 sessions (one as 'reader' with CHUMP_SESSION_ID=A and a claim file owned by lease-session-id=B); sender does broadcast.sh --to B '<msg>'; reader runs chump-inbox.sh read; assert reader sees the message (currently it does not — that's the bug)"
    - Emit kind=a2a_inbox_alias_resolved when the helper resolves a lease-id to a reader-session; emit kind=a2a_inbox_message_orphan when a message lands in an inbox no live session owns (advisory; not fatal)
    - Register both new ambient kinds in docs/observability/EVENT_REGISTRY.yaml + scripts/ci/event-registry-reserved.txt
    - "Update SHIP_ASSIST_PLAYBOOK.md §1 with new Class 8: a2a-inbox-routing-message-loss (will be added in follow-up PR if SHIP_ASSIST_PLAYBOOK.md is touched here)"
  notes: |
    [2026-05-30T05:28:42Z] [2026-05-29 promotion to P0] Today's evidence: curator-opus-shepherd-2026-05-29 saw 17 cycles of empty inbox reads while 11+ sibling sessions were active in the fleet. Pattern-14 verified the routing path went to wrong filename → message lost. This is silent message loss in the A2A substrate — operational reliability bug class-1. Promoted from P1/s to P0/s. Pairs with INFRA-2034 (broadcast.sh positional-arg footgun) + INFRA-2039 (gap field overload) — those are sender-side; this is the routing bug between sender and reader.
  closed_date: '2026-05-30'

