- id: INFRA-2006
  domain: INFRA
  title: 'RESILIENT: A2A inbox-routing bug — --to <lease-session-id> writes to wrong inbox file; receivers read from worktree-derived
    session not lease-id'
  status: done
  priority: P1
  effort: s
  acceptance_criteria:
  - When broadcast.sh --to <recipient-id> matches an active lease.session_id, ALSO write to the inbox file the recipient actually
    reads from (the worktree-derived or env-set CHUMP_SESSION_ID of the agent that holds the lease)
  - 'Resolution: scan .chump-locks/inbox/ for the most-recently-updated inbox file owned by the same gap (heuristic 1) OR
    maintain .chump-locks/session-alias-map.json that ties lease.session_id → reader.session_id when the worker first writes
    its inbox cursor (heuristic 2)'
  - 'Preserve back-compat: still write to .chump-locks/inbox/<lease-id>.jsonl AND to the resolved reader inbox (dual-write
    so old readers don''t break)'
  - 'Smoke test scripts/ci/test-broadcast-to-lease-id.sh: stub lease at $TMP/.chump-locks/claim-X.json + reader inbox cursor;
    broadcast --to lease.session_id; assert message landed in BOTH inboxes'
  - 'Doc update: docs/process/OPUS_MESSAGE_PROTOCOL.md — note the dual-write behavior so senders understand --to <lease-id>
    is an alias for the reader-session'
  description: 'Catalyst: 2026-05-25 wizard session sent 8 A2A messages to lease-IDs.

    All landed in inbox/<lease-id>.jsonl but receivers read from

    inbox/chump-Chump-NNN.jsonl. Messages ''delivered'' but never ''seen''.


    Root cause: lease.session_id (an arbitrary daemon-spawned token) is

    NOT the session_id the worker uses when calling chump-inbox.sh read.

    Workers without explicit CHUMP_SESSION_ID derive a worktree-based ID.


    Two readers can also collide on the same generic inbox file (e.g.

    multiple agents in main checkout all read .chump-locks/inbox/chump-Chump-NNN.jsonl).

    Mail-bag collision is the next bug class once this lands.

    '
  closed_date: '2026-05-30'
  closed_pr: 2817
