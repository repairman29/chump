- id: DOC-020
  domain: DOC
  title: agent-side guidance — cap gh pr checks polling to 3 attempts/session before backing off (codify in AGENTS.md)
  status: open
  priority: P2
  effort: xs
  description: 'Observed pattern: agent watching a PR polls gh pr checks every minute for 5+ minutes, then gives up. Each poll = ~200 output tokens for the diff + reasoning. Fleet of 8 agents × 5 polls/PR
    × 20 PRs/day = ~160K wasted output tokens/day.


    Codify in AGENTS.md: cap PR-check polling at 3 attempts (~3 min apart). After that, hand off to pr-watch-shepherd (already running on launchd) and proceed with other work. Use Bash run_in_background
    or ScheduleWakeup for ''check back later'' pattern.'
  acceptance_criteria:
  - AGENTS.md adds 'PR check polling discipline' subsection
  - Mentions ScheduleWakeup + pr-watch-shepherd as the proper waiting mechanisms
  - No tooling change required (advisory)
