- id: INFRA-794
  domain: INFRA
  title: "ZERO-WASTE: diagnostic script for core.worktree misconfiguration across worktrees"
  status: done
  closed_pr: 1389
  closed_date: '2026-05-10'
  priority: P1
  effort: m
  description: |
    
    During the CREDIBLE-017 session (2026-05-10), the linked worktree at
    .chump/worktrees/credible-017 had core.worktree pointing to infra-617
    instead of credible-017 in its worktree-specific git config. This caused
    git rev-parse --show-toplevel to resolve to the wrong directory, breaking
    bot-merge.sh, chump-commit.sh, and all git operations.
    
    Root cause: gap-claim.sh or git worktree add does not validate core.worktree
    after creation. Likely caused by manual git config commands or a bug in an
    earlier script.
    
    Fix: Create scripts/coord/check-worktree-config.sh that reads git worktree
    list --porcelain and verifies core.worktree in each worktree's git dir.
    Also fix gap-claim.sh or the worktree creation flow to set core.worktree
    correctly on creation or validate it post-creation.
    EOF
    )
  acceptance_criteria:
    - check-worktree-config.sh reports MISMATCH when core.worktree is deliberately wrong
    - check-worktree-config.sh --fix corrects the mismatch
    - check-worktree-config.sh --json outputs valid JSON
    - gap-claim.sh validates or sets core.worktree on worktree creation
    - Documentation added to AGENTS.md or CONTINUAL_LEARNING.md about the check

