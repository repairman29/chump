- id: INFRA-2086
  domain: INFRA
  title: "RESILIENT P1 STRUCTURAL: chump_cargo_build loud-fail wrapper — detects silent cargo build failures (today's INFRA-2082 chump-mcp-coord class where 'cargo build -q' exits 0 but produces no binary); all CI scripts use wrapper instead of bare cargo build"
  status: open
  priority: P1
  effort: xs
  acceptance_criteria:
    - "New function chump_cargo_build() in scripts/coord/lib/cargo-helpers.sh — wraps `cargo build` with: (a) timeout (default 300s) with explicit error on timeout, (b) capture stderr to log even when -q flag present, (c) post-build existence check on the expected binary path (passed as arg), (d) detect tauri/proc-macro registry corruption error pattern and emit ambient kind=cargo_registry_corruption + suggest `cargo clean -p <crate>` to operator"
    - "API: `chump_cargo_build --package <pkg> --binary <bin-name> [--release] [--timeout-s 300]` — exits non-zero with structured stderr message if build fails OR if binary path missing after build OR if registry corruption detected"
    - "Migration: identify all CI scripts that call bare `cargo build` (grep `cargo build` scripts/ci/*.sh) and migrate to chump_cargo_build. At least 5 scripts: test-mcp-coord-smoke.sh (the INFRA-2082 surfacer), coord-surfaces-smoke.sh, others"
    - "Smoke test scripts/ci/test-chump-cargo-build-wrapper.sh: (a) build a non-existent package, assert loud-fail with helpful error; (b) build a real package with binary, assert success + binary present; (c) simulate corruption (rm target/debug/chump-mcp-coord between build and check), assert loud-fail with corruption-detected message; (d) test timeout path with synthetic --timeout-s 1 against a slow-build crate"
    - "EVENT_REGISTRY.yaml entry kind=cargo_build_failed (fields: package, binary, exit_code, duration_s, suspected_class ∈ {timeout, registry_corruption, missing_binary, compile_error}); kind=cargo_registry_corruption (fields: crate, suggested_fix); allowlist entries"
    - "Trunk-RED gate: after migration, no script can silently lose a cargo build failure — every failure surfaces with structured info"
  notes: |
    Filed 2026-05-27 by curator-opus-shepherd after INFRA-2082 surfaced: chump-mcp-coord build silently produced no binary on self-hosted runner. cargo build -q exited 0 (suspicious — was tauri registry cache the cause?). With this wrapper, INFRA-2082 would have been impossible by construction: chump_cargo_build would have detected missing binary + emitted cargo_registry_corruption + suggested fix in the same script.

