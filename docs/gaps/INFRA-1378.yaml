- id: INFRA-1378
  domain: INFRA
  title: "ZERO-WASTE: add concurrency.cancel-in-progress to every workflow — old CI dies instantly on re-push, saves the 17-23min burn-then-cancel cycle (~20 cancelled runs in last hour)"
  status: open
  priority: P1
  effort: xs
  description: |
    Observed: ~20 cancelled CI runs in last hour, each burning 17-23 min before timing out. With cancel-in-progress, the moment a PR receives a new commit (incl auto-merge bot main-merge) the previous run dies in seconds. Cheap belt-and-suspenders alongside INFRA-1377 Merge Queue. Single-line YAML addition per workflow. Total surface: ~10 files, ~5 lines each. Highest leverage-per-line in the whole CI cleanup arc.
  acceptance_criteria:
    - "Add `concurrency:` block to every .github/workflows/*.yml file with group=`${{ github.workflow }}-${{ github.ref }}` and cancel-in-progress=true"
    - Verify ci.yml, release.yml, e2e-pwa-advisory.yml, editor-integration.yml, no-anthropic-smoke.yml, repo-health.yml, gap-status-guard.yml, ftue-clean-machine-2026.yml all have it
    - CI test scripts/ci/test-workflow-cancel-in-progress.sh asserts every workflow yml has the concurrency block (regex-grep gate, runs in fast-checks)
    - Branch-protection drift gate updated to flag missing concurrency blocks on new workflow PRs
    - "Measure: ambient counter of \"ci_run_cancelled\" reasons — \"superseded by new commit\" should dominate immediately; \"timeout\" should drop to near-zero"

