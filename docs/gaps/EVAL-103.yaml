- id: EVAL-103
  domain: EVAL
  title: "CREDIBLE: EVAL prereg-enforcement runtime gates — runner reads prereg's locked-fields manifest, asserts every env/flag matches, fail-closed on any deviation; ships BEFORE EVAL-102 sweep"
  status: open
  priority: P1
  effort: s
  acceptance_criteria:
    - "scripts/eval/lib/prereg-enforce.sh exists; given a preregistration MD path, parses the §12 locked-fields YAML manifest"
    - "scripts/eval/run-eval-<ID>.sh wraps any eval run, calls prereg-enforce.sh before any data collection — refuses to start if env/CLI flags don't match the manifest"
    - "Asserts model field (CHUMP_AGENT_MODEL / --model flag) matches manifest.primary_agent exactly; substitution → exit 1 with named mismatch"
    - "Asserts judge models match manifest.judge_models exactly (set equality)"
    - "Asserts n target (--n-per-cell) >= manifest.n_per_cell"
    - "Asserts fixture path matches manifest.fixture"
    - "Asserts CHUMP_AB_SCORER != 'exit-code' (per RESEARCH_INTEGRITY §6)"
    - "On mid-run deviation (e.g., judge falls offline, model substitution at retry): runner writes timestamped entry to the prereg MD §13 (append-only) with commit SHA of the runner binary, AND prints PROTOCOL-DEVIATION in the result-doc title"
    - "Emits ambient kind=eval_prereg_check with prereg_id, result (pass|fail|deviation), mismatched_fields[]"
    - "scripts/ci/test-prereg-enforce.sh: fixture replays EVAL-101's failure mode (model=Qwen, n=20, no Cell C, no LLM judge) against EVAL-102's prereg — asserts each check fires correctly"
    - "Documented in docs/process/RESEARCH_INTEGRITY.md as new §10 (Runtime enforcement) so future prereg authors know to populate §12 locked-fields"
    - "EVAL-102's smoke-check (n=2/cell) is the integration test for this gate — must pass with all 4 fields correct AND fail with each field flipped wrong"

