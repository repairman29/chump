- id: INFRA-1833
  domain: INFRA
  title: "RESILIENT: chump-commit.sh auto-runs cargo fmt --all before commit (auto-fix, no bypass) — kills cargo fmt --check CI failure class permanently"
  status: open
  priority: P1
  effort: s
  acceptance_criteria:
    - scripts/coord/chump-commit.sh runs 'cargo fmt --all' (not --check) on the workspace before invoking git commit
    - Auto-applies formatting fixes; if any files were changed, git add -A them into the staging set so they land in the same commit
    - Only runs when staged delta includes .rs files (skip for docs-only commits to keep fast path)
    - "Bypass: CHUMP_AUTO_FMT=0 with audit-trail emit kind=auto_fmt_bypassed; default behavior is AUTO (mandate by auto-fix, not by check-and-fail)"
    - "Smoke test scripts/ci/test-chump-commit-auto-fmt.sh: synthesize a malformatted .rs file, run chump-commit.sh, assert fmt was applied + file staged"
    - This eliminates today's cargo fmt --check CI failure class entirely; agents/humans can't bypass because there's nothing to bypass — fmt just happens

