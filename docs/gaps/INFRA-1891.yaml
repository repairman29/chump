- id: INFRA-1891
  domain: INFRA
  title: "CREDIBLE: chump fleet log-triage — daily structured pass over last 24h ambient.jsonl × state.db cross-reference, outputs Markdown triage report with ≤5 candidate findings + dedup status (operator gate before filing; replaces ad-hoc 'maybe I should review the logs' habit)"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - 1. New chump fleet log-triage subcommand (Rust, in main chump CLI; new file e.g. src/log_triage.rs and a clap subcommand definition)
    - 2. Reads last 24h (default; configurable via --window-h N) of .chump-locks/ambient.jsonl, tolerates JSON parse errors (skip + count), computes event-kind histogram
    - "3. Cross-references rare kinds (<=40 occurrences by default; tunable via --rare-threshold N) against state.db: kind=gap_failed → join gaps.status (flag detector firing on done gaps); kind=pr_auto_rebase_failed → join PR cache or gh API (flag still-DIRTY); kind=dirty_pr_unresolvable → group by conflict_files (flag hot-file pattern across PRs)"
    - "4. Dedup against existing gaps: for each finding generate a candidate gap title + run chump gap consolidate --threshold 0.7 OR equivalent similarity check; report dedup status (none / suggested-dup <gap-id>)"
    - "5. Output Markdown to .chump/triage/YYYY-MM-DD.md with sections: (a) scan window + events processed + parse errors, (b) top-10 event-kind histogram, (c) <=5 candidate findings each with: signature, evidence (3 sample event lines), cross-ref result, dedup status, suggested gap title + AC stub"
    - "6. Hard cap: <=5 findings in main section (operator-attention budget); overflow goes to appendix tagged 'low-signal'"
    - 7. --json flag emits the same data structure as JSON for machine consumers (PWA dashboard, etc.)
    - "8. Scheduled daily at 09:00 local via launchd plist scripts/launchd/com.chump.log-triage.plist; on completion emit kind=log_triage_completed with finding_count, parse_errors, candidate_gap_count"
    - 9. Emit kind=log_triage_finding_high_signal per candidate finding (so other detectors / PWA can react)
    - "10. Unit test scripts/ci/test-log-triage.sh: seed fixture .chump-locks/ambient.jsonl with known signatures + fixture state.db, run log-triage --window-h 1 --json, assert JSON contains exactly the expected findings + correct dedup status"
    - "11. Operator workflow: morning ritual — read .chump/triage/today.md (symlink to today's report), decide which 0-5 candidates to file via chump gap reserve"

