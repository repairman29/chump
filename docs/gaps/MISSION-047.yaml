- id: MISSION-047
  domain: MISSION
  title: "MISSION: P0-MISSION effort>=m gaps starve — haiku-worker m/l/xl effort gate lacks the _is_p0_mission bypass (the symmetric sonnet-xs gate has it) in BOTH pickers; mission gaps invisible to haiku workers = MISSION-026 root cause"
  status: done
  priority: P0
  effort: s
  acceptance_criteria:
    - add 'and not _is_p0_mission' to the haiku m/l/xl effort gate in BOTH scripts/dispatch/_pick_gap.py and scripts/dispatch/_pick_and_claim_gap.py so P0-MISSION gaps bypass it (mirroring the sonnet-xs gate)
    - a haiku worker's candidate set includes a P0-domain=MISSION effort=m gap
    - non-mission effort=m gaps are still excluded for haiku workers (no regression)
    - scripts/ci/test-picker-p0-mission-effort-bypass.sh asserts both pickers include a P0-MISSION m-gap and exclude a P1 m-gap for a haiku worker
  closed_pr: 3142
  evidence: |
    VERIFIED 2026-06-21: MISSION-046 (P0/effort=m) was silently skipped by the fleet, which picked INFRA-1472 (P1/xs) instead. ROOT CAUSE in scripts/dispatch/_pick_gap.py:464 and scripts/dispatch/_pick_and_claim_gap.py:636: 'if worker_model == "haiku" and e in ("m","l","xl"): continue' has NO _is_p0_mission bypass — but the very next line (the sonnet-xs gate, :466/:638) DOES bypass for P0-mission ('and not _is_p0_mission'). The original MISSION-026 fix only patched the sonnet-xs gate, leaving the haiku-m/l/xl gate to silently drop P0-MISSION gaps with effort>=m. Since routing/default makes workers haiku, NO worker can pick a P0-MISSION m+ gap → permanent starvation. This is the literal mechanism of MISSION-026 ('fleet ignores mission gaps in practice'). AC: (1) add 'and not _is_p0_mission' to the haiku m/l/xl gate in BOTH _pick_gap.py and _pick_and_claim_gap.py so P0-MISSION gaps bypass it (mirroring the sonnet-xs gate); (2) a haiku worker's candidate set INCLUDES a P0-domain=MISSION effort=m gap (was excluded); (3) non-mission effort=m gaps are still excluded for haiku workers (no regression); (4) scripts/ci/test-picker-p0-mission-effort-bypass.sh asserts both pickers include a P0-MISSION m-gap and exclude a P1 m-gap for a haiku worker. SIBLING (capability, separate gap): a picked P0-MISSION m+ gap must run on sonnet not haiku (else it times out) — routing/model-override fix.
