- id: INFRA-2263
  domain: INFRA
  title: 'RESILIENT: AGENTS.md comms policy — clarify Claude-session SessionStart digest vs bash-daemon deafness on fleet
    wire'
  status: done
  priority: P1
  effort: xs
  description: 'AGENTS.md communication-channels section (shipped in INFRA-2202 #2745) describes NATS broadcast vs inbox DM
    but doesn''t explain WHY peer curators don''t seem to read broadcasts. Sharper diagnosis: Claude Code sessions get a SessionStart
    ambient digest (via ambient-context-inject.sh on the Claude harness hook) — that''s how they ''read'' peer messages. Bash
    curator-loop daemons (decompose-loop / handoff-loop / etc) have no SessionStart equivalent and never read ambient.jsonl
    OR subscribe to NATS — they''re deaf by construction unless a per-tick inject is wired in (filed as INFRA-2262). Update
    AGENTS.md to call this out so the next reader of the comms-channels section understands the reach asymmetry.

    '
  acceptance_criteria:
  - 'AGENTS.md communication-channels section gets a new subsection ''Reach asymmetry — Claude sessions vs bash daemons''
    that explains: Claude Code sessions read ambient.jsonl tail at SessionStart (file-polled, not real-time); bash curator-loops
    do NOT read ambient by default and are deaf to fleet wire unless ambient-context-inject is wired into per-tick (INFRA-2262)'
  - Section explicitly names the 6 productized bash loops + their current deafness status
  - 'Includes a worked example: ''I broadcast FEEDBACK on NATS at 12:00 — wizard sees it at 12:05 SessionStart digest; decompose-loop
    never sees it'''
  - Cross-references INFRA-2262 (quick-win inject)
  - Section also notes that broadcasts go to BOTH NATS jetstream AND ambient.jsonl (dual-publish in broadcast.sh emit_to_nats)
    so a NATS outage doesn't break fanout — the file-based channel is the durable one
  - No code change; doc-only
  - chump preflight green
