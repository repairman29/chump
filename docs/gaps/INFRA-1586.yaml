- id: INFRA-1586
  domain: INFRA
  title: "ZERO-WASTE: PWA header dedup — remove model/cost/pillar/autopilot chips already canonical in status-footer (header → title + repo + heartbeat only)"
  status: done
  priority: P1
  effort: s
  description: |
    Per docs/design/OPERATOR_CONSOLE_V2.md §footer the status-footer (<chump-status-footer>) is the canonical operator HUD with 6 slots: model / cost / air-gap / pillars / fleet / GH budget. That component shipped via PRODUCT-107.
    
    But the original header chips were never removed. Today web/v2/index.html:2313-2321 still renders all six in #app-header:
      <chump-repo-switcher>
      <chump-model-picker>       ← duplicates footer model slot
      <chump-cost-meter>         ← duplicates footer cost slot
      <chump-pillar-health>      ← duplicates footer pillars slot
      <chump-autopilot-toggle>   ← duplicates footer fleet slot (semantically)
      <chump-heartbeat>
    
    Four of seven header elements duplicate footer data. Visual consequence: header crams 7 elements into a 48px-tall strip (INFRA-1276 documents the resulting <=640px collision). Cognitive consequence: operator's eye doesn't know which to read; same number shown twice creates 'is this two different things?' confusion.
    
    Rough shape:
    (a) Remove <chump-model-picker>, <chump-cost-meter>, <chump-pillar-health>, <chump-autopilot-toggle> elements from web/v2/index.html #app-header. Leave their script tags loaded (they may be used elsewhere — verify via grep before deleting scripts).
    (b) Header becomes: #app-title + <chump-repo-switcher> + <chump-heartbeat>. Three elements, no crowding.
    (c) Verify <chump-status-footer> already renders all four removed signals (per PRODUCT-107). If a slot is missing functionality (e.g. autopilot toggle), file a follow-up rather than blocking — the footer is the right home regardless.
    (d) Header CSS cleanup: remove now-orphan padding-bottom rules at index.html:117-123 for the removed elements.
    (e) INFRA-1276 (<=640px header overlap, P3) becomes auto-resolved — close it with a reference to this gap.
    (f) Playwright e2e/pwa-header-dedup.spec.ts: assert #app-header has ≤4 direct children at 1440px AND at 640px AND at 375px.
    
    Open design question (resolve in PR): does <chump-repo-switcher> stay in header, or move to CONFIG cadence? Header keeps it cheap to switch projects; CONFIG keeps the header truly minimal. Default to header; if the operator says move, do it in a follow-up.
    
    When picked, run chump gap decompose <ID> against current tree (header composition may have shifted).
  acceptance_criteria:
    - "<chump-model-picker> removed from #app-header in web/v2/index.html"
    - "<chump-cost-meter> removed from #app-header in web/v2/index.html"
    - "<chump-pillar-health> removed from #app-header in web/v2/index.html"
    - "<chump-autopilot-toggle> removed from #app-header in web/v2/index.html"
    - Header contains ≤4 direct child elements at all 3 breakpoints (375/640/1440)
    - <chump-status-footer> verified to render all removed signals (visual confirmation — operator does not lose any data)
    - "Orphan padding-bottom rules in index.html:117-123 for removed chips deleted"
    - Playwright e2e/pwa-header-dedup.spec.ts passes at 375/640/1440px
    - INFRA-1276 (<=640px header overlap) closed with reference to this gap's PR
  closed_date: '2026-05-24'
  closed_pr: 2469
  skills_required: pwa,frontend

