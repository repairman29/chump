- id: INFRA-1520
  domain: INFRA
  title: "EFFECTIVE: PWA one-click operator approval — paramedic-proposed actions (Merge Queue, branch protection, repo settings) get an Approve button in PWA, runs proposed_action.sh on consent"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - "Paramedic emits kind=proposed_action {description, command, risk_level, approval_required:true} when an action requires operator consent (Merge Queue enable, branch-protection edits, repo-settings, force-push to protected branch)"
    - PWA cockpit shows proposed_action queue with Approve / Skip / Defer buttons
    - Approve runs the embedded command via POST /api/proposed-action/<id>/approve; result emitted as kind=proposed_action_executed {id, exit_code, stdout_tail}
    - Skip emits kind=proposed_action_skipped with operator note
    - Approval bypass for read-only commands (CHUMP_AUTO_APPROVE_READONLY=1)
    - "Smoke test scripts/ci/test-pwa-proposed-action-approval.sh: stub paramedic emit, click Approve in headless PWA, assert command ran + kind emitted"

