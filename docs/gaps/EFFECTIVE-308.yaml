- id: EFFECTIVE-308
  domain: EFFECTIVE
  title: "EFFECTIVE: ChumpBar — native menu-bar fleet status + chump-mode control (no-terminal operator surface)"
  status: open
  priority: P1
  effort: s
  description: |
    Operator explicitly wants zero-terminal fleet management (2026-07-19). v1 shipped: scripts/ops/chumpbar-status.sh (ground-truth JSON: ships_24h from origin/main, AGENT_ID-counted workers, P0s, chump-mode) + tools/chumpbar/main.swift (single-file NSStatusItem app, 60s poll, Grind/Travel/Off actions calling ~/.local/bin/chump-mode). Compiled to ~/.local/bin/chumpbar and running. Follow-ups for fleet: launchd LaunchAgent for login persistence (operator approval), notification on icon flip to red (fleet death), click-through to fleet-brief digest, build+install make target, and eventually replace emoji title with template NSImage.
  acceptance_criteria:
    - tools/chumpbar/main.swift compiles with swiftc -O on macOS 15+ with zero deps
    - scripts/ops/chumpbar-status.sh emits valid JSON in <150ms warm with fields icon/mode/workers/ships_24h/last_merge_min/p0_open/open_gaps
    - worker count uses AGENT_ID wrapper pattern (fork copies excluded, verified against tmux fleet of size N)
    - Grind/Travel/Off menu actions invoke chump-mode and refresh state
    - make chumpbar (or scripts/setup/install-chumpbar.sh) builds + installs + optionally registers LaunchAgent
  notes: |
    v1 live 2026-07-19; roadmap Week 4 product-surface lane; pairs with EFFECTIVE-305 (chump-mode durable port).

