- id: INFRA-771
  domain: INFRA
  title: "EFFECTIVE: Review-as-Handoff sub-gap 3/6 — author-agent re-engagement loop in worker.sh. Before lease release, scan own PRs for trusted handoff comments newer than HEAD, apply diff, run full-suite tests (INFRA-761), push. Cap 1/PR/session. Emits review_handoff_applied|failed. Spec: docs/architecture/REVIEW_AS_HANDOFF.md §5."
  status: open
  priority: P1
  effort: m
  acceptance_criteria: |
    Criterion 1: Before lease release, `worker.sh` scans own PRs for trusted handoff comments newer than HEAD
    Criterion 2: When a handoff comment is found, the diff is applied to the working tree
    Criterion 3: Full-suite tests (per INFRA-761) are run after applying the diff
    Criterion 4: If tests pass, the result is pushed to the PR branch
    Criterion 5: The re-engagement loop is capped at 1 per PR per session to prevent infinite loops
    Criterion 6: Ambient events `review_handoff_applied|failed` are emitted with appropriate context

