    - "Transport: stdio for Claude Code launch via mcp-config; Unix socket at /tmp/chump-mcp-fleet.sock for daemonized callers"
    - Integrates with existing chump-mcp-lifecycle crate (do not duplicate lifecycle plumbing)
    - docs/mcp-servers/chump-fleet.md describes the 5 tools + sample mcp-config snippet for Claude Code
    - "crates/chump-mcp-fleet/tests/integration.rs: spawn server in stdio mode, exercise each tool, assert structured response shape"
    - Feature flag CHUMP_FLEET_WIRE_V1=1 gates server startup; off = server exits with informational message

