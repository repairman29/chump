    Sub-slice h of META-167. New MCP server crate exposing 5 tools so any Claude instance gets the fleet OS without learning shell.
  acceptance_criteria:
    - crates/chump-mcp-fleet/ new crate with Cargo.toml, src/lib.rs, src/server.rs
    - "5 MCP tools registered: mcp__chump_fleet__inbox_drain (read pending events for caller session), mcp__chump_fleet__broadcast (emit FEEDBACK), mcp__chump_fleet__vote (cast vote on corr_id), mcp__chump_fleet__consensus_status (read tally for corr_id), mcp__chump_fleet__capabilities (list online curators)"
