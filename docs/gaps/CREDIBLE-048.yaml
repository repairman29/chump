- id: CREDIBLE-048
  domain: CREDIBLE
  title: "CREDIBLE: per-gate fire-rate telemetry — each CI gate records fire count + TP/FP classification + bypassed-via-allowlist count"
  status: done
  closed_pr: 1706
  priority: P1
  effort: s
  description: |
    Per 2026-05-11 three-questions research: 9 of 10 named gates shipped
    today have fired 0 times in ambient.jsonl. Either they don't emit
    ambient events, they emit under different kind=, or the behavior
    they're built to catch hasn't happened. We can't tune what we can't
    measure.
  acceptance_criteria:
    - "Every CI gate script emits two ambient events per run: kind=gate_check_start with {gate_name, pr_or_branch, args}; kind=gate_check_result with {gate_name, outcome (pass/fail/bypassed/skipped), rule_fired, evidence}"
    - "Standard event schema documented in docs/observability/EVENT_REGISTRY.yaml"
    - "scripts/dispatch/gate-fire-rate.sh computes per-gate stats in window W: total_runs, fires, bypasses, TP-suspect (fired + PR later merged unchanged), FP-suspect (fired + PR amended to remove the violation), unknown"
    - "Output to ~/.chump/metrics/gate-fire-rate.jsonl daily; surfaced in chump fleet status --gates"
    - "Each gate's CI workflow step prints a `::notice::` line for GitHub Actions visibility: 'Gate X: fired/passed; rule Y; bypass: <reason>'"
    - "Backfill: for the 10 gates shipped 2026-05-11, ship a one-time retroactive scan of PR-CI logs to estimate their fire rate over the last 30 days"
    - "Test fixture: replay 5 known-bad PRs (e.g., #1441 mass-deletion, #1444 silent revert, #1469 bundle false title) through each gate; assert each gate's TP detection matches expected"
    - "Pairs with CREDIBLE-050 (force-fire-fixture) — CREDIBLE-050 proves gates fire correctly; CREDIBLE-048 measures how often they fire in production"
    - "Required by CREDIBLE-042/043 (flip CREDIBLE-026/027 to required) — don't flip a gate to required until its fire-rate proves it's calibrated"
