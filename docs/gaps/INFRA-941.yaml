- id: INFRA-941
  domain: INFRA
  title: "ZERO-WASTE: ambient.jsonl auto-rotate at 50MB — unbounded growth wastes disk I/O on every append for long-running fleets"
  status: open
  priority: P1
  effort: xs
  acceptance_criteria:
    1. "When ambient.jsonl exceeds 50MB (or CHUMP_AMBIENT_MAX_MB override) it is renamed to ambient.jsonl.1; .1 becomes .2; .2 deleted; at most 2 rotated files kept"
    2. "Rotation wired into fleet_health::emit() so every health-check append triggers rotation if needed"
    3. chump ambient-rotate CLI command for operator and script use
    4. "CI test verifies rotation at threshold, old files pruned, fresh append works after rotation"
