- id: RESILIENT-152
  domain: RESILIENT
  title: "RESILIENT: running fleet uses STALE scripts — merged fixes (worker.sh, pickers, run-fleet) never reach the fleet's main checkout because it stays dirty+behind, so auto-pull never fires; today the MISSION-047 picker cure needed a MANUAL git checkout to go live"
  status: done
  priority: P1
  effort: m
  acceptance_criteria:
    - a post-merge mechanism (launchd daemon or webhook-receiver hook) detects a merge to origin/main touching scripts/ and runs a SAFE targeted update of the changed scripts/ files in the fleet's main checkout via 'git checkout origin/main -- <changed scripts>'
    - canonical state.db, ambient.jsonl, .chump-locks, docs/gaps are NEVER clobbered (only scripts/ files are synced)
    - the running fleet picks up merged script fixes within ~5min without a manual git checkout
    - scripts/ci/test-fleet-script-sync.sh verifies a changed script appears in the checkout while state.db is untouched
  closed_pr: 3147
  evidence: |
    Today's proof: after MISSION-047 merged, the running fleet kept using the OLD picker until I manually ran 'git checkout origin/main -- scripts/dispatch/_pick_gap.py _pick_and_claim_gap.py'. The fleet mutates state.db/ambient.jsonl/docs/gaps continuously → main checkout is permanently dirty → 'git pull' refuses → merged script fixes never auto-deploy. This is WHY nothing self-heals end-to-end (every merged fix needs a manual hand to reach the fleet). AC: a post-merge sync mechanism (launchd daemon OR webhook-receiver hook) that, on a merge to origin/main touching scripts/, runs a SAFE targeted update of the changed scripts/ files in the fleet checkout (git checkout origin/main -- <changed scripts>, or stash/pull/pop) WITHOUT clobbering canonical state.db/ambient.jsonl/.chump-locks; running fleet picks up merged script fixes within ~5min; test verifies a merged script change appears in the checkout while state.db stays untouched. Sibling of CREDIBLE-092 (both are 'the system can't get its own updates to itself').
