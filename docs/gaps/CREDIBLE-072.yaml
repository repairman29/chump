  acceptance_criteria:
    - "[\"Extend chump gap reserve (and chump gap audit-priorities --apply): compute rolling 7-day per-pillar merge share. If a pillar is over 30% of weekly merges, NEW gaps in that pillar auto-demote to P2 at filing time. Operator override via --priority P0/P1 with `--cap-override <reason>` logged.\",\"Pillars: EFFECTIVE, CREDIBLE, RESILIENT, ZERO-WASTE, MISSION (derived from gap title prefix tags).\",\"Floor for EFFECTIVE + CREDIBLE combined: 50% of weekly merges. If below floor, NEW EFFECTIVE/CREDIBLE gaps get +1 priority bump (P2 → P1, P1 → P0). Subject to P0 budget = 5 ceiling.\",\"Surface state in chump cos session-start: a one-line `Pillars: RESILIENT 63% [OVER CAP], EFFECTIVE 11% [under floor]` line.\",\"Audit ambient emit: kind=pillar_cap_demote {gap_id, pillar, current_share, decision} on every auto-demote.\",\"Smoke test scripts/ci/test-pillar-cap-auto-demote.sh: seed state.db with synthetic merges putting RESILIENT at 50%, file a new RESILIENT P1 gap, assert auto-demoted to P2 + ambient event present.\",\"Wave-3-or-4 work; file now, claim after Wave 0+1.\",\"Out of scope: time-window tuning (7d hardcoded for now), cross-week smoothing (rolling 14d as parameter for later).\"]"

