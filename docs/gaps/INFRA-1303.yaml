- id: INFRA-1303
  domain: INFRA
  title: 'EFFECTIVE: /docs/* REST endpoint serves repo markdown files from web server'
  status: done
  priority: P1
  effort: s
  description: 'http://localhost:3030/docs/process/CHUMP_FIRST_DOCTRINE.md returned blank.

    The web server had no /docs/* route — requests fell to ServeDir (web/v2/)

    which has no docs/ directory. Operator needs to link doc pages from the PWA

    and from Claude Code sessions without running a separate file server.

    '
  acceptance_criteria:
  - GET /docs/{path} serves files from <repo_root>/docs/ with correct Content-Type
  - Path traversal (../) rejected with 400; files outside docs/ rejected with 400
  - 'Only safe extensions served: .md .txt .yaml .yml .json .toml (others → 403)'
  - .md and .txt files returned as text/plain; .json as application/json; .yaml as text/yaml
  - Missing files return 404 with informative message
  - No auth required — docs are non-sensitive read-only content
  - curl http://localhost:3030/docs/process/CHUMP_FIRST_DOCTRINE.md returns file content
  notes: '[2026-05-15T04:28:26Z] PWA phase: 1 (Cockpit-MVP) — see docs/product/PWA_ROADMAP.md (PRODUCT-121)

    '
  closed_pr: 1959
