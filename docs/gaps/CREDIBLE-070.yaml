  acceptance_criteria:
    - "[\"Backlog-promoted 2026-05-16: today chump has multiple launchd services (paramedic, github-webhook-receiver, ghost-gap-reaper, heartbeat-shepherd, oven-tender, etc.) but no single CLI to inspect their state. Event-registry guard bypasses are committed via `Event-Registry-Drift-Bypass:` trailer but never audited.\",\"NEW CLI: chump fleet launchd-status (xs sub-effort) — walks ~/Library/LaunchAgents/ai.chump.*.plist + /Library/LaunchDaemons/, queries launchctl print gui/$UID/<service>, emits table: name, loaded, last-restart, exit-code, log-tail-3, errors. Color-coded by health.\",\"NEW CLI: chump fleet bypass-audit (xs sub-effort) — walks git log --grep \\\"Event-Registry-Drift-Bypass:\\\" + \\\"Test-Gate-Bypass:\\\" + \\\"Rust-First-Bypass:\\\" trailers, counts per author/kind/reason. Surfaces top-10 bypass kinds + authors over rolling 30d.\",\"Both CLIs ship in same PR; both write to fleet doctor: bypass-rate goes into a new SLO `bypass_rate_per_week < N` (default 10).\",\"Pair with INFRA-TBD-1546 plist work — that gap (TBD) will be the canonical plist refactor. This one surfaces the data.\",\"Smoke test scripts/ci/test-launchd-status-and-bypass-audit.sh: mock launchctl output + git log, assert table rendered + bypass count >= 0.\",\"Telemetry: emit kind=fleet_launchd_status_run + kind=fleet_bypass_audit_run on each invocation.\",\"Out of scope: launchd plist editor (drag-and-drop GUI). Per-bypass appeals system.\"]"

