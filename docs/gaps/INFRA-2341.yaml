  title: "trunk-loop architecture pivot: notify-running-IDE instead of spawning claude -p subprocess (respect subscription billing)"
  status: open
  priority: P0
  effort: m
  acceptance_criteria:
    - fix-trunk-dispatcher emits kind=fix_trunk_priority_signal (gap_id, priority, filing_session, ts) instead of spawning claude -p when CHUMP_FIX_TRUNK_DISPATCH_MODE=signal (default)
