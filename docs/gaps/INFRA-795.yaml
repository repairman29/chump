- id: INFRA-795
  domain: INFRA
  title: "ZERO-WASTE: optimize bot-merge.sh test scope from --workspace to --bin chump --tests"
  status: done
  closed_pr: 1389
  closed_date: '2026-05-10'
  priority: P1
  effort: xs
  description: |
    bot-merge.sh runs `cargo test --workspace` (line 1011-1012) which takes
    5+ minutes for ~1786 tests on cold cache, causing both bot-merge.sh and
    the pre-push hook to timeout. The pre-push hook (INFRA-761) already scopes
    to `cargo test --bin chump --tests` but bot-merge.sh was not updated to
    match. This makes bot-merge.sh the bottleneck for PR turnaround.
    
    Fix: Change `cargo test --workspace` to `cargo test --bin chump --tests`
    and reduce the timeout from 3600s to 1200s since the scoped test suite
    is smaller and faster.
  acceptance_criteria:
    - bot-merge.sh runs cargo test --bin chump --tests instead of --workspace
    - Timeout reduced from 3600s to 1200s
    - fmt/clippy CI gates still run on full workspace
    - CI shell-script tests (INFRA-222) still run independently

