- id: INFRA-2385
  domain: INFRA
  title: "inventory provenance + activation: 3 calibration bugs (misattribution on admin-merge order, missing artifacts in pr-view, reference detection misses Rust mod/SQL include/sibling scripts)"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - "BUG 1 (misattribution on admin-merge): backfill_artifact_provenance walks the merge graph via `git log --ancestry-path` from each adding-commit to find the merge commit that brought it onto main, then looks that merge commit's SHA up in pr_index (mergeCommit field, populated via new fetch_pr_merge_commits helper that calls REST GET /repos/{owner}/{repo}/pulls/{n}); fixes misattribution to PR #2914 INFRA-2325 for artifacts actually shipped in PR #2916 INFRA-2324 (smoke verified locally)"
    - "BUG 1 fallback: when merge-commit SHA lookup is unavailable (token missing or unmerged PR), fall back to the existing merged_at partition_point bisect with a clear warning emitted as kind=provenance_fallback to ambient.jsonl"
    - "BUG 2 (pr-view missing artifacts): cmd_pr's artifact lookup walks the merge commit's `git show --name-only <merge_sha>` file-add list as a secondary source — currently only artifacts whose introducing_pr was backfilled to this PR show up; the show-walk path catches artifacts the bisect missed; both sources de-duplicated by path"
    - "BUG 3 (reference detector misses): recompute_activation_with_provenance + detect_orphan_artifacts now also scan for (a) Rust `mod X;` / `pub mod X;` declarations naming the file stem in main.rs/lib.rs/mod.rs of the parent crate, (b) Rust `include_str!(\"<path>.sql\")` literals and embedded `.sql` filename references, (c) shell `source <path>` / `./lib/<stem>` / `bash <stem>.sh` invocations within sibling scripts — each adds to reference_count"
    - "Smoke verifications: `chump inventory show scripts/coord/trunk-sentinel-daemon.sh` correctly attributes PR #2916 / INFRA-2324; `chump inventory pr 2916` lists ≥3 artifacts; `chump inventory class-stats` shows `unknown` activation_state at ≤20% of total artifacts (was 61%)"
    - "Failure-class taxonomy: TRANSIENT (REST 503 fetching merge commit; retried) vs PERMANENT (commit not on main; logged as unlinkable_provenance); ambient kinds emitted: provenance_fallback (transient), backfill_unlinkable (permanent)"
    - "Smoke test scripts/ci/test-inventory-v2-calibration.sh covers BUG-1 via synthetic out-of-order merge timestamps + verifies graph-walk picks the right PR"
