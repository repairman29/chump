- id: PRODUCT-129
  domain: PRODUCT
  title: "EFFECTIVE: Cockpit fix #3 — Release-leases button on Lock-contention card (new POST /api/lease/release-expired)"
  status: open
  priority: P1
  effort: m
  description: |
    Lock-contention card surfaces N fleet_state_lock_timeout events but [show events] just opens raw stream. Real action: release expired leases. Add POST /api/lease/release-expired endpoint that runs 'chump --release' on every lease past TTL, returns count freed. Card surfaces [Release N expired leases] button when expired count ≥ 1.
  acceptance_criteria:
    - New POST /api/lease/release-expired endpoint in src/web_server.rs
    - Endpoint scans .chump-locks/*.json for past-TTL leases, removes them, returns {released_count, ids}
    - Cockpit Lock-contention card surfaces [Release N expired leases] primary button
    - "Success state: 'released N leases'"
    - Refresh of ambient/health stats triggered after success
    - Smoke test scripts/ci/test-api-release-expired.sh + scripts/ci/test-cockpit-release-leases.sh

