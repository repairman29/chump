- id: INFRA-2312
  domain: INFRA
  title: "ZERO-WASTE: curator-supervisor + integrator installers broken (daemon-activator FAIL logs) — fix installer paths"
  status: open
  priority: P2
  effort: xs
  description: |
    Two installer scripts are broken when daemon-activator tries to use them: (1) scripts/setup/install-curator-supervisor.sh references plist template at scripts/setup/launchd/com.chump.curator-supervisor.plist that doesn't exist; (2) scripts/setup/install-integrator.sh requires the user to manually run cargo build --release -p chump-integrator first — should either build automatically or fail more gracefully.
  acceptance_criteria:
    - install-curator-supervisor.sh either creates the plist inline (like install-stale-pr-rebase-bot.sh pattern) or checks for the template and exits 0 with WARN
    - install-integrator.sh runs cargo build --release -p chump-integrator if binary missing OR exits 0 with skip message (not exit 1 which trips daemon-activator FAIL log)

