  status: done
  priority: P2
  effort: xs
  acceptance_criteria:
    - "1. The 5-gap seeding loop in scripts/ci/test-gap-list-since-json-schema.sh stops swallowing reserve failures (it currently runs 'gap reserve ... --quiet 2>/dev/null "
