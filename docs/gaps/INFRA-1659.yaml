- id: INFRA-1659
  domain: INFRA
  title: "CREDIBLE: registry scanner Pattern 8 — accept EMIT_KIND uppercase emit helper"
  status: open
  priority: P2
  effort: xs
  description: |
    scripts/ci/test-event-registry-coverage.sh has 7 grep patterns to detect emit sites. Conflict-resolver-agent (INFRA-1488) shipped with EMIT_KIND helper (uppercase) — scanner missed it, registry audit FAILed with 8 orphan kinds until I renamed EMIT_KIND→_emit (Pattern 4 lowercase match). Adding Pattern 8 for uppercase is more permissive than forcing rename convention.
  acceptance_criteria:
    - "scripts/ci/test-event-registry-coverage.sh adds Pattern 8 regex: EMIT_KIND\\\\s+\"[a-zA-Z0-9_]+\" applied to PROD_PATHS"
    - extract_kinds called on the matches same as Pattern 4
    - "CI test: synthetic shell file with EMIT_KIND \"foo_bar\" — scanner detects foo_bar"
    - "docs/process/CLAUDE_GOTCHAS.md note: emit helper naming — _emit (lowercase) and EMIT_KIND (uppercase) both work; avoid other casings"
  notes: |
    FOLLOW-UP from INFRA-1488 (Marcus M-C 2026-05-21). Tripped on this during the cron-loop; cost ~20 min of debugging. xs effort: 5-line regex add + test fixture.

