- id: INFRA-424
  domain: INFRA
  title: CHUMP_LESSONS_AT_SPAWN_N audit — fail-loud if env set without explicit consent (silent token tax per spawn)
  status: open
  priority: P2
  effort: xs
  description: 'MEM-006 added CHUMP_LESSONS_AT_SPAWN_N to inject top-N lessons at every prompt assembly. Default OFF, but if accidentally set in a shell profile or .env, every spawn pays N×~500 tokens silently.
    With N=5 + fleet of 8 × 100 spawns/day = 2M extra input tokens/day of un-attributed cost.


    Fix: prompt assembler logs the active value to ambient.jsonl on spawn (kind=lessons_injection_active). Operator sees in pre-flight tail -30 ambient.jsonl that lessons are firing. Optional second guard:
    warn if value > 5 without CHUMP_LESSONS_AT_SPAWN_ACK=1.'
  acceptance_criteria:
  - Prompt assembler emits ambient kind=lessons_injection_active on spawn when N>0
  - If N>5 without CHUMP_LESSONS_AT_SPAWN_ACK=1, log warning to stderr
  - 'Test: scripts/ci/test-lessons-injection-visibility.sh covers both paths'
