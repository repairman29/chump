- id: INFRA-1282
  domain: INFRA
  title: 'ZERO-WASTE: gh shim transparently rewrites ''gh pr view N'' to REST /pulls/N + cache_lookup_pr — kills ~100 GraphQL
    calls/hr'
  status: done
  priority: P1
  effort: s
  description: 'Diagnosis 2026-05-14 of throttle storms: gh pr view is the #1 GraphQL burner at 74 calls/hr. 6 caller scripts
    (pr-watch.sh, bot-merge.sh, worktree-prune.sh, opus-curator.sh, bounced-pr-detector.sh, queue-driver.sh) use it directly.
    INFRA-1107 cache exists with fresh data (31 PR rows, webhook events 3min ago) but they bypass it. Rather than migrating
    6 callers one-by-one, rewrite at the shim layer: when gh sees ''pr view N'', transparently translate to REST /pulls/N
    + cache_lookup_pr. Single PR fixes all 6 callers'' GraphQL-to-REST migration. Estimated impact: kills ~100/150 GraphQL
    calls/hr, drops throttle events from 200/hr to <50/hr.

    '
  acceptance_criteria:
  - scripts/coord/lib/gh-shim/gh detects 'gh pr view <PR-or-branch> [--json X] [-q jq]' before forwarding to real gh
  - 'For matched invocations: numeric arg uses cache_lookup_pr; branch-name arg resolves via pr_state head_ref column'
  - 'On cache HIT: shapes the cached REST JSON to match gh pr view --json output; emits kind=cache_hit ambient event'
  - 'On cache MISS: REST gh api repos/X/pulls/N (NOT GraphQL); emits cache_miss; writes result through cache lib'
  - 'Backward compat: -q/--jq still works on translated output; --watch/--comments/--web fall through to real gh'
  - Unsupported --json fields fall through (return 2) so caller gets canonical gh output
  - 'Bypass: CHUMP_GH_SHIM_NO_REWRITE=1 forces real gh pr view'
  - 'Field mapping covers: number, state (upper), title, body, url, headRefName, baseRefName, isDraft, mergeable, mergeStateStatus
    (upper), autoMergeRequest (reshape with mergeMethod), createdAt/updatedAt/closedAt/mergedAt, author (wrap login)'
  - Test scripts/ci/test-gh-shim-pr-view-rewrite.sh 12 assertions including branch-name resolution and ambient emission
  closed_date: '2026-05-14'
  closed_pr: 1933
