- id: CREDIBLE-064
  domain: CREDIBLE
  title: "CREDIBLE: emit cache_hit / cache_miss ambient events from lib/github_cache.sh — measure cache hit rate"
  status: done
  priority: P1
  effort: xs
  description: |
    Diagnosis 2026-05-14: lib/github_cache.sh helpers (cache_lookup_pr, cache_query_behind_prs, cache_lookup_checks) don't emit ambient events on hit/miss. We can't measure cache effectiveness — only know the cache HAS data (31 PR rows + 633 check_run rows fresh) but not whether callers are reading it. Add emission so we can see hit rate trend and tune cache TTL / pre-warming.
  acceptance_criteria:
    - "lib/github_cache.sh emits kind=cache_hit ambient event when cache_lookup_pr / cache_query_behind_prs / cache_lookup_checks finds data (fields: source helper, gap_or_pr_or_sha, age_seconds)"
    - Emits kind=cache_miss with same fields when cache returns empty (caller will fall through to live API)
    - EVENT_REGISTRY.yaml registers both kinds
    - "fields_required: [ts, kind, helper, target, age_s] for cache_hit; [ts, kind, helper, target, reason] for cache_miss"
    - scripts/dev/cache-hit-rate.sh prints hourly cache_hit / (cache_hit + cache_miss) ratio per helper
    - Test scripts/ci/test-cache-event-emission.sh asserts emit happens on synthetic hit + miss; assertion uses isolated AMBIENT_LOG fixture
  closed_date: '2026-05-14'
  closed_pr: 1938

