    - EVENT_REGISTRY.yaml registers no new kind (existing webhook_event_received is the source of truth)
    - "test: spin up receiver, curl /health, assert 200 + JSON shape"
    - launchd plist gets a LivenessCheck via PidFile (existing pattern in other chump plists)
