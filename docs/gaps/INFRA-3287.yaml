- id: INFRA-3287
  domain: INFRA
  title: "ZERO-WASTE: decompose 18K-line main.rs god-switchboard into grouped dispatch modules"
  status: open
  priority: P2
  effort: m
  description: |
    Operator-sponsored structural refactor (2026-07-05). src/main.rs is 17,939 lines: 249 mod decls + a ~16K-line hand-rolled argv dispatch chain (fn main at L924) of 'if args.get(1)==Some("cmd"){...}' blocks, 699 match-arms total. It holds 75% of the root crate's weight and is the center of gravity for the whole 188K-LOC root binary. This is the monolith-in-a-workspace: 34 named crates exist but the core never decomposed. SEAM: the clean pattern 'cmd => module::run(&sub_args)' is already used for many commands (src/commands/ has 17 extracted). PLAN — Phase 1 (safe, mechanical, compiler-verified, per-PR): group related command arms into src/commands/dispatch_<domain>.rs modules each exposing 'fn try_dispatch(args:&[String]) -> Option<i32>'; main() becomes a short sequence of 'if let Some(c)=commands::dispatch_X::try_dispatch(&args){exit(c)}'. Convert remaining inline-body arms to delegate to their module's run(). Target: main.rs from ~18K toward ~2-3K (pure switchboard). Phase 2 (later, higher value/risk): group the 249 sibling modules into workspace crates by domain (agent_*, *_tool, coord, etc.) so they compile independently -> faster builds. SERIALIZE: every slice touches main.rs, so this CANNOT be fleet-parallelized without constant collisions — one PR at a time. Each PR is intent-atomic (one command-group). NO behavior change — pure move, verified by 'cargo check' + existing tests.
  acceptance_criteria:
    - each PR extracts one coherent command-group from main.rs into src/commands/dispatch_<domain>.rs behind try_dispatch(), reducing main.rs LOC with zero behavior change
    - cargo check + cargo test --bin chump stay green after each slice
    - main.rs trends toward a thin switchboard (<3K LOC) across the phase
    - no command's CLI surface (args, help text, exit codes) changes — verified by spot-running the moved commands
    - Phase-2 crate extraction is a separate follow-up, not blocked on finishing Phase 1
  notes: |
    [2026-07-05T16:52:55Z] STRATEGY CORRECTION (2026-07-05, from the failed INFRA-3302 attempt): do NOT extract big arms (gap ~6K, fleet ~3K) in one PR. 89 scripts/ci self-audit tests grep src/main.rs for command code, so a large move shatters ~40+ tests + risks introducing test-migration bugs. Slices 1-2 (external, authoring — small already-delegating groups) merged cleanly. Remaining work = MANY tiny sub-slices, one subcommand group per PR (~50 LOC), each also updating only the 1-3 tests that grep that specific moved code. Also: a big arm can surface real bugs (INFRA-3302 found gap subcommands relying on fall-through to the LLM prompt — needs explicit exit).

