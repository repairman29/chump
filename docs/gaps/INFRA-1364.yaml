- id: INFRA-1364
  domain: INFRA
  title: 'RESILIENT: chump orchestrate LLM-call hang detection — abort after CHUMP_ORCHESTRATE_LLM_TIMEOUT_S (default 60s)
    no progress + emit orchestrate_llm_timeout event + retry once with exponential backoff (Phase 3 reliability)'
  status: done
  priority: P1
  effort: s
  description: 'Phase 3 (Orchestrator MVP) is IN PROGRESS but a hung LLM call (Ollama wedge, Anthropic 503, network drop)
    currently wedges the entire orchestrate session indefinitely. The roadmap demo flow expects ''spawn the fleet… fleet starts''
    to terminate in finite time even when the model misbehaves. Pairs with INFRA-1363 (session_summary) by populating exit_reason=timeout.

    '
  acceptance_criteria:
  - chump orchestrate wraps every LLM-call in tokio::time::timeout(CHUMP_ORCHESTRATE_LLM_TIMEOUT_S, ...) with default 60s
  - On timeout, emit kind=orchestrate_llm_timeout to ambient.jsonl with {ts, kind, session_id, attempt_number, call_kind ("intent_parse"
  - '"tool_select"'
  - '"summary"), elapsed_s} and retry once with 2× backoff (120s)'
  - After 2 timeouts on the same call, abort the session cleanly with exit_reason="timeout" passed to orchestrate_session_summary
    (per INFRA-1363)
  - Register kind=orchestrate_llm_timeout in docs/observability/EVENT_REGISTRY.yaml
  - CI test scripts/ci/test-orchestrate-llm-timeout.sh stands up a fake LLM client that sleep-blocks 90s for the first call,
    completes immediately on retry; asserts (a) exactly one orchestrate_llm_timeout event, (b) session continues after retry,
    (c) session_summary exit_reason="clean"
  - Document CHUMP_ORCHESTRATE_LLM_TIMEOUT_S in docs/configuration/ENV_VARS.md or scripts/ci/env-vars-internal.txt
  closed_date: '2026-05-15'
