- id: INFRA-747
  domain: INFRA
  title: "EFFECTIVE: ACP v3 MCP passthrough — spawn IDE-configured MCP servers in ACP sessions"
  status: open
  priority: P2
  effort: m
  acceptance_criteria:
    - "ACP NewSessionRequest.mcpServers configs are forwarded to SessionMcpPool::spawn_all"
    - IDE-configured MCP servers (from editor mcp.json) spawn as persistent children in the ACP session
    - MCP tools from IDE-configured servers appear in the agent tool registry alongside inline tools
    - Server lifecycle (spawn, health, reap) follows the same rules as chump-native MCP servers
    - Hard cap of 16 servers per session is enforced across both native and IDE-configured servers

