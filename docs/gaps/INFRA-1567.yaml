- id: INFRA-1567
  domain: INFRA
  title: "RESILIENT: split CHUMP_SELF_HOSTED_ENABLED into per-lane toggles (fast-checks/clippy/cargo-test/ACP independently flippable)"
  status: open
  priority: P1
  effort: s
  pillar: RESILIENT
  depends_on: ["INFRA-1534", "INFRA-1535"]
  acceptance_criteria:
    - "Introduce 4 new repo vars: CHUMP_SELF_HOSTED_FAST_CHECKS, CHUMP_SELF_HOSTED_CLIPPY, CHUMP_SELF_HOSTED_CARGO_TEST, CHUMP_SELF_HOSTED_ACP — each independently set to 'true' or 'false'"
    - "Each conditional `runs-on:` in .github/workflows/{ci,editor-integration}.yml reads its lane-specific var instead of the shared CHUMP_SELF_HOSTED_ENABLED. Pattern: `runs-on: ${{ vars.CHUMP_SELF_HOSTED_<LANE> == 'true' && fromJSON('[\"self-hosted\",\"macos-arm64\",\"chump-fleet\"]') || 'ubuntu-latest' }}`"
    - "Backwards-compat shim: keep CHUMP_SELF_HOSTED_ENABLED as a master override — if it is set to 'false' explicitly, ALL lanes route to ubuntu-latest regardless of per-lane vars (emergency-stop preserved)"
    - "Documented in docs/process/SELF_HOSTED_RUNNERS.md under a new 'Per-lane toggles' section, including the rollback playbook ('lane X is broken → flip CHUMP_SELF_HOSTED_X=false, leave others true')"
    - "Smoke test scripts/ci/test-self-hosted-toggle-matrix.sh: parses ci.yml + editor-integration.yml, asserts each conditional reads the correct per-lane var name; fails if any lane reads the shared master without the master-override path"
    - "After landing: with the master at 'true' and ACP at 'false' (INFRA-1561 ongoing), other 3 lanes route to M4 while ACP stays on ubuntu-latest — verified by inspecting which runner served each job on the next CI cycle"
    - "Cross-link: today (2026-05-16) one ACP-on-M4 failure forced rolling back the whole M4 lane, forfeiting 75% of the migration value. This gap closes that coupling."
  notes: |
    Pain witnessed: ACP smoke broke on M4 (#2244 migration), all 4 migrated lanes
    had to roll back together because CHUMP_SELF_HOSTED_ENABLED is the only knob.
    Per-lane toggles let each lane stand on its own readiness story.

    Bonus follow-up (not in scope): a `chump self-hosted status` CLI that prints
    the current value of all per-lane vars + which jobs are routing where.


