- id: INFRA-850
  domain: INFRA
  title: "EFFECTIVE: Operational runbooks for fleet management"
  status: open
  priority: P1
  effort: s
  acceptance_criteria:
    - "docs/runbooks/ directory with at least 3 runbooks: fleet-wedge.md (detect+recover), pr-stuck.md (rebase+re-arm), silent-agent.md (lease release+diagnose)"
