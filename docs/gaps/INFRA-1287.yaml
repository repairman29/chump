- id: INFRA-1287
  domain: INFRA
  title: "CREDIBLE: prune 138 register-without-emit orphans in EVENT_REGISTRY.yaml — implement-or-remove per kind"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - Audit script (test-event-registry-coverage.sh) reports the full list of 138 orphans grouped by likely owner (path of nearest emitter or first-letter sort) so reviewers can chunk the work
    - "For each orphan, decide: (a) implement — wire up the emit site in the appropriate emitter file; (b) rename — kind name was changed in code but YAML still has the old one; (c) prune — drop the YAML entry; (d) reserve — add to scripts/ci/event-registry-reserved.txt with `# reason: planned for INFRA-NNNN`"
    - Land in 3-5 chunked PRs grouped by owner domain (auto-merge / fleet-coord / observability / etc.) — each PR removes some entries from the orphan count and the audit runs in CHUMP_REGISTRY_GATE_MODE=strict-emit so subsequent PRs see green
    - "Final PR: flip CI default to CHUMP_REGISTRY_GATE_MODE=strict so register-without-emit also fails the build"
    - "Verify after each PR: bash scripts/ci/test-event-registry-coverage.sh — orphan count strictly decreasing"
    - "Update EVENT_REGISTRY.yaml header to remove the \"after orphan reconciliation\" caveat once strict mode is default"

