- id: MISSION-029
  domain: MISSION
  title: "MISSION: picker doesn't actually read ACTIVE_MISSION env var — docs/MISSION.md says it does, src/ grep finds zero refs"
  status: open
  priority: P1
  effort: s
  description: |
    docs/MISSION.md says: 'The picker (MISSION-011) reads ~/.chump/ACTIVE_MISSION and ranks mission-linked gaps above same-priority throughput gaps (after priority, before effort).' BUT: grep -rn ACTIVE_MISSION src/ returns zero matches. The doctrine is documented but not implemented. The picker reads priority + effort + class-aggregate ratings (META-046), but not the active-mission pointer. Until this lands, mission-linked gaps don't actually get picked preferentially — the picker's behavior contradicts the doctrine. Rough shape: (a) src/picker.rs or wherever pick_next_gap lives; (b) read ACTIVE_MISSION env var or ~/.chump/ACTIVE_MISSION file; (c) compute mission-link = (gap.id starts with ACTIVE_MISSION_PILLAR) OR (gap.outcome_id matches active mission's outcomes) OR (gap.title contains ACTIVE_MISSION literal); (d) inject as tie-break between priority and effort.
  acceptance_criteria:
    - grep -rn ACTIVE_MISSION src/ returns at least one match in the picker call path
    - "Unit test: 2 same-priority same-effort gaps; one mission-linked, one not — picker chooses mission-linked"
    - chump gap audit-priorities reports per-pillar count of mission-linked vs not

