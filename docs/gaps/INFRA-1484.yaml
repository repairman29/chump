- id: INFRA-1484
  domain: INFRA
  title: "EFFECTIVE: cross-repo fan-out from single operator command across N repos"
  status: open
  priority: P1
  effort: l
  description: |
    Audit miss from 2026-05-15 second pass. Persona-1 (Marcus) described the 12-microservices upgrade pattern as the canonical fleet use case: 'I point Chump to the core library change and give it a single test script that asserts successful data ingestion. The orchestrator automatically creates 12 isolated git worktrees on my local machine, maps the local Docker/environment contexts for each service, and drops one autonomous agent into each bucket.' Today the unit of work is one gap in one repo; one operator command can't create N worktrees across N different repositories. Distinct from INFRA-1475 (cross-operator queue) — that's multi-human single-fleet, this is single-human multi-repo.
  acceptance_criteria:
    - chump fanout <spec-file> creates worktrees across multiple repos identified in the spec (e.g. ../microservice-A, ../microservice-B, ...)
    - Each cross-repo worktree gets its own isolated lease registered in state.db
    - Repos can be local checkouts or remote (auto-cloned to scratch dir if not present)
    - Per-repo environment context (docker-compose, .env, test runners) auto-detected and isolated per-worktree (depends on INFRA-1454 sandbox + INFRA-1462 init)
    - "Aggregate status: chump fanout status shows all N worktrees as one parent epic"
    - "Aggregate rollup: when all N finish, INFRA-1455 semantic rollup operates across-repo (Strategy A applied in repos X,Y,Z; Strategy B in repo W; etc.)"
    - "CI test: 3-repo fixture, run chump fanout, verify 3 worktrees + 3 PRs + cross-repo rollup output"
  notes: |
    MARCUS M-B (canonical demo, fan-out). Promoted P2→P1 2026-05-16. The 12-microservices use case — one command, 12 worktrees, agent per service. Requires INFRA-1483 spec format first.

