- id: CREDIBLE-138
  domain: CREDIBLE
  title: "CREDIBLE: run-fleet INFRA-621 launch probe hard-aborts ALL worker panes on a single transient claude -p failure (flaky 2/3) — fleet won't spin even with valid creds"
  status: done
  priority: P0
  effort: xs
  acceptance_criteria:
    - run-fleet INFRA-621 probe retries up to 3 attempts (short backoff) before setting _auth_probe_failed=1, so a single transient claude -p failure does not abort the whole fleet
    - probe timeout raised 30s->90s for cold-start headroom under launch-moment contention
    - on the subscription auth path the probe runs with ANTHROPIC_API_KEY unset (env -u) for consistency with worker.sh CREDIBLE-137 (tests the credential workers actually use)
    - a probe that succeeds on ANY attempt proceeds to launch; only all-attempts-fail aborts (real auth failure still surfaces)
    - bash -n + shellcheck -S error clean
  closed_pr: 3140
  evidence: |
    COMMAND: FLEET_SIZE=2 run-fleet.sh, 3 consecutive clean spins. OBSERVED: probe 'timeout 30 claude -p ok' (run-fleet.sh line 464) FAILED 2 of 3 times → each failure sets _auth_probe_failed=1 → run-fleet exits before spawning ANY pane (0 workers). The 3rd attempt the probe SUCCEEDED and the fleet ran perfectly (workers picked INFRA-774/INFRA-1612/INFRA-1896, spawned claude on the subscription, ran cargo check/clippy/tests, ZERO Credit-balance errors). PROOF it is the probe (not creds): reproducing the EXACT probe in isolation (source .env, unset ANTHROPIC_API_KEY, oauth set) succeeds in ~11s every time; the token is valid. The probe is FLAKY under launch-moment contention (rate-limit / concurrent claude / cold-start >30s) and a single transient failure aborts the whole fleet. WORKAROUND USED: CHUMP_FLEET_FORCE_LAUNCH=1 (built-in escape; workers re-validate auth per-spawn via worker.sh refresh_oauth_token anyway, so the launch probe is a redundant convenience pre-check, NOT a correctness gate). DURABLE FIX: retry the probe N times (e.g. 3, short backoff) before declaring failure; bump timeout 30->90 (cold-start headroom); on the subscription path probe with ANTHROPIC_API_KEY unset (env -u) for consistency with worker.sh CREDIBLE-137. Sibling of CREDIBLE-137 (same precedence-trap family, different location). IMPACT: without this, 'spin up the fleet' fails ~2/3 of the time with valid creds — the operator must manually retry or set CHUMP_FLEET_FORCE_LAUNCH=1.
