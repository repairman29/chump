  acceptance_criteria:
    - "New src/github_liaison.rs implements liaison election: workers compete via NATS-KV (fallback: atomic .chump-locks claim) and one wins liaison role for a 5-minute TTL"
    - Non-liaison workers' chump_gh helper reads only from .chump/github_cache.db on the read path; cache misses route via NATS subject chump.gh.fetch.<req_id> to the elected liaison
    - Liaison emits kind=gh_liaison_elected on win, kind=gh_liaison_lost on TTL miss, kind=gh_liaison_fetch per remote call to ambient.jsonl with script_name origin tag
    - Liaison aggregates hourly cost report and emits kind=gh_liaison_cost with fields script_name, call_count, error_count, secondary_throttle_count for operator visibility
    - Failure-class taxonomy in src/github_liaison.rs distinguishes TRANSIENT (5xx, secondary rate-limit, network) which retry with backoff vs PERMANENT (4xx auth, 404, malformed query) which fail-fast and emit kind=gh_liaison_permanent_failure
    - scripts/ci/test-github-liaison-smoke.sh spawns three mock workers, kills the elected liaison mid-run, and asserts failover completes within 10 seconds with no dropped fetch requests
    - "Post-merge SLO: gh_self_throttled events drop by >=80% in the 24h window following deploy vs the prior 24h baseline (captured via fleet-metrics-snapshot)"
