- id: INFRA-786
  domain: INFRA
  title: "RESILIENT: e2e test script gap ID format — E2E-TEST-timestamp rejected by validate_gap_id"
  status: open
  priority: P1
  effort: xs
  acceptance_criteria: |
    scripts/dispatch/free-tier-e2e-test.sh generates gap IDs like
    "E2E-TEST-1778278535" which have two hyphens. validate_gap_id()
    in src/execute_gap.rs splits on the first '-' and requires the
    suffix to be all digits. "TEST-1778278535" fails that check.

    Fix: Change the test script to use "E2E-<timestamp>" format
    (single hyphen, numeric suffix) so it passes validate_gap_id().
    Example: E2E-1778278535

    Test: scripts/dispatch/free-tier-e2e-test.sh --provider nvidia
    reaches step 4 (dispatch) without "gap id suffix must be digits".

