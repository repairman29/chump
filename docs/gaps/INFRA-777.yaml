- id: INFRA-777
  domain: INFRA
  title: 'RESILIENT: chump --version must not require Ollama — blocks FTUE CI'
  status: done
  priority: P1
  effort: s
  acceptance_criteria: '`chump --version` currently initializes the full runtime, including

    attempting to connect to the local Ollama endpoint at

    http://127.0.0.1:11434/v1/chat/completions. On CI runners (and any

    machine without Ollama running), this fails with exit code 1 after

    an 8-second timeout.


    This breaks the FTUE clean-machine workflow

    (.github/workflows/ftue-clean-machine-2026.yml) at step 2 on every

    PR that touches scripts/dispatch/**.


    Fix: `chump --version` (and any other non-LLM subcommand) must

    short-circuit before provider initialization. The version string

    should come from CARGO_PKG_VERSION or the embedded build metadata

    without touching the network.


    Test: `chump --version` exits 0 and prints a version string when

    OPENAI_API_BASE points at a non-listening port (simulating no Ollama).


    Context: The FTUE workflow IS valuable — it''s the only CI job that

    tests the Homebrew install + CLI routing end-to-end (brew install →

    chump gen → fleet start/status/stop). No other workflow covers this.

    The test itself is sound; the bug is that --version shouldn''t need

    an LLM backend.

    '
  closed_date: '2026-05-11'
  closed_pr: 334
