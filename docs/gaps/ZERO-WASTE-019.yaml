- id: ZERO-WASTE-019
  domain: ZERO-WASTE
  title: "ZERO-WASTE: curator-filed decision-log ledger accumulates unbounded in .chump-locks (178 files)"
  status: open
  priority: P2
  effort: m
  description: |
    The curator daily dedup guards (curator-filed-balance_restock_<PILLAR>-<DATE>.json and curator-filed-pr_unstick-<DATE>.json) are written into .chump-locks/ and never pruned — 178 files dating back to 2026-05-25 as of 2026-07-04. They are a decision-ledger (read back by scripts/coord/opus-curator.sh + scripts/coord/ambient-context-inject.sh; tracked by scripts/ci/test-curator-files-tracking-gaps.sh), NOT locks, so they don't belong in the locks dir. Two harms: (1) they were the payload that made CREDIBLE-149 (lease miscount) fire — a lease-counter that globs *.json in this dir cannot distinguish them; (2) unbounded growth. Fix options: relocate the ledger to its own dir (e.g. .chump-locks/curator-ledger/ or ~/.chump/curator-ledger/) so it can never be confused with a lease, AND/OR add a pruner (keep last ~7 days) to the existing stale-gap-lock-reaper launchd cadence. Only TODAY's dated file is load-bearing (date-keyed dedup), so pruning older ones is safe. Coordinate with CREDIBLE-149 (the counter fix is the real correctness fix; this is hygiene + defense-in-depth).
  acceptance_criteria:
    - curator dedup-guard files no longer accumulate unbounded in .chump-locks/ — either relocated to a dedicated non-locks dir or pruned to a rolling window (keep >= today)
    - if relocated, opus-curator.sh + ambient-context-inject.sh + the CI test read from the new location
    - pruning keeps the current-day guard so curator dedup still works
    - .chump-locks/ top level contains only actual lease/state files after the change

