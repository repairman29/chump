- id: INFRA-1796
  domain: INFRA
  title: "EFFECTIVE: opus-message v0 — addressed async DMs between Opus sessions via .chump-locks/opus-inbox/ (bridge until A2A Layer 2b RPC lands, INFRA-1759)"
  status: open
  priority: P1
  effort: xs
  acceptance_criteria:
    1. New scripts/coord/opus-message.sh CLI: opus-message.sh send --to <gap-id
    2. session-id
    3. all-opus> --from <my-session-id> --body "<text>" [--ref <pr-or-gap>] writes one JSONL line to .chump-locks/opus-inbox/<recipient>.jsonl with fields {ts, from, to, body, ref, read_at:null}
    4. opus-message.sh list [--unread] [--for <session-id>] reads the recipient's inbox and prints addressed messages, oldest first
    5. opus-message.sh mark-read <message-id> sets read_at on the message in-place via atomic rewrite (tempfile + rename)
    6. Recipient resolution: --to gap:INFRA-NNN routes to whoever currently holds the lease for that gap (look up in .chump-locks/*.json); --to session:claim-X routes to a specific session; --to all-opus broadcasts to .chump-locks/opus-inbox/all-opus.jsonl which every session reads
    7. SessionStart hook addendum: read .chump-locks/opus-inbox/<my-session-id>.jsonl + .chump-locks/opus-inbox/all-opus.jsonl; print unread count + first-line preview of latest 3 unread messages alongside the ambient digest
    8. Hook lookup discovers my-session-id via  env (set by chump claim) OR falls back to hostname-pid
    9. Emit kind=opus_message_sent {to, from, ref} to ambient; register in EVENT_REGISTRY.yaml
    10. Smoke test scripts/ci/test-opus-message.sh: send a message gap-addressed, assert recipient's inbox has the JSON line, list --unread shows it, mark-read flips read_at, second list --unread shows it gone
    11. No CHUMP_OPUS_MESSAGE_SKIP bypass needed (this IS the lightweight escape hatch); operators can ignore inbox entries entirely if they choose
    12. Bridge gap: paved-cow path until INFRA-1759 (full RPC Layer 2b) lands; this gives addressed async TODAY for ~50 LOC instead of waiting on the full A2A stack
