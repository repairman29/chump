- id: INFRA-1377
  domain: INFRA
  title: 'ZERO-WASTE: enable GitHub Merge Queue, deprecate gh pr merge --auto — kills convoy CI thrash (~800 min/hr wasted
    right now on cancelled runs)'
  status: done
  priority: P0
  effort: m
  description: 'Observed 2026-05-15: 30 PRs auto-armed simultaneously, last 8 completed CI runs ALL cancelled, ~800 CI-min/hr
    burned with zero ships. Root cause is the standard GitHub auto-merge mechanism: every main-bump cascades a merge-back
    into all open PRs, restarting their CI. Merge Queue serializes — PRs queue, CI runs once against the target merge state,
    no cross-PR invalidation. This is GitHub''s first-party fix for exactly this convoy pattern. Highest-leverage single-change
    in the entire CI cleanup arc. PAIRS with INFRA-1378 (cancel-in-progress) for belt-and-suspenders.

    '
  acceptance_criteria:
  - 'Enable GitHub Merge Queue on main branch via GH branch-protection API (or web UI): gh api repos/repairman29/chump/branches/main/protection
    --method PUT with required_pull_request_reviews.merge_queue.enabled=true'
  - Convert scripts/coord/bot-merge.sh and chump gap claim flow to use `gh pr merge --merge-queue` (or equivalent gh-api call)
    instead of `gh pr merge --auto`
  - Branch-protection drift gate (existing) updated to assert merge_queue.enabled stays true
  - CI test scripts/ci/test-merge-queue-armed.sh asserts merge-queue is enabled for main and that one fresh PR enters the
    queue (mocked or live)
  - docs/process/MERGE_QUEUE.md (new) documents the operator flow + how to bypass to direct-merge for emergency fixes
  - 'Measure: ambient counter of "cancelled CI runs in last 24h" before vs after — expect >80% drop'
  closed_date: '2026-05-16'
  closed_pr: 2146
