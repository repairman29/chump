  title: "MISSION: Rust-first gate squash-merge loophole — re-run gate in CI/merge_group + require trailer in PR body"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - Add CI workflow job rust-first-gate that runs scripts/git-hooks/pre-commit-rust-first.sh against the PR's full diff (not just last commit) — covers the squash-merge path where individual commit trailers are lost
