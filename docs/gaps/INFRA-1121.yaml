- id: INFRA-1121
  domain: INFRA
  title: "EFFECTIVE: A2A Layer 3d — shared KV scratchpad with seed keys + agent-prompt injection (META-061)"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - "NATS KV bucket `chump_scratch` created with 5 live seed keys: `main.head.sha` (CAS-required), `fleet.size` (last-writer-wins), `pillar.focus` (last-writer-wins), `last_known_good.chump_binary` (CAS-required), `red_letter.last_ts` (last-writer-wins)"
    - "Conflict policy per key documented in `docs/design/A2A_SCRATCHPAD_KEYS.md` and enforced in code; numeric counters = last-writer-wins, string pointers = CAS with retry on conflict, map blobs = CAS with merge function"
    - "Agent-prompt injection: top-N scratchpad keys (≤ 500 tokens total) auto-injected into the `--briefing` context at session start; operator can disable per-key injection via `prompt_inject: false` in the key's schema entry"
    - "Measurable outcome: `git rev-parse origin/main` call count drops > 80% vs pre-3d baseline after 7-day release gate run (measured via `kind=scratch_cache_hit` events)"
    - "TTL = 24h by default; entries marked `ttl=infinite` must carry `operator_reviewed_at` timestamp or insertion is rejected"
    - "Integration test `tests/a2a_layer3d.rs`: concurrent writers (≥ 10 tokio tasks) on CAS key — exactly one wins, all others retry; final value is deterministic"
    - "EVENT_REGISTRY.yaml entries for `scratch_cache_hit`, `scratch_cache_miss`, `scratch_cas_conflict` present before code ships"
    - "Bash-callable: `scripts/coord/scratch.sh get|set|cas <key> [value]` for non-Rust harnesses"

