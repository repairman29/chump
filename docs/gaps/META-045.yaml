- id: META-045
  domain: META
  title: "MISSION/CREDIBLE: cognition-stack ship-rate impact A/B"
  status: open
  priority: P1
  effort: s
  description: >
    Measures whether COG-041 semantic ranking + COG-046 embeddings (CHUMP_LESSONS_AT_SPAWN_N=5 +
    CHUMP_LESSONS_EMBEDDING=1) actually improve fleet ship rate and cycle time vs. baseline
    (cognition OFF). Provides a setup script that launches two fleet cells with different configs
    and a report script that compares session_end events from each cell's ambient log.
  acceptance_criteria:
    - scripts/experiments/cognition-ab-setup.sh --cell A configures CHUMP_LESSONS_AT_SPAWN_N=5 + CHUMP_LESSONS_EMBEDDING=1
    - scripts/experiments/cognition-ab-setup.sh --cell B configures CHUMP_LESSONS_AT_SPAWN_N=0 (cognition OFF)
    - each cell writes to a separate CHUMP_AMBIENT_LOG file for unambiguous attribution
    - cognition_ab_run_start ambient event emitted at cell start with config snapshot
    - scripts/experiments/cognition-ab-report.sh reads both cell logs and prints ship rate + cycle time comparison
    - cognition_ab_comparison ambient event emitted after report
    - both event kinds registered in EVENT_REGISTRY.yaml
    - scripts/ci/test-cognition-ab.sh passes (12 tests)
