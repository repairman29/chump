- id: INFRA-1853
  domain: INFRA
  title: "RESILIENT: chump-commit.sh auto-appends new CHUMP_* env refs to scripts/ci/env-vars-internal.txt (mandate by auto-fix, extends INFRA-1833)"
  status: open
  priority: P1
  effort: s
  acceptance_criteria:
    - "Extends INFRA-1833 (#2423 auto-fmt-on-commit) — chump-commit.sh adds a second auto-fix step after cargo fmt: scan staged Rust/scripts files for CHUMP_* env references not yet documented in scripts/ci/env-vars-internal.txt, append stub entries automatically"
    - "Detection: regex 'CHUMP_[A-Z0-9_]+' in staged .rs/.sh/.py files (grep on diff hunks, not whole files, to avoid false positives in comments); dedup against existing entries in env-vars-internal.txt + the documented exclusion list (test fixtures, etc.)"
    - "Auto-fix action: for each new env not in the allowlist, append:\\n  # AUTO: detected in <relative-path>; describe purpose then remove this AUTO marker\\n  CHUMP_FOO_BAR\\nto end of env-vars-internal.txt (with file:line breadcrumb so operator can fill the description in a follow-up commit)"
    - git add -A re-stages env-vars-internal.txt so the auto-append lands in the same commit as the new ref
    - Only fires when staged delta has .rs/.sh/.py changes (skip docs-only)
    - "Bypass: CHUMP_AUTO_ENVVAR=0 emits kind=auto_envvar_bypassed ambient event with reason='CHUMP_AUTO_ENVVAR=0'"
    - Default = auto-apply (mandate by automation, not check-and-fail)
    - "Smoke test scripts/ci/test-chump-commit-auto-envvar.sh:\\n  1. Synth a Rust file with new CHUMP_TEST_NEW_VAR ref\\n  2. Run chump-commit.sh\\n  3. Assert env-vars-internal.txt has CHUMP_TEST_NEW_VAR appended with AUTO breadcrumb comment\\n  4. Bypass run with CHUMP_AUTO_ENVVAR=0 → assert no append + audit emit"
    - Allowlist auto_envvar_applied + auto_envvar_bypassed in event-registry-reserved.txt
    - "Pattern parent: INFRA-1833 (cargo fmt auto-fix). Discipline architecture: INFRA-1833 (fmt) + INFRA-1853 (this, env-vars) + INFRA-1831 #2420 (gaps-integrity) + INFRA-1834-1837 (bypass-audit framework, queued)"
    - Caught this discipline failure ~5× today (CHUMP_PREFLIGHT_SKIP_GAPSINT, SKIP_PRSCOPE, SKIP_CLAUDELEAK, SKIP_ENVVARS — all forgotten allowlist entries that became CI failures)

