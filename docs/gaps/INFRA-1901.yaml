- id: INFRA-1901
  domain: INFRA
  title: "RESILIENT: bot-merge.sh fails when invoked from inside an already-claimed worktree — tries to re-claim instead of detecting it is already inside the lease's worktree; 3/4 sub-agents on 2026-05-23 forced into manual recovery"
  status: open
  priority: P1
  effort: s
  acceptance_criteria:
    - "1. Reproduce: invoke scripts/coord/bot-merge.sh --gap <ID> --auto-merge from inside /tmp/chump-<ID>/ when .chump-locks/claim-<id>-*.json already exists pointing at that same worktree path; expect SUCCESS (not 're-claim failed' error); baseline 2026-05-23: 3 of 4 sub-agents (INFRA-1586, INFRA-1585, INFRA-1743) hit this and were forced into manual gh pr create + gh pr merge --auto fallback"
    - "2. Detection logic: bot-merge.sh near the top of its claim section reads the lease JSON (.chump-locks/claim-<id>-*.json), extracts worktree path, compares to \\/Users/jeffadkins/Projects/Chump; if pwd is within the lease's worktree → skip the chump claim re-invocation entirely and proceed to commit/push/PR steps"
    - "3. Lease-file resolution: handle both single-claim and multi-session-claim files; use the lease whose worktree_path actually contains pwd as a prefix (handle /private/tmp symlink resolution; pwd may be /tmp/X but lease may say /private/tmp/X)"
    - "4. Smoke test scripts/ci/test-bot-merge-already-claimed.sh: synthesize a lease JSON + matching worktree dir + a feature branch with one commit; invoke bot-merge.sh from inside; assert no re-claim attempt + push/PR flow proceeds"
    - "5. Bypass: CHUMP_BOT_MERGE_SKIP_CLAIM=1 env restores the unconditional re-claim attempt (debug only); emit kind=bot_merge_skip_claim_lax when bypass active"
    - "6. Validate after merge: dispatch 3 fresh sub-agents in same session, count manual-recovery fallbacks; assert 0 (baseline 3/4)"
    - "7. Pairs with the 2026-05-23 sub-fleet dispatch run (PRs #2469, #2475, #2478 all used manual recovery)"

