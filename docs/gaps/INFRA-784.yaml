- id: INFRA-784
  domain: INFRA
  title: "RESILIENT: free-tier agent loop inter-request delay — prevent RPM exhaustion on Cerebras/Groq"
  status: done
  priority: P1
  effort: xs
  closed_pr: 1447
  acceptance_criteria: |
    Free-tier providers (Cerebras, Groq, Gemini) have tight RPM limits
    (10-30 RPM). The agent loop fires API calls as fast as tools return,
    exhausting the budget in 2-3 iterations.

    Empirical evidence (2026-05-08):
    - Cerebras Qwen 3 235B: read_file succeeded, second call hit RPM
    - Groq Llama 3.3 70B: daily token limit hit after plan-mode + 1 call
    - Gemini 2.5 Flash: 20 requests/day hard cap

    Required:
    1. When is_free_tier_model() returns true, insert a configurable delay
       between agent loop iterations (default 5s, env: CHUMP_FREE_TIER_DELAY_MS).
    2. On 429 response, exponential backoff with jitter (2s, 4s, 8s, 16s)
       before retry, up to 3 retries per call.
    3. Log delay/retry to stderr: "[free-tier] delay 5000ms before iter N"

    Test: Dispatch E2E-9999 gap against Cerebras Qwen 3 235B — should
    complete read → patch → commit without 429 errors.

