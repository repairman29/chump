    - "--apply mode runs those commands (with CHUMP_ALLOW_RECYCLE=1 / CHUMP_ALLOW_GAP_REWRITE=1 where needed); audited to ambient kind=pillar_rebalance"
    - "scripts/ci/test-pillar-balance.sh covers all 4 pillars + edge cases (all-same-pillar, all-OTHER, perfectly-balanced)"
    - "Replaces my 2026-05-11 manual pillar audit (docs/syntheses/2026-05-11-pillar-audit.md) — future audits run via this command, not by hand"
