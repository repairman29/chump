  description: |
    Today the pillar audit (META-046 PM-curation role) is a manual ad-hoc
    process. INFRA-604 productizes it as a CLI subcommand so any session can
    run the same check without re-deriving the logic.
  acceptance_criteria:
    - "src/main.rs adds a `chump pillar-balance` subcommand"
