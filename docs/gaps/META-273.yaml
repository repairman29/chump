- id: META-273
  domain: META
  title: "ZERO-WASTE: RED_LETTER Issues #14 bundled into unrelated commit (EFFECTIVE-028) — same push-path defect as Issues #12 and #13; INFRA-2385 not included"
  status: open
  priority: P1
  effort: s
  opened_date: '2026-06-08'
  raised_by: cold-water
  raised_in: RED_LETTER#15
  description: |
    VERIFIED 2026-06-08: The push-path defect flagged in Issue #14 (META-272) recurred for
    Issue #14 itself. Issue #14's RED_LETTER content reached origin/main bundled inside
    commit 145c129 ("feat(EFFECTIVE-028): broadcast.sh --reply-to / corr_id threading")
    on 2026-06-04 — three days after the audit was written.

    Evidence:
    1. `git log origin/main -- docs/audits/RED_LETTER.md --format='%h %ad %s'` →
       145c129 2026-06-04 feat(EFFECTIVE-028): broadcast.sh --reply-to / corr_id threading
       (RED_LETTER changes bundled in an EFFECTIVE-028 Rust feature commit)

    2. Issue #14's filed gap INFRA-2385 (gap-reserve git-history blind, the fix for the
       collision that created the ID-collision finding) is NOT present in origin/main:
       `ls docs/gaps/INFRA-2385.yaml` → No such file or directory
       `git log origin/main -- docs/gaps/INFRA-2385.yaml` → (empty)
       Issue #14 reported "INFRA-2385: yaml=1 db=True ✓" but the YAML never reached main.

    3. META-272 (the fix gap for the stranded-RED_LETTER defect, filed in Issue #14) has
       0 implementation commits:
       `git log origin/main --grep='META-272' --oneline` → (empty)
       The gap describing the root cause has not been addressed.

    The pattern across Issues #12, #13, and #14:
    - Issue #12: RED_LETTER bundled in unrelated CI fix commit (1e1ca3c, INFRA-2329)
    - Issue #13: RED_LETTER stranded on detached HEAD entirely
    - Issue #14: RED_LETTER bundled in EFFECTIVE-028 Rust feature commit; INFRA-2385
      YAML claimed present but absent from origin/main

    Root cause (per META-272): Cold Water's Step 6 `git push origin main` fails when HEAD
    is detached; the fix is to use `git push origin HEAD:main` or checkout a tracking branch
    before committing. The step-6 instruction needs updating; no test verifies audit delivery.

    Falsifying condition: `git log origin/main --grep='META-272' --oneline` returns a commit
    with subject matching "fix(META-272)" or similar, AND `ls docs/gaps/INFRA-2385.yaml`
    returns a file.
  acceptance_criteria:
    - "Cold Water step 6 uses `git push origin HEAD:main` (or `git checkout main && git merge HEAD`) so the push succeeds whether HEAD is attached or detached"
    - "INFRA-2385.yaml is present in origin/main (the gap-reserve git-history blind spot fix gap is properly filed)"
    - "A CI gate or pre-commit hook asserts that docs/audits/RED_LETTER.md changes are committed in a dedicated commit whose subject contains 'cold-water' or 'RED_LETTER' — prevents silent bundling into unrelated commits"
    - "META-272 is closed after the push-path fix lands"
