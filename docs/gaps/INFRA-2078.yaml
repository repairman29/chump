- id: INFRA-2078
  domain: INFRA
  title: "RESILIENT P1: test-isolation-audit gate — for every #[test] fn in src/**/*.rs that calls std::env::{set_var,remove_var}(CHUMP_*), require #[serial_test::serial(group)] annotation OR explicit bypass comment; would have caught INFRA-2077 at commit time (~30 sec) instead of trunk-RED+30min"
  status: open
  priority: P1
  effort: xs
  acceptance_criteria:
    - "New script scripts/ci/test-isolation-audit.sh — scans src/**/*.rs for #[test] functions; for each, checks function body for any call to std::env::set_var or std::env::remove_var with first-arg literal matching \"^CHUMP_\"; if found, walks UP the function definition to find #[serial_test::serial(...)] OR #[serial] attribute within 5 lines preceding fn declaration; if attribute absent, prints FAIL with file:line + test fn name + suggested fix"
    - "Bypass: function-scoped comment // serial-test-bypass: <one-sentence reason> directly preceding the std::env::set_var/remove_var line OR file-scoped // !serial-test-bypass: <reason> at top of file; both must include reason text, both emit ambient kind=test_isolation_bypass on first scan of each new occurrence (audit trail)"
    - "Two callsites: (a) pre-commit hook scripts/git-hooks/pre-commit-rust-first.sh appends a call to test-isolation-audit.sh restricted to staged diff (only audit added/modified test functions, not whole repo — fast); (b) CI gate as new step in .github/workflows/ci.yml under fast-checks shard (full-repo scan, ~2sec)"
    - "Smoke test scripts/ci/test-test-isolation-audit.sh: synth a Rust file with 3 test fns — fn A has serial_test annotation (expect PASS), fn B has no annotation but bypass comment (expect PASS + ambient emit), fn C has no annotation and no bypass (expect FAIL with named error). Cover both file-scoped and function-scoped bypass comments"
    - "Audit pass on current codebase: run test-isolation-audit.sh on origin/main HEAD; expect 0 violations after INFRA-2077 lands (8 tests in fleet_pulse + budget_tracker were just annotated). If audit finds MORE violations not caught by Sonnet, file follow-up gaps per cluster"
    - "docs/process/TEST_ISOLATION_DISCIPLINE.md — short doc explaining the rule (any test mutating CHUMP_* env vars MUST use serial_test::serial with a group name) + bypass discipline (when bypass is OK, when its not — e.g. tests that intentionally race the env to assert defensive behavior)"
    - "EVENT_REGISTRY.yaml entry kind=test_isolation_bypass (fields: file, line, fn_name, bypass_reason); allowlist entry scripts/ci/event-registry-reserved.txt"
  notes: |
    Filed 2026-05-27 by curator-opus-shepherd after INFRA-2077 trunk-RED took wizard ~30min to detect. Cheaper layer: catch at commit time (pre-commit hook) or PR open (CI gate). This pattern repeats RESILIENT-024 (batch immunization for bash tests) but for Rust unit tests. Sibling: INFRA-1320 added serial_test to ambient_env users but did NOT add a CI gate to prevent regression; INFRA-2078 closes that follow-up gap. Pairs with INFRA-2074 (CI flake catalog) but addresses a different concern — INFRA-2074 catalogs known flakes after the fact; INFRA-2078 prevents the flake-class from being added in the first place.

