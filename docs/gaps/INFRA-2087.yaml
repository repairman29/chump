- id: INFRA-2087
  domain: INFRA
  title: "EFFECTIVE P1 STRUCTURAL: chump break-trunk-cascade --pr N — operator-button that codifies today's admin-merge dance (drop required checks → admin merge → restore); replaces 4 manual gh-api commands with one safe atomic operation"
  status: open
  priority: P1
  effort: xs
  acceptance_criteria:
    - "New subcommand `chump break-trunk-cascade --pr <N> --reason \"<text>\"` (chump-cli, in crates/chump/src/cli/break_cascade.rs or chump shell wrapper). Sequence: (1) verify PR is OPEN + has auto-merge ARMED + has at least 1 fixed wedge in its diff (audit/sandbox/test-isolation file paths heuristic OR --i-know-what-im-doing flag), (2) snapshot current branch-protection required_status_checks via gh api repos/X/branches/main/protection, (3) DELETE the contexts via gh api -X DELETE -- requires admin token, (4) gh pr merge N --admin --squash, (5) IMMEDIATELY restore the original required_status_checks via gh api -X POST, (6) emit ambient kind=trunk_cascade_broken"
    - "Atomic guarantee: trap on EXIT/INT/TERM restores the original required_status_checks. NO partial-state leaves the repo with reduced protection. Test: kill -9 the process mid-flight; verify restored state"
    - "Audit: emit ambient kind=trunk_cascade_broken with fields pr_number, reason, snapshot_contexts (the original list), bypass_duration_ms, operator_session_id. RESILIENT-031 sibling: chump admin-merge-cycle already does noise-class declaration; this command requires --reason \"<text>\" same way"
    - "Rate limit: max CHUMP_BREAK_CASCADE_PER_HOUR (default 1) — preventing accidental loops. When limit hit, emit kind=trunk_cascade_rate_limited + refuse + suggest operator manually run the gh api commands if truly urgent"
    - "Smoke test scripts/ci/test-break-trunk-cascade.sh: synthesize a no-merge fake (mock gh api responses) so test runs without real PRs. Assert: (a) snapshot taken, (b) merge issued, (c) restore happens even if merge fails, (d) ambient emit fires"
    - "Doc: docs/process/TRUNK_CASCADE_RECOVERY.md — when to use this command (multi-wedge circular dependency in CI), when NOT to use it (single-wedge fixable by fix-then-rebase), audit trail, post-recovery responsibilities (file gaps for each wedge that was bypassed)"
    - "Migration: deprecate the manual gh-api dance in scripts/ops/admin-merge-cycle.sh by referencing this new command in the README"
  notes: |
    Filed 2026-05-27 by curator-opus-shepherd after today's saga required me to manually run: gh api -X DELETE /repos/.../protection/required_status_checks/contexts + gh pr merge --admin --squash + gh api -X POST .../contexts. That dance is error-prone (forget to restore = unprotected main). Codify as one safe atomic command. Estimated impact: 5-min recovery vs 30-min recovery + zero forgot-to-restore risk.

