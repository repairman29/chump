  description: |
    docs/STRATEGIC_MEMO_2026Q2.md now reads: "This document has been moved to a
    private repository. Strategic / competitive material is now tracked in
    chump-proprietary (private, need-to-know)."

    Evidence (Issue #17, 2026-06-22):
      cat docs/STRATEGIC_MEMO_2026Q2.md
      → "This document has been moved to a private repository."
      → No linked gap for its former recommendations.
      → No public replacement watchpoint document.

    The Cold Water agent (docs/agents/cold-water.md Step 2 Innovation Lag) is
    required to anchor to docs/strategy/STRATEGIC_MEMO_2026Q2.md for external
    field movements. That anchor is now a tombstone. The agent cannot fulfil its
    Innovation Lag lens without a public strategic reference.

    Additionally: no follow-up gap was filed when the memo was moved. The move
    itself was silent — no audit trail, no gap linking to the recommendations
    that were archived. Future Cold Water cycles will have no public anchor for
    "what external developments should the project be responding to."

    Fix path:
    (a) Create a minimal public docs/strategy/STRATEGIC_WATCHPOINTS.md with the
        active external watchpoints (model releases, eval benchmarks, competing
        agent frameworks) that Cold Water should track — without the competitive
        IP that warranted moving the full memo to private.
    (b) Link this file from docs/agents/cold-water.md Step 2 as the new anchor.
    (c) File a gap each time a watchpoint becomes stale (>30 days without a
        referenced external development).
  acceptance_criteria:
    - "docs/strategy/STRATEGIC_WATCHPOINTS.md exists with at least 3 active watchpoints, each with a last-updated date"
    - "docs/agents/cold-water.md Step 2 references STRATEGIC_WATCHPOINTS.md as the public anchor"
    - "Cold Water Issue #18+ can complete the Innovation Lag lens with a concrete public source"
