- id: CREDIBLE-151
  domain: CREDIBLE
  title: "CREDIBLE: mission scoreboard claims auto-deploy (MISSION-012 done) while installed chump binary ran 13 days stale"
  status: open
  priority: P1
  effort: s
  description: |
    Observed 2026-07-18/19: scripts/dev/mission-scoreboard.sh prints 'auto-deploy in place (MISSION-012 done)' while /opt/homebrew/bin/chump was built 2026-07-05 — 13 days and ~10 merges stale. Consequence was not cosmetic: the pre-push hook runs the INSTALLED binary's preflight, so the RESILIENT-172 GIT_DIR scrub (merged to main) was inert until the binary was manually rebuilt+copied — the stale binary kept vandalizing the repo on every push. Signal(deploy mechanism exists) != outcome(merges reach the running binary).
  acceptance_criteria:
    - Scoreboard line 3 verifies binary build SHA is an ancestor-of-origin/main within N merges (ground truth), not just that the deploy mechanism exists
    - Auto-deploy actually refreshes /opt/homebrew/bin/chump (or the hook's resolution path) after merges touching src/ — verified by comparing chump --version SHA to origin/main after a merge
    - "Staleness alarm: fleet-brief or floor_temp flags installed-binary age > 48h when main has newer src/ commits"
  notes: YAML carried to main via docs PR (2026-07-19).

