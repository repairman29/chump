- id: FLEET-048
  domain: FLEET
  title: 'CREDIBLE: operator impact rating after PR ships — was-this-valuable feedback loop'
  status: done
  priority: P1
  effort: m
  description: 'Today ships pass through CI and merge silently. Operator never tells the

    fleet whether the shipped change actually moved the needle. Without that

    feedback, the cognition stack (lessons, reflections) has no ground truth

    about which work was valuable.

    '
  acceptance_criteria:
  - 'After each PR merges (via bot-merge.sh auto-close hook), a Discord DM is sent to the operator asking 1-5 rating: how
    valuable was this? (1=waste, 5=mission-moving)'
  - Operator response captured to ambient.jsonl as kind=operator_impact_rating with pr, gap_id, rating, optional note
  - Optional --silent flag on bot-merge.sh skips the prompt (for chore/docs PRs the operator doesn't want to rate)
  - 'scripts/dispatch/fleet-status.sh --impact aggregates ratings: mean, p50, count-of-5s vs count-of-1s, per-pillar breakdown'
  - chump waste-tally treats ratings of 1-2 as confirmed waste (alongside the existing waste signals)
  - 'Test fixture: synthetic ambient events with mix of ratings; assert aggregation queries return expected stats'
  - Pairs with CREDIBLE-025 (model+harness tagging) — ratings + harness tags give per-harness quality signal beyond just ship
    velocity
  - Pairs with META-045/EVAL-102 — provides ground-truth labels for the cognition-stack measurement
  closed_date: '2026-05-12'
