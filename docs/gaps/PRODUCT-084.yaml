- id: PRODUCT-084
  domain: PRODUCT
  title: "PRODUCT: PWA PR list view — surface open + just-merged PRs in the PWA so operator doesn't context-switch to GitHub"
  status: open
  priority: P1
  effort: s
  description: |
    Today operator opens GitHub to see what PRs are open / what merged.
    PWA could BE that surface for fleet-shipped work. Read-only first;
    actions (approve/comment) come in PRODUCT-085/086.
  acceptance_criteria:
    - "New PWA view /prs renders 3 sections: Open (open PRs), Just-merged (merged in last 24h), Stuck (open >4h DIRTY/BLOCKED — overlap with PRODUCT-080 Stuck Items but PR-specific)"
    - "Per-PR row: #N, title, author, age, mergeable state, CI check pass/fail summary, link to GitHub for full diff"
    - "Backend /api/prs endpoint wraps `gh pr list --state open` + `gh pr list --state merged --search 'merged:>=$(date -u -d -24h)'` + `gh pr view` for mergeable+CI; result cached server-side for 30s"
    - "Sort/filter: by age, by gap-id, by author, by pillar (via gap-tag lookup)"
    - "Empty-state for Just-merged: 'No ships in the last 24h. Last ship: <Nh ago>'"
    - "Click on PR row opens detail pane (placeholder for PRODUCT-085 diff renderer)"
    - "scripts/ci/test-pwa-pr-list.sh: mock gh API responses; assert PR list renders + sections separate correctly"
    - "Read-only in this gap; approval/revert actions come in PRODUCT-086"
    - "Pairs with PRODUCT-085 (diff renderer) — list is the entry; diff is the detail"
