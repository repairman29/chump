  acceptance_criteria:
    - sqlite SELECT COUNT(*) FROM outcomes returns >=8 (one per shipped MISSION-* + META-067 outcomes)
    - sqlite SELECT COUNT(*) FROM gaps WHERE outcome_id IS NOT NULL AND outcome_id != '' returns >0; backfill rate per-domain reported in audit-priorities
    - chump outcome create / list / show CLI exist (or documented why deferred)
    - Picker (MISSION-029 dependency) can consume outcome_id when ranking

