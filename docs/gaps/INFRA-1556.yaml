- id: INFRA-1556
  domain: INFRA
  title: "RESILIENT: self-hosted runner setup — guarantee chump/cargo/local deps on runner PATH"
  status: open
  priority: P1
  effort: s
  pillar: RESILIENT
  acceptance_criteria:
    - "install-self-hosted-runner.sh writes a launchd plist whose PATH includes ~/.cargo/bin AND ~/.local/bin (in addition to /opt/homebrew/bin, /usr/local/bin, /usr/bin, /bin)"
    - "Installer also ensures chump binary is present at ~/.cargo/bin/chump or ~/.local/bin/chump; if missing, runs `cargo install --path .` from the repo root before the runner registers"
    - "Smoke test scripts/ci/test-self-hosted-runner-deps.sh asserts that under the runner's effective env, `command -v chump`, `command -v cargo`, `command -v jq`, `command -v gh` all resolve"
    - "Existing runners (currently 4 on M4) are retroactively patched by a --upgrade flag on the installer — idempotent, reads existing plist, rewrites PATH, reloads launchd"
    - "Documented in docs/process/SELF_HOSTED_RUNNERS.md under a new 'Dependencies' section listing every CLI the workflow currently calls"
    - "Cross-link: today's #2241 stalled because `chump gap show` failed with exit 127 on M4; canary #2239 missed this because it only exercised cargo build steps, not chump-calling steps"
  notes: |
    Discovered 2026-05-16 while shipping #2241 (pyyaml guard). Canary #2239 passed
    because its AC was narrowly "cargo build works on self-hosted". The broader
    AC of fast-checks migration (#2238) — "fast-checks runs successfully on M4" —
    was technically met for the Linux-vs-macOS guards but NOT for the chump-on-PATH
    dependency. Real-world fast-checks needs ~6 CLIs: cargo, chump, gh, jq, python3,
    bash. Only the system-bundled ones were on the runner's PATH.

    Acute workaround already applied: PATH patched in all 4 plists by hand. This
    gap turns that into the durable installer behavior so the next runner machine
    (Pi mesh, additional M4) doesn't repeat the failure.

    This is also canonical evidence for INFRA-1541 (AC coverage gate): a more
    thorough AC bullet — "step that invokes chump succeeds on M4" — would have
    caught this before #2238 shipped.
