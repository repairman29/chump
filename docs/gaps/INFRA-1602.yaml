- id: INFRA-1602
  domain: INFRA
  title: "RESILIENT P1: 10+ scripts/ci/*.sh tests hardcode ./target/debug/chump, fail on M4 self-hosted (no cargo build step in fast-checks)"
  status: open
  priority: P1
  effort: s
  acceptance_criteria:
    - "Add a shared scripts/ci/lib/ensure-debug-chump.sh helper that: (a) checks if ./target/debug/chump exists, (b) if missing, runs 'cargo build --bin chump' (uses CARGO_TARGET_DIR if set per fleet shared cache), (c) verifies the binary works (chump --version), exits 1 with diagnostic if not."
    - "Every scripts/ci/test-*.sh that calls ./target/debug/chump sources the helper at the top. Initial set: test-fleet-auto-prune.sh, test-mcp-coord-smoke.sh, test-worktree-root-sibling.sh, test-pwa-secrets-flow.sh, test-system-integration.sh, test-gap-id-cross-session.sh, test-gap-ship-stale-gate.sh, test-gap-workflow-status.sh, test-gap-consolidate.sh, test-pwa-auth-middleware.sh + any others grep finds."
    - "Alternative path tests use: prefer CHUMP_BIN if set, else ./target/debug/chump (after ensure-build), else 'command -v chump'. Document the lookup order in the helper header."
    - "Smoke test scripts/ci/test-ensure-debug-chump-helper.sh: spawn helper in tmp dir without ./target/debug/chump, assert it builds + returns valid path. Then spawn with stale binary present, assert it doesn't rebuild unnecessarily."
    - "Cross-link: 2026-05-16 PR #2268's fast-checks failed on M4 (slot 3) at 'FAIL: chump binary not found at /Users/jeffadkins/actions-runner-chump-3/_work/chump/chump/target/debug/chump'. Ubuntu-latest passes because cargo target cache from prior CI runs masks the issue. Broad canary (INFRA-1568) was supposed to catch this BEFORE production routing but landed too recently to gate today's flip."

