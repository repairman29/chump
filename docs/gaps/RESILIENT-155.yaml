- id: RESILIENT-155
  domain: RESILIENT
  title: "RESILIENT: fleet version-skew RESTART-LOOP — INFRA-609 detector checks HEAD (forever-behind on main checkout), incoherent with RESILIENT-152 self-sync's working-tree deploys"
  status: done
  priority: P1
  effort: m
  acceptance_criteria:
    - "1. scripts/dev/fleet-version-skew-detect.sh compares the WORKING-TREE worker.sh against origin/main ('git diff --quiet origin/main -- scripts/dispatch/worker.sh') instead of HEAD..origin/main commit-counting — coherent with RESILIENT-152 self-sync (which keeps the working tree current but never advances the permanently-behind HEAD). Skew = working tree differs from origin/main (workers ARE running stale code); no skew when self-sync has deployed current scripts. 2. scripts/dispatch/fleet-autorestart-daemon.sh, on trigger=version_skew, DEPLOYS current scripts ('git checkout origin/main -- scripts docs/dispatch/routing.yaml') BEFORE restarting, so the skew self-heals and converges instead of looping on stale scripts. 3. A regression test (scripts/ci/test-fleet-skew-detect.sh) builds a git fixture where the working-tree worker.sh is behind origin/main → asserts detector exits 1 (skew); deploys origin/main worker.sh → asserts detector exits 0 (clear); proves the HEAD-behind-but-worktree-current case does NOT report skew (the false-loop case). 4. No infinite restart-loop: after one deploy+restart the detector clears."
  closed_pr: 3148
  evidence: |
    OBSERVED 2026-06-21 22:51-22:53: fleet restart-looped every ~60s (ambient kind=fleet_auto_restart trigger=version_skew, 0 ships). ROOT: (1) scripts/dev/fleet-version-skew-detect.sh:56-70 compares git rev-parse HEAD vs origin/main and counts commits-behind on worker.sh — but the main checkout HEAD is PERMANENTLY behind origin/main (the dirty tree: docs/gaps/*.yaml + state.db mutate constantly → git pull/ff-merge refuses → HEAD never advances). (2) RESILIENT-152 self-sync deploys worker.sh to the WORKING TREE (what workers execute) but never advances HEAD. So the detector checks HEAD (forever-behind) → reports skew even when the working tree is current → autorestart restarts WITHOUT redeploying → still 'behind' on HEAD → infinite loop, never converges, ships nothing. (3) Compounding: working-tree script deploys are fragile — worker.sh was found reverted to HEAD content (git diff HEAD -- worker.sh == SAME) despite self-sync's deploy, so some process restored the working tree from index=HEAD. fleet-autorestart-daemon.sh does NOT redeploy before restarting (grep: no git checkout/stash/reset). This is THE recurring 'fleet keeps dying' disease.
