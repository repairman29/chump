- id: RESILIENT-158
  domain: RESILIENT
  title: "RESILIENT: worker pool (run-fleet) has NO durable owner — dies with launching session, nothing revives it"
  status: done
  priority: P1
  effort: m
  acceptance_criteria:
    - "1. fleet-autopilot.sh heartbeat tick calls an ensure_worker_pool step: if 'tmux has-session chump-fleet' is false OR it has fewer than CHUMP_FLEET_TARGET_SIZE (default 2) live worker panes, relaunch run-fleet.sh detached with oauth env (CHUMP_AUTH_MODE=oauth) — IDEMPOTENT: kill a stale/empty session first; never double-launch a healthy pool. 2. Durability via tmux: run-fleet creates a detached tmux session (tmux server is process-independent) so the pool survives the heartbeat process exit + the next launchd StartInterval cycle re-ensures it. 3. Emits kind=worker_pool_revived {target, found, action} on relaunch; registered in EVENT_REGISTRY.yaml. 4. Operator off-switch: CHUMP_FLEET_KEEPER_DISABLE=1 makes ensure_worker_pool a no-op (on-demand mode) without code edits. 5. Test (test-fleet-autopilot-worker-pool.sh): ensure_worker_pool is a no-op when a healthy chump-fleet session exists (mock tmux), and invokes the relaunch path when absent (mock run-fleet captures the call). 6. The heartbeat must NOT block on run-fleet (background the relaunch) so the 300s tick stays fast."
  closed_pr: 3151
  evidence: |
    ROOT of the recurring 'fleet keeps dying' (operator flagged 2026-06-21). The durable control plane is healthy: dev.chump.farmer is running (launchctl runs=23358, KeepAlive), fleet-autopilot runs every StartInterval (runs=2803) maintaining curators + base daemons. BUT NOTHING durably owns the run-fleet WORKER POOL (the tmux chump-fleet session of worker.sh panes that actually pick+ship gaps). run-fleet is launched per-session; its fleet-autorestart-daemon lives INSIDE run-fleet's process group so both die together. PROOF: launched fleet 23:14 (workers actively building INFRA-815/INFRA-900 on sonnet), but the launch log shows 'Terminated: 15' (SIGTERM) on run-fleet.sh:768 + fleet-autorestart-daemon.sh:332 when the launching Claude session's process group was torn down → whole chump-fleet session gone by 23:46, 0 ships. Every prior 'revival' this session was a human (me) relaunching = the rescue treadmill the operator wants gone. CURE: extend fleet-autopilot.sh (existing durable launchd heartbeat) to ENSURE the worker pool is up — idempotent: if tmux chump-fleet has < target live worker panes, relaunch run-fleet detached (setsid) with oauth env. No new daemon (extends existing durable machinery). Makes the worker pool session-independent + auto-revived = 'the machine operates' instead of 'I operate the machine'.

