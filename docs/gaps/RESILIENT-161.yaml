- id: RESILIENT-161
  domain: RESILIENT
  title: "RESILIENT: pre-push preflight lock-stalls under fleet cargo contention with no opt-out → forces --no-verify"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - 1. The pre-push preflight (cargo clippy/check) no longer lock-stalls under fleet cargo package-cache contention — either runs with --offline + a dedicated CARGO_TARGET_DIR, OR detects flat-CPU + zero-artifacts for >60s and falls back rather than hanging 8+ min. 2. OR restore a narrow, auditable preflight-skip that KEEPS the off-rails/branch guards (so an already-locally-verified push doesn't need the --no-verify sledgehammer that also skips off-rails). 3. A fix-PR pushes without an 8-minute lock-stall and without a forced --no-verify. 4. Pairs with RESILIENT-163 (/tmp-target) as the Phase-3 substrate fix (docs/strategy/OUTWARD_FLYWHEEL_2026-06-22.md).
  evidence: |
    Shipping EFFECTIVE-288 (2026-06-22), the pre-push hook's 'chump preflight' (INFRA-1671: cargo clippy + cargo check --all-targets) repeatedly STALLED: cargo procs sleeping at ~0.04s CPU for 8+ min, zero artifacts written, blocked on the cargo package-cache (~/.cargo/.package-cache) / target-dir (.cargo-lock) lock while the fleet's parallel cargo workers grabbed it. Observed 3x in one ship (first interactive clippy, then bot-merge's internal preflight, then the pre-push hook). ROOT CAUSE A: cargo serializes ALL invocations on the global package-cache lock; N fleet workers + an interactive build = the interactive one starves. Running clippy with --offline took 9.76s vs 8-min stall (proof it's pure lock contention, not real work). ROOT CAUSE B: INFRA-2422 DELETED CHUMP_PREFLIGHT_SKIP, so there is NO clean opt-out when preflight lock-stalls on a push whose gates were ALREADY verified clean locally — the only escape is --no-verify, which ALSO skips off-rails/branch guards (heavier than needed) and inflates the bypass count the repo is trying to reduce (INFRA-2525). IMPACT: every interactive/bot-merge ship during fleet peak risks an 8-min-per-attempt stall; agents will reach for --no-verify, defeating the local-CI discipline. FIX SHAPE (pick one+): (a) preflight runs cargo with --offline + a dedicated CARGO_TARGET_DIR to sidestep both locks; (b) a fleet-wide cargo-lock-aware queue so interactive builds get priority; (c) restore a NARROW, auditable preflight-skip that emits preflight_bypassed but KEEPS off-rails/branch guards (so legitimate already-verified pushes don't need the --no-verify sledgehammer); (d) detect 'preflight CPU flat + 0 artifacts for >60s' and auto-fall-back to --offline. Precedent: this very PR shipped via --no-verify + Preflight-Skip-Reason trailer as a documented bridge.

