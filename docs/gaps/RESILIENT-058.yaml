- id: RESILIENT-058
  domain: RESILIENT
  title: "RESILIENT: A2A L6a — supervision trees (per-gap restart-intensity + fleet escalation)"
  status: ready_to_ship
  priority: P1
  effort: m
  description: |
    Tier-1 L6 per docs/design/A2A_MASTER_PLAN_2026-06-03.md (Erlang/OTP supervision-tree pattern). The 2026-06-03 CI hydra (a self-audit check looped 30+ times needing repeated human --admin overrides) is the motivating incident: there is no transient-vs-systematic distinction today; a crashed agent lease just expires and re-claims from scratch. Build a two-level supervisor.
  acceptance_criteria:
    - "a per-gap supervisor tracks restart attempts in a rolling window: 3 restarts / 5 min -> set gap status=blocked + emit kind=gap_supervisor_escalated (no infinite retry)"
    - "a fleet supervisor counts escalations: more than 2 in 10 min -> pause new gap pickup + run fleet-doctor-strict before resuming"
    - a regression test simulates a retry-storm and asserts it is HALTED at the threshold, not looped
    - the escalation hook is wired to the existing fleet-doctor health check

