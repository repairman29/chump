- id: INFRA-1825
  domain: INFRA
  title: "EFFECTIVE: CapabilityManifest publish loop — every worker writes .chump-locks/capabilities/<session>.jsonl every 30s (activates INFRA-1760 schema, file-backed v0)"
  status: open
  priority: P1
  effort: s
  acceptance_criteria:
    - "scripts/coord/capability-publish.sh once|daemon emits chump-capability-v1 manifest to .chump-locks/capabilities/<session>.jsonl"
    - "scripts/coord/chump-capabilities.sh list|count reads + dedups + filters stale, prints table"
    - "Emits kind=capability_published per emit; auto_capability_bypassed when CHUMP_AUTO_CAPABILITY=0"
    - "CHUMP_PUBLISH_HARDWARE=1 opt-in gates gpu/ip fields (default omits)"
    - "Smoke test scripts/ci/test-capability-publish.sh 10-assertions: schema-v1 shape, append-on-second-emit, list/count, bypass+audit, hw-gating"
    - "File-backed v0; INFRA-1120 slice 2/4 swaps backend to NATS KV chump_capabilities bucket while preserving CLI surface"
    - "Pairs with INFRA-1760 #2405 (schema), INFRA-1829 (picker integration, depends_on this)"
