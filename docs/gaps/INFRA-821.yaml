- id: INFRA-821
  domain: INFRA
  title: 'RESILIENT: state.db empty on fresh clone — chump gap list returns [] until manual chump gap import'
  status: done
  priority: P1
  effort: s
  opened_date: '2026-05-11'
  raised_by: cold-water
  raised_in: RED_LETTER#6
  description: "On a fresh clone, state.db (canonical gap store per CLAUDE.md) contains zero rows.\n`chump gap list --status\
    \ open --json` returns []. The 155 gaps in docs/gaps/*.yaml are\ninvisible until operator manually runs `chump gap import`\
    \ (without --yaml flag).\n\nObserved 2026-05-11 in Cold Water audit sandbox:\n  python3 sqlite3 state.db \"SELECT COUNT(*)\
    \ FROM gaps\" → 0\n  chump gap list --json → []\n  chump gap import --yaml /abs/path → \"0 inserted\" (--yaml flag causes\
    \ wrong root lookup)\n  chump gap import → \"155 inserted, 0 skipped\"\n\nCLAUDE.md preflight step 6 is `chump gap list\
    \ --status open`. In a fresh sandbox this\nreturns [] and misleads operator into thinking queue is empty. Any CI runner,\
    \ sandboxed\nagent, or new contributor starts blind. The --yaml absolute-path footgun compounds the issue.\n"
  acceptance_criteria:
  - chump start or chump init auto-runs gap import if state.db gaps table is empty
  - OR scripts/setup/ entry point seeds state.db on fresh clone
  - chump gap import --yaml <absolute-path> errors clearly or correctly resolves repo root
  - FTUE verification: fresh clone + chump gap list returns correct open count without manual step
  - scripts/ci/test-fresh-clone-gap-list.sh verifies on clean DB
  closed_pr: 1862
