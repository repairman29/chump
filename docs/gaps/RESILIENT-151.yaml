- id: RESILIENT-151
  domain: RESILIENT
  title: "RESILIENT: durable_resume::tests env-var race — set CHUMP_STATE_DB_PATH without #[serial], flakes under parallel cargo test (blocked a push 2026-06-21)"
  status: open
  priority: P2
  effort: xs
  acceptance_criteria:
    - "durable_resume::tests that mutate CHUMP_STATE_DB_PATH (no_resumable_run_exits_0, resumable_run_exits_0_and_reports, + any sibling using set_var on it) are annotated #[serial] (serial_test crate, as other env-mutating tests in this repo are)"
    - cargo test --bin chump under full parallelism passes the durable_resume tests reliably (the env-var race that blocked CREDIBLE-134's first push 2026-06-21 is gone)
    - a quick grep audit confirms no other non-serial test sets CHUMP_STATE_DB_PATH
  notes: |
    Root cause: the tests call durable_resume::run() with an env-var-driven db path but aren't serialized; under parallel cargo test (worsened by concurrent fleet daemons holding state.db locks) a sibling test's set_var races → wrong db → assert_eq!(rc,0) panics at durable_resume.rs:279. Passes in isolation (--test-threads=1). Surfaced during CREDIBLE-134 pre-push; cleared on retry.

