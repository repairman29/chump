- id: MISSION-046
  domain: MISSION
  title: "MISSION: chump --execute-gap routes external_repo gaps to the chump improve path (blocker #1 to first BEAST-MODE merge — mesh-worker dispatches execute-gap which has 0 external_repo handling, runs the internal agent loop in the Chump repo instead of cloning/PRing the target)"
  status: done
  priority: P0
  effort: m
  acceptance_criteria:
    - "chump --execute-gap on a gap whose skills_required contains 'external_repo:OWNER/REPO' detects the tag and routes to the chump improve OWNER/REPO --apply path (or ExternalRepoContract) instead of the internal ChumpAgent loop"
    - the routed run operates on the external clone and opens a PR on the EXTERNAL repo (OWNER/REPO), never the Chump repo
    - internal (non-external_repo) gaps still take the normal execute_gap path — no regression
    - scripts/ci/test-execute-gap-external-routing.sh asserts the routing decision for both an external_repo gap and an internal gap
  closed_pr: 3143
  evidence: |
    VERIFIED 2026-06-21: (1) execute_gap.rs has 0 refs to external_repo/ExternalRepoContract/improve (grep -c = 0) — when the mesh-worker picks an external_repo:repairman29/BEAST-MODE gap and runs 'chump --execute-gap <ID>', it runs the standard internal ChumpAgent loop in the Chump worktree, NOT a BEAST-MODE clone. (2) The CORRECT external path 'chump improve <owner/repo> --apply' (EFFECTIVE-177, src/improve.rs) is fully implemented + has already opened 6 real PRs on repairman29/BEAST-MODE (#1-6) — but it is a SEPARATE command never invoked autonomously by the worker. (3) ExternalRepoContract (crates/chump-handoff/src/contracts.rs:412) + CHUMP_EXTERNAL_REPO_PICK_OK gate (crates/chump-coord/src/worker/capability.rs:130, set=1 in run-fleet.sh:292 + mesh-worker plist) both exist. So routing PICKS external gaps but the executor cannot fulfill them = the structural disconnect. AC: (1) 'chump --execute-gap <gap whose skills_required contains external_repo:OWNER/REPO>' detects the tag and routes to the chump improve OWNER/REPO --apply path (or ExternalRepoContract) instead of the internal agent loop; (2) the routed run operates on the external clone and opens a PR on the EXTERNAL repo, not Chump; (3) internal gaps still take the normal execute_gap path (no regression); (4) scripts/ci/test-execute-gap-external-routing.sh asserts the routing decision for both an external_repo gap and an internal gap. Sibling blockers: picker skill-match skips external_repo gaps (WORKER_SKILLS lacks external_repo); MISSION-016/017 (scans->queue) unimplemented; BEAST PR #1 (CI workflow) unmerged so verify-merge Gate-1 always fails.
