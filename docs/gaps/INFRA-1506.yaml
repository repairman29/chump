- id: INFRA-1506
  domain: INFRA
  title: "MISSION: License model decision doc — MIT vs dual-license vs source-available; operator + lawyer sign-off"
  status: open
  priority: P1
  effort: s
  description: |
    Chump is currently MIT — anyone can fork + commercialize. As the project approaches monetization (INFRA-1337 hosted tier, INFRA-1338 enterprise SKU), the license question becomes load-bearing. MIT vs Apache-2 vs dual-license (community + commercial) vs source-available (BSL-style) each have different long-term consequences. Operator decision required before any payment infra ships.
  acceptance_criteria:
    - "docs/business/LICENSE_STRATEGY.md with: 4-option comparison table (MIT current, Apache-2, dual MIT+commercial, BSL like Sentry/Cockroach), implications for each on adoption + enterprise sales + community contributions"
    - Operator (Jeff) sign-off on the chosen path
    - "If non-MIT chosen: file follow-up gap to migrate + notify existing contributors"
    - "If MIT retained: file companion gap to clarify commercial-use messaging"

