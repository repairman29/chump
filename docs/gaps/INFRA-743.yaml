- id: INFRA-743
  domain: INFRA
  title: "EFFECTIVE: chump init detects Ollama and configures local-LLM defaults"
  status: open
  priority: P1
  effort: s
  acceptance_criteria:
    - chump init detects whether Ollama is running (port 11434) and lists available models
    - If Ollama is available, wizard auto-populates OPENAI_API_BASE + OPENAI_MODEL in ~/.chump/config.toml
    - "If no models are pulled, suggests 'ollama pull qwen2.5:7b' (or appropriate model for available RAM)"
    - If neither Ollama nor ANTHROPIC_API_KEY is found, wizard explains both options with one-liner setup commands
    - Writes a minimal .env or config.toml that makes 'chump gen' work immediately after init

