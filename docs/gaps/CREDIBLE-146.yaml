- id: CREDIBLE-146
  domain: CREDIBLE
  title: "CREDIBLE: auth-status stale BROKEN cache halts fleet on false AUTH_DEAD while credential is valid (force-fresh before acting)"
  status: done
  priority: P1
  effort: s
  acceptance_criteria:
    - 1. Any auth-dead decision path (farmer halt/page, worker-spawn gate) force-freshes before acting on a BROKEN verdict — a CACHED BROKEN must be re-validated, never acted upon. 2. auth-status.sh re-probes immediately on a cached-BROKEN (fail-fresh) rather than serving BROKEN for the full 600s TTL. 3. The operator-facing --force/-f flag ACTUALLY busts the cache and re-probes (today it still prints '(cached)' — verified 2026-06-28; this is why self-heal failed). 4. Cache auto-invalidates when ~/.chump/oauth-token.json (or .env ANTHROPIC_API_KEY) mtime > cache mtime. 5. A regression test feeds a stale-BROKEN cache + a valid credential and asserts the farmer re-probes fresh and spawns workers (does not page AUTH_DEAD).
  closed_date: '2026-07-05'
  closed_pr: 3182
  evidence: |
    2026-06-23: fleet halted for HOURS — the farmer read a cached 'AUTH BROKEN' (CHUMP_AUTH_STATUS_TTL_S=600) and refused to spawn workers + paged AUTH_DEAD, while a forced-fresh probe (TTL=0) validated oauth OK in BOTH my shell AND a stripped launchd-like env. Credential was valid the whole time; the stale cache was the false-positive. This is the concrete root cause of the recurring #1-false-positive auth-dead class (CREDIBLE-090 reality-check).

