- id: INFRA-1580
  domain: INFRA
  title: "CREDIBLE: tighten Rust-First-Bypass gate — pre-commit lint that rejects narrative bypasses when machine-checkable criteria fail (LOC, state mutation, hot path)"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - "Enhance scripts/git-hooks/pre-commit-rust-first.sh (existing per META-064) so when a shell file under scripts/ has Rust-First-Bypass: trailer/header, hook AUTOMATICALLY checks 4 machine-verifiable criteria and rejects commit if any fails AND trailer doesn't acknowledge the failure."
    - "Machine-checkable criteria: (1) LOC > 200, (2) writes to .chump-locks/*.state or state.db or ambient.jsonl, (3) contains 'while true' or referenced by launchd KeepAlive plist, (4) has no corresponding scripts/ci/test-<name>.sh."
    - If 2+ criteria fail AND trailer doesn't name specific tradeoffs, hook fails with explicit message listing violations.
    - "Acknowledgment syntax: trailer can include Rust-First-Bypass-Accept: loc,state,hot,test (CSV of acknowledged criteria); narrative justification still required in adjacent comment."
    - "Smoke test scripts/ci/test-rust-first-bypass-gate.sh stages 3 fixture shell files: clean glue, violations+narrative bypass, violations+machine-acknowledged bypass; asserts pre-commit accepts the right ones."
    - "Backfill audit: run hook against scripts/coord/*.sh; emit kind=rust_first_bypass_audit with per-file violation summary; 2026-05-16 self-audit found chump-runner-migration-pipeline.sh + chump-runner-autoscale.sh would BOTH fail under stricter gate."
    - EVENT_REGISTRY.yaml entry for kind=rust_first_bypass_audit.
    - Doc update in docs/process/CLAUDE_GOTCHAS.md explaining new gate + acknowledgment syntax.
  pillar: CREDIBLE

