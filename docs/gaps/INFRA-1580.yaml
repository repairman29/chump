- id: INFRA-1580
  domain: INFRA
  title: "CREDIBLE: tighten Rust-First-Bypass gate — pre-commit lint that rejects narrative bypasses when machine-checkable criteria fail (LOC, state mutation, hot path)"
  status: open
  priority: P1
  effort: m
  pillar: CREDIBLE
  depends_on: []
  acceptance_criteria:
    - "Enhance scripts/git-hooks/pre-commit-rust-first.sh (existing per META-064) so when a shell file under scripts/ has `Rust-First-Bypass:` trailer/header, the hook AUTOMATICALLY checks the 4 machine-verifiable criteria and rejects the commit if any fails AND the trailer doesn't acknowledge the specific failure"
    - "Machine-checkable criteria: (1) LOC > 200, (2) writes to .chump-locks/*.state or state.db or ambient.jsonl, (3) contains `while true` or referenced by a launchd KeepAlive plist, (4) has no corresponding scripts/ci/test-<name>.sh file"
    - "If 2+ criteria fail AND the bypass trailer doesn't name the specific tradeoffs, hook fails with: 'Bypass trailer present but criteria violations are: LOC=339 (>200), state=mutates .chump-locks/runner-migration.state, hot=launchd-managed. Acknowledge each in the trailer or port to Rust.' Then the developer either ports OR amends the trailer to explicitly list-and-justify the violations."
    - "Acknowledgment syntax: trailer can include `Rust-First-Bypass-Accept: loc,state,hot` (CSV of acknowledged criteria) to silence the lint for those specific violations — narrative justification still required in adjacent comment"
    - "Smoke test scripts/ci/test-rust-first-bypass-gate.sh: stages 3 fixture shell files (one clean glue, one with violations + narrative bypass, one with violations + machine-acknowledged bypass) and asserts pre-commit accepts the right ones"
    - "Backfill audit: run hook against current scripts/coord/*.sh — emit kind=rust_first_bypass_audit with per-file violation summary; today's audit found chump-runner-migration-pipeline.sh and chump-runner-autoscale.sh would BOTH fail under stricter gate"
    - "EVENT_REGISTRY.yaml entry for kind=rust_first_bypass_audit"
    - "Doc update in docs/process/CLAUDE_GOTCHAS.md (or relevant) explaining the new gate + acknowledgment syntax"
  notes: |
    Origin: 2026-05-16 self-audit found that chump-runner-migration-pipeline.sh
    declared a Rust-First-Bypass trailer with narrative rationale ("pure glue
    per META-064 shell-OK criteria"), but the actual file violated the
    criteria in 4 ways (LOC, state, hot path, no test). The bypass discipline
    was performed, not honored.

    The proposal here is structural: when the bypass is invoked, the hook
    AUTO-VERIFIES the criteria the bypass implicitly waives. Narrative
    rationale becomes additive to machine-checked acknowledgment, not a
    substitute for it.

    Pairs with INFRA-1541 (AC coverage gate) as the second "honesty gate" —
    both close pre-merge truth-leaks by making the operator say which
    tradeoffs they're accepting in machine-readable form.


