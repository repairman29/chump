- id: EFFECTIVE-005
  domain: EFFECTIVE
  title: "EFFECTIVE: prefer patch_file over write_file for free-tier models — prevent full-file rewrites"
  status: open
  priority: P1
  effort: xs
  depends_on:
    - INFRA-733
  acceptance_criteria: |
    Free-tier models (Llama 3.3 70B) cannot reliably reproduce large files
    via write_file — they output truncated/placeholder content. patch_file
    is safer because the model only specifies the diff.

    Changes needed:
    1. In build_free_tier_prompt(), instruct models to use patch_file for ALL
       modifications to existing files, and write_file ONLY for new files
    2. Optionally: remove write_file from DISPATCH_FREE_TOOL_KEYS entirely
       and keep only [read_file, list_dir, patch_file, git_commit]
    3. Update prompt workflow: "read_file → patch_file → git_commit"

    Observed failures:
    - NVIDIA Llama 3.3 70B: wrote 1-line src/main.rs replacing 5753 lines
    - Groq Llama 3.3 70B: wrote 1-line Cargo.toml replacing 212 lines

    Test: run free-tier dispatch with patch_file-only profile against a
    real xs gap, verify no file is truncated.

