- id: EFFECTIVE-291
  domain: EFFECTIVE
  title: "EFFECTIVE: chump improve branches from a MONTHS-STALE clone — must pull origin/main before implementing"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - "1. chump improve fetches origin + hard-resets the clone to origin/main (git reset --hard origin/main && git clean -fd) before Stage 3 IMPLEMENT. 2. The PR branch is based on current origin/main, not a stale persistent clone. 3. A test asserts the clone HEAD == origin/main before branching. 4. Verified end-to-end: an improve PR's base contains the latest main commit."
  evidence: |
    2026-06-22 BEAST run: improve opened PR #10 (a correct RLS-recursion fix w/ 3 tests) but its branch was based on clone main 612ff45 — a FEBRUARY 2026 commit, months behind origin/main. The persistent clone at ~/.chump/external/<owner>/<repo>/clone is never 'git fetch + reset --hard origin/main'd before branching, so EVERY improve PR inherits stale main: missing the #7/#8/#9 gate fixes (so Code Quality fails on the OLD workflow), missing months of code, and likely conflicting. verify-merge correctly held it (CI red) — the SAFETY worked; the bug is clone staleness. This is the #1 blocker for autonomous merges: a fix from stale main can't pass gates that were fixed on real main. AC: improve fetches origin + hard-resets the clone to origin/main (or re-clones) before Stage 3 IMPLEMENT; the PR branch is based on current main; add a test asserting the clone HEAD == origin/main before branching. Sibling of EFFECTIVE-290 (onboard clone path). CRITICAL for MISSION-010.
