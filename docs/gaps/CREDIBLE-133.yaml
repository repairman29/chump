- id: CREDIBLE-133
  domain: CREDIBLE
  title: "CREDIBLE: auth::tests not hermetic — read real ~/.chump/config.toml via HOME fallback, fail on any box with creds; isolate CHUMP_HOME in with_env"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - with_env (auth.rs test helper) sets CHUMP_HOME to a fresh empty temp dir unless the test sets it explicitly, so credential detection never reads the developer's real ~/.chump/config.toml.
    - "auth::tests api_key_only_resolves_api_key_mode, neither_present_resolves_none, fleet_doctor_warns_when_no_creds PASS on a box that has a real oauth token / config present."
    - CHUMP_HOME is saved + restored (no leak across tests).
    - "cargo test --bin chump auth::tests is 0-failed regardless of ~/.chump contents."

