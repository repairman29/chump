  acceptance_criteria: |
    PR #1356 (PRODUCT-063 claim branch) fails clippy with:
      error: this boolean expression can be simplified
      --> src/provider_cascade.rs:938

    The filter chain in first_available_slot() / bandit_first_available()
    uses a negated conjunction:
      !(has_cloud && slot.tier == Local)
        && min_privacy.is_none_or(...)
        && !is_circuit_open(...)
        && !is_cooling_down(slot)

    Clippy suggests De Morgan's simplification. Apply it or add
    #[allow(clippy::nonminimal_bool)] with a comment explaining
    why the readable form is preferred.

    The branch also needs a rebase onto main to pick up the env-var
    registration fix (be485cd5) so fast-checks passes.

    Test: clippy and fast-checks both pass on the rebased branch.
