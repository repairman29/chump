- id: INFRA-759
  domain: INFRA
  title: "RESILIENT: pr-watch-shepherd auto-fix for cargo fmt failures on open PRs"
  status: open
  priority: P2
  effort: s
  acceptance_criteria: |
    Criterion 1: pr-watch-shepherd detects `cargo fmt` check failures on open PRs
    Criterion 2: Shepherd auto-runs `cargo fmt` on the PR branch and pushes a fix commit
    Criterion 3: An ambient event with `kind=pr_fmt_auto_fixed` is emitted including the PR number and commit SHA
    Criterion 4: Shepherd does not attempt to auto-fix other failure types (only fmt)
    Criterion 5: Test verifies a deliberately unformatted PR branch is auto-fixed by the shepherd

