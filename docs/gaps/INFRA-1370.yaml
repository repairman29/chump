- id: INFRA-1370
  domain: INFRA
  title: "CREDIBLE: chump audit aha-sweep — walks code/runtime/effect triangle for every feature shipped last 30d, emits kind=audit_finding when any leg diverges (replaces ad-hoc operator triangulation that found INFRA-1368)"
  status: open
  priority: P1
  effort: m
  description: |
    The smee-mergeStateStatus discovery on 2026-05-15 (filed as INFRA-1368) came from operator triangulating: (1) code presence via grep, (2) runtime state via launchctl/cache schema, (3) measured effect via ambient cache_hit count. CI/SLO dashboards check legs 1+2 but almost never 3, so 'mission failure under green uptime' ships undetected. This gap systematizes the triangulation as a recurring sweep — turns 'aha moments dependent on operator curiosity' into 'guaranteed detection within hourly cycle'. Pairs with INFRA-1371 (per-kind effect_metric declaration).
  acceptance_criteria:
    - "New CLI subcommand: chump audit aha-sweep [--window-days 30] [--json] walks the code/runtime/effect triangle for each candidate feature"
    - "Candidate sources: (a) src/ pub fn defined in last N days (git log -p --since), (b) /api/* routes registered in src/web_server.rs, (c) kinds registered in docs/observability/EVENT_REGISTRY.yaml, (d) PWA web components defined in web/v2/app.js"
    - "For each candidate, check 3 legs: PLUMBING (code/tests/docs present), HEARTBEAT (runtime evidence: launchd entry / cron / route serving / component mounted), EFFECT (measurable output: emit count, call count, request count, render count last N days)"
    - "Emit one kind=audit_finding to ambient.jsonl per divergence with body {ts, kind, feature_id, feature_class, plumbing_ok, heartbeat_ok, effect_ok, effect_metric_name, effect_observed, effect_expected, severity (\"warn\""
    - "\"alert\")}"
    - Register kind=audit_finding in EVENT_REGISTRY.yaml
    - Exit non-zero when any feature has plumbing_ok=true heartbeat_ok=true effect_ok=false (i.e. the smee case)
    - CI test scripts/ci/test-audit-aha-sweep.sh seeds a synthetic feature in each leg-divergence quadrant, asserts the sweep finds and emits
    - docs/process/AUDIT_FRAMEWORK.md documents the triangle model + how to add a new feature class
    - Scheduled launchd job runs hourly, surfaces findings in PWA <chump-view-audit-findings> panel

