- id: CREDIBLE-149
  domain: CREDIBLE
  title: "CREDIBLE: fleet_status active_leases/fleet_workers_alive counts every .chump-locks .json as a lease — reports 189 when ~1 real"
  status: done
  priority: P1
  effort: m
  description: |
    src/fleet_status.rs:50 walks .chump-locks/ and counts EVERY *.json (except dotfiles + names containing 'cooldown') as an active lease. Result: active_leases and fleet_workers_alive both report 189 while only ~1 real lease exists (verified 2026-07-04: pgrep worker.sh=12, tmux fleet panes=3, real lease files with expires_at=1; the 189 = 148 curator-filed-balance_restock_* + 30 curator-filed-pr_unstick-* decision-logs + ~10 *-state.json, NONE of which are leases). A real lease has schema {session_id, gap_id, taken_at, expires_at, heartbeat_at, purpose, speculative}; a decision-log has only {decision, gap_id, ts}. The discriminator is the 'expires_at' (or 'taken_at'+'purpose') field. This poisons every consumer of the metric: chump fleet status, the web dashboard (src/web_server.rs), src/fleet_health.rs, src/fleet_pulse.rs, src/mission_grade.rs, and the FLEET_SLOS 'active leases' scaling-gate input — all over-report ~180x. Surfaced while building the chump-mode dial (EFFECTIVE-305), which now computes the honest count locally via grep -l expires_at as a workaround. Likely-parallel shell bug: scripts/dispatch/fleet-status.sh and scripts/coord/ambient-context-inject.sh glob the same dir — audit them in the same PR.
  acceptance_criteria:
    - fleet_status.rs counts a .chump-locks/*.json file as a lease ONLY if it parses as a lease (has expires_at/taken_at), never a decision-log or state file
    - chump fleet status --json reports fleet_workers_alive/active_leases within +/-1 of ground truth (real lease files) on the live .chump-locks with its 178 decision-log files present
    - a regression test seeds .chump-locks with N real leases + M decision-logs + K state files and asserts the count == N
    - scripts/dispatch/fleet-status.sh and scripts/coord/ambient-context-inject.sh are audited/fixed for the same glob-all-json bug (or confirmed unaffected)
    - no consumer (web_server, fleet_health, fleet_pulse, mission_grade) still reads the inflated count
  closed_date: '2026-07-04'
  closed_pr: 3181

