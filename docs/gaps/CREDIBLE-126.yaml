- id: CREDIBLE-126
  domain: CREDIBLE
  title: "CREDIBLE: 4 commits shipped this cycle (2026-06-22) referencing gap IDs with no .yaml file — ghost commit hygiene failure"
  status: open
  priority: P1
  effort: xs
  opened_date: '2026-06-29'
  raised_by: cold-water
  raised_in: RED_LETTER#18
  description: |
    VERIFIED 2026-06-29 (Issue #18 Cold Water audit):

    Every non-cold-water, non-bypass commit in the 2026-06-22 cycle references a gap ID
    that has no corresponding docs/gaps/*.yaml file:

    - CREDIBLE-144 (commit 7b97da6): ls docs/gaps/CREDIBLE-144.yaml → No such file
    - RESILIENT-166 (commit 64908eb): ls docs/gaps/RESILIENT-166.yaml → No such file
    - META-298 (commit 09861e8): ls docs/gaps/META-298.yaml → No such file
    - MISSION-050 (commit 09861e8): ls docs/gaps/MISSION-050.yaml → No such file

    Additionally INFRA-1434 was explicitly promised in a bypass trailer as
    "filed as a follow-up" — docs/gaps/INFRA-1434.yaml does not exist.

    The gap store is losing coherence with what the fleet actually shipped.
    gap IDs in commit subjects are the canonical pointer to the gap that authorized
    the work; if the .yaml file doesn't exist, the work is untracked.

    Root cause: bot-merge preflight import was blocked by title-similarity check
    (INFRA-1434 pattern) causing a fatal exit before gap files could be created/imported.
    But CREDIBLE-144 and RESILIENT-166 shipped under bypasses — the bypass path
    skips the gap-file creation step entirely.

    Falsifying condition: The gap store manages gaps in state.db only and .yaml
    files are generated exports — i.e., if state.db contains CREDIBLE-144 etc.
    then this finding is wrong. But gap reserve creates .yaml files as canonical
    source; the pre-commit hook validates against .yaml files; this finding stands.
  acceptance_criteria:
    - "For each of CREDIBLE-144, RESILIENT-166, META-298, MISSION-050, INFRA-1434: a gap .yaml file exists in docs/gaps/ with matching id, valid title, and non-empty acceptance_criteria"
    - "The bot-merge bypass path creates a gap file stub before bypassing (or explicitly documents that no gap was required)"
    - "A CI check detects commits whose subject contains gap IDs not present in docs/gaps/ and fails with a clear error"
