- id: CREDIBLE-034
  domain: CREDIBLE
  title: "CREDIBLE: CLI integration tests for chump gap * subcommands — list, reserve, claim, preflight, ship, set, decompose, dump, import, audit-priorities, audit-ac, show (decomp of CREDIBLE-018 child 1/3)"
  status: open
  priority: P1
  effort: m
  acceptance_criteria:
    - "tests/cli_gap_family.rs spawns the built chump binary against a tempdir .chump/state.db; each test isolates its own state"
    - "For each of the 12 gap-* subcommands: happy-path test (valid args → exit 0 + expected stdout marker) + error-path test (invalid args → exit 2 + usage hint)"
    - "Cross-cutting gap-family tests: reserve→show roundtrip, set→list filter works, ship→audit-priorities reflects state change, claim→release lease cycle"
    - "Test the recycled-ID guard: try to set a `status: done` gap to `in_progress` without CHUMP_ALLOW_RECYCLE=1 → exit non-zero with named error"
    - "Test the hijack guard: try to change a gap title without CHUMP_ALLOW_GAP_REWRITE=1 → exit non-zero"
    - "scripts/ci/test-cli-gap-family.sh runs all tests, reports per-subcommand pass/fail; exits non-zero if any required-subcommand test fails"
    - "Coverage report annotates which subcommands have integration tests; checked into docs/process/CLI_TEST_COVERAGE.md"
    - "CI gate: this test target is required for any PR modifying src/main.rs's gap-family dispatch"

