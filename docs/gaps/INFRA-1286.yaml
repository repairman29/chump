- id: INFRA-1286
  domain: INFRA
  title: "EFFECTIVE: opus-curator roadmap_drift decision arm — read docs/ROADMAP.md milestones + cross-ref open P0/P1 gaps; META-065 follow-up"
  status: open
  priority: P2
  effort: m
  description: |
    META-065 layer 3 — roadmap milestone <-> gap-registry coupling. The curator (scripts/coord/opus-curator.sh) has 5 mutation arms today (p0_demotion, gap_ac_filled, slo_breach, vague_pickable_alert, pillar_rebalance_recommended). META-065 PR added two operator hooks (CHUMP_CURATOR_PAUSE, curator_auto_exec_armed sentinel) but DEFERRED the 'roadmap_drift' decision arm to this gap because it's its own work.
    
    Acceptance:
    1. Parse docs/ROADMAP.md to extract a structured list of (milestone, status, target_date, owning_gaps). Format TBD; consult docs/ROADMAP.md current shape.
    2. Cross-reference open P0/P1 gaps in state.db against owning_gaps lists. Surface:
       - 'P0 gap X is not on any milestone' (gap looks important but isn't strategically anchored)
       - 'milestone Y has 0 pickable P0/P1 progress' (milestone is starving)
    3. When drift exceeds threshold (default: > 3 unanchored P0/P1 OR > 1 starving milestone), auto-file a META-NEW gap with the diagnosis; rate-limited via .chump-locks/curator-decisions/<date>.jsonl daily sentinel.
    4. Emit kind=roadmap_drift_detected on threshold-cross (register in EVENT_REGISTRY).
    5. CHUMP_CURATOR_ROADMAP_CHECK=0 escape hatch.
    6. Test: scripts/ci/test-curator-roadmap-drift.sh — synthesize ROADMAP.md + state.db; assert drift detection + auto-file + dedup.
    
    Source: META-065 (PR #NNNN) layer 3 deferred to keep that PR scoped.
  acceptance_criteria:
    - "Parse `docs/ROADMAP.md` milestone table to extract structured list of `(milestone, status, target_date, owning_gap_ids[])`; format derived from current ROADMAP.md shape (consult before implementing)"
    - "Cross-reference open P0/P1 gaps in state.db against `owning_gap_ids`; surface: (a) 'P0 gap X is not on any milestone' (important but not strategically anchored), (b) 'milestone Y has 0 pickable P0/P1 progress' (milestone is starving)"
    - "When drift exceeds threshold (default: > 3 unanchored P0/P1 OR > 1 starving milestone), auto-file a META-NEW gap with the diagnosis; rate-limited via `.chump-locks/curator-decisions/<date>.jsonl` daily sentinel (dedup: if same drift pattern filed today, skip)"
    - "Emit `kind=roadmap_drift_detected` to ambient.jsonl on threshold cross; include `unanchored_count` and `starving_milestones[]` fields; registered in EVENT_REGISTRY.yaml before code ships"
    - "Escape hatch: `CHUMP_CURATOR_ROADMAP_CHECK=0` disables the arm entirely; documented in `.env.example`"
    - "Test `scripts/ci/test-curator-roadmap-drift.sh`: synthesize a ROADMAP.md with 2 milestones (one with owning gaps, one empty) + state.db with 4 unanchored P0 gaps; assert drift detection fires, auto-files gap, dedup works on second run, escape hatch suppresses"

