- id: PRODUCT-128
  domain: PRODUCT
  title: "EFFECTIVE: Cockpit fix #2 — Wake-fleet button on Today's-arc card when ships=0 (wires /api/autopilot/start)"
  status: open
  priority: P1
  effort: s
  description: |
    When Today's-arc card shows 'zero ships in 24h', the operator's actual question is 'why is the fleet idle and how do I fix it?'. Replace [check fleet] with [Wake fleet] button that POSTs /api/autopilot/start (endpoint already exists per PRODUCT-115). Card text becomes 'Fleet idle — wake autopilot?' with the button as the primary CTA.
  acceptance_criteria:
    - Today's-arc card detects autopilot status via /api/autopilot/status
    - If ships=0 AND autopilot=off, primary action is [Wake fleet]
    - Button POSTs /api/autopilot/start
    - Success state replaces card with confirmation + 'autopilot is now running'
    - If autopilot already on but ships=0, card shows different read ('autopilot on but idle — picker may be wedged')
    - Smoke test scripts/ci/test-cockpit-wake-fleet.sh

