- id: CREDIBLE-080
  domain: CREDIBLE
  title: blame-bot.sh emits regression_attributed against stale green_sha — fix-commit landings don't advance the green baseline
  status: done
  closed_pr: 2997
  priority: P2
  effort: s
  acceptance_criteria:
    - "scripts/coord/blame-bot.sh adds a _check_intermediate_green helper: scans commits in green_sha..HEAD for a later commit whose check-runs on the failing check_class are all success; if found, that commit becomes the new green_sha for that check_class"
    - When all originally-failing check_classes have a later green commit found, blame-bot emits kind=blame_bot_self_resolved (new event kind, also add to scripts/ci/event-registry-reserved.txt) with the resolving_commits CSV and exits 0 without firing regression_attributed
    - blame-bot dedupes regression_attributed by (green_sha, suspect_commits, checks_attributed) tuple — if the same tuple was emitted in last 30 min, skip the new emit (kind=blame_bot_dedupe_skip with reason=already_emitted)
    - scripts/ci/test-blame-bot.sh adds a green-to-red-to-green fixture (commit A pass, commit B fail-then-fix-by, commit C green) — expect kind=blame_bot_self_resolved, NOT regression_attributed
    - When green_sha is older than HEAD by > 50 commits, blame-bot prints a green_sha may be stale, re-baseline warning and emits kind=blame_bot_baseline_stale to ambient

