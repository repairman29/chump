- id: INFRA-1995
  domain: INFRA
  title: 'EFFECTIVE: chump fleet pulse — single command + /api/fleet/pulse endpoint replacing 5-surface (health+status+ambient+gh-pr+tmux)
    queries; floor-temp + leases + queue + daemons + last 5 wedges/admin-merges/alerts + pillar rates'
  status: done
  priority: P1
  effort: m
  acceptance_criteria:
  - 'New CLI: chump fleet pulse [--json] [--watch] — single command returning operator-readable status'
  - 'Output sections: (1) floor_temp (from INFRA-1992), (2) active_leases count + top 5 by age, (3) PR queue (open count,
    BLOCKED count, DIRTY count), (4) autopilot daemons loaded/total + per-daemon last-heartbeat, (5) last 5 wedge events (kind=wedge_detected),
    (6) last 5 admin-merges (kind=admin_merge_executed), (7) last 5 alerts (any kind=ALERT), (8) per-pillar ship rate last
    1h (CREDIBLE/EFFECTIVE/RESILIENT/ZERO-WASTE)'
  - New HTTP endpoint GET /api/fleet/pulse on web server returning same JSON shape
  - PWA cockpit panel renders the pulse with auto-refresh every 30s (EFFECTIVE-026 was previously filed for this; this gap
    supersedes that panel's data source)
  - 'Smoke test scripts/ci/test-fleet-pulse.sh: synthetic ambient.jsonl + state.db fixture, assert all 8 sections render correctly
    + --json shape stable'
  - 'Replaces 5-surface manual workflow: today operator runs chump health + chump fleet status + tail .chump-locks/ambient.jsonl
    + gh pr list + tmux ls'
  - 'Doc update: README.md ops section + docs/process/CLAUDE_GOTCHAS.md point to chump fleet pulse as the canonical ''what''s
    happening?'' command'
  depends_on:
  - INFRA-1992
  - INFRA-1987
  description: 'See docs/strategy/THE_FLOOR.md §7. Operators cannot manage what

    they cannot see in one frame. Today that takes 5 separate queries

    against 5 surfaces — Opus does this for the operator, but at higher

    agent counts this is operator-blind territory.


    Rough shape: (a) Rust function in src/fleet.rs that aggregates all

    data sources (ambient.jsonl + state.db + gh cache + launchctl); (b)

    CLI surface via main.rs `chump fleet pulse`; (c) HTTP endpoint in

    src/web_server.rs reusing same aggregator; (d) PWA panel component

    consuming /api/fleet/pulse.


    KEY DESIGN: this is a READ-ONLY aggregator. Zero state mutation.

    Safe to call from any context. Should complete in <500ms (cache

    everything, no live gh API calls beyond the existing webhook

    cache).


    Pairs with INFRA-1992 (floor-temp is one section) and INFRA-1987

    (cluster events are one section).


    Supersedes EFFECTIVE-026''s "PWA cockpit daemon-set health panel"

    — pulse covers daemon-set health among other things.

    '
  closed_date: '2026-05-25'
