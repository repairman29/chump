  title: "EFFECTIVE: gap creation must auto-generate concrete AC — 434/1351 open gaps (260 P1) carry boilerplate TODO AC, unpickable-quality"
  status: done
  priority: P2
  effort: m
  acceptance_criteria:
    - "1. chump gap reserve generates >=3 concrete, testable AC items (zero 'TODO:' lines) when no --acceptance-criteria is given, derived from title+domain (LLM when available, structured non-TODO fallback otherwise). 2. A 'chump gap backfill-ac' sweep regenerates AC for existing vague/TODO open gaps (the ~434 backlog). 3. Test: a reserve with only title+domain yields non-TODO AC; backfill turns a TODO gap into concrete AC. 4. chump gap audit-priorities vague-count trends toward 0."
  notes: |
    Shipped with three fixture-test fixes + the INFRA-1152 min-pool exemption the change surfaced.
  closed_date: '2026-07-19'
  closed_pr: 3167
  evidence: |
    2026-06-22 audit of .chump/state.db: 434 of ~1351 open gaps (~32%) have vague/TODO/empty acceptance_criteria; 260 of those are P1 (high-priority by label, not actionable). Example: the auto-filed cluster INFRA-3012..3024 ALL share the identical 4-line boilerplate ['TODO: what events emitted on success/failure/timeout','TODO: how cost tracked and reported to operator','TODO: failure-class taxonomy','TODO: smoke test command to verify observability'] — a template that was never filled. ROOT CAUSE: 'chump gap reserve' (the path agents+curators+planner use to self-file work) does NOT generate AC; it stamps a TODO template, and AC is only filled if the filer remembers (a discipline, not enforcement — see the operator-memory note 'always file gaps with AC'). chump gap decompose DOES LLM-generate AC, but most auto-filed gaps don't route through it. The audit gate (chump gap audit-priorities) and the ⚠ vague-flag CATCH vague-pickable gaps downstream but don't PREVENT them at creation. IMPACT on MISSION-010: a queue 1/3-full of TODO-AC gaps means a worker (or chump improve) that picks one gets vague instructions → poor output or a wasted skip; self-generated work isn't self-sufficient. FIX SHAPE: at filing time (gap reserve + planner + any auto-filer), LLM-generate concrete AC from title + evidence + a quick codebase peek (reuse the decompose AC-generation path); fail/auto-fill rather than stamp a TODO template; backfill the existing 434 via a sweep. AC: (1) chump gap reserve generates >=3 concrete, testable AC items (no 'TODO:' lines) from title+evidence; (2) a sweep backfills or demotes the 434 existing vague gaps; (3) test: a reserve with only a title+evidence yields non-TODO AC; (4) audit-priorities vague-count trends to ~0.

