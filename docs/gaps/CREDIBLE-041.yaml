- id: CREDIBLE-041
  domain: CREDIBLE
  title: "CREDIBLE: no-bundle-PR policy — CI fails any PR whose title lists multiple unrelated gap IDs (e.g. PR #1469 'feat(effective-009,eval-086,infra-825): bundle'); enforced via CREDIBLE-026 scope-divergence detector extension"
  status: done
  closed_pr: 1662
  priority: P1
  effort: xs
  acceptance_criteria:
    - "scripts/ci/check-pr-scope.sh (shipped in CREDIBLE-026 via #1462) gains a new rule: parse PR title for multiple gap IDs separated by `,` or `+`; if >1 gap ID AND those IDs are not depends_on-linked in state.db, FAIL"
    - "Allow-list: PRs labelled `bundle-approved` bypass this rule (escape hatch for genuinely-linked work like a refactor + its test addition)"
    - "Test fixture replays PR #1469: title `feat(effective-009,eval-086,infra-825): bundle` against 3 unrelated gap IDs → FAIL. Same title against IDs that are depends_on-linked → PASS"
    - "Test fixture replays a normal single-gap PR (e.g. #1462's `feat(CREDIBLE-026):...`) → PASS (no change in behavior for normal PRs)"
    - "Emits ambient kind=pr_bundle_blocked with pr, gap_ids[], depends_on_check_result"
    - "Title prefix accepted formats: `feat(GAP-N): ...`, `fix(GAP-N): ...`, `chore(GAP-N): ...` (single gap), `chore(gaps): ...` (registry-only chore, no specific gap), `Revert \"...\"` (revert). Anything else with multiple gap IDs trips the rule."
    - "Documented in docs/process/PR_HYGIENE.md as rule D (sibling to CREDIBLE-026 rule A/B and CREDIBLE-027 rules A/B/C)"
    - "Rationale comment in the rule names PR #1469 as the canonical anti-pattern that motivated it"
