- id: INFRA-457
  domain: INFRA
  title: chump gap import does not propagate status changes from per-file YAML — closer-closed gaps revert to open on every import+dump cycle
  status: open
  priority: P0
  effort: s
  opened_date: '2026-05-04'
  raised_by: cold-water
  raised_in: RED_LETTER#11
  description: |
    The INFRA-236 commit-subject gap closer is silently neutralized by the
    import+dump cycle that immediately follows it in the regenerate-gaps-yaml.yml
    workflow. Three-part verification (run in Cold Water sandbox 2026-05-04):

      1. Closer correctly writes status:done + closed_pr + closed_date to
         docs/gaps/INFRA-402.yaml (and 19 other gaps in the test range).
         Output: "[close-gaps] closed INFRA-402 (PR #1074, 2026-05-04)"

      2. `chump gap import` runs. Reports "20 closed_pr values backfilled
         from YAML" — but DOES NOT update the status column in state.db.
         Direct SQLite query: `SELECT status, closed_pr FROM gaps WHERE id='INFRA-402'`
         returns ('open', 1074). Status is still 'open' despite YAML saying 'done'.

      3. `chump gap dump --per-file` reads state.db (status=open) and
         regenerates docs/gaps/INFRA-402.yaml with status:open, closed_pr:1074.
         The closer's status:done write is completely overwritten.

    Net: all gaps closed by the INFRA-236 closer revert to status:open after
    the import+dump cycle. The CI regenerate workflow runs, finds no drift (the
    pre-dump and post-dump per-file YAMLs are identical to HEAD, because the
    closer's change was undone by the dump), and makes no commit. Zero
    "[skip ci] regenerate" commits exist anywhere in git history — consistent
    with the closer never producing a lasting close.

    Downstream consequences:
      - 34/125 open gaps have implementation commits (the "OPEN-BUT-LANDED"
        ghost class that INFRA-236 was specifically designed to eliminate)
      - DOC-018 (P0) remains open despite 3 implementation commits and all
        acceptance criteria verified met (CLAUDE.md=1880 tokens, GOTCHAS.md=501 lines)
      - Every fleet worker and agent reading the open-gap list sees ~34 phantom
        "opportunities" that are already done, burning token budget and causing
        duplicate-work collisions
      - INFRA-233 (NULL closed_pr backfill) partially addresses the symptom but
        does not fix the root cause (status not propagated)

    Root cause: `chump gap import` has a targeted backfill for the closed_pr
    column (added as a fix for INFRA-233) but does not do a full status-field
    sync from per-file YAML to state.db. The import uses "739 skipped (already
    present)" logic — if a gap is already in state.db, only closed_pr is
    backfilled; status is left as-is.

    Fix: `chump gap import` must sync the status field (and closed_date,
    closed_pr atomically) when the per-file YAML status differs from state.db.
    Alternatively, the workflow step order must be: import FIRST (to get correct
    state.db), THEN closer (skip or run no-op since import already closed them),
    THEN dump. But the cleanest fix is making import a full sync, not a
    targeted backfill.

    Falsifying condition: `chump gap import` run after the INFRA-236 closer
    shows state.db status='done' for any closer-closed gap.
  acceptance_criteria:
    - "`chump gap import` syncs status field from per-file YAML to state.db (not just closed_pr)"
    - "After import, `SELECT status FROM gaps WHERE id='INFRA-402'` returns 'done' if docs/gaps/INFRA-402.yaml has status:done"
    - "After import+dump cycle, docs/gaps/INFRA-402.yaml still shows status:done (round-trip stable)"
    - "Verified by running the INFRA-236 closer, then import, then dump, then checking 3 target gaps"
    - "At least 10 of the current 34 OPEN-BUT-LANDED gaps close within one CI cycle after this fix ships"
