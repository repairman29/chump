- id: RESILIENT-065
  domain: RESILIENT
  title: chump-commit.sh silently aborts before git commit (set -e + grep-no-match in INFRA-1853 env-var block)
  status: done
  closed_pr: 2996
  priority: P1
  effort: m
  acceptance_criteria:
    - "Root cause: scripts/coord/chump-commit.sh line ~729 _new_envvars=$(git diff|grep -oE CHUMP_...|...) under set -euo pipefail aborts the script when grep finds no match (exit 1, common case for code commits without new env vars), skipping git commit at line 784. Staged, not committed, no error."
    - "Fix the grep-no-match abort: the INFRA-1853 env-var extraction must NOT trip set -e when there are zero new CHUMP_* refs (guard the grep with a no-match-safe wrapper). Committing a staged .rs/.sh/.py with no new env var completes the commit (HEAD advances)."
    - Bound INFRA-1833 cargo fmt --all (line 689) with a timeout so cargo package-cache lock contention cannot hang the commit indefinitely; on timeout, emit an audit event and proceed to git commit.
    - "Add an EXIT trap: if the script exits before git commit ran, print a LOUD diagnostic (exit code, last line, staged files, \"re-run or git commit manually\") so a future silent-abort from ANY unguarded command becomes visible, not silent."
    - "CI regression test scripts/ci/test-chump-commit-completes.sh: (a) stage a .rs with no CHUMP_* -> chump-commit completes (HEAD moves); (b) stage a .rs introducing a new CHUMP_* -> commit completes AND env var appended; (c) trap fires loud on a forced pre-commit abort."
    - No regression to the off-rails / staged-file-scoping behavior chump-commit already enforces (only named files committed).

