- id: INFRA-1483
  domain: INFRA
  title: "EFFECTIVE: declarative chump.fleet.yaml spec for symmetric fan-out"
  status: open
  priority: P1
  effort: m
  description: |
    Audit miss from 2026-05-15 second pass. Persona-1 (Marcus) explicitly described this primitive in the dashboard-reveal: 'I don't want to type 40 different prompts. I want to write one architectural instruction in a markdown-like spec file, define the variables, and tell Chump how to fan out.' Today operators either file N sub-gaps by hand or run chump gap decompose which uses an LLM to fan out. The declarative spec-file primitive is missing — operator commits a chump.fleet.yaml describing intent + parameters + validation, Chump materializes the gap set.
  acceptance_criteria:
    - "Schema for chump.fleet.yaml: name, intent (markdown block), parameters (list of variables across which to fan out), per-instance validation command, per-instance success criteria"
    - chump fleet plan <spec-file> reads the YAML and outputs the gap set it would create (dry-run)
    - chump fleet apply <spec-file> reserves the gap set in state.db with proper depends_on linkage
    - "Parameters can be: list of file paths, list of service names, list of dep-version-pairs — supports the symmetric fan-out cases Marcus described"
    - Spec file lives in operator repo (committed alongside code), survives across team members
    - chump fleet status <spec-name> reports per-instance progress aggregated by the spec
    - "CI test: write a fleet-spec with 5 parameter instances, run chump fleet apply, verify 5 sub-gaps reserved with correct depends_on; agents pick + work in parallel; chump fleet status reports correctly"
  notes: |
    MARCUS M-B (canonical demo, interface). Promoted P2→P1 2026-05-16. Operator writes ONE chump.fleet.yaml; no more 40 prompts. Pairs with INFRA-1484 (fan-out) + INFRA-1487 (ref-impl).

