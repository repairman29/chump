- id: INFRA-801
  domain: INFRA
  title: "ZERO-WASTE: fix pr-watch-shepherd.sh branch mismatch — DIRTY-after-arm PRs never recovered"
  status: done
  priority: P1
  effort: xs
  description: |
    pr-watch-shepherd.sh creates an ephemeral worktree with -B tmp-shepherd-pr$PR (line 164). Then it tries git checkout -B "$BRANCH" (line 176) to switch to the PR's real branch name so pr-watch.sh's git symbolic-ref check passes. But when $BRANCH is already checked out in the original worktree, git checkout -B fails (cannot update checked-out branch), || true swallows the error, HEAD stays on tmp-shepherd-pr$PR, and pr-watch.sh exits 4 with "current branch does not match PR head". PRs #1367 and #1387 stuck for days.
    
    Fix: add --branch-override flag to pr-watch.sh so the shepherd can bypass the symbolic-ref check, removing the need for the fragile git checkout -B dance.
  acceptance_criteria:
    - pr-watch-shepherd.sh recovers DIRTY-after-arm PRs without branch mismatch
    - pr-watch.sh supports --branch-override flag for ephemeral worktrees
    - pr-watch.sh --once --branch-override <name> works without symbolic-ref
    - existing behavior (no --branch-override) unchanged
  closed_date: '2026-05-10'
  closed_pr: 1394

