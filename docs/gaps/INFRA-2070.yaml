- id: INFRA-2070
  domain: INFRA
  title: "RESILIENT: cascade-unblock detector (META-118 sub-gap 4) — when wedge_auto_fix PR MERGES, identify all open PRs whose CI failed on same signature; trigger gh pr update-branch on each; emit kind=cascade_unblocked"
  status: open
  priority: P1
  effort: xs
  acceptance_criteria:
    - "Hook into existing wizard-daemon Step 5 (cascade rebase, already shipped via #2630) — read wedge_auto_fix label OR check PR commit message for \"wedge_auto_fix: signature_hash=X\" trailer to identify the signature that just got fixed"
    - After PR merges (consumed via gh webhook pull_request.closed.merged event or polled every 5min from chump-github-cache), query open PR queue + recent ambient pr_failed events to find PRs whose failure_signature matches the just-merged fix signature; per-match call gh pr update-branch to rebase onto new main
    - Emit ambient kind=cascade_unblocked with fields source_pr (the auto-fix PR that merged), signature_hash, matched_pr_numbers (csv), rebase_attempt_count (success vs conflict counts)
    - "Safety: refuse to rebase a PR where (a) operator commented in last 30min, (b) PR has CHUMP_HOLD label, (c) rebase produces conflict (operator-required); per-skip emit kind=cascade_unblock_skipped with reason"
    - "Smoke test scripts/ci/test-cascade-unblock.sh: synth auto-fix PR merged event with signature X; synth 2 open PRs in pr_failed events with same signature X; run cascade-unblock; assert gh pr update-branch called for both; assert kind=cascade_unblocked emit with matched_pr_numbers=[2]"
    - EVENT_REGISTRY.yaml entries kind=cascade_unblocked + kind=cascade_unblock_skipped; allowlist entries
  depends_on: [INFRA-2069]
  notes: |
    Sub-gap 4 of META-118. Depends on INFRA-2069 (PRs need wedge_auto_fix label to identify). Reuses wizard-daemon Step 5 cascade-rebase infrastructure (PR #2630). This is the multiplier — one fix unblocks N PRs.

