- id: PRODUCT-134
  domain: PRODUCT
  title: "EFFECTIVE: 'Try Chump in your browser' — public sandboxed web playground that runs cockpit + 1 demo gap without install"
  status: open
  priority: P1
  effort: l
  description: |
    Most powerful activation moment: 'Try Chump' button that opens a hosted cockpit + 1 demo gap that runs end-to-end without any operator install. Zero-install removes 90% of the activation friction. Implementation: containerized chump --web on a free-tier hosting (Fly.io / Railway / Render) with throwaway gap registry + auto-reset every 30 min.
  acceptance_criteria:
    - "Public URL like https://try.chump.dev or playground.chump.dev"
    - Operator clicks 'Try Chump' on landing page, gets a working cockpit in <10 seconds
    - Pre-seeded with 1 demo gap that runs end-to-end (LLM call → patch → would-open-PR — stub PR creation)
    - Sandbox auto-resets every 30 min
    - Capacity-limited (rate-limited per IP) to prevent abuse
    - "Cost target: <$20/mo on free-tier hosting"

