# model_rates.yaml — INFRA-730 canonical token-pricing data
#
# Source of truth for src/session_ledger.rs cost_usd_from_tokens(model_id, ...).
# Replaces the flat $3-in/$15-out Sonnet defaults that overstate cost 3-∞×
# for non-Sonnet backends (haiku, free-tier Llama, paid DeepSeek, etc).
#
# All rates are USD per 1 million tokens.
# Free-tier providers (Groq/NVIDIA/Hyperbolic/Cerebras Personal) record 0.0
# per token; their cost is rate-limit RPD, not USD.
#
# `last_verified` is YYYY-MM-DD of the most recent operator confirmation.
# INFRA-731 weekly refresh script bumps this when rates haven't drifted.
# session_ledger refuses to compute cost when last_verified > 30 days old
# (override CHUMP_COST_ALLOW_STALE=1 with audit log).
#
# Adding a new model:
#   1. Add an entry below with input/output/cache_read rates per 1M tokens
#   2. Run scripts/dev/refresh-model-prices.sh --check to verify against
#      the LiteLLM upstream
#   3. Set last_verified to today's date
#
# Removing/updating:
#   - Don't delete entries for retired models — set status=deprecated and
#     keep the rate so historical cost reports still resolve.

