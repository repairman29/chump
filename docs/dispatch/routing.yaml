# COG-035 hand-tuned routing table v1.
# First matching route wins; default_candidates used if no route matches.
# Operators: edit this file and `chump dispatch route <GAP-ID>` to verify.
#
# Match keys (all optional, all-match semantics within a `match` block):
#   priority   — string equality (P0, P1, P2)
#   effort     — string OR list of strings (e.g. xs, or [l, xl])
#   task_class — string; wired values: `research` (EVAL-*/RESEARCH-* gaps),
#                `cognition` (COG-* gaps, INFRA-265), `coord` (INFRA-* gaps)
#
# INFRA-471: model_class field added to each route. Drives per-pick model
# selection in worker.sh — FLEET_MODEL is no longer global; it is overridden
# per gap via _resolve_model.py which walks this table. Also controls which
# effort levels each model-class worker accepts at pick time:
#   haiku  — picks xs, s only (refuses m, l, xl)
#   sonnet — picks s, m, l, xl (refuses xs)
#   opus   — picks any effort
#
# model_class field values: haiku | sonnet | opus
#
# Candidate fields:
#   backend       — `claude` or `chump-local`
#   model         — provider model id; omit for `claude` backend
#   provider_pfx  — provider prefix label (TOGETHER, GROQ, ...) for log + telemetry
#   why           — one-line rationale captured in dispatch logs

default_candidates:
  - { backend: chump-local, model: meta-llama/Llama-3.3-70B-Instruct-Turbo-Free, provider_pfx: TOGETHER, why: free-tier-default }
  - { backend: chump-local, model: openai/gpt-oss-120b, provider_pfx: GROQ, why: groq-fallback }
  - { backend: claude, why: frontier-fallback }

routes:
  # INFRA-265: cognitive-architecture work always goes to claude. Free-tier
  # cascade can produce confident-sounding wrong answers on belief-state /
  # Active Inference / synthetic neuromodulation code — see the EVAL-074
  # retraction in docs/RESEARCH_INTEGRITY.md for the failure mode.
  - match: { task_class: cognition }
    model_class: sonnet
    why: COG-* gaps cannot tolerate confident-sounding wrong answers
    candidates:
      - { backend: claude, why: cognition-needs-frontier }

  - match: { task_class: research }
    model_class: sonnet
    why: EVAL/RESEARCH gaps require correctness — no free-tier risk
    candidates:
      - { backend: claude, why: research-needs-frontier }

  # INFRA-265: any l/xl effort regardless of priority. Was P1+[l,xl] only;
  # the gap surface for large work is too big for the free-tier cascade
  # to nail consistently — claude reliably, even on P0/P2 large efforts.
  - match: { effort: [l, xl] }
    model_class: sonnet
    why: large work needs frontier reasoning
    candidates:
      - { backend: claude, why: frontier-large-work }

  # INFRA-471: medium effort — sonnet quality needed; haiku workers skip these.
  - match: { effort: m }
    model_class: sonnet
    why: medium work warrants frontier reasoning; cheap models miss edge cases
    candidates:
      - { backend: claude, why: sonnet-medium-work }
      - { backend: chump-local, model: openai/gpt-oss-120b, provider_pfx: GROQ, why: groq-medium-fallback }
      - { backend: chump-local, model: meta-llama/Llama-3.3-70B-Instruct-Turbo-Free, provider_pfx: TOGETHER, why: together-medium-fallback }

  - match: { effort: xs }
    model_class: sonnet
    why: RESILIENT-154 — sonnet is the floor. Haiku stalled ~60% of cycles (runs cargo check on shell-only gaps, hesitates in --dangerously-skip-permissions) and saves $0 on a flat subscription.
    candidates:
      - { backend: chump-local, model: openai/gpt-oss-120b, provider_pfx: GROQ, why: groq-fast-cheap }
      - { backend: chump-local, model: meta-llama/Llama-3.3-70B-Instruct-Turbo-Free, provider_pfx: TOGETHER, why: together-free-fallback }

  # INFRA-265: explicit s-effort route. Was an implicit fall-through to
  # default_candidates (which mixes free-tier + claude); explicit makes
  # the cascade-first intent visible to operators reading the table.
  - match: { effort: s }
    model_class: sonnet
    why: RESILIENT-154 — sonnet is the floor (haiku removed; it stalls and saves nothing on a flat subscription)
    candidates:
      - { backend: chump-local, model: openai/gpt-oss-120b, provider_pfx: GROQ, why: groq-small }
      - { backend: chump-local, model: meta-llama/Llama-3.3-70B-Instruct-Turbo-Free, provider_pfx: TOGETHER, why: together-small-fallback }
