# model_registry.yaml — INFRA-739 unified model metadata
#
# Single source of truth for pricing, capabilities, and routing metadata
# per model. Consumed by:
#   - src/gen.rs               estimate_cost_usd() (with OnceLock cache)
#   - src/model_overlay.rs     detect_model_family() (registry-first lookup)
#   - scripts/ab-harness/cost_ledger.py  PRICING_TABLE loader
#   - scripts/dev/refresh-model-prices.sh  (target file for automated updates)
#
# NOTE: docs/pricing/model_rates.yaml remains the canonical file for
# src/session_ledger.rs (INFRA-730). Do NOT break that path.
# model_registry.yaml adds capability + routing metadata on top of pricing.
#
# Pricing fields (USD per 1 million tokens):
#   input_per_mtk     — cost of 1M input tokens
#   output_per_mtk    — cost of 1M output tokens
#   cache_read_per_mtk — cost of 1M cache-read tokens (0.0 if no cache)
#
# Capability fields:
#   context_k         — context window in thousands of tokens
#   supports_tool_use — true if the model supports function/tool calling
#   supports_thinking — true if the model supports extended thinking mode
#
# Routing fields:
#   family            — coarse classification: Sonnet|Haiku|Opus|QwenChat|
#                       QwenCoder|LlamaInstruct|DeepSeek|Other
#   provider_hint     — primary provider slug (anthropic|together|groq|
#                       nvidia|cerebras|hyperbolic|openrouter|github|gemini)
#
# status: active (default) | deprecated
# free_tier: true if the model is available on a free-usage tier
# last_verified: YYYY-MM-DD of most recent operator confirmation

