# docs/process/FAILURE_MODES.yaml
#
# INFRA-647: Agent-readable failure-mode catalog for pr-triage-bot (INFRA-624)
# and chump fleet doctor (INFRA-603).
#
# Read by: src/failure_catalog.rs  (Rust, via `chump classify-failure`)
# Used by: .github/workflows/pr-triage-bot.yml
#
# Schema per entry:
#   id:             unique snake_case identifier
#   pattern:        regex matched against log text or job name (Rust regex crate syntax)
#   match_on:       log | job_name | either  (default: either)
#   classification: lint | flake | real-bug | infra-broken | test-coupling
#   auto_action:    fix | rerun | file_gap | escalate | skip
#   confidence:     0.0..1.0 — how reliable this match is
#   examples:       past incident IDs or short descriptions
#   notes:          optional human-readable context (why this rule exists)
#
# Classification taxonomy (mirrors ci_summary.rs):
#   lint          — clippy / rustfmt / doc warnings; auto-fix applies
#   flake         — transient; rerun usually passes; no gap needed
#   real-bug      — actual defect in the PR diff; file a fix gap
#   infra-broken  — runner/toolchain/secret/network issue; escalate
#   test-coupling — snapshot/fixture drift after upstream merge; file a gap

version: 1
failures:

  # ── Lint-class failures (handled by auto-fix-lint job) ─────────────────────

  - id: fmt_fail
    pattern: "^fmt$"
    match_on: job_name
    classification: lint
    auto_action: fix
    confidence: 1.0
    examples:
      - "cargo fmt --check failed in CI"
    notes: "rustfmt check; cargo fmt fixes it deterministically"

  - id: clippy_fail
    pattern: "^clippy$"
    match_on: job_name
    classification: lint
    auto_action: fix
    confidence: 1.0
    examples:
      - "cargo clippy denies warning in CI"

  - id: manual_strip
    pattern: "(?i)manual.strip|clippy::manual_strip"
    match_on: log
    classification: lint
    auto_action: fix
    confidence: 0.95
    examples:
      - "INFRA-624: clippy::manual_strip fired on str.strip_prefix"
    notes: "Use str::strip_prefix / strip_suffix instead of manual slicing"

  - id: manual_split_once
    pattern: "(?i)use.*split_once|clippy::manual_split_once"
    match_on: log
    classification: lint
    auto_action: fix
    confidence: 0.90
    examples:
      - "Seen in src/coordinator.rs during clippy pass"
    notes: "split_once is clearer for splitting into exactly two parts"

  - id: lines_filter_map_ok
    pattern: "(?i)clippy::lines_filter_map_ok|filter_map.*ok.*lines|lines.*filter_map.*ok"
    match_on: log
    classification: lint
    auto_action: fix
    confidence: 0.90
    examples:
      - "clippy::lines_filter_map_ok — use .lines().map_while(Result::ok)"

  - id: doc_overindented
    pattern: "(?i)doc comment.*over.?indented|over.?indented.*doc|rustdoc.*indented"
    match_on: log
    classification: lint
    auto_action: fix
    confidence: 0.88
    examples:
      - "rustdoc warning: doc comment indented more than 4 spaces"

  # ── Flake-class failures (transient; rerun without filing a gap) ───────────

  - id: e2e_pwa_stuck
    pattern: "(?i)e2e-pwa|playwright.*timeout|navigation.*timeout|page.*timed.?out"
    match_on: either
    classification: flake
    auto_action: rerun
    confidence: 0.80
    examples:
      - "e2e-pwa job stuck waiting for PWA service worker to register"
      - "Playwright navigation timeout after 30 s on slow runner"
    notes: "PWA e2e is load-sensitive; retry before filing a gap"

  - id: runner_oom
    pattern: "(?i)signal: killed|oom killer|killed.*memory|memory.*killed|out of memory"
    match_on: log
    classification: flake
    auto_action: rerun
    confidence: 0.82
    examples:
      - "Runner OOM during cargo test --workspace on 2 GB runner"

  - id: connection_reset
    pattern: "(?i)econnreset|connection reset by peer|socket hang up|broken pipe"
    match_on: log
    classification: flake
    auto_action: rerun
    confidence: 0.85
    examples:
      - "Transient network blip in GitHub Actions egress"

  - id: context_deadline
    pattern: "(?i)context deadline exceeded|operation timed out|i/o timeout"
    match_on: log
    classification: flake
    auto_action: rerun
    confidence: 0.78
    examples:
      - "gh API call timeout during long CI run"

  # ── Infra-broken (escalate; not a code defect) ─────────────────────────────

  - id: oauth_401
    pattern: "(?i)OAUTH.*401|401 Unauthorized.*oauth|oauth.*token.*expired|token.*invalid"
    match_on: log
    classification: infra-broken
    auto_action: escalate
    confidence: 0.85
    examples:
      - "OAUTH-401 events in ambient.jsonl; stale CI secret"
    notes: "Operator must rotate the CI secret; no code fix possible"

  - id: disk_full
    pattern: "(?i)no space left on device|no space left|disk.*full|ENOSPC"
    match_on: log
    classification: infra-broken
    auto_action: escalate
    confidence: 0.99
    examples:
      - "GitHub runner disk filled during cargo build (target/ unbounded)"

  - id: toolchain_missing
    pattern: "(?i)toolchain.*is not installed|rustup: error|error: toolchain '|could not find.*toolchain"
    match_on: log
    classification: infra-broken
    auto_action: rerun
    confidence: 0.92
    examples:
      - "Rust toolchain not installed on fresh GitHub runner"
    notes: "Usually resolves on rerun; if persistent, operator must update runner image"

  - id: runner_shutdown
    pattern: "(?i)runner has received a shutdown signal|runner exited|runner lost connection"
    match_on: log
    classification: infra-broken
    auto_action: rerun
    confidence: 0.95
    examples:
      - "GitHub Actions runner shut down mid-job (spot instance preemption)"

  - id: rate_limited
    pattern: "(?i)rate limit exceeded|429 Too Many Requests|secondary rate limit"
    match_on: log
    classification: infra-broken
    auto_action: rerun
    confidence: 0.90
    examples:
      - "gh API secondary rate limit hit during large gap import"

  # ── Test-coupling (fixture/snapshot drift; file a fix gap) ─────────────────

  - id: snapshot_mismatch
    pattern: "(?i)snapshot mismatch|snapshot differs|update.*snapshot|expected snapshot|snapshots.*outdated"
    match_on: log
    classification: test-coupling
    auto_action: file_gap
    confidence: 0.92
    examples:
      - "insta snapshot diff after upstream render change"
      - "UPDATE_EXPECT=1 regenerates outdated snapshots"

  - id: golden_file_mismatch
    pattern: "(?i)golden file|golden.?path.*fail|\\.snap.*fail|fixture.*fail"
    match_on: log
    classification: test-coupling
    auto_action: file_gap
    confidence: 0.88
    examples:
      - "e2e-golden-path fixture broke after HTML output change"

  # ── Real-bug (actual defect introduced by the PR) ──────────────────────────

  - id: type_error
    pattern: "(?i)error\\[E\\d{4}\\]|mismatched types|cannot borrow|does not live long enough"
    match_on: log
    classification: real-bug
    auto_action: file_gap
    confidence: 0.93
    examples:
      - "E0308 mismatched types after refactor"

  - id: test_assertion_fail
    pattern: "(?i)assertion.*failed|left.*==.*right.*failed|panicked at.*assert|thread.*panicked"
    match_on: log
    classification: real-bug
    auto_action: file_gap
    confidence: 0.82
    examples:
      - "assert_eq! failure in unit test introduced by PR logic change"
    notes: "Lower confidence because panics can also be flakes; use reran_and_passed signal"
