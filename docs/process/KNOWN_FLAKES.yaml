# ── Playwright e2e flakes (INFRA-1332) ───────────────────────────────────────
# Audit registry for Playwright tests skipped on the PR path. The actual
# skip enforcement lives in e2e/tests/<file>.spec.ts via
# `test.skip(!process.env.CHUMP_E2E_INCLUDE_FLAKES === '1', ...)`. The
# advisory workflow .github/workflows/e2e-pwa-advisory.yml sets the env
# and runs the quarantined describe blocks for visibility (non-blocking).
#
# Each entry MUST have a tracking_gap. Remove the entry when 10
# consecutive advisory runs are green.

playwright_flakes:
  - describe: "PWA shell"
    file: e2e/tests/api-and-pwa.spec.ts
    tests:
      - "loads home and shows message composer"
      - "navigate between views via sidebar"
      - "settings view shows v2 shell info"
      - "sessions toggle activates chat view"
    reason: "Intermittent failures on chromium across the 4 PWA-shell tests despite retries:2 — likely lifecycle race between web server boot and Playwright fixtures. Observed flaking on PRs #1712, #1732, #1816 (8×), #1765, #1792, #1968 in 24h."
    tracking_gap: INFRA-1335
    added: "2026-05-15"
    last_observed: "2026-05-15"

  - describe: "PWA mobile viewport"
    file: e2e/tests/api-and-pwa.spec.ts
    tests:
      - "composer and send remain usable"
      - "nav items accessible in mobile viewport"
    reason: "Mobile-viewport variants of the PWA-shell flakes. Same root cause suspected (web-server lifecycle race) plus viewport-resize timing."
    tracking_gap: INFRA-1335
    added: "2026-05-15"
    last_observed: "2026-05-15"

  - describe: "Chat /task path (tolerates slow local Ollama)"
    file: e2e/tests/api-and-pwa.spec.ts
    tests:
      - "/task creates assistant reply in thread"
      - "New chat clears thread after a quick reply"
    reason: "Real-LLM round-trip with timing assumptions; flakes when Ollama warm-start exceeds Playwright timeout."
    tracking_gap: INFRA-1335
    added: "2026-05-15"
    last_observed: "2026-05-15"
  # INFRA-1613 (2026-05-20): infra646_waste_events_counted intermittent
  # under parallel cargo test load (env/ambient contention suspected).
  - test: health::tests::infra646_waste_events_counted
    reason: "intermittent panic at src/health.rs:855 under parallel test load; env/ambient contention suspected"
    tracking_gap: INFRA-1613
    added: "2026-05-20"
    last_observed: "2026-05-20"
    max_reruns: 1

# INFRA-2346: GitHub Actions CHECK-NAME flakes (distinct from cargo test
# names above). The PR-shepherd-daemon BLOCKED_FLAKE tier consults this list:
# when a PR's failing checks are ALL named entries in check_flakes, the
# daemon runs `gh run rerun --failed`. Cap 2 reruns per PR tracked in
# .chump-locks/flake-rerun-count.json. Beyond cap, fall through to the
# normal BLOCKED_REAL_FAIL gap-filing path.
#
# Schema (per entry):
#   - check_name:     exact name of the GH Actions job / check-run that flakes
#     reason:         one-sentence root-cause hypothesis
#     tracking_gap:   ID of the open gap that will fix the root cause
#     added:          YYYY-MM-DD added
#     last_observed:  YYYY-MM-DD most recently seen flaking
#     max_reruns:     (optional) per-PR rerun budget (default 2)
#
# Same discipline as `flakes:` above — never add without a tracking gap;
# remove after 10 consecutive green runs.

check_flakes: []
# Example (uncomment to add):
#   - check_name: "ci.yml / fast-checks"
#     reason: "race in cargo cache restore under high runner load"
#     tracking_gap: INFRA-XXXX
#     added: "2026-05-31"
#     last_observed: "2026-05-31"
#     max_reruns: 2

