  - test: adversary::e2e_rule_to_ambient::rule_check_emits_ambient_line_with_correct_shape
    reason: "env-var contention on CHUMP_AMBIENT_LOG/SESSION_ID; module-local AMBIENT_ENV_LOCK does not serialize against other modules' tests"
    tracking_gap: INFRA-1320
    added: "2026-05-15"
    last_observed: "2026-05-15"
    max_reruns: 1
  - test: adversary::e2e_rule_to_ambient::warn_action_emits_but_caller_continues
    reason: "env-var contention on CHUMP_AMBIENT_LOG/SESSION_ID; module-local AMBIENT_ENV_LOCK does not serialize against other modules' tests"
    tracking_gap: INFRA-1320
    added: "2026-05-15"
    last_observed: "2026-05-15"
    max_reruns: 1
  - test: adversary::e2e_rule_to_ambient::emit_handles_malicious_input_safely
    reason: "env-var contention on CHUMP_AMBIENT_LOG/SESSION_ID; module-local AMBIENT_ENV_LOCK does not serialize against other modules' tests"
    tracking_gap: INFRA-1320
    added: "2026-05-15"
    last_observed: "2026-05-15"
    max_reruns: 1
