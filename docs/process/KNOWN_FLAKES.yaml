    tracking_gap: INFRA-1008
    added: "2026-05-13"
    last_observed: "2026-05-13"
    max_reruns: 1

  - test: sandbox_tool::tests::sandbox_run_executes_in_worktree
    reason: "creates a git worktree at a temp path; conflicts when parallel tests also create worktrees in the same repo"
    tracking_gap: INFRA-1008
    added: "2026-05-13"
    last_observed: "2026-05-13"
    max_reruns: 1

  - test: version::tests::fresh_when_baked_sha_is_at_head
    reason: "baked SHA is set at compile time; if HEAD has moved since last build, the SHA comparison is stale"
    tracking_gap: INFRA-1008
    added: "2026-05-13"
    last_observed: "2026-05-13"
    max_reruns: 1

  - test: version::tests::skip_when_baked_sha_unknown
    reason: "relies on BAKED_SHA being the sentinel 'unknown'; CI build environment may bake a real SHA"
    tracking_gap: INFRA-1008
    added: "2026-05-13"
    last_observed: "2026-05-13"
    max_reruns: 1

  - test: version::tests::fresh_when_only_unrelated_files_changed_since_baked_sha
    reason: "uses git log since baked SHA; baked SHA may be ahead of or equal to current HEAD in pre-push context"
    tracking_gap: INFRA-1008
    added: "2026-05-13"
    last_observed: "2026-05-13"
    max_reruns: 1

  - test: version::tests::stale_when_gap_store_changed_since_baked_sha
    reason: "same baked-SHA staleness as other version tests; git log query unreliable when SHA not in current branch history"
    tracking_gap: INFRA-1008
    added: "2026-05-13"
    last_observed: "2026-05-13"
    max_reruns: 1

  - test: version::tests::pr_1444_replay_refuses_without_override
    reason: "regression test for pr_1444 requires exact git history including that PR's commit; breaks on branches that diverge from main"
    tracking_gap: INFRA-1008
