# KNOWN_FLAKES.yaml — INFRA-764
#
# Registry of test names that have been observed to flake in CI but have
# not yet had their root cause fixed. The flake-autorerun harness
# (scripts/ci/cargo-test-with-rerun.sh) consults this list when cargo
# test reports failures: if EVERY failing test is in this catalog, the
# harness reruns the test job ONCE and only reports persistent failure.
#
# Why this exists
#   Pre-INFRA-764, every cargo-test failure looked the same to the queue
#   monitor — "1 failed". Whether it was a real PR bug or a known race
#   needed an operator to read the log. PR authors burned cycles on
#   "rerun and hope." This catalog lets the harness distinguish, retry
#   the known cases automatically, and surface only the persistent or
#   unknown-shaped failures to humans.
#
# Discipline
#   1. NEVER add a test here without an open INFRA-* gap to fix the
#      root cause. The catalog is a stop-gap, not a parking lot.
#   2. Each entry MUST have `tracking_gap:` pointing at the fix gap.
#   3. After the root cause is fixed and verified across 10 consecutive
#      CI runs, REMOVE the entry. The catalog is a living document; a
#      stale entry means rerunning a test that's already reliably green,
#      which masks future regressions.
#   4. Reviewers MUST flag PRs that add to this catalog without an
#      accompanying tracking gap.
#
# Schema
#   schema_version:  integer
#   last_audit:      YYYY-MM-DD of most recent operator review
#   flakes:          list of test entries
#     - test:           full test path (e.g. "module::tests::name")
#       reason:         one-sentence explanation of the race / nondeterminism
#       tracking_gap:   ID of the open gap that will fix the root cause
#       added:          YYYY-MM-DD added to catalog
#       last_observed:  YYYY-MM-DD most recently seen flaking
#       max_reruns:     1 (default; how many auto-reruns allowed)
#
# Auto-rerun behavior
#   If cargo test fails AND every failing test name appears in this
#   catalog, scripts/ci/cargo-test-with-rerun.sh re-runs `cargo test`
#   ONCE. If the rerun is green, CI passes with annotation
#   "flake auto-rerun recovered: <list>". If still red, CI fails normally.
#   The harness emits kind=flake_autorerun_initiated/recovered/persisted
#   to ambient.jsonl per INFRA-754 registry.

schema_version: 1
last_audit: "2026-05-15"

flakes:
  - test: doctor::tests::repo_env_missing_is_warn_not_fail
    reason: "test removes CHUMP_REPO/CHUMP_HOME and asserts check_repo_env returns Warn, but parallel tests in cargo test can set those env vars between this test's remove_var and check_repo_env call → assert fails with left=Pass right=Warn"
    tracking_gap: INFRA-977
    added: "2026-05-13"
    last_observed: "2026-05-13"
    max_reruns: 1

  # RESILIENT-012: 11 consistent pre-push failures on main — environment-dependent
  # tests that break under parallel cargo test execution. Tracked by INFRA-1008.
  - test: diff_review_tool::tests::diff_review_empty_diff_returns_message
    reason: "depends on git diff output in the test worktree; parallel tests mutate git state, causing diff_review to see unexpected content"
    tracking_gap: INFRA-1008
    added: "2026-05-13"
    last_observed: "2026-05-13"
    max_reruns: 1

  - test: repo_path::tests::repo_profiles_list_parses_git_root
    reason: "reads CHUMP_REPO env var which parallel tests may have mutated between set and read"
    tracking_gap: INFRA-1008
    added: "2026-05-13"
    last_observed: "2026-05-13"
    max_reruns: 1

  - test: repo_path::tests::set_working_repo_from_profile_roundtrip
    reason: "mutates and reads back profile state; collides with parallel repo_path tests under cargo test --tests"
    tracking_gap: INFRA-1008
    added: "2026-05-13"
    last_observed: "2026-05-13"
    max_reruns: 1

  # INFRA-1194 (2026-05-14): kpi_report::tests::infra617_leverage_counts_depends_on removed.
  # Passes reliably at --test-threads=16; git context leak fixed.

  # INFRA-1321 (2026-05-15): three adversary::e2e_rule_to_ambient tests added.
  # Root-cause fix tracked by INFRA-1320 — local AMBIENT_ENV_LOCK does not
  # serialize against the ~10 other modules that read CHUMP_AMBIENT_LOG /
