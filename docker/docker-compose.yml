# Chump sidecar profile: Ollama + Chump Web.
# Quick start for evaluators — one command, local inference, no paid API.
#
# Usage:
#   cd docker && docker compose up          # foreground
#   cd docker && docker compose up -d       # detached
#   open http://localhost:3000              # PWA
#
# First run pulls the Ollama model (~4.4 GB for qwen2.5:7b).
# To use a different model, change OLLAMA_MODEL below and OPENAI_MODEL.
#
# Persistence: Ollama models cached in ollama_data volume; Chump state in chump_data.

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-qwen2.5:7b}"]
    environment:
      OLLAMA_HOST: http://ollama:11434

  chump-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    environment:
      OPENAI_API_BASE: http://ollama:11434/v1
      OPENAI_API_KEY: ollama
      OPENAI_MODEL: "${OLLAMA_MODEL:-qwen2.5:7b}"
      CHUMP_LIGHT_CONTEXT: "1"
      CHUMP_HOME: /app
      CHUMP_WEB_STATIC_DIR: /app/web
    volumes:
      - chump_data:/app/sessions

volumes:
  ollama_data:
  chump_data:
