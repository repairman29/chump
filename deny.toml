[advisories]
# Advisory IDs to explicitly allow
ignore = [
    # INFRA-414: rsa 0.9.10 has no fixed version available
    # Vulnerability: Marvin Attack (timing sidechannel)
    # Chain: web-push -> jwt-simple -> superboring -> rsa 0.9.10
    # We acknowledge this risk and are monitoring for alternatives to web-push
    "RUSTSEC-2023-0071",

    # INFRA-414: rustls-webpki 0.102.8 vulnerabilities only present when serenity/discord feature is enabled
    # The discord feature is optional and disabled by default
    # Vulnerabilities:
    # - RUSTSEC-2026-0104: Reachable panic in CRL parsing
    # - RUSTSEC-2026-0098: Name constraints for URI names incorrectly accepted
    # - RUSTSEC-2026-0099: Name constraints accepted for wildcard names
    # - RUSTSEC-2026-0049: CRLs not considered authoritative
    # These will be fixed when serenity 0.13 (or later) is released with updated rustls-webpki
    "RUSTSEC-2026-0104",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0049",

    # RESILIENT-170: aes 0.9.0 is YANKED (not an exploitable vuln — a yanked-crate warning).
    # Chain: chump -> superboring 0.1.11 -> aes-keywrap 0.9.0 -> aes =0.9.0 (pinned upstream).
    # Cannot bump locally; aes-keywrap requires exactly 0.9.0. This yank was blocking the
    # REQUIRED `audit` gate on every PR fleet-wide (trunk frozen 5 days).
    # Durable fix: drop this ignore once superboring/aes-keywrap ship a non-yanked aes.
    "RUSTSEC-2026-0186",
]

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
