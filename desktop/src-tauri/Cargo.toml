[package]
name = "chump-desktop"
version = "0.1.0"
description = "Tauri shell for Chump PWA (Cowork UI scaffold)"
edition = "2021"
rust-version = "1.77.2"
# Tauri app shell, not a publishable library. Excluding from crates.io publish
# also fixes the CI dry-run gate (crates-publish-dry-run.yml) which was
# failing because Ubuntu CI doesn't have libglib2.0-dev installed for the
# Tauri Linux backend dep tree. PR #805 hit this; the dry-run is supposed
# to gate publishable crates only.
publish = false

[lib]
name = "chump_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-single-instance = "2"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["time", "process", "io-util"] }

[package.metadata.dist]
dist = false
